<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Letter Stars ⭐</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold','Nunito','Quicksand',system-ui,-apple-system,Arial,sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);overflow:hidden;height:100vh;height:100dvh;width:100vw;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;background:#0a0e2a}

/* Night sky background */
.bg{position:fixed;inset:0;z-index:var(--z-bg);background:linear-gradient(180deg,#0a0e2a 0%,#111840 40%,#1a2456 70%,#1e2d6a 100%)}
.moon{position:fixed;top:30px;right:30px;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#FFF8E1,#FFE082,#FFD54F);box-shadow:0 0 40px rgba(255,224,130,0.5),0 0 80px rgba(255,224,130,0.2);z-index:1}

/* Background stars */
.bg-star{position:fixed;border-radius:50%;background:#fff;z-index:1;animation:twinkle-bg 3s ease-in-out infinite}
@keyframes twinkle-bg{0%,100%{opacity:0.2}50%{opacity:0.6}}

/* Screens */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 0.5s;opacity:0;visibility:hidden;pointer-events:none;z-index:var(--z-screen);padding:20px}
.screen.active{opacity:1;visibility:visible;pointer-events:auto}
.screen-title{background:linear-gradient(180deg,#0a0e2a,#111840,#1a2456)}
.screen-title h1{font-size:clamp(30px,8vw,50px);color:#FFD54F;margin:10px 0;font-weight:900;text-shadow:0 0 20px rgba(255,213,79,0.5)}
.screen-title p{font-size:clamp(15px,3.8vw,22px);color:#E0E0E0;max-width:440px;line-height:1.4;font-weight:600}
.screen-title .icon-row{font-size:clamp(40px,10vw,70px);margin-bottom:5px}

.btn{min-width:var(--tap);min-height:60px;padding:14px 40px;font-size:clamp(20px,5vw,28px);font-family:var(--font);color:#fff;border:none;border-radius:30px;cursor:pointer;font-weight:900;box-shadow:0 4px 15px rgba(0,0,0,0.3);transition:transform 0.1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.93)}
.btn-start{background:linear-gradient(135deg,#FFD54F,#FF8F00);color:#1a1a2e;animation:glow 2.5s ease-in-out infinite;margin-top:20px}
.btn-again{background:linear-gradient(135deg,#FFD54F,#FF8F00);color:#1a1a2e;margin-top:16px}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;background:rgba(10,14,42,0.9);backdrop-filter:blur(4px);border-bottom:2px solid rgba(255,213,79,0.2)}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:2px}
.hud-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.hud-label{font-size:clamp(10px,2.2vw,14px);color:#90CAF9;font-weight:900}
.hud-val{font-size:clamp(16px,3.5vw,24px);font-weight:900}
.hud-round .hud-val{color:#FFD54F}
.hud-score .hud-val{color:#FF8A65}
.hud-prompt{font-size:clamp(18px,4.5vw,28px);font-weight:900;color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.3)}

/* Constellation area */
.constellation-area{position:fixed;top:60px;left:50%;transform:translateX(-50%);width:min(85vw,400px);height:min(50vh,350px);z-index:var(--z-game)}

.constellation-star{position:absolute;border-radius:50%;background:radial-gradient(circle,#fff,#FFE082);box-shadow:0 0 8px #fff,0 0 16px rgba(255,224,130,0.6);animation:twinkle 2s ease-in-out infinite;transition:all 0.5s}
@keyframes twinkle{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.3);opacity:1}}

.constellation-star.revealed{background:radial-gradient(circle,#FFD54F,#FF8F00);box-shadow:0 0 12px #FFD54F,0 0 30px rgba(255,213,79,0.8);animation:none;transform:scale(1.4)}

/* SVG lines */
.constellation-lines{position:absolute;inset:0;z-index:5;pointer-events:none}
.constellation-lines line{stroke:#FFD54F;stroke-width:2;stroke-linecap:round;opacity:0;filter:drop-shadow(0 0 4px rgba(255,213,79,0.8))}
.constellation-lines line.visible{opacity:1;transition:opacity 0.4s}

/* Revealed letter in constellation */
.constellation-letter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(60px,15vw,100px);font-weight:900;color:#FFD54F;text-shadow:0 0 30px rgba(255,213,79,0.8),0 0 60px rgba(255,213,79,0.4);opacity:0;z-index:6;transition:opacity 0.6s}
.constellation-letter.visible{opacity:1}

/* Choice buttons */
.choice-area{position:fixed;bottom:60px;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:center;gap:clamp(15px,4vw,30px);padding:0 20px}
.choice-btn{min-width:var(--tap);min-height:var(--tap);width:clamp(80px,20vw,110px);height:clamp(80px,20vw,110px);border-radius:20px;border:4px solid rgba(255,255,255,0.3);background:linear-gradient(135deg,#283593,#1565C0);font-size:clamp(32px,8vw,48px);font-weight:900;color:#fff;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform 0.15s,border-color 0.15s;text-shadow:0 2px 4px rgba(0,0,0,0.3)}
.choice-btn:active{transform:scale(0.92)}
.choice-btn.correct{border-color:#FFD54F;background:linear-gradient(135deg,#FF8F00,#FFD54F);color:#1a1a2e;animation:popCorrect 0.4s ease-out}
.choice-btn.wrong{animation:wobble 0.4s ease-out}
@keyframes popCorrect{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes wobble{0%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}100%{transform:translateX(0)}}

/* Confetti */
.confetti-piece{position:fixed;z-index:999;pointer-events:none;border-radius:3px}

/* Collection row */
.collection-row{position:fixed;bottom:8px;left:0;right:0;z-index:var(--z-ui);display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:0 10px}
.collection-icon{width:clamp(24px,5vw,32px);height:clamp(24px,5vw,32px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,2.5vw,14px);font-weight:900;color:#FFD54F;background:rgba(255,213,79,0.15);border:1px solid rgba(255,213,79,0.3);opacity:0.3;transition:opacity 0.4s,background 0.4s}
.collection-icon.found{opacity:1;background:rgba(255,213,79,0.3);text-shadow:0 0 6px rgba(255,213,79,0.6)}

/* Celebration */
.celeb{position:fixed;inset:0;z-index:var(--z-celeb);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;background:linear-gradient(180deg,#0a0e2a,#111840,#1a2456);opacity:0;visibility:hidden;pointer-events:none;transition:opacity 0.6s}
.celeb.active{opacity:1;visibility:visible;pointer-events:auto}
.celeb h1{font-size:clamp(28px,7vw,46px);color:#FFD54F;font-weight:900;margin:10px 0;text-shadow:0 0 20px rgba(255,213,79,0.5)}
.celeb .stars{font-size:clamp(40px,10vw,60px);margin:10px 0}
.celeb p{font-size:clamp(16px,4vw,22px);color:#E0E0E0;font-weight:700}
.celeb .final-collection{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin:15px 0}
.celeb .final-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#FFD54F;background:rgba(255,213,79,0.3);border:1px solid rgba(255,213,79,0.5);text-shadow:0 0 6px rgba(255,213,79,0.6)}
</style>
</head>

const CONSTELLATION_LINES = {

// ── Audio ──
class GameAudio {
  constructor() { this.ctx = null; this.musicGain = null; this.voiceQueue = []; this.voicePlaying = false; }
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = 0.07;
    this.musicGain.connect(this.ctx.destination);
  }
  startMusic() {
    this.init();
    const notes = [330, 392, 440, 523, 392, 330, 294, 262];
    let i = 0;
    const play = () => {
      if (!this.ctx) return;
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = notes[i % notes.length];
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.08, this.ctx.currentTime + 0.15);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.1);
      osc.connect(g); g.connect(this.musicGain);
      osc.start(); osc.stop(this.ctx.currentTime + 1.2);
      i++;
      this.musicTimer = setTimeout(play, 1200);
    };
    play();
  }
  stopMusic() { clearTimeout(this.musicTimer); }
  playSFX(freq, type = 'sine', dur = 0.3) {
    this.init();
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.25, this.ctx.currentTime);
    g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + dur);
    osc.connect(g); g.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + dur);
  }
  playReveal() {
    [523, 659, 784, 880].forEach((n, i) => setTimeout(() => this.playSFX(n, 'sine', 0.35), i * 100));
  }
  playCorrect() {
    this.playSFX(523, 'sine', 0.12);
    setTimeout(() => this.playSFX(659, 'sine', 0.12), 80);
    setTimeout(() => this.playSFX(784, 'sine', 0.25), 160);
  }
  playWrong() { this.playSFX(200, 'square', 0.2); }
  playCelebration() {
    [523, 659, 784, 1047, 784, 1047].forEach((n, i) => setTimeout(() => this.playSFX(n, 'sine', 0.3), i * 150));
  }
  duckMusic() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(0.02, this.ctx.currentTime + 0.2); }
  unduckMusic() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(0.07, this.ctx.currentTime + 0.3); }
  queueVoice(file) {
    return new Promise(resolve => {
      this.voiceQueue.push({ file, resolve });
      if (!this.voicePlaying) this._playNext();
    });
  }
  _playNext() {
    if (!this.voiceQueue.length) { this.voicePlaying = false; return; }
    this.voicePlaying = true;
    const { file, resolve } = this.voiceQueue.shift();
    this.duckMusic();
    const a = new Audio(file); a.volume = 0.9;
    a.onended = () => { this.unduckMusic(); resolve(); this._playNext(); };
    a.onerror = () => { this.unduckMusic(); resolve(); this._playNext(); };
    a.play().catch(() => { this.unduckMusic(); resolve(); this._playNext(); });
  }
}

const audio = new GameAudio();

// ── Effects ──
function burstConfetti(x, y, count = 25) {
  const colors = ['#FFD54F','#FF8F00','#FFF8E1','#90CAF9','#CE93D8','#80CBC4','#FF8A65','#A5D6A7'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (4 + Math.random() * 6) + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = 50 + Math.random() * 100;
    el.animate([
      { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
      { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist - 80}px) rotate(${360+Math.random()*360}deg)`, opacity: 0 }
    ], { duration: 1200 + Math.random() * 800, easing: 'ease-out' });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

const ROUNDS = [

];

let currentRound = 0;
let roundLetters = [];
let currentLetterIndex = 0;
let targetLetter = '';
let score = 0;
let canTap = false;
let allFound = [];
let hintTimer = null;

const $ = id => document.getElementById(id);
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function shuffle(a) { const b = [...a]; for (let i = b.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); t = true; fn(e); }, { passive: false });
  el.addEventListener('click', e => { if (!t) fn(e); t = false; });
}

// ── Background Stars ──
function createBgStars() {
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'bg-star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    const size = 1 + Math.random() * 2;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    document.body.appendChild(s);
  }
}

// ── Collection Row ──
function buildCollectionRow() {
  const row = $('collectionRow');
  row.innerHTML = '';
  const total = ROUNDS.reduce((s, r) => s + r.letters.length, 0);
  let idx = 0;
  ROUNDS.forEach(r => {
    r.letters.forEach(l => {
      const icon = document.createElement('div');
      icon.className = 'collection-icon';
      icon.dataset.letter = l;
      row.appendChild(icon);
      idx++;
    });
  });
}

function markCollection(letter) {
  const icons = $('collectionRow').querySelectorAll('.collection-icon');
  icons.forEach(icon => {
    if (icon.dataset.letter === letter) {
      icon.classList.add('found');
      icon.textContent = letter;
    }
  });
}

// ── Constellation Display ──
function showConstellation(letter) {
  const area = $('constellationArea');
  const svg = $('constellationLines');
  const letterEl = $('constellationLetter');

  // Clear previous
  area.querySelectorAll('.constellation-star').forEach(s => s.remove());
  svg.innerHTML = '';
  letterEl.classList.remove('visible');
  letterEl.textContent = '';

  const stars = CONSTELLATION_DATA[letter];
  if (!stars) return;

  const areaW = area.offsetWidth;
  const areaH = area.offsetHeight;

  // Create SVG with proper viewBox
  svg.setAttribute('viewBox', `0 0 ${areaW} ${areaH}`);
  svg.style.width = areaW + 'px';
  svg.style.height = areaH + 'px';

  // Place stars
  stars.forEach((pos, i) => {
    const star = document.createElement('div');
    star.className = 'constellation-star';
    const size = 10 + Math.random() * 4;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = (pos.x / 100 * areaW - size / 2) + 'px';
    star.style.top = (pos.y / 100 * areaH - size / 2) + 'px';
    star.style.animationDelay = (Math.random() * 2) + 's';
    star.dataset.index = i;
    area.appendChild(star);
  });

  // Pre-create lines (hidden)
  const lines = CONSTELLATION_LINES[letter];
  if (lines) {
    lines.forEach(([a, b]) => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', stars[a].x / 100 * areaW);
      line.setAttribute('y1', stars[a].y / 100 * areaH);
      line.setAttribute('x2', stars[b].x / 100 * areaW);
      line.setAttribute('y2', stars[b].y / 100 * areaH);
      svg.appendChild(line);
    });
  }
}

function revealConstellation(letter) {
  const area = $('constellationArea');
  const svg = $('constellationLines');
  const letterEl = $('constellationLetter');

  // Reveal stars
  area.querySelectorAll('.constellation-star').forEach(s => s.classList.add('revealed'));

  // Animate lines one by one
  const lines = svg.querySelectorAll('line');
  lines.forEach((line, i) => {
    setTimeout(() => line.classList.add('visible'), i * 120);
  });

  // Show letter after lines
  setTimeout(() => {
    letterEl.textContent = letter;
    letterEl.classList.add('visible');
  }, lines.length * 120 + 200);
}

// ── Choice Buttons ──
function showChoices(target, distractors) {
  const area = $('choiceArea');
  area.innerHTML = '';
  area.style.display = '';

  const choices = shuffle([target, ...distractors]);

  choices.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = letter;

    onTap(btn, () => {
      if (!canTap) return;

      if (letter === target) {
        canTap = false;
        clearTimeout(hintTimer);
        btn.classList.add('correct');
        audio.playCorrect();

        score++;
        allFound.push(letter);
        $('hudScore').textContent = '⭐ ' + score;
        markCollection(letter);

        // Reveal constellation
        audio.playReveal();
        revealConstellation(letter);

        const rect = area.getBoundingClientRect();
        burstConfetti(rect.left + rect.width / 2, rect.top, 30);

        // Say letter name + sound
        setTimeout(async () => {
          await audio.queueVoice(`${AUDIO_BASE}/letters/${letter.toLowerCase()}.mp3`);
          await delay(200);
          await audio.queueVoice(`${AUDIO_BASE}/letters/${letter.toLowerCase()}_sound.mp3`);
          await delay(800);
          area.style.display = 'none';
          nextLetter();
        }, 600);
      } else {
        audio.playWrong();
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 400);
        // Re-say target
        audio.queueVoice(`${AUDIO_BASE}/letters/${target.toLowerCase()}.mp3`);
      }
    });

    area.appendChild(btn);
  });
}

// ── Game Flow ──
async function startGame() {
  audio.init();
  audio.startMusic();
  $('titleScreen').classList.remove('active');
  await delay(400);
  $('hud').style.display = '';
  $('collectionRow').style.display = '';
  $('constellationArea').style.display = '';
  currentRound = 0;
  score = 0;
  allFound = [];
  buildCollectionRow();
  $('hudScore').textContent = '⭐ 0';
  startRound();
}

async function startRound() {
  const round = ROUNDS[currentRound];
  roundLetters = shuffle(round.letters);
  currentLetterIndex = 0;
  $('hudRound').textContent = `${currentRound + 1} / ${ROUNDS.length}`;
  nextLetter();
}

async function nextLetter() {
  if (currentLetterIndex >= roundLetters.length) {
    currentRound++;
    if (currentRound >= ROUNDS.length) {
      endGame();
      return;
    }
    await delay(500);
    startRound();
    return;
  }

  const round = ROUNDS[currentRound];
  targetLetter = roundLetters[currentLetterIndex];
  currentLetterIndex++;

  // Show constellation
  showConstellation(targetLetter);

  $('hudPrompt').textContent = `What letter? ⭐`;

  // Say prompt
  await audio.queueVoice(`${AUDIO_BASE}/phrases/what_letter_is_this.mp3`);
  await delay(300);
  await audio.queueVoice(`${AUDIO_BASE}/letters/${targetLetter.toLowerCase()}.mp3`);
  await delay(200);
  await audio.queueVoice(`${AUDIO_BASE}/letters/${targetLetter.toLowerCase()}_sound.mp3`);
  await delay(300);

  // Pick 2 distractors
  const others = LETTERS.filter(l => l !== targetLetter);
  const distractors = shuffle(others).slice(0, 2);

  showChoices(targetLetter, distractors);
  canTap = true;

  // Hint timer — repeat every 4 seconds
  function setHint() {
    hintTimer = setTimeout(() => {
      if (canTap) {
        audio.queueVoice(`${AUDIO_BASE}/letters/${targetLetter.toLowerCase()}.mp3`);
        setHint();
      }
    }, 4000);
  }
  setHint();
}

async function endGame() {
  audio.stopMusic();
  clearTimeout(hintTimer);
  audio.playCelebration();

  await delay(400);
  $('hud').style.display = 'none';
  $('collectionRow').style.display = 'none';
  $('choiceArea').style.display = 'none';
  $('constellationArea').style.display = 'none';

  // Build final collection
  const fc = $('finalCollection');
  fc.innerHTML = '';
  allFound.forEach(letter => {
    const icon = document.createElement('div');
    icon.className = 'final-icon';
    icon.textContent = letter;
    fc.appendChild(icon);
  });
  $('celebCount').textContent = score;
  $('celebScreen').classList.add('active');

  for (let i = 0; i < 4; i++) {
    setTimeout(() => burstConfetti(Math.random() * window.innerWidth, Math.random() * window.innerHeight * 0.4, 30), i * 400);
  }

  await audio.queueVoice(`${AUDIO_BASE}/phrases/great_job.mp3`);
}

// ── Init ──
createBgStars();
onTap($('startBtn'), startGame);
onTap($('againBtn'), () => {
  $('celebScreen').classList.remove('active');
  currentRound = 0;
  score = 0;
  allFound = [];
  buildCollectionRow();
  $('hudScore').textContent = '⭐ 0';
  $('hud').style.display = '';
  $('collectionRow').style.display = '';
  $('constellationArea').style.display = '';
  audio.startMusic();
  startRound();
});
</script>
