<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rainbow Memory 🦄</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --pink: #ff9ec7; --peach: #ffc99e; --yellow: #fff3a0; --mint: #b5f5c9;
  --sky: #a8d8ff; --lavender: #d4b5ff; --deep-purple: #5b3a8e; --rainbow-red: #ff6b9d;
  --rainbow-orange: #ffa94d; --rainbow-yellow: #ffd93d; --rainbow-green: #6bdc95;
  --rainbow-blue: #4db8ff; --rainbow-purple: #b084ff; --white90: rgba(255,255,255,0.9);
  --text-dark: #4a2d7a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: linear-gradient(160deg, #ffd6e8 0%, #ffe4c4 20%, #fff3a0 40%, #c8f5d4 60%, #b5d8ff 80%, #d4b5ff 100%);
}

/* ── Background sparkles/clouds/stars ── */
.bg-sparkle {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  font-size: clamp(12px, 2.5vw, 22px);
  opacity: 0.55;
  animation: sparkleFloat linear infinite;
}
@keyframes sparkleFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.55; }
  92%  { opacity: 0.55; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1.1); opacity: 0; }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title {
  background: linear-gradient(160deg, rgba(255,214,232,0.95) 0%, rgba(255,228,196,0.92) 25%, rgba(255,243,160,0.92) 50%, rgba(200,245,212,0.92) 75%, rgba(212,181,255,0.95) 100%);
}
.screen-title .icon-row {
  display: flex; gap: 10px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(40px, 10vw, 66px); }
.screen-title h1 {
  font-size: clamp(28px, 7vw, 50px);
  color: var(--deep-purple);
  text-shadow: 0 0 24px rgba(255,158,199,0.7), 2px 2px 0 rgba(255,255,255,0.6);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(15px, 3.6vw, 20px);
  color: var(--text-dark);
  max-width: 380px; line-height: 1.45;
  font-weight: bold;
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(180,100,200,0.35);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start  { background: linear-gradient(135deg, #ff6b9d, #b084ff, #4db8ff); background-size: 200% 200%; margin-top: 18px; animation: shimmer 3s ease-in-out infinite; }
.btn-again  { background: linear-gradient(135deg, #ff6b9d, #b084ff, #4db8ff); background-size: 200% 200%; margin-top: 16px; animation: shimmer 3s ease-in-out infinite; }
@keyframes shimmer { 0%,100%{background-position:0% 50%; filter:brightness(1)} 50%{background-position:100% 50%; filter:brightness(1.15)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
  border-bottom: 3px solid;
  border-image: linear-gradient(90deg, #ff6b9d, #ffa94d, #ffd93d, #6bdc95, #4db8ff, #b084ff) 1;
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(91,58,142,0.55); font-weight: bold; letter-spacing: 0.05em; }
.hud-val   { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: #ff6b9d; }
.hud-score .hud-val { color: #b084ff; }
.hud-pairs-text { color: var(--deep-purple); font-size: clamp(14px,3vw,20px); font-weight: 900; }

/* ── Character (Stella the unicorn) ── */
.char-area {
  position: fixed; bottom: 58px; left: 10px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji { font-size: clamp(44px,9.5vw,66px); filter: drop-shadow(0 4px 10px rgba(255,158,199,0.5)); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.97); color: var(--deep-purple);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(12px,2.6vw,16px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(180,100,200,0.3);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
  border: 2px solid rgba(176,132,255,0.3);
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -8px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.97);
}

/* ── Card Grid ── */
.card-grid {
  position: fixed;
  top: 55px; left: 50%; transform: translateX(-50%);
  z-index: var(--z-game);
  display: grid;
  gap: clamp(6px,1.5vw,10px);
  padding: 8px;
  justify-items: center; align-items: center;
}
.card-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.card-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.card-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.card-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }

/* ── Card ── */
.card {
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s;
}
.card:active { transform: scale(0.95); }
.card-inner {
  position: relative;
  width: clamp(70px, 18vw, 100px);
  height: clamp(90px, 24vw, 120px);
  transition: transform 0.5s;
  transform-style: preserve-3d;
}
.card.flipped .card-inner  { transform: rotateY(180deg); }
.card.matched .card-inner  { transform: rotateY(180deg); }

.card-front, .card-back {
  position: absolute; inset: 0;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  box-shadow: 0 4px 14px rgba(180,100,200,0.25);
}

/* Card back — cloud shape with rainbow border on sky background */
.card-back {
  background: linear-gradient(135deg, #d4eaff, #b5d8ff);
  border: 3px solid transparent;
  background-clip: padding-box;
  position: relative;
  overflow: hidden;
  gap: 2px;
}
.card-back::before {
  content: '';
  position: absolute;
  inset: -3px;
  z-index: -1;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff6b9d, #ffa94d, #ffd93d, #6bdc95, #4db8ff, #b084ff);
}
.card-back-icon { font-size: clamp(30px,7.5vw,44px); line-height: 1; animation: cloudBob 2.8s ease-in-out infinite; }
@keyframes cloudBob { 0%,100%{transform:translateY(0) scale(1);opacity:0.95} 50%{transform:translateY(-3px) scale(1.05);opacity:1} }
.card-back-sparkle { font-size: 11px; letter-spacing: 2px; }

/* Card front — soft white with rainbow border */
.card-front {
  background: linear-gradient(135deg, #ffffff, #fff7fc);
  border: 3px solid transparent;
  background-clip: padding-box;
  transform: rotateY(180deg);
  gap: 4px;
  padding: 4px;
  position: relative;
  overflow: hidden;
}
.card-front::before {
  content: '';
  position: absolute;
  inset: -3px;
  z-index: -1;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff6b9d, #ffa94d, #ffd93d, #6bdc95, #4db8ff, #b084ff);
}

/* Card content types */
.card-letter-pair {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1;
  gap: 2px;
}
.card-upper {
  font-size: clamp(30px, 7.5vw, 46px);
  font-weight: 900;
  color: #ff6b9d;
  text-shadow: 0 0 10px rgba(255,107,157,0.3), 1px 1px 0 rgba(255,255,255,0.8);
  line-height: 1;
}
.card-lower {
  font-size: clamp(24px, 6vw, 36px);
  font-weight: 900;
  color: #b084ff;
  text-shadow: 0 0 10px rgba(176,132,255,0.3), 1px 1px 0 rgba(255,255,255,0.8);
  line-height: 1;
}
.card-emoji {
  font-size: clamp(30px, 7.5vw, 44px);
  line-height: 1;
}
.card-word {
  font-size: clamp(12px, 2.8vw, 16px);
  font-weight: 900;
  color: var(--deep-purple);
  text-transform: lowercase;
  line-height: 1.1;
  margin-top: 2px;
}
.card-mini-letters {
  font-size: clamp(11px, 2.4vw, 14px);
  font-weight: 900;
  color: rgba(91,58,142,0.65);
  margin-top: 1px;
}

/* Matched cards — rainbow glow */
.card.matched .card-front {
  background: linear-gradient(135deg, #fff5fb, #f0e6ff);
}
.card.matched .card-inner {
  animation: cardmatch 0.4s ease-out;
}
.card.match-anim .card-front::after {
  content: '🌈✨';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(28px, 7vw, 42px);
  background: rgba(255,243,251,0.88);
  border-radius: 11px;
  animation: rainbowFloat 1.2s ease-out forwards;
}
@keyframes rainbowFloat {
  0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.6) rotate(360deg); }
}

/* Hint styles */
.hint-wiggle { animation: wiggle 0.5s ease-in-out 3 !important; }
.hint-glow   { box-shadow: 0 0 25px rgba(255,107,157,0.6), 0 0 50px rgba(176,132,255,0.4) !important; border-radius: 14px; }

/* ── Rainbow Arc Achievement ── */
.rainbow-arc {
  position: fixed; bottom: 52px; right: 8px;
  z-index: var(--z-char);
  width: clamp(80px,18vw,130px);
  pointer-events: none;
}
.arc-svg { width: 100%; height: auto; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
.arc-band {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  opacity: 0.15;
  transition: opacity 0.5s, stroke-width 0.5s;
}
.arc-band.lit {
  opacity: 1;
  animation: arcGlow 1.5s ease-in-out infinite;
}
.arc-band-0.lit { stroke: #ff6b9d; }
.arc-band-1.lit { stroke: #ffa94d; }
.arc-band-2.lit { stroke: #ffd93d; }
.arc-band-3.lit { stroke: #6bdc95; }
.arc-band-4.lit { stroke: #4db8ff; }
.arc-band-5.lit { stroke: #b084ff; }
@keyframes arcGlow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3) drop-shadow(0 0 4px currentColor)} }
.arc-complete { animation: rainbowComplete 1.5s ease-in-out infinite; }
@keyframes rainbowComplete { 0%,100%{transform:scale(1);filter:drop-shadow(0 0 10px rgba(255,255,255,0.6))} 50%{transform:scale(1.08);filter:drop-shadow(0 0 25px rgba(255,214,232,0.9))} }

/* Gallop animation for Stella on final celebration */
.gallop {
  position: fixed;
  bottom: 40%;
  left: -100px;
  font-size: clamp(50px, 12vw, 80px);
  z-index: var(--z-celeb);
  animation: galloping 2.2s ease-in-out forwards;
  pointer-events: none;
}
@keyframes galloping {
  0%   { left: -120px; transform: translateY(0) rotate(-5deg); }
  25%  { transform: translateY(-20px) rotate(3deg); }
  50%  { transform: translateY(0) rotate(-3deg); }
  75%  { transform: translateY(-20px) rotate(3deg); }
  100% { left: 110vw; transform: translateY(0) rotate(-5deg); }
}

/* ── Progress bar ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(4px,1.2vw,8px); flex-wrap: wrap;
  padding: 5px 10px 8px;
  background: rgba(255,255,255,0.88); backdrop-filter: blur(6px);
  border-top: 3px solid;
  border-image: linear-gradient(90deg, #ff6b9d, #ffa94d, #ffd93d, #6bdc95, #4db8ff, #b084ff) 1;
  pointer-events: none;
}
.prog-dot {
  width: clamp(28px,5.5vw,38px);
  height: clamp(28px,5.5vw,38px);
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  border: 2px solid rgba(176,132,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(12px,2.4vw,16px); font-weight: 900;
  color: rgba(91,58,142,0.35);
  text-transform: uppercase;
}
.prog-dot.done {
  background: linear-gradient(135deg, #ff6b9d, #b084ff);
  border-color: #ffd93d; color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* ── Round banner ── */
.round-banner {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(255,255,255,0.96); backdrop-filter: blur(12px);
  border: 3px solid transparent;
  background-clip: padding-box;
  position: fixed;
  border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
  box-shadow: 0 10px 40px rgba(180,100,200,0.3);
}
.round-banner::before {
  content: '';
  position: absolute;
  inset: -3px;
  z-index: -1;
  border-radius: 26px;
  background: linear-gradient(135deg, #ff6b9d, #ffa94d, #ffd93d, #6bdc95, #4db8ff, #b084ff);
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--deep-purple); text-shadow: 0 0 15px rgba(255,158,199,0.4), 1px 1px 0 rgba(255,255,255,0.6);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(91,58,142,0.65); margin-top: 5px;
  font-weight: bold;
}

/* ── Celebration screen ── */
.screen-celeb {
  background: linear-gradient(160deg, rgba(255,214,232,0.97) 0%, rgba(255,228,196,0.95) 25%, rgba(255,243,160,0.95) 50%, rgba(200,245,212,0.95) 75%, rgba(212,181,255,0.97) 100%);
  backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(26px,6.5vw,48px); color: var(--deep-purple);
  text-shadow: 0 0 20px rgba(255,158,199,0.6), 3px 3px 0 rgba(255,255,255,0.7);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(14px,3.5vw,22px); color: var(--text-dark); margin: 6px 0; font-weight: bold; }
.celeb-stars   { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-icon-row{ display:flex; gap:12px; justify-content:center; align-items:center; margin-bottom:10px; }
.celeb-icon-row span{ font-size:clamp(50px,13vw,82px); animation: dance 1s ease-in-out infinite; }

/* ── Particles ── */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }

/* ── Keyframes ── */
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes dance       { 0%,100%{transform:translateY(0) rotate(0) scale(1)} 15%{transform:translateY(-18px) rotate(-8deg) scale(1.08)} 30%{transform:translateY(0) rotate(8deg)} 45%{transform:translateY(-12px) rotate(-5deg) scale(1.05)} 60%{transform:translateY(0) rotate(5deg)} 75%{transform:translateY(-8px) rotate(-3deg) scale(1.08)} }
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-22px) scale(1.08)} 70%{transform:translateY(-8px) scale(1.03)} }
@keyframes cardmatch   { 0%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.15)} 100%{transform:rotateY(180deg) scale(1)} }
@keyframes wiggle      { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-6deg) scale(1.05)} 75%{transform:rotate(6deg) scale(1.05)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }
@keyframes wrongShake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
</style>
</head>
<body>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <span class="hud-label">ROUND</span>
    <span class="hud-val" id="hudRound">1/4</span>
  </div>
  <div class="hud-center">
    <span class="hud-pairs-text" id="hudPairs">Find the matching pairs!</span>
  </div>
  <div class="hud-right hud-score">
    <span class="hud-label">STARS</span>
    <span class="hud-val" id="hudScore">0</span>
  </div>
</div>

<!-- Card Grid -->
<div class="card-grid" id="cardGrid"></div>

<!-- Stella the unicorn -->
<div class="char-area" id="charArea" style="display:none">
  <div class="char-bubble" id="charBubble"></div>
  <div class="char-emoji" id="charEmoji">🦄</div>
</div>

<!-- Rainbow Arc -->
<div class="rainbow-arc" id="rainbowArc" style="display:none">
  <svg class="arc-svg" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <!-- 6 rainbow arcs, outer to inner -->
    <path class="arc-band arc-band-0" id="ab0" d="M 10 75 A 50 50 0 0 1 110 75" />
    <path class="arc-band arc-band-1" id="ab1" d="M 18 75 A 42 42 0 0 1 102 75" />
    <path class="arc-band arc-band-2" id="ab2" d="M 26 75 A 34 34 0 0 1 94 75" />
    <path class="arc-band arc-band-3" id="ab3" d="M 34 75 A 26 26 0 0 1 86 75" />
    <path class="arc-band arc-band-4" id="ab4" d="M 42 75 A 18 18 0 0 1 78 75" />
    <path class="arc-band arc-band-5" id="ab5" d="M 50 75 A 10 10 0 0 1 70 75" />
    <!-- Clouds at base -->
    <ellipse cx="15" cy="76" rx="12" ry="5" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="105" cy="76" rx="12" ry="5" fill="#ffffff" opacity="0.9"/>
  </svg>
</div>

<!-- Progress bar -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- Round banner -->
<div class="round-banner" id="roundBanner">
  <h2 id="roundTitle"></h2>
  <p  id="roundSub"></p>
</div>

<!-- ═══ TITLE SCREEN ═══ -->
<div class="screen screen-title active" id="scrTitle">
  <div class="icon-row">
    <span>🌈</span>
    <span>🦄</span>
    <span>☁️</span>
  </div>
  <h1>Rainbow Memory 🦄</h1>
  <p>The rainbow wind scattered Stella's letter clouds! Flip the cloud tiles to find the matching pairs!<br>🌈 Fill the rainbow arc together! 🌈</p>
  <button class="btn btn-start" id="btnStart">Let's Play! 🦄</button>
</div>

<!-- ═══ CELEBRATION SCREEN ═══ -->
<div class="screen screen-celeb" id="scrCeleb">
  <div class="celeb-icon-row">
    <span>🦄</span>
    <span>🌈</span>
  </div>
  <h2 id="celebTitle">🌟 Magical! 🌟</h2>
  <p id="celebMsg">You found all of Stella's letter clouds!</p>
  <div class="celeb-stars" id="celebStars"></div>

// AUDIO CLASS (AudioContext-first for iOS)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.06; this.sfxVol = 0.3; this.musicDucked = 0.018;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Dreamy pentatonic — major key, sparkly feel
    const notes = [392.00, 440.00, 493.88, 587.33, 659.25, 783.99, 880.00];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.6 ? 'triangle' : 'sine';
      o.frequency.value = f * (Math.random() > 0.7 ? 2 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.10, this.ctx.currentTime + 0.2);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.2);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.4);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 900 + Math.random() * 1300);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); p(1046.5,t+0.36,0.25,0.4); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='flip')     { p(700,t,0.06,0.15); p(900,t+0.03,0.08,0.12); }
    else if (type==='reveal')   { p(440,t,0.08,0.2); p(660,t+0.06,0.1,0.18); }
    else if (type==='hint')     { p(523,t,0.15,0.15); p(659,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(1000,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='pop')      { p(988,t,0.05,0.2); p(1318,t+0.04,0.06,0.15); }
    else if (type==='sparkle')  { p(1318,t,0.08,0.18); p(1568,t+0.05,0.08,0.16); p(1976,t+0.1,0.1,0.14); }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(l)   { return this.speak(`${AUDIO_BASE}/letters/${l}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ══════════════════════════════════════════════════════════════════
// ROUND CONFIG — 4 rounds, progressive difficulty with cross-rep
//
// Card types:
//   'upper'   — big uppercase letter (e.g. "U")
//   'lower'   — big lowercase letter (e.g. "u")
//   'pair'    — both upper and lower (e.g. "Uu")
//   'word'    — emoji + word (e.g. ☂️ umbrella)
//
// Both cases always visible on all cards (small letters when not primary).
// Each pair = two cards with the same letter but different representation.
// ══════════════════════════════════════════════════════════════════

// Round 1: 3 pairs (6 cards) — upper ↔ lower. Letters U, V, W. 1.5s peek.
// Round 2: 4 pairs (8 cards) — upper ↔ lower. Letters U, V, W, X. No peek.
// Round 3: 5 pairs (10 cards) — letter ↔ word-emoji. Letters U-Y. No peek.
// Round 4: 6 pairs (12 cards) — mixed cross-rep. All 6 letters U-Z. No peek.

function buildRoundPairs(roundIdx) {
  let pairs = [];
  if (roundIdx === 0) {
    // 3 pairs: upper ↔ lower for U, V, W
    ['u','v','w'].forEach(l => {
      pairs.push({ letter: l, typeA: 'upper', typeB: 'lower' });
    });
  } else if (roundIdx === 1) {
    // 4 pairs: upper ↔ lower for U, V, W, X
    ['u','v','w','x'].forEach(l => {
      pairs.push({ letter: l, typeA: 'upper', typeB: 'lower' });
    });
  } else if (roundIdx === 2) {
    // 5 pairs: letter ↔ word for U, V, W, X, Y
    ['u','v','w','x','y'].forEach(l => {
      pairs.push({ letter: l, typeA: 'pair', typeB: 'word' });
    });
  } else {
    // 6 pairs: mix — all 6 letters with varied cross-rep
    pairs.push({ letter: 'u', typeA: 'upper', typeB: 'lower' });
    pairs.push({ letter: 'v', typeA: 'upper', typeB: 'word'  });
    pairs.push({ letter: 'w', typeA: 'lower', typeB: 'word'  });
    pairs.push({ letter: 'x', typeA: 'upper', typeB: 'lower' });
    pairs.push({ letter: 'y', typeA: 'pair',  typeB: 'word'  });
    pairs.push({ letter: 'z', typeA: 'upper', typeB: 'word'  });
  }
  return pairs;
}

const ROUND_META = [

  { label: 'Round 2 — Cloud Dance! ☁️',    sub: '4 pairs — no peeking!', cols: 4, peek: false },
  { label: 'Round 3 — Stella\'s Words! 🦄', sub: '5 pairs — letters meet words!', cols: 5, peek: false },
  { label: 'Round 4 — Rainbow Finale! 🌈', sub: '6 pairs — the grand gallop!', cols: 4, peek: false },

function buildCardFront(letter, type) {
  const front = document.createElement('div');
  front.className = 'card-front';
  const upper = letter.toUpperCase();
  const lower = letter.toLowerCase();

  if (type === 'upper') {
    // Big uppercase, lowercase shown small below
    const pairEl = document.createElement('div');
    pairEl.className = 'card-letter-pair';
    const up = document.createElement('div');
    up.className = 'card-upper';
    up.textContent = upper;
    pairEl.appendChild(up);
    front.appendChild(pairEl);
    const mini = document.createElement('div');
    mini.className = 'card-mini-letters';
    mini.textContent = upper + lower;
    front.appendChild(mini);
  } else if (type === 'lower') {
    // Big lowercase, uppercase shown small below
    const pairEl = document.createElement('div');
    pairEl.className = 'card-letter-pair';
    const lo = document.createElement('div');
    lo.className = 'card-lower';
    lo.textContent = lower;
    pairEl.appendChild(lo);
    front.appendChild(pairEl);
    const mini = document.createElement('div');
    mini.className = 'card-mini-letters';
    mini.textContent = upper + lower;
    front.appendChild(mini);
  } else if (type === 'pair') {
    // Both Uu big together
    const pairEl = document.createElement('div');
    pairEl.className = 'card-letter-pair';
    pairEl.style.flexDirection = 'row';
    pairEl.style.gap = '4px';
    const up = document.createElement('span');
    up.className = 'card-upper';
    up.textContent = upper;
    const lo = document.createElement('span');
    lo.className = 'card-lower';
    lo.textContent = lower;
    pairEl.appendChild(up);
    pairEl.appendChild(lo);
    front.appendChild(pairEl);
  } else if (type === 'word') {
    // Emoji + word + small Uu for reference
    const emoji = document.createElement('div');
    emoji.className = 'card-emoji';
    emoji.textContent = LETTER_EMOJI[letter] || '';
    front.appendChild(emoji);
    const word = document.createElement('div');
    word.className = 'card-word';
    word.textContent = LETTER_WORDS[letter] || letter;
    front.appendChild(word);
    const mini = document.createElement('div');
    mini.className = 'card-mini-letters';
    mini.textContent = upper + lower;
    front.appendChild(mini);
  }

  return front;
}

// ══════════════════════════════════════════════════════════════════
// BUILD CARD GRID
// ══════════════════════════════════════════════════════════════════
let currentPairs = [];

function buildGrid() {
  const grid = $('cardGrid');
  grid.innerHTML = '';
  const pairs = buildRoundPairs(round);
  currentPairs = pairs;
  totalPairs = pairs.length;
  matches = 0;

  // Create two cards per pair
  let cards = [];
  pairs.forEach((p, pairIdx) => {
    cards.push({ letter: p.letter, type: p.typeA, pairIdx });
    cards.push({ letter: p.letter, type: p.typeB, pairIdx });
  });
  shuffle(cards);

  const meta = ROUND_META[round];
  grid.className = 'card-grid cols-' + meta.cols;

  cards.forEach((cardData, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.letter = cardData.letter;
    card.dataset.pairIdx = cardData.pairIdx;
    card.dataset.idx = idx;
    card.dataset.type = cardData.type;

    const inner = document.createElement('div');
    inner.className = 'card-inner';

    // Back (face down — cloud with rainbow border)
    const back = document.createElement('div');
    back.className = 'card-back';
    back.innerHTML = '<div class="card-back-icon">☁️</div><div class="card-back-sparkle">✨🌈✨</div>';

    // Front (face up — letter content)
    const front = buildCardFront(cardData.letter, cardData.type);

    inner.appendChild(back);
    inner.appendChild(front);
    card.appendChild(inner);

    onTap(card, () => flipCard(card));
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════════
// FLIP CARD
// ══════════════════════════════════════════════════════════════════
function flipCard(card) {
  if (!gameActive || lockBoard) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flippedCards.length >= 2) return;

  resetHints();
  card.classList.add('flipped');
  audio.tone('flip');
  flippedCards.push(card);

  // Speak the letter on this card
  const letter = card.dataset.letter;
  audio.speakLetter(letter);

  if (flippedCards.length === 2) {
    lockBoard = true;
    checkMatch();
  }
}

// ══════════════════════════════════════════════════════════════════
// CHECK MATCH — cross-representation: same pairIdx = match
// ══════════════════════════════════════════════════════════════════
async function checkMatch() {
  const [a, b] = flippedCards;
  const pairA = a.dataset.pairIdx;
  const pairB = b.dataset.pairIdx;

  await delay(600);

  if (pairA === pairB && a.dataset.idx !== b.dataset.idx) {
    // MATCH!
    a.classList.add('matched');
    b.classList.add('matched');

    // Rainbow float away animation
    a.classList.add('match-anim');
    b.classList.add('match-anim');
    setTimeout(() => { a.classList.remove('match-anim'); b.classList.remove('match-anim'); }, 1300);

    matches++;
    score++;
    $('hudScore').textContent = score;

    audio.tone('correct');
    jumpChar();
    starBurst(a);
    starBurst(b);

    // Find the pair index in currentPairs to mark progress
    const progIdx = parseInt(pairA);
    markProg(progIdx);

    // Light a rainbow arc band
    lightArc();

    showCharBubble(pick(BUBBLE_CORRECT), 1600);
    audio.play('correct'); // don't block — child can flip next card

    flippedCards = [];
    lockBoard = false;

    // Check round complete
    if (matches >= totalPairs) {
      await delay(650);
      advanceRound();
    } else {
      resetHints();
    }

  } else {
    // NO MATCH
    audio.tone('wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1500);

    // Shake animation
    a.style.animation = 'wrongShake 0.4s ease-in-out';
    b.style.animation = 'wrongShake 0.4s ease-in-out';

    audio.play('wrong'); // don't block
    await delay(650);

    a.style.animation = '';
    b.style.animation = '';
    a.classList.remove('flipped');
    b.classList.remove('flipped');
    flippedCards = [];
    lockBoard = false;
    resetHints();
  }
}

// ══════════════════════════════════════════════════════════════════
// ADVANCE ROUND
// ══════════════════════════════════════════════════════════════════
async function advanceRound() {
  stopHints();
  lockBoard = true;
  round++;

  if (round >= ROUND_META.length) {
    await celebrateFinish();
    return;
  }

  // Round complete celebration
  audio.tone('roundDone');
  confetti(30, ['🦄','🌈','✨']);
  showCharBubble('Rainbow complete! 🌈', 2500);

  $('roundTitle').textContent = '🦄 Round Complete! 🦄';
  $('roundSub').textContent   = '';
  $('roundBanner').classList.add('show');
  audio.play('round-complete'); // don't await
  await delay(1400);
  $('roundBanner').classList.remove('show');
  await delay(180);

  // Reset arc for next round
  resetArc();

  // Next round banner (snappy)
  const cfg = ROUND_META[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await delay(1100);
  $('roundBanner').classList.remove('show');
  await delay(180);

  $('hudRound').textContent = `${round + 1}/4`;

  // Build new grid
  buildGrid();
  const pairs = currentPairs;
  buildProg(pairs);
  flippedCards = [];
  lockBoard = false;
  gameActive = true;

  // Peek logic (only R1 has peek — already past it here)
  if (cfg.peek) {
    const allCards = document.querySelectorAll('.card');
    allCards.forEach(c => c.classList.add('flipped'));
    await delay(1500);
    allCards.forEach(c => c.classList.remove('flipped'));
    await delay(300);
  }

  resetHints();
}

// ══════════════════════════════════════════════════════════════════
// FINAL CELEBRATION — Stella gallops + sparkle shower
// ══════════════════════════════════════════════════════════════════
async function celebrateFinish() {
  gameActive = false;
  stopHints();
  audio.stopMusic();
  $('hud').style.display      = 'none';
  $('progBar').style.display   = 'none';
  $('charArea').style.display  = 'none';
  $('rainbowArc').style.display = 'none';
  $('cardGrid').innerHTML      = '';
  $('roundBanner').classList.remove('show');

  audio.tone('celeb');
  await delay(300);

  // Stella gallops across the screen
  const gallop = document.createElement('div');
  gallop.className = 'gallop';
  gallop.textContent = '🦄';
  document.body.appendChild(gallop);

  // Sparkle shower
  confetti(70, ['🦄','🌈','✨','💫','🌟','💖','☁️']);
  setTimeout(() => confetti(40, ['🦄','🌈','✨','💖']), 600);

  await delay(2200);
  gallop.remove();

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 4)));
  $('celebStars').textContent = '⭐'.repeat(stars);
  $('celebTitle').textContent = '🌟 Magical! 🌟';
  $('celebMsg').textContent   = `You filled Stella's rainbow! All the letter clouds are home!`;
  showScreen('scrCeleb');

  await audio.play('game-complete');
  await delay(280);
  await audio.play('game-complete');

  setTimeout(() => confetti(35, ['🦄','🌈','🌟']), 2000);
}

// ══════════════════════════════════════════════════════════════════
// START GAME
// ══════════════════════════════════════════════════════════════════
async function startGame() {
  showScreen(null);

  // Reset
  audio.stopMusic();
  audio.clearQueue();
  round = 0; score = 0; matches = 0;
  flippedCards = []; lockBoard = false;
  stopHints();
  resetArc();

  $('hudScore').textContent   = '0';
  $('hudRound').textContent   = '1/4';
  $('hudPairs').textContent   = 'Find the matching pairs!';
  $('hud').style.display      = '';
  $('charArea').style.display = '';
  $('rainbowArc').style.display = '';
  $('roundBanner').classList.remove('show');

  audio.startMusic();

  // Round 1 opening banner
  const cfg = ROUND_META[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.play('greetings');
  await delay(2000);
  $('roundBanner').classList.remove('show');
  await delay(280);

  buildGrid();
  buildProg(currentPairs);
  gameActive = true;

  // Round 1 peek — show all cards briefly for 1.5s
  if (cfg.peek) {
    lockBoard = true;
    const allCards = document.querySelectorAll('.card');
    allCards.forEach(c => c.classList.add('flipped'));
    await delay(1500);
    allCards.forEach(c => c.classList.remove('flipped'));
    await delay(400);
    lockBoard = false;
  }

  resetHints();
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
buildScenery();

onTap($('btnStart'), () => {
  audio.unlock();
  audio.tone('whoosh');
  startGame();
});

onTap($('btnAgain'), () => {
  audio.unlock();
  startGame();
});
</script>
