<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trace the Numbers! ✨</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --pink: #f8a5c2; --magenta: #e91e8c; --purple: #a29bfe; --deep-purple: #6c5ce7;
  --gold: #ffe066; --white85: rgba(255,255,255,0.85);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* Background */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(160deg, #1a0533 0%, #4a1580 35%, #8b1a6b 65%, #c0295e 100%);
}
.bg-sparkle {
  position: fixed; pointer-events: none; z-index: 1;
  font-size: clamp(12px, 2.5vw, 20px);
  opacity: 0.4;
  animation: sparkleFloat linear infinite;
}
@keyframes sparkleFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.4; }
  92%  { opacity: 0.4; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1.1); opacity: 0; }
}

/* Screen system */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* Title screen */
.screen-title .icon-row {
  display: flex; gap: 10px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row img { width: clamp(60px, 15vw, 100px); height: auto; }
.screen-title .icon-row span { font-size: clamp(36px, 9vw, 60px); }
.screen-title h1 {
  font-size: clamp(28px, 7vw, 50px);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,224,102,0.6), 2px 2px 0 rgba(0,0,0,0.35);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(14px, 3.5vw, 20px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
}

/* Buttons */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.3);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start  { background: linear-gradient(135deg,#f8a5c2,#e91e8c); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; }
.btn-again  { background: linear-gradient(135deg,#f8a5c2,#e91e8c); margin-top: 16px; }
.btn-try    { background: linear-gradient(135deg,#a29bfe,#6c5ce7); margin-top: 10px; font-size: clamp(14px, 3.5vw, 20px); padding: 10px 30px; min-height: 44px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }

/* HUD */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(30,10,70,0.88); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(255,255,255,0.08);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.38); font-weight: bold; letter-spacing: 0.05em; }
.hud-val   { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--pink); }
.hud-score .hud-val { color: var(--gold); }
.hud-find-word { color: var(--gold); line-height: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.hud-find-numeral { font-size: clamp(22px,5.5vw,36px); font-weight: 900; color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,0.25); line-height: 1; }
.hud-find-word-sub { font-size: clamp(9px,2vw,12px); color: var(--gold); font-weight: bold; text-transform: lowercase; opacity: 0.7; }

/* Canvas area */
.canvas-wrap {
  position: fixed;
  z-index: var(--z-game);
  display: flex; align-items: center; justify-content: center;
}
.canvas-wrap canvas {
  border-radius: 20px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.35);
}

/* Character */
.char-area {
  position: fixed; bottom: 58px; left: 10px;
  z-index: var(--z-char); pointer-events: none;
}
.char-area img {
  width: clamp(55px,13vw,85px); height: auto;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.4));
}
.char-emoji { font-size: clamp(44px,10vw,66px); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96); color: var(--deep-purple);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(12px,2.6vw,16px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.2);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.96);
}

/* Progress bar */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(4px,1.2vw,8px); flex-wrap: wrap;
  padding: 5px 10px 8px;
  background: rgba(30,10,70,0.88); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(28px,5.5vw,38px);
  height: clamp(28px,5.5vw,38px);
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(11px,2.2vw,15px); font-weight: 900;
  color: rgba(255,255,255,0.22);
}
.prog-dot.done {
  background: linear-gradient(135deg,var(--pink),var(--deep-purple));
  border-color: var(--gold); color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* Round banner */
.round-banner {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(25,8,65,0.92); backdrop-filter: blur(12px);
  border: 2px solid rgba(255,255,255,0.12); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--gold); text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(255,255,255,0.55); margin-top: 5px;
}

/* Celebration screen */
.screen-celeb {
  background: rgba(15,4,50,0.88); backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(26px,6.5vw,48px); color: var(--gold);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(14px,3.5vw,22px); color: rgba(255,255,255,0.9); margin: 6px 0; }
.celeb-stars   { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-icon-row{ display:flex; gap:12px; justify-content:center; align-items:center; margin-bottom:10px; }
.celeb-icon-row img { width: clamp(60px,16vw,108px); height: auto; }
.celeb-icon-row span{ font-size:clamp(50px,13vw,82px); animation: dance 1s ease-in-out infinite; }

/* Particles */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }

/* Keyframes */
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes dance       { 0%,100%{transform:translateY(0) rotate(0) scale(1)} 15%{transform:translateY(-18px) rotate(-8deg) scale(1.08)} 30%{transform:translateY(0) rotate(8deg)} 45%{transform:translateY(-12px) rotate(-5deg) scale(1.05)} 60%{transform:translateY(0) rotate(5deg)} 75%{transform:translateY(-8px) rotate(-3deg) scale(1.08)} }
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-22px) scale(1.08)} 70%{transform:translateY(-8px) scale(1.03)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }
</style>
</head>
<body>

<div class="bg"></div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <span class="hud-label">LEVEL</span>
    <span class="hud-val" id="hudRound">1/4</span>
  </div>
  <div class="hud-center">
    <div class="hud-label">TRACE</div>
    <div class="hud-val hud-find-word" id="hudFind"><div class="hud-find-numeral">--</div></div>
  </div>
  <div class="hud-right hud-score">
    <span class="hud-label">STARS</span>
    <span class="hud-val" id="hudScore">0</span>
  </div>
</div>

<!-- Canvas area -->
<div class="canvas-wrap" id="canvasWrap">
  <canvas id="traceCanvas"></canvas>
</div>

<!-- Try Again button -->
<button class="btn btn-try" id="btnTryAgain" style="display:none;position:fixed;z-index:var(--z-ui);pointer-events:auto">Try Again</button>

<!-- Character -->
<div class="char-area" id="charArea" style="display:none">
  <div class="char-bubble" id="charBubble"></div>
  <img id="charImg" src="../../Characters/Princess with bird.gif" alt=""
    onerror="this.style.display='none';document.getElementById('charEmoji').style.display='block'">
  <div class="char-emoji" id="charEmoji" style="display:none">👸</div>
</div>

<!-- Progress bar -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- Round banner -->
<div class="round-banner" id="roundBanner">
  <h2 id="roundTitle"></h2>
  <p id="roundSub"></p>
</div>

<!-- Title screen -->
<div class="screen screen-title active" id="scrTitle">
  <div class="icon-row">
    <span>✨</span>
    <img src="../../Characters/Princess with bird.gif" alt=""
      onerror="this.outerHTML='<span style=\'font-size:clamp(60px,15vw,100px)\'>👸</span>'">
    <span>✨</span>
  </div>
  <h1>Trace the Numbers! ✨</h1>
  <p>Draw the numbers with your finger!<br>Follow the sparkle trail 💜</p>
  <button class="btn btn-start" id="btnStart">Let's Trace! ✨</button>
</div>

<!-- Celebration screen -->
<div class="screen screen-celeb" id="scrCeleb">
  <div class="celeb-icon-row">
    <img src="../../Characters/Prince and princess dance.gif" alt=""
      style="width:clamp(65px,16vw,108px)"
      onerror="this.outerHTML='<span style=\'font-size:clamp(52px,13vw,82px);animation:dance 1s ease-in-out infinite\'>👸</span>'">
  </div>
  <h2 id="celebTitle">🌟 Amazing! 🌟</h2>
  <p id="celebMsg">You can trace numbers!</p>
  <div class="celeb-stars" id="celebStars"></div>
  <button class="btn btn-again" id="btnAgain">Play Again! ✨</button>
</div>

<script>
const AUDIO_BASE = '../../audio';

// Voice A pools
const VOICE_A = {
  greetings: [
    'voice-a/greetings/here-we-go.mp3','voice-a/greetings/lets-go.mp3',
    'voice-a/greetings/come-on-lets-play.mp3','voice-a/greetings/are-you-ready.mp3',
    'voice-a/greetings/this-is-going-to-be-fun.mp3',
  ],
  correct: [
    'voice-a/correct/amazing.mp3','voice-a/correct/brilliant.mp3',
    'voice-a/correct/fantastic.mp3','voice-a/correct/i-knew-you-could-do-it.mp3',
    'voice-a/correct/incredible.mp3','voice-a/correct/perfect.mp3',
    'voice-a/correct/superstar.mp3','voice-a/correct/thats-right.mp3',
    'voice-a/correct/well-done.mp3','voice-a/correct/wow-look-at-you-go.mp3',
    'voice-a/correct/yes-youre-so-clever.mp3','voice-a/correct/you-got-it.mp3',
    'voice-a/correct/youre-on-fire.mp3',
  ],
  wrong: [
    'voice-a/wrong/almost-have-another-go.mp3','voice-a/wrong/dont-worry-try-again.mp3',
    'voice-a/wrong/keep-trying-youre-so-close.mp3','voice-a/wrong/nearly-give-it-another-go.mp3',
    'voice-a/wrong/not-quite-you-can-do-it.mp3','voice-a/wrong/oops-not-that-one.mp3',
  ],
  thinking: [
    'voice-a/thinking/have-a-good-look.mp3','voice-a/thinking/i-believe-in-you.mp3',
    'voice-a/thinking/take-your-time.mp3','voice-a/thinking/which-one-could-it-be.mp3',
    'voice-a/thinking/you-can-do-it-keep-looking.mp3',
  ],
  'round-complete': [
    'voice-a/round-complete/brilliant-round-keep-going.mp3',
    'voice-a/round-complete/round-complete-amazing.mp3',
    'voice-a/round-complete/round-done-youre-doing-so-well.mp3',
    'voice-a/round-complete/you-did-it-on-to-the-next.mp3',
  ],
  'game-complete': [
    'voice-a/game-complete/what-a-fantastic-player.mp3',
    'voice-a/game-complete/you-are-a-superstar.mp3',
    'voice-a/game-complete/you-did-the-whole-thing.mp3',
    'voice-a/game-complete/you-finished-so-proud.mp3',
    'voice-a/game-complete/youre-incredible-we-did-it.mp3',
  ],
};

// ══════════════════════════════════════════════════════════════════
// AUDIO CLASS (from ARCHITECTURE.md)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.08; this.sfxVol = 0.3; this.musicDucked = 0.025;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.sfxVol; this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.5 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.7 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + 0.15);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.0);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.2);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 800 + Math.random() * 1200);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol, this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.15,0.2); p(554,t+0.1,0.18,0.25); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
  }
  // Ascending checkpoint tone — pitch increases with checkpoint index
  checkpointTone(idx, total) {
    this._init(); const t = this.ctx.currentTime;
    const baseFreq = 400;
    const freq = baseFreq + (idx / Math.max(1, total - 1)) * 400;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.35, t + 0.02);
    g.gain.linearRampToValueAtTime(0, t + 0.25);
    o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t + 0.3);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_A[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakNumber(n) { return this.speak(`${AUDIO_BASE}/numbers/${n}.mp3`); }
  speakPhrase(name) { return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue() { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }

// LEVEL CONFIG

const LEVELS = [
  { label:'Level 1 — Follow the Path! 🌸', sub:'Numbered dots show you the way!', tolerance:40, showDots:true, showNumbers:true, showHint:true, outlineOpacity:1.0 },

// ══════════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let level = 0, score = 0;
let numIdx = 0; // which number in the current level
let currentNumber = -1;
let currentCheckpoint = 0;
let checkpointsHit = [];
let isDrawing = false;
let drawingPoints = [];

// Canvas sizing
const canvas = $('traceCanvas');
const ctx2d = canvas.getContext('2d');
let dpr = 1;
let canvasW = 0, canvasH = 0; // CSS pixels
let drawAreaX = 0, drawAreaY = 0, drawAreaW = 0, drawAreaH = 0; // within canvas CSS coords

// Sparkle animation
let sparkleAnim = null;
let sparklePhase = 0;

// ══════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════════════════
function sizeCanvas() {
  dpr = Math.min(window.devicePixelRatio || 1, 3);

  const hudH = 56;
  const progH = 52;
  const margin = 12;
  const availW = window.innerWidth - margin * 2;
  const availH = window.innerHeight - hudH - progH - margin * 2;

  // Square canvas, fit to available space
  const size = Math.min(availW, availH, 400);
  canvasW = size;
  canvasH = size;

  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  canvas.width = Math.round(size * dpr);
  canvas.height = Math.round(size * dpr);

  // Position canvas wrapper
  const wrap = $('canvasWrap');
  wrap.style.top = (hudH + margin) + 'px';
  wrap.style.left = '50%';
  wrap.style.transform = 'translateX(-50%)';
  wrap.style.width = size + 'px';
  wrap.style.height = size + 'px';

  // Drawing area within canvas (with padding)
  const pad = size * 0.08;
  drawAreaX = pad;
  drawAreaY = pad;
  drawAreaW = size - pad * 2;
  drawAreaH = size - pad * 2;

  // Position Try Again button
  const btn = $('btnTryAgain');
  btn.style.bottom = (progH + 8) + 'px';
  btn.style.right = '12px';
}

// Convert fractional checkpoint coords to canvas CSS coords
function cpToCanvas(cp) {
  return {
    x: drawAreaX + cp.x * drawAreaW,
    y: drawAreaY + cp.y * drawAreaH
  };
}

// ══════════════════════════════════════════════════════════════════
// DRAWING NUMBER OUTLINES ON CANVAS
// ══════════════════════════════════════════════════════════════════
function drawNumberOutline(num, opacity) {
  const paths = NUMBER_PATHS[num];
  if (!paths) return;

  ctx2d.save();
  ctx2d.scale(dpr, dpr);
  ctx2d.strokeStyle = `rgba(26, 26, 46, ${opacity})`;
  ctx2d.lineWidth = 14;
  ctx2d.lineCap = 'round';
  ctx2d.lineJoin = 'round';

  paths.forEach(subpath => {
    if (subpath.length < 2) return;
    ctx2d.beginPath();
    const p0 = cpToCanvas(subpath[0]);
    ctx2d.moveTo(p0.x, p0.y);

    if (subpath.length === 2) {
      const p1 = cpToCanvas(subpath[1]);
      ctx2d.lineTo(p1.x, p1.y);
    } else {
      // Smooth curve through points using quadratic bezier
      for (let i = 1; i < subpath.length - 1; i++) {
        const curr = cpToCanvas(subpath[i]);
        const next = cpToCanvas(subpath[i + 1]);
        const midX = (curr.x + next.x) / 2;
        const midY = (curr.y + next.y) / 2;
        ctx2d.quadraticCurveTo(curr.x, curr.y, midX, midY);
      }
      // Final point
      const last = cpToCanvas(subpath[subpath.length - 1]);
      const secondLast = cpToCanvas(subpath[subpath.length - 2]);
      ctx2d.quadraticCurveTo(secondLast.x, secondLast.y, last.x, last.y);
    }
    ctx2d.stroke();
  });

  ctx2d.restore();
}

// ══════════════════════════════════════════════════════════════════
// DRAWING CHECKPOINTS
// ══════════════════════════════════════════════════════════════════
function drawCheckpoints(num, lvl) {
  const cps = CHECKPOINTS[num];
  if (!cps) return;
  const cfg = LEVELS[lvl];

  ctx2d.save();
  ctx2d.scale(dpr, dpr);

  cps.forEach((cp, i) => {
    const pos = cpToCanvas(cp);
    const isHit = i < currentCheckpoint;
    const isNext = i === currentCheckpoint;

    if (cfg.showDots || isHit) {
      ctx2d.beginPath();
      ctx2d.arc(pos.x, pos.y, isHit ? 16 : 20, 0, Math.PI * 2);

      if (isHit) {
        // Hit — solid green
        ctx2d.fillStyle = '#2ecc71';
        ctx2d.fill();
        ctx2d.strokeStyle = '#27ae60';
        ctx2d.lineWidth = 3;
        ctx2d.stroke();
        // Checkmark
        ctx2d.fillStyle = '#fff';
        ctx2d.font = 'bold 16px sans-serif';
        ctx2d.textAlign = 'center';
        ctx2d.textBaseline = 'middle';
        ctx2d.fillText('✓', pos.x, pos.y);
      } else if (cfg.showDots) {
        // Unhit dot
        ctx2d.fillStyle = isNext ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.7)';
        ctx2d.fill();
        ctx2d.strokeStyle = isNext ? '#6c5ce7' : '#a29bfe';
        ctx2d.lineWidth = isNext ? 4 : 3;
        ctx2d.stroke();

        // Number inside dot (level 1 only)
        if (cfg.showNumbers) {
          ctx2d.fillStyle = '#6c5ce7';
          ctx2d.font = 'bold 16px sans-serif';
          ctx2d.textAlign = 'center';
          ctx2d.textBaseline = 'middle';
          ctx2d.fillText(String(i + 1), pos.x, pos.y + 1);
        }

        // Pulse ring on next checkpoint
        if (isNext) {
          ctx2d.beginPath();
          ctx2d.arc(pos.x, pos.y, 26 + Math.sin(sparklePhase) * 4, 0, Math.PI * 2);
          ctx2d.strokeStyle = 'rgba(108, 92, 231, 0.4)';
          ctx2d.lineWidth = 2;
          ctx2d.stroke();
        }
      }
    }

    // In level 3, briefly flash checkpoints when hit
    if (!cfg.showDots && isHit) {
      ctx2d.beginPath();
      ctx2d.arc(pos.x, pos.y, 14, 0, Math.PI * 2);
      ctx2d.fillStyle = 'rgba(46, 204, 113, 0.5)';
      ctx2d.fill();
    }
  });

  ctx2d.restore();
}

// ══════════════════════════════════════════════════════════════════
// DRAW THE USER'S TRACING LINE
// ══════════════════════════════════════════════════════════════════
function drawUserLine() {
  if (drawingPoints.length < 2) return;

  ctx2d.save();
  ctx2d.scale(dpr, dpr);
  ctx2d.strokeStyle = '#ff69b4';
  ctx2d.lineWidth = 4;
  ctx2d.lineCap = 'round';
  ctx2d.lineJoin = 'round';
  ctx2d.beginPath();
  ctx2d.moveTo(drawingPoints[0].x, drawingPoints[0].y);
  for (let i = 1; i < drawingPoints.length; i++) {
    ctx2d.lineTo(drawingPoints[i].x, drawingPoints[i].y);
  }
  ctx2d.stroke();
  ctx2d.restore();
}

// ══════════════════════════════════════════════════════════════════
// SPARKLE HINT ANIMATION (Level 1)
// ══════════════════════════════════════════════════════════════════
function drawSparkleHint(num, lvl) {
  if (lvl !== 0 || currentCheckpoint >= CHECKPOINTS[num].length) return;
  const cfg = LEVELS[lvl];
  if (!cfg.showHint) return;

  const cps = CHECKPOINTS[num];
  const nextCp = cps[currentCheckpoint];
  const pos = cpToCanvas(nextCp);

  ctx2d.save();
  ctx2d.scale(dpr, dpr);

  // Animated sparkle circle around next checkpoint
  const r = 28 + Math.sin(sparklePhase * 2) * 5;
  ctx2d.beginPath();
  ctx2d.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx2d.strokeStyle = `rgba(255, 224, 102, ${0.5 + Math.sin(sparklePhase) * 0.3})`;
  ctx2d.lineWidth = 3;
  ctx2d.setLineDash([4, 6]);
  ctx2d.stroke();
  ctx2d.setLineDash([]);

  // Arrow pointing to next checkpoint from current position
  if (currentCheckpoint > 0) {
    const prevCp = cps[currentCheckpoint - 1];
    const prevPos = cpToCanvas(prevCp);
    ctx2d.beginPath();
    ctx2d.setLineDash([6, 8]);
    ctx2d.strokeStyle = 'rgba(255, 224, 102, 0.35)';
    ctx2d.lineWidth = 2;
    ctx2d.moveTo(prevPos.x, prevPos.y);
    ctx2d.lineTo(pos.x, pos.y);
    ctx2d.stroke();
    ctx2d.setLineDash([]);
  }

  ctx2d.restore();
}

// ══════════════════════════════════════════════════════════════════
// FULL REDRAW
// ══════════════════════════════════════════════════════════════════
function redrawCanvas() {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);

  // White background
  ctx2d.save();
  ctx2d.scale(dpr, dpr);
  ctx2d.fillStyle = '#fffbf5';
  ctx2d.beginPath();
  // Rounded rectangle
  const r = 20;
  ctx2d.moveTo(r, 0);
  ctx2d.lineTo(canvasW - r, 0);
  ctx2d.quadraticCurveTo(canvasW, 0, canvasW, r);
  ctx2d.lineTo(canvasW, canvasH - r);
  ctx2d.quadraticCurveTo(canvasW, canvasH, canvasW - r, canvasH);
  ctx2d.lineTo(r, canvasH);
  ctx2d.quadraticCurveTo(0, canvasH, 0, canvasH - r);
  ctx2d.lineTo(0, r);
  ctx2d.quadraticCurveTo(0, 0, r, 0);
  ctx2d.fill();
  ctx2d.restore();

  if (currentNumber < 0) return;

  const cfg = LEVELS[level];
  drawNumberOutline(currentNumber, cfg.outlineOpacity);
  drawUserLine();
  drawCheckpoints(currentNumber, level);
  drawSparkleHint(currentNumber, level);
}

// Animation loop for sparkle
function animLoop() {
  sparklePhase += 0.05;
  redrawCanvas();
  sparkleAnim = requestAnimationFrame(animLoop);
}

// ══════════════════════════════════════════════════════════════════
// TOUCH / MOUSE INPUT
// ══════════════════════════════════════════════════════════════════
function getPointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  let clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: clientX - rect.left,
    y: clientY - rect.top
  };
}

function handlePointerDown(e) {
  if (!gameActive) return;
  e.preventDefault();
  isDrawing = true;
  const pos = getPointerPos(e);
  drawingPoints = [pos];
  checkHit(pos);
}

function handlePointerMove(e) {
  if (!isDrawing || !gameActive) return;
  e.preventDefault();
  const pos = getPointerPos(e);
  drawingPoints.push(pos);
  checkHit(pos);
}

function handlePointerUp(e) {
  if (!isDrawing) return;
  e.preventDefault();
  isDrawing = false;
}

function checkHit(pos) {
  const cps = CHECKPOINTS[currentNumber];
  if (!cps || currentCheckpoint >= cps.length) return;

  const cfg = LEVELS[level];
  const nextCp = cps[currentCheckpoint];
  const cpPos = cpToCanvas(nextCp);

  const dx = pos.x - cpPos.x;
  const dy = pos.y - cpPos.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist <= cfg.tolerance) {
    // Hit!
    const hitIdx = currentCheckpoint;
    currentCheckpoint++;
    audio.checkpointTone(hitIdx, cps.length);

    // Visual burst at checkpoint position
    const rect = canvas.getBoundingClientRect();
    starBurstAt(rect.left + cpPos.x, rect.top + cpPos.y);

    if (currentCheckpoint >= cps.length) {
      // All checkpoints hit — number complete!
      numberComplete();
    }
  }
}

// Attach input handlers
canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
canvas.addEventListener('touchend', handlePointerUp, { passive: false });
canvas.addEventListener('mousedown', handlePointerDown);
canvas.addEventListener('mousemove', handlePointerMove);
canvas.addEventListener('mouseup', handlePointerUp);
canvas.addEventListener('mouseleave', handlePointerUp);

// ══════════════════════════════════════════════════════════════════
// NUMBER COMPLETE
// ══════════════════════════════════════════════════════════════════
async function numberComplete() {
  gameActive = false;
  isDrawing = false;
  $('btnTryAgain').style.display = 'none';

  audio.tone('correct');
  jumpChar();
  showCharBubble(pick(BUBBLE_CORRECT), 2500);

  score++;
  $('hudScore').textContent = score;
  markProg(numIdx);

  // Confetti burst
  confetti(20, ['💜','✨']);

  await audio.play('correct');
  await audio.speakNumber(currentNumber);
  await delay(500);

  numIdx++;
  if (numIdx >= NUMBERS_SEQ.length) {
    await finishLevel();
  } else {
    startNumber();
  }
}

// ══════════════════════════════════════════════════════════════════
// START A NUMBER
// ══════════════════════════════════════════════════════════════════
async function startNumber() {
  currentNumber = NUMBERS_SEQ[numIdx];
  currentCheckpoint = 0;
  checkpointsHit = [];
  drawingPoints = [];
  isDrawing = false;
  gameActive = true;

  // Update HUD
  $('hudFind').innerHTML = `<div class="hud-find-numeral">${currentNumber}</div><div class="hud-find-word-sub">${NUMBER_WORDS[currentNumber]}</div>`;

  // Show Try Again
  $('btnTryAgain').style.display = '';

  // Speak number
  audio.tone('reveal');
  await audio.speakPhrase('tap_the_number');
  await audio.speakNumber(currentNumber);

  redrawCanvas();
}

// ══════════════════════════════════════════════════════════════════
// TRY AGAIN — resets current number
// ══════════════════════════════════════════════════════════════════
function tryAgain() {
  currentCheckpoint = 0;
  checkpointsHit = [];
  drawingPoints = [];
  isDrawing = false;
  gameActive = true;
  redrawCanvas();
  audio.tone('hint');
}

// ══════════════════════════════════════════════════════════════════
// LEVEL TRANSITIONS
// ══════════════════════════════════════════════════════════════════
async function finishLevel() {
  gameActive = false;
  $('btnTryAgain').style.display = 'none';
  $('canvasWrap').style.display = 'none';

  audio.tone('roundDone');
  confetti(30, ['💜','🌸','✨']);
  level++;

  if (level >= LEVELS.length) {
    await delay(700);
    celebrateFinish();
    return;
  }

  // Level complete banner
  $('roundTitle').textContent = '✨ Level Complete! ✨';
  $('roundSub').textContent = '';
  $('roundBanner').classList.add('show');
  await audio.play('round-complete');
  await delay(1300);
  $('roundBanner').classList.remove('show');
  await delay(280);

  // Next level intro
  const cfg = LEVELS[level];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.play('greetings');
  await delay(1400);
  $('roundBanner').classList.remove('show');
  await delay(280);

  startLevel();
}

function startLevel() {
  const cfg = LEVELS[level];
  $('hudRound').textContent = `${level + 1}/4`;
  numIdx = 0;
  buildProg();

  $('canvasWrap').style.display = '';
  sizeCanvas();
  startNumber();
}

// ══════════════════════════════════════════════════════════════════
// FINAL CELEBRATION
// ══════════════════════════════════════════════════════════════════
async function celebrateFinish() {
  gameActive = false;
  audio.stopMusic();
  $('hud').style.display = 'none';
  $('progBar').style.display = 'none';
  $('charArea').style.display = 'none';
  $('canvasWrap').style.display = 'none';
  $('btnTryAgain').style.display = 'none';
  $('roundBanner').classList.remove('show');

  if (sparkleAnim) { cancelAnimationFrame(sparkleAnim); sparkleAnim = null; }

  audio.tone('celeb');
  await delay(350);
  confetti(60, ['💜','🌸','✨','🌷','💖','🌟']);

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 5)));
  $('celebStars').textContent = '⭐'.repeat(stars);
  $('celebTitle').textContent = '🌟 Amazing! 🌟';
  $('celebMsg').textContent = `You traced ${score} numbers! You're a tracing star!`;
  showScreen('scrCeleb');

  await audio.play('game-complete');
  await delay(280);
  await audio.play('game-complete');

  setTimeout(() => confetti(35, ['💜','🌸','🌟']), 2000);
}

// ══════════════════════════════════════════════════════════════════
// GAME START / RESET
// ══════════════════════════════════════════════════════════════════
async function startGame() {
  audio.stopMusic();
  audio.clearQueue();
  if (sparkleAnim) { cancelAnimationFrame(sparkleAnim); sparkleAnim = null; }

  level = 0; score = 0; numIdx = 0;
  currentNumber = -1; currentCheckpoint = 0;
  drawingPoints = []; isDrawing = false;

  $('hudScore').textContent = '0';
  $('hud').style.display = '';
  $('charArea').style.display = '';
  $('canvasWrap').style.display = '';
  $('roundBanner').classList.remove('show');

  showScreen(null);
  audio.startMusic();
  sizeCanvas();

  // Start animation loop
  sparkleAnim = requestAnimationFrame(animLoop);

  // Level 1 intro banner
  const cfg = LEVELS[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.play('greetings');
  await delay(2000);
  $('roundBanner').classList.remove('show');
  await delay(280);

  startLevel();
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
buildScenery();

onTap($('btnStart'), () => {
  audio.unlock();
  audio.tone('whoosh');
  startGame();
});
onTap($('btnAgain'), () => {
  audio.unlock();
  startGame();
});
onTap($('btnTryAgain'), () => {
  tryAgain();
});

// Handle resize
window.addEventListener('resize', () => {
  if (gameActive || currentNumber >= 0) {
    sizeCanvas();
    redrawCanvas();
  }
});
</script>
</body>
</html>
