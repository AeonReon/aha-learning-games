<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3a8a">
<title>Pirate Cove — Letters P–T · aha!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Arial Rounded MT Bold','Nunito','Quicksand',system-ui,-apple-system,Arial,sans-serif;background:radial-gradient(ellipse at top,#3b82f6 0%,#1e3a8a 50%,#0a1628 100%);color:#fff;min-height:100vh;overflow-x:hidden;position:relative}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.fx-canvas{position:fixed;inset:0;z-index:100;pointer-events:none}
.main{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:30px 20px 60px}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(234,179,8,0.25);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#EAB308;text-decoration:none;padding:10px 18px;border-radius:24px;font-weight:700;font-size:14px;border:1px solid rgba(234,179,8,0.4);transition:transform 0.2s,background 0.2s;margin-bottom:30px}
.back-btn:hover{background:rgba(234,179,8,0.4);color:#FFF;transform:translateX(-3px)}
.music-btn{position:fixed;top:16px;right:16px;z-index:50;width:44px;height:44px;border-radius:50%;border:none;background:rgba(234,179,8,0.25);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#EAB308;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,background 0.2s;border:1px solid rgba(234,179,8,0.4)}
.music-btn:hover{background:rgba(234,179,8,0.4);color:#FFF;transform:scale(1.08)}
.page-header{text-align:center;margin-bottom:36px}
.flag{font-size:60px;display:inline-block;animation:wobble 3s ease-in-out infinite;filter:drop-shadow(0 0 22px rgba(234,179,8,0.6))}
@keyframes wobble{0%,100%{transform:rotate(-8deg) translateY(0)}50%{transform:rotate(8deg) translateY(-6px)}}
.page-title{font-size:clamp(28px,7vw,42px);font-weight:900;margin:10px 0 6px;color:#EAB308;text-shadow:0 0 22px rgba(234,179,8,0.6),0 3px 0 rgba(0,0,0,0.4);letter-spacing:-0.5px}
.page-sub{font-size:clamp(13px,3.5vw,16px);letter-spacing:0.3em;text-transform:uppercase;font-weight:700;color:#FCA5A5;text-shadow:0 0 15px rgba(252,165,165,0.5)}
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.game-card{border-radius:22px;padding:22px 14px 18px;text-decoration:none;color:#fff;display:flex;flex-direction:column;align-items:center;text-align:center;transition:transform 0.25s ease,box-shadow 0.25s ease;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08)}
.game-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 55%);pointer-events:none}
.game-card:hover,.game-card:focus{transform:translateY(-6px) scale(1.02);box-shadow:0 14px 30px rgba(234,179,8,0.3)}
.game-card:active{transform:translateY(-2px)}
.gc-1{background:linear-gradient(145deg,#1E40AF,#1E3A8A)}
.gc-2{background:linear-gradient(145deg,#78350F,#451A03)}
.gc-3{background:linear-gradient(145deg,#DC2626,#7F1D1D)}
.gc-4{background:linear-gradient(145deg,#92400E,#451A03)}
.gc-5{background:linear-gradient(145deg,#CA8A04,#713F12)}
.card-emoji{font-size:clamp(44px,11vw,58px);margin-bottom:10px;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.4));animation:emojiBob 4s ease-in-out infinite}
.game-card:nth-child(even) .card-emoji{animation-delay:1.5s}
@keyframes emojiBob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(-4deg)}}
.card-title{font-size:clamp(14px,3.5vw,17px);font-weight:800;margin-bottom:6px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
.card-pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:18px;background:rgba(0,0,0,0.35);color:rgba(255,255,255,0.9);letter-spacing:0.05em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.1)}
.tap-ring{position:fixed;border-radius:50%;border:3px solid rgba(234,179,8,0.9);pointer-events:none;z-index:99;animation:tapRing 0.6s ease-out forwards;box-shadow:0 0 20px rgba(234,179,8,0.6)}
@keyframes tapRing{0%{width:0;height:0;opacity:1}100%{width:120px;height:120px;opacity:0;border-width:1px}}
.footer{text-align:center;padding:30px 20px 10px;color:rgba(252,165,165,0.5);font-size:12px;letter-spacing:0.05em}
@media(max-width:480px){.game-grid{grid-template-columns:1fr;gap:12px}.main{padding:24px 16px 50px}.game-card{flex-direction:row;gap:16px;text-align:left;padding:18px 16px;align-items:center}.card-emoji{font-size:46px;margin-bottom:0;flex-shrink:0}.card-info{display:flex;flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<canvas class="bg-canvas" id="bgCanvas"></canvas>
<canvas class="fx-canvas" id="fxCanvas"></canvas>
<button class="music-btn" id="musicBtn" aria-label="Toggle music">🔇</button>
<div class="main">
  <a href="../../" class="back-btn">← Back to aha!</a>
  <div class="page-header">
    <div class="flag">🏴‍☠️</div>
    <h1 class="page-title">Pirate Cove</h1>
    <div class="page-sub">Letters P – T</div>
  </div>
  <div class="game-grid">
    <a href="card-match.html" class="game-card gc-1"><span class="card-emoji">🏴‍☠️</span><div class="card-info"><div class="card-title">Card Match</div><span class="card-pill">Matching</span></div></a>
    <a href="pairs.html" class="game-card gc-2"><span class="card-emoji">💰</span><div class="card-info"><div class="card-title">Pairs</div><span class="card-pill">Memory</span></div></a>
    <a href="bubble-pop.html" class="game-card gc-3"><span class="card-emoji">⚓</span><div class="card-info"><div class="card-title">Catch Bottles</div><span class="card-pill">Tap Fast</span></div></a>
    <a href="sequence.html" class="game-card gc-4"><span class="card-emoji">🚢</span><div class="card-info"><div class="card-title">Sequence</div><span class="card-pill">Order</span></div></a>
    <a href="tracing.html" class="game-card gc-5"><span class="card-emoji">🗺️</span><div class="card-info"><div class="card-title">Tracing</div><span class="card-pill">Writing</span></div></a>
  </div>
  <div class="footer">aha! · Pirate Cove</div>
</div>
<script>
(function(){const canvas=document.getElementById('bgCanvas');const ctx=canvas.getContext('2d');let bits=[];const COUNT=70;function resize(){canvas.width=window.innerWidth;canvas.height=document.documentElement.scrollHeight}function init(){resize();bits=[];for(let i=0;i<COUNT;i++){bits.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.8+0.6,vy:-(Math.random()*0.2+0.05),vx:(Math.random()-0.5)*0.3,alpha:Math.random()*0.6+0.2,pulse:Math.random()*Math.PI*2,hue:Math.random()>0.7?'#EAB308':(Math.random()>0.5?'#FCA5A5':'#FFF')})}}function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);for(const b of bits){b.x+=b.vx;b.y+=b.vy;b.pulse+=0.04;if(b.y<-10)b.y=canvas.height+10;if(b.x<-10)b.x=canvas.width+10;if(b.x>canvas.width+10)b.x=-10;const alpha=b.alpha*(0.7+0.3*Math.sin(b.pulse));ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=b.hue;ctx.globalAlpha=alpha;ctx.shadowColor=b.hue;ctx.shadowBlur=10;ctx.fill()}ctx.shadowBlur=0;ctx.globalAlpha=1;requestAnimationFrame(draw)}window.addEventListener('resize',init);init();draw()})();
(function(){const canvas=document.getElementById('fxCanvas');const ctx=canvas.getContext('2d');let parts=[];function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}resize();window.addEventListener('resize',resize);const COLORS=['#EAB308','#DC2626','#FCA5A5','#92400E','#FFF','#FBBF24'];window.burstConfetti=function(x,y,count=35){for(let i=0;i<count;i++){const a=(Math.PI*2*i)/count+Math.random()*0.5;const s=Math.random()*6+3;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,color:COLORS[Math.floor(Math.random()*COLORS.length)],size:Math.random()*6+3,rot:Math.random()*Math.PI,vr:(Math.random()-0.5)*0.3,life:1,shape:Math.random()>0.5?'rect':'star'})}};function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.vx*=0.99;p.rot+=p.vr;p.life-=0.012;if(p.life<=0){parts.splice(i,1);continue}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;if(p.shape==='rect'){ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2)}else{ctx.beginPath();for(let k=0;k<5;k++){const ang=(k*2*Math.PI)/5-Math.PI/2;const r=k%2===0?p.size/2:p.size/4;ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r)}ctx.closePath();ctx.fill()}ctx.restore()}requestAnimationFrame(loop)}loop()})();
let audioCtx=null;function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}
function playTapSound(){const c=ensureAudio();const now=c.currentTime;[261.63,329.63,392.00].forEach((f,i)=>{const osc=c.createOscillator();const g=c.createGain();osc.type='triangle';osc.frequency.value=f;g.gain.setValueAtTime(0.0001,now);g.gain.exponentialRampToValueAtTime(0.12,now+0.02);g.gain.exponentialRampToValueAtTime(0.0001,now+0.3);osc.connect(g).connect(c.destination);osc.start(now+i*0.06);osc.stop(now+0.45)})}
document.querySelectorAll('.game-card').forEach(card=>{card.addEventListener('click',function(e){e.preventDefault();const rect=card.getBoundingClientRect();const cx=rect.left+rect.width/2;const cy=rect.top+rect.height/2;const ring=document.createElement('div');ring.className='tap-ring';ring.style.left=cx+'px';ring.style.top=cy+'px';ring.style.transform='translate(-50%,-50%)';document.body.appendChild(ring);setTimeout(()=>ring.remove(),600);window.burstConfetti(cx,cy,35);playTapSound();const href=card.getAttribute('href');setTimeout(()=>{window.location.href=href},380)})});
(function(){const btn=document.getElementById('musicBtn');let playing=false,nextNote=0,scheduler=null,master=null;const SCALE=[220.00,246.94,293.66,329.63,392.00,440.00,523.25];const CHORDS=[[110.00,164.81,220.00],[123.47,185.00,246.94],[146.83,220.00,293.66],[98.00,146.83,220.00]];let ci=0,ni=0;function note(f,when,dur,gain=0.04,type='triangle'){const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(0.0001,when);g.gain.exponentialRampToValueAtTime(gain,when+0.05);g.gain.exponentialRampToValueAtTime(0.0001,when+dur);o.connect(g).connect(master);o.start(when);o.stop(when+dur+0.05)}function sched(){while(nextNote<audioCtx.currentTime+0.25){note(SCALE[Math.floor(Math.random()*SCALE.length)],nextNote,0.7,0.028,'triangle');if(ni%4===0){CHORDS[ci%CHORDS.length].forEach(f=>note(f,nextNote,2.5,0.02,'sine'));ci++}ni++;nextNote+=0.6}}function start(){ensureAudio();master=audioCtx.createGain();master.gain.value=0;master.gain.linearRampToValueAtTime(0.4,audioCtx.currentTime+1);master.connect(audioCtx.destination);nextNote=audioCtx.currentTime+0.1;ni=0;ci=0;scheduler=setInterval(sched,50);playing=true;btn.textContent='🎵';try{localStorage.setItem('aha_music','1')}catch(e){}}function stop(){if(master){const now=audioCtx.currentTime;master.gain.cancelScheduledValues(now);master.gain.setValueAtTime(master.gain.value,now);master.gain.linearRampToValueAtTime(0,now+0.4);setTimeout(()=>{try{master.disconnect()}catch(e){}master=null},500)}clearInterval(scheduler);playing=false;btn.textContent='🔇';try{localStorage.setItem('aha_music','0')}catch(e){}}btn.addEventListener('click',()=>{if(playing)stop();else start()});let auto=false;function tryAuto(){if(auto)return;auto=true;let pref=null;try{pref=localStorage.getItem('aha_music')}catch(e){}if(pref!=='0')start()}['pointerdown','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,tryAuto,{once:true}))})();
</script>
</body>
</html>
