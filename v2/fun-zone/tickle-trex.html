<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Tickle the T-Rex</title>
<style>
  :root {
    --peach: #ffcba4;
    --pink: #ff9ec7;
    --yellow: #ffe15c;
    --mint: #9ce8c2;
    --orange: #ffb26b;
    --sky: #b3e6ff;
    --rex-green: #6cc071;
    --rex-green-dark: #3f8f4a;
    --rex-belly: #f4e3b2;
    --spot: #fff2a8;
    --spot-glow: #ffd93d;
    --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    --text-dark: #3d1f5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
    background: linear-gradient(180deg, var(--sky) 0%, var(--peach) 55%, var(--yellow) 100%);
    color: var(--text-dark);
    touch-action: manipulation;
  }

  .screen {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  .back-home-btn {
    position: fixed;
    top: 14px; left: 14px;
    z-index: 100;
    background: #fff;
    color: #d94084;
    border: 4px solid #ff6fa5;
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 18px;
    font-weight: 900;
    text-decoration: none;
    box-shadow: 0 4px 0 #c94d80, 0 6px 12px rgba(0,0,0,0.15);
    transition: transform 0.15s var(--bounce);
  }
  .back-home-btn:active { transform: translateY(2px) scale(0.97); }

  /* ══════ CLOUDS ══════ */
  .cloud {
    position: absolute;
    top: 8%;
    font-size: 80px;
    opacity: 0.9;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
    animation: drift linear infinite;
    pointer-events: none;
  }
  .cloud.c2 { top: 22%; font-size: 60px; animation-duration: 45s; }
  .cloud.c3 { top: 15%; font-size: 100px; animation-duration: 65s; animation-delay: -20s; }
  .cloud.c4 { top: 30%; font-size: 50px; animation-duration: 55s; animation-delay: -40s; }
  @keyframes drift {
    from { transform: translateX(-200px); }
    to { transform: translateX(110vw); }
  }

  /* ══════ TITLE SCREEN ══════ */
  .title-wrap {
    text-align: center;
    z-index: 5;
  }
  .title-big {
    font-size: clamp(38px, 9vw, 74px);
    color: #fff;
    -webkit-text-stroke: 3px #3d1f5c;
    text-shadow: 4px 6px 0 #ff6fa5, 0 8px 14px rgba(0,0,0,0.2);
    line-height: 1.05;
    margin-bottom: 20px;
    animation: titleBounce 2.2s ease-in-out infinite;
  }
  @keyframes titleBounce {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-8px) rotate(1deg); }
  }
  .title-rex {
    font-size: clamp(160px, 38vw, 280px);
    display: inline-block;
    animation: titleRexWave 1.6s ease-in-out infinite;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
    margin: 10px 0;
  }
  @keyframes titleRexWave {
    0%, 100% { transform: rotate(-6deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.04); }
  }
  .title-sub {
    font-size: clamp(18px, 4vw, 26px);
    color: #5a2b7d;
    margin-bottom: 22px;
    font-weight: 900;
  }
  .start-btn {
    background: linear-gradient(180deg, #ff8bc0, #ff4d9a);
    color: #fff;
    border: 5px solid #fff;
    border-radius: 999px;
    padding: 22px 46px;
    font-size: clamp(24px, 6vw, 36px);
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 8px 0 #c02d72, 0 12px 28px rgba(0,0,0,0.25);
    min-width: 240px;
    min-height: 80px;
    animation: startPulse 1.4s ease-in-out infinite;
    letter-spacing: 1px;
  }
  @keyframes startPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  .start-btn:active { transform: translateY(4px) scale(0.98); box-shadow: 0 4px 0 #c02d72, 0 6px 14px rgba(0,0,0,0.2); }

  /* ══════ GAME SCREEN ══════ */
  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .rex-counter {
    position: absolute;
    top: 14px;
    right: 14px;
    background: #fff;
    border: 4px solid #6cc071;
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 18px;
    font-weight: 900;
    color: #3f8f4a;
    box-shadow: 0 4px 0 #4a9f55, 0 6px 12px rgba(0,0,0,0.1);
    z-index: 20;
  }

  .rex {
    position: relative;
    width: min(520px, 92vw);
    height: min(520px, 70vh);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s var(--bounce), filter 0.4s ease;
    z-index: 5;
  }
  .rex.enter { animation: rexEnter 1.1s var(--bounce); }
  @keyframes rexEnter {
    0% { transform: translateX(-140vw) rotate(-15deg); }
    60% { transform: translateX(8vw) rotate(6deg); }
    80% { transform: translateX(-2vw) rotate(-3deg); }
    100% { transform: translateX(0) rotate(0); }
  }

  .rex-emoji {
    font-size: clamp(220px, 58vw, 340px);
    display: block;
    line-height: 1;
    filter: drop-shadow(0 14px 24px rgba(0,0,0,0.22));
    transition: transform 0.25s var(--bounce), filter 0.4s ease;
    transform-origin: center 70%;
  }

  /* Rex reaction states */
  .rex.tap1 .rex-emoji { animation: wobble1 0.6s var(--bounce); }
  .rex.tap2 .rex-emoji { animation: wobble2 0.7s var(--bounce); }
  .rex.tap3 .rex-emoji { animation: wobble3 0.8s var(--bounce); }
  .rex.tap4 .rex-emoji { animation: wobble4 0.9s var(--bounce); }
  .rex.tap5 .rex-emoji { animation: fallOver 1.8s var(--bounce) forwards; }

  @keyframes wobble1 {
    0%, 100% { transform: rotate(0) scale(1); }
    40% { transform: rotate(-5deg) scale(1.06); }
    70% { transform: rotate(4deg) scale(1.04); }
  }
  @keyframes wobble2 {
    0%, 100% { transform: rotate(0) scale(1); }
    25% { transform: rotate(-7deg) scale(1.08) translateY(-6px); }
    50% { transform: rotate(6deg) scale(1.1) translateY(-4px); }
    75% { transform: rotate(-4deg) scale(1.06); }
  }
  @keyframes wobble3 {
    0%, 100% { transform: rotate(0) scale(1); }
    20% { transform: rotate(-10deg) scale(1.12) translateY(-10px); }
    40% { transform: rotate(9deg) scale(1.14) translateY(-8px); }
    60% { transform: rotate(-8deg) scale(1.1) translateY(-6px); }
    80% { transform: rotate(7deg) scale(1.08); }
  }
  @keyframes wobble4 {
    0% { transform: rotate(0) scale(1); }
    15% { transform: rotate(-14deg) scale(1.15) translateY(-14px); }
    30% { transform: rotate(13deg) scale(1.18) translateX(12px) translateY(-12px); }
    45% { transform: rotate(-15deg) scale(1.15) translateX(-14px) translateY(-10px); }
    60% { transform: rotate(16deg) scale(1.2) translateX(10px); }
    75% { transform: rotate(-12deg) scale(1.16) translateX(-8px); }
    100% { transform: rotate(0) scale(1); }
  }
  @keyframes fallOver {
    0% { transform: rotate(0) scale(1) translateY(0); }
    15% { transform: rotate(-18deg) scale(1.2) translateY(-20px); }
    30% { transform: rotate(-45deg) scale(1.15) translateY(0); }
    50% { transform: rotate(-90deg) scale(1.1) translateY(40px); }
    70% { transform: rotate(-110deg) scale(1.08) translateY(50px); }
    80% { transform: rotate(-95deg) scale(1.1) translateY(48px); }
    90% { transform: rotate(-115deg) scale(1.08) translateY(50px); }
    100% { transform: rotate(-105deg) scale(1.05) translateY(55px); }
  }

  /* Tint variations per rex */
  .rex.tint-green .rex-emoji { filter: drop-shadow(0 14px 24px rgba(0,0,0,0.22)) hue-rotate(0deg) saturate(1.1); }
  .rex.tint-blue  .rex-emoji { filter: drop-shadow(0 14px 24px rgba(0,0,0,0.22)) hue-rotate(140deg) saturate(1.15); }
  .rex.tint-pink  .rex-emoji { filter: drop-shadow(0 14px 24px rgba(0,0,0,0.22)) hue-rotate(-80deg) saturate(1.3); }
  .rex.tint-purple .rex-emoji { filter: drop-shadow(0 14px 24px rgba(0,0,0,0.22)) hue-rotate(220deg) saturate(1.2); }

  /* ══════ TICKLE SPOTS ══════ */
  .spot {
    position: absolute;
    width: 78px;
    height: 78px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fffbe0 0%, var(--spot-glow) 60%, #ff8c1a 100%);
    border: 5px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: #7a3d00;
    box-shadow: 0 0 0 6px rgba(255,217,61,0.35), 0 4px 12px rgba(0,0,0,0.25);
    cursor: pointer;
    z-index: 10;
    transform: translate(-50%, -50%);
    transition: transform 0.2s var(--bounce);
    animation: spotPulse 1.6s ease-in-out infinite;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }
  @keyframes spotPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(255,217,61,0.3), 0 4px 12px rgba(0,0,0,0.25); transform: translate(-50%, -50%) scale(1); }
    50% { box-shadow: 0 0 0 14px rgba(255,217,61,0.15), 0 4px 16px rgba(0,0,0,0.3); transform: translate(-50%, -50%) scale(1.08); }
  }
  .spot.next {
    animation: spotNext 0.9s ease-in-out infinite;
    background: radial-gradient(circle at 35% 30%, #ffffff 0%, #ffd93d 50%, #ff4d9a 100%);
  }
  @keyframes spotNext {
    0%, 100% { box-shadow: 0 0 0 8px rgba(255,77,154,0.35), 0 6px 18px rgba(0,0,0,0.3); transform: translate(-50%, -50%) scale(1.1); }
    50% { box-shadow: 0 0 0 20px rgba(255,77,154,0.12), 0 6px 22px rgba(0,0,0,0.4); transform: translate(-50%, -50%) scale(1.22); }
  }
  .spot.done {
    background: #c5f7c5;
    border-color: #6cc071;
    color: #2b6e34;
    animation: none;
    box-shadow: 0 0 0 4px rgba(108,192,113,0.25);
  }
  .spot.done::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 38px;
    color: #2b6e34;
  }
  .spot.done span { display: none; }
  .spot:active { transform: translate(-50%, -50%) scale(0.9); }

  /* Positions on the belly (relative to rex center box) */
  .spot.s1 { left: 42%; top: 46%; }
  .spot.s2 { left: 58%; top: 50%; }
  .spot.s3 { left: 50%; top: 60%; }
  .spot.s4 { left: 40%; top: 68%; }
  .spot.s5 { left: 60%; top: 70%; }

  /* ══════ REACTION BUBBLE ══════ */
  .reaction {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: #fff;
    color: #d94084;
    border: 5px solid #ff6fa5;
    border-radius: 30px;
    padding: 14px 26px;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 900;
    box-shadow: 0 6px 0 #c94d80, 0 10px 20px rgba(0,0,0,0.2);
    z-index: 30;
    pointer-events: none;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .reaction.show { animation: reactionPop 1.8s var(--bounce) forwards; }
  @keyframes reactionPop {
    0% { transform: translateX(-50%) scale(0) rotate(-10deg); }
    40% { transform: translateX(-50%) scale(1.15) rotate(4deg); }
    60% { transform: translateX(-50%) scale(0.95) rotate(-2deg); }
    80% { transform: translateX(-50%) scale(1.02) rotate(1deg); }
    100% { transform: translateX(-50%) scale(1) rotate(0); }
  }
  .reaction.out { animation: reactionOut 0.4s ease forwards; }
  @keyframes reactionOut {
    to { transform: translateX(-50%) scale(0); opacity: 0; }
  }

  /* ══════ SPARKLE BURST ══════ */
  .sparkle {
    position: absolute;
    font-size: 36px;
    pointer-events: none;
    z-index: 25;
    animation: sparkleFly 1.1s ease-out forwards;
  }
  @keyframes sparkleFly {
    0% { transform: translate(-50%, -50%) scale(0.3) rotate(0); opacity: 1; }
    100% { transform: translate(var(--fx), var(--fy)) scale(1.6) rotate(360deg); opacity: 0; }
  }

  /* ══════ SCREEN SHAKE ══════ */
  .shake { animation: shake 0.6s; }
  @keyframes shake {
    0%, 100% { transform: translate(0,0); }
    15% { transform: translate(-10px, 4px); }
    30% { transform: translate(12px, -6px); }
    45% { transform: translate(-8px, 8px); }
    60% { transform: translate(6px, -4px); }
    75% { transform: translate(-4px, 2px); }
    90% { transform: translate(2px, -2px); }
  }
  .mega-shake { animation: megaShake 1s; }
  @keyframes megaShake {
    0%, 100% { transform: translate(0,0); }
    10% { transform: translate(-20px, 10px); }
    20% { transform: translate(22px, -14px); }
    30% { transform: translate(-18px, 16px); }
    40% { transform: translate(16px, -12px); }
    55% { transform: translate(-12px, 8px); }
    70% { transform: translate(8px, -6px); }
    85% { transform: translate(-4px, 3px); }
  }

  /* ══════ LAUGH TEARS ══════ */
  .tear {
    position: absolute;
    font-size: 42px;
    pointer-events: none;
    z-index: 8;
    animation: tearFall 1.6s ease-in forwards;
  }
  @keyframes tearFall {
    0% { transform: translateY(0) scale(0.4); opacity: 0; }
    20% { transform: translateY(0) scale(1.2); opacity: 1; }
    100% { transform: translateY(180px) scale(1); opacity: 0; }
  }

  /* ══════ CONFETTI (celeb + falling over) ══════ */
  .confetti-piece {
    position: fixed;
    font-size: 32px;
    pointer-events: none;
    z-index: 200;
    top: -40px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
  }

  /* ══════ KICKING LEGS (on fall over) ══════ */
  .kick-legs {
    position: absolute;
    left: 50%;
    top: 35%;
    transform: translateX(-50%);
    font-size: 68px;
    opacity: 0;
    pointer-events: none;
    z-index: 12;
  }
  .kick-legs.on { animation: kickLegs 1.6s ease-in-out infinite; }
  @keyframes kickLegs {
    0%, 100% { transform: translateX(-50%) rotate(-20deg); opacity: 1; }
    50% { transform: translateX(-50%) rotate(25deg) translateY(-12px); opacity: 1; }
  }

  /* ══════ CELEBRATION SCREEN ══════ */
  #scrCeleb {
    background: linear-gradient(180deg, #ffe15c 0%, #ff9ec7 55%, #a8e8ff 100%);
  }
  .celeb-banner {
    font-size: clamp(32px, 8vw, 62px);
    color: #fff;
    -webkit-text-stroke: 3px #3d1f5c;
    text-shadow: 5px 7px 0 #ff4d9a, 0 10px 16px rgba(0,0,0,0.25);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 16px;
    animation: celebBounce 1s var(--bounce) infinite alternate;
  }
  @keyframes celebBounce {
    from { transform: scale(1) rotate(-2deg); }
    to { transform: scale(1.08) rotate(2deg); }
  }
  .celeb-rex-row {
    font-size: clamp(60px, 15vw, 120px);
    margin: 20px 0;
    animation: celebRexDance 1.2s ease-in-out infinite;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.2));
  }
  @keyframes celebRexDance {
    0%, 100% { transform: rotate(-8deg) translateY(0); }
    50% { transform: rotate(8deg) translateY(-14px); }
  }
  .play-again-btn {
    background: linear-gradient(180deg, #88e5a8, #3fbd5f);
    color: #fff;
    border: 5px solid #fff;
    border-radius: 999px;
    padding: 22px 44px;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 8px 0 #2b8b42, 0 12px 26px rgba(0,0,0,0.22);
    min-width: 220px; min-height: 80px;
    margin-top: 18px;
    animation: startPulse 1.4s ease-in-out infinite;
  }
  .play-again-btn:active { transform: translateY(4px) scale(0.98); box-shadow: 0 4px 0 #2b8b42, 0 6px 14px rgba(0,0,0,0.2); }

  /* ══════ MOBILE TWEAKS ══════ */
  @media (max-width: 480px) {
    .spot { width: 82px; height: 82px; font-size: 32px; border-width: 5px; }
    .rex { height: min(480px, 64vh); }
  }
  @media (max-height: 620px) {
    .title-rex { font-size: clamp(130px, 30vw, 200px); }
    .rex { height: min(400px, 70vh); }
  }

</style>
</head>
<body>

<a href="../../" class="back-home-btn">&larr; Home</a>

<!-- Drifting clouds (always visible) -->
<div class="cloud c1">☁️</div>
<div class="cloud c2">☁️</div>
<div class="cloud c3">☁️</div>
<div class="cloud c4">☁️</div>

<!-- ══════ TITLE SCREEN ══════ -->
<div class="screen active" id="scrTitle">
  <div class="title-wrap">
    <div class="title-big">🦖 TICKLE<br>THE T-REX!</div>
    <div class="title-rex" id="titleRex">🦖</div>
    <div class="title-sub">Tap the glowing spots 1, 2, 3, 4, 5!</div>
    <button class="start-btn" id="btnStart">Let's Tickle! 🤣</button>
  </div>
</div>

<!-- ══════ GAME SCREEN ══════ -->
<div class="screen" id="scrGame">
  <div class="rex-counter" id="rexCounter">Dino 1 / 4</div>
  <div class="stage" id="stage">
    <div class="reaction" id="reaction">Hi there!</div>
    <div class="rex" id="rex">
      <div class="rex-emoji" id="rexEmoji">🦖</div>
      <div class="kick-legs" id="kickLegs">🦵🦵</div>
      <div class="spot s1"><span>1</span></div>
      <div class="spot s2"><span>2</span></div>
      <div class="spot s3"><span>3</span></div>
      <div class="spot s4"><span>4</span></div>
      <div class="spot s5"><span>5</span></div>
    </div>
  </div>
</div>

<!-- ══════ CELEBRATION SCREEN ══════ -->
<div class="screen" id="scrCeleb">
  <div class="celeb-banner">YOU'RE A<br>TICKLE<br>MASTER! 🤣</div>
  <div class="celeb-rex-row">🦖 🦕 🦖 🦕</div>
  <div style="font-size:clamp(20px,5vw,28px); color:#5a2b7d; font-weight:900; text-align:center; margin-top:8px;">
    You tickled them ALL! 🌟
  </div>
  <button class="play-again-btn" id="btnPlayAgain">Play Again! 🦖</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// TICKLE THE T-REX — Fun Zone
// ══════════════════════════════════════════════════════════════════

const AUDIO_BASE = '../../audio';

const TREX_CLIPS = {
  hello:       'fun-zone/trex/hello.mp3',
  tickle_me:   'fun-zone/trex/tickle_me.mp3',
  giggle1:     'fun-zone/trex/giggle1.mp3',
  giggle2:     'fun-zone/trex/giggle2.mp3',
  giggle3:     'fun-zone/trex/giggle3.mp3',
  stop_it:     'fun-zone/trex/stop_it.mp3',
  big_laugh:   'fun-zone/trex/big_laugh.mp3',
  again:       'fun-zone/trex/again.mp3',
  rawr_happy:  'fun-zone/trex/rawr_happy.mp3',
  so_ticklish: 'fun-zone/trex/so_ticklish.mp3',
};
const FUN_CLIPS = ['fun-zone/fun/yay.mp3','fun-zone/fun/awesome.mp3','fun-zone/fun/so_cool.mp3','fun-zone/fun/wonderful.mp3','fun-zone/fun/super.mp3'];

// ══════════════════════════════════════════════════════════════════
// AUDIO CLASS — AudioContext-first, iOS unlock, music ducking
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.09; this.sfxVol = 0.35; this.musicDucked = 0.02;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value = this.sfxVol; this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }

  // ── Bouncy pentatonic C major loop, ~130 BPM, with snare on 2 & 4 ──
  startMusic() {
    this._init();
    if (this.playing) return;
    this.playing = true;
    const bpm = 130;
    const beatLen = 60 / bpm; // seconds per beat
    // C major pentatonic: C D E G A
    const penta = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
    // Bouncy 8-beat melody pattern (indices)
    const melody = [0, 2, 4, 2, 3, 5, 4, 2, 0, 4, 2, 0, 5, 4, 2, 3];
    // Bass pattern (C, G, F, G shape - stay in pentatonic)
    const bass = [65.41, 65.41, 98.00, 65.41, 87.31, 87.31, 98.00, 98.00]; // C2, G2, F2, G2 across 8 beats

    let beat = 0;
    const step = () => {
      if (!this.playing) return;
      const t = this.ctx.currentTime;
      const dur = beatLen / 2; // eighth-note steps

      // Melody note (every eighth note)
      const mFreq = penta[melody[beat % melody.length]];
      this._note(mFreq, t, dur * 0.9, 0.14, 'triangle');

      // Bass on quarter beats
      if (beat % 2 === 0) {
        const bFreq = bass[(beat / 2) % bass.length];
        this._note(bFreq, t, beatLen * 0.85, 0.18, 'sawtooth');
      }

      // Snare on beats 2 and 4 (in 4/4, every 4th eighth)
      // beat count per measure: 0 1 2 3 4 5 6 7  -> snare at 2 and 6
      if (beat % 8 === 2 || beat % 8 === 6) {
        this._snare(t);
      }
      // Kick on 1 and 3
      if (beat % 8 === 0 || beat % 8 === 4) {
        this._kick(t);
      }

      beat++;
      this._mt = setTimeout(step, dur * 1000);
    };
    step();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _note(freq, t, dur, vol, wave) {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = wave; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.015);
    g.gain.linearRampToValueAtTime(0, t + dur);
    o.connect(g); g.connect(this.musicGain);
    o.start(t); o.stop(t + dur + 0.02);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  }
  _snare(t) {
    // short noise burst
    const bufSize = this.ctx.sampleRate * 0.12;
    const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2.2);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.22, t);
    g.gain.linearRampToValueAtTime(0, t + 0.12);
    // high-pass-ish via biquad
    const bp = this.ctx.createBiquadFilter(); bp.type = 'highpass'; bp.frequency.value = 1200;
    src.connect(bp); bp.connect(g); g.connect(this.musicGain);
    src.start(t); src.stop(t + 0.14);
    src.onended = () => { src.disconnect(); bp.disconnect(); g.disconnect(); };
  }
  _kick(t) {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(120, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    g.gain.setValueAtTime(0.3, t);
    g.gain.linearRampToValueAtTime(0, t + 0.18);
    o.connect(g); g.connect(this.musicGain);
    o.start(t); o.stop(t + 0.2);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.08); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol, this.ctx.currentTime + 0.25); }

  // ── SFX tones ──
  tone(type) {
    this._init();
    const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.35, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s + 0.02); g.gain.linearRampToValueAtTime(0, s + d);
      o.connect(g); g.connect(this.sfxGain);
      o.start(s); o.stop(s + d + 0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if (type === 'pop')     { p(900, t, 0.08, 0.3); p(1300, t + 0.05, 0.1, 0.28, 'triangle'); }
    else if (type === 'sparkle') { p(1200, t, 0.1, 0.22); p(1600, t + 0.08, 0.1, 0.2); p(2000, t + 0.16, 0.14, 0.18); }
    else if (type === 'boing') { p(220, t, 0.06, 0.3); p(440, t + 0.06, 0.1, 0.3, 'triangle'); p(660, t + 0.14, 0.14, 0.26, 'triangle'); }
    else if (type === 'thud') {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(140, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.3);
      g.gain.setValueAtTime(0.5, t); g.gain.linearRampToValueAtTime(0, t + 0.4);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t + 0.45);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    }
    else if (type === 'giggle') {
      p(500, t, 0.08, 0.25, 'triangle'); p(700, t + 0.1, 0.08, 0.25, 'triangle');
      p(600, t + 0.22, 0.08, 0.25, 'triangle'); p(800, t + 0.32, 0.1, 0.25, 'triangle');
    }
    else if (type === 'whoosh') {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(900, t + 0.2);
      g.gain.setValueAtTime(0.2, t); g.gain.linearRampToValueAtTime(0, t + 0.25);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t + 0.3);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    }
  }

  // ── Voice playback ──
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({ file, resolve }); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const { file, resolve } = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch (e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 60);
  }
  _playFile(path) {
    const fallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => fallback());
    }
    return fallback();
  }
  trex(key)    { return this.speak(`${AUDIO_BASE}/${TREX_CLIPS[key]}`); }
  funTag()     { return this.speak(`${AUDIO_BASE}/${FUN_CLIPS[Math.floor(Math.random() * FUN_CLIPS.length)]}`); }
  number(n)    { return this.speak(`${AUDIO_BASE}/numbers/${n}.mp3`); }
  clearQueue() { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ══════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function onTap(el, fn) {
  let locked = false;
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    if (locked) return;
    locked = true;
    fn(e);
    setTimeout(() => locked = false, 250);
  }, { passive: false });
  el.addEventListener('click', e => {
    if (locked) return;
    fn(e);
  });
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ══════════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
const REX_EMOJIS = ['🦖', '🦕', '🦖', '🦕'];
const REX_TINTS = ['tint-green', 'tint-blue', 'tint-pink', 'tint-purple'];
const TOTAL_REXES = 4;

let currentRex = 0;
let currentSpot = 1; // next spot expected
let busy = false;   // lock taps during falling-over sequence

// ══════════════════════════════════════════════════════════════════
// TITLE SCREEN
// ══════════════════════════════════════════════════════════════════
onTap($('btnStart'), () => {
  audio.unlock();
  audio.tone('boing');
  audio.startMusic();
  audio.trex('hello');
  setTimeout(() => audio.trex('tickle_me'), 1400);
  setTimeout(startGame, 400);
});

onTap($('titleRex'), () => {
  audio.unlock();
  audio.tone('giggle');
  audio.trex('rawr_happy');
  const el = $('titleRex');
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = 'titleRexWave 1.6s ease-in-out infinite';
});

// ══════════════════════════════════════════════════════════════════
// GAME FLOW
// ══════════════════════════════════════════════════════════════════
function startGame() {
  currentRex = 0;
  showScreen('scrGame');
  setupRex();
}

function setupRex() {
  busy = false;
  currentSpot = 1;
  const rex = $('rex');
  const rexEmoji = $('rexEmoji');
  const kickLegs = $('kickLegs');

  // Reset all reaction classes
  rex.classList.remove('tap1', 'tap2', 'tap3', 'tap4', 'tap5', 'enter');
  rex.classList.remove('tint-green', 'tint-blue', 'tint-pink', 'tint-purple');
  rex.classList.add(REX_TINTS[currentRex]);
  rex.classList.add('enter');
  rexEmoji.textContent = REX_EMOJIS[currentRex];
  kickLegs.classList.remove('on');

  // Reset spots
  document.querySelectorAll('.spot').forEach(s => {
    s.classList.remove('done', 'next');
  });
  $('rexCounter').textContent = `Dino ${currentRex + 1} / ${TOTAL_REXES}`;

  // Highlight next spot
  updateNextHighlight();

  // Intro sound
  audio.tone('whoosh');
  if (currentRex > 0) {
    setTimeout(() => audio.trex('so_ticklish'), 600);
  }
}

function updateNextHighlight() {
  document.querySelectorAll('.spot').forEach(s => s.classList.remove('next'));
  const next = document.querySelector(`.spot.s${currentSpot}`);
  if (next && !next.classList.contains('done')) {
    next.classList.add('next');
  }
}

// ══════════════════════════════════════════════════════════════════
// SPOT TAP HANDLING
// ══════════════════════════════════════════════════════════════════
document.querySelectorAll('.spot').forEach(spot => {
  onTap(spot, () => handleSpotTap(spot));
});

function handleSpotTap(spot) {
  if (busy) return;
  audio.unlock();

  // Determine which spot was tapped
  const num = parseInt(spot.querySelector('span')?.textContent || '0', 10);

  if (spot.classList.contains('done')) {
    audio.tone('pop');
    audio.trex('rawr_happy');
    showReaction('Hee hee! already got that one! 😆');
    return;
  }

  if (num !== currentSpot) {
    // Wrong order — playful, no punishment
    audio.tone('boing');
    audio.trex('rawr_happy');
    showReaction('Hee hee! not yet! 🦖');
    // Make the expected spot wobble extra
    const expected = document.querySelector(`.spot.s${currentSpot}`);
    if (expected) {
      expected.style.animation = 'none';
      expected.offsetHeight;
      expected.style.animation = 'spotNext 0.5s ease-in-out 3';
      setTimeout(() => expected.style.animation = '', 1600);
    }
    return;
  }

  // ── CORRECT tap ──
  audio.tone('pop');
  audio.tone('sparkle');
  spot.classList.add('done');
  spot.classList.remove('next');

  // sparkle burst at spot
  spawnSparkles(spot);

  // Speak the number softly
  audio.number(num);

  // Rex reaction
  const rex = $('rex');
  rex.classList.remove('tap1', 'tap2', 'tap3', 'tap4', 'tap5');
  // reflow so animation can retrigger
  rex.offsetHeight;
  rex.classList.add('tap' + num);

  // Screen shake intensity
  if (num <= 2) document.body.classList.add('shake');
  else if (num <= 4) { document.body.classList.add('shake'); setTimeout(() => { document.body.classList.add('shake'); }, 200); }
  setTimeout(() => document.body.classList.remove('shake'), 700);

  // Reactions per tap
  if (num === 1) {
    audio.trex('giggle1');
    showReaction('Hee hee! 😆');
  } else if (num === 2) {
    audio.trex('giggle2');
    showReaction('Ha ha ha! 😂');
  } else if (num === 3) {
    audio.trex('giggle3');
    showReaction('That tickles! 🤣');
  } else if (num === 4) {
    audio.trex('stop_it');
    showReaction('Stop it! It tickles! 😵‍💫');
  } else if (num === 5) {
    // The big fall
    busy = true;
    fallOverSequence();
    return;
  }

  currentSpot++;
  updateNextHighlight();
}

// ══════════════════════════════════════════════════════════════════
// FALL OVER SEQUENCE (tap 5)
// ══════════════════════════════════════════════════════════════════
async function fallOverSequence() {
  audio.trex('big_laugh');
  audio.tone('thud');
  showReaction('BWA HA HA HA! 🤣');
  document.body.classList.add('mega-shake');
  setTimeout(() => document.body.classList.remove('mega-shake'), 1000);

  // legs kicking
  const kickLegs = $('kickLegs');
  kickLegs.classList.add('on');

  // tears
  for (let i = 0; i < 4; i++) {
    setTimeout(() => spawnTear(), 600 + i * 200);
  }

  // confetti burst
  confettiBurst(45);

  await delay(2200);
  audio.funTag();
  await delay(800);

  // Move to next rex or celeb
  currentRex++;
  if (currentRex >= TOTAL_REXES) {
    goToCeleb();
  } else {
    audio.trex('again');
    showReaction('Another one! 🦕');
    await delay(700);
    setupRex();
  }
}

// ══════════════════════════════════════════════════════════════════
// EFFECTS
// ══════════════════════════════════════════════════════════════════
function showReaction(txt) {
  const el = $('reaction');
  el.textContent = txt;
  el.classList.remove('show', 'out');
  el.offsetHeight;
  el.classList.add('show');
  clearTimeout(showReaction._t);
  showReaction._t = setTimeout(() => {
    el.classList.remove('show');
    el.classList.add('out');
  }, 1700);
}

function spawnSparkles(spot) {
  const rect = spot.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const emojis = ['✨', '🌟', '💫', '⭐'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.6;
    const dist = 90 + Math.random() * 80;
    s.style.setProperty('--fx', `calc(${Math.cos(angle) * dist}px - 50%)`);
    s.style.setProperty('--fy', `calc(${Math.sin(angle) * dist}px - 50%)`);
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

function spawnTear() {
  const rex = $('rex');
  const rect = rex.getBoundingClientRect();
  const tear = document.createElement('div');
  tear.className = 'tear';
  tear.textContent = '💧';
  // tears from around eye area (top-center-ish of the rex box)
  tear.style.left = (rect.left + rect.width * (0.35 + Math.random() * 0.3)) + 'px';
  tear.style.top = (rect.top + rect.height * 0.25) + 'px';
  tear.style.position = 'fixed';
  document.body.appendChild(tear);
  setTimeout(() => tear.remove(), 1700);
}

function confettiBurst(count) {
  const emojis = ['🌟', '✨', '🎉', '💫', '😂', '🦖', '🦕', '🤣', '⭐'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.fontSize = (22 + Math.random() * 24) + 'px';
    c.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
    c.style.animationDelay = (Math.random() * 0.6) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4500);
  }
}

// ══════════════════════════════════════════════════════════════════
// CELEBRATION
// ══════════════════════════════════════════════════════════════════
function goToCeleb() {
  showScreen('scrCeleb');
  confettiBurst(80);
  audio.funTag();
  setTimeout(() => audio.trex('again'), 1200);
  // Keep confetti flowing
  setTimeout(() => confettiBurst(40), 1500);
  setTimeout(() => confettiBurst(40), 3000);
}

onTap($('btnPlayAgain'), () => {
  audio.unlock();
  audio.tone('boing');
  startGame();
});

// ══════════════════════════════════════════════════════════════════
// KEEP MUSIC ALIVE on visibility change
// ══════════════════════════════════════════════════════════════════
document.addEventListener('visibilitychange', () => {
  if (document.hidden) audio.stopMusic();
  else if ($('scrTitle').classList.contains('active') === false) audio.startMusic();
});

/* ═══ AHA! PROGRESS TRACKING ═══ */
(function(){
  function getKey(){ var parts = location.pathname.split('/').filter(Boolean); var last = parts[parts.length-1]||'index.html'; var game = last.replace('.html',''); var theme = parts[parts.length-2]||'root'; if (game === '') game = 'index'; return theme+'/'+game; }
  function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } }
  function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} }
  function markAttempt(){ var p=load(), k=getKey(); if(!p[k]) p[k] = { attempted:true, attemptedAt:Date.now() }; save(p); }
  function markComplete(){ var p=load(), k=getKey(); if(!p[k]) p[k]={}; p[k].completed=true; p[k].completedAt=Date.now(); p[k].plays=(p[k].plays||0)+1; save(p); }
  var celeb = document.getElementById('scrCeleb');
  if (celeb){ var obs = new MutationObserver(function(){ if(celeb.classList.contains('active')) markComplete(); }); obs.observe(celeb, { attributes:true, attributeFilter:['class'] }); }
  setTimeout(markAttempt, 3000);
})();
</script>
