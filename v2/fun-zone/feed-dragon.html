<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Feed the Dragon</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-dragon: 15; --z-snack: 20; --z-fire: 25;
  --z-ui: 30; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;

  /* Brighter, friendlier palette */
  --coral: #ff7a7a;
  --peach: #ffcba4;
  --pink: #ff9ec7;
  --hot-pink: #ff4d9a;
  --yellow: #ffe15c;
  --gold: #ffd93d;
  --orange: #ffb26b;
  --mint: #9ce8c2;
  --sky: #b3e6ff;
  --dragon-body: #8ee6a8;       /* mint green */
  --dragon-body-dark: #4fc37a;
  --dragon-belly: #fff4c7;      /* cream */
  --dragon-cheek: #ff9ec7;
  --text-dark: #3d1f5c;
  --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  color: var(--text-dark);
}

/* ── Bright, friendly sky background ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(180deg, var(--sky) 0%, #ffdab3 55%, var(--yellow) 100%);
}
.bg-sun {
  position: fixed; z-index: 1;
  top: 14%; left: 18%;
  width: clamp(90px, 20vw, 160px); height: clamp(90px, 20vw, 160px);
  border-radius: 50%;
  background: radial-gradient(circle at center, #fff6c2 0%, #ffd93d 55%, #ffb26b 85%, rgba(255,178,107,0) 100%);
  filter: blur(1px);
  animation: sunPulse 3s ease-in-out infinite;
}
@keyframes sunPulse {
  0%,100% { transform: scale(1); opacity: 0.95; }
  50%     { transform: scale(1.08); opacity: 1; }
}
.bg-hills {
  position: fixed; z-index: 2; bottom: 0;
  width: 100%; height: 22%;
  background: linear-gradient(180deg, rgba(156,232,194,0.45) 0%, rgba(79,195,122,0.7) 100%);
  clip-path: polygon(0 100%, 0 60%, 14% 40%, 28% 62%, 44% 28%, 58% 52%, 72% 36%, 86% 58%, 100% 40%, 100% 100%);
}
.bg-cloud {
  position: fixed; z-index: 2;
  font-size: clamp(30px, 6vw, 50px);
  opacity: 0.85; pointer-events: none;
  animation: cloudDrift linear infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
}
@keyframes cloudDrift {
  0% { transform: translateX(-120px); }
  100% { transform: translateX(calc(100vw + 120px)); }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.35s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Back button ── */
.back-home-btn {
  position: fixed; top: 14px; left: 14px; z-index: 500;
  display: inline-flex; align-items: center; gap: 6px;
  background: #fff;
  color: var(--hot-pink);
  padding: 10px 18px; border-radius: 999px;
  border: 4px solid var(--pink);
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 900; text-decoration: none;
  box-shadow: 0 4px 0 #c94d80, 0 6px 12px rgba(0,0,0,0.15);
  transition: transform 0.15s var(--bounce);
  -webkit-tap-highlight-color: transparent;
}
.back-home-btn:active { transform: translateY(2px) scale(0.97); }

/* ── Title screen ── */
.screen-title {
  background: linear-gradient(180deg, var(--sky) 0%, var(--peach) 55%, var(--yellow) 100%);
}
.screen-title h1 {
  font-size: clamp(36px, 9vw, 72px);
  color: #fff;
  -webkit-text-stroke: 3px var(--text-dark);
  text-shadow: 4px 6px 0 var(--hot-pink), 0 8px 14px rgba(0,0,0,0.2);
  line-height: 1.05;
  margin: 10px 0;
  animation: titleBounce 2.2s ease-in-out infinite;
}
@keyframes titleBounce {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50%     { transform: translateY(-10px) rotate(1deg); }
}
.screen-title .title-dragon {
  font-size: clamp(140px, 34vw, 240px);
  line-height: 1;
  filter: drop-shadow(0 12px 24px rgba(0,0,0,0.25));
  animation: dragonWave 1.5s var(--bounce) infinite;
}
@keyframes dragonWave {
  0%,100% { transform: rotate(-6deg) scale(1); }
  50%     { transform: rotate(8deg) scale(1.05); }
}
.screen-title p {
  font-size: clamp(18px, 4.2vw, 26px);
  color: var(--text-dark);
  max-width: 420px; line-height: 1.3;
  margin: 10px 0 18px;
  font-weight: 900;
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 80px;
  padding: 22px 44px;
  font-size: clamp(22px, 5vw, 32px);
  font-family: var(--font); font-weight: 900;
  color: #fff; border: 5px solid #fff;
  border-radius: 999px;
  cursor: pointer;
  transition: transform 0.15s var(--bounce);
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 1px;
}
.btn:active { transform: translateY(4px) scale(0.98); }
.btn-start, .btn-again {
  background: linear-gradient(180deg, #ff8bc0, #ff4d9a);
  box-shadow: 0 8px 0 #c02d72, 0 12px 28px rgba(0,0,0,0.25);
  animation: btnPulse 1.4s ease-in-out infinite;
}
.btn-start:active, .btn-again:active {
  box-shadow: 0 4px 0 #c02d72, 0 6px 14px rgba(0,0,0,0.2);
}
@keyframes btnPulse {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.06); }
}

/* ── HUD (thought bubble) ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: center; align-items: flex-start;
  padding: 10px 14px 0;
  pointer-events: none;
}
.thought-bubble {
  background: #fff;
  color: var(--hot-pink);
  padding: 12px 24px;
  border-radius: 999px;
  border: 5px solid var(--pink);
  box-shadow: 0 6px 0 #c94d80, 0 10px 20px rgba(0,0,0,0.15);
  font-weight: 900;
  font-size: clamp(16px, 4vw, 22px);
  display: flex; align-items: center; gap: 12px;
  max-width: 90vw;
  animation: bubblePop 0.4s var(--bounce);
  position: relative;
}
@keyframes bubblePop {
  0%   { transform: scale(0.2) rotate(-8deg); opacity: 0; }
  60%  { transform: scale(1.15) rotate(4deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}
.thought-bubble.refresh { animation: bubbleRefresh 0.4s var(--bounce); }
@keyframes bubbleRefresh {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.15) rotate(-2deg); }
  100% { transform: scale(1); }
}
.thought-bubble .big-letter {
  font-size: clamp(40px, 10vw, 58px);
  color: var(--orange);
  text-shadow: 2px 2px 0 rgba(61,31,92,0.15);
  line-height: 1;
  font-weight: 900;
  display: inline-block;
  animation: letterBounce 0.6s var(--bounce) infinite alternate;
}
@keyframes letterBounce {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-4px) scale(1.08); }
}

/* ── Feed counter (corner) ── */
.feed-counter {
  position: fixed; top: 14px; right: 14px;
  z-index: var(--z-ui);
  background: #fff;
  color: var(--dragon-body-dark);
  padding: 8px 16px; border-radius: 999px;
  border: 4px solid var(--dragon-body);
  font-size: clamp(14px, 3.2vw, 18px);
  font-weight: 900;
  display: flex; align-items: center; gap: 6px;
  pointer-events: none;
  box-shadow: 0 4px 0 #4a9f55, 0 6px 12px rgba(0,0,0,0.1);
}

/* ── Snack area ── */
.snack-area {
  position: fixed;
  top: 18%; left: 0; right: 0; bottom: 42%;
  z-index: var(--z-snack);
  pointer-events: none;
}
.snack-area.active { pointer-events: auto; }

/* ── Letter snack ── */
.snack {
  position: absolute;
  width: clamp(72px, 16vw, 110px);
  height: clamp(72px, 16vw, 110px);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  will-change: transform;
  transition: opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.snack-body {
  position: absolute; inset: 0;
  border-radius: 45% 45% 55% 55% / 55% 55% 45% 45%;
  border: 4px solid rgba(61,31,92,0.2);
  box-shadow: 0 8px 16px rgba(0,0,0,0.2), inset 0 -6px 0 rgba(0,0,0,0.1), inset 0 6px 0 rgba(255,255,255,0.4);
}
.snack-shape-cupcake .snack-body {
  background: linear-gradient(180deg, #ffb3d9 0%, #ff7ab3 50%, #ff4d9a 100%);
  border-radius: 45% 45% 20% 20% / 70% 70% 30% 30%;
}
.snack-shape-cupcake::before {
  content: ''; position: absolute;
  left: 12%; right: 12%; bottom: 0; top: 48%;
  background: repeating-linear-gradient(45deg, #ffb26b, #ffb26b 8px, #e88c3c 8px, #e88c3c 16px);
  border-radius: 0 0 28% 28% / 0 0 30% 30%;
  border: 3px solid rgba(61,31,92,0.2);
  border-top: none;
}
.snack-shape-donut .snack-body {
  background: radial-gradient(circle at 35% 35%, #fff6c2, #ffd93d 40%, #ffb26b 80%, #e88c3c 100%);
}
.snack-shape-donut::after {
  content: ''; position: absolute;
  left: 30%; right: 30%; top: 30%; bottom: 30%;
  background: #ff9ec7;
  border-radius: 50%;
  box-shadow: inset 0 0 0 3px rgba(61,31,92,0.2);
}
.snack-shape-cookie .snack-body {
  background: radial-gradient(circle at 35% 35%, #ffc98a, #ffb26b 50%, #d98040 100%);
  border-radius: 50%;
}
.snack-shape-cookie::before {
  content: ''; position: absolute;
  width: 10%; height: 10%; border-radius: 50%;
  background: #6b3410; top: 22%; left: 22%;
  box-shadow:
    calc(22vw * 0.6) calc(22vw * 0.2) 0 -4px #6b3410,
    calc(22vw * 0.1) calc(22vw * 0.5) 0 -5px #6b3410,
    calc(22vw * 0.5) calc(22vw * 0.6) 0 -3px #6b3410,
    calc(22vw * -0.05) calc(22vw * 0.3) 0 -6px #6b3410;
}
.snack-shape-cake .snack-body {
  background: linear-gradient(180deg, #fff6c2 0%, #ffd93d 30%, #ffb26b 60%, #ff7a7a 100%);
  border-radius: 18% 18% 18% 18%;
}
.snack-shape-cake::before {
  content: '🍓'; position: absolute;
  top: -10px; left: 50%; transform: translateX(-50%);
  font-size: clamp(22px, 5vw, 34px);
}
.snack-shape-candy .snack-body {
  background: repeating-conic-gradient(from 0deg, #ff7a7a 0deg 30deg, #fff 30deg 60deg);
  border-radius: 50%;
}
.snack-shape-pie .snack-body {
  background: radial-gradient(circle at 50% 55%, #ffb26b, #ff7a7a 45%, #ffd93d 75%, #fff6c2 100%);
  border-radius: 50%;
}
.snack-shape-pie::before {
  content: ''; position: absolute;
  left: 18%; right: 18%; top: 18%; bottom: 18%;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 18%, #ffd93d 18%, #ffd93d 22%),
    repeating-linear-gradient(90deg, transparent 0, transparent 18%, #ffd93d 18%, #ffd93d 22%);
  border-radius: 50%;
}
.snack-letter {
  position: relative; z-index: 3;
  font-size: clamp(36px, 8vw, 56px);
  font-weight: 900;
  color: #fff;
  text-shadow:
    -2px -2px 0 var(--text-dark), 2px -2px 0 var(--text-dark),
    -2px 2px 0 var(--text-dark), 2px 2px 0 var(--text-dark),
    0 0 6px rgba(0,0,0,0.4);
  pointer-events: none;
  line-height: 1;
  letter-spacing: -0.02em;
}

/* Continuous wiggle/float — like balloons */
.snack.floating {
  animation: snackFloat 1.8s var(--bounce) infinite alternate;
  transition: transform 0.3s var(--bounce);
}
@keyframes snackFloat {
  0%   { transform: translateY(0) rotate(-6deg) scale(1); }
  50%  { transform: translateY(-10px) rotate(0deg) scale(1.04); }
  100% { transform: translateY(-4px) rotate(6deg) scale(1); }
}

/* Snack press spring */
.snack:active .snack-body { transform: scale(0.92); }

.snack.squish {
  animation: snackSquish 0.35s var(--bounce);
}
@keyframes snackSquish {
  0%   { transform: scale(1); }
  30%  { transform: scale(0.7) rotate(-8deg); }
  60%  { transform: scale(1.3) rotate(6deg); }
  100% { transform: scale(1) rotate(0); }
}

/* Target pulse on correct-letter snack */
.snack.target .snack-body {
  box-shadow: 0 0 0 6px rgba(255,217,61,0.55),
              0 8px 16px rgba(0,0,0,0.2),
              inset 0 -6px 0 rgba(0,0,0,0.1),
              inset 0 6px 0 rgba(255,255,255,0.4);
  animation: targetPulse 1s ease-in-out infinite;
}
@keyframes targetPulse {
  0%,100% { box-shadow: 0 0 0 6px rgba(255,217,61,0.5),
                       0 8px 16px rgba(0,0,0,0.2),
                       inset 0 -6px 0 rgba(0,0,0,0.1),
                       inset 0 6px 0 rgba(255,255,255,0.4); }
  50%     { box-shadow: 0 0 0 14px rgba(255,217,61,0.15),
                       0 8px 20px rgba(0,0,0,0.25),
                       inset 0 -6px 0 rgba(0,0,0,0.1),
                       inset 0 6px 0 rgba(255,255,255,0.4); }
}

.snack.flying {
  pointer-events: none;
  z-index: calc(var(--z-snack) + 5);
}
.snack.spitting {
  animation: snackSpit 0.6s var(--bounce) forwards;
  pointer-events: none;
  z-index: calc(var(--z-snack) + 5);
}
@keyframes snackSpit {
  0%   { transform: translate(0,0) rotate(0) scale(1); opacity: 1; }
  40%  { transform: translate(var(--spit-x,-40px), -80px) rotate(-240deg) scale(1.1); opacity: 1; }
  100% { transform: translate(var(--spit-x,-120px), 60vh) rotate(-720deg) scale(0.5); opacity: 0; }
}
.snack.poof {
  animation: snackPoof 0.25s var(--bounce) forwards;
  pointer-events: none;
}
@keyframes snackPoof {
  0%   { transform: scale(1); opacity: 1; }
  40%  { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(0.2); opacity: 0; }
}

/* New-snack pop-in */
.snack.popin {
  animation: snackPopIn 0.5s var(--bounce);
}
@keyframes snackPopIn {
  0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

/* ── Dragon ── */
.dragon-stage {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 44%;
  z-index: var(--z-dragon);
  display: flex; align-items: flex-end; justify-content: center;
  pointer-events: none;
}
.dragon {
  position: relative;
  width: clamp(260px, 60vw, 420px);
  height: clamp(240px, 55vw, 380px);
  transition: transform 0.5s var(--bounce);
  transform-origin: center bottom;
  filter: drop-shadow(0 14px 24px rgba(0,0,0,0.22));
}
/* Dragon body */
.dragon-body {
  position: absolute;
  left: 10%; right: 10%; bottom: 0; top: 22%;
  background: radial-gradient(ellipse at 30% 25%, #b8f0ce 0%, var(--dragon-body) 45%, var(--dragon-body-dark) 100%);
  border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
  box-shadow:
    inset -12px -16px 30px rgba(45,110,70,0.3),
    inset 10px 10px 25px rgba(255,255,255,0.35);
  border: 4px solid #3a9458;
}
.dragon-belly {
  position: absolute;
  left: 28%; right: 28%; bottom: 3%; top: 50%;
  background: linear-gradient(180deg, #fffae0, #ffe8a3);
  border-radius: 50% 50% 45% 45% / 50% 50% 50% 50%;
  border: 3px solid #3a9458;
  border-top: none;
}
.dragon-belly::before {
  content: '';
  position: absolute; inset: 8%;
  background: repeating-linear-gradient(90deg, transparent 0 14%, rgba(58,148,88,0.2) 14% 16%);
  border-radius: inherit;
}
/* Dragon head */
.dragon-head {
  position: absolute;
  left: 20%; right: 20%; top: 0; bottom: 48%;
  background: radial-gradient(ellipse at 35% 25%, #b8f0ce 0%, var(--dragon-body) 50%, var(--dragon-body-dark) 100%);
  border-radius: 50% 50% 40% 40% / 55% 55% 45% 45%;
  border: 4px solid #3a9458;
  box-shadow: inset -10px -10px 20px rgba(45,110,70,0.25);
  overflow: visible;
}
/* Friendly little horns */
.dragon-horn {
  position: absolute; top: -16%;
  width: 14%; height: 28%;
  background: linear-gradient(180deg, #ffe8a3, #ffb26b);
  border: 3px solid #c07c3c;
  border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;
}
.dragon-horn.left  { left: 22%; transform: rotate(-14deg); }
.dragon-horn.right { right: 22%; transform: rotate(14deg); }

/* Pink cheeks */
.dragon-cheek {
  position: absolute; top: 52%;
  width: 16%; height: 14%;
  background: radial-gradient(circle, var(--dragon-cheek) 30%, rgba(255,158,199,0) 75%);
  border-radius: 50%;
}
.dragon-cheek.left  { left: 8%; }
.dragon-cheek.right { right: 8%; }

/* BIG friendly eyes */
.dragon-eye {
  position: absolute; top: 18%;
  width: 28%; height: 34%;
  background: #fff;
  border-radius: 50%;
  border: 4px solid var(--text-dark);
  display: flex; align-items: flex-end; justify-content: center;
  overflow: hidden;
  transition: height 0.15s var(--bounce), transform 0.2s var(--bounce);
}
.dragon-eye.left  { left: 14%; }
.dragon-eye.right { right: 14%; }
.dragon-pupil {
  width: 70%; height: 80%;
  background: var(--text-dark);
  border-radius: 50%;
  position: relative;
  margin-bottom: 6%;
  transition: transform 0.2s var(--bounce);
}
.dragon-pupil::after {
  /* Big white shine */
  content: '';
  position: absolute;
  top: 12%; left: 18%;
  width: 45%; height: 45%;
  background: #fff;
  border-radius: 50%;
}
.dragon-pupil::before {
  /* Small secondary shine */
  content: '';
  position: absolute;
  bottom: 18%; right: 20%;
  width: 18%; height: 18%;
  background: #fff;
  border-radius: 50%;
  opacity: 0.85;
}
.dragon.eyes-shut .dragon-eye { height: 6%; }
.dragon.eyes-big .dragon-pupil { transform: scale(1.15); }
.dragon.eyes-heart .dragon-pupil { transform: scale(1.1); }

/* HAPPY eyebrows — always curved up/friendly */
.dragon-brow {
  position: absolute; top: 10%;
  width: 24%; height: 7%;
  background: var(--text-dark);
  border-radius: 100px 100px 0 0 / 100px 100px 0 0;
  transition: transform 0.2s var(--bounce);
}
.dragon-brow.left  { left: 14%; transform: rotate(-18deg); transform-origin: right bottom; }
.dragon-brow.right { right: 14%; transform: rotate(18deg); transform-origin: left bottom; }
.dragon.happy .dragon-brow.left  { transform: rotate(-25deg) translateY(-3px); }
.dragon.happy .dragon-brow.right { transform: rotate(25deg) translateY(-3px); }

/* Nostrils */
.dragon-nose {
  position: absolute; top: 60%;
  width: 7%; height: 10%;
  background: var(--text-dark);
  border-radius: 50%;
  opacity: 0.6;
}
.dragon-nose.left  { left: 40%; }
.dragon-nose.right { right: 40%; }

/* Friendly gummy smile mouth */
.dragon-mouth {
  position: absolute;
  left: 24%; right: 24%; bottom: 4%;
  height: 22%;
  background: radial-gradient(ellipse at 50% 30%, #ff4d7a 0%, #c93860 80%);
  border-radius: 50% 50% 50% 50% / 30% 30% 80% 80%;
  border: 4px solid #3a9458;
  overflow: hidden;
  transition: height 0.12s var(--bounce), transform 0.12s var(--bounce);
}
.dragon.chomping .dragon-mouth { height: 8%; }
.dragon.yelling  .dragon-mouth { height: 32%; }
.dragon.smiling  .dragon-mouth {
  height: 18%;
  border-radius: 50% 50% 50% 50% / 10% 10% 100% 100%;
}
.dragon-tongue {
  position: absolute;
  left: 22%; right: 22%; bottom: 0;
  height: 55%;
  background: linear-gradient(180deg, #ffa3b8, #ff6e93);
  border-radius: 50% 50% 40% 40%;
  border-top: 3px solid #c93860;
}
/* Just 2 tiny gummy teeth — friendly, not scary */
.dragon-teeth-top {
  position: absolute;
  left: 25%; right: 25%;
  height: 22%;
  display: flex; justify-content: space-between;
  pointer-events: none;
  top: 0;
}
.dragon-tooth {
  width: 16%; height: 100%;
  background: linear-gradient(180deg, #fff, #ffeedb);
  border-radius: 20% 20% 50% 50%;
  border: 2px solid #f0dbb8;
  border-top: none;
}
/* Wings */
.dragon-wing {
  position: absolute;
  top: 28%;
  width: 28%; height: 38%;
  background: radial-gradient(ellipse at 30% 30%, #b8f0ce, #4fc37a);
  border: 3px solid #3a9458;
  border-radius: 50% 10% 60% 40%;
  transition: transform 0.3s var(--bounce);
}
.dragon-wing.left  { left: -18%; transform: rotate(-20deg); }
.dragon-wing.right { right: -18%; transform: rotate(20deg) scaleX(-1); }
.dragon.flapping .dragon-wing.left  { animation: wingFlapL 0.4s var(--bounce); }
.dragon.flapping .dragon-wing.right { animation: wingFlapR 0.4s var(--bounce); }
@keyframes wingFlapL {
  0%,100% { transform: rotate(-20deg); }
  50%     { transform: rotate(-55deg) translateY(-10px); }
}
@keyframes wingFlapR {
  0%,100% { transform: rotate(20deg) scaleX(-1); }
  50%     { transform: rotate(55deg) scaleX(-1) translateY(-10px); }
}

/* Dragon idle breathing + happy sway */
.dragon.idle {
  animation: dragonBreathe 2.2s var(--bounce) infinite alternate;
}
@keyframes dragonBreathe {
  0%   { transform: translateY(0) scale(var(--body-scale, 1)) rotate(-1deg); }
  100% { transform: translateY(-6px) scale(calc(var(--body-scale, 1) * 1.03)) rotate(1deg); }

/* Dragon chomp wobble — BOUNCY like T-Rex */
.dragon.wobble { animation: dragonWobble 0.5s var(--bounce); }
@keyframes dragonWobble {
  0%   { transform: scale(var(--body-scale, 1)) rotate(0); }
  20%  { transform: scale(calc(var(--body-scale, 1) * 1.08)) rotate(-4deg) translateY(-8px); }
  40%  { transform: scale(calc(var(--body-scale, 1) * 1.12)) rotate(4deg) translateY(-6px); }
  60%  { transform: scale(calc(var(--body-scale, 1) * 1.06)) rotate(-3deg) translateY(-4px); }
  80%  { transform: scale(calc(var(--body-scale, 1) * 1.02)) rotate(2deg); }
  100% { transform: scale(var(--body-scale, 1)) rotate(0); }
}
/* Bigger wobble for full feed */
.dragon.big-wobble { animation: dragonBigWobble 0.7s var(--bounce); }
@keyframes dragonBigWobble {
  0%   { transform: scale(var(--body-scale, 1)) rotate(0); }
  15%  { transform: scale(calc(var(--body-scale, 1) * 1.15)) rotate(-8deg) translateY(-14px); }
  35%  { transform: scale(calc(var(--body-scale, 1) * 1.2)) rotate(8deg) translateY(-10px); }
  55%  { transform: scale(calc(var(--body-scale, 1) * 1.1)) rotate(-5deg) translateY(-6px); }
  75%  { transform: scale(calc(var(--body-scale, 1) * 1.05)) rotate(3deg); }
  100% { transform: scale(var(--body-scale, 1)) rotate(0); }
}
/* Happy little hop between feeds */
.dragon.hop { animation: dragonHop 0.6s var(--bounce); }
@keyframes dragonHop {
  0%   { transform: scale(var(--body-scale, 1)) translateY(0); }
  40%  { transform: scale(calc(var(--body-scale, 1) * 1.05)) translateY(-18px) rotate(-3deg); }
  70%  { transform: scale(calc(var(--body-scale, 1) * 1.02)) translateY(-6px) rotate(2deg); }
  100% { transform: scale(var(--body-scale, 1)) translateY(0); }
}
.dragon.disgust { animation: dragonDisgust 0.4s var(--bounce); }
@keyframes dragonDisgust {
  0%,100% { transform: rotate(0) scale(var(--body-scale, 1)); }
  30%     { transform: rotate(-8deg) translateX(-10px) scale(var(--body-scale, 1)); }
  70%     { transform: rotate(8deg) translateX(10px) scale(var(--body-scale, 1)); }

/* Fire breath */

/* Crumbs */

}
@keyframes sparkleFly {

/* ── Celebration ── */

  background: linear-gradient(180deg, var(--yellow) 0%, var(--pink) 55%, var(--sky) 100%);

</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════
const AUDIO_BASE = '../../audio';
const TOTAL_FEEDS = 8;
const SNACKS_PER_ROUND = 6;

// Dragon character voice pack
const DRAGON_VOICE = {
  hello:   'fun-zone/dragon/hello.mp3',
  hungry:  'fun-zone/dragon/hungry.mp3',
  want:    'fun-zone/dragon/want_letter.mp3',
  yummy:   'fun-zone/dragon/yummy.mp3',
  more:    'fun-zone/dragon/more.mp3',
  tasty:   'fun-zone/dragon/tasty.mp3',
  nom:     'fun-zone/dragon/nom.mp3',
  thanks:  'fun-zone/dragon/thanks.mp3',
  wrong:   'fun-zone/dragon/wrong.mp3',
  full:    'fun-zone/dragon/full.mp3',
  burp:    'fun-zone/dragon/burp.mp3',
  fire:    'fun-zone/dragon/fire.mp3',
};

const HAPPY_POOL = ['yummy', 'more', 'tasty', 'nom', 'thanks'];
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const SNACK_SHAPES = ['cupcake', 'donut', 'cookie', 'cake', 'candy', 'pie'];

// ═══════════════════════════════════════════════════════════════════
// GAME AUDIO (Web Audio API with HTML fallback, iOS unlock)
// ═══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.1; this.sfxVol = 0.35; this.musicDucked = 0.03;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._loopTimer = null;
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }

  // Happy skippy pentatonic loop ~130 BPM
  startMusic() {
    this._init();
    if (this.playing) return;
    this.playing = true;
    const bpm = 130;
    const beatLen = 60 / bpm;
    const penta = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
    const melody = [0, 2, 4, 2, 3, 5, 4, 2, 0, 4, 2, 0, 5, 4, 2, 3];
    const bass = [65.41, 65.41, 98.00, 65.41, 87.31, 87.31, 98.00, 98.00];

    let beat = 0;
    const step = () => {
      if (!this.playing) return;
      const t = this.ctx.currentTime;
      const dur = beatLen / 2;

      const mFreq = penta[melody[beat % melody.length]];
      this._note(mFreq, t, dur * 0.9, 0.12, 'triangle');

      if (beat % 2 === 0) {
        const bFreq = bass[(beat / 2) % bass.length];
        this._note(bFreq, t, beatLen * 0.85, 0.15, 'sawtooth');
      }
      if (beat % 8 === 2 || beat % 8 === 6) this._snare(t);
      if (beat % 8 === 0 || beat % 8 === 4) this._kick(t);

      beat++;
      this._loopTimer = setTimeout(step, dur * 1000);
    };
    step();
  }
  _note(freq, t, dur, vol, wave) {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = wave; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.015);
    g.gain.linearRampToValueAtTime(0, t + dur);
    o.connect(g); g.connect(this.musicGain);
    o.start(t); o.stop(t + dur + 0.02);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  }
  _snare(t) {
    const bufSize = this.ctx.sampleRate * 0.12;
    const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2.2);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.2, t);
    g.gain.linearRampToValueAtTime(0, t + 0.12);
    const bp = this.ctx.createBiquadFilter(); bp.type = 'highpass'; bp.frequency.value = 1200;
    src.connect(bp); bp.connect(g); g.connect(this.musicGain);
    src.start(t); src.stop(t + 0.14);
    src.onended = () => { src.disconnect(); bp.disconnect(); g.disconnect(); };
  }
  _kick(t) {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(120, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    g.gain.setValueAtTime(0.28, t);
    g.gain.linearRampToValueAtTime(0, t + 0.18);
    o.connect(g); g.connect(this.musicGain);
    o.start(t); o.stop(t + 0.2);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  }
  stopMusic() {
    this.playing = false;
    clearTimeout(this._loopTimer);
  }
  _duck() {
    if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.08);
  }
  _unduck() {
    if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol, this.ctx.currentTime + 0.25);
  }

  tone(type) {
    this._init();
    const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s);
      g.gain.linearRampToValueAtTime(v, s + 0.02);
      g.gain.linearRampToValueAtTime(0, s + d);
      o.connect(g); g.connect(this.sfxGain);
      o.start(s); o.stop(s + d + 0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    const ps = (startF, endF, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.setValueAtTime(startF, s);
      o.frequency.exponentialRampToValueAtTime(endF, s + d);
      g.gain.setValueAtTime(v, s);
      g.gain.linearRampToValueAtTime(0, s + d);
      o.connect(g); g.connect(this.sfxGain);
      o.start(s); o.stop(s + d + 0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if (type === 'chomp') {
      ps(180, 60, t, 0.1, 0.55, 'square');
      ps(90, 40, t + 0.04, 0.08, 0.35, 'triangle');
    }
    else if (type === 'whoosh') {
      ps(200, 900, t, 0.2, 0.28, 'sine');
    }
    else if (type === 'pop') {
      p(900, t, 0.06, 0.3);
      p(1300, t + 0.05, 0.08, 0.25, 'triangle');
    }
    else if (type === 'boing') {
      p(220, t, 0.06, 0.3);
      p(440, t + 0.06, 0.08, 0.3, 'triangle');
      p(660, t + 0.12, 0.1, 0.26, 'triangle');
    }
    else if (type === 'yuck') {
      ps(500, 150, t, 0.25, 0.3, 'sawtooth');
    }
    else if (type === 'burp') {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(80, t);
      o.frequency.linearRampToValueAtTime(140, t + 0.2);
      o.frequency.linearRampToValueAtTime(60, t + 0.5);
      o.frequency.linearRampToValueAtTime(120, t + 0.7);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.45, t + 0.05);
      g.gain.linearRampToValueAtTime(0.35, t + 0.5);
      g.gain.linearRampToValueAtTime(0, t + 0.9);
      o.connect(g); g.connect(this.sfxGain);
      o.start(t); o.stop(t + 1.0);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    }
    else if (type === 'sparkle') {
      p(1046.5, t,        0.08, 0.22);
      p(1318.5, t + 0.05, 0.08, 0.2);
      p(1568.0, t + 0.1,  0.1,  0.22);
    }
    else if (type === 'fire') {
      const bufSize = 0.8 * this.ctx.sampleRate;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
      const n = this.ctx.createBufferSource();
      const ng = this.ctx.createGain();
      const filt = this.ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.value = 900;
      n.buffer = buf;
      ng.gain.setValueAtTime(0.3, t);
      ng.gain.linearRampToValueAtTime(0, t + 0.8);
      n.connect(filt); filt.connect(ng); ng.connect(this.sfxGain);
      n.start(t);
      n.onended = () => { n.disconnect(); filt.disconnect(); ng.disconnect(); };
    }
    else if (type === 'celeb') {
      p(523.25, t,        0.12, 0.35);
      p(659.25, t + 0.12, 0.12, 0.4);
      p(783.99, t + 0.24, 0.14, 0.45);
      p(1046.5, t + 0.38, 0.3,  0.5);
    }
  }

  // Voice is queued but we NEVER await it during gameplay
  speak(file) { return new Promise(res => { this.voiceQueue.push({ file, resolve: res }); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const { file, resolve } = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch (e) {}
    this.speaking = false;
    this._unduck();
    resolve();
    setTimeout(() => this._next(), 50);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(res => {
      const a = new window.Audio(path);
      a.onended = res; a.onerror = () => res();
      a.play().catch(() => res());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(res => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = res;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }

  dragonSay(key) {
    const file = DRAGON_VOICE[key];
    if (!file) return Promise.resolve();
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(letter) {
    return this.speak(`${AUDIO_BASE}/letters/${letter.toLowerCase()}.mp3`);
  }
  clearQueue() {
    this.voiceQueue.forEach(q => q.resolve());
    this.voiceQueue = [];
    this.speaking = false;
    this._unduck();
  }
}

// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    if (t) return;
    t = true;
    fn(e);
    setTimeout(() => t = false, 120);
  }, { passive: false });
  el.addEventListener('click', e => { if (t) return; fn(e); });
}

// ═══════════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
let state = {
  running: false,
  feedsDone: 0,
  targetLetter: null,
  dragonSize: 1.0,
  usedLetters: [],
  snacks: [],
  ending: false,
};

// ═══════════════════════════════════════════════════════════════════
// DRAGON CONTROL
// ═══════════════════════════════════════════════════════════════════
const dragon = () => $('dragon');

function setDragonSize(scale) {
  state.dragonSize = scale;
  dragon().style.setProperty('--body-scale', scale);
}

// Snappy wobble — only ~150ms hold, animation plays to completion
function dragonChomp() {
  const d = dragon();
  // restart wobble even if one is already running
  d.classList.remove('wobble');
  void d.offsetWidth;
  d.classList.add('wobble', 'chomping', 'eyes-shut', 'happy');
  audio.tone('chomp');
  setTimeout(() => d.classList.remove('chomping', 'eyes-shut'), 150);
  setTimeout(() => d.classList.remove('wobble', 'happy'), 500);
}
function dragonHop() {
  const d = dragon();
  d.classList.remove('hop');
  void d.offsetWidth;
  d.classList.add('hop');
  setTimeout(() => d.classList.remove('hop'), 600);
}
function dragonYell() {
  const d = dragon();
  d.classList.add('yelling', 'eyes-big', 'flapping');
  setTimeout(() => d.classList.remove('yelling', 'flapping'), 400);
  setTimeout(() => d.classList.remove('eyes-big'), 500);
}
function dragonDisgusted() {
  const d = dragon();
  d.classList.remove('disgust');
  void d.offsetWidth;
  d.classList.add('disgust');
  setTimeout(() => d.classList.remove('disgust'), 400);
}

function spawnCrumbs(x, y, count = 10) {
  const emojis = ['🍞', '✨', '💥', '🍪', '🌟', '⭐'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'crumb';
    c.textContent = pick(emojis);
    c.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
    c.style.top  = (y + (Math.random() - 0.5) * 20) + 'px';
    c.style.setProperty('--cx', ((Math.random() - 0.5) * 200) + 'px');
    c.style.setProperty('--cy', (30 + Math.random() * 80) + 'px');
    c.style.setProperty('--cr', (Math.random() * 720 - 360) + 'deg');
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 900);
  }
}
function spawnSparkles(x, y, count = 8) {
  const emojis = ['✨', '⭐', '💫', '🌟'];
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = pick(emojis);
    s.style.left = x + 'px';
    s.style.top  = y + 'px';
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.6;
    const dist = 60 + Math.random() * 70;
    s.style.setProperty('--fx', (Math.cos(angle) * dist) + 'px');
    s.style.setProperty('--fy', (Math.sin(angle) * dist - 20) + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}
function spawnNostrilSmoke() {
  const d = dragon();
  const rect = d.getBoundingClientRect();
  ['left', 'right'].forEach(side => {
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'smoke';
        s.style.position = 'fixed';
        s.style.zIndex = 'var(--z-fire)';
        const x = side === 'left'
          ? rect.left + rect.width * 0.40
          : rect.left + rect.width * 0.60;
        s.style.left = x + 'px';
        s.style.top  = (rect.top + rect.height * 0.34) + 'px';
        s.style.setProperty('--sx', ((Math.random() - 0.5) * 30) + 'px');
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1100);
      }, i * 100);
    }
  });
}
function fireBreath() {
  audio.tone('fire');
  const d = dragon();
  const rect = d.getBoundingClientRect();
  const cloud = document.createElement('div');
  cloud.className = 'fire-cloud show';
  cloud.textContent = '🔥';
  cloud.style.left = (rect.left + rect.width / 2 - 60) + 'px';
  cloud.style.top  = (rect.top + rect.height * 0.55) + 'px';
  document.body.appendChild(cloud);
  setTimeout(() => cloud.remove(), 1100);

  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const f = document.createElement('div');
      f.className = 'fire-cloud show';
      f.textContent = pick(['🔥', '💥']);
      f.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 200) + 'px';
      f.style.top  = (rect.top + rect.height * 0.4 + Math.random() * 100) + 'px';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 1000);
    }, 80 + i * 80);
  }
}

// ═══════════════════════════════════════════════════════════════════
// SNACKS
// ═══════════════════════════════════════════════════════════════════
function chooseLetters() {
  const available = LETTERS.filter(l => !state.usedLetters.includes(l));
  const target = available.length ? pick(available) : pick(LETTERS);
  state.usedLetters.push(target);
  if (state.usedLetters.length > 12) state.usedLetters.shift();

  const others = [];
  const pool = LETTERS.filter(l => l !== target);
  while (others.length < SNACKS_PER_ROUND - 1) {
    const p = pick(pool);
    if (!others.includes(p)) others.push(p);
  }
  const letters = shuffle([target, ...others]);
  return { target, letters };
}

// Assign a random cell position within the snack area grid
function randomSnackPosition(slot) {
  const area = $('snackArea');
  const rect = area.getBoundingClientRect();
  const cols = 3;
  const rows = 2;
  const snackSize = Math.min(110, rect.width / cols * 0.75);
  const padX = 20;
  const padY = 10;
  const cellW = (rect.width - padX * 2) / cols;
  const cellH = (rect.height - padY * 2) / rows;
  const col = slot % cols;
  const row = Math.floor(slot / cols);
  const x = padX + col * cellW + (cellW - snackSize) / 2 + (Math.random() - 0.5) * 18;
  const y = padY + row * cellH + (cellH - snackSize) / 2 + (Math.random() - 0.5) * 14;
  return { x, y };
}

function createSnack(letter, x, y, slot, isTarget) {
  const el = document.createElement('div');
  el.className = 'snack floating popin';
  const shape = pick(SNACK_SHAPES);
  el.classList.add('snack-shape-' + shape);
  el.dataset.letter = letter;
  el.dataset.slot = slot;
  if (isTarget) el.classList.add('target');
  el.innerHTML = `
    <div class="snack-body"></div>
    <div class="snack-letter">${letter}</div>
  `;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  // Stagger float phase so they don't all move in sync
  el.style.animationDelay = `0s, ${(Math.random() * 1.5).toFixed(2)}s`;
  el.style.animationDuration = `0.5s, ${(1.6 + Math.random() * 0.8).toFixed(2)}s`;
  setTimeout(() => el.classList.remove('popin'), 500);
  onTap(el, () => onSnackTap(el, letter));
  return el;
}

function layoutSnacks(letters) {
  const area = $('snackArea');
  area.innerHTML = '';
  state.snacks = [];
  letters.forEach((letter, slot) => {
    const { x, y } = randomSnackPosition(slot);
    const isTarget = (letter === state.targetLetter);
    const el = createSnack(letter, x, y, slot, isTarget);
    area.appendChild(el);
    state.snacks.push(el);
  });
  area.classList.add('active');
}

// Respawn a single replacement snack in a specific slot.
// Respawn a DISTRACTOR (never the target) — target slot is handled by next round.
function respawnSnack(slot) {
  if (state.ending) return;
  // Avoid duplicating letters currently present and the target
  const existing = state.snacks.map(s => s.dataset.letter);
  const pool = LETTERS.filter(l => l !== state.targetLetter && !existing.includes(l));
  const letter = pool.length ? pick(pool) : pick(LETTERS.filter(l => l !== state.targetLetter));
  const { x, y } = randomSnackPosition(slot);
  const el = createSnack(letter, x, y, slot, false);
  $('snackArea').appendChild(el);
  state.snacks.push(el);
}

function clearSnacks() {
  state.snacks.forEach(s => {
    s.classList.add('poof');
    setTimeout(() => s.remove(), 260);
  });
  state.snacks = [];
}

// Fly snack into dragon mouth — SNAPPY ~300ms
function flySnackToMouth(snack) {
  audio.tone('whoosh');
  const sr = snack.getBoundingClientRect();
  const d = dragon();
  const dr = d.getBoundingClientRect();
  const mx = dr.left + dr.width / 2;
  const my = dr.top + dr.height * 0.78;
  const dx = mx - (sr.left + sr.width / 2);
  const dy = my - (sr.top + sr.height / 2);

  snack.classList.remove('floating');
  snack.classList.add('flying');
  // Double-bounce: quick squish, then spring-arc to mouth
  snack.style.transition = 'transform 0.12s cubic-bezier(0.34,1.56,0.64,1), opacity 0.1s';
  snack.style.transform = 'scale(0.7) rotate(-10deg)';
  setTimeout(() => {
    snack.style.transition = 'transform 0.28s cubic-bezier(0.55, 0, 0.7, 1), opacity 0.15s';
    snack.style.transform = `translate(${dx}px, ${dy}px) rotate(360deg) scale(0.3)`;
    setTimeout(() => { snack.style.opacity = '0'; }, 240);
  }, 110);
  // NOT awaited — fire and forget. The caller triggers chomp immediately on a short timer.
  setTimeout(() => { snack.remove(); }, 430);
}

// Spit out wrong snack — playful
function spitSnack(snack) {
  audio.tone('yuck');
  const sr = snack.getBoundingClientRect();
  const dx = (sr.left + sr.width / 2) < window.innerWidth / 2 ? -140 : 140;
  snack.style.setProperty('--spit-x', dx + 'px');
  snack.classList.remove('floating');
  snack.classList.add('spitting');
  const slot = parseInt(snack.dataset.slot, 10);
  setTimeout(() => {
    snack.remove();
    state.snacks = state.snacks.filter(s => s !== snack);
    // Respawn replacement distractor
    if (!state.ending && state.running) respawnSnack(slot);
  }, 600);
}

// ═══════════════════════════════════════════════════════════════════
// FLOW — NO AWAITING VOICE. Child is never blocked.
// ═══════════════════════════════════════════════════════════════════
let busy = false; // very short UI lock (only during snack-to-mouth flight)

function onSnackTap(snack, letter) {
  if (state.ending) return;
  if (snack.classList.contains('flying') || snack.classList.contains('spitting')) return;

  // Quick squish feedback on ANY tap
  snack.classList.remove('squish');
  void snack.offsetWidth;
  snack.classList.add('squish');
  audio.tone('pop');
  setTimeout(() => snack.classList.remove('squish'), 350);

  if (letter === state.targetLetter) {
    feedDragon(snack);
  } else {
    // Wrong — spits it out playfully, game CONTINUES
    spitSnack(snack);
    dragonDisgusted();
    audio.dragonSay('wrong'); // fire-and-forget, NOT awaited
  }
}

function feedDragon(snack) {
  // Clear target state so double-tap can't count twice
  const slot = parseInt(snack.dataset.slot, 10);
  snack.classList.remove('target');
  state.snacks = state.snacks.filter(s => s !== snack);

  // Fly to mouth (fire-and-forget visual)
  flySnackToMouth(snack);

  // Chomp almost immediately — overlaps with flight for snappy feel
  setTimeout(() => {
    dragonChomp();
    const dRect = dragon().getBoundingClientRect();
    spawnCrumbs(dRect.left + dRect.width / 2, dRect.top + dRect.height * 0.75, 14);
    audio.tone('sparkle');
    spawnSparkles(dRect.left + dRect.width / 2, dRect.top + dRect.height * 0.65, 10);
    // Fire-and-forget happy voice clip
    audio.dragonSay(pick(HAPPY_POOL));
    // Random nostril smoke puff
    if (Math.random() > 0.5) spawnNostrilSmoke();
  }, 180);

  // Count the feed + grow dragon immediately
  state.feedsDone++;
  $('feedCount').textContent = state.feedsDone;
  const newScale = 1.0 + (state.feedsDone / TOTAL_FEEDS) * 0.45;
  setDragonSize(newScale);

  // Happy hop after short beat
  setTimeout(() => dragonHop(), 450);

  // Check end condition
  if (state.feedsDone >= TOTAL_FEEDS) {
    setTimeout(() => endGame(), 550);
    return;
  }

  // Immediately set up the NEXT target + respawn target snack in same slot (no dead air)
  setTimeout(() => nextRound(slot), 250);
}

function nextRound(reuseSlot) {
  if (state.ending) return;
  const { target, letters } = chooseLetters();
  state.targetLetter = target;
  $('targetLetter').textContent = target;

  // Bubble refresh animation (snappy re-pop)
  const bubble = $('thoughtBubble');
  bubble.classList.remove('refresh');
  void bubble.offsetWidth;
  bubble.classList.add('refresh');

  if (state.snacks.length === 0) {
    // First round — lay out all 6
    layoutSnacks(letters);
  } else {
    // Subsequent rounds — just put the new target in the freed slot
    // and refresh which one is marked as target.
    state.snacks.forEach(s => s.classList.remove('target'));
    const slotToUse = (reuseSlot !== undefined) ? reuseSlot : state.snacks[0].dataset.slot;
    // Make sure slot is truly empty
    const existingInSlot = state.snacks.find(s => parseInt(s.dataset.slot, 10) === slotToUse);
    if (existingInSlot) existingInSlot.remove();
    state.snacks = state.snacks.filter(s => parseInt(s.dataset.slot, 10) !== slotToUse);

    const { x, y } = randomSnackPosition(slotToUse);
    const el = createSnack(target, x, y, slotToUse, true);
    $('snackArea').appendChild(el);
    state.snacks.push(el);
  }

  // Announce — fire-and-forget, NOT awaited
  audio.dragonSay('want');
  audio.speakLetter(target);
}

async function endGame() {
  state.ending = true;
  audio.clearQueue();
  $('hud').style.display = 'none';
  $('feedCounter').style.display = 'none';

  setDragonSize(1.55);
  dragon().classList.add('full');

  // Big wobble + fire burp
  const d = dragon();
  d.classList.remove('wobble');
  void d.offsetWidth;
  d.classList.add('big-wobble', 'eyes-big');
  setTimeout(() => d.classList.remove('big-wobble', 'eyes-big'), 700);

  spawnNostrilSmoke();
  audio.dragonSay('full'); // fire-and-forget

  await delay(400);
  fireBreath();
  audio.tone('burp');
  audio.dragonSay('burp');

  await delay(900);

  $('scrCeleb').classList.add('active');
  audio.tone('celeb');
  launchConfetti();
  state.running = false;
}

function launchConfetti() {
  const emojis = ['🎉', '✨', '🐉', '🍰', '🍪', '🔥', '⭐', '🍩', '🌟', '💫'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = pick(emojis);
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.animationDuration = (2.2 + Math.random() * 2.2) + 's';
      c.style.fontSize = (22 + Math.random() * 22) + 'px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5200);
    }, i * 45);
  }
}

// ═══════════════════════════════════════════════════════════════════
// START / RESET
// ═══════════════════════════════════════════════════════════════════
function startGame() {
  state.running = true;
  state.ending = false;
  state.feedsDone = 0;
  state.usedLetters = [];
  state.snacks = [];
  setDragonSize(1.0);
  dragon().classList.remove('full');

  $('scrTitle').classList.remove('active');
  $('scrCeleb').classList.remove('active');
  $('dragonStage').style.display = 'flex';
  $('hud').style.display = 'flex';
  $('feedCounter').style.display = 'flex';
  $('feedCount').textContent = '0';
  $('snackArea').innerHTML = '';

  audio.startMusic();

  // Fire-and-forget intro
  audio.dragonSay('hello');
  setTimeout(() => audio.dragonSay('hungry'), 800);

  // Kick off the first round quickly — no waiting
  setTimeout(() => nextRound(), 300);
}

// ═══════════════════════════════════════════════════════════════════
// EVENT WIRING
// ═══════════════════════════════════════════════════════════════════
onTap($('btnStart'), () => {
  audio.unlock();
  audio.tone('boing');
  startGame();
});
onTap($('btnAgain'), () => {
  audio.unlock();
  audio.tone('boing');
  startGame();
});

// Keep music alive on visibility change
document.addEventListener('visibilitychange', () => {
  if (document.hidden) audio.stopMusic();
  else if (state.running) audio.startMusic();
});

// Relayout snacks on resize
window.addEventListener('resize', () => {
  if (state.snacks.length && state.running) {
    state.snacks.forEach(s => {
      const slot = parseInt(s.dataset.slot, 10);
      const { x, y } = randomSnackPosition(slot);
      s.style.left = x + 'px';
      s.style.top  = y + 'px';
    });
  }
});

/* ═══ AHA! PROGRESS TRACKING ═══ */
(function(){ function getKey(){ var parts=location.pathname.split('/').filter(Boolean); var last=parts[parts.length-1]||'index.html'; var game=last.replace('.html',''); var theme=parts[parts.length-2]||'root'; if(game==='') game='index'; return theme+'/'+game; } function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } } function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} } function markAttempt(){ var p=load(), k=getKey(); if(!p[k]) p[k]={ attempted:true, attemptedAt:Date.now() }; save(p); } function markComplete(){ var p=load(), k=getKey(); if(!p[k]) p[k]={}; p[k].completed=true; p[k].completedAt=Date.now(); p[k].plays=(p[k].plays||0)+1; save(p); } var celeb=document.getElementById('scrCeleb'); if(celeb){ var obs=new MutationObserver(function(){ if(celeb.classList.contains('active')) markComplete(); }); obs.observe(celeb, { attributes:true, attributeFilter:['class'] }); } setTimeout(markAttempt, 3000); })();
</script>
