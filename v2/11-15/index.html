<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a2e5c">
<title>Ocean Adventure — Numbers 11–15 · aha!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Arial Rounded MT Bold','Nunito','Quicksand',system-ui,-apple-system,Arial,sans-serif;
  background:radial-gradient(ellipse at top,#1a5490 0%,#0a2e5c 50%,#051e40 100%);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.fx-canvas{position:fixed;inset:0;z-index:100;pointer-events:none}

.main{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:30px 20px 60px}

.back-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(0,191,165,0.25);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#7DD3C0;
  text-decoration:none;
  padding:10px 18px;
  border-radius:24px;
  font-weight:700;
  font-size:14px;
  border:1px solid rgba(0,191,165,0.4);
  transition:transform 0.2s,background 0.2s;
  margin-bottom:30px;
}
.back-btn:hover{background:rgba(0,191,165,0.4);color:#FFF;transform:translateX(-3px)}

.music-btn{
  position:fixed;
  top:16px;
  right:16px;
  z-index:50;
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:rgba(0,191,165,0.25);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#7DD3C0;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform 0.2s,background 0.2s;
  border:1px solid rgba(0,191,165,0.4);
}
.music-btn:hover{background:rgba(0,191,165,0.4);color:#FFF;transform:scale(1.08)}

.page-header{text-align:center;margin-bottom:36px}
.wave-icon{font-size:60px;display:inline-block;animation:wobble 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(0,191,165,0.5))}
@keyframes wobble{0%,100%{transform:rotate(-6deg) translateY(0)}50%{transform:rotate(6deg) translateY(-6px)}}
.page-title{
  font-size:clamp(28px,7vw,42px);
  font-weight:900;
  margin:10px 0 6px;
  color:#00F5D4;
  text-shadow:0 0 20px rgba(0,245,212,0.6),0 3px 0 rgba(0,0,0,0.4);
  letter-spacing:-0.5px;
}
.page-sub{
  font-size:clamp(13px,3.5vw,16px);
  letter-spacing:0.3em;
  text-transform:uppercase;
  font-weight:700;
  color:#FFD47A;
  text-shadow:0 0 15px rgba(255,212,122,0.5);
}

.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.game-card{
  border-radius:22px;
  padding:22px 14px 18px;
  text-decoration:none;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  transition:transform 0.25s ease,box-shadow 0.25s ease;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.08);
}
.game-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 55%);
  pointer-events:none;
}
.game-card:hover,.game-card:focus{transform:translateY(-6px) scale(1.02);box-shadow:0 14px 30px rgba(0,191,165,0.3)}
.game-card:active{transform:translateY(-2px)}

.gc-1{background:linear-gradient(145deg,#0891B2,#164E63)}
.gc-2{background:linear-gradient(145deg,#0F766E,#134E4A)}
.gc-3{background:linear-gradient(145deg,#F97316,#9A3412)}
.gc-4{background:linear-gradient(145deg,#8B5CF6,#5B21B6)}
.gc-5{background:linear-gradient(145deg,#0E7490,#155E75)}

.card-emoji{font-size:clamp(44px,11vw,58px);margin-bottom:10px;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.4));animation:emojiBob 4s ease-in-out infinite}
.game-card:nth-child(even) .card-emoji{animation-delay:1.5s}
@keyframes emojiBob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(-4deg)}}

.card-title{font-size:clamp(14px,3.5vw,17px);font-weight:800;margin-bottom:6px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
.card-pill{
  font-size:10px;
  font-weight:700;
  padding:3px 10px;
  border-radius:18px;
  background:rgba(0,0,0,0.35);
  color:rgba(255,255,255,0.9);
  letter-spacing:0.05em;
  text-transform:uppercase;
  border:1px solid rgba(255,255,255,0.1);
}

.tap-ring{
  position:fixed;
  border-radius:50%;
  border:3px solid rgba(0,245,212,0.9);
  pointer-events:none;
  z-index:99;
  animation:tapRing 0.6s ease-out forwards;
  box-shadow:0 0 20px rgba(0,245,212,0.6);
}
@keyframes tapRing{
  0%{width:0;height:0;opacity:1}
  100%{width:120px;height:120px;opacity:0;border-width:1px}
}

.footer{text-align:center;padding:30px 20px 10px;color:rgba(125,211,192,0.5);font-size:12px;letter-spacing:0.05em}

@media(max-width:480px){
  .game-grid{grid-template-columns:1fr;gap:12px}
  .main{padding:24px 16px 50px}
  .game-card{flex-direction:row;gap:16px;text-align:left;padding:18px 16px;align-items:center}
  .card-emoji{font-size:46px;margin-bottom:0;flex-shrink:0}
  .card-info{display:flex;flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>
<canvas class="fx-canvas" id="fxCanvas"></canvas>

<button class="music-btn" id="musicBtn" aria-label="Toggle music">🔇</button>

<div class="main">
  <a href="../../" class="back-btn">← Back to aha!</a>

  <div class="page-header">
    <div class="wave-icon">🌊</div>
    <h1 class="page-title">Ocean Adventure</h1>
    <div class="page-sub">Numbers 11 – 15</div>
  </div>

  <div class="game-grid">
    <a href="card-match.html" class="game-card gc-1">
      <span class="card-emoji">🧜‍♀️</span>
      <div class="card-info">
        <div class="card-title">Card Match</div>
        <span class="card-pill">Matching</span>
      </div>
    </a>
    <a href="pairs.html" class="game-card gc-2">
      <span class="card-emoji">🐚</span>
      <div class="card-info">
        <div class="card-title">Pairs</div>
        <span class="card-pill">Memory</span>
      </div>
    </a>
    <a href="bubble-pop.html" class="game-card gc-3">
      <span class="card-emoji">🐠</span>
      <div class="card-info">
        <div class="card-title">Catch the Fish</div>
        <span class="card-pill">Tap Fast</span>
      </div>
    </a>
    <a href="sequence.html" class="game-card gc-4">
      <span class="card-emoji">🐙</span>
      <div class="card-info">
        <div class="card-title">Sequence</div>
        <span class="card-pill">Order</span>
      </div>
    </a>
    <a href="tracing.html" class="game-card gc-5">
      <span class="card-emoji">🪸</span>
      <div class="card-info">
        <div class="card-title">Tracing</div>
        <span class="card-pill">Writing</span>
      </div>
    </a>
  </div>

  <div class="footer">aha! · Ocean Adventure</div>
</div>

<script>
/* Rising bubbles + floating sea particles */
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let bits = [];
  const COUNT = 70;

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = document.documentElement.scrollHeight;
  }

  function init(){
    resize();
    bits = [];
    for(let i = 0; i < COUNT; i++){
      bits.push({
        x:Math.random() * canvas.width,
        y:Math.random() * canvas.height,
        r:Math.random() * 3 + 1,
        vy:-(Math.random() * 0.5 + 0.15),
        vx:(Math.random() - 0.5) * 0.2,
        alpha:Math.random() * 0.5 + 0.2,
        hue:Math.random() > 0.7 ? '#FFD47A' : (Math.random() > 0.5 ? '#00F5D4' : '#7DD3C0')
      });
    }
  }

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(const b of bits){
      b.x += b.vx; b.y += b.vy;
      if(b.y < -10) b.y = canvas.height + 10;
      if(b.x < -10) b.x = canvas.width + 10;
      if(b.x > canvas.width + 10) b.x = -10;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = b.hue;
      ctx.globalAlpha = b.alpha;
      ctx.shadowColor = b.hue;
      ctx.shadowBlur = 10;
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  draw();
})();

/* Confetti */
(function(){
  const canvas = document.getElementById('fxCanvas');
  const ctx = canvas.getContext('2d');
  let parts = [];
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['#00F5D4','#FFD47A','#7DD3C0','#FF6B9D','#FFF','#0891B2'];
  window.burstConfetti = function(x, y, count = 35){
    for(let i = 0; i < count; i++){
      const a = (Math.PI * 2 * i) / count + Math.random() * 0.5;
      const s = Math.random() * 6 + 3;
      parts.push({
        x, y,
        vx:Math.cos(a) * s,
        vy:Math.sin(a) * s - 2,
        color:COLORS[Math.floor(Math.random() * COLORS.length)],
        size:Math.random() * 6 + 3,
        rot:Math.random() * Math.PI,
        vr:(Math.random() - 0.5) * 0.3,
        life:1,
        shape:Math.random() > 0.5 ? 'rect' : 'star'
      });
    }
  };
  function loop(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(let i = parts.length - 1; i >= 0; i--){
      const p = parts[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.vx *= 0.99;
      p.rot += p.vr; p.life -= 0.012;
      if(p.life <= 0){ parts.splice(i, 1); continue; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      if(p.shape === 'rect'){
        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      } else {
        ctx.beginPath();
        for(let k = 0; k < 5; k++){
          const ang = (k * 2 * Math.PI) / 5 - Math.PI/2;
          const r = k % 2 === 0 ? p.size/2 : p.size/4;
          ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
        }
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

/* Audio */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTapSound(){
  const c = ensureAudio();
  const now = c.currentTime;
  // Gentle bubble/water chime
  [523.25, 783.99].forEach((f, i) => {
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, now);
    osc.frequency.exponentialRampToValueAtTime(f * 1.1, now + 0.2);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.1, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
    osc.connect(g).connect(c.destination);
    osc.start(now + i * 0.05);
    osc.stop(now + 0.35);
  });
}

document.querySelectorAll('.game-card').forEach(card => {
  card.addEventListener('click', function(e){
    e.preventDefault();
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const ring = document.createElement('div');
    ring.className = 'tap-ring';
    ring.style.left = cx + 'px';
    ring.style.top = cy + 'px';
    ring.style.transform = 'translate(-50%,-50%)';
    document.body.appendChild(ring);
    setTimeout(() => ring.remove(), 600);
    window.burstConfetti(cx, cy, 35);
    playTapSound();
    const href = card.getAttribute('href');
    setTimeout(() => { window.location.href = href; }, 380);
  });
});

/* Dreamy ocean ambient music — major pentatonic */
(function(){
  const btn = document.getElementById('musicBtn');
  let playing = false, nextNote = 0, scheduler = null, master = null;
  // C major pentatonic — dreamy, oceanic
  const SCALE = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
  const CHORDS = [
    [130.81, 196.00, 261.63], // C
    [174.61, 220.00, 293.66], // Dm
    [196.00, 293.66, 329.63], // G
    [220.00, 329.63, 392.00]  // Am
  ];
  let ci = 0, ni = 0;

  function note(f, when, dur, gain = 0.04, type = 'sine'){
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(gain, when + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.connect(g).connect(master);
    o.start(when); o.stop(when + dur + 0.05);
  }

  function sched(){
    while(nextNote < audioCtx.currentTime + 0.25){
      note(SCALE[Math.floor(Math.random() * SCALE.length)], nextNote, 0.8, 0.025, 'triangle');
      if(ni % 4 === 0){
        CHORDS[ci % CHORDS.length].forEach(f => note(f, nextNote, 2.8, 0.018, 'sine'));
        ci++;
      }
      ni++;
      nextNote += 0.65;
    }
  }

  function start(){
    ensureAudio();
    master = audioCtx.createGain();
    master.gain.value = 0;
    master.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 1);
    master.connect(audioCtx.destination);
    nextNote = audioCtx.currentTime + 0.1;
    ni = 0; ci = 0;
    scheduler = setInterval(sched, 50);
    playing = true;
    btn.textContent = '🎵';
    try { localStorage.setItem('aha_music', '1'); } catch(e){}
  }

  function stop(){
    if(master){
      const now = audioCtx.currentTime;
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(master.gain.value, now);
      master.gain.linearRampToValueAtTime(0, now + 0.4);
      setTimeout(() => { try { master.disconnect(); } catch(e){} master = null; }, 500);
    }
    clearInterval(scheduler);
    playing = false;
    btn.textContent = '🔇';
    try { localStorage.setItem('aha_music', '0'); } catch(e){}
  }

  btn.addEventListener('click', () => { if(playing) stop(); else start(); });

  let auto = false;
  function tryAuto(){
    if(auto) return; auto = true;
    let pref = null;
    try { pref = localStorage.getItem('aha_music'); } catch(e){}
    if(pref !== '0') start();
  }
  ['pointerdown','keydown','touchstart'].forEach(ev => document.addEventListener(ev, tryAuto, { once:true }));
})();
</script>
</body>
</html>
