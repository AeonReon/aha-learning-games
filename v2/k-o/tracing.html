<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Carve Ice Letters — Bramble's Magic Mountain</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --ice-deep: #0a1a2e;
  --ice-blue: #0ea5e9;
  --ice-silver: #cbd5e1;
  --ice-lavender: #c4b5fd;
  --ice-white: #f0f9ff;
  --ice-gold: #fde68a;
  --white85: rgba(255,255,255,0.85);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: var(--ice-deep);
}

/* ── Background ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(180deg, #0a1a2e 0%, #162850 30%, #1e3a5f 55%, #2d5a7f 75%, #e0f2fe 100%);
}
/* Aurora waves */
.aurora {
  position: fixed; top: 0; left: 0; right: 0;
  height: 45vh;
  z-index: 1;
  pointer-events: none;
  opacity: 0.55;
  background:
    radial-gradient(ellipse 60% 30% at 20% 30%, rgba(14,165,233,0.6), transparent 70%),
    radial-gradient(ellipse 55% 28% at 60% 20%, rgba(196,181,253,0.55), transparent 70%),
    radial-gradient(ellipse 50% 25% at 85% 35%, rgba(110,231,183,0.5), transparent 70%);
  filter: blur(18px);
  animation: auroraShift 12s ease-in-out infinite alternate;
}
@keyframes auroraShift {
  0%   { transform: translateX(0) scaleY(1); opacity: 0.45; }
  50%  { transform: translateX(-30px) scaleY(1.1); opacity: 0.7; }
  100% { transform: translateX(20px) scaleY(0.95); opacity: 0.5; }
}
/* Snowy mountains */
.mountain {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 2;
  pointer-events: none;
  height: 45vh;
}
.mountain svg { width: 100%; height: 100%; display: block; }

/* Snowflakes */
.snowflake {
  position: fixed; pointer-events: none; z-index: 3;
  color: #fff;
  animation: snowFall linear infinite;
  text-shadow: 0 0 6px rgba(240,249,255,0.8);
}
@keyframes snowFall {
  0%   { transform: translateY(-10vh) translateX(0) rotate(0); opacity: 0; }
  10%  { opacity: 0.9; }
  90%  { opacity: 0.9; }
  100% { transform: translateY(110vh) translateX(40px) rotate(360deg); opacity: 0; }
}

/* Screen system */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* Title screen */
.screen-title h1 {
  font-size: clamp(28px, 7vw, 50px);
  color: var(--ice-white);
  text-shadow: 0 0 30px rgba(14,165,233,0.8), 2px 2px 0 rgba(0,0,0,0.35);
  margin: 6px 0 8px;
}
.screen-title .icon-row {
  display: flex; gap: 10px;
  justify-content: center; align-items: center;
  margin-bottom: 10px;
  font-size: clamp(36px, 9vw, 60px);
}
.screen-title p {
  font-size: clamp(14px, 3.5vw, 20px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
}

/* Buttons */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #0a1a2e; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(14,165,233,0.5);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start {
  background: linear-gradient(135deg, #7dd3fc, #0ea5e9, #c4b5fd);
  color: #0a1a2e;
  margin-top: 18px;
  animation: glow 2.4s ease-in-out infinite;
}
.btn-again { background: linear-gradient(135deg, #7dd3fc, #0ea5e9, #c4b5fd); color: #0a1a2e; margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.25)} }

/* HUD */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(10,26,46,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(14,165,233,0.35);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(240,249,255,0.5); font-weight: bold; letter-spacing: 0.05em; }
.hud-val   { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--ice-blue); }
.hud-score .hud-val { color: var(--ice-white); text-shadow: 0 0 10px rgba(14,165,233,0.6); }
.hud-center .hud-val { color: var(--ice-white); font-size: clamp(18px,4vw,28px); text-shadow: 0 0 10px rgba(14,165,233,0.7); }

/* Character */
.char-area {
  position: fixed; bottom: 58px; left: 10px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji {
  font-size: clamp(44px,10vw,66px);
  filter: drop-shadow(0 0 10px rgba(14,165,233,0.6));
  display: inline-block;
}
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(240,249,255,0.98); color: #0a1a2e;
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(12px,2.6vw,16px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(14,165,233,0.4);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(240,249,255,0.98);
}
@keyframes charJump {
  0%   { transform: translateY(0); }
  40%  { transform: translateY(-15px) rotate(-4deg); }
  70%  { transform: translateY(-5px) rotate(2deg); }
  100% { transform: translateY(0) rotate(0); }
}

/* Canvas area */
.canvas-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 56px;
  z-index: var(--z-game);
  display: flex; align-items: center; justify-content: center;
  padding: 8px;
}
.canvas-area canvas {
  border-radius: 18px;
  box-shadow: 0 0 40px rgba(14,165,233,0.3), 0 6px 30px rgba(0,0,0,0.5);
  background: rgba(10,26,46,0.55);
  border: 2px solid rgba(203,213,225,0.25);
}

/* Letter display */
.letter-display {
  position: fixed;
  top: 56px; right: 12px;
  z-index: var(--z-ui);
  pointer-events: none;
}
.letter-display .big-letter {
  font-size: clamp(40px,10vw,70px);
  font-weight: 900;
  color: var(--ice-white);
  text-shadow: 0 0 20px rgba(14,165,233,0.75);
  line-height: 1;
}
.letter-display .sub-label {
  font-size: clamp(10px,2vw,14px);
  color: rgba(240,249,255,0.6);
  text-align: center;
}

/* Progress bar */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-ui); height: 56px;
  background: rgba(10,26,46,0.92); backdrop-filter: blur(6px);
  border-top: 2px solid rgba(14,165,233,0.35);
  display: flex; align-items: center; justify-content: center; gap: clamp(6px,2vw,14px);
  padding: 0 12px;
}
.prog-dot {
  width: clamp(32px,8vw,44px); height: clamp(32px,8vw,44px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,3.2vw,20px); font-weight: 900;
  background: rgba(255,255,255,0.08); color: rgba(240,249,255,0.35);
  border: 2px solid rgba(255,255,255,0.08);
  transition: all 0.4s;
}
.prog-dot.active {
  background: rgba(14,165,233,0.25); color: var(--ice-white);
  border-color: var(--ice-blue);
  box-shadow: 0 0 14px rgba(14,165,233,0.6);
}
.prog-dot.done {
  background: linear-gradient(135deg, #7dd3fc, #c4b5fd);
  color: #0a1a2e; border-color: var(--ice-white);
  box-shadow: 0 0 18px rgba(203,213,225,0.6);
}

/* Ice Crystal Cave */
.crystal-cave {
  position: fixed; top: 60px; left: 8px;
  z-index: var(--z-char);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.cave-icon {
  font-size: clamp(28px,6vw,40px);
  filter: drop-shadow(0 0 8px rgba(14,165,233,0.6));
}
.cave-crystals {
  display: flex; gap: 2px; flex-wrap: wrap; max-width: 64px; justify-content: center;
}
.crystal {
  width: 9px; height: 12px;
  background: rgba(255,255,255,0.1);
  transition: all 0.5s;
  clip-path: polygon(50% 0, 100% 30%, 85% 100%, 15% 100%, 0 30%);
}
.crystal.lit {
  background: linear-gradient(135deg, #7dd3fc, #c4b5fd, #f0f9ff);
  box-shadow: 0 0 8px rgba(125,211,252,0.9);
  animation: crystalPop 0.6s ease-out;
}
@keyframes crystalPop {
  0% { transform: scale(0) rotate(-180deg); }
  60% { transform: scale(1.6) rotate(10deg); }
  100% { transform: scale(1) rotate(0); }
}

/* Level banner */
.level-banner {
  position: fixed; inset: 0;
  z-index: var(--z-celeb);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(10,26,46,0.94);
  opacity: 0; visibility: hidden; pointer-events: none;
  transition: opacity 0.4s;
}
.level-banner.show { opacity: 1; visibility: visible; pointer-events: auto; }
.level-banner h2 {
  font-size: clamp(24px,6vw,42px);
  color: var(--ice-white);
  text-shadow: 0 0 20px rgba(14,165,233,0.75);
  margin-bottom: 6px;
}
.level-banner p {
  font-size: clamp(14px,3.5vw,20px);
  color: var(--white85);
}

/* Confetti / ice shards */
.confetti {
  position: fixed; pointer-events: none;
  z-index: var(--z-celeb);
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
}
.starburst {
  position: fixed; pointer-events: none; z-index: var(--z-celeb);
  animation: starPop 0.8s ease-out forwards;
}
@keyframes starPop {
  0%   { transform: scale(0) rotate(0); opacity: 1; }
  60%  { transform: scale(1.5) rotate(180deg); opacity: 0.85; }
  100% { transform: scale(0.5) rotate(360deg) translateY(-40px); opacity: 0; }
}

/* Aurora cascade overlay for game complete */
.aurora-cascade {
  position: fixed; inset: 0;
  z-index: var(--z-celeb);
  pointer-events: none;
  background:
    linear-gradient(90deg, transparent, rgba(14,165,233,0.3), transparent),
    linear-gradient(90deg, transparent, rgba(196,181,253,0.3), transparent),
    linear-gradient(90deg, transparent, rgba(110,231,183,0.3), transparent);
  opacity: 0; transition: opacity 0.6s;
}
.aurora-cascade.show { opacity: 1; animation: cascadeShift 3s ease-in-out infinite; }
@keyframes cascadeShift {
  0%,100% { background-position: 0% 0%, 50% 0%, 100% 0%; }
  50% { background-position: 100% 0%, 0% 0%, 50% 0%; }
}

/* Celebration screen */
.screen-celeb h1 {
  font-size: clamp(26px,6.5vw,46px);
  color: var(--ice-white);
  text-shadow: 0 0 30px rgba(14,165,233,0.8), 2px 2px 0 rgba(0,0,0,0.35);
  margin-bottom: 12px;
}
.screen-celeb p {
  font-size: clamp(16px,4vw,22px);
  color: var(--white85); line-height: 1.5;
}
.screen-celeb .final-crystal {
  font-size: clamp(60px,15vw,100px);
  margin: 16px 0;
  animation: crystalPulse 1.5s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(14,165,233,0.8));
}
@keyframes crystalPulse {
  0%,100% { transform: scale(1) rotate(0); }
  25% { transform: scale(1.08) rotate(-3deg); }
  50% { transform: scale(1.12) rotate(0); }
  75% { transform: scale(1.08) rotate(3deg); }
}
.final-score {
  font-size: clamp(18px,4.5vw,28px);
  color: var(--ice-white); font-weight: 900;
  margin-top: 8px;
  text-shadow: 0 0 10px rgba(14,165,233,0.7);
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg" id="bg"></div>
<div class="aurora" id="aurora"></div>
<div class="mountain">
  <svg viewBox="0 0 1000 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Far mountains -->
    <polygon points="0,400 0,250 120,180 230,220 340,150 460,200 580,130 700,180 820,150 920,200 1000,170 1000,400" fill="#1e3a5f" opacity="0.85"/>
    <!-- Near mountains with snow caps -->
    <polygon points="0,400 0,300 80,230 180,280 280,200 380,260 480,180 580,240 680,200 780,260 880,220 1000,270 1000,400" fill="#2d5a7f"/>
    <!-- Snow caps -->
    <polygon points="80,230 110,250 150,245 180,280 155,260 125,258" fill="#f0f9ff" opacity="0.9"/>
    <polygon points="280,200 310,220 350,215 380,260 350,235 315,230" fill="#f0f9ff" opacity="0.9"/>
    <polygon points="480,180 515,205 555,200 580,240 545,215 510,210" fill="#f0f9ff" opacity="0.9"/>
    <polygon points="680,200 710,220 750,215 780,260 745,230 715,225" fill="#f0f9ff" opacity="0.9"/>
    <polygon points="880,220 905,240 940,235 1000,270 960,250 920,245" fill="#f0f9ff" opacity="0.9"/>
    <!-- Snow ground -->
    <polygon points="0,400 0,340 1000,320 1000,400" fill="#e0f2fe"/>
  </svg>
</div>

<!-- Title Screen -->
<div class="screen screen-title active" id="screenTitle">
  <div class="icon-row"><span>🧊</span><span>❄️</span><span>✨</span></div>
  <h1>Carve Ice Letters</h1>
  <p>Help Bramble the yeti carve letters into the magic mountain ice! Trace each letter with your finger!</p>
  <button class="btn btn-start" id="btnStart">Start Carving!</button>
</div>

<!-- Game Screen (HUD + Canvas + Progress) -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <div class="hud-label">LEVEL</div>
    <div class="hud-val" id="hudLevel">1</div>
  </div>
  <div class="hud-center">
    <div class="hud-val" id="hudLetter">K</div>
  </div>
  <div class="hud-right hud-score">
    <div class="hud-label">CRYSTALS</div>
    <div class="hud-val" id="hudScore">0</div>
  </div>
</div>

<!-- Letter display -->
<div class="letter-display" id="letterDisplay" style="display:none">
  <div class="big-letter" id="bigLetter">K</div>
  <div class="sub-label" id="letterSubLabel"></div>
</div>

<!-- Ice Crystal Cave -->
<div class="crystal-cave" id="crystalCave" style="display:none">
  <div class="cave-icon">🧊</div>
  <div class="cave-crystals" id="caveCrystals"></div>
</div>

<!-- Canvas -->
<div class="canvas-area" id="canvasArea" style="display:none">
  <canvas id="traceCanvas"></canvas>
</div>

<!-- Progress bar -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- Character -->
<div class="char-area" id="charArea" style="display:none">
  <span class="char-emoji" id="charEmoji">❄️</span>
  <div class="char-bubble" id="charBubble"></div>
</div>

<!-- Level Banner -->
<div class="level-banner" id="levelBanner">
  <h2 id="bannerTitle">Level 1</h2>
  <p id="bannerSub">Follow the icy guide!</p>
</div>

<!-- Aurora cascade -->
<div class="aurora-cascade" id="auroraCascade"></div>

<!-- Celebration Screen -->
<div class="screen screen-celeb" id="screenCeleb">
  <h1>Ice Crystal Cave Complete!</h1>
  <div class="final-crystal">🧊❄️</div>
  <p>Bramble's cave shines with aurora!<br>You are ice-magnificent!</p>
  <div class="final-score" id="finalScore">20 Crystals!</div>
  <button class="btn btn-again" id="btnAgain">Play Again!</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════════════════════
const AUDIO_BASE = '../../audio';

const VOICE_B = {

  ],
  wrong: [
    'voice-b/wrong/not-that-one-but-youll-find-it.mp3',
    'voice-b/wrong/so-close-have-another-lovely-go.mp3',
    'voice-b/wrong/nearly-there-my-clever-one.mp3',
    'voice-b/wrong/keep-trying-youre-doing-so-well.mp3',
    'voice-b/wrong/dont-worry-try-once-more.mp3',
    'voice-b/wrong/have-another-go-you-can-do-it.mp3',

  ],

    'voice-b/round-complete/gorgeous-work-keep-going.mp3',
    'voice-b/round-complete/oh-how-marvellous-round-done.mp3',
  ],
  'game-complete': [

    'voice-b/game-complete/i-am-so-proud-of-you.mp3',
    'voice-b/game-complete/you-are-truly-amazing.mp3',
    'voice-b/game-complete/what-a-star-you-are.mp3',
    'voice-b/game-complete/oh-my-goodness-you-did-it.mp3',
  ],
};

const LETTERS = ['k','l','m','n','o'];

class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.06; this.sfxVol = 0.3; this.musicDucked = 0.018;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Cool icy pentatonic
    const notes = [261.63, 311.13, 349.23, 392.00, 466.16, 523.25, 587.33];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.6 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.7 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.10, this.ctx.currentTime + 0.25);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.8);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 3);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 1100 + Math.random() * 1600);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')   { p(587.33,t,0.15,0.35); p(698.46,t+0.12,0.18,0.4); p(880,t+0.24,0.22,0.45); }
    else if (type==='wrong')     { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')     { p(523.25,t,0.15,0.35); p(698.46,t+0.15,0.15,0.4); p(880,t+0.3,0.18,0.45); p(1174.66,t+0.48,0.35,0.5); }
    else if (type==='roundDone') { p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(880,t+0.38,0.2,0.45); }
    else if (type==='reveal')    { p(440,t,0.12,0.2); p(554.37,t+0.08,0.12,0.25); p(698.46,t+0.16,0.15,0.3); }
    else if (type==='hint')      { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')    {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='checkpoint') {
      p(700 + Math.random()*250, t, 0.08, 0.16, 'triangle');
    }
    else if (type==='iceCrack') {
      // Crystal shimmer
      p(880, t, 0.08, 0.2, 'triangle');
      p(1175, t+0.05, 0.12, 0.22, 'sine');
      p(1568, t+0.14, 0.2, 0.25, 'sine');
    }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(l) { return this.speak(`${AUDIO_BASE}/letters/${l.toLowerCase()}.mp3`); }
  clearQueue() { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ══════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════════════════
function setupCanvas() {
  canvas = $('traceCanvas');
  const area = $('canvasArea');
  const rect = area.getBoundingClientRect();
  const pad = 16;
  const w = rect.width - pad * 2;
  const h = rect.height - pad * 2;
  const size = Math.min(w, h, 400);

  dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';

  ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  canvasW = size;
  canvasH = size;
  hitRadius = canvasW * 0.15;

  // Touch/mouse events
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', onPointerUp);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false });
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function onTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  onPointerDown({ clientX: touch.clientX, clientY: touch.clientY });
}

function onTouchMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  onPointerMove({ clientX: touch.clientX, clientY: touch.clientY });
}

function onPointerDown(e) {
  if (!gameActive || guideAnimating) return;
  audio.unlock();
  isDrawing = true;
  drawPoints = [];
  const pos = getCanvasPos(e);
  drawPoints.push(pos);
  checkCheckpoint(pos);
}

function onPointerMove(e) {
  if (!isDrawing || !gameActive || guideAnimating) return;
  const pos = getCanvasPos(e);
  drawPoints.push(pos);
  drawTraceLine();
  checkCheckpoint(pos);
}

function onPointerUp() {
  isDrawing = false;
}

// ══════════════════════════════════════════════════════════════════
// DRAWING
// ══════════════════════════════════════════════════════════════════
function clearCanvas() {
  ctx.clearRect(0, 0, canvasW, canvasH);
}

function drawLetterOutline(key, opacity) {
  const cps = CHECKPOINTS[key];
  if (!cps || cps.length < 2) return;

  ctx.save();
  ctx.globalAlpha = opacity;
  // Ice-white/blue stroke
  ctx.strokeStyle = '#e0f2fe';
  ctx.lineWidth = 14;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(14,165,233,0.65)';
  ctx.shadowBlur = 18;

  ctx.beginPath();
  const pts = cps.map(p => ({ x: p.x * canvasW, y: p.y * canvasH }));

  ctx.moveTo(pts[0].x, pts[0].y);

  if (pts.length === 2) {
    ctx.lineTo(pts[1].x, pts[1].y);
  } else {
    // Check if this is letter O (closed loop, first equals last)
    const isClosed = (pts[0].x === pts[pts.length-1].x && pts[0].y === pts[pts.length-1].y);
    if (isClosed) {
      // Smooth curves for the oval
      for (let i = 1; i < pts.length - 1; i++) {
        const mx = (pts[i].x + pts[i+1].x) / 2;
        const my = (pts[i].y + pts[i+1].y) / 2;
        ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
      }
      ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
      ctx.closePath();
    } else {
      // Straight segments for angular letters (K, L, M, N)
      for (let i = 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x, pts[i].y);
      }
    }
  }

  ctx.stroke();

  // Inner light blue core
  ctx.strokeStyle = '#bae6fd';
  ctx.lineWidth = 6;
  ctx.shadowBlur = 6;
  ctx.stroke();

  ctx.restore();
}

function drawCheckpointDots() {
  const cps = traceCheckpoints;
  for (let i = 0; i < cps.length; i++) {
    const cp = cps[i];
    const x = cp.x * canvasW;
    const y = cp.y * canvasH;

    if (i < nextCheckpoint) {
      // Hit - glowing crystal dot
      ctx.save();
      ctx.shadowColor = 'rgba(125,211,252,0.95)';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#f0f9ff';
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

function drawTraceLine() {
  if (drawPoints.length < 2) return;

  // Redraw everything
  clearCanvas();
  const key = TRACE_SEQUENCE[currentTraceIndex];
  const level = LEVELS[currentLevel];
  drawLetterOutline(key, level.outlineOpacity);

  // Draw the icy trace line: cyan outer, silver middle, white core, cyan glow
  ctx.save();

  // Outer icy cyan with cyan glow
  ctx.strokeStyle = '#0ea5e9';
  ctx.lineWidth = 11;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(14,165,233,0.85)';
  ctx.shadowBlur = 16;

  ctx.beginPath();
  ctx.moveTo(drawPoints[0].x, drawPoints[0].y);
  for (let i = 1; i < drawPoints.length; i++) {
    ctx.lineTo(drawPoints[i].x, drawPoints[i].y);
  }
  ctx.stroke();

  // Middle silver layer
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 6;
  ctx.shadowColor = 'rgba(203,213,225,0.6)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(drawPoints[0].x, drawPoints[0].y);
  for (let i = 1; i < drawPoints.length; i++) {
    ctx.lineTo(drawPoints[i].x, drawPoints[i].y);
  }
  ctx.stroke();

  // White core
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = 'rgba(240,249,255,0.9)';
  ctx.shadowBlur = 5;
  ctx.beginPath();
  ctx.moveTo(drawPoints[0].x, drawPoints[0].y);
  for (let i = 1; i < drawPoints.length; i++) {
    ctx.lineTo(drawPoints[i].x, drawPoints[i].y);
  }
  ctx.stroke();

  ctx.restore();

  drawCheckpointDots();
}

// ══════════════════════════════════════════════════════════════════
// CHECKPOINT CHECKING
// ══════════════════════════════════════════════════════════════════
function checkCheckpoint(pos) {
  if (nextCheckpoint >= traceCheckpoints.length) return;

  const cp = traceCheckpoints[nextCheckpoint];
  const cpx = cp.x * canvasW;
  const cpy = cp.y * canvasH;
  const dx = pos.x - cpx;
  const dy = pos.y - cpy;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist <= hitRadius) {
    nextCheckpoint++;
    audio.tone('checkpoint');
    resetHints();

    // Redraw to show hit dot
    clearCanvas();
    const key = TRACE_SEQUENCE[currentTraceIndex];
    drawLetterOutline(key, LEVELS[currentLevel].outlineOpacity);
    drawTraceLine();
    drawCheckpointDots();

    if (nextCheckpoint >= traceCheckpoints.length) {
      onTraceComplete();
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// ANIMATED GUIDE (Level 1)
// ══════════════════════════════════════════════════════════════════
function animateGuide(key) {
  return new Promise(resolve => {
    const cps = CHECKPOINTS[key];
    if (!cps || cps.length < 2) { resolve(); return; }

    guideAnimating = true;
    const pts = cps.map(p => ({ x: p.x * canvasW, y: p.y * canvasH }));
    const totalDuration = 2200;
    const start = performance.now();

    // Build a dense path from checkpoints
    const densePoints = [];
    const steps = 100;
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const totalLen = pts.length - 1;
      const segment = t * totalLen;
      const i = Math.min(Math.floor(segment), totalLen - 1);
      const localT = segment - i;

      if (pts.length === 2) {
        densePoints.push({
          x: pts[0].x + (pts[1].x - pts[0].x) * t,
          y: pts[0].y + (pts[1].y - pts[0].y) * t
        });
      } else {
        const p0 = pts[i];
        const p1 = pts[Math.min(i + 1, pts.length - 1)];
        densePoints.push({
          x: p0.x + (p1.x - p0.x) * localT,
          y: p0.y + (p1.y - p0.y) * localT
        });
      }
    }

    const animate = (now) => {
      const elapsed = now - start;
      const progress = Math.min(elapsed / totalDuration, 1);
      const idx = Math.floor(progress * (densePoints.length - 1));

      clearCanvas();
      drawLetterOutline(key, LEVELS[currentLevel].outlineOpacity);

      // Icy sparkle trail
      ctx.save();
      const trailLen = 10;
      for (let j = Math.max(0, idx - trailLen); j <= idx; j++) {
        const p = densePoints[j];
        const alpha = 1 - (idx - j) / trailLen;
        ctx.fillStyle = `rgba(125,211,252,${alpha * 0.8})`;
        ctx.shadowColor = `rgba(14,165,233,${alpha})`;
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5 + alpha * 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Sparkle head (ice crystal)
      if (idx < densePoints.length) {
        const p = densePoints[idx];
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = 'rgba(125,211,252,1)';
        ctx.shadowBlur = 22;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        guideAnimating = false;
        clearCanvas();
        drawLetterOutline(key, LEVELS[currentLevel].outlineOpacity);
        resolve();
      }
    };

    requestAnimationFrame(animate);
  });
}

// ══════════════════════════════════════════════════════════════════
// HINTS
// ══════════════════════════════════════════════════════════════════
function resetHints() {
  clearTimeout(hintTimer);
  if (!gameActive) return;
  hintTimer = setTimeout(() => {
    if (!gameActive || guideAnimating) return;
    if (nextCheckpoint < traceCheckpoints.length) {
      const cp = traceCheckpoints[nextCheckpoint];
      const x = cp.x * canvasW;
      const y = cp.y * canvasH;

      const key = TRACE_SEQUENCE[currentTraceIndex];
      clearCanvas();
      drawLetterOutline(key, LEVELS[currentLevel].outlineOpacity);
      drawCheckpointDots();

      ctx.save();
      ctx.fillStyle = 'rgba(14,165,233,0.35)';
      ctx.shadowColor = 'rgba(14,165,233,0.85)';
      ctx.shadowBlur = 28;
      ctx.beginPath();
      ctx.arc(x, y, hitRadius * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      audio.tone('hint');
      showCharBubble('Carve here! ❄️', 2000);
    }
  }, 5000);
}

// ══════════════════════════════════════════════════════════════════
// TRACE COMPLETE
// ══════════════════════════════════════════════════════════════════
async function onTraceComplete() {
  gameActive = false;
  isDrawing = false;
  clearTimeout(hintTimer);

  const key = TRACE_SEQUENCE[currentTraceIndex];
  // Only count as a letter complete (+score, +crystal, +cheer) when this finishes a full letter.
  // K finishes at K_second; L, M, N, O finish on their own single part.
  const isLetterComplete = (key !== 'K_first');

  if (isLetterComplete) {
    score++;
    totalCrystals++;
    $('hudScore').textContent = score;
  }

  // Ice shards burst around canvas
  iceShardBurst();
  audio.tone('iceCrack');

  if (isLetterComplete) {
    lightCrystal();
    audio.tone('correct');
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT), 2000);
    await audio.play('correct');
  } else {
    // Just completed K_first, small cue
    audio.tone('checkpoint');
    showCharBubble('Now the next part! ❄️', 1600);
    await delay(400);
  }

  await delay(500);

  // Advance
  currentTraceIndex++;

  // Mark progress when letter is done
  // After K_second (index 1 done → idx 2): mark K done (prog 0)
  // After L (index 2 done → idx 3): mark prog 1
  // After M (index 3 done → idx 4): mark prog 2
  // After N (index 4 done → idx 5): mark prog 3
  // After O (index 5 done → idx 6): mark prog 4
  if (currentTraceIndex === 2) markProgDone(0); // K done
  else if (currentTraceIndex === 3) markProgDone(1); // L done
  else if (currentTraceIndex === 4) markProgDone(2); // M done
  else if (currentTraceIndex === 5) markProgDone(3); // N done
  else if (currentTraceIndex === 6) markProgDone(4); // O done

  if (currentTraceIndex >= TRACE_SEQUENCE.length) {
    currentTraceIndex = 0;
    currentLevel++;

    if (currentLevel >= LEVELS.length) {
      await onGameComplete();
    } else {
      await onLevelComplete();
    }
  } else {
    await startTrace();
  }
}

// ══════════════════════════════════════════════════════════════════
// LEVEL COMPLETE
// ══════════════════════════════════════════════════════════════════
async function onLevelComplete() {
  audio.tone('roundDone');
  confetti(34);
  showCharBubble('Level complete! ❄️', 2500);

  await audio.play('round-complete');
  await delay(1000);

  await showLevelBanner();
}

async function showLevelBanner() {
  const level = LEVELS[currentLevel];
  $('bannerTitle').textContent = level.label;
  $('bannerSub').textContent = level.sub;
  $('levelBanner').classList.add('show');

  audio.tone('reveal');
  await audio.play('greetings');
  await delay(1500);

  $('levelBanner').classList.remove('show');
  await delay(400);

  await startLevel();
}

// ══════════════════════════════════════════════════════════════════
// GAME COMPLETE
// ══════════════════════════════════════════════════════════════════
async function onGameComplete() {
  showGameUI(false);

  // Aurora cascade flash
  $('auroraCascade').classList.add('show');

  // Screen flash
  document.body.style.background = '#e0f2fe';
  await delay(120);
  document.body.style.background = '';

  audio.tone('celeb');
  confetti(70);

  $('finalScore').textContent = totalCrystals + ' Crystals!';
  showScreen('screenCeleb');

  await delay(500);
  confetti(50);

  await audio.play('game-complete');
  await delay(1500);
  await audio.play('game-complete');
  confetti(40);

  // Keep aurora cascade visible on celebration
}

// ══════════════════════════════════════════════════════════════════
// START TRACE
// ══════════════════════════════════════════════════════════════════
async function startTrace() {
  const key = TRACE_SEQUENCE[currentTraceIndex];
  const cps = CHECKPOINTS[key];
  traceCheckpoints = cps;
  nextCheckpoint = 0;
  isDrawing = false;
  drawPoints = [];
  gameActive = true;

  // Update HUD
  const level = LEVELS[currentLevel];
  $('hudLevel').textContent = currentLevel + 1;

  // Determine display info
  let dispLetter, subLabel = '';
  let isPart1 = false;
  if (key === 'K_first') {
    dispLetter = 'K';
    subLabel = 'part 1/2 — the line';
    isPart1 = true;
  } else if (key === 'K_second') {
    dispLetter = 'K';
    subLabel = 'part 2/2 — the V';
  } else {
    dispLetter = key;
    subLabel = '';
    isPart1 = true; // first (only) part
  }

  $('bigLetter').textContent = dispLetter;
  $('letterSubLabel').textContent = subLabel;
  $('hudLetter').textContent = dispLetter;

  updateProg();

  // Draw the outline
  clearCanvas();
  drawLetterOutline(key, level.outlineOpacity);

  // Speak letter ONCE at start of part 1, silent on subsequent parts
  if (isPart1) {
    audio.speakLetter(dispLetter);
  }

  // Level 1: animated guide first
  if (level.showGuide) {
    await delay(300);
    await animateGuide(key);
    showCharBubble('Your turn! Carve it! ❄️', 2000);
  } else {
    showCharBubble('Carve the letter! 🧊', 2000);
  }

  resetHints();
}

// ══════════════════════════════════════════════════════════════════
// START LEVEL
// ══════════════════════════════════════════════════════════════════
async function startLevel() {
  currentTraceIndex = 0;
  buildProg();
  await startTrace();
}

// ══════════════════════════════════════════════════════════════════
// GAME START
// ══════════════════════════════════════════════════════════════════
async function startGame() {
  audio.unlock();
  showScreen(null);
  currentLevel = 0;
  currentTraceIndex = 0;
  score = 0;
  totalCrystals = 0;
  crystalCount = 0;

  $('hudScore').textContent = '0';
  $('auroraCascade').classList.remove('show');
  showGameUI(true);
  buildCrystalCave();
  setupCanvas();

  audio.startMusic();

  // Show level 1 banner
  await showLevelBanner();
}

onTap($('btnStart'), () => startGame());

/* ═══ AHA! PROGRESS TRACKING ═══ */
(function(){
  function getKey(){
    var parts = location.pathname.split('/').filter(Boolean);
    var last = parts[parts.length-1] || 'index.html';
    var game = last.replace('.html','');
    var theme = parts[parts.length-2] || 'root';
    if (game === '') game = 'index';
    return theme + '/' + game;
  }
  function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } }
  function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} }
  function markAttempt(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = { attempted: true, attemptedAt: Date.now() };
    save(p);
  }
  function markComplete(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = {};
    p[k].completed = true;
    p[k].completedAt = Date.now();
    p[k].plays = (p[k].plays||0) + 1;
    save(p);
  }
  var celeb = document.getElementById('scrCeleb');
  if (celeb){
    var obs = new MutationObserver(function(){ if (celeb.classList.contains('active')) markComplete(); });
    obs.observe(celeb, { attributes: true, attributeFilter: ['class'] });
  }
  setTimeout(markAttempt, 3000);
})();
