<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Alphabet Arcade!</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --pink: #ec4899; --blue: #3b82f6; --green: #22c55e; --purple: #a855f7; --gold: #fbbf24;
  --dark: #0a0420; --deep: #1a0836;
  --glow-pink: rgba(236,72,153,0.7);
  --glow-blue: rgba(59,130,246,0.7);
  --glow-green: rgba(34,197,94,0.7);
  --glow-purple: rgba(168,85,247,0.7);
  --glow-gold: rgba(251,191,36,0.7);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: var(--dark);
  color: #fff;
}
body {
  background:
    radial-gradient(ellipse at 20% 10%, rgba(236,72,153,0.25) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.25) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 90%, rgba(168,85,247,0.3) 0%, transparent 45%),
    radial-gradient(ellipse at 10% 80%, rgba(34,197,94,0.2) 0%, transparent 40%),
    linear-gradient(180deg, #0a0420 0%, #1a0836 50%, #2a0e4a 100%);
  position: relative;
}

/* Retro pixel grid */
.bg-grid {
  position: fixed; inset: 0; z-index: var(--z-bg);
  pointer-events: none; opacity: 0.22;
  background-image:
    linear-gradient(rgba(168,85,247,0.35) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,0.35) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: linear-gradient(180deg, transparent 0%, #000 30%, #000 80%, transparent 100%);
  -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 30%, #000 80%, transparent 100%);
  animation: gridScroll 12s linear infinite;
}
@keyframes gridScroll { 0%{background-position:0 0} 100%{background-position:0 44px} }

/* Marquee lights around screen */
.marquee {
  position: fixed; inset: 0; z-index: var(--z-bg);
  pointer-events: none;
  box-shadow:
    inset 0 0 60px rgba(236,72,153,0.3),
    inset 0 0 120px rgba(168,85,247,0.2);
}
.marquee-bulbs {
  position: fixed; top: 0; left: 0; right: 0;
  height: 14px; z-index: 1;
  pointer-events: none;
  background-image: radial-gradient(circle, var(--gold) 0, var(--gold) 3px, transparent 4px);
  background-size: 28px 14px;
  background-position: center;
  filter: drop-shadow(0 0 6px var(--glow-gold));
  animation: marqueeFlash 0.8s steps(2) infinite;
}
.marquee-bulbs.bot { top: auto; bottom: 0; }
@keyframes marqueeFlash {
  0% { filter: drop-shadow(0 0 6px var(--glow-gold)) hue-rotate(0deg); }
  50% { filter: drop-shadow(0 0 10px var(--glow-pink)) hue-rotate(60deg); }
  100% { filter: drop-shadow(0 0 6px var(--glow-gold)) hue-rotate(0deg); }
}

/* Scanline effect */
.bg-scanlines {
  position: fixed; inset: 0; z-index: var(--z-bg);
  pointer-events: none; opacity: 0.08;
  background: repeating-linear-gradient(0deg, #fff 0px, #fff 1px, transparent 2px, transparent 4px);
}

/* Floating sparkles */
.bg-sparkle {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  font-size: clamp(10px, 2vw, 16px);
  opacity: 0.6;
  animation: sparkleTwinkle 2.6s ease-in-out infinite;
  filter: drop-shadow(0 0 4px currentColor);
}
@keyframes sparkleTwinkle { 0%,100%{opacity:0.2;transform:scale(0.7)} 50%{opacity:0.9;transform:scale(1.2)} }

/* Neon accents */
.bg-neon {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  font-size: clamp(18px, 4vw, 30px);
  opacity: 0.45;
  filter: drop-shadow(0 0 10px currentColor);
  animation: neonFloat 6s ease-in-out infinite;
}
@keyframes neonFloat {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-18px) rotate(8deg); }
}

/* Screen system */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* Title */
.screen-title .emoji-row {
  display: flex; gap: 14px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 8px;
}
.screen-title .emoji-row span { font-size: clamp(44px, 11vw, 72px); filter: drop-shadow(0 0 12px var(--glow-pink)); }
.screen-title h1 {
  font-size: clamp(30px, 8vw, 56px);
  color: var(--gold);
  text-shadow:
    0 0 16px var(--glow-gold),
    0 0 32px var(--glow-pink),
    3px 3px 0 var(--purple),
    -2px -2px 0 var(--blue);
  margin: 6px 0 6px;
  letter-spacing: 2px;
  animation: titlePulse 2s ease-in-out infinite;
}
@keyframes titlePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.screen-title h2 {
  font-size: clamp(16px, 4vw, 24px);
  color: var(--pink);
  text-shadow: 0 0 10px var(--glow-pink);
  margin-bottom: 6px;
  letter-spacing: 3px;
}
.screen-title p {
  font-size: clamp(14px, 3.5vw, 20px);
  color: #fff;
  max-width: 440px; line-height: 1.5;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  margin-top: 8px;
}
.screen-title .alphie {
  font-size: clamp(68px, 18vw, 120px);
  display: inline-block;
  filter: drop-shadow(0 0 18px var(--glow-green));
  animation: alphieBounce 1.6s ease-in-out infinite;
}
@keyframes alphieBounce {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-14px) rotate(5deg); }
}

/* Buttons */
.btn {
  min-width: var(--tap); min-height: 68px;
  padding: 16px 44px;
  font-size: clamp(20px, 5vw, 28px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: 4px solid var(--gold);
  border-radius: 16px;
  cursor: pointer;
  box-shadow:
    0 6px 0 rgba(0,0,0,0.4),
    0 0 24px var(--glow-pink),
    inset 0 0 12px rgba(255,255,255,0.3);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
}
.btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4), 0 0 24px var(--glow-pink); }
.btn-start {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  margin-top: 22px;
  animation: btnGlow 1.8s ease-in-out infinite;
}
.btn-again {
  background: linear-gradient(135deg, var(--blue), var(--purple));
  margin-top: 18px;
}
@keyframes btnGlow {
  0%,100% { box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 0 24px var(--glow-pink), inset 0 0 12px rgba(255,255,255,0.3); }
  50% { box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 0 40px var(--glow-gold), 0 0 60px var(--glow-pink), inset 0 0 12px rgba(255,255,255,0.3); }
}

/* HUD */
.hud {
  position: fixed; top: 18px; left: 10px; right: 10px;
  z-index: var(--z-ui);
  display: none;
  align-items: center; justify-content: space-between;
  gap: 10px;
  pointer-events: none;
}
.hud.active { display: flex; }
.hud-level, .hud-stars {
  background: linear-gradient(135deg, rgba(10,4,32,0.85), rgba(42,14,74,0.85));
  border: 3px solid var(--gold);
  border-radius: 14px;
  padding: 10px 14px;
  color: var(--gold);
  font-size: clamp(14px, 3.5vw, 20px);
  text-shadow: 0 0 8px var(--glow-gold);
  box-shadow: 0 0 16px var(--glow-purple);
  font-weight: bold;
  letter-spacing: 1px;
  white-space: nowrap;
}
.hud-stars { color: var(--pink); border-color: var(--pink); text-shadow: 0 0 8px var(--glow-pink); }
.hud-progress {
  flex: 1;
  height: 22px;
  background: rgba(10,4,32,0.7);
  border: 3px solid var(--blue);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 0 14px var(--glow-blue);
  min-width: 60px;
}
.hud-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--green), var(--gold), var(--pink));
  transition: width 0.4s;
  box-shadow: 0 0 10px var(--glow-gold);
}

/* Alphie character */
.alphie-char {
  position: fixed;
  bottom: 20px; left: 12px;
  z-index: var(--z-char);
  font-size: clamp(48px, 12vw, 80px);
  pointer-events: none;
  filter: drop-shadow(0 0 16px var(--glow-green));
  animation: alphieFloat 3s ease-in-out infinite;
  display: none;
}
.alphie-char.active { display: block; }
@keyframes alphieFloat {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50% { transform: translateY(-10px) rotate(4deg); }
}
.speech-bubble {
  position: fixed;
  bottom: 110px; left: 90px;
  background: linear-gradient(135deg, var(--gold), var(--pink));
  color: var(--dark);
  padding: 10px 18px;
  border-radius: 20px;
  font-size: clamp(14px, 3.5vw, 18px);
  font-weight: bold;
  border: 3px solid #fff;
  box-shadow: 0 0 20px var(--glow-gold);
  z-index: var(--z-char);
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.3s;
  pointer-events: none;
  letter-spacing: 1px;
  white-space: nowrap;
}
.speech-bubble.show { opacity: 1; transform: scale(1); animation: bubbleWiggle 0.8s ease-in-out; }
@keyframes bubbleWiggle {
  0%,100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.1) rotate(-3deg); }
  75% { transform: scale(1.05) rotate(3deg); }
}

/* Game area */
.game-area {
  position: fixed; inset: 0;
  z-index: var(--z-game);
  display: none;
  padding-top: 80px;
  padding-bottom: 20px;
}
.game-area.active { display: block; }

/* ===== LEVEL 1 — BALLOON BURST ===== */
.balloon {
  position: absolute;
  width: clamp(90px, 22vw, 140px);
  height: clamp(110px, 28vw, 175px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-family: var(--font);
  font-weight: bold;
  font-size: clamp(26px, 6vw, 40px);
  color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
  box-shadow:
    inset -10px -14px 28px rgba(0,0,0,0.25),
    inset 12px 12px 24px rgba(255,255,255,0.4),
    0 0 24px currentColor;
  animation: balloonFloat 4s ease-in-out infinite;
  transition: transform 0.2s;
  will-change: transform;
  -webkit-tap-highlight-color: transparent;
}
.balloon::after {
  content: '';
  position: absolute;
  bottom: -22px; left: 50%;
  width: 2px; height: 30px;
  background: rgba(255,255,255,0.5);
  transform: translateX(-50%);
}
.balloon.popping { animation: balloonPop 0.4s forwards; pointer-events: none; }
@keyframes balloonPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); filter: brightness(2); }
  100% { transform: scale(0); opacity: 0; }
}
@keyframes balloonFloat {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-12px) rotate(3deg); }
}
.balloon .letter-pair {
  display: flex; flex-direction: column; align-items: center;
  line-height: 1;
}
.balloon .upper { font-size: 1.1em; }
.balloon .lower { font-size: 0.7em; opacity: 0.9; }

/* ===== LEVEL 2 — SPIN WHEEL ===== */
.wheel-wrap {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(85vw, 460px);
  height: min(85vw, 460px);
  max-height: 65vh;
  aspect-ratio: 1/1;
}
.wheel {
  position: absolute; inset: 0;
  border-radius: 50%;
  transition: transform 1.4s cubic-bezier(0.25, 1.2, 0.5, 1);
  box-shadow:
    0 0 40px var(--glow-pink),
    0 0 80px var(--glow-purple),
    inset 0 0 30px rgba(0,0,0,0.5);
  border: 6px solid var(--gold);
  overflow: hidden;
  will-change: transform;
}
.wheel-slice {
  position: absolute;
  top: 0; left: 50%;
  width: 50%; height: 50%;
  transform-origin: 0% 100%;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 18px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.wheel-slice .slice-inner {
  font-size: clamp(20px, 5vw, 34px);
  font-weight: bold;
  color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
  transform: translateY(4px);
  display: flex; flex-direction: column; align-items: center;
  line-height: 1;
  pointer-events: none;
}
.wheel-slice .slice-inner .lower { font-size: 0.6em; opacity: 0.85; }
.wheel-pointer {
  position: absolute;
  top: -4px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 22px solid transparent;
  border-right: 22px solid transparent;
  border-top: 38px solid var(--gold);
  filter: drop-shadow(0 0 10px var(--glow-gold));
  z-index: 5;
}
.wheel-hub {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: clamp(50px, 14vw, 80px);
  height: clamp(50px, 14vw, 80px);
  background: radial-gradient(circle at 30% 30%, var(--gold), #b8860b);
  border-radius: 50%;
  border: 4px solid #fff;
  box-shadow: 0 0 20px var(--glow-gold);
  z-index: 3;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(20px, 5vw, 30px);
}

/* ===== LEVEL 3 — SPEED MATCH ===== */
.speed-grid {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(8px, 2vw, 14px);
  width: min(92vw, 500px);
  padding: 10px;
}
.speed-card {
  aspect-ratio: 1/1;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border: 4px solid var(--gold);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(22px, 6vw, 40px);
  font-weight: bold;
  color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
  cursor: pointer;
  box-shadow:
    0 0 18px var(--glow-blue),
    inset 0 0 14px rgba(255,255,255,0.25);
  transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
  flex-direction: column;
}
.speed-card .upper { line-height: 1; }
.speed-card .lower { font-size: 0.55em; opacity: 0.85; line-height: 1; }
.speed-card:active { transform: scale(0.95); }
.speed-card.correct { animation: speedCorrect 0.5s forwards; }
.speed-card.wrong { animation: speedWrong 0.4s; }
@keyframes speedCorrect {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); background: linear-gradient(135deg, var(--green), var(--gold)); filter: brightness(1.4); }
  100% { transform: scale(0); opacity: 0; }
}
@keyframes speedWrong {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
.speed-target {
  position: absolute;
  top: 90px; left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--pink), var(--purple));
  border: 4px solid var(--gold);
  border-radius: 20px;
  padding: 12px 26px;
  font-size: clamp(18px, 4.5vw, 24px);
  font-weight: bold;
  color: #fff;
  box-shadow: 0 0 24px var(--glow-pink);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
  letter-spacing: 1px;
  z-index: 4;
  text-align: center;
  white-space: nowrap;
}
.speed-target .big { font-size: 1.5em; color: var(--gold); }

/* ===== LEVEL 4 — SURPRISE BOXES ===== */
.box-grid {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(10px, 2.5vw, 18px);
  width: min(92vw, 500px);
  padding: 10px;
}
.mbox {
  aspect-ratio: 1/1;
  background: linear-gradient(145deg, var(--purple), var(--pink));
  border: 5px solid var(--gold);
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(40px, 12vw, 74px);
  cursor: pointer;
  position: relative;
  box-shadow:
    0 0 24px var(--glow-purple),
    inset 0 0 18px rgba(0,0,0,0.4);
  transition: transform 0.2s;
  -webkit-tap-highlight-color: transparent;
  perspective: 600px;
}
.mbox .box-inner {
  width: 100%; height: 100%;
  position: relative;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  display: flex; align-items: center; justify-content: center;
}
.mbox.flipped .box-inner { transform: rotateY(180deg); }
.mbox-front, .mbox-back {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  backface-visibility: hidden;
  border-radius: 18px;
  flex-direction: column;
  line-height: 1;
}
.mbox-front {
  font-size: clamp(44px, 13vw, 80px);
  filter: drop-shadow(0 0 8px var(--glow-gold));
  animation: boxShake 2s ease-in-out infinite;
}
.mbox-back {
  transform: rotateY(180deg);
  background: linear-gradient(135deg, var(--green), var(--blue));
  color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
  font-size: clamp(28px, 7.5vw, 52px);
  font-weight: bold;
}
.mbox-back .upper { line-height: 1; font-size: 1em; }
.mbox-back .lower { font-size: 0.55em; opacity: 0.85; line-height: 1; }
@keyframes boxShake {
  0%,100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.05) rotate(-4deg); }
  75% { transform: scale(1.05) rotate(4deg); }
}
.mbox.correct { animation: boxCorrect 0.8s forwards; }
@keyframes boxCorrect {
  0% { transform: scale(1); }
  40% { transform: scale(1.3); filter: brightness(1.5); box-shadow: 0 0 40px var(--glow-green); }
  100% { transform: scale(0); opacity: 0; }
}

/* ===== LEVEL 5 — FIREWORKS FINALE ===== */
.firework {
  position: absolute;
  width: clamp(72px, 16vw, 96px);
  height: clamp(72px, 16vw, 96px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(24px, 6vw, 36px);
  font-weight: bold;
  color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
  cursor: pointer;
  box-shadow:
    0 0 30px currentColor,
    inset 0 0 14px rgba(255,255,255,0.4);
  -webkit-tap-highlight-color: transparent;
  animation: fireworkShoot 3.2s ease-out forwards;
  will-change: transform, opacity;
  flex-direction: column;
  line-height: 1;
}
.firework .upper { line-height: 1; }
.firework .lower { font-size: 0.55em; opacity: 0.9; line-height: 1; }
@keyframes fireworkShoot {
  0% { transform: translateY(60vh) scale(0.3); opacity: 0; }
  20% { transform: translateY(40vh) scale(1); opacity: 1; }
  90% { transform: translateY(-20px) scale(1); opacity: 1; }
  100% { transform: translateY(-40px) scale(0.6); opacity: 0; }
}
.firework.exploded {
  animation: fireworkExplode 0.5s forwards;
}
@keyframes fireworkExplode {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.8); filter: brightness(2.5); }
  100% { transform: scale(0); opacity: 0; }
}
.firework-target {
  position: absolute;
  top: 94px; left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--gold), var(--pink));
  border: 4px solid #fff;
  border-radius: 20px;
  padding: 10px 26px;
  font-size: clamp(16px, 4.2vw, 22px);
  font-weight: bold;
  color: var(--dark);
  box-shadow: 0 0 26px var(--glow-gold);
  letter-spacing: 1px;
  z-index: 4;
  text-align: center;
  white-space: nowrap;
}
.firework-target .big { font-size: 1.6em; color: var(--pink); text-shadow: 1px 1px 0 #fff; }

/* Level banner */
.level-banner {
  position: fixed; inset: 0;
  z-index: var(--z-overlay);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
  flex-direction: column;
  gap: 12px;
}
.level-banner.show { opacity: 1; }
.level-banner::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(10,4,32,0.82);
  z-index: -1;
}
.level-banner .level-num {
  font-size: clamp(22px, 5vw, 32px);
  color: var(--pink);
  text-shadow: 0 0 14px var(--glow-pink);

<script>
'use strict';

const AUDIO_BASE = '../../audio';
const LETTERS = ['a','b','c','d','e','f','g','h','i','j','k','l','m','n','o','p','q','r','s','t','u','v','w','x','y','z'];

const VOICE_B = {
  greetings: ['voice-b/greetings/hello-ready-to-play.mp3','voice-b/greetings/lets-discover-something-wonderful.mp3','voice-b/greetings/oh-i-love-this-game.mp3','voice-b/greetings/wonderful-are-you-ready.mp3','voice-b/greetings/lets-begin-our-adventure.mp3','voice-b/greetings/i-am-so-glad-youre-here.mp3','voice-b/greetings/time-to-learn-something-new.mp3'],
  correct: ['voice-b/correct/oh-wonderful-well-done.mp3','voice-b/correct/youre-such-a-clever-one.mp3','voice-b/correct/beautiful-thats-exactly-right.mp3','voice-b/correct/oh-my-goodness-yes.mp3','voice-b/correct/gorgeous-work.mp3','voice-b/correct/you-make-me-so-happy.mp3','voice-b/correct/splendid-absolutely-splendid.mp3','voice-b/correct/what-a-star-you-are.mp3','voice-b/correct/oh-how-clever.mp3','voice-b/correct/thats-perfect-my-dear.mp3','voice-b/correct/i-am-so-proud-of-you.mp3','voice-b/correct/you-did-it-wonderful.mp3','voice-b/correct/oh-yes-well-done.mp3'],
  wrong: ['voice-b/wrong/not-that-one-but-youll-find-it.mp3','voice-b/wrong/so-close-have-another-lovely-go.mp3','voice-b/wrong/nearly-there-my-clever-one.mp3','voice-b/wrong/keep-trying-youre-doing-so-well.mp3','voice-b/wrong/dont-worry-try-once-more.mp3','voice-b/wrong/have-another-go-you-can-do-it.mp3'],
  thinking: ['voice-b/thinking/hmm-lets-think-together.mp3','voice-b/thinking/i-wonder-which-one.mp3','voice-b/thinking/take-a-nice-long-look.mp3','voice-b/thinking/you-are-doing-so-well.mp3','voice-b/thinking/we-can-do-this-together.mp3'],
  'round-complete': ['voice-b/round-complete/wonderful-round-youre-blooming.mp3','voice-b/round-complete/oh-that-was-beautiful-next-round.mp3','voice-b/round-complete/gorgeous-work-keep-going.mp3','voice-b/round-complete/oh-how-marvellous-round-done.mp3'],
  'game-complete': ['voice-b/game-complete/you-finished-how-marvellous.mp3','voice-b/game-complete/i-am-so-proud-of-you.mp3','voice-b/game-complete/you-are-truly-amazing.mp3','voice-b/game-complete/what-a-star-you-are.mp3','voice-b/game-complete/oh-my-goodness-you-did-it.mp3'],
};

// ==== AUDIO ====
class GameAudio {
  constructor() {
    this.ctx = null;
    this.unlocked = false;
    this.musicOn = true;
    this.musicGain = null;
    this.musicInterval = null;
    this.recentPhrases = {};
    this.currentVoiceAudio = null;
    this.musicStep = 0;
  }
  async unlock() {
    if (this.unlocked) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      if (this.ctx.state === 'suspended') await this.ctx.resume();
      const buf = this.ctx.createBuffer(1, 1, 22050);
      const src = this.ctx.createBufferSource();
      src.buffer = buf; src.connect(this.ctx.destination); src.start(0);
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.0;
      this.musicGain.connect(this.ctx.destination);
      this.unlocked = true;
    } catch (e) { console.warn('audio unlock failed', e); }
  }
  // Arcade chiptune pentatonic loop
  startMusic() {
    if (!this.ctx || !this.musicOn) return;
    this.stopMusic();
    // Pentatonic C major: C E G A C' + bass
    const notes = [261.63, 329.63, 392.00, 440.00, 523.25, 659.25, 523.25, 440.00, 392.00, 329.63];
    const bass = [65.41, 98.00, 65.41, 82.41];
    this.musicStep = 0;
    let bassStep = 0;
    this.musicGain.gain.setTargetAtTime(0.08, this.ctx.currentTime, 0.5);
    const playStep = () => {
      if (!this.ctx || !this.musicOn) return;
      const t = this.ctx.currentTime;
      // Lead (square wave — chiptune feel)
      const lead = this.ctx.createOscillator();
      lead.type = 'square';
      lead.frequency.value = notes[this.musicStep % notes.length];
      const leadG = this.ctx.createGain();
      leadG.gain.setValueAtTime(0, t);
      leadG.gain.linearRampToValueAtTime(0.04, t + 0.02);
      leadG.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      lead.connect(leadG); leadG.connect(this.musicGain);
      lead.start(t); lead.stop(t + 0.25);
      // Bass (triangle) every 2 steps
      if (this.musicStep % 2 === 0) {
        const b = this.ctx.createOscillator();
        b.type = 'triangle';
        b.frequency.value = bass[bassStep % bass.length];
        const bg = this.ctx.createGain();
        bg.gain.setValueAtTime(0, t);
        bg.gain.linearRampToValueAtTime(0.05, t + 0.02);
        bg.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        b.connect(bg); bg.connect(this.musicGain);
        b.start(t); b.stop(t + 0.4);
        bassStep++;
      }
      this.musicStep++;
    };
    this.musicInterval = setInterval(playStep, 260);
  }
  stopMusic() {
    if (this.musicInterval) { clearInterval(this.musicInterval); this.musicInterval = null; }
    if (this.musicGain && this.ctx) {
      this.musicGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3);
    }
  }
  duckMusic() {
    if (this.musicGain && this.ctx) {
      this.musicGain.gain.setTargetAtTime(0.02, this.ctx.currentTime, 0.1);
    }
  }
  unduckMusic() {
    if (this.musicGain && this.ctx) {
      this.musicGain.gain.setTargetAtTime(0.08, this.ctx.currentTime, 0.3);
    }
  }
  // SFX generators
  beep(freq, dur = 0.12, type = 'square', vol = 0.15) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    o.type = type; o.frequency.value = freq;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + dur + 0.05);
  }
  sfxCorrect() {
    this.beep(523, 0.08, 'square', 0.12);
    setTimeout(() => this.beep(659, 0.08, 'square', 0.12), 70);
    setTimeout(() => this.beep(784, 0.15, 'square', 0.14), 140);
  }
  sfxWrong() {
    this.beep(220, 0.1, 'sawtooth', 0.1);
    setTimeout(() => this.beep(180, 0.15, 'sawtooth', 0.1), 100);
  }
  sfxPop() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(800, t);
    o.frequency.exponentialRampToValueAtTime(120, t + 0.15);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.2);
  }
  sfxFirework() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    // Whistle up
    const o = this.ctx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(1200, t + 0.4);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.5);
    // Bang
    setTimeout(() => {
      const bufSize = this.ctx.sampleRate * 0.3;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
      const src = this.ctx.createBufferSource();
      src.buffer = buf;
      const ng = this.ctx.createGain();
      ng.gain.value = 0.3;
      src.connect(ng); ng.connect(this.ctx.destination);
      src.start();
    }, 400);
  }
  sfxLevelUp() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((n, i) => setTimeout(() => this.beep(n, 0.14, 'square', 0.14), i * 80));
  }
  sfxSpin() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    for (let i = 0; i < 12; i++) {
      setTimeout(() => this.beep(440 + (i * 30), 0.05, 'square', 0.08), i * 100);
    }
  }
  // Non-blocking speak via HTMLAudio
  speak(path, onEnd) {
    try {
      if (this.currentVoiceAudio) {
        try { this.currentVoiceAudio.pause(); } catch(e) {}
        this.currentVoiceAudio = null;
      }
      this.duckMusic();
      const a = new Audio(`${AUDIO_BASE}/${path}`);
      a.volume = 1.0;
      this.currentVoiceAudio = a;
      a.addEventListener('ended', () => {
        this.unduckMusic();
        if (this.currentVoiceAudio === a) this.currentVoiceAudio = null;
        if (onEnd) onEnd();
      });
      a.addEventListener('error', () => {
        this.unduckMusic();
        if (this.currentVoiceAudio === a) this.currentVoiceAudio = null;
        if (onEnd) onEnd();
      });
      a.play().catch(() => { this.unduckMusic(); if (onEnd) onEnd(); });
      return a;
    } catch (e) { this.unduckMusic(); if (onEnd) onEnd(); return null; }
  }
  speakLetter(l) { return this.speak(`letters/${l.toLowerCase()}.mp3`); }
  speakPhrase(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return;
    if (!this.recentPhrases[category]) this.recentPhrases[category] = [];
    const recent = this.recentPhrases[category];
    let options = pool.filter(p => !recent.includes(p));
    if (!options.length) { this.recentPhrases[category] = []; options = pool; }
    const pick = options[Math.floor(Math.random() * options.length)];
    this.recentPhrases[category].push(pick);
    if (this.recentPhrases[category].length > Math.min(3, pool.length - 1)) this.recentPhrases[category].shift();
    return this.speak(pick);
  }
}

// ==== GAME STATE ====
const audio = new GameAudio();
const state = {
  level: 1,
  stars: 0,
  levelProgress: 0,
  levelTarget: 5,
  currentTarget: null,
  busy: false,
  levelTimer: null,
  currentGameCleanup: null,
  highScore: 0,
};

const LEVELS = [
  { num: 1, name: 'BALLOON BURST', sub: 'POP THE LETTERS!', target: 5, fn: startLevel1 },
  { num: 2, name: 'SPIN THE WHEEL', sub: 'FIND THE SLICE!', target: 5, fn: startLevel2 },
  { num: 3, name: 'SPEED MATCH', sub: 'TAP FAST!', target: 5, fn: startLevel3 },
  { num: 4, name: 'SURPRISE BOXES', sub: 'FLIP TO FIND!', target: 5, fn: startLevel4 },
  { num: 5, name: 'FIREWORKS FINALE', sub: 'BLAST THE LETTER!', target: 7, fn: startLevel5 },
];

const SPEECH_BUBBLES = ['HIGH SCORE!','LEVEL UP!','ALPHABET CHAMP!','GREAT JOB!','SUPER!','WOW!','AMAZING!','ARCADE HERO!','NICE!','COMBO!'];

// ==== UI HELPERS ====
const $ = (id) => document.getElementById(id);

function randInt(max) { return Math.floor(Math.random() * max); }
function randPick(arr) { return arr[randInt(arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = randInt(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickDistinct(pool, count, exclude = null) {
  const available = pool.filter(x => x !== exclude);
  return shuffle(available).slice(0, count);
}

function letterHTML(l) {
  const u = l.toUpperCase();
  const lo = l.toLowerCase();
  return `<span class="letter-pair"><span class="upper">${u}</span><span class="lower">${lo}</span></span>`;
}
function letterInline(l) {
  return `<span class="upper">${l.toUpperCase()}</span><span class="lower">${l.toLowerCase()}</span>`;
}

function showSpeech(text) {
  const bubble = $('speechBubble');
  bubble.textContent = text;
  bubble.classList.add('show');
  clearTimeout(showSpeech._t);
  showSpeech._t = setTimeout(() => bubble.classList.remove('show'), 1800);
}

function updateHUD() {
  $('hudLevel').textContent = `LEVEL ${state.level}/5`;
  const pct = Math.min(100, (state.levelProgress / state.levelTarget) * 100);
  $('hudProgress').style.width = pct + '%';
  $('hudStars').textContent = `⭐ ${state.stars}`;
}

function addStar(n = 1) {
  state.stars += n;
  updateHUD();
}

function showLevelBanner(level, onDone) {
  $('bannerNum').textContent = `LEVEL ${level.num}`;
  $('bannerName').textContent = level.name;
  $('bannerSub').textContent = level.sub;
  const b = $('levelBanner');
  b.classList.add('show');
  audio.sfxLevelUp();
  setTimeout(() => {
    b.classList.remove('show');
    setTimeout(onDone, 400);
  }, 2800);
}

function clearGameArea() {
  if (state.currentGameCleanup) { try { state.currentGameCleanup(); } catch(e){} state.currentGameCleanup = null; }
  $('gameArea').innerHTML = '';
}

// ==== CONFETTI / BURSTS ====
function burstConfetti(amount = 40) {
  const colors = ['#ec4899','#3b82f6','#22c55e','#a855f7','#fbbf24','#fff'];
  for (let i = 0; i < amount; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[randInt(colors.length)];
    c.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    c.style.animationDelay = (Math.random() * 0.3) + 's';
    c.style.transform = `rotate(${randInt(360)}deg)`;
    c.style.width = (8 + Math.random() * 8) + 'px';
    c.style.height = (12 + Math.random() * 10) + 'px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3800);
  }
}

function burstAt(x, y, color = '#fbbf24', count = 14) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'burst';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = color;
    p.style.color = color;
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    const dist = 60 + Math.random() * 60;
    p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--by', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1100);
  }
}

// ==== CORRECT / WRONG ====
function handleCorrect(letter, onReady) {
  if (state.busy) return;
  state.busy = true;
  audio.sfxCorrect();
  state.levelProgress++;
  addStar(1);
  showSpeech(randPick(SPEECH_BUBBLES));
  // Speak letter once
  audio.speakLetter(letter);
  updateHUD();
  setTimeout(() => {
    // Occasional voice phrase (non-blocking — speak function stops previous)
    if (Math.random() < 0.55) audio.speakPhrase('correct');
    if (state.levelProgress >= state.levelTarget) {
      finishLevel();
    } else {
      state.busy = false;
      if (onReady) onReady();
    }
  }, 800);
}

function handleWrong(onReady) {
  audio.sfxWrong();
  if (Math.random() < 0.5) audio.speakPhrase('wrong');
  if (onReady) onReady();
}

// ==== LEVEL FLOW ====
function finishLevel() {
  state.busy = true;
  clearGameArea();
  audio.speakPhrase('round-complete');
  burstConfetti(50);
  setTimeout(() => {
    if (state.level >= 5) {
      winGame();
    } else {
      state.level++;
      state.levelProgress = 0;
      const nextLevel = LEVELS[state.level - 1];
      state.levelTarget = nextLevel.target;
      updateHUD();
      showLevelBanner(nextLevel, () => {
        nextLevel.fn();
        state.busy = false;
      });
    }
  }, 1600);
}

function winGame() {
  clearGameArea();
  $('hud').classList.remove('active');
  $('alphieChar').classList.remove('active');
  audio.stopMusic();
  // Massive celebration
  const scoreDigits = String(state.stars * 1337).padStart(6, '0');
  $('celebHighScore').textContent = scoreDigits;
  $('celebScore').textContent = `⭐ ${state.stars} STARS — 5 LEVELS COMPLETE ⭐`;
  $('celebration').classList.add('show');
  audio.speakPhrase('game-complete');
  setTimeout(() => audio.speakPhrase('game-complete'), 3500);
  // Massive confetti wave
  burstConfetti(80);
  setTimeout(() => burstConfetti(80), 600);
  setTimeout(() => burstConfetti(80), 1200);
  // Fireworks
  const firerInt = setInterval(() => {
    audio.sfxFirework();
    const cx = Math.random() * window.innerWidth;
    const cy = 100 + Math.random() * (window.innerHeight * 0.5);
    const colors = ['#ec4899','#3b82f6','#22c55e','#a855f7','#fbbf24'];
    setTimeout(() => burstAt(cx, cy, randPick(colors), 20), 400);
  }, 700);
  setTimeout(() => clearInterval(firerInt), 8000);
}

// ====================================================
// LEVEL 1 — BALLOON BURST
// ====================================================
function startLevel1() {
  const ga = $('gameArea');
  ga.innerHTML = '';
  state.busy = false;

  const colors = ['#ec4899','#3b82f6','#22c55e','#a855f7','#fbbf24','#f97316'];
  const activeBalloons = new Set();
  let spawnInterval;
  let targetLetter = null;
  let stopped = false;

  function pickNewTarget() {
    targetLetter = randPick(LETTERS);
    state.currentTarget = targetLetter;
    setTimeout(() => { if (!stopped) audio.speakLetter(targetLetter); }, 150);
  }

  function spawnBalloon() {
    if (stopped || state.busy) return;
    if (activeBalloons.size > 5) return;
    const bal = document.createElement('div');
    bal.className = 'balloon';
    // 55% chance to spawn target letter, 45% distractor
    const letter = Math.random() < 0.55 ? targetLetter : randPick(LETTERS.filter(l => l !== targetLetter));
    bal.dataset.letter = letter;
    bal.innerHTML = letterHTML(letter);
    const color = randPick(colors);
    bal.style.background = `radial-gradient(circle at 35% 30%, #fff, ${color} 40%, ${color} 100%)`;
    bal.style.color = color;
    const minX = 20, maxX = window.innerWidth - 160;
    bal.style.left = (minX + Math.random() * (maxX - minX)) + 'px';
    bal.style.bottom = '-200px';
    bal.style.transition = 'bottom 6s linear, transform 0.2s';
    ga.appendChild(bal);
    activeBalloons.add(bal);
    requestAnimationFrame(() => {
      bal.style.bottom = (window.innerHeight + 50) + 'px';
    });
    bal.addEventListener('click', onBalloonTap);
    bal.addEventListener('touchstart', (e) => { e.preventDefault(); onBalloonTap.call(bal, e); }, { passive: false });
    setTimeout(() => {
      if (bal.parentNode) bal.remove();
      activeBalloons.delete(bal);
    }, 6200);
  }

  function onBalloonTap(e) {
    if (state.busy) return;
    const bal = this;
    if (bal.classList.contains('popping')) return;
    const letter = bal.dataset.letter;
    const rect = bal.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    if (letter === targetLetter) {
      bal.classList.add('popping');
      audio.sfxPop();
      burstAt(cx, cy, bal.style.color || '#fbbf24', 16);
      setTimeout(() => { bal.remove(); activeBalloons.delete(bal); }, 400);
      handleCorrect(letter, () => {
        pickNewTarget();
      });
    } else {
      bal.style.transform = 'scale(0.9) rotate(-10deg)';
      setTimeout(() => bal.style.transform = '', 200);
      handleWrong();
    }
  }

  pickNewTarget();
  audio.speakPhrase('greetings');
  spawnBalloon();
  spawnInterval = setInterval(spawnBalloon, 1100);

  state.currentGameCleanup = () => {
    stopped = true;
    if (spawnInterval) clearInterval(spawnInterval);
    activeBalloons.forEach(b => b.remove());
    activeBalloons.clear();
  };
}

// ====================================================
// LEVEL 2 — SPIN THE WHEEL
// ====================================================
function startLevel2() {
  const ga = $('gameArea');
  ga.innerHTML = '';
  state.busy = false;

  const wrap = document.createElement('div');
  wrap.className = 'wheel-wrap';
  wrap.innerHTML = `
    <div class="wheel-pointer"></div>
    <div class="wheel" id="wheelEl"></div>
    <div class="wheel-hub">🎯</div>
  `;
  ga.appendChild(wrap);

  // Target box
  const targetEl = document.createElement('div');
  targetEl.className = 'speed-target';
  targetEl.innerHTML = `FIND <span class="big" id="wheelTargetL"></span>`;
  ga.appendChild(targetEl);

  const wheel = $('wheelEl');
  const NUM_SLICES = 8;
  const sliceDeg = 360 / NUM_SLICES;
  let wheelLetters = [];
  let targetLetter = null;
  let currentRotation = 0;

  function buildWheel() {
    wheelLetters = shuffle(LETTERS).slice(0, NUM_SLICES);
    targetLetter = randPick(wheelLetters);
    state.currentTarget = targetLetter;
    $('wheelTargetL').innerHTML = letterInline(targetLetter);
    wheel.innerHTML = '';
    const colors = ['#ec4899','#3b82f6','#22c55e','#a855f7','#fbbf24','#f97316','#06b6d4','#ef4444'];
    wheelLetters.forEach((letter, i) => {
      const slice = document.createElement('div');
      slice.className = 'wheel-slice';
      slice.style.transform = `rotate(${i * sliceDeg}deg) skewY(${sliceDeg - 90}deg)`;
      slice.style.background = `linear-gradient(135deg, ${colors[i % colors.length]}, ${colors[(i+3) % colors.length]})`;
      slice.dataset.letter = letter;
      const inner = document.createElement('div');
      inner.className = 'slice-inner';
      inner.style.transform = `skewY(${90 - sliceDeg}deg) rotate(${sliceDeg / 2}deg) translateY(10px)`;
      inner.innerHTML = letterInline(letter);
      slice.appendChild(inner);
      slice.addEventListener('click', () => onSliceTap(slice, letter));
      slice.addEventListener('touchstart', (e) => { e.preventDefault(); onSliceTap(slice, letter); }, { passive: false });
      wheel.appendChild(slice);
    });
    // Spin the wheel
    audio.sfxSpin();
    currentRotation += 720 + randInt(360);
    wheel.style.transform = `rotate(${currentRotation}deg)`;
    setTimeout(() => { if (!state.busy) audio.speakLetter(targetLetter); }, 1400);
  }

  function onSliceTap(sliceEl, letter) {
    if (state.busy) return;
    const rect = sliceEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    if (letter === targetLetter) {
      audio.sfxPop();
      burstAt(cx, cy, '#fbbf24', 18);
      sliceEl.style.filter = 'brightness(1.8)';
      handleCorrect(letter, () => {
        buildWheel();
      });
    } else {
      sliceEl.style.filter = 'brightness(0.5)';
      setTimeout(() => sliceEl.style.filter = '', 300);
      handleWrong();
    }
  }

  buildWheel();
  state.currentGameCleanup = () => {};
}

// ====================================================
// LEVEL 3 — SPEED MATCH
// ====================================================
function startLevel3() {
  const ga = $('gameArea');
  ga.innerHTML = '';
  state.busy = false;

  const targetEl = document.createElement('div');
  targetEl.className = 'speed-target';
  targetEl.innerHTML = `TAP <span class="big" id="speedTargetL"></span>`;
  ga.appendChild(targetEl);

  const grid = document.createElement('div');
  grid.className = 'speed-grid';
  ga.appendChild(grid);

  let targetLetter = null;
  let cards = [];

  function rebuildGrid() {
    grid.innerHTML = '';
    cards = [];
    const gridLetters = shuffle(LETTERS).slice(0, 9);
    targetLetter = randPick(gridLetters);
    state.currentTarget = targetLetter;
    $('speedTargetL').innerHTML = letterInline(targetLetter);
    gridLetters.forEach(letter => {
      const card = document.createElement('div');
      card.className = 'speed-card';
      card.dataset.letter = letter;
      card.innerHTML = `<span class="upper">${letter.toUpperCase()}</span><span class="lower">${letter.toLowerCase()}</span>`;
      const hue = randInt(360);
      card.style.background = `linear-gradient(135deg, hsl(${hue}, 80%, 55%), hsl(${(hue + 60) % 360}, 80%, 45%))`;
      card.addEventListener('click', () => onCardTap(card, letter));
      card.addEventListener('touchstart', (e) => { e.preventDefault(); onCardTap(card, letter); }, { passive: false });
      grid.appendChild(card);
      cards.push(card);
    });
    setTimeout(() => { if (!state.busy) audio.speakLetter(targetLetter); }, 200);
  }

  function onCardTap(card, letter) {
    if (state.busy) return;
    if (card.classList.contains('correct')) return;
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    if (letter === targetLetter) {
      card.classList.add('correct');
      audio.sfxPop();
      burstAt(cx, cy, '#22c55e', 14);
      handleCorrect(letter, () => {
        rebuildGrid();
      });
    } else {
      card.classList.add('wrong');
      setTimeout(() => card.classList.remove('wrong'), 400);
      handleWrong();
    }
  }

  rebuildGrid();
  state.currentGameCleanup = () => {};
}

// ====================================================
// LEVEL 4 — SURPRISE BOXES
// ====================================================
function startLevel4() {
  const ga = $('gameArea');
  ga.innerHTML = '';
  state.busy = false;

  const targetEl = document.createElement('div');
  targetEl.className = 'speed-target';
  targetEl.innerHTML = `FIND <span class="big" id="boxTargetL"></span>`;
  ga.appendChild(targetEl);

  const grid = document.createElement('div');
  grid.className = 'box-grid';
  ga.appendChild(grid);

  const BOX_EMOJIS = ['🎁','📦','🎀','🎲','🎪','🎨'];
  let targetLetter = null;

  function newRound() {
    grid.innerHTML = '';
    const boxLetters = shuffle(LETTERS).slice(0, 6);
    targetLetter = randPick(boxLetters);
    state.currentTarget = targetLetter;
    $('boxTargetL').innerHTML = letterInline(targetLetter);
    const emojis = shuffle(BOX_EMOJIS);
    boxLetters.forEach((letter, i) => {
      const box = document.createElement('div');
      box.className = 'mbox';
      box.dataset.letter = letter;
      box.innerHTML = `
        <div class="box-inner">
          <div class="mbox-front">${emojis[i]}</div>
          <div class="mbox-back"><span class="upper">${letter.toUpperCase()}</span><span class="lower">${letter.toLowerCase()}</span></div>
        </div>
      `;
      box.addEventListener('click', () => onBoxTap(box, letter));
      box.addEventListener('touchstart', (e) => { e.preventDefault(); onBoxTap(box, letter); }, { passive: false });
      grid.appendChild(box);
    });
    setTimeout(() => { if (!state.busy) audio.speakLetter(targetLetter); }, 300);
  }

  function onBoxTap(box, letter) {
    if (state.busy) return;
    if (box.classList.contains('flipped')) return;
    box.classList.add('flipped');
    audio.beep(880, 0.08, 'square', 0.1);
    setTimeout(() => {
      const rect = box.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      if (letter === targetLetter) {
        box.classList.add('correct');
        audio.sfxPop();
        burstAt(cx, cy, '#22c55e', 18);
        handleCorrect(letter, () => {
          newRound();
        });
      } else {
        // Not the target — still reveal, count as wrong attempt
        handleWrong(() => {
          setTimeout(() => {
            if (box.parentNode) {
              box.classList.remove('flipped');
            }
          }, 900);
        });
      }
    }, 500);
  }

  newRound();
  state.currentGameCleanup = () => {};
}

// ====================================================
// LEVEL 5 — FIREWORKS FINALE
// ====================================================
function startLevel5() {
  const ga = $('gameArea');
  ga.innerHTML = '';
  state.busy = false;

  const targetEl = document.createElement('div');
  targetEl.className = 'firework-target';
  targetEl.innerHTML = `BLAST <span class="big" id="fwTargetL"></span>`;
  ga.appendChild(targetEl);

  const colors = ['#ec4899','#3b82f6','#22c55e','#a855f7','#fbbf24','#f97316','#06b6d4'];
  const activeFW = new Set();
  let spawnInterval;
  let targetLetter = null;
  let stopped = false;

  function pickTarget() {
    targetLetter = randPick(LETTERS);
    state.currentTarget = targetLetter;
    $('fwTargetL').innerHTML = letterInline(targetLetter);
    setTimeout(() => { if (!stopped && !state.busy) audio.speakLetter(targetLetter); }, 200);
  }

  function spawnFirework() {
    if (stopped || state.busy) return;
    if (activeFW.size > 6) return;
    const fw = document.createElement('div');
    fw.className = 'firework';
    // 50/50 target or distractor
    const letter = Math.random() < 0.5 ? targetLetter : randPick(LETTERS.filter(l => l !== targetLetter));
    fw.dataset.letter = letter;
    fw.innerHTML = letterInline(letter);
    const color = randPick(colors);
    fw.style.background = `radial-gradient(circle at 35% 30%, #fff, ${color} 55%, ${color} 100%)`;
    fw.style.color = color;
    const minX = 15, maxX = window.innerWidth - 100;
    fw.style.left = (minX + Math.random() * (maxX - minX)) + 'px';
    fw.style.top = '60vh';
    ga.appendChild(fw);
    activeFW.add(fw);
    audio.sfxFirework();
    fw.addEventListener('click', onFWTap);
    fw.addEventListener('touchstart', (e) => { e.preventDefault(); onFWTap.call(fw, e); }, { passive: false });
    setTimeout(() => {
      if (fw.parentNode) fw.remove();
      activeFW.delete(fw);
    }, 3200);
  }

  function onFWTap() {
    if (state.busy) return;
    const fw = this;
    if (fw.classList.contains('exploded')) return;
    const letter = fw.dataset.letter;
    const rect = fw.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    if (letter === targetLetter) {
      fw.classList.add('exploded');
      audio.sfxFirework();
      burstAt(cx, cy, fw.style.color || '#fbbf24', 24);
      setTimeout(() => { fw.remove(); activeFW.delete(fw); }, 500);
      handleCorrect(letter, () => {
        pickTarget();
      });
    } else {
      fw.style.filter = 'grayscale(0.8) brightness(0.5)';
      setTimeout(() => fw.style.filter = '', 300);
      handleWrong();
    }
  }

  pickTarget();
  spawnFirework();
  spawnInterval = setInterval(spawnFirework, 900);

  state.currentGameCleanup = () => {
    stopped = true;
    if (spawnInterval) clearInterval(spawnInterval);
    activeFW.forEach(f => f.remove());
    activeFW.clear();
  };
}

// ==== START GAME ====
async function startGame() {
  $('screenTitle').classList.remove('active');
  $('hud').classList.add('active');
  $('alphieChar').classList.add('active');
  state.level = 1;
  state.stars = 0;
  state.levelProgress = 0;
  state.levelTarget = LEVELS[0].target;
  updateHUD();
  audio.startMusic();
  audio.speakPhrase('greetings');
  const firstLevel = LEVELS[0];
  showLevelBanner(firstLevel, () => {
    firstLevel.fn();
  });
}

// ==== BACKGROUND DECOR ====
function addBackgroundDeco() {
  const host = $('bgDeco');
  const sparkles = ['✨','⭐','💫','🌟'];
  for (let i = 0; i < 16; i++) {
    const s = document.createElement('div');
    s.className = 'bg-sparkle';
    s.textContent = randPick(sparkles);
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.color = randPick(['#fbbf24','#ec4899','#a855f7','#3b82f6']);
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (2 + Math.random() * 2) + 's';
    host.appendChild(s);
  }
  const neon = ['🕹️','🎮','🎯','🎪','🏆','⚡'];
  for (let i = 0; i < 6; i++) {
    const n = document.createElement('div');
    n.className = 'bg-neon';
    n.textContent = randPick(neon);
    n.style.left = Math.random() * 100 + 'vw';
    n.style.top = (10 + Math.random() * 80) + 'vh';
    n.style.color = randPick(['#fbbf24','#ec4899','#a855f7','#3b82f6','#22c55e']);
    n.style.animationDelay = Math.random() * 4 + 's';
    n.style.animationDuration = (5 + Math.random() * 3) + 's';
    host.appendChild(n);
  }
}

// ==== EVENTS ====
document.addEventListener('DOMContentLoaded', () => {
  addBackgroundDeco();

  $('btnStart').addEventListener('click', async () => {
    await audio.unlock();
    startGame();
  });

  $('btnAgain').addEventListener('click', () => {
    $('celebration').classList.remove('show');
    startGame();
  });
});
</script>
