<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Letter Fishing</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold','Nunito','Quicksand',system-ui,-apple-system,Arial,sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --water-top: 38%;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);overflow:hidden;height:100vh;height:100dvh;width:100vw;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;background:#87CEEB}

/* Background - pond scene */
.bg{position:fixed;inset:0;z-index:var(--z-bg)}
.sky{position:fixed;top:0;left:0;right:0;height:var(--water-top);background:linear-gradient(180deg,#87CEEB 0%,#B0E0FF 100%)}
.cloud{position:fixed;background:#fff;border-radius:50%;opacity:0.85;z-index:1}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
.cloud-1{width:80px;height:32px;top:8%;left:15%;animation:driftCloud 30s linear infinite}
.cloud-1::before{width:50px;height:26px;top:-14px;left:12px}
.cloud-1::after{width:40px;height:22px;top:-8px;left:42px}
.cloud-2{width:60px;height:26px;top:14%;left:65%;animation:driftCloud 40s linear infinite reverse}
.cloud-2::before{width:38px;height:20px;top:-12px;left:8px}
.cloud-2::after{width:30px;height:18px;top:-6px;left:30px}
.cloud-3{width:70px;height:28px;top:5%;left:42%;animation:driftCloud 35s linear infinite}
.cloud-3::before{width:44px;height:22px;top:-12px;left:10px}
.cloud-3::after{width:36px;height:20px;top:-8px;left:36px}
@keyframes driftCloud{0%{transform:translateX(-120px)}100%{transform:translateX(calc(100vw + 120px))}}

.water{position:fixed;top:var(--water-top);left:0;right:0;bottom:0;background:linear-gradient(180deg,#4FC3F7 0%,#0288D1 40%,#01579B 100%)}
.wave-line{position:fixed;top:var(--water-top);left:0;right:0;height:18px;z-index:2;overflow:hidden}
.wave-line::before{content:'';position:absolute;width:200%;height:100%;background:repeating-linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.35) 25%,transparent 50%);animation:waveScroll 3s linear infinite}
@keyframes waveScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Banks and lily pads */
.bank-left{position:fixed;bottom:0;left:0;width:80px;height:55%;background:linear-gradient(90deg,#4CAF50,#66BB6A);border-radius:0 60px 0 0;z-index:3;opacity:0.7}
.bank-right{position:fixed;bottom:0;right:0;width:80px;height:55%;background:linear-gradient(270deg,#4CAF50,#66BB6A);border-radius:60px 0 0 0;z-index:3;opacity:0.7}
.reed{position:fixed;bottom:40%;z-index:4;width:4px;background:linear-gradient(180deg,#2E7D32,#4CAF50);border-radius:2px;transform-origin:bottom center}
.reed::before{content:'';position:absolute;top:-8px;left:-6px;width:16px;height:16px;background:#388E3C;border-radius:50% 50% 50% 0;transform:rotate(-45deg)}
.reed-1{left:12px;height:60px;animation:reedSway 4s ease-in-out infinite}
.reed-2{left:30px;height:50px;animation:reedSway 3.5s ease-in-out infinite 0.5s}
.reed-3{right:12px;height:55px;animation:reedSway 4.2s ease-in-out infinite 1s}
.reed-4{right:28px;height:45px;animation:reedSway 3.8s ease-in-out infinite 0.3s}
@keyframes reedSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}

.lilypad{position:fixed;z-index:4;width:40px;height:24px;background:radial-gradient(ellipse,#66BB6A,#388E3C);border-radius:50%;opacity:0.6}
.lilypad-1{bottom:12%;left:15%;animation:lilyBob 3s ease-in-out infinite}
.lilypad-2{bottom:20%;right:18%;animation:lilyBob 3.5s ease-in-out infinite 1s}
.lilypad-3{bottom:32%;left:60%;width:32px;height:18px;animation:lilyBob 4s ease-in-out infinite 0.5s}
@keyframes lilyBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Screens */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 0.5s;opacity:0;visibility:hidden;pointer-events:none;z-index:var(--z-screen);padding:20px}
.screen.active{opacity:1;visibility:visible;pointer-events:auto}
.screen-title{background:linear-gradient(180deg,#87CEEB,#B0E0FF,#4FC3F7)}
.screen-title h1{font-size:clamp(30px,8vw,50px);color:#01579B;margin:10px 0;font-weight:900}
.screen-title p{font-size:clamp(15px,3.8vw,22px);color:#333;max-width:440px;line-height:1.4;font-weight:600}
.screen-title .icon-row{font-size:clamp(40px,10vw,70px);margin-bottom:5px}

.btn{min-width:var(--tap);min-height:60px;padding:14px 40px;font-size:clamp(20px,5vw,28px);font-family:var(--font);color:#fff;border:none;border-radius:30px;cursor:pointer;font-weight:900;box-shadow:0 4px 15px rgba(0,0,0,0.15);transition:transform 0.1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.93)}
.btn-start{background:linear-gradient(135deg,#42A5F5,#01579B);animation:glow 2.5s ease-in-out infinite;margin-top:20px}
.btn-again{background:linear-gradient(135deg,#42A5F5,#01579B);margin-top:16px}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.1)}}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;background:rgba(255,255,255,0.85);backdrop-filter:blur(4px);border-bottom:3px solid rgba(0,0,0,0.06)}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:2px}
.hud-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.hud-label{font-size:clamp(10px,2.2vw,14px);color:#888;font-weight:900}
.hud-val{font-size:clamp(16px,3.5vw,24px);font-weight:900}
.hud-round .hud-val{color:#01579B}
.hud-score .hud-val{color:#e65100}
.hud-prompt{font-size:clamp(22px,5.5vw,34px);font-weight:900;color:#01579B}

/* Bucket */
.bucket{position:fixed;top:52px;right:8px;z-index:var(--z-ui);width:56px;height:50px;background:linear-gradient(180deg,#8D6E63,#6D4C41);border-radius:4px 4px 8px 8px;border:3px solid #5D4037;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.bucket::before{content:'';position:absolute;top:-6px;left:-4px;right:-4px;height:10px;background:#6D4C41;border-radius:4px;border:2px solid #5D4037}
.bucket-fill{width:100%;background:linear-gradient(180deg,#4FC3F7,#0288D1);transition:height 0.5s ease;border-radius:0 0 4px 4px}
.bucket-count{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:900;color:#5D4037;white-space:nowrap}

/* Fish */
.fish{position:fixed;z-index:var(--z-game);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.15s}
.fish:active{transform:scale(0.92) !important}
.fish-body{position:relative;width:100px;height:56px}
.fish-oval{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center}
.fish-tail{position:absolute;top:50%;width:0;height:0;border-top:18px solid transparent;border-bottom:18px solid transparent;transform:translateY(-50%)}
.fish-tail-left{right:-14px;border-left:20px solid currentColor}
.fish-tail-right{left:-14px;border-right:20px solid currentColor}
.fish-eye{position:absolute;top:14px;width:10px;height:10px;background:#fff;border-radius:50%}
.fish-eye::after{content:'';position:absolute;top:2px;width:6px;height:6px;background:#333;border-radius:50%}
.fish-eye-left{left:16px}
.fish-eye-left::after{left:3px}
.fish-eye-right{right:16px}
.fish-eye-right::after{right:3px}
.fish-letter{font-size:clamp(26px,6vw,36px);font-weight:900;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.25);z-index:1;pointer-events:none}
.fish-mouth{position:absolute;top:50%;width:6px;height:8px;background:rgba(0,0,0,0.2);border-radius:50%;transform:translateY(-50%)}
.fish-mouth-left{left:4px}
.fish-mouth-right{right:4px}

/* Swim animation */
@keyframes swimRight{
  0%{transform:translateX(-140px) translateY(0)}
  25%{transform:translateX(25vw) translateY(-8px)}
  50%{transform:translateX(50vw) translateY(4px)}
  75%{transform:translateX(75vw) translateY(-6px)}
  100%{transform:translateX(calc(100vw + 60px)) translateY(0)}
}
@keyframes swimLeft{
  0%{transform:translateX(calc(100vw + 60px)) translateY(0)}
  25%{transform:translateX(75vw) translateY(-8px)}
  50%{transform:translateX(50vw) translateY(4px)}
  75%{transform:translateX(25vw) translateY(-6px)}
  100%{transform:translateX(-140px) translateY(0)}
}

/* Fishing line */
.fishing-line{position:fixed;z-index:var(--z-overlay);pointer-events:none}
.fishing-line-wire{position:absolute;top:0;left:50%;width:2px;background:#333;transform:translateX(-50%)}
.fishing-hook{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:12px;height:16px;border:3px solid #666;border-top:none;border-radius:0 0 8px 8px}

/* Catch animation */
.fish-caught{z-index:var(--z-overlay);pointer-events:none}

/* Splash effect */
.splash{position:fixed;z-index:998;pointer-events:none;font-size:20px;animation:splashUp 0.8s ease-out forwards}
@keyframes splashUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px) scale(0.3);opacity:0}}

/* Confetti */
.confetti-piece{position:fixed;z-index:999;pointer-events:none;border-radius:3px}

/* Celebration */
.celeb{position:fixed;inset:0;z-index:var(--z-celeb);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;background:linear-gradient(180deg,#87CEEB,#B0E0FF,#4FC3F7);opacity:0;visibility:hidden;pointer-events:none;transition:opacity 0.6s}
.celeb.active{opacity:1;visibility:visible;pointer-events:auto}
.celeb h1{font-size:clamp(30px,8vw,50px);color:#01579B;font-weight:900;margin:10px 0}
.celeb .stars{font-size:clamp(40px,10vw,60px);margin:10px 0}
.celeb p{font-size:clamp(16px,4vw,22px);color:#333;font-weight:700}

/* Final fish row */
.fish-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:15px 0}
.fish-badge{width:clamp(32px,7vw,42px);height:clamp(32px,7vw,42px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,3.5vw,18px);font-weight:900;color:#fff;opacity:0;transition:opacity 0.4s}
.fish-badge.caught{opacity:1}
</style>
</head>
<body>

<div class="bg">
  <div class="sky"></div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="water"></div>
  <div class="wave-line"></div>
  <div class="bank-left"></div>
  <div class="bank-right"></div>
  <div class="reed reed-1"></div>
  <div class="reed reed-2"></div>
  <div class="reed reed-3"></div>
  <div class="reed reed-4"></div>
  <div class="lilypad lilypad-1"></div>
  <div class="lilypad lilypad-2"></div>
  <div class="lilypad lilypad-3"></div>
</div>

<!-- Title -->
<div class="screen screen-title active" id="titleScreen">
  <div class="icon-row">🎣 🐟 🎣</div>
  <h1>Letter Fishing</h1>
  <p>Catch the right letter-fish from the pond!</p>
  <button class="btn btn-start" id="startBtn">Let's Fish! 🎣</button>
</div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <span class="hud-label">ROUND</span>
    <span class="hud-val" id="hudRound">1 / 5</span>
  </div>
  <div class="hud-center">
    <span class="hud-prompt" id="hudPrompt">Catch the A!</span>
  </div>
  <div class="hud-right hud-score">
    <span class="hud-label">CAUGHT</span>
    <span class="hud-val" id="hudScore">🐟 0/5</span>
  </div>
</div>

<!-- Bucket -->
<div class="bucket" id="bucket" style="display:none">
  <div class="bucket-fill" id="bucketFill" style="height:0%"></div>
  <div class="bucket-count" id="bucketCount">🐟 0/5</div>
</div>

<!-- Celebration -->
<div class="celeb" id="celebScreen">
  <div class="stars">⭐ 🐟 ⭐</div>
  <h1>Bucket Full!</h1>
  <div class="fish-row" id="finalFishRow"></div>
  <p>You caught <span id="celebCount">0</span> letter-fish!</p>
  <button class="btn btn-again" id="againBtn">Fish Again! 🎣</button>
</div>

<script>
const AUDIO_BASE = '../../audio';

// ── Audio ──
class GameAudio {
  constructor() { this.ctx = null; this.musicGain = null; this.voiceQueue = []; this.voicePlaying = false; }
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = 0.07;
    this.musicGain.connect(this.ctx.destination);
  }
  startMusic() {
    this.init();
    const notes = [392, 440, 523, 587, 659, 587, 523, 440];
    let i = 0;
    const play = () => {
      if (!this.ctx) return;
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = notes[i % notes.length];
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + 0.1);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.85);
      osc.connect(g); g.connect(this.musicGain);
      osc.start(); osc.stop(this.ctx.currentTime + 0.9);
      i++;
      this.musicTimer = setTimeout(play, 900);
    };
    play();
  }
  stopMusic() { clearTimeout(this.musicTimer); }
  playSFX(freq, type = 'sine', dur = 0.3) {
    this.init();
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.25, this.ctx.currentTime);
    g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + dur);
    osc.connect(g); g.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + dur);
  }
  playSplash() {
    this.playSFX(300, 'sine', 0.1);
    setTimeout(() => this.playSFX(200, 'sine', 0.15), 60);
    setTimeout(() => this.playSFX(150, 'sine', 0.2), 120);
  }
  playCorrect() {
    this.playSFX(523, 'sine', 0.12);
    setTimeout(() => this.playSFX(659, 'sine', 0.12), 80);
    setTimeout(() => this.playSFX(784, 'sine', 0.25), 160);
  }
  playWrong() { this.playSFX(200, 'square', 0.2); }
  playCelebration() {
    [523, 659, 784, 1047, 784, 1047].forEach((n, i) => setTimeout(() => this.playSFX(n, 'sine', 0.3), i * 150));
  }
  duckMusic() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(0.02, this.ctx.currentTime + 0.2); }
  unduckMusic() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(0.07, this.ctx.currentTime + 0.3); }
  queueVoice(file) {
    return new Promise(resolve => {
      this.voiceQueue.push({ file, resolve });
      if (!this.voicePlaying) this._playNext();
    });
  }
  _playNext() {
    if (!this.voiceQueue.length) { this.voicePlaying = false; return; }
    this.voicePlaying = true;
    const { file, resolve } = this.voiceQueue.shift();
    this.duckMusic();
    const a = new Audio(file); a.volume = 0.9;
    a.onended = () => { this.unduckMusic(); resolve(); this._playNext(); };
    a.onerror = () => { this.unduckMusic(); resolve(); this._playNext(); };
    a.play().catch(() => { this.unduckMusic(); resolve(); this._playNext(); });
  }
}

const audio = new GameAudio();

// ── Helpers ──
const $ = id => document.getElementById(id);
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function shuffle(a) { const b = [...a]; for (let i = b.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); t = true; fn(e); }, { passive: false });
  el.addEventListener('click', e => { if (!t) fn(e); t = false; });
}

// ── Effects ──
function burstConfetti(x, y, count = 20) {
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#FFD93D','#C9B1FF','#FF85A2'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (4 + Math.random() * 6) + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = 50 + Math.random() * 100;
    el.animate([
      { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
      { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist - 80}px) rotate(${360+Math.random()*360}deg)`, opacity: 0 }
    ], { duration: 1200 + Math.random() * 800, easing: 'ease-out' });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

function splashEffect(x, y) {
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'splash';
    s.textContent = '💧';
    s.style.left = (x - 10 + (Math.random() - 0.5) * 80) + 'px';
    s.style.top = (y - 10 + (Math.random() - 0.5) * 60) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

// ── Game ──
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const FISH_COLORS = ['#E91E63','#9C27B0','#673AB7','#3F51B5','#2196F3','#00BCD4','#009688','#4CAF50','#FF9800','#FF5722','#F44336','#8BC34A'];

const LETTERS_PER_ROUND = 5;
const TOTAL_ROUNDS = 5;

let allGameLetters = [];
let rounds = [];
let currentRound = 0;
let roundLetters = [];
let currentLetterIndex = 0;
let targetLetter = '';
let roundCaught = 0;
let totalCaught = 0;
let canTap = false;
let spawnTimer = null;
let hintTimer = null;
let allCaughtLetters = [];
let waveDirection = 0; // alternates 0=left, 1=right

function buildRounds() {
  const shuffled = shuffle(LETTERS);
  rounds = [];
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    rounds.push({
      letters: shuffled.slice(i * LETTERS_PER_ROUND, (i + 1) * LETTERS_PER_ROUND),
      distractors: 3,
      speed: 5000 - i * 200 // 5000, 4800, 4600, 4400, 4200
    });
  }
}

// ── Fish lanes ──
function getLane(index, total) {
  // Distribute fish across vertical lanes in the water area
  const waterTop = window.innerHeight * 0.38 + 30; // below wave line
  const waterBottom = window.innerHeight - 40;
  const laneHeight = (waterBottom - waterTop) / (total + 1);
  return waterTop + laneHeight * (index + 1) - 28; // center the fish
}

// ── Create Fish ──
function createFish(letter, isTarget, speed, laneIndex, totalLanes) {
  const color = FISH_COLORS[Math.floor(Math.random() * FISH_COLORS.length)];
  const goLeft = waveDirection % 2 === 0; // alternating direction per wave
  const topY = getLane(laneIndex, totalLanes);

  const el = document.createElement('div');
  el.className = 'fish';
  el.style.top = topY + 'px';
  el.dataset.letter = letter;

  const animName = goLeft ? 'swimLeft' : 'swimRight';
  el.style.animation = `${animName} ${speed}ms linear forwards`;

  // Fish body HTML
  el.innerHTML = `
    <div class="fish-body">
      <div class="fish-oval" style="background:radial-gradient(ellipse at 40% 40%,${color}cc,${color});border:3px solid ${color}">
        <span class="fish-letter">${letter}</span>
      </div>
      <div class="fish-tail ${goLeft ? 'fish-tail-right' : 'fish-tail-left'}" style="color:${color}"></div>
      <div class="fish-eye ${goLeft ? 'fish-eye-right' : 'fish-eye-left'}"></div>
      <div class="fish-mouth ${goLeft ? 'fish-mouth-right' : 'fish-mouth-left'}"></div>
    </div>
  `;

  onTap(el, (e) => {
    if (!canTap) return;
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    if (letter === targetLetter) {
      canTap = false;
      el.style.animationPlayState = 'paused';

      audio.playSplash();
      audio.playCorrect();
      splashEffect(cx, cy);
      burstConfetti(cx, cy, 20);

      // Animate fish up to bucket
      el.classList.add('fish-caught');
      el.style.animation = 'none';
      const bucketRect = $('bucket').getBoundingClientRect();
      const targetX = bucketRect.left + bucketRect.width / 2 - 50;
      const targetY = bucketRect.top;
      el.style.transition = 'all 0.6s ease-in';
      el.style.left = targetX + 'px';
      el.style.top = targetY + 'px';
      el.style.transform = 'scale(0.4)';
      el.style.opacity = '0.6';

      roundCaught++;
      totalCaught++;
      allCaughtLetters.push({ letter, color });
      updateBucket();
      $('hudScore').textContent = `🐟 ${roundCaught}/${roundLetters.length}`;

      // Clear other fish
      clearSpawning();
      document.querySelectorAll('.fish:not(.fish-caught)').forEach(f => {
        f.style.transition = 'opacity 0.3s';
        f.style.opacity = '0';
        setTimeout(() => f.remove(), 400);
      });

      setTimeout(() => {
        el.remove();
        // Say letter
        audio.queueVoice(`${AUDIO_BASE}/letters/${letter.toLowerCase()}.mp3`).then(() => {
          delay(300).then(nextLetter);
        });
      }, 650);
    } else {
      // Wrong fish — wobble and speed away
      audio.playWrong();
      el.style.animationDuration = '0.8s';
      el.style.transform = 'rotate(15deg)';
      setTimeout(() => { el.style.transform = ''; }, 200);
      // Re-say target
      audio.queueVoice(`${AUDIO_BASE}/letters/${targetLetter.toLowerCase()}.mp3`);
    }
  });

  document.body.appendChild(el);

  // Remove when swum off screen
  setTimeout(() => {
    if (el.parentNode && !el.classList.contains('fish-caught')) el.remove();
  }, speed + 200);

  return el;
}

function clearSpawning() {
  clearInterval(spawnTimer);
  spawnTimer = null;
}

function updateBucket() {
  const total = roundLetters.length;
  const pct = Math.min(100, (roundCaught / total) * 100);
  $('bucketFill').style.height = pct + '%';
  $('bucketCount').textContent = `🐟 ${roundCaught}/${total}`;
}

// ── Game Flow ──
async function startGame() {
  audio.init();
  audio.startMusic();
  $('titleScreen').classList.remove('active');
  await delay(400);
  $('hud').style.display = '';
  $('bucket').style.display = '';

  currentRound = 0;
  totalCaught = 0;
  allCaughtLetters = [];
  buildRounds();
  startRound();
}

async function startRound() {
  const round = rounds[currentRound];
  roundLetters = shuffle(round.letters);
  currentLetterIndex = 0;
  roundCaught = 0;
  updateBucket();
  $('hudRound').textContent = `${currentRound + 1} / ${TOTAL_ROUNDS}`;
  $('hudScore').textContent = `🐟 0/${roundLetters.length}`;
  nextLetter();
}

async function nextLetter() {
  if (currentLetterIndex >= roundLetters.length) {
    // Round complete
    currentRound++;
    if (currentRound >= TOTAL_ROUNDS) {
      endGame();
      return;
    }
    await delay(600);
    startRound();
    return;
  }

  const round = rounds[currentRound];
  targetLetter = roundLetters[currentLetterIndex];
  currentLetterIndex++;

  $('hudPrompt').textContent = `Catch the ${targetLetter}!`;

  // Say target letter name + sound
  await audio.queueVoice(`${AUDIO_BASE}/letters/${targetLetter.toLowerCase()}.mp3`);
  await delay(200);
  await audio.queueVoice(`${AUDIO_BASE}/letters/${targetLetter.toLowerCase()}_sound.mp3`);
  await delay(300);

  canTap = true;
  waveDirection++;

  // Spawn fish in waves
  const others = LETTERS.filter(l => l !== targetLetter);

  function spawnWave() {
    // Clean up off-screen fish
    document.querySelectorAll('.fish:not(.fish-caught)').forEach(f => {
      const rect = f.getBoundingClientRect();
      if (rect.right < -20 || rect.left > window.innerWidth + 20) f.remove();
    });

    const numDistractors = Math.min(round.distractors, 3);
    const waveLetters = [targetLetter];
    const distractors = shuffle(others).slice(0, numDistractors);
    waveLetters.push(...distractors);
    const mixed = shuffle(waveLetters);
    const totalInWave = mixed.length;

    mixed.forEach((letter, i) => {
      setTimeout(() => {
        if (canTap || letter !== targetLetter) {
          createFish(letter, letter === targetLetter, round.speed, i, totalInWave);
        }
      }, i * 300);
    });
  }

  spawnWave();
  spawnTimer = setInterval(spawnWave, round.speed * 0.55);

  // Hint: repeat target letter every 4 seconds
  clearInterval(hintTimer);
  hintTimer = setInterval(() => {
    if (canTap) {
      audio.queueVoice(`${AUDIO_BASE}/letters/${targetLetter.toLowerCase()}.mp3`);
    }
  }, 4000);
}

async function endGame() {
  audio.stopMusic();
  clearSpawning();
  clearInterval(hintTimer);
  document.querySelectorAll('.fish').forEach(f => f.remove());
  audio.playCelebration();

  await delay(400);
  $('hud').style.display = 'none';
  $('bucket').style.display = 'none';

  // Build final fish display
  const row = $('finalFishRow');
  row.innerHTML = '';
  allCaughtLetters.forEach((item, i) => {
    const b = document.createElement('div');
    b.className = 'fish-badge caught';
    b.style.background = item.color;
    b.textContent = item.letter;
    b.style.opacity = '0';
    row.appendChild(b);
    setTimeout(() => { b.style.opacity = '1'; }, i * 80);
  });
  $('celebCount').textContent = totalCaught;
  $('celebScreen').classList.add('active');

  for (let i = 0; i < 4; i++) {
    setTimeout(() => burstConfetti(Math.random() * window.innerWidth, Math.random() * window.innerHeight * 0.4, 30), i * 350);
  }

  await audio.queueVoice(`${AUDIO_BASE}/phrases/great_job.mp3`);
}

// ── Init ──
onTap($('startBtn'), startGame);
onTap($('againBtn'), () => {
  $('celebScreen').classList.remove('active');
  currentRound = 0;
  totalCaught = 0;
  allCaughtLetters = [];
  buildRounds();
  $('hud').style.display = '';
  $('bucket').style.display = '';
  $('bucketFill').style.height = '0%';
  audio.startMusic();
  startRound();
});
</script>
</body>
