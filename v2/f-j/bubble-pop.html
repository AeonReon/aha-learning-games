<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Catch the Letter Fireflies!</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --forest-deep: #0a1f0d; --forest-mid: #143d1a; --forest-light: #1e5c28;
  --brown: #6b3d1a; --bark: #3d2410;
  --pink: #ff9ec7; --pink-glow: rgba(255,158,199,0.6);
  --yellow: #fff59d; --yellow-glow: rgba(255,235,59,0.85);
  --green-glow: rgba(180,255,120,0.75);
  --gold: #ffd700;
  --white85: rgba(255,255,255,0.9);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: linear-gradient(180deg, #0a1f0d 0%, #143d1a 40%, #1e5c28 70%, #0a1f0d 100%);
}

/* Tree silhouettes */
.tree {
  position: fixed; bottom: 0;
  pointer-events: none;
  z-index: var(--z-bg);
  opacity: 0.85;
}
.tree-1 {
  left: -30px;
  width: 140px; height: 100vh;
  background: linear-gradient(to right, rgba(10,15,5,0.95), rgba(20,30,15,0.85) 50%, transparent);
}
.tree-2 {
  right: -30px;
  width: 120px; height: 100vh;
  background: linear-gradient(to left, rgba(10,15,5,0.95), rgba(20,30,15,0.85) 50%, transparent);
}
.tree-3 {
  left: 25%;
  width: 60px; height: 70vh;
  background: linear-gradient(to top, rgba(15,25,10,0.6), transparent);
}
.tree-4 {
  right: 30%;
  width: 70px; height: 80vh;
  background: linear-gradient(to top, rgba(15,25,10,0.55), transparent);
}

/* Background fireflies (decorative) */
.bg-fly {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  width: clamp(4px, 1vw, 6px);
  height: clamp(4px, 1vw, 6px);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,245,80,1), rgba(180,255,100,0.6) 50%, transparent);
  box-shadow: 0 0 6px rgba(255,235,59,0.8), 0 0 12px rgba(180,255,100,0.4);
  animation: flyTwinkle 2.5s ease-in-out infinite, flyDrift 18s ease-in-out infinite;
  opacity: 0.8;
}
@keyframes flyTwinkle {
  0%,100% { opacity: 0.3; transform: scale(0.7); }
  50%     { opacity: 1;   transform: scale(1.2); }
}
@keyframes flyDrift {
  0%,100% { margin-left: 0; margin-top: 0; }
  25%     { margin-left: 20px; margin-top: -15px; }
  50%     { margin-left: -10px; margin-top: 10px; }
  75%     { margin-left: 15px; margin-top: 5px; }
}

/* Falling petals */
.petal {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  font-size: clamp(10px, 2vw, 16px);
  opacity: 0.6;
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(105vh) rotate(540deg); opacity: 0; }
}

/* Screen system */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* Title screen */
.screen-title .icon-row {
  display: flex; gap: 14px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(36px, 9vw, 64px); }
.screen-title h1 {
  font-size: clamp(28px, 7vw, 52px);
  color: var(--yellow);
  text-shadow: 0 0 30px var(--yellow-glow), 2px 2px 0 rgba(0,0,0,0.6);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(14px, 3.5vw, 20px);
  color: var(--white85);
  max-width: 400px; line-height: 1.45;
}

/* Buttons */
.btn {
  min-width: var(--tap); min-height: 62px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #2a1a0a; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.5);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg, #ffe066, #ffb347); margin-top: 20px; animation: glow 2.4s ease-in-out infinite; }
.btn-again { background: linear-gradient(135deg, #ffe066, #ff9ec7); margin-top: 18px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.25) drop-shadow(0 0 12px rgba(255,235,59,0.7))} }

/* HUD */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(10,20,10,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(180,255,120,0.2);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.45); font-weight: bold; letter-spacing: 0.05em; }
.hud-val   { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--yellow); }
.hud-score .hud-val { color: var(--pink); }
.hud-target {
  display: flex; flex-direction: column; align-items: center;
}
.hud-target-label { font-size: clamp(10px,2.2vw,12px); color: rgba(255,255,255,0.55); font-weight: bold; }
.hud-target-letter {
  font-size: clamp(32px,7vw,50px); font-weight: 900;
  color: var(--yellow);
  text-shadow: 0 0 20px var(--yellow-glow), 0 0 40px var(--green-glow);
  line-height: 1;
  display: flex; align-items: baseline; gap: 4px;
}
.hud-target-upper { font-size: 1em; }
.hud-target-lower { font-size: 0.65em; color: #fff; opacity: 0.9; }
.hud-target-emoji { font-size: clamp(16px,3vw,22px); opacity: 0.85; margin-top: 2px; }

/* Lantern area (bottom right) */
.lantern-area {
  position: fixed; bottom: 60px; right: 12px;
  z-index: var(--z-char);
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
}
.lantern-emoji {
  font-size: clamp(42px, 10vw, 68px);
  filter: drop-shadow(0 0 8px rgba(255,235,59,0.3));
  transition: filter 0.5s;
}
.lantern-emoji.glow-1 { filter: drop-shadow(0 0 12px rgba(255,235,59,0.5)); }
.lantern-emoji.glow-2 { filter: drop-shadow(0 0 20px rgba(255,235,59,0.7)); }
.lantern-emoji.glow-3 { filter: drop-shadow(0 0 28px rgba(255,235,59,0.85)); }
.lantern-emoji.glow-4 { filter: drop-shadow(0 0 38px rgba(255,245,120,1)); }
.lantern-emoji.glow-full {
  filter: drop-shadow(0 0 45px rgba(255,245,120,1)) drop-shadow(0 0 70px rgba(180,255,100,0.7));
  animation: lanternPulse 0.8s ease-in-out infinite;
}
@keyframes lanternPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
.lantern-count {
  font-size: clamp(14px,3vw,20px); font-weight: 900;
  color: var(--yellow); margin-top: 2px;
  text-shadow: 0 0 8px rgba(0,0,0,0.8);
}

/* Character (Pip the fairy) */
.char-area {
  position: fixed; bottom: 62px; left: 12px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji {
  font-size: clamp(42px,9vw,62px);
  filter: drop-shadow(0 0 10px rgba(255,158,199,0.6));
  animation: fairyHover 2.6s ease-in-out infinite;
}
@keyframes fairyHover {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%     { transform: translateY(-8px) rotate(3deg); }
}
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96); color: #3d1f4a;
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(12px,2.6vw,16px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.4);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 8px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.96);
}

/* Firefly play area */
.play-area {
  position: fixed;
  top: 68px; left: 0; right: 0; bottom: 52px;
  z-index: var(--z-game);
  overflow: hidden;
}

/* Firefly */
.firefly {
  position: absolute;
  width: clamp(72px, 18vw, 104px);
  height: clamp(72px, 18vw, 104px);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  z-index: var(--z-game);
  transition: transform 0.1s;
}
.firefly:active { transform: scale(0.92); }
.firefly-body {
  position: relative;
  width: 100%; height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,200,1) 0%,
    rgba(255,235,100,0.95) 25%,
    rgba(200,255,120,0.85) 55%,
    rgba(120,200,80,0.6) 85%,
    rgba(80,160,50,0.1) 100%);
  box-shadow:
    0 0 15px rgba(255,235,100,0.9),
    0 0 30px rgba(180,255,100,0.6),
    0 0 45px rgba(180,255,100,0.35),
    inset 0 -5px 12px rgba(255,200,50,0.3);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  animation: fireflyPulse 1.3s ease-in-out infinite;
}
@keyframes fireflyPulse {
  0%,100% {
    box-shadow: 0 0 12px rgba(255,235,100,0.85), 0 0 24px rgba(180,255,100,0.55), 0 0 40px rgba(180,255,100,0.3);
  }
  50% {
    box-shadow: 0 0 20px rgba(255,245,140,1), 0 0 40px rgba(200,255,120,0.8), 0 0 60px rgba(200,255,120,0.5);
  }
}
.firefly-body::before {
  content: '';
  position: absolute;
  top: 8%; left: 20%;
  width: 25%; height: 18%;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  filter: blur(2px);
}

/* Firefly letter */
.firefly-upper {
  font-size: clamp(26px, 6.5vw, 42px);
  font-weight: 900;
  color: #1a3a0d;
  line-height: 1;
  text-shadow: 0 1px 2px rgba(255,255,255,0.6);
}
.firefly-lower {
  font-size: clamp(14px, 3.2vw, 20px);
  font-weight: 900;
  color: #2a4a1a;
  line-height: 1;
  margin-top: 2px;
}
.firefly-emoji {
  font-size: clamp(26px, 6vw, 38px);
  line-height: 1;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25));
}
.firefly-emoji-small {
  font-size: clamp(18px, 4vw, 26px);
  line-height: 1;
  margin-bottom: 1px;
}

/* Firefly float animation (rising) */
.firefly-floating {
  animation: fireflyFloat linear forwards;
}
@keyframes fireflyFloat {
  0%   { transform: translateY(0) translateX(0); opacity: 0; }
  4%   { opacity: 1; }
  25%  { transform: translateY(-22vh) translateX(18px); }
  50%  { transform: translateY(-48vh) translateX(-14px); }
  75%  { transform: translateY(-72vh) translateX(14px); }
  94%  { opacity: 1; }
  100% { transform: translateY(calc(-100vh - 140px)) translateX(-6px); opacity: 0; }
}

/* Wrong wiggle */
.firefly-wrong {
  animation: fireflyWiggle 0.5s ease-in-out;
}
@keyframes fireflyWiggle {
  0%,100% { transform: rotate(0) scale(1); }
  20% { transform: rotate(-14deg) scale(1.08); }
  40% { transform: rotate(12deg) scale(1.08); }
  60% { transform: rotate(-8deg) scale(1.04); }
  80% { transform: rotate(8deg) scale(1.04); }
}

/* Captured - fly to lantern */
.firefly-captured {
  transition: all 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
  opacity: 0 !important;
  transform: scale(0.3) !important;
}

/* Oopsie text */
.oopsie-text {
  position: absolute;
  font-size: clamp(16px,4vw,24px);
  font-weight: 900;
  color: var(--pink);
  text-shadow: 0 0 10px rgba(255,158,199,0.8), 0 1px 3px rgba(0,0,0,0.6);
  pointer-events: none;
  animation: oopsieFloat 0.9s ease-out forwards;
  z-index: calc(var(--z-game) + 5);
}
@keyframes oopsieFloat {
  0%   { transform: translateY(0) scale(0.6); opacity: 1; }
  100% { transform: translateY(-45px) scale(1.25); opacity: 0; }
}

/* Progress bar */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(4px,1.2vw,8px); flex-wrap: wrap;
  padding: 6px 10px 8px;
  background: rgba(10,20,10,0.92); backdrop-filter: blur(5px);
  pointer-events: none;
  border-top: 2px solid rgba(180,255,120,0.18);
}
.prog-dot {
  width: clamp(30px,5.8vw,40px);
  height: clamp(30px,5.8vw,40px);
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,2.8vw,18px);
  color: rgba(255,255,255,0.3);
  font-weight: 900;
}
.prog-dot.done {
  background: linear-gradient(135deg, var(--yellow), var(--pink));
  border-color: var(--gold); color: #2a1a0a;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* Round banner */
.round-banner {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(10,25,10,0.95); backdrop-filter: blur(12px);
  border: 2px solid rgba(255,235,100,0.25); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(22px,5.5vw,36px); font-weight: 900;
  color: var(--yellow); text-shadow: 0 0 15px var(--yellow-glow);
}
.round-banner p {
  font-size: clamp(13px,3vw,18px);
  color: rgba(255,255,255,0.75); margin-top: 6px;
  font-weight: bold;
}
.round-banner .banner-letter {
  font-size: clamp(48px, 12vw, 80px);
  color: var(--pink);
  text-shadow: 0 0 20px var(--pink-glow);
  display: block;
  margin: 6px 0;
  line-height: 1;
}

/* Celebration screen */
.screen-celeb {
  background: rgba(10,25,10,0.95); backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(26px,6.5vw,48px); color: var(--yellow);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.5), 0 0 20px var(--yellow-glow);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(14px,3.5vw,22px); color: rgba(255,255,255,0.95); margin: 6px 0; font-weight: bold; }
.celeb-stars   { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-icon-row { display:flex; gap:12px; justify-content:center; align-items:center; margin-bottom:10px; }
.celeb-icon-row span { font-size:clamp(50px,13vw,84px); }
.celeb-pip-dance { animation: fairyDance 1s ease-in-out infinite; display: inline-block; }

/* Particles */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }

/* Keyframes */
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes fairyDance  {
  0%,100%{transform:translateY(0) rotate(0) scale(1)}
  15%{transform:translateY(-22px) rotate(-10deg) scale(1.1)}
  30%{transform:translateY(0) rotate(10deg)}
  45%{transform:translateY(-14px) rotate(-6deg) scale(1.06)}
  60%{transform:translateY(0) rotate(6deg)}
  75%{transform:translateY(-10px) rotate(-4deg) scale(1.08)}
}
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-24px) scale(1.1)} 70%{transform:translateY(-10px) scale(1.04)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }
</style>
</head>
<body>

<!-- Tree silhouettes -->
<div class="tree tree-1"></div>
<div class="tree tree-2"></div>
<div class="tree tree-3"></div>
<div class="tree tree-4"></div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <span class="hud-label">ROUND</span>
    <span class="hud-val" id="hudRound">1/4</span>
  </div>
  <div class="hud-center hud-target">
    <span class="hud-target-label">CATCH THE</span>
    <span class="hud-target-letter">
      <span class="hud-target-upper" id="hudTargetUpper">F</span><span class="hud-target-lower" id="hudTargetLower">f</span>
    </span>
    <span class="hud-target-emoji" id="hudTargetEmoji"></span>
  </div>
  <div class="hud-right hud-score">
    <span class="hud-label">SPARKS</span>
    <span class="hud-val" id="hudScore">0</span>
  </div>
</div>

<!-- Firefly play area -->
<div class="play-area" id="playArea"></div>

<!-- Pip fairy character -->
<div class="char-area" id="charArea" style="display:none">
  <div class="char-bubble" id="charBubble"></div>
  <div class="char-emoji">&#x1F9DA;</div>
</div>

<!-- Lantern -->
<div class="lantern-area" id="lanternArea" style="display:none">
  <div class="lantern-emoji" id="lanternEmoji">&#x1F3EE;</div>
  <div class="lantern-count" id="lanternCount">0/5</div>
</div>

<!-- Progress bar -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- Round banner -->
<div class="round-banner" id="roundBanner">
  <h2 id="roundTitle"></h2>
  <span class="banner-letter" id="bannerLetter"></span>
  <p id="roundSub"></p>
</div>

<!-- TITLE SCREEN -->
<div class="screen screen-title active" id="scrTitle">
  <div class="icon-row">
    <span>&#x1F338;</span>
    <span>&#x1F9DA;</span>
    <span>&#x1F3EE;</span>
  </div>
  <h1>Catch the Letter Fireflies!</h1>
  <p>Glowing fireflies are floating up through the enchanted forest! Tap the ones with Pip's letter to fly them into the fairy lantern.</p>
  <button class="btn btn-start" id="btnStart">Let's Play!</button>
</div>

<!-- CELEBRATION SCREEN -->
<div class="screen screen-celeb" id="scrCeleb">
  <div class="celeb-icon-row">
    <span>&#x1F3EE;</span>
    <span class="celeb-pip-dance">&#x1F9DA;</span>
    <span>&#x1F338;</span>
  </div>
  <h2 id="celebTitle">All Fireflies Caught!</h2>
  <p id="celebMsg">Pip's lantern is full of sparkling fireflies!</p>
  <div class="celeb-stars" id="celebStars"></div>
  <button class="btn btn-again" id="btnAgain">Play Again!</button>
</div>

<script>
// ====================================================================
//  Aha! -- Fairy Forest Firefly Catch (F-J)
//  Tap glowing fireflies carrying Pip's letters!
//  Voice B (en-GB-SoniaNeural) -- Enchanted forest theme
// ====================================================================

const AUDIO_BASE = '../../audio';

const VOICE_B = {
  greetings: [
    'voice-b/greetings/hello-ready-to-play.mp3',
    'voice-b/greetings/lets-discover-something-wonderful.mp3',
    'voice-b/greetings/oh-i-love-this-game.mp3',
    'voice-b/greetings/wonderful-are-you-ready.mp3',
    'voice-b/greetings/lets-begin-our-adventure.mp3',
    'voice-b/greetings/i-am-so-glad-youre-here.mp3',

// ====================================================================
// AUDIO CLASS (AudioContext-first for iOS)
// ====================================================================
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.05; this.sfxVol = 0.3; this.musicDucked = 0.015;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
    this._lastLetterTime = 0;
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Gentle forest pentatonic: softer, dreamy
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.5 ? 'triangle' : 'sine';
      o.frequency.value = f * (Math.random() > 0.7 ? 2 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + 0.25);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.8);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 3);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 700 + Math.random() * 1500);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')   { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(880,t+0.24,0.22,0.45); }
    else if (type==='wrong')     { p(360,t,0.1,0.15); p(310,t+0.08,0.12,0.12); }
    else if (type==='celeb')     { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone') { p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(880,t+0.38,0.2,0.45); }
    else if (type==='pop')       { p(880,t,0.08,0.25); p(1100,t+0.04,0.1,0.2); p(1320,t+0.08,0.08,0.18); }
    else if (type==='hint')      { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='sparkle')   { p(1320,t,0.05,0.18); p(1760,t+0.05,0.06,0.16); p(2093,t+0.1,0.08,0.14); }
    else if (type==='reveal')    { p(440,t,0.1,0.2); p(554.37,t+0.08,0.12,0.25); p(659.25,t+0.16,0.15,0.3); }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(l) {
    // Throttle: don't speak the same letter more than once every 900ms
    const now = Date.now();
    if (now - this._lastLetterTime < 900) return Promise.resolve();
    this._lastLetterTime = now;
    return this.speak(`${AUDIO_BASE}/letters/${l.toLowerCase()}.mp3`);
  }
  clearQueue() { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ====================================================================
// UTILITIES
// ====================================================================
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a)    { return a[Math.floor(Math.random()*a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click',      e => { if(t)return; fn(e); });
}

// Letter pool: target letters F-J
const LETTERS = ['f','g','h','i','j'];
const LETTER_EMOJI = {f:'🌸', g:'🎁', h:'🏠', i:'🍦', j:'🤹'};

// All distractors drawn from a-z (excluding target on the fly)
const ALPHABET = 'abcdefghijklmnopqrstuvwxyz'.split('');

const BUBBLE_CORRECT = ['Into the lantern!', 'Beautiful catch!', 'Sparkle!', 'Oh yes!', 'You got one!', 'Lovely!'];
const BUBBLE_WRONG   = ['Oopsie!', 'Not that one!', 'Try again!', 'Keep looking!', 'Oh dear, another go!'];

// ====================================================================
// VISUAL EFFECTS
// ====================================================================
function confetti(count = 40, extra = []) {
  const all = ['✨','💫','⭐','🌟','🌸','🧚','💖','🌿','🍃','🌼', ...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti'; el.textContent = pick(all);
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top  = '-30px';
    el.style.fontSize = (16 + Math.random()*14) + 'px';
    el.style.animationDelay    = (Math.random()*1.8) + 's';
    el.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6200);
  }
}

function starBurst(x, y) {
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'starburst';
    s.textContent = pick(['✨','💫','⭐','🌟','💛','🌿']);
    s.style.left = (x + (Math.random()-0.5)*110) + 'px';
    s.style.top  = (y + (Math.random()-0.5)*110) + 'px';
    s.style.animationDelay = (Math.random()*0.2) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

function showCharBubble(text, dur = 2200) {
  const b = $('charBubble');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), dur);
}

function jumpChar() {
  const el = $('charArea');
  el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'charJump 0.5s ease-out';
  // restore hover anim after
  setTimeout(() => { el.style.animation = ''; }, 520);
}

function markProgDone(round) {

// ====================================================================
// LANTERN
// ====================================================================
function updateLantern(caught, needed) {
  $('lanternCount').textContent = caught + '/' + needed;
  const ratio = caught / needed;
  const emoji = $('lanternEmoji');
  emoji.className = 'lantern-emoji';
  if (ratio >= 1)        emoji.classList.add('glow-full');
  else if (ratio >= 0.8) emoji.classList.add('glow-4');
  else if (ratio >= 0.6) emoji.classList.add('glow-3');
  else if (ratio >= 0.4) emoji.classList.add('glow-2');
  else if (ratio >= 0.2) emoji.classList.add('glow-1');
}

// ====================================================================
// FIREFLY CREATION
// ====================================================================
function createFirefly(letter, displayMode, floatDuration) {
  const firefly = document.createElement('div');
  firefly.className = 'firefly';
  firefly.dataset.letter = letter;

  const body = document.createElement('div');
  body.className = 'firefly-body';

  if (displayMode === 'letters') {
    // Round 1, 2, 4: Big UPPER + small lower (always both)
    const upper = document.createElement('div');
    upper.className = 'firefly-upper';
    upper.textContent = letter.toUpperCase();
    body.appendChild(upper);

    const lower = document.createElement('div');
    lower.className = 'firefly-lower';
    lower.textContent = letter.toLowerCase();
    body.appendChild(lower);
  } else if (displayMode === 'picture') {
    // Round 3: emoji picture + small lowercase letter
    const emoji = document.createElement('div');
    emoji.className = 'firefly-emoji';
    emoji.textContent = LETTER_EMOJI[letter] || '🌸';
    body.appendChild(emoji);

    const lower = document.createElement('div');
    lower.className = 'firefly-lower';
    lower.style.fontSize = 'clamp(13px,3vw,18px)';
    lower.textContent = letter.toLowerCase();
    body.appendChild(lower);
  }

  firefly.appendChild(body);

  // Position at bottom, random x
  const area = $('playArea');
  const areaW = area.clientWidth;
  const flyW = 100;
  const maxX = Math.max(10, areaW - flyW - 10);
  const x = 10 + Math.random() * maxX;

  firefly.style.left = x + 'px';
  firefly.style.bottom = '-120px';
  firefly.style.animationDuration = floatDuration + 's';
  firefly.classList.add('firefly-floating');

  return firefly;
}

// ====================================================================
// GAME STATE
// ====================================================================
const audio = new GameAudio();
let currentRound = 0;
let totalScore = 0;
let roundCaught = 0;
const NEEDED_PER_ROUND = 5;
let targetLetter = '';
let roundActive = false;
let spawnTimer = null;
let thinkTimer = null;
let firefliesOnScreen = [];
let spawnCount = 0;
const MAX_SPAWNS = 28;

// Round configs
// Round 1: letters slow (15s), Round 2: letters faster (12s),
// Round 3: pictures (15s), Round 4: mixed/letters fastest (10s)
const ROUNDS = [
  { display: 'letters', speed: 15, hudMode: 'both' },
  { display: 'letters', speed: 12, hudMode: 'both' },
  { display: 'picture', speed: 15, hudMode: 'emoji' },
  { display: 'letters', speed: 10, hudMode: 'upper' }, // Target shown as uppercase only
];

// ====================================================================
// GAME FLOW
// ====================================================================
async function startGame() {
  $('scrTitle').classList.remove('active');
  $('hud').style.display = 'flex';
  $('charArea').style.display = 'block';
  $('lanternArea').style.display = 'flex';
  $('progBar').style.display = 'flex';
  buildProgBar();
  currentRound = 0;
  totalScore = 0;
  targetLetter = '';
  $('hudScore').textContent = '0';
  audio.startMusic();
  await audio.play('greetings');
  await delay(400);
  startRound();
}

async function startRound() {
  roundCaught = 0;
  spawnCount = 0;
  firefliesOnScreen = [];
  $('playArea').innerHTML = '';

  // Pick target - avoid repeating last round's target
  const available = LETTERS.filter(l => l !== targetLetter || LETTERS.length <= 1);
  targetLetter = pick(available);

  const cfg = ROUNDS[currentRound];

  // Update HUD based on round mode
  $('hudRound').textContent = (currentRound+1)+'/4';
  const upperEl = $('hudTargetUpper');
  const lowerEl = $('hudTargetLower');
  const emojiEl = $('hudTargetEmoji');

  if (cfg.hudMode === 'both') {
    upperEl.textContent = targetLetter.toUpperCase();
    upperEl.style.display = 'inline';
    lowerEl.textContent = targetLetter.toLowerCase();
    lowerEl.style.display = 'inline';
    emojiEl.textContent = '';
    emojiEl.style.display = 'none';
  } else if (cfg.hudMode === 'upper') {
    upperEl.textContent = targetLetter.toUpperCase();
    upperEl.style.display = 'inline';
    lowerEl.style.display = 'none';
    emojiEl.textContent = '';
    emojiEl.style.display = 'none';
  } else if (cfg.hudMode === 'emoji') {
    // Round 3: HUD shows the letter (both) - child sees picture on fireflies
    upperEl.textContent = targetLetter.toUpperCase();
    upperEl.style.display = 'inline';
    lowerEl.textContent = targetLetter.toLowerCase();
    lowerEl.style.display = 'inline';
    emojiEl.textContent = LETTER_EMOJI[targetLetter] || '';
    emojiEl.style.display = 'block';
  }

  updateLantern(0, NEEDED_PER_ROUND);

  // Show round banner
  const banner = $('roundBanner');
  $('roundTitle').textContent = 'Round ' + (currentRound+1);
  $('bannerLetter').textContent = targetLetter.toUpperCase() + targetLetter.toLowerCase();
  if (currentRound === 2) {
    $('roundSub').textContent = 'Find the ' + (LETTER_EMOJI[targetLetter]||'') + ' fireflies!';
  } else {
    $('roundSub').textContent = 'Catch the letter ' + targetLetter.toUpperCase() + '!';
  }
  banner.classList.add('show');
  audio.tone('reveal');
  await delay(600);

  // Speak target letter
  await audio.speakLetter(targetLetter);
  await delay(1600);
  banner.classList.remove('show');
  await delay(600);

  showCharBubble('Catch the ' + targetLetter.toUpperCase() + '!', 2800);

  roundActive = true;
  startSpawning();
  startThinkingPrompts();
}

function startSpawning() {
  const cfg = ROUNDS[currentRound];
  const spawnFirefly = () => {
    if (!roundActive) return;
    if (spawnCount >= MAX_SPAWNS && roundCaught < NEEDED_PER_ROUND) {
      spawnCount = 0;
    }

    // ~40% target, rest are distractors
    const isTarget = Math.random() < 0.42;
    let letter;
    if (isTarget) {
      letter = targetLetter;
    } else {
      const distractors = ALPHABET.filter(l => l !== targetLetter);
      letter = pick(distractors);
    }

    const firefly = createFirefly(letter, cfg.display, cfg.speed);
    $('playArea').appendChild(firefly);
    firefliesOnScreen.push(firefly);
    spawnCount++;

    onTap(firefly, (e) => {
      e.stopPropagation();
      if (!roundActive) return;
      if (firefly.dataset.tapped) return;
      handleFireflyTap(firefly, firefly.dataset.letter);
    });

    firefly.addEventListener('animationend', () => {
      if (!firefly.dataset.tapped) {
        firefly.remove();
        firefliesOnScreen = firefliesOnScreen.filter(f => f !== firefly);
      }
    });

    if (roundActive) {
      // Faster spawn interval on faster rounds
      const baseInterval = cfg.speed <= 10 ? 650 : cfg.speed <= 12 ? 780 : 900;
      const interval = baseInterval + Math.random() * 900;
      spawnTimer = setTimeout(spawnFirefly, interval);
    }
  };

  spawnFirefly();
}

function startThinkingPrompts() {
  const prompt = () => {
    if (!roundActive) return;
    // Alternate: say letter, then voice thinking prompt
    if (Math.random() < 0.6) {
      audio.speakLetter(targetLetter);
      showCharBubble('Find the ' + targetLetter.toUpperCase() + '!', 2500);
    } else {
      audio.play('thinking');
    }
    thinkTimer = setTimeout(prompt, 5000 + Math.random() * 1200);
  };
  thinkTimer = setTimeout(prompt, 5500);
}

function stopTimers() {
  roundActive = false;
  clearTimeout(spawnTimer);
  clearTimeout(thinkTimer);
}

async function handleFireflyTap(firefly, letter) {
  firefly.dataset.tapped = 'true';

  if (letter === targetLetter) {
    // CORRECT - fly to Pip's lantern
    roundCaught++;
    totalScore += 10;
    $('hudScore').textContent = totalScore;

    audio.tone('sparkle');
    const rect = firefly.getBoundingClientRect();
    starBurst(rect.left + rect.width/2, rect.top + rect.height/2);

    // Animate to lantern (corner)
    const lanternRect = $('lanternEmoji').getBoundingClientRect();
    firefly.style.position = 'fixed';
    firefly.style.left = rect.left + 'px';
    firefly.style.top = rect.top + 'px';
    firefly.style.bottom = 'auto';
    firefly.classList.remove('firefly-floating');
    firefly.style.animation = 'none';

    firefly.offsetHeight;
    firefly.classList.add('firefly-captured');
    firefly.style.left = (lanternRect.left + lanternRect.width/2 - 40) + 'px';
    firefly.style.top = (lanternRect.top + lanternRect.height/2 - 40) + 'px';

    updateLantern(roundCaught, NEEDED_PER_ROUND);
    showCharBubble(pick(BUBBLE_CORRECT), 1700);
    jumpChar();

    // Speak the letter once (throttled inside speakLetter)
    audio.speakLetter(letter);

    // Throttle voice cheer: roughly every other catch
    if (Math.random() < 0.55) audio.play('correct');

    setTimeout(() => {
      firefly.remove();
      firefliesOnScreen = firefliesOnScreen.filter(f => f !== firefly);
    }, 700);

    if (roundCaught >= NEEDED_PER_ROUND) {
      await delay(500);
      endRound();
    }
  } else {
    // WRONG - Oopsie, firefly wiggles and stays
    audio.tone('wrong');

    const oops = document.createElement('div');
    oops.className = 'oopsie-text';
    oops.textContent = 'Oopsie!';
    const rect = firefly.getBoundingClientRect();
    oops.style.left = (rect.left + rect.width/2 - 32) + 'px';
    oops.style.top = (rect.top - 10) + 'px';
    document.body.appendChild(oops);
    setTimeout(() => oops.remove(), 1000);

    firefly.classList.remove('firefly-floating');
    firefly.style.animation = 'none';
    firefly.offsetHeight;
    firefly.classList.add('firefly-wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1400);

    setTimeout(() => {
      firefly.dataset.tapped = '';
      firefly.classList.remove('firefly-wrong');
      if (firefly.parentNode) {
        firefly.classList.add('firefly-floating');
      }
    }, 550);

    // Throttle wrong voice too
    if (Math.random() < 0.6) audio.play('wrong');
  }
}

async function endRound() {
  stopTimers();

  // Clear remaining fireflies
  $('playArea').innerHTML = '';
  firefliesOnScreen = [];

  markProgDone(currentRound);
  audio.tone('roundDone');
  confetti(25, ['🌸','🧚','✨','🌼']);

  if (currentRound < 3) {
    const banner = $('roundBanner');
    $('roundTitle').textContent = 'Lovely Round!';
    $('bannerLetter').textContent = '';
    $('roundSub').textContent = 'Pip\'s lantern is glowing!';
    banner.classList.add('show');
    await audio.play('round-complete');
    await delay(1200);
    banner.classList.remove('show');
    await delay(600);
    currentRound++;
    startRound();
  } else {
    await delay(600);
    showCelebration();
  }
}

async function showCelebration() {
  audio.tone('celeb');
  confetti(70, ['🧚','🌸','✨','🏠','🎁','🍦','🤹']);

  const stars = Math.min(5, Math.max(3, Math.floor(totalScore / 40)));
  $('celebStars').textContent = '⭐'.repeat(stars);
  $('celebTitle').textContent = 'All Fireflies Caught!';
  $('celebMsg').textContent = 'Pip\'s lantern is sparkling! Score: ' + totalScore;

  $('scrCeleb').classList.add('active');

  await audio.play('game-complete');
  await delay(800);
  await audio.play('game-complete');

  setTimeout(() => confetti(40, ['🌸','🧚','✨','🌼']), 2000);
}

function resetGame() {
  $('scrCeleb').classList.remove('active');
  $('hud').style.display = 'none';
  $('charArea').style.display = 'none';
  $('lanternArea').style.display = 'none';
  $('progBar').style.display = 'none';
  $('playArea').innerHTML = '';
  audio.stopMusic();
  audio.clearQueue();
  $('scrTitle').classList.add('active');
}

// ====================================================================
// INIT
// ====================================================================
createBackground();

onTap($('btnStart'), () => {
  audio.unlock();
  startGame();
});

onTap($('btnAgain'), () => {
  audio.clearQueue();
  resetGame();
  setTimeout(() => {
    audio.unlock();
    startGame();
  }, 300);
});

/* ═══ AHA! PROGRESS TRACKING ═══ */
(function(){
  function getKey(){
    var parts = location.pathname.split('/').filter(Boolean);
    var last = parts[parts.length-1] || 'index.html';
    var game = last.replace('.html','');
    var theme = parts[parts.length-2] || 'root';
    if (game === '') game = 'index';
    return theme + '/' + game;
  }
  function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } }
  function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} }
  function markAttempt(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = { attempted: true, attemptedAt: Date.now() };
    save(p);
  }
  function markComplete(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = {};
    p[k].completed = true;
    p[k].completedAt = Date.now();
    p[k].plays = (p[k].plays||0) + 1;
    save(p);
  }
  var celeb = document.getElementById('scrCeleb');
  if (celeb){
    var obs = new MutationObserver(function(){ if (celeb.classList.contains('active')) markComplete(); });
    obs.observe(celeb, { attributes: true, attributeFilter: ['class'] });
  }
  setTimeout(markAttempt, 3000);
})();

</script>
