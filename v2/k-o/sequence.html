<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Climb the Summit K–O — Bramble's Mountain! ❄️</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --deep-blue: #061327; --ice: #b8e6ff; --aurora-green: #43ffb0; --aurora-pink: #ff6ec7;
  --gold: #ffe066; --orange: #ff9a3c; --snow: #f4fbff;
  --stone-a: #6aa5d8; --stone-b: #8fc3e6; --stone-c: #c2e4f5;
  --white85: rgba(255,255,255,0.85);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Background — icy night aurora ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background:
    radial-gradient(ellipse at 70% 10%, rgba(67,255,176,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 25% 15%, rgba(255,110,199,0.10) 0%, transparent 50%),
    linear-gradient(175deg, #020914 0%, #061327 35%, #0c2a4a 70%, #133a5c 100%);
}
.bg-aurora {
  position: fixed; top: -10%; left: -10%; right: -10%; height: 55vh;
  z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(67,255,176,0.18) 0%, transparent 40%),
    radial-gradient(ellipse at 70% 30%, rgba(255,110,199,0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 60%, rgba(140,220,255,0.15) 0%, transparent 40%);
  filter: blur(20px);
  animation: auroraDrift 12s ease-in-out infinite;
  opacity: 0.7;
}
@keyframes auroraDrift {
  0%,100% { transform: translateX(0) scale(1); opacity: 0.6; }
  50%     { transform: translateX(30px) scale(1.08); opacity: 0.9; }
}
.bg-element {
  position: fixed; pointer-events: none; z-index: 1;
  font-size: clamp(10px, 2vw, 18px);
  opacity: 0.4;
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.4; }
  92%  { opacity: 0.4; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1.1); opacity: 0; }
}
.bg-snow {
  position: fixed; pointer-events: none; z-index: 1;
  color: #fff; opacity: 0.6;
  animation: snowFall linear infinite;
}
@keyframes snowFall {
  0%   { transform: translateY(-10vh) translateX(0); opacity: 0; }
  10%  { opacity: 0.8; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(110vh) translateX(var(--drift,20px)); opacity: 0; }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title .icon-row {
  display: flex; gap: 14px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(40px, 10vw, 68px); }
.screen-title h1 {
  font-size: clamp(24px, 6vw, 42px);
  color: var(--ice);
  text-shadow: 0 0 30px rgba(184,230,255,0.6), 2px 2px 0 rgba(0,0,0,0.45);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(13px, 3.2vw, 19px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #052035; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.35);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg,#b8e6ff,#6aa5d8); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; color:#052035; }
.btn-again { background: linear-gradient(135deg,#b8e6ff,#6aa5d8); margin-top: 16px; color:#052035; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(6,19,39,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(184,230,255,0.18);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.42); font-weight: bold; letter-spacing: 0.05em; }
.hud-val { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--ice); }
.hud-score .hud-val { color: var(--gold); }
.hud-center .hud-val { color: var(--ice); font-size: clamp(13px,3vw,18px); }

/* ── Bramble character (bottom-left) ── */
.char-area {
  position: fixed; bottom: 210px; left: 8px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji {
  font-size: clamp(44px,10vw,66px);
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96); color: var(--deep-blue);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(11px,2.4vw,15px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.3);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.96);
}

/* ── Play area (letter-stones) ── */
.play-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 280px;
  z-index: var(--z-game);
  pointer-events: none;
}
.play-area.active { pointer-events: auto; }

/* Timer background shift (round 4) */
.play-area.timer-warning { animation: timerShift 30s ease-in-out forwards; }
@keyframes timerShift {
  0%   { background: transparent; }
  50%  { background: rgba(184,230,255,0.05); }
  100% { background: rgba(255,154,60,0.07); }
}

/* ── LETTER-STONES (carved ice blocks) ── */
.letter-stone {
  position: absolute;
  width: clamp(78px, 19vw, 110px);
  height: clamp(78px, 19vw, 110px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border: 3px solid rgba(255,255,255,0.45);
  box-shadow:
    0 6px 22px rgba(0,0,0,0.4),
    inset 0 4px 0 rgba(255,255,255,0.35),
    inset 0 -6px 0 rgba(0,0,0,0.18);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s, opacity 0.3s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  z-index: 2;
  opacity: 0; transform: scale(0.5);
  padding: 4px 4px 6px;
  border-radius: 16px;
  background: linear-gradient(160deg, var(--stone-c) 0%, var(--stone-b) 50%, var(--stone-a) 100%);
  /* carved facet highlight */
}
.letter-stone::before {
  content: '';
  position: absolute; top: 4px; left: 4px; right: 4px; height: 40%;
  background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0));
  border-radius: 12px 12px 24px 24px;
  pointer-events: none;
}
.letter-stone.show { opacity: 1; transform: scale(1); }
.letter-stone:active { transform: scale(0.93) !important; }
.letter-stone.r4-size {
  width: clamp(66px, 16vw, 92px);
  height: clamp(66px, 16vw, 92px);
}
.letter-stone.r4-size .stone-letter-big { font-size: clamp(22px, 5.5vw, 34px); }
.letter-stone.r4-size .stone-letter-small { font-size: clamp(11px, 2.8vw, 15px); }

.stone-letter-big {
  font-weight: 900; color: #0a2c4d;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
  font-size: clamp(28px, 7vw, 44px);
  line-height: 1;
  letter-spacing: -1px;
}
.stone-letter-small {
  font-size: clamp(13px, 3.2vw, 18px);
  font-weight: 900; color: rgba(10,44,77,0.8);
  line-height: 1; margin-top: 1px;
}
.stone-emoji {
  font-size: clamp(20px, 4.8vw, 30px);
  line-height: 1; margin-top: 2px;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25));
}

/* Stone states */
.letter-stone.activated {
  border-color: var(--gold) !important;
  box-shadow:
    0 0 30px rgba(255,224,102,0.8),
    0 0 60px rgba(255,224,102,0.4),
    0 6px 22px rgba(0,0,0,0.35),
    inset 0 4px 0 rgba(255,255,255,0.4) !important;
  transform: scale(1.08) !important;
}
.letter-stone.next-hint { animation: pulseHint 1.5s ease-in-out infinite; }
@keyframes pulseHint {
  0%,100% { box-shadow: 0 0 12px rgba(184,230,255,0.35), 0 6px 22px rgba(0,0,0,0.4), inset 0 4px 0 rgba(255,255,255,0.35); }
  50%     { box-shadow: 0 0 35px rgba(255,224,102,0.75), 0 0 60px rgba(184,230,255,0.4), 0 6px 22px rgba(0,0,0,0.4), inset 0 4px 0 rgba(255,255,255,0.45); }
}
.letter-stone.wrong-tap { animation: wrongShake 0.45s ease-in-out; }
.letter-stone.wiggle { animation: wiggleHint 0.6s ease-in-out; }
@keyframes wiggleHint {
  0%,100% { transform: rotate(0deg); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(8deg); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(5deg); }
}

/* Fly-to-mountain animation */
.letter-stone.flying {
  transition: none !important;
  z-index: 55;
  pointer-events: none;
}

/* ── MOUNTAIN (bottom) ── */
.mountain-area {
  position: fixed;
  bottom: 28px; left: 0; right: 0;
  z-index: var(--z-ui);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
  height: clamp(230px, 42vw, 260px);
}
.mountain-wrap {
  position: relative;
  width: clamp(260px, 72vw, 440px);
  height: clamp(190px, 34vw, 220px);
}
/* Base mountain — CSS pyramid */
.mountain {
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: clamp(130px, 36vw, 220px) solid transparent;
  border-right: clamp(130px, 36vw, 220px) solid transparent;
  border-bottom: clamp(190px, 34vw, 220px) solid;
  border-bottom-color: #5a7fa8;
  filter: drop-shadow(0 -2px 6px rgba(0,0,0,0.25));
}
/* Snow cap — small triangle on top */
.mountain-snow {
  position: absolute;
  bottom: clamp(130px, 23vw, 150px);
  left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: clamp(48px, 13vw, 80px) solid transparent;
  border-right: clamp(48px, 13vw, 80px) solid transparent;
  border-bottom: clamp(60px, 11vw, 70px) solid #f4fbff;
  opacity: 0.95;
}
.mountain-snow::after {
  content: '';
  position: absolute;
  left: -20px; top: 20px;
  width: 40px; height: 8px;
  background: radial-gradient(ellipse, #f4fbff 0%, rgba(244,251,255,0) 70%);
}
/* Secondary peak (behind, smaller) */
.mountain-side {
  position: absolute;
  bottom: 0; left: 8%;
  width: 0; height: 0;
  border-left: clamp(55px, 14vw, 80px) solid transparent;
  border-right: clamp(55px, 14vw, 80px) solid transparent;
  border-bottom: clamp(120px, 22vw, 150px) solid #3d5a7d;
  opacity: 0.7;
}
.mountain-side.right {
  left: auto; right: 8%;
  border-bottom-color: #4a6890;
  border-left-width: clamp(60px, 15vw, 90px);
  border-right-width: clamp(60px, 15vw, 90px);
  border-bottom-width: clamp(140px, 25vw, 170px);
}

/* Stepped path — 5 steps climbing up the mountain */
.mountain-step {
  position: absolute;
  width: clamp(36px, 9vw, 50px);
  height: clamp(26px, 6.5vw, 36px);
  background: linear-gradient(160deg, #c2e4f5 0%, #8fc3e6 50%, #5a8bb5 100%);
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 6px;
  box-shadow:
    0 3px 8px rgba(0,0,0,0.35),
    inset 0 3px 0 rgba(255,255,255,0.4),
    inset 0 -3px 0 rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: clamp(14px,3.5vw,20px);
  color: #0a2c4d;
  opacity: 0; transform: scale(0.3);
  transition: opacity 0.4s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
}
.mountain-step.placed {
  opacity: 1; transform: scale(1);
  animation: stepLand 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes stepLand {
  0%   { transform: scale(0.2) translateY(-10px); opacity: 0; }
  60%  { transform: scale(1.25) translateY(4px); opacity: 1; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

/* Step positions — zigzag climb up the mountain */
.mountain-step.step-0 { bottom: 4%;  left: 32%; }
.mountain-step.step-1 { bottom: 22%; left: 40%; }
.mountain-step.step-2 { bottom: 40%; left: 48%; }
.mountain-step.step-3 { bottom: 58%; left: 56%; }
.mountain-step.step-4 { bottom: 76%; left: 43%; }

/* Flag at summit */
.mountain-flag {
  position: absolute;
  bottom: 84%; left: 50%;
  transform: translateX(-50%) scale(0);
  width: clamp(26px, 6vw, 36px);
  height: clamp(36px, 8vw, 50px);
  transition: transform 0.7s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 3;
}
.mountain-flag.planted { transform: translateX(-50%) scale(1); }
.mountain-flag::before {
  /* pole */
  content: '';
  position: absolute; left: 48%; top: 0; bottom: 0;
  width: 3px; background: #2c1810;
  border-radius: 2px;
}
.mountain-flag::after {
  /* banner */
  content: '';
  position: absolute; left: 50%; top: 0;
  width: 80%; height: 55%;
  background: linear-gradient(135deg, #ff9a3c 0%, #ffe066 60%, #ff6ec7 100%);
  border-radius: 2px 6px 2px 2px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  animation: flagWave 1.2s ease-in-out infinite;
  transform-origin: left center;
}
@keyframes flagWave {
  0%,100% { transform: skewY(-2deg); }
  50%     { transform: skewY(3deg) scaleX(1.05); }
}

/* Aurora burst when summit reached */
.summit-aurora {
  position: absolute;
  inset: -20% -20% -10%;
  pointer-events: none;
  opacity: 0;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(67,255,176,0.45) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 40%, rgba(255,110,199,0.35) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 40%, rgba(184,230,255,0.45) 0%, transparent 55%);
  filter: blur(20px);
  transition: opacity 1s;
}
.summit-aurora.blaze {
  opacity: 1;
  animation: auroraBlaze 1.8s ease-in-out infinite;
}
@keyframes auroraBlaze {
  0%,100% { transform: scale(1); opacity: 0.8; }
  50%     { transform: scale(1.12); opacity: 1; }
}

/* Glow behind mountain when climbing */
.mountain-glow {
  position: absolute; inset: -10%;
  border-radius: 50%;
  pointer-events: none;
  transition: box-shadow 0.8s, opacity 0.8s;
  opacity: 0;
}
.mountain-glow.active { opacity: 1; }
.mountain-glow.g1 { box-shadow: 0 0 40px rgba(184,230,255,0.35); }
.mountain-glow.g2 { box-shadow: 0 0 60px rgba(184,230,255,0.5); }
.mountain-glow.g3 { box-shadow: 0 0 80px rgba(67,255,176,0.5); }
.mountain-glow.g4 { box-shadow: 0 0 100px rgba(255,110,199,0.5); }
.mountain-glow.g5 {
  box-shadow: 0 0 80px rgba(67,255,176,0.6), 0 0 140px rgba(255,110,199,0.5), 0 0 200px rgba(184,230,255,0.5);
  animation: glowPulse 1s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: 0.7; }
  50%     { opacity: 1; }
}

/* Splash / puff when stone lands on mountain */
.puff {
  position: fixed;
  font-size: 18px;
  animation: puffPop 0.5s ease-out forwards;
  pointer-events: none; z-index: 60;
}
@keyframes puffPop {
  0%   { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-30px) scale(1.6); opacity: 0; }
}

/* Sparkle trail */
.sparkle-trail {
  position: fixed;
  font-size: 14px;
  pointer-events: none;
  z-index: 55;
  animation: trailFade 0.4s ease-out forwards;
}
@keyframes trailFade {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.3) translateY(10px); opacity: 0; }
}

/* Summit counter (4 pips = summits climbed) */
.summit-counter {
  display: flex; gap: 5px; justify-content: center;
  margin-top: 4px;
}
.summit-pip {
  width: clamp(16px, 3.8vw, 22px);
  height: clamp(16px, 3.8vw, 22px);
  border-radius: 4px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.22);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(10px,2.5vw,14px);
  transition: background 0.3s, border-color 0.3s, transform 0.3s;
}
.summit-pip.filled {
  border-color: var(--gold);
  background: linear-gradient(180deg, #ffe066, #c47400);
  animation: pipFill 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pipFill { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.3)} 100%{transform:scale(1.1)} }

/* ── Progress bar — 5 letter dots ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: calc(var(--z-ui) + 5);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(6px,1.5vw,10px);
  padding: 4px 10px 6px;
  background: rgba(6,19,39,0.92); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(28px,5.5vw,38px);
  height: clamp(28px,5.5vw,38px);
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,3vw,20px); font-weight: 900;
  color: rgba(255,255,255,0.28);
  transition: all 0.3s;
  text-transform: uppercase;
}
.prog-dot.current {
  border-color: var(--ice);
  color: var(--ice);
  box-shadow: 0 0 10px rgba(184,230,255,0.4);
}
.prog-dot.done {
  background: linear-gradient(135deg,var(--gold),#c47400);
  border-color: var(--gold); color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* ── Round banner ── */
.round-banner {
  position: fixed; top: 38%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(6,19,39,0.94); backdrop-filter: blur(12px);
  border: 2px solid rgba(184,230,255,0.3); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--ice); text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(255,255,255,0.65); margin-top: 5px;
}

/* ── Celebration screen ── */
.screen-celeb {
  background: rgba(3,10,22,0.94); backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(24px,6vw,44px); color: var(--gold);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.5);

const LETTERS = ['k','l','m','n','o'];
const LETTER_WORDS = { k:'kite', l:'lion', m:'moon', n:'nest', o:'owl' };

// ══════════════════════════════════════════════════════════════════
// AUDIO CLASS (AudioContext-first with iOS fallback)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.08; this.sfxVol = 0.3; this.musicDucked = 0.025;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Airy, icy pentatonic — crisp mountain air
    const notes = [261.63, 329.63, 392.00, 440.00, 523.25, 659.25]; // C E G A C E ascending
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.5 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.7 ? 2 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + 0.3);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.8);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 3);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 900 + Math.random() * 1400);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.15,0.2); p(554,t+0.1,0.18,0.25); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='stonePlace') {
      // Solid thud + icy shimmer
      p(180, t, 0.1, 0.35);
      p(240, t+0.03, 0.12, 0.25);
      p(880, t+0.08, 0.15, 0.18, 'triangle');
      p(1320, t+0.15, 0.2, 0.12, 'triangle');
    }
    else if (type==='ice') {
      // Crystalline chime
      p(880, t, 0.2, 0.2, 'triangle');
      p(1320, t+0.05, 0.25, 0.15, 'triangle');
      p(1760, t+0.1, 0.3, 0.1, 'sine');
    }
    else if (type==='summit') {
      // Triumphant fanfare for planting flag
      p(523.25, t, 0.18, 0.35);
      p(659.25, t+0.18, 0.18, 0.4);
      p(783.99, t+0.36, 0.18, 0.45);
      p(1046.5, t+0.54, 0.5, 0.5);
      p(1318.5, t+0.54, 0.5, 0.35, 'triangle');
    }
  }
  // Ascending sequence chime — pitch rises with each letter (K low, O high)
  toneSequence(idx) {
    this._init(); const t = this.ctx.currentTime;
    const freqs = [261.63, 329.63, 392.00, 493.88, 587.33]; // C E G B D ascending
    const f = freqs[Math.min(idx, freqs.length-1)];
    const p = (freq, s, d, v, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = freq;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    p(f, t, 0.25, 0.4);
    p(f * 1.5, t + 0.05, 0.2, 0.15);
    p(f * 2, t + 0.08, 0.15, 0.1, 'triangle');
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(l)   { return this.speak(`${AUDIO_BASE}/letters/${l}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// UTILITIES
// ══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click', e => { if(t)return; fn(e); });
}

const BUBBLE_CORRECT = ['Up we go! 🏔️','Climbing higher! ⛰️','Perfect step! ✨','Brilliant! ❄️','Bramble loves it! 🐾','Onward! 🚩'];
const BUBBLE_WRONG   = ['Not this stone! ❄️','Try another! ✨','Check the order! 🏔️','Almost there! 🌟'];

// ══════════════════════════════════════════════════════════════════
// VISUAL EFFECTS
// ══════════════════════════════════════════════════════════════════
function confetti(count = 40, extra = []) {
  const all = ['⭐','✨','💫','🌟','🎉','❄️','🏔️','🚩','🪁','🦁','🌙','🪺','🦉', ...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti'; el.textContent = pick(all);
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top  = '-30px';
    el.style.fontSize = (16 + Math.random()*14) + 'px';
    el.style.animationDelay    = (Math.random()*1.8) + 's';
    el.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6200);
  }
}

function starBurst(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'starburst';
    s.textContent = pick(['✨','💫','⭐','🌟','❄️','🏔️']);
    s.style.left = (cx + (Math.random()-0.5)*140) + 'px';
    s.style.top  = (cy + (Math.random()-0.5)*140) + 'px';
    s.style.animationDelay = (Math.random()*0.15) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function showCharBubble(text, dur = 2200) {
  const b = $('charBubble');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), dur);
}

function jumpChar() {
  const el = $('charEmoji');
  el.style.animation = '';

// Summit eruption — aurora + ice + flags
function summitErupt() {
  const flag = $('mountainFlag');
  const r = flag.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top;
  const emojis = ['🏔️','❄️','🚩','✨','💫','⭐','🌟','🎉','🪁','🦁','🌙','🪺','🦉'];
  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = 'erupt-particle';
    p.textContent = pick(emojis);
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    p.style.fontSize = (16 + Math.random()*18) + 'px';
    p.style.setProperty('--ex', ((Math.random()-0.5)*340) + 'px');
    p.style.setProperty('--ey', (-120 - Math.random()*300) + 'px');
    p.style.animationDelay = (Math.random()*0.5) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

// MOUNTAIN MANAGEMENT

let stepsPlaced = 0; // 0-5 per sequence
let summitsClimbed = 0; // 0-4 total

  stepsPlaced = 0;

    const s = $('step' + i);

      s.classList.remove('placed');
      s.textContent = '';

  $('summitAurora').classList.remove('blaze');

function updateMountainGlow() {
  const glow = $('mountainGlow');
  glow.classList.remove('active','g1','g2','g3','g4','g5');

    glow.classList.add('active', 'g' + stepsPlaced);

function placeStep(idx, letter) {

function plantFlag() {

function markSummit(idx) {

  if (pip) pip.classList.add('filled');

// ══════════════════════════════════════════════════════════════════
// ROUND CONFIG
// ══════════════════════════════════════════════════════════════════
const ROUNDS = [
  { label:'Round 1 — Build the Path! ❄️',      sub:'Tap stones K to O in order! Hints will help.', display:'full',    hintMode:'strong' },
  { label:'Round 2 — Climb Again! 🏔️',         sub:'No hints this time! Remember the order.',      display:'full',    hintMode:'none'   },
  { label:'Round 3 — Picture Climb! 🪁',       sub:'Find the letters by their pictures!',          display:'picture', hintMode:'none'   },
  { label:'Round 4 — Summit Sprint! 🚩',       sub:'Quick! The blizzard is coming!',                display:'full',    hintMode:'none',  timer:true, smaller:true },
];

// ══════════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let round = 0, score = 0;
let nextTapIdx = 0; // index into LETTERS array (0-4)
let stoneEls = {}; // keyed by letter
let hintTimer = null, hintVoiceTimer = null;

// ══════════════════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id) $(id).classList.add('active');
}

// ══════════════════════════════════════════════════════════════════
// PROGRESS BAR — 5 letters per sequence
// ══════════════════════════════════════════════════════════════════
function buildProg() {
  const bar = $('progBar');
  bar.innerHTML = ''; bar.style.display = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot'; d.id = 'pdot' + i;
    d.textContent = LETTERS[i].toUpperCase();
    bar.appendChild(d);
  }
}
function markProg(idx) {
  const d = $('pdot' + idx);
  if (d) {
    d.textContent = LETTER_EMOJI[LETTERS[idx]];
    d.classList.add('done');
  }
}
function highlightProg(idx) {
  for (let i = 0; i < 5; i++) {
    const d = $('pdot' + i);
    if (d) d.classList.toggle('current', i === idx);
  }
}

// ══════════════════════════════════════════════════════════════════
// HINT SYSTEM
// ══════════════════════════════════════════════════════════════════
function clearHints() { clearTimeout(hintTimer); clearTimeout(hintVoiceTimer); }
function resetHints() {
  clearHints();
  if (!gameActive) return;
  const cfg = ROUNDS[round];
  if (cfg.hintMode === 'none') return;

  hintTimer = setTimeout(() => {
    const targetLetter = LETTERS[nextTapIdx];
    const stone = stoneEls[targetLetter];
    if (stone && gameActive) {
      stone.classList.add('wiggle');
      audio.tone('hint');
      setTimeout(() => stone.classList.remove('wiggle'), 700);
    }
  }, 4000);
  hintVoiceTimer = setTimeout(() => {
    if (gameActive) {
      audio.play('thinking');
      setTimeout(() => { if (gameActive) audio.speakLetter(LETTERS[nextTapIdx]); }, 1200);
    }
  }, 7000);
}

// ══════════════════════════════════════════════════════════════════
// POSITION GENERATION — random positions with minimum spacing
// ══════════════════════════════════════════════════════════════════
function generatePositions(count, smaller) {
  const area = $('playArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const stoneSize = smaller
    ? Math.min(Math.max(66, areaW * 0.16), 92)
    : Math.min(Math.max(78, areaW * 0.19), 110);
  const margin = stoneSize * 0.45;
  const minDist = stoneSize * 1.25;

  const positions = [];
  for (let i = 0; i < count; i++) {
    let tries = 0;
    let x, y;
    do {
      x = margin + Math.random() * (areaW - margin * 2 - stoneSize);
      y = margin + 10 + Math.random() * (areaH - margin * 2 - stoneSize);
      tries++;
      if (tries > 300) break;
    } while (positions.some(p => {
      const dx = p.x - x, dy = p.y - y;
      return Math.sqrt(dx*dx + dy*dy) < minDist;
    }));
    positions.push({ x, y });
  }
  return positions;
}

// ══════════════════════════════════════════════════════════════════
// RENDER LETTER-STONES
// ══════════════════════════════════════════════════════════════════
function renderStones() {
  const area = $('playArea');
  const cfg = ROUNDS[round];

  area.querySelectorAll('.letter-stone').forEach(n => n.remove());
  stoneEls = {};

  const positions = generatePositions(5, cfg.smaller);
  const shuffledOrder = shuffle([...Array(5).keys()]); // random placement order

  shuffledOrder.forEach((seqIdx, posIdx) => {
    const letter = LETTERS[seqIdx];
    const stone = document.createElement('div');
    stone.className = 'letter-stone';
    if (cfg.smaller) stone.classList.add('r4-size');
    stone.style.left = positions[posIdx].x + 'px';
    stone.style.top  = positions[posIdx].y + 'px';
    stone.dataset.letter = letter;

    let inner = '';
    if (cfg.display === 'full') {
      inner = `<div class="stone-letter-big">${letter.toUpperCase()}${letter}</div>
               <div class="stone-emoji">${LETTER_EMOJI[letter]}</div>`;
    } else if (cfg.display === 'picture') {
      // Pictures + small letter
      inner = `<div class="stone-emoji" style="font-size:clamp(32px,7.5vw,48px);margin-top:0">${LETTER_EMOJI[letter]}</div>
               <div class="stone-letter-small">${letter.toUpperCase()}${letter}</div>`;
    }
    stone.innerHTML = inner;

    onTap(stone, () => handleStoneTap(stone, letter));
    area.appendChild(stone);
    stoneEls[letter] = stone;

    setTimeout(() => stone.classList.add('show'), 100 + posIdx * 120);
  });

  area.classList.add('active');

  // Initial hint for round 1
  setTimeout(() => {
    if (cfg.hintMode === 'strong') {
      const firstStone = stoneEls[LETTERS[0]];
      if (firstStone) firstStone.classList.add('next-hint');
    }
  }, 700);
}

// ══════════════════════════════════════════════════════════════════
// FLY-TO-MOUNTAIN ANIMATION
// ══════════════════════════════════════════════════════════════════
function flyToMountain(stone, stepIdx) {
  return new Promise(resolve => {
    const stoneRect = stone.getBoundingClientRect();
    const step = $('step' + stepIdx);
    const stepRect = step.getBoundingClientRect();

    const startX = stoneRect.left;
    const startY = stoneRect.top;
    const endX = stepRect.left + stepRect.width/2 - stoneRect.width/2;
    const endY = stepRect.top + stepRect.height/2 - stoneRect.height/2;

    stone.classList.add('flying');
    stone.style.position = 'fixed';
    stone.style.left = startX + 'px';
    stone.style.top  = startY + 'px';
    stone.style.zIndex = '55';

    const duration = 350;
    const startTime = performance.now();
    let lastTrail = 0;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // Ease-out for a satisfying arc-and-land
      const ease = 1 - Math.pow(1 - progress, 2);

      const curX = startX + (endX - startX) * ease;
      // Gentle arc — up then down to the step
      const arcHeight = -100;
      const curY = startY + (endY - startY) * ease + arcHeight * Math.sin(progress * Math.PI);

      const scale = 1 - progress * 0.55;
      stone.style.left = curX + 'px';
      stone.style.top  = curY + 'px';
      stone.style.transform = `scale(${scale}) rotate(${progress * 360}deg)`;

      // Sparkle trail
      if (now - lastTrail > 40) {
        spawnTrail(curX + stoneRect.width/2, curY + stoneRect.height/2);
        lastTrail = now;
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        // Landed on mountain step!
        stone.style.display = 'none';
        audio.tone('stonePlace');
        mountainPuff(step);
        resolve();
      }
    }
    requestAnimationFrame(animate);
  });
}

// ══════════════════════════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════════════════════════
function updateHud() {
  const target = LETTERS[nextTapIdx];
  if (nextTapIdx < 5) {
    $('hudFind').textContent = `Tap ${target.toUpperCase()}`;
  } else {
    $('hudFind').textContent = '🏔️ Summit!';
  }
}

// ══════════════════════════════════════════════════════════════════
// HANDLE STONE TAP
// ══════════════════════════════════════════════════════════════════
async function handleStoneTap(stoneEl, letter) {
  if (!gameActive) return;
  clearHints();

  const targetLetter = LETTERS[nextTapIdx];

  if (letter === targetLetter) {
    // ✓ CORRECT
    gameActive = false;

    stoneEl.classList.remove('next-hint', 'wiggle');
    stoneEl.classList.add('activated');
    starBurst(stoneEl);

    // Ascending chime
    audio.toneSequence(nextTapIdx);

    score++;
    $('hudScore').textContent = score;

    // Character reacts
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT), 1800);

    // Voice: speak the letter ONCE per correct tap (fire-and-forget)
    audio.speakLetter(letter);

    // Mark progress
    markProg(nextTapIdx);

    await delay(200);

    // Fly stone to mountain step!
    const currentStepIdx = nextTapIdx;
    await flyToMountain(stoneEl, currentStepIdx);

    // Place the step on the mountain!
    placeStep(currentStepIdx, letter);
    stepsPlaced++;
    updateMountainGlow();
    audio.tone('ice');

    await delay(150);

    nextTapIdx++;
    highlightProg(nextTapIdx);
    updateHud();

    if (nextTapIdx >= 5) {
      // Summit reached! Plant flag + aurora blazes!
      await celebrateSequence();
    } else {
      // Highlight next stone (round 1 only)
      const cfg = ROUNDS[round];
      if (cfg.hintMode === 'strong') {
        const nextStone = stoneEls[LETTERS[nextTapIdx]];
        if (nextStone) nextStone.classList.add('next-hint');
      }
      gameActive = true;
      resetHints();
    }

  } else {
    // ✗ WRONG
    stoneEl.classList.add('wrong-tap');
    audio.tone('wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1900);

    audio.play('wrong');
    // Speak the correct target letter after a beat
    setTimeout(() => audio.speakLetter(targetLetter), 600);
    setTimeout(() => {
      stoneEl.classList.remove('wrong-tap');
      resetHints();
    }, 480);
  }
}

// ══════════════════════════════════════════════════════════════════
// CELEBRATE SEQUENCE COMPLETION — SUMMIT REACHED!
// ══════════════════════════════════════════════════════════════════
async function celebrateSequence() {
  $('playArea').classList.remove('timer-warning');

  // Summit celebration — plant flag, aurora blazes, eruption
  plantFlag();
  audio.tone('summit');
  summitErupt();

  showCharBubble(pick(BUBBLE_SUMMIT), 2000);
  confetti(30, ['🏔️','🚩','❄️','✨','🌟']);
  audio.play('correct'); // don't await — transition proceeds while voice plays

  markSummit(summitsClimbed);
  summitsClimbed++;

  await delay(800);
  await finishRound();
}

// ══════════════════════════════════════════════════════════════════
// ROUND TRANSITIONS
// ══════════════════════════════════════════════════════════════════
async function finishRound() {
  gameActive = false;
  clearHints();

  $('playArea').querySelectorAll('.letter-stone').forEach(n => n.remove());
  $('playArea').classList.remove('active', 'timer-warning');

  audio.tone('roundDone');
  confetti(30, ['🏔️','🚩','❄️','💫']);
  round++;

  if (round >= ROUNDS.length) {
    await delay(700);
    celebrateFinish();
    return;
  }

  // ── Round complete banner (snappy) ──
  $('roundTitle').textContent = '🏔️ Summit Climbed! 🚩';
  $('roundSub').textContent   = 'Bramble is so proud!';
  $('roundBanner').classList.add('show');
  audio.play('round-complete'); // don't await — banner shows while voice plays
  await delay(1500);
  $('roundBanner').classList.remove('show');
  await delay(300);

  // ── Next round intro banner (snappy) ──
  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await delay(1200);
  $('roundBanner').classList.remove('show');
  await delay(150);

  startRound();
}

function startRound() {
  $('hudRound').textContent = `${round + 1}/4`;
  resetMountain();
  buildProg();
  startAttempt();
}

// ══════════════════════════════════════════════════════════════════
// START ATTEMPT (each round = 1 sequence)
// ══════════════════════════════════════════════════════════════════
async function startAttempt() {
  nextTapIdx = 0;
  updateHud();
  highlightProg(0);
  renderStones();
  gameActive = true;

  audio.tone('reveal');
  await audio.speakLetter('k');

  resetHints();

  if (ROUNDS[round].timer) {
    $('playArea').classList.remove('timer-warning');
    void $('playArea').offsetWidth;
    $('playArea').classList.add('timer-warning');
  }
}

// ══════════════════════════════════════════════════════════════════
// FINAL CELEBRATION — BRAMBLE PLANTS FLAG!
// ══════════════════════════════════════════════════════════════════
async function celebrateFinish() {
  gameActive = false;
  audio.stopMusic();
  $('hud').style.display       = 'none';
  $('progBar').style.display   = 'none';
  $('roundBanner').classList.remove('show');
  $('playArea').classList.remove('active');

  // Massive summit eruption
  summitErupt();
  audio.tone('celeb');
  await delay(800);
  summitErupt();
  audio.tone('summit');
  await delay(600);

  // Hide mountain/char after eruption
  $('mountainArea').style.display = 'none';
  $('charArea').style.display   = 'none';

  confetti(70, ['❄️','🏔️','🚩','✨','🌟','💫','🪁','🦁','🌙','🪺','🦉']);

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 5)));
  $('celebStars').textContent = '⭐'.repeat(stars);

  showScreen('scrCeleb');
  audio.tone('celeb');
  await delay(200);

  // Two celebration voice clips
  await audio.play('game-complete');
  await delay(400);
  confetti(50, ['❄️','🏔️','🚩','🌟']);
  await audio.play('game-complete');
}

// ══════════════════════════════════════════════════════════════════
// INIT & START
// ══════════════════════════════════════════════════════════════════
function resetGame() {
  round = 0; score = 0; summitsClimbed = 0;
  nextTapIdx = 0;
  stepsPlaced = 0;
  $('hudScore').textContent = '0';

  // Reset summit pips
  for (let i = 0; i < 4; i++) {
    const pip = $('pip' + i);
    if (pip) pip.classList.remove('filled');
  }

  // Reset mountain
  $('mountainArea').style.display = '';
  resetMountain();
}

async function startGame() {
  audio.startMusic();

  resetGame();
  showScreen(null);

  $('hud').style.display     = '';
  $('charArea').style.display = '';

  // First round intro (snappy)
  const cfg = ROUNDS[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  audio.play('greetings'); // don't await — show banner while voice plays
  await delay(1400);
  $('roundBanner').classList.remove('show');
  await delay(200);

  startRound();
}

// ── BOOT ─────────────────────────────────────────────────────────
buildScenery();

onTap($('btnStart'), () => { audio.unlock(); startGame(); });
onTap($('btnAgain'), () => {
  showScreen(null);
  startGame();
});

/* ═══ AHA! PROGRESS TRACKING ═══ */
(function(){
  function getKey(){
    var parts = location.pathname.split('/').filter(Boolean);
    var last = parts[parts.length-1] || 'index.html';
    var game = last.replace('.html','');
    var theme = parts[parts.length-2] || 'root';
    if (game === '') game = 'index';
    return theme + '/' + game;
  }
  function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } }
  function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} }
  function markAttempt(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = { attempted: true, attemptedAt: Date.now() };
    save(p);
  }
  function markComplete(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = {};
    p[k].completed = true;
    p[k].completedAt = Date.now();
    p[k].plays = (p[k].plays||0) + 1;
    save(p);
  }
  var celeb = document.getElementById('scrCeleb');
  if (celeb){
    var obs = new MutationObserver(function(){ if (celeb.classList.contains('active')) markComplete(); });
    obs.observe(celeb, { attributes: true, attributeFilter: ['class'] });
  }
  setTimeout(markAttempt, 3000);
})();
