<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sequence 0-5 - Save the Princess!</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-orb: 15; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --pink: #f8a5c2; --magenta: #e91e8c; --purple: #a29bfe; --deep-purple: #6c5ce7;
  --gold: #ffe066; --white85: rgba(255,255,255,0.85);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* Background */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(160deg, #2a0848 0%, #5a1580 35%, #b01a8b 65%, #e84c9a 100%);
}
.bg-sparkle {
  position: fixed; pointer-events: none; z-index: 1;
  font-size: clamp(12px, 2.5vw, 20px);
  opacity: 0.45;
  animation: sparkleFloat linear infinite;
}
@keyframes sparkleFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.45; }
  92%  { opacity: 0.45; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1.1); opacity: 0; }
}

/* Screen system */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.35s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* Title screen */
.screen-title .icon-row {
  display: flex; gap: 10px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row img { width: clamp(60px, 15vw, 100px); height: auto; image-rendering: auto; }
.screen-title .icon-row span { font-size: clamp(36px, 9vw, 60px); }
.screen-title h1 {
  font-size: clamp(26px, 6.5vw, 46px);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,224,102,0.6), 2px 2px 0 rgba(0,0,0,0.35);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(14px, 3.5vw, 20px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
}

/* Buttons */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.3);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg,#f8a5c2,#e91e8c); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; }
.btn-again { background: linear-gradient(135deg,#f8a5c2,#e91e8c); margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }

/* HUD */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(40,10,80,0.88); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(255,255,255,0.08);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.42); font-weight: bold; letter-spacing: 0.05em; }
.hud-val { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--pink); }
.hud-score .hud-val { color: var(--gold); }
.hud-center .hud-val { color: var(--gold); font-size: clamp(13px,3vw,18px); }

/* PRINCESS ORB - center of play area */
.princess-orb {
  position: absolute;
  width: clamp(130px, 26vw, 180px);
  height: clamp(130px, 26vw, 180px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  z-index: var(--z-orb);
  pointer-events: none;
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.35) 0%,
    rgba(248,165,194,0.55) 30%,
    rgba(162,155,254,0.55) 60%,
    rgba(108,92,231,0.45) 100%);
  border: 3px solid rgba(255,255,255,0.4);
  box-shadow:
    0 0 30px rgba(248,165,194,0.5),
    0 0 60px rgba(162,155,254,0.3),
    inset 0 0 30px rgba(255,255,255,0.2);
  transition: box-shadow 0.6s, background 0.6s, border-color 0.6s, transform 0.4s;
}
.princess-orb .orb-princess {
  font-size: clamp(56px, 13vw, 86px);
  z-index: 2;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
  animation: princessBreathe 3s ease-in-out infinite;
}
@keyframes princessBreathe {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.05); }
}

/* Circling stars around orb (untouched state) */
.orb-stars {
  position: absolute; inset: -18px;
  pointer-events: none;
  animation: orbStarSpin 8s linear infinite;
}
.orb-stars span {
  position: absolute;
  font-size: clamp(14px, 3vw, 20px);
  opacity: 0.85;
  filter: drop-shadow(0 0 6px rgba(255,224,102,0.8));
}
.orb-stars span:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
.orb-stars span:nth-child(2) { top: 50%; right: 0; transform: translateY(-50%); }
.orb-stars span:nth-child(3) { bottom: 0; left: 50%; transform: translateX(-50%); }
.orb-stars span:nth-child(4) { top: 50%; left: 0; transform: translateY(-50%); }
.orb-stars span:nth-child(5) { top: 12%; right: 12%; }
.orb-stars span:nth-child(6) { bottom: 12%; left: 12%; }
@keyframes orbStarSpin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

/* Orb stages - as gems are added, orb gets brighter/more magical */
.princess-orb.stage-1 {
  box-shadow:
    0 0 35px rgba(248,165,194,0.6),
    0 0 70px rgba(162,155,254,0.35),
    inset 0 0 35px rgba(255,255,255,0.25);
}
.princess-orb.stage-2 {
  box-shadow:
    0 0 40px rgba(255,224,102,0.55),
    0 0 80px rgba(248,165,194,0.45),
    inset 0 0 40px rgba(255,255,255,0.3);
}
.princess-orb.stage-3 {
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.5) 0%,
    rgba(255,224,102,0.5) 25%,
    rgba(248,165,194,0.6) 55%,
    rgba(162,155,254,0.5) 100%);
  box-shadow:
    0 0 50px rgba(255,224,102,0.7),
    0 0 100px rgba(248,165,194,0.5),
    inset 0 0 45px rgba(255,255,255,0.35);
}
.princess-orb.stage-4 {
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.65) 0%,
    rgba(255,224,102,0.65) 30%,
    rgba(248,165,194,0.7) 60%,
    rgba(162,155,254,0.6) 100%);
  box-shadow:
    0 0 60px rgba(255,224,102,0.85),
    0 0 120px rgba(248,165,194,0.6),
    inset 0 0 50px rgba(255,255,255,0.45);
  border-color: var(--gold);
}
.princess-orb.stage-5 {
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.85) 0%,
    rgba(255,224,102,0.8) 35%,
    rgba(248,165,194,0.8) 65%,
    rgba(162,155,254,0.7) 100%);
  box-shadow:
    0 0 80px rgba(255,255,255,0.9),
    0 0 160px rgba(255,224,102,0.7),
    inset 0 0 60px rgba(255,255,255,0.6);
  border-color: #fff;
  animation: orbReady 1s ease-in-out infinite;
}
.princess-orb.stage-6 { /* final - absorbing last gem then burst */
  animation: orbCharged 0.6s ease-in-out infinite;
}
@keyframes orbReady {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.06); }
}
@keyframes orbCharged {
  0%,100% { transform: scale(1.05); filter: brightness(1.1); }
  50%     { transform: scale(1.15); filter: brightness(1.4); }
}

/* Orb receives gem pulse */
.princess-orb.receive {
  animation: orbReceive 0.55s ease-out;
}
@keyframes orbReceive {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); filter: brightness(1.5); }
  100% { transform: scale(1); }
}

/* Orb burst / princess freed */
.princess-orb.bursting {
  animation: orbBurst 1.2s ease-out forwards;
}
@keyframes orbBurst {
  0%   { transform: scale(1.1); filter: brightness(1.5); }
  30%  { transform: scale(1.5); filter: brightness(2.5); }
  60%  { transform: scale(2); filter: brightness(3); opacity: 0.6; }
  100% { transform: scale(3); opacity: 0; }
}

/* Princess freed - jumps & dances out */
.princess-freed {
  position: absolute;
  z-index: calc(var(--z-orb) + 1);
  font-size: clamp(70px, 16vw, 110px);
  pointer-events: none;
  opacity: 0;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}
.princess-freed.show {
  animation: princessFreeDance 1.8s ease-out forwards;
}
@keyframes princessFreeDance {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
  20%  { opacity: 1; transform: translate(-50%,-80%) scale(1.2) rotate(-8deg); }
  40%  { transform: translate(-50%,-60%) scale(1.1) rotate(8deg); }
  60%  { transform: translate(-50%,-85%) scale(1.15) rotate(-5deg); }
  80%  { transform: translate(-50%,-60%) scale(1.1) rotate(5deg); }
  100% { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(0); }
}

/* Character (bottom-left, cheering) */
.char-area {
  position: fixed; bottom: 58px; left: 10px;
  z-index: var(--z-char); pointer-events: none;
}
.char-area img {
  width: clamp(55px,13vw,85px); height: auto;
  image-rendering: auto;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.4));
}
.char-emoji { font-size: clamp(44px,10vw,66px); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96); color: var(--deep-purple);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(12px,2.6vw,16px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.2);
  opacity: 0; transition: opacity 0.25s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.96);
}

/* Play area (number nodes + orb + lines) */
.play-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 56px;
  z-index: var(--z-game);
  pointer-events: none;
}
.play-area.active { pointer-events: auto; }

/* SVG connection lines overlay */
.line-svg {
  position: absolute; inset: 0;
  z-index: 1; pointer-events: none;
}
.conn-line {
  stroke: url(#lineGrad);
  stroke-width: 5;
  stroke-linecap: round;
  fill: none;
  filter: drop-shadow(0 0 10px rgba(255,224,102,0.8));
}
.conn-line.drawing {
  stroke-dasharray: var(--len);
  stroke-dashoffset: var(--len);
  animation: drawLine 0.35s ease-out forwards;
}
@keyframes drawLine { to { stroke-dashoffset: 0; } }

/* Flying gem that zips to orb */
.flying-gem {
  position: fixed;
  z-index: calc(var(--z-orb) + 2);
  font-size: clamp(30px, 7vw, 46px);
  pointer-events: none;
  filter: drop-shadow(0 0 12px rgba(255,224,102,0.9));
  transition: left 0.45s cubic-bezier(0.5,-0.2,0.3,1.2), top 0.45s cubic-bezier(0.5,-0.2,0.3,1.2), transform 0.45s ease-out, opacity 0.2s;
}

/* Sparkle trail following the flying gem */
.gem-trail {
  position: fixed;
  z-index: calc(var(--z-orb) + 1);
  font-size: 18px;
  pointer-events: none;
  animation: trailFade 0.6s ease-out forwards;
}
@keyframes trailFade {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.3) rotate(180deg); }
}

/* Number nodes */
.num-node {
  position: absolute;
  width: clamp(74px, 18vw, 110px);
  height: clamp(74px, 18vw, 110px);
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border: 3px solid rgba(255,255,255,0.38);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s, opacity 0.3s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  z-index: 2;
  opacity: 0; transform: scale(0.5);
}
.num-node.show { opacity: 1; transform: scale(1); }
.num-node:active { transform: scale(0.93) !important; }
.num-node.fly-away { opacity: 0; transform: scale(0.3); transition: opacity 0.25s, transform 0.25s; }

.num-node .node-numeral {
  font-weight: 900; color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
  font-size: clamp(26px, 6.5vw, 40px);
  line-height: 1;
}
.num-node .node-word {
  font-size: clamp(10px, 2.3vw, 13px);
  font-weight: bold; color: rgba(255,255,255,0.85);
  text-transform: lowercase; line-height: 1;
  margin-top: 2px;
}
.num-node .node-dots {
  font-size: clamp(9px, 2.2vw, 13px);
  line-height: 1.2; white-space: pre;
  text-align: center; letter-spacing: 1px;
  margin-top: 2px;
}

/* Node states */
.num-node.next-hint { animation: pulseHint 1.4s ease-in-out infinite; }
@keyframes pulseHint {
  0%,100% { box-shadow: 0 0 12px rgba(255,224,102,0.3), 0 4px 20px rgba(0,0,0,0.3); }
  50%     { box-shadow: 0 0 30px rgba(255,224,102,0.8), 0 0 50px rgba(255,224,102,0.35), 0 4px 20px rgba(0,0,0,0.3); }
}
.num-node.wrong-tap { animation: wrongShake 0.4s ease-in-out; }

/* Round 4 timer shift */
.play-area.timer-warning { animation: timerShift 28s ease-in-out forwards; }
@keyframes timerShift {
  0%   { background: transparent; }
  50%  { background: rgba(255,180,100,0.05); }
  100% { background: rgba(255,100,100,0.08); }
}

/* Progress bar - 6 gems */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(4px,1.2vw,8px); flex-wrap: wrap;
  padding: 5px 10px 8px;
  background: rgba(40,10,80,0.88); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(26px,5vw,36px);
  height: clamp(26px,5vw,36px);
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(13px,2.8vw,18px); font-weight: 900;
  color: rgba(255,255,255,0.25);
}
.prog-dot.done {
  background: linear-gradient(135deg,var(--gold),#e91e8c);
  border-color: var(--gold); color: #fff;
  animation: bloom 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.1)} }

/* Round banner */
.round-banner {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(30,8,70,0.94); backdrop-filter: blur(12px);
  border: 2px solid rgba(255,255,255,0.15); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--gold); text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(255,255,255,0.6); margin-top: 5px;
}

/* Celebration screen */
.screen-celeb {
  background: rgba(25,8,60,0.9); backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(26px,6.5vw,48px); color: var(--gold);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(14px,3.5vw,22px); color: rgba(255,255,255,0.9); margin: 6px 0; }
.celeb-stars { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-icon-row { display:flex; gap:12px; justify-content:center; align-items:center; margin-bottom:10px; }
.celeb-icon-row img { width: clamp(60px,16vw,108px); height: auto; }
.celeb-icon-row span { font-size:clamp(50px,13vw,82px); animation: dance 1s ease-in-out infinite; }

/* Particles */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }

@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes dance       { 0%,100%{transform:translateY(0) rotate(0) scale(1)} 15%{transform:translateY(-18px) rotate(-8deg) scale(1.08)} 30%{transform:translateY(0) rotate(8deg)} 45%{transform:translateY(-12px) rotate(-5deg) scale(1.05)} 60%{transform:translateY(0) rotate(5deg)} 75%{transform:translateY(-8px) rotate(-3deg) scale(1.08)} }
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-20px) scale(1.08)} 70%{transform:translateY(-8px) scale(1.03)} }
@keyframes wrongShake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(9px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }

/* Path celebration */
.path-celebrate .conn-line {
  stroke-width: 7;
  filter: drop-shadow(0 0 18px rgba(255,224,102,0.95));
  animation: pathGlow 0.7s ease-in-out infinite alternate;
}
@keyframes pathGlow {
  0%   { filter: drop-shadow(0 0 10px rgba(255,224,102,0.7)); }
  100% { filter: drop-shadow(0 0 26px rgba(255,255,255,0.95)); }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg"></div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <span class="hud-label">ROUND</span>
    <span class="hud-val" id="hudRound">1/4</span>
  </div>
  <div class="hud-center">
    <div class="hud-label">TAP NEXT</div>
    <div class="hud-val" id="hudFind">-</div>
  </div>
  <div class="hud-right hud-score">
    <span class="hud-label">STARS</span>
    <span class="hud-val" id="hudScore">0</span>
  </div>
</div>

<!-- Play area: orb in center, number nodes scattered, SVG lines -->
<div class="play-area" id="playArea">
  <svg class="line-svg" id="lineSvg">
    <defs>
      <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#ffe066"/>
        <stop offset="50%"  stop-color="#f8a5c2"/>
        <stop offset="100%" stop-color="#a29bfe"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Princess orb (center) -->
  <div class="princess-orb" id="princessOrb" style="display:none">
    <div class="orb-stars">
      <span>&#11088;</span><span>&#10024;</span><span>&#11088;</span>
      <span>&#10024;</span><span>&#128152;</span><span>&#127800;</span>
    </div>
    <span class="orb-princess">&#128120;</span>
  </div>

  <!-- Princess freed element (hidden until burst) -->
  <div class="princess-freed" id="princessFreed">&#128120;</div>
</div>

<!-- Character (bottom-left) + speech bubble -->
<div class="char-area" id="charArea" style="display:none">
  <div class="char-bubble" id="charBubble"></div>
  <img id="charImg" src="../../Characters/Prince on horse.gif" alt=""

const AUDIO_BASE = '../../audio';

// Voice A clip pools
const VOICE_A = {

// AUDIO CLASS
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.08; this.sfxVol = 0.3; this.musicDucked = 0.025;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.5 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.7 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + 0.15);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.0);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.2);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 800 + Math.random() * 1200);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.15,0.2); p(554,t+0.1,0.18,0.25); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='gemAbsorb') {
      // Magical shimmer as gem absorbs into orb
      p(659.25, t, 0.1, 0.3);
      p(880, t+0.04, 0.12, 0.25);
      p(1174.66, t+0.08, 0.14, 0.2);
      p(1568, t+0.12, 0.18, 0.15);
    }
    else if (type==='orbBurst') {
      // Big magical explosion - orb bursting open
      p(220, t, 0.08, 0.3);
      p(440, t+0.04, 0.1, 0.35);
      p(659.25, t+0.08, 0.15, 0.4);
      p(880, t+0.14, 0.18, 0.45);
      p(1174.66, t+0.22, 0.22, 0.4);
      p(1568, t+0.32, 0.3, 0.35);
    }
  }
  // Ascending chime - pitch rises with each number (0=low, 5=high)
  toneSequence(idx) {
    this._init(); const t = this.ctx.currentTime;
    const freqs = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
    const f = freqs[Math.min(idx, freqs.length-1)];
    const p = (freq, s, d, v, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = freq;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    p(f, t, 0.22, 0.4);
    p(f * 1.5, t + 0.05, 0.18, 0.15);
    p(f * 2, t + 0.08, 0.14, 0.1, 'triangle');
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 60);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_A[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakNumber(n)   { return this.speak(`${AUDIO_BASE}/numbers/${n}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// UTILITIES

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }

// POSITION GENERATION - avoid center (orb) and keep spacing
function generatePositions() {
  const area = $('playArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const nodeSize = Math.min(Math.max(74, areaW * 0.18), 110);
  const margin = nodeSize * 0.35;
  const minDist = nodeSize * 1.15;

  // Orb center (roughly center of play area)
  const orbCx = areaW / 2;
  const orbCy = areaH / 2;
  const orbRadius = Math.min(Math.max(130, areaW * 0.26), 180) / 2 + nodeSize * 0.6;

  const positions = [];
  for (let i = 0; i < 6; i++) {
    let tries = 0;
    let x, y;
    do {
      x = margin + Math.random() * (areaW - margin * 2 - nodeSize);
      y = margin + Math.random() * (areaH - margin * 2 - nodeSize);
      tries++;
      if (tries > 300) break;

      // Check orb overlap
      const cx = x + nodeSize / 2, cy = y + nodeSize / 2;
      const dOrb = Math.sqrt((cx - orbCx) ** 2 + (cy - orbCy) ** 2);
      if (dOrb < orbRadius) continue;

      // Check spacing with other nodes
      const tooClose = positions.some(p => {
        const dx = p.x - x, dy = p.y - y;
        return Math.sqrt(dx*dx + dy*dy) < minDist;
      });
      if (!tooClose) break;
    } while (true);
    positions.push({ x, y });
  }
  return positions;
}

// POSITION THE ORB IN CENTER OF PLAY AREA
function positionOrb() {
  const area = $('playArea');
  const orb = $('princessOrb');
  const freed = $('princessFreed');
  orb.style.display = '';
  const size = orb.offsetWidth;
  const cx = area.clientWidth / 2;
  const cy = area.clientHeight / 2;
  orb.style.left = (cx - size / 2) + 'px';
  orb.style.top  = (cy - size / 2) + 'px';
  // Position freed princess at orb center (translate -50,-50 via CSS)
  freed.style.left = cx + 'px';
  freed.style.top  = cy + 'px';
  freed.style.transform = 'translate(-50%,-50%) scale(0.3)';
}

// RENDER NODES
function renderNodes() {
  const area = $('playArea');

  area.querySelectorAll('.num-node').forEach(n => n.remove());
  $('lineSvg').innerHTML = '<defs><linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f8a5c2"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient></defs>';

  nodePositions = generatePositions();
  nodeEls = [];

  const mixedModes = shuffle(['numeral','dots','word','numeral','dots','word']);

  NUMBERS.forEach((num, i) => {
    const node = document.createElement('div');
    node.className = 'num-node';
    node.style.background = NODE_COLORS[num];
    node.style.left = nodePositions[i].x + 'px';
    node.style.top  = nodePositions[i].y + 'px';
    node.dataset.num = num;

    let inner = '';
    let displayMode = cfg.display;
    if (displayMode === 'mixed') displayMode = mixedModes[i];

    if (displayMode === 'full') {
      inner = '<div class="node-numeral">' + num + '</div><div class="node-word">' + NUMBER_WORDS[num] + '</div>';
    } else if (displayMode === 'numeral') {
      inner = '<div class="node-numeral">' + num + '</div>';
    } else if (displayMode === 'dots') {
      inner = '<div class="node-numeral">' + num + '</div><div class="node-dots">' + makeDots(num) + '</div>';
    } else if (displayMode === 'word') {
      inner = '<div class="node-numeral">' + num + '</div><div class="node-word" style="font-size:clamp(11px,2.6vw,14px)">' + NUMBER_WORDS[num] + '</div>';
    }
    node.innerHTML = inner;

    onTap(node, () => handleNodeTap(node, num));
    area.appendChild(node);
    nodeEls[num] = node;

    setTimeout(() => node.classList.add('show'), 60 + i * 60);
  });

  area.classList.add('active');

  setTimeout(() => {
    if (cfg.hintMode === 'strong') {
      nodeEls[0].classList.add('next-hint');
    }
  }, 500);
}

// NODE CENTER (for SVG lines)
function nodeCenter(num) {
  const el = nodeEls[num];
  if (!el) return { x: 0, y: 0 };
  return {
    x: parseFloat(el.style.left) + el.offsetWidth / 2,
    y: parseFloat(el.style.top)  + el.offsetHeight / 2
  };
}

function orbCenter() {
  const orb = $('princessOrb');
  const area = $('playArea');
  // position in play-area coords
  return {
    x: parseFloat(orb.style.left) + orb.offsetWidth / 2,
    y: parseFloat(orb.style.top)  + orb.offsetHeight / 2
  };
}

// Draw curved path from previous node -> this node -> orb
function drawConnectionLine(fromNum, toNum) {
  const svg = $('lineSvg');
  const a = fromNum === null ? null : nodeCenter(fromNum);
  const b = nodeCenter(toNum);
  const orb = orbCenter();

  // Line from previous (or from same node) to orb passing through this node
  // We draw two segments: previous->current (straight-ish) and current->orb
  if (a) {
    const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line1.setAttribute('x1', a.x);
    line1.setAttribute('y1', a.y);
    line1.setAttribute('x2', b.x);
    line1.setAttribute('y2', b.y);
    const len1 = Math.hypot(b.x - a.x, b.y - a.y);
    line1.classList.add('conn-line', 'drawing');
    line1.style.setProperty('--len', len1);
    svg.appendChild(line1);
  }

  // Line from current node into orb
  const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line2.setAttribute('x1', b.x);
  line2.setAttribute('y1', b.y);
  line2.setAttribute('x2', orb.x);
  line2.setAttribute('y2', orb.y);
  const len2 = Math.hypot(orb.x - b.x, orb.y - b.y);
  line2.classList.add('conn-line', 'drawing');
  line2.style.setProperty('--len', len2);
  svg.appendChild(line2);
}

// FLY GEM FROM NODE -> ORB with sparkle trail
function flyGemToOrb(nodeEl, num) {
  const rNode = nodeEl.getBoundingClientRect();
  const orb = $('princessOrb');
  const rOrb = orb.getBoundingClientRect();
  const startX = rNode.left + rNode.width / 2;
  const startY = rNode.top + rNode.height / 2;
  const endX = rOrb.left + rOrb.width / 2;
  const endY = rOrb.top + rOrb.height / 2;

  const gem = document.createElement('div');
  gem.className = 'flying-gem';
  gem.textContent = GEM_EMOJIS[num] || '\u{1F48E}';
  gem.style.left = (startX - 23) + 'px';
  gem.style.top  = (startY - 23) + 'px';
  document.body.appendChild(gem);

  // Sparkle trail - periodic sparkles along path
  const trailInterval = setInterval(() => {
    const cr = gem.getBoundingClientRect();
    const s = document.createElement('div');
    s.className = 'gem-trail';
    s.textContent = pick(['\u2728','\u{1F4AB}','\u2B50']);
    s.style.left = (cr.left + cr.width/2 - 9) + 'px';
    s.style.top  = (cr.top + cr.height/2 - 9) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 600);
  }, 60);

  // Animate
  requestAnimationFrame(() => {
    gem.style.left = (endX - 23) + 'px';
    gem.style.top  = (endY - 23) + 'px';
    gem.style.transform = 'scale(0.5) rotate(180deg)';
  });

  setTimeout(() => {
    clearInterval(trailInterval);
    gem.style.opacity = '0';
    setTimeout(() => gem.remove(), 200);
  }, 420);
}

// HUD
function updateHud() {
  if (nextTapIdx <= 5) {
    $('hudFind').textContent = 'Tap ' + nextTapIdx;
  } else {
    $('hudFind').textContent = 'She\'s free!';
  }
}

// HANDLE NODE TAP
async function handleNodeTap(nodeEl, num) {
  if (!gameActive) return;
  clearHints();

  if (num === nextTapIdx) {
    // CORRECT
    gameActive = false;

    nodeEl.classList.remove('next-hint');
    starBurst(nodeEl);

    // Chime
    audio.toneSequence(num);
    audio.tone('gemAbsorb');

    // Draw the connecting lines (from previous -> this node -> orb)
    const prevNum = nextTapIdx > 0 ? nextTapIdx - 1 : null;
    drawConnectionLine(prevNum, num);

    // Fly the gem
    flyGemToOrb(nodeEl, num);

    // Fade out node
    nodeEl.classList.add('fly-away');

    score++;
    $('hudScore').textContent = score;

    // Character reacts
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT), 1500);

    // Mark progress
    markProg(num);

    // Wait for gem to reach orb, then pulse orb
    await delay(380);
    pulseOrbReceive();
    setOrbStage(nextTapIdx + 1);

    // Speak the number ONCE (no repeat)
    audio.speakNumber(num); // fire-and-forget so we don't block

    nextTapIdx++;
    updateHud();

    if (nextTapIdx > 5) {
      // Sequence complete - orb burst, princess freed
      await delay(250);
      await freePrincess();
    } else {
      // Highlight next node if strong hint mode
      const cfg = ROUNDS[round];
      if (cfg.hintMode === 'strong') {
        nodeEls[nextTapIdx].classList.add('next-hint');
      }
      gameActive = true;
      resetHints();
    }

  } else {
    // WRONG
    nodeEl.classList.add('wrong-tap');
    audio.tone('wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1600);
    audio.play('wrong');
    setTimeout(() => audio.speakNumber(nextTapIdx), 500);
    setTimeout(() => {
      nodeEl.classList.remove('wrong-tap');
      resetHints();
    }, 450);
  }
}

// FREE THE PRINCESS - orb burst + dance
async function freePrincess() {
  // Flash the path
  $('lineSvg').classList.add('path-celebrate');

  // Final charged stage
  setOrbStage(5);
  $('princessOrb').classList.add('stage-6');

  audio.tone('orbBurst');
  await delay(400);

  // Burst
  const orb = $('princessOrb');
  orb.classList.remove('stage-6');
  orb.classList.add('bursting');
  confetti(30, ['\u{1F48E}','\u2728','\u{1F31F}','\u{1F496}','\u{1F338}']);

  // Show freed princess
  await delay(350);
  const freed = $('princessFreed');
  freed.classList.add('show');
  showCharBubble(pick(BUBBLE_FREED), 2000);
  jumpChar();
  audio.tone('celeb');
  audio.play('correct');

  roundsFreed++;

  await delay(1400);
  $('lineSvg').classList.remove('path-celebrate');

  // Round complete
  await finishRound();
}

// ROUND TRANSITIONS
async function finishRound() {
  gameActive = false;
  clearHints();

  // Clean up
  $('playArea').querySelectorAll('.num-node').forEach(n => n.remove());
  $('lineSvg').innerHTML = '<defs><linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#f8a5c2"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient></defs>';
  $('playArea').classList.remove('active', 'timer-warning');

  // Reset orb
  $('princessOrb').classList.remove('bursting','stage-1','stage-2','stage-3','stage-4','stage-5','stage-6','receive');
  $('princessOrb').style.opacity = '';
  $('princessOrb').style.transform = '';
  $('princessFreed').classList.remove('show');
  $('princessFreed').style.opacity = '0';

  audio.tone('roundDone');
  round++;

  if (round >= ROUNDS.length) {
    await delay(500);
    celebrateFinish();
    return;
  }

  // Snappy transition: round-complete + intro, combined, brief
  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  audio.play('round-complete'); // voice (async)
  await delay(1200);
  $('roundBanner').classList.remove('show');
  await delay(200);

  startRound();
}

function startRound() {
  const cfg = ROUNDS[round];
  $('hudRound').textContent = (round + 1) + '/4';
  resetProg();
  nextTapIdx = 0;
  updateHud();
  renderNodes();
  positionOrb();
  setOrbStage(0);
  gameActive = true;

  audio.tone('reveal');
  resetHints();

  if (cfg.timer) {
    $('playArea').classList.remove('timer-warning');
    void $('playArea').offsetWidth;
    $('playArea').classList.add('timer-warning');
  }
}

// FINAL CELEBRATION
async function celebrateFinish() {
  gameActive = false;
  audio.stopMusic();
  $('hud').style.display       = 'none';
  $('progBar').style.display   = 'none';
  $('roundBanner').classList.remove('show');
  $('playArea').classList.remove('active');
  $('princessOrb').style.display = 'none';
  $('charArea').style.display   = 'none';

  audio.tone('celeb');
  confetti(60, ['\u{1F48E}','\u{1F496}','\u{1F338}','\u2728','\u{1F337}','\u{1F31F}','\u{1F496}','\u{1F980}'.substr(0,0)+'\u{1F338}','\u{1F496}','\u{1F31F}']);

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 6)));
  $('celebStars').textContent = '\u2B50'.repeat(stars);
  $('celebTitle').textContent = 'Princess Rescued!';
  $('celebMsg').textContent   = 'You freed her ' + roundsFreed + ' times!';
  showScreen('scrCeleb');

  await audio.speakPhrase('save_the_princess');
  await delay(150);
  await audio.play('game-complete');
  await delay(200);
  await audio.play('game-complete');

  setTimeout(() => confetti(35, ['\u{1F48E}','\u{1F496}','\u{1F338}','\u{1F31F}','\u{1F496}']), 1800);
}

// GAME START / RESET
async function startGame() {
  audio.stopMusic();
  audio.clearQueue();
  round = 0; score = 0;
  nextTapIdx = 0; roundsFreed = 0;
  clearHints();

  $('hudScore').textContent    = '0';
  $('hud').style.display       = '';
  $('charArea').style.display  = '';
  $('roundBanner').classList.remove('show');
  $('playArea').classList.remove('timer-warning');

  // Reset orb
  $('princessOrb').style.display = '';
  $('princessOrb').classList.remove('bursting','stage-1','stage-2','stage-3','stage-4','stage-5','stage-6','receive');
  $('princessOrb').style.opacity = '';
  $('princessOrb').style.transform = '';
  $('princessFreed').classList.remove('show');
  $('princessFreed').style.opacity = '0';

  buildProg();
  showScreen(null);
  audio.startMusic();

  // Opening banner - SNAPPY
  const cfg = ROUNDS[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  audio.play('greetings');
  await delay(1200);
  $('roundBanner').classList.remove('show');
  await delay(200);

  startRound();
}

// INIT
buildScenery();

onTap($('btnStart'), () => {
  audio.unlock();
  audio.tone('whoosh');
  startGame();
});
onTap($('btnAgain'), () => {
  audio.unlock();
  startGame();
});

// Reposition orb on resize
window.addEventListener('resize', () => {
  if ($('princessOrb').style.display !== 'none') positionOrb();
});

/* ═══ AHA! PROGRESS TRACKING ═══ */
(function(){
  function getKey(){
    var parts = location.pathname.split('/').filter(Boolean);
    var last = parts[parts.length-1] || 'index.html';
    var game = last.replace('.html','');
    var theme = parts[parts.length-2] || 'root';
    if (game === '') game = 'index';
    return theme + '/' + game;
  }
  function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } }
  function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} }
  function markAttempt(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = { attempted: true, attemptedAt: Date.now() };
    save(p);
  }
  function markComplete(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = {};
    p[k].completed = true;
    p[k].completedAt = Date.now();
    p[k].plays = (p[k].plays||0) + 1;
    save(p);
  }
  var celeb = document.getElementById('scrCeleb');
  if (celeb){
    var obs = new MutationObserver(function(){ if (celeb.classList.contains('active')) markComplete(); });
    obs.observe(celeb, { attributes: true, attributeFilter: ['class'] });
  }
  setTimeout(markAttempt, 3000);
})();
