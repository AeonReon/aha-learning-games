<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Build the Castle A-E — Queen Ella's Castle Kingdom!</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --sky-1: #ffd6ec; --sky-2: #c7a6ff; --sky-3: #8a6cd4; --sky-4: #4a3b88;
  --gold: #ffd966; --gold-deep: #c89a1f;
  --pink: #ff8fc1; --purple: #a574d4; --cream: #f5e6c4; --burgundy: #8c1f3a; --lavender: #c7a9e0;
  --white85: rgba(255,255,255,0.9);
  --ink: #2a1948;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Background ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(170deg, #ffd6ec 0%, #f0b8e8 25%, #c7a6ff 55%, #8a6cd4 85%, #4a3b88 100%);
}
.bg-element {
  position: fixed; pointer-events: none; z-index: 1;
  font-size: clamp(12px, 2.5vw, 20px);
  opacity: 0.45;
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.45; }
  92%  { opacity: 0.45; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1.1); opacity: 0; }
}

/* Distant castle silhouettes */
.bg-hills {
  position: fixed; bottom: 0; left: 0; right: 0; height: 30vh;
  z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse at 15% 100%, rgba(74,59,136,0.55) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 100%, rgba(74,59,136,0.5) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(40,25,80,0.45) 0%, transparent 55%);
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title .icon-row {
  display: flex; gap: 14px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(40px, 10vw, 68px); }
.screen-title h1 {
  font-size: clamp(24px, 6vw, 44px);
  color: #fff;
  text-shadow: 0 0 30px rgba(255,217,102,0.75), 2px 2px 0 rgba(74,31,58,0.55), -2px -2px 0 rgba(200,154,31,0.4);
  margin: 6px 0 8px;
  letter-spacing: 0.02em;
}
.screen-title p {
  font-size: clamp(13px, 3.2vw, 19px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
  text-shadow: 1px 1px 0 rgba(42,25,72,0.5);
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: var(--ink); border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.3), inset 0 2px 0 rgba(255,255,255,0.4);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg,#ffe680,#ffb347); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; }
.btn-again { background: linear-gradient(135deg,#ffe680,#ffb347); margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(42,25,72,0.88); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(255,217,102,0.25);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.55); font-weight: bold; letter-spacing: 0.05em; }
.hud-val { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--gold); }
.hud-score .hud-val { color: var(--gold); }
.hud-center .hud-val { color: var(--gold); font-size: clamp(13px,3vw,18px); }

/* ── Queen Ella character (bottom-left) ── */
.char-area {
  position: fixed; bottom: 140px; left: 8px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji { font-size: clamp(44px,10vw,66px); filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3)); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.97); color: var(--ink);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(11px,2.4vw,15px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.25);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
  border: 2px solid var(--gold);
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.97);
}

/* ── Play area (bricks) ── */
.play-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 240px;
  z-index: var(--z-game);
  pointer-events: none;
}
.play-area.active { pointer-events: auto; }

/* Timer background shift (round 4) */
.play-area.timer-warning { animation: timerShift 30s ease-in-out forwards; }
@keyframes timerShift {
  0%   { background: transparent; }
  50%  { background: rgba(255,217,102,0.07); }
  100% { background: rgba(255,100,100,0.08); }
}

/* ── Alphabet Bricks ── */
.brick {
  position: absolute;
  width: clamp(88px, 22vw, 120px);
  height: clamp(70px, 18vw, 95px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border: 3px solid var(--gold);
  box-shadow:
    0 4px 20px rgba(0,0,0,0.3),
    inset 0 3px 0 rgba(255,255,255,0.35),
    inset 0 -4px 0 rgba(0,0,0,0.22);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s, opacity 0.3s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  z-index: 2;
  opacity: 0; transform: scale(0.5);
  padding: 4px;
  border-radius: 10px;
}
.brick.show { opacity: 1; transform: scale(1); }
.brick:active { transform: scale(0.93) !important; }
.brick.r4-size {
  width: clamp(72px, 18vw, 100px);
  height: clamp(58px, 15vw, 80px);
}
.brick.r4-size .brick-letters { font-size: clamp(20px, 5vw, 30px); }

/* Brick stone texture */
.brick::before {
  content: '';
  position: absolute; inset: 4px;
  border-radius: 6px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 40%, rgba(0,0,0,0.08) 100%);
  pointer-events: none;
}
/* Crack/mortar lines */
.brick::after {
  content: '';
  position: absolute;
  top: 50%; left: 8%; right: 8%; height: 1px;
  background: rgba(0,0,0,0.15);
  pointer-events: none;
}

.brick-letters {
  font-weight: 900;
  color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.35), -1px -1px 0 rgba(255,255,255,0.15);
  font-size: clamp(24px, 6vw, 36px);
  line-height: 1;
  position: relative; z-index: 2;
  letter-spacing: 0.05em;
}
.brick-emoji {
  font-size: clamp(18px, 4.5vw, 26px);
  line-height: 1; margin-top: 3px;
  position: relative; z-index: 2;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
}
.brick-letter-solo {
  font-size: clamp(16px, 4vw, 22px);
  font-weight: 900;
  color: #fff;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  opacity: 0.85;
  margin-top: 2px;
  position: relative; z-index: 2;
}

/* Brick colors (pink/gold, purple/gold, cream/gold, burgundy/gold, lavender/gold) */
.brick.b-a { background: linear-gradient(135deg,#ffb3d1,#ff6fa8); }
.brick.b-b { background: linear-gradient(135deg,#c896ea,#8a52c6); }
.brick.b-c { background: linear-gradient(135deg,#fdf0c9,#e8c878); }
.brick.b-c .brick-letters { color: var(--ink); text-shadow: 1px 1px 0 rgba(255,255,255,0.3); }
.brick.b-d { background: linear-gradient(135deg,#c24765,#7a1530); }
.brick.b-e { background: linear-gradient(135deg,#d9bce8,#a882c4); }

/* Brick states */
.brick.activated {
  border-color: #fff !important;
  box-shadow:
    0 0 30px rgba(255,217,102,0.85),
    0 0 60px rgba(255,217,102,0.4),
    0 4px 20px rgba(0,0,0,0.3),
    inset 0 3px 0 rgba(255,255,255,0.5) !important;
  transform: scale(1.08) !important;
}
.brick.next-hint { animation: pulseHint 1.5s ease-in-out infinite; }
@keyframes pulseHint {
  0%,100% { box-shadow: 0 0 12px rgba(255,217,102,0.4), 0 4px 20px rgba(0,0,0,0.3), inset 0 3px 0 rgba(255,255,255,0.35); }
  50%     { box-shadow: 0 0 35px rgba(255,217,102,0.85), 0 0 60px rgba(255,217,102,0.45), 0 4px 20px rgba(0,0,0,0.3), inset 0 3px 0 rgba(255,255,255,0.45); }
}
.brick.wrong-tap { animation: wrongShake 0.45s ease-in-out; }
.brick.wiggle { animation: wiggleHint 0.6s ease-in-out; }
@keyframes wiggleHint {
  0%,100% { transform: rotate(0deg); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(8deg); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(5deg); }
}

/* Fly-to-castle animation */
.brick.flying {
  transition: none !important;
  z-index: 50;
  pointer-events: none;
}

/* ═══ CASTLE AREA ═══ */
.castle-area {
  position: fixed;
  bottom: 30px; left: 50%; transform: translateX(-50%);
  z-index: var(--z-ui);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
  width: clamp(200px, 52vw, 320px);
}

.castle {
  position: relative;
  width: 100%;
  height: clamp(130px, 30vw, 180px);
}

/* Castle foundation (ground) */
.castle-ground {
  position: absolute;
  bottom: 0; left: -10%; right: -10%;
  height: 14px;
  background: linear-gradient(180deg, #6b5935 0%, #3d2f1a 100%);
  border-radius: 3px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
}

/* Castle tiers — stack upward */
.castle-tier {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  display: flex; justify-content: center; align-items: flex-end;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.5s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.castle-tier.show { opacity: 1; }

/* Tier 1 — widest base (A) */
.tier-1 {
  bottom: 14px;
  width: 80%;
  height: clamp(30px, 7vw, 42px);
}
/* Tier 2 — middle (B) */
.tier-2 {
  bottom: clamp(44px, 11vw, 56px);
  width: 72%;
  height: clamp(26px, 6vw, 36px);
}
/* Tier 3 — upper (C) */
.tier-3 {
  bottom: clamp(70px, 17vw, 92px);
  width: 60%;
  height: clamp(24px, 5.5vw, 34px);
}
/* Tier 4 — tower (D) */
.tier-4 {
  bottom: clamp(94px, 22vw, 126px);
  width: 38%;
  height: clamp(22px, 5vw, 32px);
}
/* Tier 5 — peak (E) - roofs */
.tier-5 {
  bottom: clamp(116px, 27vw, 158px);
  width: 38%;
  height: clamp(18px, 4.5vw, 28px);
}

/* Castle stone blocks */
.castle-stone {
  flex: 1; height: 100%;
  background: linear-gradient(180deg, var(--c1) 0%, var(--c2) 100%);
  border: 2px solid rgba(0,0,0,0.25);
  border-radius: 3px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), inset 0 -2px 0 rgba(0,0,0,0.2);
  position: relative;
}
.castle-stone::after {
  content: '';
  position: absolute;
  top: 50%; left: 10%; right: 10%;
  height: 1px; background: rgba(0,0,0,0.15);
}

/* Crenellations (castellated top) */
.tier-3 .castle-stone.crenel {
  border-top: none;
  position: relative;
}
.tier-3 .castle-stone.crenel::before {
  content: '';
  position: absolute; top: -6px; left: 0; right: 0; height: 6px;
  background:
    linear-gradient(90deg,
      var(--c1) 0%, var(--c1) 30%,
      transparent 30%, transparent 40%,
      var(--c1) 40%, var(--c1) 60%,
      transparent 60%, transparent 70%,
      var(--c1) 70%, var(--c1) 100%);
}

/* Tower (tier 4) with window */
.tier-4 .castle-stone.window-stone {
  position: relative;
}
.tier-4 .castle-stone.window-stone::before {
  content: '';
  position: absolute;
  top: 25%; left: 30%; right: 30%; bottom: 25%;
  background: radial-gradient(ellipse at 50% 50%, #2a1948 0%, #0a0514 100%);
  border-radius: 50% 50% 4px 4px;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.6);
}

/* Roof / peak (tier 5) */
.tier-5 .castle-roof {
  flex: 1; height: 100%;
  position: relative;
}
.tier-5 .castle-roof::before {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; top: 0;
  background: linear-gradient(180deg, var(--c1) 0%, var(--c2) 100%);
  clip-path: polygon(0 100%, 50% 0, 100% 100%);
  border-radius: 0;
}

/* Flags */
.castle-flag {
  position: absolute;
  top: -16px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 24px;
  background: #3d2f1a;
  opacity: 0;
  transition: opacity 0.5s;
}
.castle-flag.show { opacity: 1; animation: flagRaise 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
.castle-flag::after {
  content: '';
  position: absolute;
  top: 1px; left: 3px;
  width: 14px; height: 10px;
  background: var(--flag-color, var(--gold));
  clip-path: polygon(0 0, 100% 0, 80% 50%, 100% 100%, 0 100%);
  animation: flagWave 1.2s ease-in-out infinite;
}
@keyframes flagRaise {
  0% { transform: translate(-50%, 30px) scale(0.5); opacity: 0; }
  100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
}
@keyframes flagWave {
  0%, 100% { transform: skewY(0deg) scaleX(1); }
  50% { transform: skewY(-6deg) scaleX(0.92); }
}

/* Drawbridge */
.castle-drawbridge {
  position: absolute;
  bottom: 14px; left: 50%; transform: translateX(-50%);
  width: 28%;
  height: clamp(22px, 5vw, 30px);
  background: linear-gradient(180deg, #8b5a2b 0%, #5c3a1a 100%);
  border: 2px solid #3d2612;
  border-radius: 20px 20px 2px 2px;
  transform-origin: bottom center;
  transform: translateX(-50%) scaleY(0);
  transition: transform 0.9s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  z-index: 3;
}
.castle-drawbridge.show { transform: translateX(-50%) scaleY(1); }
.castle-drawbridge::before {
  content: '';
  position: absolute; top: 20%; bottom: 20%; left: 50%;
  width: 2px; background: rgba(0,0,0,0.3);
}

/* Princess waving from window */
.castle-princess {
  position: absolute;
  font-size: clamp(16px, 4vw, 22px);
  top: clamp(94px, 22vw, 126px);
  left: 50%; transform: translateX(-50%);
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 4;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
}
.castle-princess.show { opacity: 1; animation: princessWave 1.5s ease-in-out infinite; }
@keyframes princessWave {
  0%, 100% { transform: translate(-50%, 0) rotate(-6deg); }
  50% { transform: translate(-50%, -2px) rotate(6deg); }
}

/* Castle glow states */
.castle-glow {
  position: absolute;
  inset: -20px -30px -10px -30px;
  border-radius: 50%;
  pointer-events: none;
  transition: opacity 0.8s;
  opacity: 0;
}
.castle-glow.active { opacity: 1; }
.castle-glow.g1 { box-shadow: 0 0 30px rgba(255,143,193,0.4), 0 0 60px rgba(255,143,193,0.2); }
.castle-glow.g2 { box-shadow: 0 0 35px rgba(165,116,212,0.5), 0 0 70px rgba(165,116,212,0.25); }
.castle-glow.g3 { box-shadow: 0 0 40px rgba(245,230,196,0.55), 0 0 80px rgba(245,230,196,0.3); }
.castle-glow.g4 { box-shadow: 0 0 45px rgba(140,31,58,0.55), 0 0 90px rgba(255,217,102,0.3); }
.castle-glow.g5 {
  box-shadow:
    0 0 60px rgba(255,217,102,0.6),
    0 0 120px rgba(255,143,193,0.4),
    0 0 180px rgba(199,169,224,0.3);
  animation: castleGlowPulse 1.3s ease-in-out infinite;
}
@keyframes castleGlowPulse {
  0%,100% { opacity: 0.7; }
  50%     { opacity: 1; }
}

/* Fairy dust / bubbles at castle */
.castle-bubble {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,217,102,0.4) 60%, transparent 100%);
  pointer-events: none;
  animation: fairyRise linear infinite;
}
@keyframes fairyRise {
  0%   { transform: translateY(0) scale(1); opacity: 0.8; }
  60%  { opacity: 0.9; }
  100% { transform: translateY(-50px) scale(0.3); opacity: 0; }
}

/* Fairy dust particles on brick land */
.dust-particle {
  position: fixed;
  pointer-events: none;
  z-index: 60;
  font-size: 18px;
  animation: dustPop 0.8s ease-out forwards;
}
@keyframes dustPop {
  0% { transform: translate(0,0) scale(0.5); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 0; }
}

/* Sparkle trail on fly */
.sparkle-trail {
  position: fixed;
  font-size: 14px;
  pointer-events: none;
  z-index: 55;
  animation: trailFade 0.4s ease-out forwards;
}
@keyframes trailFade {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.3) translateY(10px); opacity: 0; }
}

/* Castle counter (4 pip crowns for castles built) */
.castle-counter {
  display: flex; gap: 6px; justify-content: center;
  margin-top: 8px;
}
.castle-pip {
  width: clamp(16px, 4vw, 22px);
  height: clamp(18px, 4.5vw, 24px);
  border-radius: 3px 3px 0 0;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.2);
  position: relative;
  transition: background 0.3s, border-color 0.3s, transform 0.3s;
}
.castle-pip::before {
  content: '';
  position: absolute; top: -5px; left: 0; right: 0; height: 5px;
  background:
    linear-gradient(90deg,
      currentColor 0%, currentColor 25%,
      transparent 25%, transparent 37.5%,
      currentColor 37.5%, currentColor 62.5%,
      transparent 62.5%, transparent 75%,
      currentColor 75%, currentColor 100%);
  color: rgba(255,255,255,0.2);
}
.castle-pip.filled {
  border-color: var(--gold);
  animation: pipFill 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.castle-pip.filled:nth-child(1) { background: linear-gradient(180deg, #ffb3d1, #ff6fa8); }
.castle-pip.filled:nth-child(1)::before { color: #ff6fa8; }
.castle-pip.filled:nth-child(2) { background: linear-gradient(180deg, #c896ea, #8a52c6); }
.castle-pip.filled:nth-child(2)::before { color: #8a52c6; }
.castle-pip.filled:nth-child(3) { background: linear-gradient(180deg, #ffe680, #c89a1f); }
.castle-pip.filled:nth-child(3)::before { color: #c89a1f; }
.castle-pip.filled:nth-child(4) { background: linear-gradient(180deg, #e8e8f0, #a0a0b8); }
.castle-pip.filled:nth-child(4)::before { color: #a0a0b8; }
@keyframes pipFill { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.3)} 100%{transform:scale(1.1)} }

/* ── Progress bar ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: calc(var(--z-ui) + 5);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(6px,1.5vw,10px);
  padding: 4px 10px 6px;
  background: rgba(42,25,72,0.9); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(28px,5.5vw,38px);
  height: clamp(28px,5.5vw,38px);
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,3vw,20px); font-weight: 900;
  color: rgba(255,255,255,0.4);
  transition: all 0.3s;
  text-transform: uppercase;
}
.prog-dot.current {
  border-color: var(--gold);
  color: var(--gold);
}
.prog-dot.done {
  background: linear-gradient(135deg,var(--gold),#c47400);
  border-color: var(--gold); color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* ── Round banner ── */
.round-banner {
  position: fixed; top: 45%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(42,25,72,0.95); backdrop-filter: blur(12px);
  border: 2px solid rgba(255,217,102,0.35); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--gold); text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(255,255,255,0.85); margin-top: 5px;
}

/* ── Celebration screen ── */
.screen-celeb {
  background: radial-gradient(ellipse at 50% 50%, rgba(42,25,72,0.85) 0%, rgba(20,10,40,0.95) 100%);
  backdrop-filter: blur(10px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(24px,6vw,44px); color: var(--gold);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(13px,3.2vw,20px); color: rgba(255,255,255,0.9); margin: 6px 0; }
.celeb-stars { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-queen { font-size: clamp(60px, 16vw, 100px); animation: queenBob 2s ease-in-out infinite; filter: drop-shadow(0 4px 10px rgba(255,217,102,0.5)); }
.celeb-queen-text {
  font-size: clamp(14px, 3.5vw, 22px);
  color: var(--gold); font-weight: bold;
  margin: 8px 0;
  animation: fadeInUp 1s ease-out 0.5s both;
}
@keyframes queenBob {
  0%,100% { transform: translateY(0) scale(1); }
  50%     { transform: translateY(-12px) scale(1.05); }
}
@keyframes fadeInUp {
  0%   { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Castle fireworks for final celebration */
.firework-particle {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  z-index: calc(var(--z-celeb) + 3);
  animation: firework 1.8s ease-out forwards;
}
@keyframes firework {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--ex), var(--ey)) scale(0.3); opacity: 0; }
}

/* ── Particles & shared ── */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }

/* ── Keyframes ── */
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-22px) scale(1.08)} 70%{transform:translateY(-8px) scale(1.03)} }
@keyframes wrongShake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(9px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }

/* Castle "drop" animation when brick lands in tier */

<script>

// ║  royal castle. Voice B (British teacher), Castle Kingdom theme.  ║
// ╚══════════════════════════════════════════════════════════════════╝

const AUDIO_BASE = '../../audio';

// ── Voice B clip pools ─────────────────────────────────────────────
const VOICE_B = {

const LETTERS = ['a','b','c','d','e'];
const LETTER_WORDS = { a:'apple', b:'balloon', c:'crown', d:'dragon', e:'egg' };

// ══════════════════════════════════════════════════════════════════
// AUDIO CLASS (AudioContext-first with iOS fallback)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.08; this.sfxVol = 0.3; this.musicDucked = 0.025;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Regal, fairytale — major key castle theme
    const notes = [261.63, 329.63, 392.00, 440.00, 523.25, 659.25]; // C major pentatonic up
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.4 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.7 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + 0.2);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.5);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.7);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 900 + Math.random() * 1400);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.15,0.2); p(554,t+0.1,0.18,0.25); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='thud') {
      // Stone/brick landing thud
      p(120, t, 0.12, 0.4, 'triangle');
      p(80,  t+0.02, 0.15, 0.3, 'sine');
      p(200, t+0.04, 0.08, 0.15);
    }
    else if (type==='sparkle') {
      p(880, t, 0.08, 0.2);
      p(1174, t+0.05, 0.1, 0.18);
      p(1568, t+0.1, 0.12, 0.15);
    }
    else if (type==='fanfare') {
      // Royal trumpet fanfare
      p(261.63, t, 0.18, 0.3);
      p(329.63, t+0.15, 0.18, 0.35);
      p(392.00, t+0.3, 0.2, 0.4);
      p(523.25, t+0.48, 0.35, 0.45);
      p(659.25, t+0.48, 0.35, 0.3);
      p(783.99, t+0.48, 0.35, 0.2);
    }
  }
  // Ascending sequence chime — pitch rises with each brick (A low → E high)
  toneSequence(idx) {
    this._init(); const t = this.ctx.currentTime;
    const freqs = [261.63, 329.63, 392.00, 440.00, 523.25]; // C E G A C ascending
    const f = freqs[Math.min(idx, freqs.length-1)];
    const p = (freq, s, d, v, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = freq;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    p(f, t, 0.25, 0.4);
    p(f * 1.5, t + 0.05, 0.2, 0.15);
    p(f * 2, t + 0.08, 0.15, 0.1, 'triangle');
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(l)   { return this.speak(`${AUDIO_BASE}/letters/${l}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ══════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click', e => { if(t)return; fn(e); });
}

const BUBBLE_CORRECT = ['Lay that brick! 🏰','Gorgeous! 💛','Splendid, my dear! ✨','Perfect placement! 👑','How marvellous! 🌟','Queen Ella approves! 👸'];
const BUBBLE_WRONG   = ['Not that one! 👑','Check the letter! ✨','Try another! 💛','Almost, my dear! 🌟'];
const BUBBLE_CASTLE  = ['Castle complete! 🏰','A royal beauty! 👑','Magnificent! 💛','Fit for a queen! 👸'];

// Castle color themes per round (pink/purple/gold/silver)
const CASTLE_THEMES = [
  { name: 'Rose Castle',   flag:'#ff6fa8', pip: 0 }, // pink dominant
  { name: 'Royal Castle',  flag:'#8a52c6', pip: 1 }, // purple dominant
  { name: 'Golden Castle', flag:'#ffe680', pip: 2 }, // gold dominant

// ══════════════════════════════════════════════════════════════════
// VISUAL EFFECTS
// ══════════════════════════════════════════════════════════════════
function confetti(count = 40, extra = []) {
  const all = ['⭐','✨','💫','🌟','🎉','👑','🏰','💛','💖','🌸', ...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti'; el.textContent = pick(all);
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top  = '-30px';
    el.style.fontSize = (16 + Math.random()*14) + 'px';
    el.style.animationDelay    = (Math.random()*1.8) + 's';
    el.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6200);
  }
}

function starBurst(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'starburst';
    s.textContent = pick(['✨','💫','⭐','🌟','💛','👑']);
    s.style.left = (cx + (Math.random()-0.5)*140) + 'px';
    s.style.top  = (cy + (Math.random()-0.5)*140) + 'px';
    s.style.animationDelay = (Math.random()*0.15) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function showCharBubble(text, dur = 2200) {
  const b = $('charBubble');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), dur);
}

function jumpChar() {
  const el = $('charEmoji');
  el.style.animation = '';
  void el.offsetWidth;
  el.style.animation = 'charJump 0.65s ease-out';
  setTimeout(() => { el.style.animation = ''; }, 700);
}

// Sparkle trail effect during fly animation
function spawnTrail(x, y) {
  const t = document.createElement('div');
  t.className = 'sparkle-trail';
  t.textContent = pick(['✨','💫','⭐','💛','🌟']);
  t.style.left = (x + (Math.random()-0.5)*20) + 'px';
  t.style.top  = (y + (Math.random()-0.5)*20) + 'px';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 500);
}

// Fairy dust burst when brick lands on castle
function castleDust() {
  const castle = $('castle');
  const r = castle.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height*0.45;
  const dustEmojis = ['✨','💫','⭐','💛','🫧','🌟'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'dust-particle';
    s.textContent = pick(dustEmojis);
    s.style.left = cx + 'px';
    s.style.top  = cy + 'px';
    s.style.setProperty('--dx', ((Math.random()-0.5)*120) + 'px');
    s.style.setProperty('--dy', (-20 - Math.random()*60) + 'px');
    s.style.animationDelay = (Math.random()*0.2) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

// Castle fireworks for final celebration
function castleFireworks() {
  const castle = $('castle');
  const r = castle.getBoundingClientRect();

  const emojis = ['👑','🏰','💛','✨','💫','⭐','🌟','🎉','💖','🌸','👸'];

// ══════════════════════════════════════════════════════════════════
// CASTLE MANAGEMENT
// ══════════════════════════════════════════════════════════════════
let bricksLaid = 0;     // 0-5 per sequence (which tier is next)
let castlesBuilt = 0;   // 0-4 total

function resetCastle() {
  bricksLaid = 0;
  // Hide all tiers
  for (let i = 1; i <= 5; i++) {
    const tier = $('tier' + i);
    if (tier) {
      tier.classList.remove('show', 'drop-in');
    }
  }
  // Hide flags, drawbridge, princess
  const flagE = $('flagE'); if (flagE) flagE.classList.remove('show');
  $('castleDrawbridge').classList.remove('show');
  $('castlePrincess').classList.remove('show');
  // Reset glow
  const glow = $('castleGlow');
  glow.classList.remove('active','g1','g2','g3','g4','g5');
  // Apply castle theme colors based on which castle we're building
  applyCastleTheme(castlesBuilt);
  // Clear any fairy bubbles
  $('castle').querySelectorAll('.castle-bubble').forEach(b => b.remove());
}

function applyCastleTheme(themeIdx) {
  const theme = CASTLE_THEMES[Math.min(themeIdx, CASTLE_THEMES.length-1)];
  // Flag color on final tier
  const flagE = $('flagE');
  if (flagE) flagE.style.setProperty('--flag-color', theme.flag);
}

function layBrick(brickIdx) {
  // brickIdx 0-4 → tier 1-5
  const tierNum = brickIdx + 1;
  const tier = $('tier' + tierNum);
  if (tier) {
    tier.classList.add('show', 'drop-in');
    setTimeout(() => tier.classList.remove('drop-in'), 600);
  }
  bricksLaid = tierNum;

  // Update glow stage
  const glow = $('castleGlow');
  glow.classList.remove('g1','g2','g3','g4','g5');
  glow.classList.add('active', 'g' + bricksLaid);

  // Add fairy dust bubbles increasing with height
  updateCastleBubbles();
}

function updateCastleBubbles() {
  const castle = $('castle');
  castle.querySelectorAll('.castle-bubble').forEach(b => b.remove());
  const count = bricksLaid * 2;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'castle-bubble';
    const size = 4 + Math.random() * 10;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = (5 + Math.random() * 90) + '%';
    b.style.bottom = (10 + Math.random() * 60) + '%';
    b.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    b.style.animationDelay = (Math.random() * 2.5) + 's';
    castle.appendChild(b);
  }
}

function completeCastle() {
  // All 5 tiers placed — raise flag, lower drawbridge, show princess
  const glow = $('castleGlow');
  glow.classList.remove('g1','g2','g3','g4');
  glow.classList.add('active', 'g5');

  setTimeout(() => {
    const flagE = $('flagE');
    if (flagE) flagE.classList.add('show');
  }, 100);
  setTimeout(() => {
    $('castleDrawbridge').classList.add('show');
  }, 350);
  setTimeout(() => {
    $('castlePrincess').classList.add('show');
  }, 700);
}

function markCastle(idx) {
  const pip = $('pip' + idx);
  if (pip) pip.classList.add('filled');
}

  { label:'Castle 1 — Lay the Bricks! 🏰', sub:'Tap bricks A to E in order! Hints will help.', display:'full',    hintMode:'strong' },
  { label:'Castle 2 — Build Again! 👑',    sub:'No hints this time! Remember the order.',       display:'full',    hintMode:'none'   },

// GAME STATE
// ══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let round = 0, score = 0;
let nextTapIdx = 0; // index into LETTERS array (0-4)
let brickEls = {}; // keyed by letter
let hintTimer = null, hintVoiceTimer = null;

// ══════════════════════════════════════════════════════════════════
function buildProg() {
  const bar = $('progBar');
  bar.innerHTML = ''; bar.style.display = '';
  for (let i = 0; i < 5; i++) {

    d.className = 'prog-dot'; d.id = 'pdot' + i;

// ══════════════════════════════════════════════════════════════════
// HINT SYSTEM
// ══════════════════════════════════════════════════════════════════
function clearHints() { clearTimeout(hintTimer); clearTimeout(hintVoiceTimer); }
function resetHints() {
  clearHints();
  if (!gameActive) return;
  const cfg = ROUNDS[round];
  if (cfg.hintMode === 'none') return;

  hintTimer = setTimeout(() => {
    const targetLet = LETTERS[nextTapIdx];
    const brick = brickEls[targetLet];
    if (brick && gameActive) {
      brick.classList.add('wiggle');
      audio.tone('hint');
      setTimeout(() => brick.classList.remove('wiggle'), 700);
    }
  }, 4000);
  hintVoiceTimer = setTimeout(() => {
    if (gameActive) {
      audio.play('thinking');
      setTimeout(() => { if (gameActive) audio.speakLetter(LETTERS[nextTapIdx]); }, 1200);
    }
  }, 7000);
}

// ══════════════════════════════════════════════════════════════════
// POSITION GENERATION — random positions with minimum spacing
// ══════════════════════════════════════════════════════════════════
function generatePositions(count, smaller) {
  const area = $('playArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const brickW = smaller ? Math.min(Math.max(72, areaW * 0.18), 100) : Math.min(Math.max(88, areaW * 0.22), 120);
  const brickH = brickW * 0.8;
  const margin = brickW * 0.4;
  const minDist = brickW * 1.15;

  const positions = [];
  for (let i = 0; i < count; i++) {
    let tries = 0;
    let x, y;
    do {
      x = margin + Math.random() * (areaW - margin * 2 - brickW);
      y = margin + 10 + Math.random() * (areaH - margin * 2 - brickH);
      tries++;
      if (tries > 300) break;
    } while (positions.some(p => {
      const dx = p.x - x, dy = p.y - y;
      return Math.sqrt(dx*dx + dy*dy) < minDist;
    }));
    positions.push({ x, y });
  }
  return positions;
}

// ══════════════════════════════════════════════════════════════════
// RENDER BRICKS
// ══════════════════════════════════════════════════════════════════
function renderBricks() {
  const area = $('playArea');
  const cfg = ROUNDS[round];

  area.querySelectorAll('.brick').forEach(n => n.remove());
  brickEls = {};

  const positions = generatePositions(5, cfg.smaller);
  const shuffledOrder = shuffle([...Array(5).keys()]); // random placement order

  shuffledOrder.forEach((seqIdx, posIdx) => {
    const letter = LETTERS[seqIdx];
    const brick = document.createElement('div');
    brick.className = 'brick b-' + letter;
    if (cfg.smaller) brick.classList.add('r4-size');
    brick.style.left = positions[posIdx].x + 'px';
    brick.style.top  = positions[posIdx].y + 'px';
    brick.dataset.letter = letter;

    let inner = '';
    if (cfg.display === 'full') {
      // Big letters (upper + lower) + emoji
      inner = `<div class="brick-letters">${letter.toUpperCase()} ${letter}</div>
               <div class="brick-emoji">${LETTER_EMOJI[letter]}</div>`;
    } else if (cfg.display === 'picture') {
      // Pictures only + small letters below
      inner = `<div class="brick-emoji" style="font-size:clamp(30px,7vw,44px);margin-top:0">${LETTER_EMOJI[letter]}</div>
               <div class="brick-letter-solo">${letter.toUpperCase()} ${letter}</div>`;
    }
    brick.innerHTML = inner;

    onTap(brick, () => handleBrickTap(brick, letter));
    area.appendChild(brick);
    brickEls[letter] = brick;

    setTimeout(() => brick.classList.add('show'), 100 + posIdx * 120);
  });

  area.classList.add('active');

  // Initial hint for round 1
  setTimeout(() => {
    if (cfg.hintMode === 'strong') {
      const firstBrick = brickEls[LETTERS[0]];
      if (firstBrick) firstBrick.classList.add('next-hint');
    }
  }, 700);
}

// ══════════════════════════════════════════════════════════════════
// FLY-TO-CASTLE ANIMATION
// ══════════════════════════════════════════════════════════════════
function flyToCastle(brick, tierTargetIdx) {
  return new Promise(resolve => {
    const brickRect = brick.getBoundingClientRect();
    const castle = $('castle');
    const castleRect = castle.getBoundingClientRect();

    // Target the correct tier's approximate position
    // tier 1 is at bottom, tier 5 at top
    const tierNum = tierTargetIdx + 1;
    const tierEl = $('tier' + tierNum);
    let endX, endY;
    if (tierEl) {
      const tr = tierEl.getBoundingClientRect();
      endX = tr.left + tr.width/2 - brickRect.width/2;
      endY = tr.top;
    } else {
      endX = castleRect.left + castleRect.width/2 - brickRect.width/2;
      endY = castleRect.top;
    }

    const startX = brickRect.left;
    const startY = brickRect.top;

    brick.classList.add('flying');
    brick.style.position = 'fixed';
    brick.style.left = startX + 'px';
    brick.style.top  = startY + 'px';
    brick.style.zIndex = '55';

    const duration = 350;
    const startTime = performance.now();
    let lastTrail = 0;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // Ease-in-out curve
      const ease = progress < 0.5
        ? 2 * progress * progress
        : 1 - Math.pow(-2 * progress + 2, 2) / 2;

      const curX = startX + (endX - startX) * ease;
      // Arc upward first then down to target
      const arcHeight = -70;
      const curY = startY + (endY - startY) * ease + arcHeight * Math.sin(progress * Math.PI);

      const scale = 1 - progress * 0.55;
      brick.style.left = curX + 'px';
      brick.style.top  = curY + 'px';
      brick.style.transform = `scale(${scale}) rotate(${progress * 180}deg)`;

      // Sparkle trail every ~40ms
      if (now - lastTrail > 40) {
        spawnTrail(curX + brickRect.width/2, curY + brickRect.height/2);
        lastTrail = now;
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        // Hit the castle!
        brick.style.display = 'none';
        audio.tone('thud');
        audio.tone('sparkle');
        castleDust();
        resolve();
      }
    }
    requestAnimationFrame(animate);
  });
}

// ══════════════════════════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════════════════════════
function updateHud() {
  const targetLet = LETTERS[nextTapIdx];
  if (nextTapIdx < 5) {
    $('hudFind').textContent = `Tap ${targetLet.toUpperCase()}`;
  } else {
    $('hudFind').textContent = '🏰 Built!';
  }
}

// ══════════════════════════════════════════════════════════════════
// HANDLE BRICK TAP
// ══════════════════════════════════════════════════════════════════
async function handleBrickTap(brickEl, letter) {
  if (!gameActive) return;
  clearHints();

  const targetLet = LETTERS[nextTapIdx];

  if (letter === targetLet) {
    // ✓ CORRECT
    gameActive = false;

    brickEl.classList.remove('next-hint', 'wiggle');
    brickEl.classList.add('activated');
    starBurst(brickEl);

    // Ascending chime
    audio.toneSequence(nextTapIdx);

    score++;
    $('hudScore').textContent = score;

    // Character reacts
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT), 1800);

    // Voice: speak the letter ONCE (fire-and-forget for snappy pace)
    audio.speakLetter(letter);

    // Mark progress
    markProg(nextTapIdx);

    await delay(200);

    // Fly brick to castle!
    const tierIdx = nextTapIdx; // 0=tier1(A base), 4=tier5(E peak)
    await flyToCastle(brickEl, tierIdx);

    // Lay the brick on the castle
    layBrick(tierIdx);

    await delay(180);

    nextTapIdx++;
    highlightProg(nextTapIdx);
    updateHud();

    if (nextTapIdx >= 5) {
      // All 5 bricks laid! Castle complete!
      await celebrateSequence();
    } else {
      // Highlight next brick hint (round 1 only)
      const cfg = ROUNDS[round];
      if (cfg.hintMode === 'strong') {
        const nextBrick = brickEls[LETTERS[nextTapIdx]];
        if (nextBrick) nextBrick.classList.add('next-hint');
      }
      gameActive = true;
      resetHints();
    }

  } else {
    // ✗ WRONG
    brickEl.classList.add('wrong-tap');
    audio.tone('wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1900);

    audio.play('wrong');
    // Speak the correct target letter after a beat
    setTimeout(() => audio.speakLetter(targetLet), 600);
    setTimeout(() => {
      brickEl.classList.remove('wrong-tap');
      resetHints();
    }, 480);
  }
}

// ══════════════════════════════════════════════════════════════════
// CELEBRATE SEQUENCE COMPLETION — CASTLE COMPLETE!
// ══════════════════════════════════════════════════════════════════
async function celebrateSequence() {
  $('playArea').classList.remove('timer-warning');

  // Castle celebration — flags raise, drawbridge lowers, princess waves
  completeCastle();
  audio.tone('fanfare');

  showCharBubble(pick(BUBBLE_CASTLE), 2200);
  confetti(30, ['🏰','👑','💛','✨','🌟','💖']);
  audio.play('correct'); // don't await — transition proceeds while voice plays

  markCastle(castlesBuilt);
  castlesBuilt++;

  await delay(900);
  await finishRound();
}

// ══════════════════════════════════════════════════════════════════
// ROUND TRANSITIONS
// ══════════════════════════════════════════════════════════════════
async function finishRound() {
  gameActive = false;
  clearHints();

  $('playArea').querySelectorAll('.brick').forEach(n => n.remove());
  $('playArea').classList.remove('active', 'timer-warning');

  audio.tone('roundDone');
  confetti(30, ['🏰','👑','💛','✨']);
  round++;

  if (round >= ROUNDS.length) {
    await delay(900);
    celebrateFinish();
    return;
  }

  // ── Round complete banner (snappy) ──
  $('roundTitle').textContent = '🏰 Castle Built! 🏰';
  $('roundSub').textContent   = 'Queen Ella is delighted!';
  $('roundBanner').classList.add('show');
  audio.play('round-complete'); // don't await — banner shows while voice plays
  await delay(1500);
  $('roundBanner').classList.remove('show');
  await delay(200);

  // ── Next round intro banner (snappy) ──
  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await delay(1300);
  $('roundBanner').classList.remove('show');
  await delay(150);

  startRound();
}

function startRound() {
  const cfg = ROUNDS[round];
  $('hudRound').textContent = `${round + 1}/4`;
  resetCastle();
  buildProg();
  startAttempt();
}

// ══════════════════════════════════════════════════════════════════
// START ATTEMPT (each round = 1 sequence = 1 castle)
// ══════════════════════════════════════════════════════════════════
async function startAttempt() {
  nextTapIdx = 0;
  updateHud();
  highlightProg(0);
  renderBricks();
  gameActive = true;

  audio.tone('reveal');
  await audio.speakLetter('a');

  resetHints();

  if (ROUNDS[round].timer) {
    $('playArea').classList.remove('timer-warning');
    void $('playArea').offsetWidth;
    $('playArea').classList.add('timer-warning');
  }
}

// ══════════════════════════════════════════════════════════════════
// FINAL CELEBRATION — ROYAL KINGDOM COMPLETE!
// ══════════════════════════════════════════════════════════════════
async function celebrateFinish() {
  gameActive = false;
  audio.stopMusic();
  $('hud').style.display       = 'none';
  $('progBar').style.display   = 'none';
  $('roundBanner').classList.remove('show');
  $('playArea').classList.remove('active');

  // Castle fireworks!
  castleFireworks();
  audio.tone('fanfare');
  await delay(900);

  // Hide castle/char after fireworks
  $('castleArea').style.display = 'none';
  $('charArea').style.display   = 'none';

  confetti(60, ['👸','🏰','👑','💛','✨','🌟','💖','🌸']);

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 5)));
  $('celebStars').textContent = '⭐'.repeat(stars);

  showScreen('scrCeleb');
  audio.tone('celeb');
  await delay(200);

  // Two celebration voice clips
  await audio.play('game-complete');
  await delay(400);
  confetti(50, ['👑','💛','🏰','👸','🌟']);
  await audio.play('game-complete');
}

// ══════════════════════════════════════════════════════════════════
// INIT & START
// ══════════════════════════════════════════════════════════════════
function resetGame() {
  round = 0; score = 0; castlesBuilt = 0;
  nextTapIdx = 0;
  bricksLaid = 0;
  $('hudScore').textContent = '0';

  // Reset castle pips
  for (let i = 0; i < 4; i++) {
    const pip = $('pip' + i);
    if (pip) pip.classList.remove('filled');
  }

  // Reset castle
  $('castleArea').style.display = '';
  resetCastle();
}

async function startGame() {
  audio.startMusic();

  resetGame();
  showScreen(null);

  $('hud').style.display     = '';
  $('charArea').style.display = '';

  // First round intro (snappy)
  const cfg = ROUNDS[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  audio.play('greetings'); // don't await — show banner while voice plays
  await delay(1500);
  $('roundBanner').classList.remove('show');
  await delay(200);

  startRound();
}

// ── BOOT ─────────────────────────────────────────────────────────
buildScenery();

onTap($('btnStart'), () => { audio.unlock(); startGame(); });
onTap($('btnAgain'), () => {
  showScreen(null);
  startGame();
});
</script>
</body>
