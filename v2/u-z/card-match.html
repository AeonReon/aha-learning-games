<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Match Stella's Rainbow Cards</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --pink: #fbcfe8; --peach: #fed7aa; --yellow: #fef08a;
  --mint: #bbf7d0; --sky: #bae6fd; --lavender: #c7d2fe;
  --deep-pink: #ec4899; --deep-purple: #7c3aed; --deep-pink-text: #be185d;
  --gold: #f59e0b; --white85: rgba(255,255,255,0.85);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: linear-gradient(160deg, #fbcfe8 0%, #fed7aa 20%, #fef08a 40%, #bbf7d0 60%, #bae6fd 80%, #c7d2fe 100%);
}

/* ── Puffy clouds ── */
.cloud {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  font-size: clamp(40px, 8vw, 70px);
  opacity: 0.75;
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift {
  0%   { transform: translateX(-100px); }
  100% { transform: translateX(calc(100vw + 100px)); }
}

/* ── Background sparkles & stars ── */
.bg-particle {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  font-size: clamp(12px, 2.5vw, 22px);
  opacity: 0.55;
  animation: particleFloat linear infinite;
}
@keyframes particleFloat {
  0%   { transform: translateY(105vh) translateX(0) rotate(0deg); opacity: 0; }
  8%   { opacity: 0.55; }
  50%  { transform: translateY(50vh) translateX(30px) rotate(180deg); }
  92%  { opacity: 0.55; }
  100% { transform: translateY(-60px) translateX(-20px) rotate(360deg); opacity: 0; }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title {
  background: linear-gradient(160deg, rgba(251,207,232,0.95) 0%, rgba(254,215,170,0.95) 20%, rgba(254,240,138,0.95) 40%, rgba(187,247,208,0.95) 60%, rgba(186,230,253,0.95) 80%, rgba(199,210,254,0.95) 100%);
}
.screen-title .rainbow-icon {
  font-size: clamp(60px, 15vw, 100px);
  animation: rainbowFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(236,72,153,0.5));
}
@keyframes rainbowFloat { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-12px) rotate(3deg)} }
.screen-title .unicorn-row {
  display: flex; gap: 14px; justify-content: center; align-items: center; margin-bottom: 8px;
}
.screen-title .unicorn-row span { font-size: clamp(44px, 11vw, 70px); }
.screen-title h1 {
  font-size: clamp(24px, 6vw, 44px);
  color: var(--deep-pink-text);
  text-shadow: 0 0 30px rgba(236,72,153,0.4), 2px 2px 0 rgba(255,255,255,0.7);
  margin: 6px 0 6px;
}
.screen-title p {
  font-size: clamp(13px, 3.2vw, 18px);
  color: #5b21b6;
  font-weight: bold;
  max-width: 360px; line-height: 1.45;
  text-shadow: 0 1px 2px rgba(255,255,255,0.7);
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start {
  background: linear-gradient(135deg, #ec4899, #a855f7, #3b82f6);
  margin-top: 18px;
  animation: glowBtn 2.4s ease-in-out infinite;
}
.btn-again { background: linear-gradient(135deg, #ec4899, #a855f7, #3b82f6); margin-top: 16px; }
@keyframes glowBtn { 0%,100%{filter:brightness(1); box-shadow:0 0 20px rgba(236,72,153,0.3)} 50%{filter:brightness(1.15); box-shadow:0 0 40px rgba(168,85,247,0.6)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(236,72,153,0.2);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: #7c3aed; font-weight: bold; letter-spacing: 0.05em; opacity: 0.7; }
.hud-val   { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--deep-pink); }
.hud-score .hud-val { color: var(--gold); }
.hud-target-text { color: var(--deep-purple); font-size: clamp(13px,2.8vw,18px); font-weight: 900; }

/* ── Stella character ── */
.char-area {
  position: fixed; bottom: 58px; left: 10px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji { font-size: clamp(40px,9vw,60px); filter: drop-shadow(0 2px 8px rgba(236,72,153,0.4)); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.97); color: var(--deep-pink-text);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(12px,2.6vw,16px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(236,72,153,0.3);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
  border: 2px solid rgba(236,72,153,0.3);
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -8px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.97);
}

/* ── Game area ── */
.game-area {
  position: fixed;
  top: 60px; left: 0; right: 0; bottom: 56px;
  z-index: var(--z-game);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: clamp(8px,2vw,16px);
  gap: clamp(10px,2.5vw,20px);
}

/* ── Target card ── */
.target-area {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.target-label {
  font-size: clamp(12px,2.8vw,16px); color: var(--deep-purple);
  font-weight: bold; letter-spacing: 0.05em;
  text-shadow: 0 1px 2px rgba(255,255,255,0.6);
}
.target-card {
  background: linear-gradient(135deg, #fce7f3, #fef3c7, #d1fae5, #dbeafe);
  border: 3px solid var(--deep-pink);
  border-radius: 18px;
  padding: clamp(12px,3vw,20px) clamp(16px,4vw,28px);
  min-width: clamp(120px,30vw,200px);
  min-height: clamp(60px,12vw,90px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  box-shadow: 0 0 25px rgba(236,72,153,0.3), 0 4px 15px rgba(0,0,0,0.1);
  animation: targetGlow 2s ease-in-out infinite;
}
@keyframes targetGlow { 0%,100%{box-shadow:0 0 20px rgba(236,72,153,0.3), 0 4px 15px rgba(0,0,0,0.1)} 50%{box-shadow:0 0 35px rgba(168,85,247,0.5), 0 4px 15px rgba(0,0,0,0.1)} }
.target-letter-big {
  font-size: clamp(44px,10vw,68px); font-weight: 900; color: var(--deep-pink-text);
  text-shadow: 0 0 15px rgba(236,72,153,0.3);
  line-height: 1;
}
.target-letter-small {
  font-size: clamp(20px,4.5vw,30px); font-weight: 900; color: var(--deep-purple);
  opacity: 0.85;
  line-height: 1;
}
.target-emoji {
  font-size: clamp(36px,9vw,56px); line-height: 1.1;
}
.target-word {
  font-size: clamp(14px,3.2vw,20px); color: var(--deep-pink-text); font-weight: bold;
}

/* ── Option cards ── */
.options-area {
  display: flex; flex-wrap: wrap;
  justify-content: center; align-items: center;
  gap: clamp(8px,2vw,14px);
}
.option-card {
  background: linear-gradient(135deg, #ffffff, #fef9ff);
  border: 3px solid var(--lavender);
  border-radius: 16px;
  padding: clamp(10px,2.5vw,18px) clamp(14px,3.5vw,24px);
  min-width: clamp(80px,22vw,130px);
  min-height: var(--tap);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(168,85,247,0.2);
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.option-card:active { transform: scale(0.94); }
.option-card:hover { border-color: var(--deep-pink); }
.option-letter-big {
  font-size: clamp(32px,8vw,50px); font-weight: 900; color: var(--deep-purple);
  line-height: 1;
}
.option-letter-small {
  font-size: clamp(16px,3.8vw,24px); font-weight: 900; color: var(--deep-pink);
  opacity: 0.85;
  line-height: 1;
}
.option-emoji {
  font-size: clamp(28px,7vw,44px); line-height: 1.1;
}
.option-word {
  font-size: clamp(12px,2.8vw,17px); color: var(--deep-pink-text); font-weight: bold;
}

/* ── Card correct/wrong states ── */
.option-card.correct-flash {
  border-color: #10b981 !important;
  background: linear-gradient(135deg, #bbf7d0, #a7f3d0) !important;
  box-shadow: 0 0 25px rgba(16,185,129,0.7) !important;
  animation: correctPulse 0.5s ease-out;
}
.option-card.wrong-shake {
  animation: shakeCard 0.5s ease-out;
  border-color: #f43f5e !important;
  box-shadow: 0 0 20px rgba(244,63,94,0.5) !important;
}
@keyframes correctPulse { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
@keyframes shakeCard { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }

/* ── Rainbow Arc achievement ── */
.rainbow-arc {
  position: fixed; top: 60px; right: 8px;
  z-index: var(--z-ui);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  pointer-events: none;
}
.rainbow-arc-icon { font-size: clamp(28px,6vw,40px); }
.rainbow-arc-canvas {
  width: clamp(70px,16vw,100px);
  height: clamp(40px,9vw,55px);
  position: relative;
}
.rainbow-stripe {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform-origin: bottom center;
  width: 2px;
  height: 0;
  border-radius: 2px;
  background: rgba(255,255,255,0.25);
  transition: all 0.5s;
}
.rainbow-stripe.filled {
  animation: stripeGrow 0.6s ease-out forwards;
}
@keyframes stripeGrow {
  0%   { transform: translateX(-50%) rotate(var(--angle)) scaleY(0); opacity: 0; }
  60%  { transform: translateX(-50%) rotate(var(--angle)) scaleY(1.15); opacity: 1; }
  100% { transform: translateX(-50%) rotate(var(--angle)) scaleY(1); opacity: 1; }
}
.rainbow-arc.glow .rainbow-arc-icon {
  animation: rainbowGlowPulse 1s ease-in-out 3;
}
@keyframes rainbowGlowPulse { 0%,100%{filter:drop-shadow(0 0 5px rgba(236,72,153,0.3))} 50%{filter:drop-shadow(0 0 25px rgba(168,85,247,0.9))} }
.rainbow-arc.grand-open .rainbow-arc-icon {
  animation: rainbowGrand 1.5s ease-in-out;
}
@keyframes rainbowGrand { 0%{transform:scale(1) rotate(0)} 30%{transform:scale(1.5) rotate(-10deg)} 60%{transform:scale(1.8) rotate(10deg)} 100%{transform:scale(1.3) rotate(0)} }

/* ── Stella fly-across ── */
.stella-fly {
  position: fixed;
  top: 35%;
  left: -100px;
  z-index: calc(var(--z-celeb) + 10);
  font-size: clamp(60px,14vw,100px);
  pointer-events: none;
  opacity: 0;
}
.stella-fly.go {
  animation: stellaFly 3.5s ease-in-out forwards;
}
@keyframes stellaFly {
  0%   { left: -100px; top: 45%; opacity: 0; transform: rotate(-5deg); }
  10%  { opacity: 1; }
  50%  { left: 50%; top: 25%; transform: translateX(-50%) rotate(8deg); }
  90%  { opacity: 1; }
  100% { left: calc(100vw + 100px); top: 40%; opacity: 0; transform: rotate(-5deg); }
}
.sparkle-trail {
  position: fixed; pointer-events: none;
  z-index: calc(var(--z-celeb) + 9);
  font-size: clamp(16px,3.5vw,26px);
  opacity: 0;
  animation: trailFade 1.5s ease-out forwards;
}
@keyframes trailFade {
  0%   { opacity: 1; transform: scale(0.4); }
  40%  { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(0.6) translateY(20px); }
}

/* ── Progress bar ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(4px,1.2vw,8px); flex-wrap: wrap;
  padding: 5px 10px 8px;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(28px,5.5vw,38px);
  height: clamp(28px,5.5vw,38px);
  border-radius: 50%;
  background: rgba(168,85,247,0.1);
  border: 2px solid rgba(168,85,247,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(11px,2.2vw,15px); font-weight: 900;
  color: rgba(124,58,237,0.5);
  text-transform: uppercase;
}
.prog-dot.done {
  background: linear-gradient(135deg, #ec4899, #a855f7);
  border-color: #fbbf24; color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* ── Round banner ── */
.round-banner {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(255,255,255,0.96); backdrop-filter: blur(12px);
  border: 3px solid var(--deep-pink); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
  box-shadow: 0 10px 40px rgba(236,72,153,0.3);
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--deep-pink-text); text-shadow: 1px 1px 0 rgba(255,255,255,0.7);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: var(--deep-purple); margin-top: 5px; font-weight: bold;
}

/* ── Celebration screen ── */
.screen-celeb {
  background: linear-gradient(160deg, rgba(251,207,232,0.96) 0%, rgba(254,215,170,0.96) 20%, rgba(254,240,138,0.96) 40%, rgba(187,247,208,0.96) 60%, rgba(186,230,253,0.96) 80%, rgba(199,210,254,0.96) 100%);
  backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(26px,6.5vw,48px); color: var(--deep-pink-text);
  text-shadow: 3px 3px 0 rgba(255,255,255,0.7);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(14px,3.5vw,22px); color: var(--deep-purple); margin: 6px 0; font-weight: bold; text-shadow: 0 1px 2px rgba(255,255,255,0.6); }
.celeb-stars   { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-stella  { font-size: clamp(60px,15vw,100px); animation: dance 1s ease-in-out infinite; margin-bottom: 10px; filter: drop-shadow(0 4px 12px rgba(236,72,153,0.5)); }
.celeb-rainbow { font-size: clamp(50px,12vw,80px); animation: rainbowGrand 2s ease-in-out infinite; margin-bottom: 10px; }

/* ── Hint styles ── */
.hint-wiggle { animation: wiggle 0.5s ease-in-out 3 !important; }
.hint-glow   { box-shadow: 0 0 25px rgba(251,191,36,0.9), 0 0 50px rgba(236,72,153,0.5) !important; }

/* ── Particles ── */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }
.sparkle   { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+3); font-size:16px; animation:starpop 1s ease-out forwards; }

/* ── Keyframes ── */
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes dance       { 0%,100%{transform:translateY(0) rotate(0) scale(1)} 15%{transform:translateY(-18px) rotate(-8deg) scale(1.08)} 30%{transform:translateY(0) rotate(8deg)} 45%{transform:translateY(-12px) rotate(-5deg) scale(1.05)} 60%{transform:translateY(0) rotate(5deg)} 75%{transform:translateY(-8px) rotate(-3deg) scale(1.08)} }
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-22px) scale(1.08)} 70%{transform:translateY(-8px) scale(1.03)} }
@keyframes wiggle      { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-6deg) scale(1.05)} 75%{transform:rotate(6deg) scale(1.05)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }
</style>
</head>
<body>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <span class="hud-label">ROUND</span>
    <span class="hud-val" id="hudRound">1/4</span>
  </div>
  <div class="hud-center">
    <span class="hud-target-text" id="hudTarget">Match the rainbow card!</span>
  </div>
  <div class="hud-right hud-score">
    <span class="hud-label">STARS</span>
    <span class="hud-val" id="hudScore">0</span>
  </div>
</div>

<!-- Rainbow Arc Achievement -->
<div class="rainbow-arc" id="rainbowArc" style="display:none">
  <div class="rainbow-arc-icon">🌈</div>
  <div class="rainbow-arc-canvas" id="rainbowCanvas"></div>
</div>

<!-- Game Area -->
<div class="game-area" id="gameArea" style="display:none">
  <div class="target-area" id="targetArea">
    <div class="target-label">MATCH THIS CARD</div>
    <div class="target-card" id="targetCard"></div>
  </div>
  <div class="options-area" id="optionsArea"></div>
</div>

<!-- Stella character -->
<div class="char-area" id="charArea" style="display:none">
  <div class="char-bubble" id="charBubble"></div>
  <div class="char-emoji" id="charEmoji">🦄</div>
</div>

<!-- Progress bar -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- Round banner -->
<div class="round-banner" id="roundBanner">
  <h2 id="roundTitle"></h2>
  <p id="roundSub"></p>
</div>

<!-- Stella fly-across for full rainbow -->
<div class="stella-fly" id="stellaFly">🦄</div>

<!-- ═══ TITLE SCREEN ═══ -->
<div class="screen screen-title active" id="scrTitle">
  <div class="unicorn-row">
    <span>🌈</span>
    <span>🦄</span>
    <span>✨</span>
  </div>
  <div class="rainbow-icon">🌈</div>
  <h1>Match Stella's Rainbow Cards</h1>
  <p>Stella the rainbow unicorn has sparkly letter cards! Help her match each letter U to Z! ✨</p>
  <button class="btn btn-start" id="btnStart">Start the Magic! 🦄</button>
</div>

<!-- ═══ CELEBRATION SCREEN ═══ -->
<div class="screen screen-celeb" id="scrCeleb">
  <div class="celeb-stella">🦄</div>
  <div class="celeb-rainbow">🌈</div>
  <h2 id="celebTitle">✨ Rainbow Bright! ✨</h2>
  <p id="celebMsg">Stella's rainbow is complete!</p>
  <div class="celeb-stars" id="celebStars"></div>
  <button class="btn btn-again" id="btnAgain">Play Again! 🦄</button>

// AUDIO CLASS (AudioContext-first for iOS)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.055; this.sfxVol = 0.3; this.musicDucked = 0.015;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Dreamy pentatonic — sparkly bright notes
    const notes = [523.25, 587.33, 659.25, 783.99, 880, 1046.5, 1174.66];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.5 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.7 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.11, this.ctx.currentTime + 0.2);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.3);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.5);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 850 + Math.random() * 1300);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.1,0.25); p(554.37,t+0.08,0.12,0.3); p(659.25,t+0.16,0.15,0.35); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='flip')     { p(600,t,0.06,0.15); p(800,t+0.03,0.08,0.12); }
    else if (type==='pop')      { p(800,t,0.05,0.2); p(1200,t+0.03,0.06,0.15); }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(l)   { return this.speak(`${AUDIO_BASE}/letters/${l}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ══════════════════════════════════════════════════════════════════
function buildRainbowArc() {
  const canvas = $('rainbowCanvas');
  canvas.innerHTML = '';
  // 24 stripes distributed across a 180-degree arc (from -80 to +80 deg roughly)
  const totalStripeCount = 24;
  const startAngle = -78; const endAngle = 78;
  const step = (endAngle - startAngle) / (totalStripeCount - 1);
  for (let i = 0; i < totalStripeCount; i++) {
    const s = document.createElement('div');
    s.className = 'rainbow-stripe';
    s.id = 'stripe' + i;
    const angle = startAngle + step * i;
    s.style.setProperty('--angle', angle + 'deg');
    s.style.transform = `translateX(-50%) rotate(${angle}deg) scaleY(0)`;
    // Each stripe grows to canvas-height minus small margin
    s.style.height = '100%';
    canvas.appendChild(s);
  }
}

function addRainbowStripe(cardEl) {

    stripe.style.width = '3px';
    stripe.classList.add('filled');

  }
  totalStripes++;
}

    big.className = 'target-letter-big';
    big.textContent = l.toUpperCase() + l;
    const emo = document.createElement('div'); emo.className = 'target-emoji'; emo.textContent = LETTER_EMOJI[l];
    const wrd = document.createElement('div'); wrd.className = 'target-word'; wrd.textContent = LETTER_WORDS[l];
    card.append(big, emo, wrd);
  } else if (roundIdx === 1) {
    // Round 2: UPPERCASE + lowercase (no emoji/word)
    const big = document.createElement('div');
    big.className = 'target-letter-big';
    big.textContent = l.toUpperCase() + l;
    card.append(big);
  } else if (roundIdx === 2) {
    // Round 3: lowercase (big) + small UPPERCASE underneath
    const big = document.createElement('div');
    big.className = 'target-letter-big';
    big.textContent = l; // lowercase big
    const small = document.createElement('div');
    small.className = 'target-letter-small';
    small.textContent = l.toUpperCase();
    card.append(big, small);
  } else if (roundIdx === 3) {
    // Round 4: PICTURE (large emoji) + word (both cases visible via word + target)
    const emo = document.createElement('div');
    emo.className = 'target-emoji';
    emo.style.fontSize = 'clamp(48px,12vw,80px)';
    emo.textContent = LETTER_EMOJI[l];
    const wrd = document.createElement('div'); wrd.className = 'target-word'; wrd.textContent = LETTER_WORDS[l];
    card.append(emo, wrd);
  }
}

// ══════════════════════════════════════════════════════════════════
// BUILD OPTION CARDS — varies by round. Both cases always visible on every card.
// ══════════════════════════════════════════════════════════════════
function buildOptionCards(targetLetter, roundIdx, numChoices) {
  const area = $('optionsArea');
  area.innerHTML = '';

  // Build distractors from the 6 letters
  let available = LETTERS.filter(l => l !== targetLetter);
  shuffle(available);
  let options = [targetLetter, ...available.slice(0, numChoices - 1)];
  shuffle(options);

  options.forEach(l => {
    const card = document.createElement('div');
    card.className = 'option-card';
    card.dataset.letter = l;

    if (roundIdx === 0) {
      // Round 1: UPPERCASE+lowercase + emoji + word
      const big = document.createElement('div');
      big.className = 'option-letter-big';
      big.textContent = l.toUpperCase() + l;
      const emo = document.createElement('div'); emo.className = 'option-emoji'; emo.textContent = LETTER_EMOJI[l];
      const wrd = document.createElement('div'); wrd.className = 'option-word'; wrd.textContent = LETTER_WORDS[l];
      card.append(big, emo, wrd);
    } else if (roundIdx === 1) {
      // Round 2: UPPERCASE + lowercase (both visible)
      const big = document.createElement('div');
      big.className = 'option-letter-big';
      big.textContent = l.toUpperCase() + l;
      card.append(big);
    } else if (roundIdx === 2) {
      // Round 3: UPPERCASE (big) + small lowercase (both visible)
      const big = document.createElement('div');
      big.className = 'option-letter-big';
      big.textContent = l.toUpperCase();
      const small = document.createElement('div');
      small.className = 'option-letter-small';
      small.textContent = l;
      card.append(big, small);
    } else if (roundIdx === 3) {
      // Round 4: UPPERCASE + lowercase (both cases visible)
      const big = document.createElement('div');
      big.className = 'option-letter-big';
      big.textContent = l.toUpperCase() + l;
      card.append(big);
    }

    onTap(card, () => handleOptionTap(card, l));
    area.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════════
// HANDLE TAP ON OPTION
// ══════════════════════════════════════════════════════════════════
async function handleOptionTap(cardEl, chosenLetter) {
  if (lockBoard || !gameActive) return;
  lockBoard = true;
  stopHints();

  if (chosenLetter === currentTarget) {
    // CORRECT
    audio.tone('correct');
    cardEl.classList.add('correct-flash');
    starBurst(cardEl);
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT));
    score++;
    $('hudScore').textContent = score;

    // Speak letter (once — snappy pacing, non-blocking)
    audio.speakLetter(currentTarget);

    // Add a new rainbow stripe
    addRainbowStripe(cardEl);

    // Voice cheer
    await delay(220);
    audio.play('correct');

    // Mark progress
    markProg(currentTarget);

    await delay(450);

    // Next item or end round
    currentItemIndex++;
    if (currentItemIndex >= 6) {
      await endRound();
    } else {
      presentItem();
    }
  } else {
    // WRONG — don't block retry
    audio.tone('wrong');
    cardEl.classList.add('wrong-shake');
    showCharBubble(pick(BUBBLE_WRONG));
    totalErrors++;

    audio.play('wrong');
    setTimeout(() => { if (!lockBoard) audio.speakLetter(currentTarget); }, 500);

    setTimeout(() => cardEl.classList.remove('wrong-shake'), 500);
    lockBoard = false;
    resetHints();
  }
}

// ══════════════════════════════════════════════════════════════════
// PRESENT A SINGLE ITEM
// ══════════════════════════════════════════════════════════════════
async function presentItem() {
  lockBoard = true;
  currentTarget = roundLetters[currentItemIndex];
  const rnd = ROUNDS[round];

  // Build target and options
  buildTargetCard(currentTarget, round);
  buildOptionCards(currentTarget, round, rnd.choices);

  // Update HUD
  $('hudTarget').textContent = `Find ${currentTarget.toUpperCase()}${currentTarget} ${LETTER_EMOJI[currentTarget]}`;

  // Speak the letter once — quickly, non-blocking
  audio.tone('reveal');
  audio.speakLetter(currentTarget);
  await delay(250);

  lockBoard = false;
  resetHints();
}

// ══════════════════════════════════════════════════════════════════
// END ROUND
// ══════════════════════════════════════════════════════════════════
async function endRound() {
  lockBoard = true;
  gameActive = false;
  stopHints();

  // Rainbow glows
  glowRainbow();
  audio.tone('roundDone');
  confetti(30);

  await delay(500);
  await audio.play('round-complete');

  round++;
  if (round >= 4) {
    await endGame();
  } else {
    // Show round banner
    await showRoundBanner();
    await startRound();
  }
}

// ══════════════════════════════════════════════════════════════════
// SHOW ROUND BANNER
// ══════════════════════════════════════════════════════════════════
async function showRoundBanner() {
  const rnd = ROUNDS[round];
  $('roundTitle').textContent = rnd.label;
  $('roundSub').textContent = rnd.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await delay(2200);
  $('roundBanner').classList.remove('show');
  await delay(400);
}

// ══════════════════════════════════════════════════════════════════
// START ROUND
// ══════════════════════════════════════════════════════════════════
async function startRound() {
  currentItemIndex = 0;
  roundLetters = shuffle([...LETTERS]);
  resetProg();

  $('hudRound').textContent = (round+1) + '/4';
  gameActive = true;

  await presentItem();
}

// ══════════════════════════════════════════════════════════════════
// END GAME — celebration with Stella fly-across
// ══════════════════════════════════════════════════════════════════
async function endGame() {
  gameActive = false;
  lockBoard = true;
  stopHints();
  audio.stopMusic();

  // Grand open rainbow
  grandOpenRainbow();

  await delay(500);
  audio.tone('celeb');
  confetti(55);

  // Stella flies across with sparkle trail (full rainbow achievement)
  stellaFlyAcross();

  await delay(1800);

  // Star rating
  const stars = totalErrors <= 2 ? 3 : totalErrors <= 5 ? 2 : 1;
  $('celebStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  $('celebTitle').textContent = stars === 3 ? '✨ Rainbow Bright! ✨' : stars === 2 ? '🌈 Magical Magic! 🌈' : '🦄 So Sparkly! 🦄';
  $('celebMsg').textContent = `You filled ${totalStripes} rainbow stripes!`;

  // Hide game UI
  $('hud').style.display = 'none';
  $('gameArea').style.display = 'none';
  $('progBar').style.display = 'none';
  $('rainbowArc').style.display = 'none';

  showScreen('scrCeleb');

  // Two voice phrases + confetti waves
  await audio.play('game-complete');
  await delay(400);

  // Second wave confetti
  confetti(40);
  await audio.play('game-complete');
}

// ══════════════════════════════════════════════════════════════════
// START GAME
// ══════════════════════════════════════════════════════════════════
async function startGame() {
  showScreen(null);

  round = 0; score = 0; totalErrors = 0; totalStripes = 0;
  $('hudScore').textContent = '0';

  // Build UI
  buildRainbowArc();
  buildProg();

  // Show game elements
  $('hud').style.display = '';
  $('gameArea').style.display = '';
  $('charArea').style.display = '';
  $('rainbowArc').style.display = '';
  $('progBar').style.display = '';

  audio.startMusic();

  // Greeting
  await audio.play('greetings');
  await delay(300);

  // Show first round banner
  await showRoundBanner();

  // Start round 1
  await startRound();
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
buildScenery();

onTap($('btnStart'), () => {
  audio.unlock();
  $('btnStart').disabled = true;
  startGame();
});

onTap($('btnAgain'), () => {
  $('btnAgain').disabled = true;
  showScreen(null);
  setTimeout(() => {
    $('btnAgain').disabled = false;
    $('btnStart').disabled = false;
    startGame();
  }, 400);
});


/* ═══ AHA! PROGRESS TRACKING ═══ */
(function(){
  function getKey(){
    var parts = location.pathname.split('/').filter(Boolean);
    var last = parts[parts.length-1] || 'index.html';
    var game = last.replace('.html','');
    var theme = parts[parts.length-2] || 'root';
    if (game === '') game = 'index';
    return theme + '/' + game;
  }
  function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } }
  function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} }
  function markAttempt(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = { attempted: true, attemptedAt: Date.now() };
    save(p);
  }
  function markComplete(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = {};
    p[k].completed = true;
    p[k].completedAt = Date.now();
    p[k].plays = (p[k].plays||0) + 1;
    save(p);
  }
  var celeb = document.getElementById('scrCeleb');
  if (celeb){
    var obs = new MutationObserver(function(){ if (celeb.classList.contains('active')) markComplete(); });
    obs.observe(celeb, { attributes: true, attributeFilter: ['class'] });
  }
  setTimeout(markAttempt, 3000);
})();
