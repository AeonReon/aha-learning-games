<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Letter Fairy Forest</title>
<style>
:root {
  --font: 'Comic Sans MS','Chalkboard SE','Marker Felt',cursive;
  --tap: 80px;
  --z-bg: 0; --z-trees: 2; --z-flies: 10; --z-char: 15; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --gold: #ffe066; --purple: #9c27b0; --dpurple: #4a148c; --pink: #f48fb1;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);overflow:hidden;height:100vh;height:100dvh;width:100vw;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;background:#0a0a2e}

/* ── Enchanted Forest Background ── */
.forest{position:fixed;inset:0;z-index:var(--z-bg);background:linear-gradient(180deg,#0d0d3b 0%,#15154d 20%,#1a1a5c 40%,#1e1250 60%,#180e3a 80%,#0f0a25 100%)}
.stars{position:fixed;inset:0;z-index:1;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
.moon{position:fixed;top:5%;right:8%;z-index:1;width:clamp(50px,10vw,80px);height:clamp(50px,10vw,80px);border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffeebb,#ffe066 60%,#ffcc00);box-shadow:0 0 40px rgba(255,224,100,0.4),0 0 80px rgba(255,224,100,0.15);pointer-events:none}

/* ── Ground & Trees ── */
.ground{position:fixed;bottom:0;left:0;right:0;height:15%;z-index:var(--z-trees);background:linear-gradient(180deg,transparent,rgba(10,20,10,0.7) 30%,#0a1a0a);pointer-events:none}
.tree{position:fixed;bottom:0;z-index:var(--z-trees);pointer-events:none;font-size:clamp(50px,12vw,90px);filter:brightness(0.4)}
.grass-blade{position:fixed;bottom:0;z-index:3;pointer-events:none;font-size:clamp(18px,4vw,28px);opacity:0.5;transform-origin:bottom center;animation:grassSway 3s ease-in-out infinite}
@keyframes grassSway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

/* ── Floating particles (magic dust) ── */
.magic-dust{position:fixed;inset:0;z-index:4;pointer-events:none}
.dust{position:absolute;border-radius:50%;animation:dustFloat linear infinite}
@keyframes dustFloat{0%{transform:translateY(0) translateX(0);opacity:0}20%{opacity:0.7}80%{opacity:0.5}100%{transform:translateY(-100vh) translateX(40px);opacity:0}}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 0.5s;opacity:0;visibility:hidden;pointer-events:none;z-index:var(--z-screen);padding:20px}
.screen.active{opacity:1;visibility:visible;pointer-events:auto}
.screen-title{background:linear-gradient(180deg,#0d0d3b,#1a1a5c,#0f0a25)}
.screen-title h1{font-size:clamp(28px,7vw,48px);color:var(--gold);text-shadow:3px 3px 0 var(--dpurple);margin:10px 0}
.screen-title p{font-size:clamp(14px,3.5vw,20px);color:#d4b8ff;max-width:440px;line-height:1.4}
.screen-title .icon-row{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:5px}
.screen-title .icon-row span{font-size:clamp(40px,10vw,70px)}

.btn{min-width:var(--tap);min-height:60px;padding:14px 40px;font-size:clamp(20px,5vw,28px);font-family:var(--font);color:#fff;border:none;border-radius:30px;cursor:pointer;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.4);transition:transform 0.1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.93)}
.btn-start{background:linear-gradient(135deg,var(--purple),#ce93d8);animation:glow 2s ease-in-out infinite;margin-top:20px}
.btn-again{background:linear-gradient(135deg,var(--purple),#ce93d8);margin-top:16px}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}

/* ── HUD ── */
.hud{position:fixed;top:0;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:2px}
.hud-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0}
.hud-label{font-size:clamp(10px,2.2vw,14px);color:rgba(255,255,255,0.5);font-weight:bold}
.hud-val{font-size:clamp(16px,3.5vw,24px);font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,0.5)}
.hud-round .hud-val{color:#d4b8ff}
.hud-score .hud-val{color:var(--gold)}
.prompt-label{font-size:clamp(10px,2.2vw,14px);color:rgba(255,255,255,0.5);font-weight:bold}
.prompt-letter{font-size:clamp(30px,7vw,48px);font-weight:900;color:var(--gold);text-shadow:2px 2px 0 rgba(0,0,0,0.5);line-height:1.1;animation:letterPop 0.4s ease-out}
@keyframes letterPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* ── Fireflies ── */
.firefly{position:fixed;z-index:var(--z-flies);cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.firefly:active{transform:scale(0.9)!important}
.firefly-body{width:clamp(75px,16vw,100px);height:clamp(75px,16vw,100px);border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(255,255,180,0.5),rgba(255,230,100,0.2) 50%,rgba(200,180,50,0.05));border:2px solid rgba(255,255,150,0.3);box-shadow:0 0 25px rgba(255,255,100,0.3),0 0 50px rgba(255,255,100,0.1);display:flex;align-items:center;justify-content:center;position:relative;animation:fireflyGlow 2s ease-in-out infinite}
@keyframes fireflyGlow{0%,100%{box-shadow:0 0 25px rgba(255,255,100,0.3),0 0 50px rgba(255,255,100,0.1)}50%{box-shadow:0 0 35px rgba(255,255,100,0.5),0 0 70px rgba(255,255,100,0.2)}}
.firefly-letter{font-size:clamp(28px,6vw,42px);font-weight:900;color:#fff;text-shadow:0 0 10px rgba(255,255,200,0.8),1px 1px 3px rgba(0,0,0,0.3);font-family:var(--font)}
.firefly.caught{pointer-events:none}
.firefly.caught .firefly-body{animation:fireflyPop 0.6s ease-out forwards}
.firefly.wrong .firefly-body{animation:fireflyShake 0.4s ease-in-out}
@keyframes fireflyPop{0%{transform:scale(1);opacity:1}30%{transform:scale(1.5);box-shadow:0 0 60px rgba(255,255,100,0.8)}100%{transform:scale(0);opacity:0}}
@keyframes fireflyShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* ── Character (fairy) ── */
.fairy{position:fixed;bottom:calc(15% + 5px);left:12px;z-index:var(--z-char);pointer-events:none}
.fairy-emoji{font-size:clamp(40px,9vw,58px);filter:drop-shadow(0 3px 8px rgba(0,0,0,0.3))}
.fairy.cheer .fairy-emoji{animation:bounce 0.5s ease-in-out}
.fbubble{position:absolute;top:-38px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);color:var(--dpurple);padding:5px 12px;border-radius:16px;font-size:clamp(11px,2.5vw,16px);font-weight:bold;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.2);opacity:0;transition:opacity 0.25s;pointer-events:none}
.fbubble.show{opacity:1}
.fbubble::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid rgba(255,255,255,0.9)}

/* ── Progress ── */
.prog-bar{position:fixed;bottom:0;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:center;align-items:center;gap:clamp(3px,1vw,7px);padding:6px 8px 8px;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);pointer-events:none;flex-wrap:wrap}
.prog-dot{width:clamp(24px,4vw,34px);height:clamp(24px,4vw,34px);border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:clamp(9px,1.8vw,13px);font-weight:900;color:rgba(255,255,255,0.3);font-family:var(--font);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.prog-dot.done{background:linear-gradient(135deg,var(--purple),#ce93d8);border-color:#fff;color:#fff;transform:scale(1.1)}

/* ── Round Banner ── */
.round-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:var(--z-overlay);text-align:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
.round-banner.show{opacity:1}
.round-banner h2{font-size:clamp(26px,6.5vw,44px);color:var(--gold);text-shadow:3px 3px 0 var(--dpurple);font-weight:900}
.round-banner p{font-size:clamp(14px,3vw,20px);color:rgba(255,255,255,0.7);margin-top:4px}

/* ── Celebration ── */
.screen-celeb{background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:var(--z-celeb)}
.screen-celeb h2{font-size:clamp(26px,6.5vw,46px);color:var(--gold);text-shadow:3px 3px 0 rgba(0,0,0,0.5);animation:bounce 1.5s ease-in-out infinite}
.screen-celeb p{font-size:clamp(15px,3.5vw,22px);color:rgba(255,255,255,0.9);margin:6px 0}
.celeb-stars{font-size:clamp(28px,6vw,46px);margin:10px 0;letter-spacing:4px}
.celeb-icon-row{display:flex;gap:12px;justify-content:center;margin-bottom:8px}
.celeb-icon-row span{font-size:clamp(50px,12vw,80px);animation:dance 1s ease-in-out infinite}

.confetti{position:fixed;z-index:calc(var(--z-celeb)+5);pointer-events:none;font-size:22px;animation:cfall linear forwards}
.starburst{position:fixed;pointer-events:none;z-index:calc(var(--z-celeb)+2);font-size:26px;animation:starpop 0.7s ease-out forwards}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes dance{0%,100%{transform:translateY(0) rotate(0) scale(1)}15%{transform:translateY(-18px) rotate(-8deg) scale(1.08)}30%{transform:translateY(0) rotate(8deg)}45%{transform:translateY(-12px) rotate(-5deg) scale(1.05)}60%{transform:translateY(0) rotate(5deg)}75%{transform:translateY(-8px) rotate(-3deg) scale(1.08)}}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4}}
@keyframes starpop{0%{transform:scale(0) rotate(0);opacity:1}60%{transform:scale(1.4) rotate(200deg);opacity:1}100%{transform:scale(0) rotate(360deg);opacity:0}}
</style>
</head>
<body>

<!-- Forest Background -->
<div class="forest"></div>
<div class="stars" id="stars"></div>
<div class="moon"></div>
<div class="ground"></div>
<div class="magic-dust" id="dust"></div>

<!-- Character -->
<div class="fairy" id="fairy" style="display:none">
  <div class="fbubble" id="fbubble"></div>
  <div class="fairy-emoji">🧚‍♀️</div>
</div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round"><span class="hud-label">ROUND</span><span class="hud-val" id="hudRound">1/4</span></div>
  <div class="hud-center">
    <div class="prompt-label">FIND!</div>
    <div class="prompt-letter" id="promptLetter">A</div>
  </div>
  <div class="hud-right hud-score"><span class="hud-label">STARS</span><span class="hud-val" id="hudScore">0</span></div>
</div>

<!-- Round banner -->
<div class="round-banner" id="roundBanner"><h2 id="roundTitle"></h2><p id="roundSub"></p></div>

<!-- Progress -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- TITLE SCREEN -->
<div class="screen screen-title active" id="scrTitle">
  <div class="icon-row">
    <span>✨</span>
    <span style="font-size:clamp(50px,13vw,80px)">🧚‍♀️</span>
    <span>✨</span>
  </div>
  <h1>Letter Fairy Forest</h1>
  <p>Glowing fireflies are carrying letters through the enchanted forest! Listen for the letter and tap the right firefly! ✨🧚‍♀️</p>
  <button class="btn btn-start" id="btnStart">Enter the Forest! ✨</button>
</div>

<!-- CELEBRATION SCREEN -->
<div class="screen screen-celeb" id="scrCeleb">
  <div class="celeb-icon-row">
    <span>🧚‍♀️</span>
    <span>✨</span>
    <span>🌟</span>
  </div>
  <h2 id="celebTitle">✨ Magical! ✨</h2>
  <p id="celebMsg">You found all the letters!</p>
  <div class="celeb-stars" id="celebStars"></div>
  <button class="btn btn-again" id="btnAgain">Play Again! ✨</button>
</div>

<script>
const AUDIO_BASE = '../../audio';

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.06; this.sfxVol = 0.3; this.musicDucked = 0.02;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.sfxVol; this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Magical, dreamy ambient — D major pentatonic, slower pace
    const notes = [293.66, 329.63, 369.99, 440, 493.88];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine';
      o.frequency.value = f * (Math.random() > 0.5 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.06, this.ctx.currentTime + 0.2);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 3.0);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 3.2);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 1200 + Math.random() * 1800);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol, this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4) => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if (type === 'sparkle') {
      // Magical sparkle sound
      p(880, t, 0.08, 0.2); p(1100, t+0.05, 0.1, 0.25); p(1320, t+0.1, 0.12, 0.2);
    }
    else if (type === 'correct') { p(523.25,t+0.05,0.15,0.35); p(659.25,t+0.15,0.18,0.4); p(783.99,t+0.25,0.22,0.45); }
    else if (type === 'wrong') { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type === 'celeb') { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type === 'roundDone') { p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type === 'whoosh') {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(600,t+0.12);
      g.gain.setValueAtTime(0.12,t); g.gain.linearRampToValueAtTime(0,t+0.18);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.22);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({ file, resolve }); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true; const { file, resolve } = this.voiceQueue.shift(); this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) { return new Promise((resolve) => { const a = new window.Audio(path); a.onended = resolve; a.onerror = () => resolve(); a.play().catch(() => resolve()); }); }
  speakLetter(l) { return this.speak(`${AUDIO_BASE}/letters/${l.toLowerCase()}.mp3`); }
  speakLetterSound(l) { return this.speak(`${AUDIO_BASE}/letters/${l.toLowerCase()}_sound.mp3`); }
  speakPhrase(name) { return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue() { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const CHEERS = ['amazing','wonderful','brilliant','fantastic','you_got_it','super','awesome','great_job','incredible'];

function confetti(count = 40, extra = []) {
  const all = ['✨','🌟','⭐','💫','🧚‍♀️','💜','🦋','🌸',...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className='confetti'; el.textContent=pick(all);
    el.style.left=(Math.random()*100)+'vw'; el.style.top='-30px';
    el.style.fontSize=(16+Math.random()*14)+'px';
    el.style.animationDelay=(Math.random()*1.8)+'s';
    el.style.animationDuration=(2.5+Math.random()*2.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),6000);
  }
}
function starBurst(el) {
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<8;i++){
    const s=document.createElement('div');
    s.className='starburst'; s.textContent=pick(['✨','💫','⭐','🌟','💜']);
    s.style.left=(cx+(Math.random()-0.5)*120)+'px';
    s.style.top=(cy+(Math.random()-0.5)*120)+'px';
    s.style.animationDelay=(Math.random()*0.15)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}

// ═══════════════════════════════════════
// SCENERY
// ═══════════════════════════════════════
function buildScenery() {
  // Stars
  const sc = $('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 1 + Math.random() * 2.5;
    s.style.width = size+'px'; s.style.height = size+'px';
    s.style.left = (Math.random()*100)+'%';
    s.style.top = (Math.random()*60)+'%';
    s.style.animationDuration = (2+Math.random()*4)+'s';
    s.style.animationDelay = (-Math.random()*4)+'s';
    sc.appendChild(s);
  }

  // Trees
  const trees = ['🌲','🌳','🌲','🌳','🌲','🌳','🌲'];
  trees.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tree';
    el.textContent = t;
    el.style.left = (i * 15 + Math.random()*5) + '%';
    el.style.fontSize = (50 + Math.random()*40) + 'px';
    el.style.filter = `brightness(${0.25 + Math.random()*0.2})`;
    document.body.appendChild(el);
  });

  // Grass
  for (let i = 0; i < 10; i++) {
    const g = document.createElement('div');
    g.className = 'grass-blade';
    g.textContent = pick(['🌿','🌱','🍃']);
    g.style.left = (Math.random()*100)+'%';
    g.style.animationDelay = (-Math.random()*3)+'s';
    g.style.animationDuration = (2.5+Math.random()*2)+'s';
    document.body.appendChild(g);
  }

  // Magic dust particles
  const dc = $('dust');
  for (let i = 0; i < 15; i++) {
    const d = document.createElement('div');
    d.className = 'dust';
    const size = 2 + Math.random() * 4;
    const hue = 40 + Math.random() * 40;
    d.style.width = size+'px'; d.style.height = size+'px';
    d.style.background = `hsla(${hue}, 100%, 80%, 0.6)`;
    d.style.left = (Math.random()*100)+'%';
    d.style.bottom = (Math.random()*30)+'%';
    d.style.animationDuration = (10+Math.random()*15)+'s';
    d.style.animationDelay = (-Math.random()*10)+'s';
    dc.appendChild(d);
  }
}

// ═══════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let round = 0, score = 0;
let currentTarget = '', roundLetters = [], roundIdx = 0;
let activeFireflies = [], moveRAF = null;

const ROUNDS = [
  { label: 'Round 1 — First Light ✨', sub: 'Letters A to F', letters: 'ABCDEF'.split(''), flyCount: 4, speed: [0.3, 0.6] },
  { label: 'Round 2 — Deeper Woods 🌲', sub: 'Letters A to L', letters: 'ABCDEFGHIJKL'.split(''), flyCount: 4, speed: [0.35, 0.65] },
  { label: 'Round 3 — Moonlit Glade 🌙', sub: 'Letters A to R', letters: 'ABCDEFGHIJKLMNOPQR'.split(''), flyCount: 5, speed: [0.35, 0.7] },
  { label: 'Round 4 — Enchanted Heart 🧚‍♀️', sub: 'All 26 Letters!', letters: ALPHABET.slice(), flyCount: 5, speed: [0.4, 0.75] },
];

function roundCfg() { return ROUNDS[round]; }

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); if(id) $(id).classList.add('active'); }
function showFairyMsg(text, dur=2000) { const b=$('fbubble'); b.textContent=text; b.classList.add('show'); clearTimeout(b._t); b._t=setTimeout(()=>b.classList.remove('show'),dur); }

function buildProg() {
  const bar = $('progBar'); bar.innerHTML = ''; bar.style.display = '';
  roundCfg().letters.forEach(l => {
    const d = document.createElement('div');
    d.className = 'prog-dot'; d.id = 'prog' + l; d.textContent = l;
    bar.appendChild(d);
  });
}
function markProg(l) { const d=$('prog'+l); if(d) d.classList.add('done'); }

function updatePrompt(letter) {
  const el = $('promptLetter');
  el.textContent = letter;
  el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
}

// ═══════════════════════════════════════
// FIREFLY SPAWNING & MOVEMENT
// ═══════════════════════════════════════
function clearFireflies() {
  activeFireflies.forEach(f => f.el.remove());
  activeFireflies = [];
}

function spawnFireflySet() {
  clearFireflies();
  const cfg = roundCfg();
  const target = roundLetters[roundIdx];
  currentTarget = target;
  updatePrompt(target);

  // Build options: target + distractors
  let options = [target];
  let pool = cfg.letters.filter(l => l !== target);
  shuffle(pool);
  while (options.length < cfg.flyCount && pool.length > 0) options.push(pool.pop());
  shuffle(options);

  const W = window.innerWidth;
  const H = window.innerHeight;
  const flySize = 100;
  const padX = 20;
  const hudH = 65;
  const progH = 50;
  const usableW = W - padX * 2 - flySize;
  const usableH = H - hudH - progH - flySize;
  const laneW = usableW / options.length;

  options.forEach((letter, i) => {
    const fly = document.createElement('div');
    fly.className = 'firefly';

    const body = document.createElement('div');
    body.className = 'firefly-body';
    // Each firefly gets a slightly different glow color
    const hues = [50, 40, 60, 45, 55];
    body.style.boxShadow = `0 0 25px hsla(${hues[i % hues.length]}, 100%, 70%, 0.3), 0 0 50px hsla(${hues[i % hues.length]}, 100%, 70%, 0.1)`;

    const letterEl = document.createElement('div');
    letterEl.className = 'firefly-letter';
    letterEl.textContent = letter;
    body.appendChild(letterEl);
    fly.appendChild(body);

    // Position: spread across lanes
    const x = padX + laneW * i + Math.random() * (laneW - flySize * 0.5);
    const y = hudH + 20 + Math.random() * (usableH * 0.7);
    fly.style.left = x + 'px';
    fly.style.top = y + 'px';

    document.body.appendChild(fly);

    // Gentle floating motion
    const speedRange = cfg.speed;
    const data = {
      el: fly, letter, x, y,
      vx: (Math.random() - 0.5) * (speedRange[0] + Math.random() * (speedRange[1] - speedRange[0])),
      vy: (Math.random() - 0.5) * (speedRange[0] + Math.random() * (speedRange[1] - speedRange[0])),
      alive: true
    };

    onTap(fly, () => onFireflyTap(data));
    activeFireflies.push(data);
  });

  // Announce the letter
  audio.speakPhrase('find_the_letter').then(() => audio.speakLetter(target));
}

function moveFireflies() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const flySize = 100;
  const hudH = 65;
  const progH = 50;
  const minY = hudH + 10;
  const maxY = H - progH - flySize - 10;
  const minX = 10;
  const maxX = W - flySize - 10;

  activeFireflies.forEach(f => {
    if (!f.alive) return;

    f.x += f.vx;
    f.y += f.vy;

    // Bounce off edges gently
    if (f.x < minX) { f.x = minX; f.vx = Math.abs(f.vx); }
    if (f.x > maxX) { f.x = maxX; f.vx = -Math.abs(f.vx); }
    if (f.y < minY) { f.y = minY; f.vy = Math.abs(f.vy); }
    if (f.y > maxY) { f.y = maxY; f.vy = -Math.abs(f.vy); }

    // Slight random drift for organic feel
    f.vx += (Math.random() - 0.5) * 0.03;
    f.vy += (Math.random() - 0.5) * 0.03;

    // Clamp velocity
    const maxV = 0.8;
    f.vx = Math.max(-maxV, Math.min(maxV, f.vx));
    f.vy = Math.max(-maxV, Math.min(maxV, f.vy));

    f.el.style.left = f.x + 'px';
    f.el.style.top = f.y + 'px';
  });

  moveRAF = requestAnimationFrame(moveFireflies);
}

// ═══════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════
let inputLocked = false;

async function onFireflyTap(data) {
  if (!gameActive || inputLocked || !data.alive) return;
  inputLocked = true;

  if (data.letter === currentTarget) {
    // CORRECT!
    data.alive = false;
    data.el.classList.add('caught');
    audio.tone('sparkle');
    audio.tone('correct');
    starBurst(data.el);
    score++;
    $('hudScore').textContent = score;
    markProg(currentTarget);

    const fairy = $('fairy');
    fairy.classList.add('cheer');
    setTimeout(() => fairy.classList.remove('cheer'), 600);

    const cheer = pick(CHEERS);
    showFairyMsg(cheer.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()), 1500);
    audio.speakPhrase(cheer);

    // Say the letter name and its sound
    await delay(400);
    await audio.speakLetter(currentTarget);
    await delay(200);
    await audio.speakLetterSound(currentTarget);

    await delay(300);

    roundIdx++;
    if (roundIdx >= roundLetters.length) {
      // Round complete!
      await finishRound();
    } else {
      spawnFireflySet();
    }
  } else {
    // WRONG
    data.el.classList.add('wrong');
    audio.tone('wrong');
    setTimeout(() => data.el.classList.remove('wrong'), 400);

    showFairyMsg('Try again!', 1200);
    audio.speakPhrase('try_again');
  }

  inputLocked = false;
}

// ═══════════════════════════════════════
// ROUND / GAME FLOW
// ═══════════════════════════════════════
async function finishRound() {
  gameActive = false;
  clearFireflies();
  if (moveRAF) cancelAnimationFrame(moveRAF);
  audio.tone('roundDone');
  confetti(25);

  round++;
  if (round >= ROUNDS.length) {
    // GAME WON!
    await delay(600);
    endGame();
    return;
  }

  // Show next round banner
  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.speakPhrase('keep_going');

  await delay(2000);
  $('roundBanner').classList.remove('show');
  await delay(400);

  startRound();
}

async function startRound() {
  const cfg = roundCfg();
  $('hudRound').textContent = `${round+1}/${ROUNDS.length}`;

  // Pick letters to find this round: all letters in round
  roundLetters = shuffle(cfg.letters.slice());
  roundIdx = 0;

  buildProg();
  gameActive = true;
  spawnFireflySet();
  moveRAF = requestAnimationFrame(moveFireflies);
}

function endGame() {
  gameActive = false;
  $('hud').style.display = 'none';
  $('progBar').style.display = 'none';
  $('fairy').style.display = 'none';

  const stars = Math.min(5, Math.max(3, Math.floor(score / 8)));
  $('celebStars').textContent = '⭐'.repeat(stars);
  $('celebTitle').textContent = '✨ Magical! ✨';
  $('celebMsg').textContent = `You found ${score} letters!`;

  showScreen('scrCeleb');
  audio.tone('celeb');
  confetti(50, ['✨','🧚‍♀️','💜','🦋']);
  setTimeout(() => confetti(35), 1500);
  setTimeout(() => confetti(35), 3000);
  audio.speakPhrase('you_did_it');
}

async function startGame() {
  showScreen(null);
  audio.unlock();
  audio.startMusic();
  round = 0; score = 0;
  $('hudScore').textContent = '0';
  $('fairy').style.display = '';
  $('hud').style.display = '';

  // Show round 1 banner
  const cfg = roundCfg();
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.speakPhrase('find_the_letter');

  await delay(2000);
  $('roundBanner').classList.remove('show');
  await delay(400);

  startRound();
}

// ═══════════════════════════════════════
// TAP HANDLER
// ═══════════════════════════════════════
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click', e => { if(t)return; fn(e); });
}

// ═══════════════════════════════════════
// HINT SYSTEM
// ═══════════════════════════════════════
let hintTimer = null;
function resetHint() {
  clearTimeout(hintTimer);
  if (!gameActive) return;
  hintTimer = setTimeout(() => {
    // Wiggle the correct firefly
    const target = activeFireflies.find(f => f.alive && f.letter === currentTarget);
    if (target) {
      target.el.querySelector('.firefly-body').style.boxShadow = '0 0 40px rgba(255,255,100,0.8), 0 0 80px rgba(255,255,100,0.4)';
      target.el.style.animation = 'fireflyShake 0.5s ease-in-out 3';
      setTimeout(() => {
        target.el.querySelector('.firefly-body').style.boxShadow = '';
        target.el.style.animation = '';
      }, 1800);
      audio.speakPhrase('find_the_letter').then(() => audio.speakLetter(currentTarget));
    }
  }, 5000);
}

// Reset hint on any tap
document.addEventListener('touchstart', resetHint, {passive: true});
document.addEventListener('click', resetHint);

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
buildScenery();
onTap($('btnStart'), () => startGame());
onTap($('btnAgain'), () => startGame());

// Hint system activation
const origSpawn = spawnFireflySet;
const wrappedSpawn = function() {
  origSpawn();
  resetHint();
};
// Override - we directly call resetHint after spawn instead
</script>
</body>
</html>
