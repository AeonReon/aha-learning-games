<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ABC Pirate Treasure</title>
<style>
:root {
  --font: 'Comic Sans MS','Chalkboard SE','Marker Felt',cursive;
  --tap: 80px;
  --z-bg: 0; --z-waves: 3; --z-chests: 10; --z-char: 15; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --gold: #ffe066; --blue: #1976d2; --dblue: #0d47a1; --sand: #f5deb3;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);overflow:hidden;height:100vh;height:100dvh;width:100vw;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;background:#87ceeb}

/* ── Sky & Sea ── */
.sky{position:fixed;inset:0;z-index:var(--z-bg);background:linear-gradient(180deg,#4fc3f7 0%,#81d4fa 30%,#b3e5fc 55%,#29b6f6 56%,#0288d1 75%,#01579b 100%)}
.clouds{position:fixed;top:0;left:0;right:0;height:35%;z-index:1;pointer-events:none}
.cloud{position:absolute;font-size:clamp(30px,8vw,60px);opacity:0.7;animation:drift linear infinite}
@keyframes drift{0%{transform:translateX(-80px)}100%{transform:translateX(calc(100vw + 80px))}}
.sun{position:fixed;top:4%;left:8%;z-index:1;width:clamp(45px,9vw,70px);height:clamp(45px,9vw,70px);border-radius:50%;background:radial-gradient(circle at 40% 40%,#fff9c4,#fdd835 60%,#f9a825);box-shadow:0 0 40px rgba(255,235,59,0.5),0 0 80px rgba(255,235,59,0.2);pointer-events:none}

/* ── Beach ── */
.beach{position:fixed;bottom:0;left:0;right:0;height:22%;z-index:var(--z-waves);background:linear-gradient(180deg,#ffe0b2 0%,#ffcc80 40%,#ffb74d 100%);pointer-events:none}
.beach::before{content:'';position:absolute;top:-8px;left:0;right:0;height:16px;background:repeating-linear-gradient(90deg,transparent,transparent 20px,rgba(255,255,255,0.15) 20px,rgba(255,255,255,0.15) 40px)}
.wave-line{position:fixed;bottom:22%;left:0;right:0;height:20px;z-index:4;pointer-events:none;overflow:hidden}
.wave-line::before{content:'〰️〰️〰️〰️〰️〰️〰️〰️〰️〰️';position:absolute;white-space:nowrap;font-size:20px;color:rgba(255,255,255,0.4);animation:waveScroll 8s linear infinite}
@keyframes waveScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── Palm trees ── */
.palm{position:fixed;bottom:18%;z-index:5;pointer-events:none;font-size:clamp(50px,12vw,85px);filter:brightness(0.9)}

/* ── Beach items ── */
.beach-item{position:fixed;bottom:2%;z-index:5;pointer-events:none;font-size:clamp(20px,4vw,30px);opacity:0.6}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 0.5s;opacity:0;visibility:hidden;pointer-events:none;z-index:var(--z-screen);padding:20px}
.screen.active{opacity:1;visibility:visible;pointer-events:auto}
.screen-title{background:linear-gradient(180deg,#4fc3f7,#0288d1,#01579b)}
.screen-title h1{font-size:clamp(28px,7vw,48px);color:var(--gold);text-shadow:3px 3px 0 var(--dblue);margin:10px 0}
.screen-title p{font-size:clamp(14px,3.5vw,20px);color:#e1f5fe;max-width:440px;line-height:1.4}
.screen-title .icon-row{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:5px}
.screen-title .icon-row span{font-size:clamp(40px,10vw,70px)}

.btn{min-width:var(--tap);min-height:60px;padding:14px 40px;font-size:clamp(20px,5vw,28px);font-family:var(--font);color:#fff;border:none;border-radius:30px;cursor:pointer;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.4);transition:transform 0.1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.93)}
.btn-start{background:linear-gradient(135deg,#f57c00,#ff9800);animation:glow 2s ease-in-out infinite;margin-top:20px}
.btn-again{background:linear-gradient(135deg,#f57c00,#ff9800);margin-top:16px}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}

/* ── HUD ── */
.hud{position:fixed;top:0;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;background:rgba(0,0,0,0.2);backdrop-filter:blur(4px)}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:2px}
.hud-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0}
.hud-label{font-size:clamp(10px,2.2vw,14px);color:rgba(255,255,255,0.6);font-weight:bold}
.hud-val{font-size:clamp(16px,3.5vw,24px);font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,0.5)}
.hud-round .hud-val{color:#e1f5fe}
.hud-score .hud-val{color:var(--gold)}
.prompt-label{font-size:clamp(10px,2.2vw,14px);color:rgba(255,255,255,0.6);font-weight:bold}
.prompt-letter{font-size:clamp(30px,7vw,48px);font-weight:900;color:var(--gold);text-shadow:2px 2px 0 rgba(0,0,0,0.5);line-height:1.1;animation:letterPop 0.4s ease-out}
@keyframes letterPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* ── Treasure Chests ── */
.chest{position:fixed;z-index:var(--z-chests);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.1s}
.chest:active{transform:scale(0.9)!important}
.chest-body{width:clamp(80px,17vw,105px);height:clamp(80px,17vw,105px);border-radius:18px;background:linear-gradient(135deg,#8d6e63,#6d4c41);border:3px solid #5d4037;box-shadow:0 4px 15px rgba(0,0,0,0.3),inset 0 -4px 8px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;position:relative}
.chest-body::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;border-radius:18px 18px 0 0;background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent)}
.chest-body::after{content:'🔒';position:absolute;bottom:6px;font-size:14px;opacity:0.5}
.chest-letter{font-size:clamp(28px,6vw,42px);font-weight:900;color:var(--gold);text-shadow:1px 1px 3px rgba(0,0,0,0.4);font-family:var(--font)}
.chest.opened{pointer-events:none}
.chest.opened .chest-body{animation:chestOpen 0.6s ease-out forwards}
.chest.wrong .chest-body{animation:chestShake 0.4s ease-in-out}
@keyframes chestOpen{0%{transform:scale(1)}20%{transform:scale(1.15) rotate(-5deg)}40%{transform:scale(1.2) rotate(5deg)}60%{transform:scale(1.3);opacity:0.8}100%{transform:scale(0.8) translateY(-20px);opacity:0}}
@keyframes chestShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* Chest floating animation */
.chest{animation:chestFloat 3s ease-in-out infinite}
@keyframes chestFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}

/* ── Parrot character ── */
.parrot{position:fixed;bottom:calc(22% + 8px);right:12px;z-index:var(--z-char);pointer-events:none}
.parrot-emoji{font-size:clamp(40px,9vw,58px);filter:drop-shadow(0 3px 8px rgba(0,0,0,0.3));transform:scaleX(-1)}
.parrot.cheer .parrot-emoji{animation:bounce 0.5s ease-in-out}
.pbubble{position:absolute;top:-38px;right:50%;transform:translateX(50%);background:rgba(255,255,255,0.9);color:var(--dblue);padding:5px 12px;border-radius:16px;font-size:clamp(11px,2.5vw,16px);font-weight:bold;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.2);opacity:0;transition:opacity 0.25s;pointer-events:none}
.pbubble.show{opacity:1}
.pbubble::after{content:'';position:absolute;bottom:-6px;right:30%;border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid rgba(255,255,255,0.9)}

/* ── Progress ── */
.prog-bar{position:fixed;bottom:0;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:center;align-items:center;gap:clamp(3px,1vw,7px);padding:6px 8px 8px;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);pointer-events:none;flex-wrap:wrap}
.prog-dot{width:clamp(24px,4vw,34px);height:clamp(24px,4vw,34px);border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:clamp(9px,1.8vw,13px);font-weight:900;color:rgba(255,255,255,0.3);font-family:var(--font);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.prog-dot.done{background:linear-gradient(135deg,#f57c00,#ff9800);border-color:#fff;color:#fff;transform:scale(1.1)}

/* ── Round Banner ── */
.round-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:var(--z-overlay);text-align:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
.round-banner.show{opacity:1}
.round-banner h2{font-size:clamp(26px,6.5vw,44px);color:var(--gold);text-shadow:3px 3px 0 var(--dblue);font-weight:900}
.round-banner p{font-size:clamp(14px,3vw,20px);color:rgba(255,255,255,0.7);margin-top:4px}

/* ── Celebration ── */
.screen-celeb{background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:var(--z-celeb)}
.screen-celeb h2{font-size:clamp(26px,6.5vw,46px);color:var(--gold);text-shadow:3px 3px 0 rgba(0,0,0,0.5);animation:bounce 1.5s ease-in-out infinite}
.screen-celeb p{font-size:clamp(15px,3.5vw,22px);color:rgba(255,255,255,0.9);margin:6px 0}
.celeb-stars{font-size:clamp(28px,6vw,46px);margin:10px 0;letter-spacing:4px}
.celeb-icon-row{display:flex;gap:12px;justify-content:center;margin-bottom:8px}
.celeb-icon-row span{font-size:clamp(50px,12vw,80px);animation:dance 1s ease-in-out infinite}

.confetti{position:fixed;z-index:calc(var(--z-celeb)+5);pointer-events:none;font-size:22px;animation:cfall linear forwards}
.starburst{position:fixed;pointer-events:none;z-index:calc(var(--z-celeb)+2);font-size:26px;animation:starpop 0.7s ease-out forwards}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes dance{0%,100%{transform:translateY(0) rotate(0) scale(1)}15%{transform:translateY(-18px) rotate(-8deg) scale(1.08)}30%{transform:translateY(0) rotate(8deg)}45%{transform:translateY(-12px) rotate(-5deg) scale(1.05)}60%{transform:translateY(0) rotate(5deg)}75%{transform:translateY(-8px) rotate(-3deg) scale(1.08)}}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4}}
@keyframes starpop{0%{transform:scale(0) rotate(0);opacity:1}60%{transform:scale(1.4) rotate(200deg);opacity:1}100%{transform:scale(0) rotate(360deg);opacity:0}}

/* ── Chest slide-in from sides ── */
@keyframes slideFromLeft{0%{transform:translateX(-120vw) rotate(-10deg)}100%{transform:translateX(0) rotate(0)}}
@keyframes slideFromRight{0%{transform:translateX(120vw) rotate(10deg)}100%{transform:translateX(0) rotate(0)}}
.chest.slide-left{animation:slideFromLeft 0.6s ease-out forwards, chestFloat 3s ease-in-out 0.6s infinite}
.chest.slide-right{animation:slideFromRight 0.6s ease-out forwards, chestFloat 3s ease-in-out 0.6s infinite}

/* ── Missed chest drift away ── */
@keyframes driftAway{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(30px) scale(0.8)}}
</style>
</head>
<body>

<!-- Sky & Sea -->
<div class="sky"></div>
<div class="sun"></div>
<div class="clouds" id="clouds"></div>
<div class="beach"></div>
<div class="wave-line"></div>

<!-- Character -->
<div class="parrot" id="parrot" style="display:none">
  <div class="pbubble" id="pbubble"></div>
  <div class="parrot-emoji">🦜</div>
</div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round"><span class="hud-label">ROUND</span><span class="hud-val" id="hudRound">1/4</span></div>
  <div class="hud-center">
    <div class="prompt-label">FIND!</div>
    <div class="prompt-letter" id="promptLetter">A</div>
  </div>
  <div class="hud-right hud-score"><span class="hud-label">GOLD</span><span class="hud-val" id="hudScore">0</span></div>
</div>

<!-- Round banner -->
<div class="round-banner" id="roundBanner"><h2 id="roundTitle"></h2><p id="roundSub"></p></div>

<!-- Progress -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- TITLE SCREEN -->
<div class="screen screen-title active" id="scrTitle">
  <div class="icon-row">
    <span>🏴‍☠️</span>
    <span style="font-size:clamp(50px,13vw,80px)">🦜</span>
    <span>💰</span>
  </div>
  <h1>ABC Pirate Treasure</h1>
  <p>Ahoy! Treasure chests are washing up on shore! Listen to the parrot and tap the chest with the right letter to collect the gold! 🏴‍☠️💰</p>
  <button class="btn btn-start" id="btnStart">Set Sail! ⛵</button>
</div>

<!-- CELEBRATION SCREEN -->
<div class="screen screen-celeb" id="scrCeleb">
  <div class="celeb-icon-row">
    <span>🦜</span>
    <span>💰</span>
    <span>🏴‍☠️</span>
  </div>
  <h2 id="celebTitle">💰 Treasure! 💰</h2>
  <p id="celebMsg">You found all the treasure!</p>
  <div class="celeb-stars" id="celebStars"></div>
  <button class="btn btn-again" id="btnAgain">Play Again! ⛵</button>
</div>

<script>
const AUDIO_BASE = '../../audio';

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.06; this.sfxVol = 0.3; this.musicDucked = 0.02;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.sfxVol; this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Jaunty sea shanty feel — C major pentatonic, upbeat
    const notes = [261.63, 329.63, 392, 523.25, 659.25];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.7 ? 'triangle' : 'sine';
      o.frequency.value = f * (Math.random() > 0.6 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.07, this.ctx.currentTime + 0.1);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.8);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 600 + Math.random() * 1000);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol, this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4) => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if (type === 'coin') {
      // Coin collect sound
      p(1200, t, 0.06, 0.25); p(1500, t+0.06, 0.08, 0.3); p(1800, t+0.12, 0.1, 0.2);
    }
    else if (type === 'correct') { p(523.25,t+0.05,0.15,0.35); p(659.25,t+0.15,0.18,0.4); p(783.99,t+0.25,0.22,0.45); }
    else if (type === 'wrong') { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type === 'celeb') { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type === 'roundDone') { p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type === 'whoosh') {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(600,t+0.12);
      g.gain.setValueAtTime(0.12,t); g.gain.linearRampToValueAtTime(0,t+0.18);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.22);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type === 'miss') { p(400,t,0.15,0.12); p(350,t+0.1,0.2,0.1); }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({ file, resolve }); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true; const { file, resolve } = this.voiceQueue.shift(); this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) { return new Promise((resolve) => { const a = new window.Audio(path); a.onended = resolve; a.onerror = () => resolve(); a.play().catch(() => resolve()); }); }
  speakLetter(l) { return this.speak(`${AUDIO_BASE}/letters/${l.toLowerCase()}.mp3`); }
  speakLetterSound(l) { return this.speak(`${AUDIO_BASE}/letters/${l.toLowerCase()}_sound.mp3`); }
  speakPhrase(name) { return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue() { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const CHEERS = ['amazing','wonderful','brilliant','fantastic','you_got_it','super','awesome','great_job','incredible'];

function confetti(count = 40, extra = []) {
  const all = ['💰','⭐','✨','💎','🪙','🏴‍☠️','🦜',...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className='confetti'; el.textContent=pick(all);
    el.style.left=(Math.random()*100)+'vw'; el.style.top='-30px';
    el.style.fontSize=(16+Math.random()*14)+'px';
    el.style.animationDelay=(Math.random()*1.8)+'s';
    el.style.animationDuration=(2.5+Math.random()*2.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),6000);
  }
}
function starBurst(el) {
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<8;i++){
    const s=document.createElement('div');
    s.className='starburst'; s.textContent=pick(['💰','✨','💎','⭐','🪙']);
    s.style.left=(cx+(Math.random()-0.5)*120)+'px';
    s.style.top=(cy+(Math.random()-0.5)*120)+'px';
    s.style.animationDelay=(Math.random()*0.15)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}

function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click', e => { if(t)return; fn(e); });
}

// ═══════════════════════════════════════
// SCENERY
// ═══════════════════════════════════════
function buildScenery() {
  // Clouds
  const cc = $('clouds');
  for (let i = 0; i < 4; i++) {
    const c = document.createElement('div');
    c.className = 'cloud';
    c.textContent = '☁️';
    c.style.top = (5 + Math.random() * 20) + '%';
    c.style.animationDuration = (30 + Math.random() * 40) + 's';
    c.style.animationDelay = (-Math.random() * 30) + 's';
    c.style.fontSize = (30 + Math.random() * 30) + 'px';
    c.style.opacity = 0.5 + Math.random() * 0.3;
    cc.appendChild(c);
  }

  // Palm trees
  const palms = [{l:'3%',s:70},{l:'85%',s:60}];
  palms.forEach(p => {
    const el = document.createElement('div');
    el.className = 'palm';
    el.textContent = '🌴';
    el.style.left = p.l;
    el.style.fontSize = p.s + 'px';
    document.body.appendChild(el);
  });

  // Beach items
  const items = ['🐚','🦀','🐚','⚓','🐚'];
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'beach-item';
    el.textContent = item;
    el.style.left = (10 + i * 20 + Math.random() * 8) + '%';
    el.style.bottom = (1 + Math.random() * 5) + '%';
    document.body.appendChild(el);
  });
}

// ═══════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let round = 0, score = 0;
let currentTarget = '', roundLetters = [], roundIdx = 0;
let activeChests = [];
let missTimer = null;

const ROUNDS = [
  { label: 'Round 1 — Shallow Shore 🐚', sub: 'Letters A to F', letters: 'ABCDEF'.split(''), chestCount: 3, timeLimit: 6000 },
  { label: 'Round 2 — Coral Cove 🪸', sub: 'Letters A to L', letters: 'ABCDEFGHIJKL'.split(''), chestCount: 4, timeLimit: 5500 },
  { label: 'Round 3 — Shipwreck Bay 🚢', sub: 'Letters A to R', letters: 'ABCDEFGHIJKLMNOPQR'.split(''), chestCount: 4, timeLimit: 5000 },
  { label: 'Round 4 — Treasure Island 🏝️', sub: 'All 26 Letters!', letters: ALPHABET.slice(), chestCount: 5, timeLimit: 5000 },
];

function roundCfg() { return ROUNDS[round]; }

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); if(id) $(id).classList.add('active'); }
function showParrotMsg(text, dur=2000) { const b=$('pbubble'); b.textContent=text; b.classList.add('show'); clearTimeout(b._t); b._t=setTimeout(()=>b.classList.remove('show'),dur); }

function buildProg() {
  const bar = $('progBar'); bar.innerHTML = ''; bar.style.display = '';
  roundCfg().letters.forEach(l => {
    const d = document.createElement('div');
    d.className = 'prog-dot'; d.id = 'prog' + l; d.textContent = l;
    bar.appendChild(d);
  });
}
function markProg(l) { const d=$('prog'+l); if(d) d.classList.add('done'); }

function updatePrompt(letter) {
  const el = $('promptLetter');
  el.textContent = letter;
  el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
}

// ═══════════════════════════════════════
// CHEST SPAWNING
// ═══════════════════════════════════════
function clearChests() {
  clearTimeout(missTimer);
  activeChests.forEach(c => c.el.remove());
  activeChests = [];
}

function spawnChestSet() {
  clearChests();
  const cfg = roundCfg();
  const target = roundLetters[roundIdx];
  currentTarget = target;
  updatePrompt(target);

  // Build options: target + distractors
  let options = [target];
  let pool = cfg.letters.filter(l => l !== target);
  shuffle(pool);
  while (options.length < cfg.chestCount && pool.length > 0) options.push(pool.pop());
  shuffle(options);

  const W = window.innerWidth;
  const H = window.innerHeight;
  const chestSize = 105;
  const padX = 15;
  const hudH = 60;
  const progH = 50;
  const beachTop = H * 0.55; // Place chests in the water/beach transition area
  const usableW = W - padX * 2 - chestSize;
  const laneW = usableW / options.length;

  options.forEach((letter, i) => {
    const chest = document.createElement('div');
    chest.className = 'chest';
    const slideDir = i % 2 === 0 ? 'slide-left' : 'slide-right';
    chest.classList.add(slideDir);

    const body = document.createElement('div');
    body.className = 'chest-body';
    const letterEl = document.createElement('div');
    letterEl.className = 'chest-letter';
    letterEl.textContent = letter;
    body.appendChild(letterEl);
    chest.appendChild(body);

    // Spread across lanes
    const x = padX + laneW * i + Math.random() * Math.max(0, laneW - chestSize * 0.5);
    const y = hudH + 30 + Math.random() * (beachTop - hudH - chestSize - 40);
    chest.style.left = x + 'px';
    chest.style.top = y + 'px';
    chest.style.animationDelay = (i * 0.1) + 's, ' + (0.6 + i * 0.1) + 's';

    document.body.appendChild(chest);

    const data = { el: chest, letter, alive: true };
    onTap(chest, () => onChestTap(data));
    activeChests.push(data);
  });

  // Announce the letter
  audio.speakPhrase('find_the_letter').then(() => audio.speakLetter(target));

  // Auto-miss timer: if kid doesn't tap in time, chests drift away and respawn
  missTimer = setTimeout(() => {
    if (!gameActive) return;
    // Chests drift away
    activeChests.forEach(c => {
      if (c.alive) {
        c.alive = false;
        c.el.style.animation = 'driftAway 0.8s ease-in forwards';
        c.el.style.pointerEvents = 'none';
      }
    });
    audio.tone('miss');
    showParrotMsg("Try again, matey!", 1500);
    // Respawn same target
    setTimeout(() => spawnChestSet(), 1000);
  }, cfg.timeLimit);

  resetHint();
}

// ═══════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════
let inputLocked = false;

async function onChestTap(data) {
  if (!gameActive || inputLocked || !data.alive) return;
  inputLocked = true;

  if (data.letter === currentTarget) {
    // CORRECT!
    data.alive = false;
    data.el.classList.add('opened');
    clearTimeout(missTimer);
    audio.tone('coin');
    audio.tone('correct');
    starBurst(data.el);
    score++;
    $('hudScore').textContent = score;
    markProg(currentTarget);

    const parrot = $('parrot');
    parrot.classList.add('cheer');
    setTimeout(() => parrot.classList.remove('cheer'), 600);

    const cheer = pick(CHEERS);
    showParrotMsg(cheer.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()), 1500);
    audio.speakPhrase(cheer);

    // Say the letter name and its sound
    await delay(400);
    await audio.speakLetter(currentTarget);
    await delay(200);
    await audio.speakLetterSound(currentTarget);
    await delay(300);

    roundIdx++;
    if (roundIdx >= roundLetters.length) {
      await finishRound();
    } else {
      spawnChestSet();
    }
  } else {
    // WRONG
    data.el.classList.add('wrong');
    audio.tone('wrong');
    setTimeout(() => data.el.classList.remove('wrong'), 400);
    showParrotMsg('Not that one!', 1200);
    audio.speakPhrase('try_again');
  }

  inputLocked = false;
}

// ═══════════════════════════════════════
// ROUND / GAME FLOW
// ═══════════════════════════════════════
async function finishRound() {
  gameActive = false;
  clearChests();
  audio.tone('roundDone');
  confetti(25);

  round++;
  if (round >= ROUNDS.length) {
    await delay(600);
    endGame();
    return;
  }

  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.speakPhrase('keep_going');

  await delay(2000);
  $('roundBanner').classList.remove('show');
  await delay(400);

  startRound();
}

async function startRound() {
  const cfg = roundCfg();
  $('hudRound').textContent = `${round+1}/${ROUNDS.length}`;

  roundLetters = shuffle(cfg.letters.slice());
  roundIdx = 0;

  buildProg();
  gameActive = true;
  spawnChestSet();
}

function endGame() {
  gameActive = false;
  clearChests();
  $('hud').style.display = 'none';
  $('progBar').style.display = 'none';
  $('parrot').style.display = 'none';

  const stars = Math.min(5, Math.max(3, Math.floor(score / 8)));
  $('celebStars').textContent = '⭐'.repeat(stars);
  $('celebTitle').textContent = '💰 Treasure! 💰';
  $('celebMsg').textContent = `You collected ${score} gold!`;

  showScreen('scrCeleb');
  audio.tone('celeb');
  confetti(50, ['💰','💎','🪙']);
  setTimeout(() => confetti(35), 1500);
  setTimeout(() => confetti(35), 3000);
  audio.speakPhrase('you_did_it');
}

async function startGame() {
  showScreen(null);
  audio.unlock();
  audio.startMusic();
  round = 0; score = 0;
  $('hudScore').textContent = '0';
  $('parrot').style.display = '';
  $('hud').style.display = '';

  const cfg = roundCfg();
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.speakPhrase('lets_go');

  await delay(2000);
  $('roundBanner').classList.remove('show');
  await delay(400);

  startRound();
}

// ═══════════════════════════════════════
// HINT SYSTEM
// ═══════════════════════════════════════
let hintTimer = null;
function resetHint() {
  clearTimeout(hintTimer);
  if (!gameActive) return;
  hintTimer = setTimeout(() => {
    const target = activeChests.find(c => c.alive && c.letter === currentTarget);
    if (target) {
      target.el.querySelector('.chest-body').style.boxShadow = '0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4)';
      target.el.style.animation = 'chestShake 0.5s ease-in-out 3';
      setTimeout(() => {
        if (target.el) {
          target.el.querySelector('.chest-body').style.boxShadow = '';
          target.el.style.animation = '';
        }
      }, 1800);
      audio.speakPhrase('find_the_letter').then(() => audio.speakLetter(currentTarget));
    }
  }, 4000);
}

document.addEventListener('touchstart', resetHint, {passive: true});
document.addEventListener('click', resetHint);

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
buildScenery();
onTap($('btnStart'), () => startGame());
onTap($('btnAgain'), () => startGame());
</script>
