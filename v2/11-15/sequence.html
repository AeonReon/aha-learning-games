<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Feed the Octopus 11–15 — Marina's Ocean Adventure! 🧜‍♀️</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --deep-ocean: #031d3c; --coral: #ff6b6b; --teal: #14b8a6; --gold: #ffe066;
  --ocean-cyan: #22d3ee; --ocean-blue: #3b82f6; --ocean-purple: #a855f7;
  --white85: rgba(255,255,255,0.88);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Background — Ocean depths ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(180deg, #0891b2 0%, #0e7490 25%, #155e75 55%, #083344 85%, #031d3c 100%);
}
.bg::before {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.08) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 40%);
}
/* Light rays from surface */
.bg::after {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.04) 45%, transparent 55%),
              linear-gradient(80deg, transparent 40%, rgba(255,255,255,0.03) 55%, transparent 70%);
  animation: lightRay 9s ease-in-out infinite alternate;
}
@keyframes lightRay { 0%{opacity:0.6} 100%{opacity:1} }

.bg-element {
  position: fixed; pointer-events: none; z-index: 1;
  font-size: clamp(12px, 2.5vw, 20px);
  opacity: 0.4;
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0%   { transform: translateY(105vh) translateX(0) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.45; }
  50%  { transform: translateY(40vh) translateX(15px) rotate(180deg) scale(1); }
  92%  { opacity: 0.45; }
  100% { transform: translateY(-60px) translateX(0) rotate(360deg) scale(1.1); opacity: 0; }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title .icon-row {
  display: flex; gap: 14px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(40px, 10vw, 68px); }
.screen-title h1 {
  font-size: clamp(24px, 6vw, 42px);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(34,211,238,0.6), 2px 2px 0 rgba(0,0,0,0.4);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(13px, 3.2vw, 19px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.35);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg,#22d3ee,#0891b2); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; }
.btn-again { background: linear-gradient(135deg,#22d3ee,#0891b2); margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(3,29,60,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(34,211,238,0.25);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.5); font-weight: bold; letter-spacing: 0.05em; }
.hud-val { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--ocean-cyan); }
.hud-score .hud-val { color: var(--gold); }
.hud-center .hud-val { color: var(--ocean-cyan); font-size: clamp(13px,3vw,18px); }

/* ── Marina character (bottom-left) ── */
.char-area {
  position: fixed; bottom: 140px; left: 8px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji { font-size: clamp(44px,10vw,66px); filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.97); color: var(--deep-ocean);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(11px,2.4vw,15px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.25);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.97);
}

/* ── Play area (bottles) ── */
.play-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 200px;
  z-index: var(--z-game);
  pointer-events: none;
}
.play-area.active { pointer-events: auto; }

/* Timer background shift (round 4) */
.play-area.timer-warning { animation: timerShift 30s ease-in-out forwards; }
@keyframes timerShift {
  0%   { background: transparent; }
  50%  { background: rgba(255,140,0,0.06); }
  100% { background: rgba(255,80,80,0.08); }
}

/* ── Potion Bottles ── */
.potion-bottle {
  position: absolute;
  width: clamp(70px, 18vw, 100px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border: 3px solid rgba(255,255,255,0.4);
  box-shadow: 0 4px 20px rgba(0,0,0,0.35), inset 0 2px 10px rgba(255,255,255,0.15);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s, opacity 0.3s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  z-index: 2;
  opacity: 0; transform: scale(0.5);
  padding: 8px 4px 12px;
  border-radius: 12px 12px 22px 22px;
}
/* Bottle neck */
.potion-bottle::before {
  content: '';
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  width: 28%; height: 14px;
  background: inherit; border: 2px solid rgba(255,255,255,0.4);
  border-bottom: none; border-radius: 4px 4px 0 0;
}
/* Bottle cork — sea shell style */
.potion-bottle::after {
  content: '';
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  width: 20%; height: 8px;
  background: #d4a574; border-radius: 2px 2px 0 0;
}
.potion-bottle.show { opacity: 1; transform: scale(1); }
.potion-bottle:active { transform: scale(0.93) !important; }
.potion-bottle.r4-size {
  width: clamp(60px, 15vw, 85px);
}
.potion-bottle.r4-size .bottle-numeral { font-size: clamp(22px, 5.5vw, 34px); }

.bottle-numeral {
  font-weight: 900; color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  font-size: clamp(26px, 6.5vw, 40px);
  line-height: 1;
}
.bottle-emoji {
  font-size: clamp(16px, 4vw, 24px);
  line-height: 1; margin-top: 2px;
}
.bottle-word {
  font-size: clamp(9px, 2vw, 12px);
  font-weight: bold; color: rgba(255,255,255,0.85);
  text-transform: lowercase; line-height: 1;
  margin-top: 2px;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
.bottle-dots {
  font-size: clamp(10px, 2.5vw, 16px);
  line-height: 1.1; white-space: pre;
  text-align: center; letter-spacing: 1px;
  margin-top: 2px;
}

/* Bottle states */
.potion-bottle.activated {
  border-color: var(--gold) !important;
  box-shadow: 0 0 30px rgba(255,224,102,0.75), 0 0 60px rgba(255,224,102,0.35), 0 4px 20px rgba(0,0,0,0.3) !important;
  transform: scale(1.08) !important;
}
.potion-bottle.next-hint { animation: pulseHint 1.5s ease-in-out infinite; }
@keyframes pulseHint {
  0%,100% { box-shadow: 0 0 12px rgba(255,224,102,0.35), 0 4px 20px rgba(0,0,0,0.3); }
  50%     { box-shadow: 0 0 30px rgba(255,224,102,0.75), 0 0 50px rgba(255,224,102,0.35), 0 4px 20px rgba(0,0,0,0.3); }
}
.potion-bottle.wrong-tap { animation: wrongShake 0.45s ease-in-out; }
.potion-bottle.wiggle { animation: wiggleHint 0.6s ease-in-out; }
@keyframes wiggleHint {
  0%,100% { transform: rotate(0deg); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(8deg); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(5deg); }
}

/* Fly-to-octopus animation */
.potion-bottle.flying {
  transition: none !important;
  z-index: 50;
  pointer-events: none;
}

/* ── OCTOPUS ── */
.octopus-area {
  position: fixed;
  bottom: 14px; left: 50%; transform: translateX(-50%);
  z-index: var(--z-ui);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
}
.octopus-wrap {
  position: relative;
  width: clamp(140px, 36vw, 200px);
  height: clamp(110px, 28vw, 160px);
  display: flex; align-items: center; justify-content: center;
}
.octopus-glow {
  position: absolute; inset: -20px;
  border-radius: 50%;
  pointer-events: none;
  transition: box-shadow 0.8s, opacity 0.8s;
  opacity: 0;
}
.octopus-glow.active { opacity: 1; }
.octopus-glow.g1 { box-shadow: 0 0 30px rgba(34,211,238,0.45), 0 0 60px rgba(34,211,238,0.22); }
.octopus-glow.g2 { box-shadow: 0 0 35px rgba(168,85,247,0.5), 0 0 70px rgba(168,85,247,0.25); }
.octopus-glow.g3 { box-shadow: 0 0 40px rgba(236,72,153,0.55), 0 0 80px rgba(236,72,153,0.3); }
.octopus-glow.g4 { box-shadow: 0 0 45px rgba(250,204,21,0.6), 0 0 90px rgba(250,204,21,0.35); }
.octopus-glow.g5 {
  box-shadow: 0 0 60px rgba(255,100,180,0.55), 0 0 100px rgba(100,220,255,0.35), 0 0 140px rgba(180,120,255,0.3);
  animation: glowPulse 1s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: 0.75; }
  50%     { opacity: 1; }
}

/* CSS Octopus */
.octopus {
  position: relative;
  width: clamp(120px, 30vw, 170px);
  height: clamp(100px, 24vw, 140px);
  transition: filter 0.6s;
}
/* Head */
.octopus-head {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 80%; height: 70%;
  background: radial-gradient(ellipse at 30% 25%, #ec4899 0%, #be185d 50%, #831843 100%);
  border-radius: 50% 50% 45% 45%;
  box-shadow: inset -8px -4px 18px rgba(0,0,0,0.3), 0 6px 20px rgba(0,0,0,0.4);
  transition: background 0.8s;
}
.octopus.stage-1 .octopus-head { background: radial-gradient(ellipse at 30% 25%, #f472b6 0%, #db2777 50%, #9d174d 100%); }
.octopus.stage-2 .octopus-head { background: radial-gradient(ellipse at 30% 25%, #c084fc 0%, #9333ea 50%, #6b21a8 100%); }
.octopus.stage-3 .octopus-head { background: radial-gradient(ellipse at 30% 25%, #60a5fa 0%, #2563eb 50%, #1e3a8a 100%); }
.octopus.stage-4 .octopus-head { background: radial-gradient(ellipse at 30% 25%, #fbbf24 0%, #f59e0b 50%, #b45309 100%); }
.octopus.stage-5 .octopus-head {
  background: linear-gradient(135deg, #ec4899, #a855f7, #3b82f6, #22d3ee, #fbbf24, #ec4899);
  background-size: 300% 300%;
  animation: rainbowOcto 2s ease-in-out infinite;
}
@keyframes rainbowOcto {
  0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}
/* Eyes */
.octopus-eye {
  position: absolute;
  top: 22%;
  width: 22%; height: 28%;
  background: #fff; border-radius: 50%;
  box-shadow: inset 0 -3px 4px rgba(0,0,0,0.1);
  z-index: 2;
}
.octopus-eye.left { left: 22%; }
.octopus-eye.right { right: 22%; }
.octopus-eye::after {
  content: ''; position: absolute;
  top: 28%; left: 28%;
  width: 50%; height: 55%;
  background: #1a0a2e; border-radius: 50%;
  transition: transform 0.3s;
}
.octopus.happy .octopus-eye::after { animation: blinkEye 2.5s ease-in-out infinite; }
@keyframes blinkEye {
  0%,45%,55%,100% { transform: scaleY(1); }
  50% { transform: scaleY(0.1); }
}
.octopus-eye::before {
  content: ''; position: absolute;
  top: 18%; left: 48%;
  width: 22%; height: 22%;
  background: #fff; border-radius: 50%;
  z-index: 3;
}
/* Mouth */
.octopus-mouth {
  position: absolute;
  top: 56%; left: 50%; transform: translateX(-50%);
  width: 18%; height: 10%;
  background: #4c0519;
  border-radius: 50%;
  z-index: 2;
  transition: all 0.3s;
}
.octopus.eating .octopus-mouth {
  width: 28%; height: 22%;
  background: radial-gradient(circle, #7c2d12 0%, #4c0519 100%);
  animation: chomp 0.35s ease-in-out;
}
.octopus.very-happy .octopus-mouth {
  width: 32%; height: 14%;
  border-radius: 0 0 50% 50%;
  background: #4c0519;
}
@keyframes chomp {
  0%,100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.3, 0.6); }
}
/* Tentacles */
.octo-tent {
  position: absolute;
  bottom: 0;
  width: 14%; height: 50%;
  border-radius: 50% 50% 30% 30%;
  background: inherit;
  transform-origin: top center;
  animation: tentWave 2.5s ease-in-out infinite;
}
.octopus .octo-tent {
  background: radial-gradient(ellipse at 30% 20%, #ec4899 0%, #be185d 60%, #831843 100%);
}
.octopus.stage-1 .octo-tent { background: radial-gradient(ellipse at 30% 20%, #f472b6 0%, #db2777 60%, #9d174d 100%); }
.octopus.stage-2 .octo-tent { background: radial-gradient(ellipse at 30% 20%, #c084fc 0%, #9333ea 60%, #6b21a8 100%); }
.octopus.stage-3 .octo-tent { background: radial-gradient(ellipse at 30% 20%, #60a5fa 0%, #2563eb 60%, #1e3a8a 100%); }
.octopus.stage-4 .octo-tent { background: radial-gradient(ellipse at 30% 20%, #fbbf24 0%, #f59e0b 60%, #b45309 100%); }
.octopus.stage-5 .octo-tent {
  background: linear-gradient(135deg, #ec4899, #a855f7, #3b82f6, #22d3ee);
  background-size: 200% 200%;
  animation: tentWave 2.5s ease-in-out infinite, rainbowOcto 2s ease-in-out infinite;
}
.octopus.very-happy .octo-tent { animation-duration: 1s; }
.octo-tent.t1 { left: 4%; bottom: 5%; height: 44%; animation-delay: 0s; }
.octo-tent.t2 { left: 18%; bottom: -2%; height: 52%; animation-delay: -0.4s; }
.octo-tent.t3 { left: 32%; bottom: -6%; height: 56%; animation-delay: -0.8s; }
.octo-tent.t4 { left: 48%; bottom: -6%; height: 58%; animation-delay: -1.2s; }
.octo-tent.t5 { right: 32%; bottom: -6%; height: 56%; animation-delay: -1.6s; transform: scaleX(-1); }
.octo-tent.t6 { right: 18%; bottom: -2%; height: 52%; animation-delay: -2.0s; transform: scaleX(-1); }
.octo-tent.t7 { right: 4%; bottom: 5%; height: 44%; animation-delay: -0.2s; transform: scaleX(-1); }
@keyframes tentWave {
  0%,100% { transform: rotate(0deg) scaleX(var(--sx, 1)); }
  50% { transform: rotate(8deg) scaleX(var(--sx, 1)); }
}
.octo-tent.t5, .octo-tent.t6, .octo-tent.t7 { --sx: -1; }

/* Bubbles around octopus */
.octo-bubble {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(200,240,255,0.5) 50%, rgba(150,220,255,0.2) 100%);
  border: 1px solid rgba(255,255,255,0.3);
  pointer-events: none;
  animation: bubbleUp linear infinite;
}
@keyframes bubbleUp {
  0%   { transform: translateY(0) scale(1); opacity: 0.9; }
  50%  { opacity: 0.7; }
  100% { transform: translateY(-60px) translateX(var(--drift, 0)) scale(0.3); opacity: 0; }
}

/* Splash effect */
.splash {
  position: absolute;
  font-size: 18px;
  animation: splashPop 0.5s ease-out forwards;
  pointer-events: none; z-index: 60;
}
@keyframes splashPop {
  0%   { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-30px) scale(1.5); opacity: 0; }
}

/* Sparkle trail */
.sparkle-trail {
  position: fixed;
  font-size: 14px;
  pointer-events: none;
  z-index: 55;
  animation: trailFade 0.4s ease-out forwards;
}
@keyframes trailFade {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.3) translateY(10px); opacity: 0; }
}

/* Feeding counter (mini fish on octopus) */
.potion-counter {
  display: flex; gap: 5px; justify-content: center;
  margin-top: 6px;
}
.potion-pip {
  width: clamp(18px, 4vw, 24px);
  height: clamp(18px, 4vw, 24px);
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(10px, 2.5vw, 14px);
  transition: background 0.3s, border-color 0.3s, transform 0.3s;
}
.potion-pip.filled {
  border-color: var(--gold);
  animation: pipFill 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.potion-pip.filled:nth-child(1) { background: linear-gradient(135deg, #22d3ee, #0e7490); }
.potion-pip.filled:nth-child(2) { background: linear-gradient(135deg, #a855f7, #6b21a8); }
.potion-pip.filled:nth-child(3) { background: linear-gradient(135deg, #ec4899, #9d174d); }
.potion-pip.filled:nth-child(4) { background: linear-gradient(135deg, #fbbf24, #b45309); }
@keyframes pipFill { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.3)} 100%{transform:scale(1.1)} }

/* ── Progress bar ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: calc(var(--z-ui) + 5);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(6px,1.5vw,10px);
  padding: 4px 10px 6px;
  background: rgba(3,29,60,0.94); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(30px,6vw,40px);
  height: clamp(30px,6vw,40px);
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(13px,2.8vw,18px); font-weight: 900;
  color: rgba(255,255,255,0.28);
  transition: all 0.3s;
}
.prog-dot.current {
  border-color: var(--ocean-cyan);
  color: var(--ocean-cyan);
  box-shadow: 0 0 10px rgba(34,211,238,0.4);
}
.prog-dot.done {
  background: linear-gradient(135deg,var(--gold),#b45309);
  border-color: var(--gold); color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.1)} }

/* ── Round banner ── */
.round-banner {
  position: fixed; top: 42%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(3,29,60,0.95); backdrop-filter: blur(12px);
  border: 2px solid rgba(34,211,238,0.3); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;

<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║  Aha! — Sequence 11–15: Feed the Giant Octopus!  🐙             ║
// ║  Tap bottles in ascending order to feed Marina's octopus friend. ║
// ║  Voice A (en-US-AnaNeural) · Ocean Adventure theme              ║
// ╚══════════════════════════════════════════════════════════════════╝

const AUDIO_BASE = '../../audio';

// ── Voice A clip pools ─────────────────────────────────────────────
const VOICE_A = {
  greetings: ['voice-a/greetings/here-we-go.mp3','voice-a/greetings/lets-go.mp3','voice-a/greetings/come-on-lets-play.mp3','voice-a/greetings/are-you-ready.mp3','voice-a/greetings/this-is-going-to-be-fun.mp3'],
  correct: ['voice-a/correct/amazing.mp3','voice-a/correct/brilliant.mp3','voice-a/correct/fantastic.mp3','voice-a/correct/i-knew-you-could-do-it.mp3','voice-a/correct/incredible.mp3','voice-a/correct/perfect.mp3','voice-a/correct/superstar.mp3','voice-a/correct/thats-right.mp3','voice-a/correct/well-done.mp3','voice-a/correct/wow-look-at-you-go.mp3','voice-a/correct/yes-youre-so-clever.mp3','voice-a/correct/you-got-it.mp3','voice-a/correct/youre-on-fire.mp3'],
  wrong: ['voice-a/wrong/almost-have-another-go.mp3','voice-a/wrong/dont-worry-try-again.mp3','voice-a/wrong/keep-trying-youre-so-close.mp3','voice-a/wrong/nearly-give-it-another-go.mp3','voice-a/wrong/not-quite-you-can-do-it.mp3','voice-a/wrong/oops-not-that-one.mp3'],
  thinking: ['voice-a/thinking/have-a-good-look.mp3','voice-a/thinking/i-believe-in-you.mp3','voice-a/thinking/take-your-time.mp3','voice-a/thinking/which-one-could-it-be.mp3','voice-a/thinking/you-can-do-it-keep-looking.mp3'],
  'round-complete': ['voice-a/round-complete/brilliant-round-keep-going.mp3','voice-a/round-complete/round-complete-amazing.mp3','voice-a/round-complete/round-done-youre-doing-so-well.mp3','voice-a/round-complete/you-did-it-on-to-the-next.mp3'],
  'game-complete': ['voice-a/game-complete/what-a-fantastic-player.mp3','voice-a/game-complete/you-are-a-superstar.mp3','voice-a/game-complete/you-did-the-whole-thing.mp3','voice-a/game-complete/you-finished-so-proud.mp3','voice-a/game-complete/youre-incredible-we-did-it.mp3'],
};

// ══════════════════════════════════════════════════════════════════
// AUDIO CLASS (AudioContext-first with iOS fallback)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.08; this.sfxVol = 0.3; this.musicDucked = 0.025;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Ocean pentatonic — dreamy underwater atmosphere
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C major pentatonic
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.4 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.6 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + 0.3);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.8);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 3);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 1000 + Math.random() * 1500);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.15,0.2); p(554,t+0.1,0.18,0.25); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='bubble') {
      // Underwater bubble plop
      p(300, t, 0.08, 0.2);
      p(500, t+0.04, 0.08, 0.15);
      p(220, t+0.1, 0.14, 0.12);
    }
    else if (type==='splash') {
      // Mouth chomp / feeding sound
      p(400, t, 0.06, 0.3);
      p(250, t+0.03, 0.08, 0.2);
      p(600, t+0.06, 0.1, 0.15);
      p(180, t+0.1, 0.15, 0.1);
    }
    else if (type==='yum') {
      // Cute "yum" chime ascending
      p(523.25, t, 0.12, 0.35);
      p(659.25, t+0.1, 0.14, 0.4);
      p(880, t+0.22, 0.2, 0.45);
    }
  }
  // Ascending sequence chime — pitch rises with each bottle (0=eleven low, 4=fifteen high)
  toneSequence(idx) {
    this._init(); const t = this.ctx.currentTime;
    const freqs = [293.66, 329.63, 392.00, 440.00, 523.25]; // D E G A C ascending
    const f = freqs[Math.min(idx, freqs.length-1)];
    const p = (freq, s, d, v, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = freq;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    p(f, t, 0.25, 0.4);
    p(f * 1.5, t + 0.05, 0.2, 0.15);
    p(f * 2, t + 0.08, 0.15, 0.1, 'triangle');
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_A[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakNumber(n)   { return this.speak(`${AUDIO_BASE}/numbers/${n}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ══════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click', e => { if(t)return; fn(e); });
}

const NUMBER_WORDS = { 11:'eleven', 12:'twelve', 13:'thirteen', 14:'fourteen', 15:'fifteen' };
const NUMBERS = [11,12,13,14,15];
const OCEAN_EMOJI = { 11:'🐠', 12:'🐚', 13:'🐙', 14:'🦀', 15:'🌊' };
const OCEAN_NAME  = { 11:'fish', 12:'shell', 13:'octopus', 14:'crab', 15:'wave' };

function makeDots(n) {
  const emoji = OCEAN_EMOJI[n];
  if (n === 11) return emoji.repeat(4) + '\n' + emoji.repeat(4) + '\n' + emoji.repeat(3);
  if (n === 12) return emoji.repeat(4) + '\n' + emoji.repeat(4) + '\n' + emoji.repeat(4);
  if (n === 13) return emoji.repeat(5) + '\n' + emoji.repeat(4) + '\n' + emoji.repeat(4);
  if (n === 14) return emoji.repeat(5) + '\n' + emoji.repeat(5) + '\n' + emoji.repeat(4);
  if (n === 15) return emoji.repeat(5) + '\n' + emoji.repeat(5) + '\n' + emoji.repeat(5);
  return emoji.repeat(n);
}

const BOTTLE_COLORS = {
  11: 'linear-gradient(135deg,#0e7490,#22d3ee)',  // cyan - fish
  12: 'linear-gradient(135deg,#b45309,#fbbf24)',  // gold - shell
  13: 'linear-gradient(135deg,#6b21a8,#c084fc)',  // purple - octopus

const BUBBLE_CORRECT = ['Into the mouth! 🐙','Yummy! 💫','Bubbles everywhere! 🫧','Splendid! ✨','Marina cheers! 🧜‍♀️','Perfect catch! 🌟'];
const BUBBLE_WRONG   = ['Not that one! 🌊','Try another! ✨','Check the order! 💫','Almost! 🐚'];
const BUBBLE_FED     = ['Octopus is fed! 🐙','All gone! ✨','What a meal! 💜','So happy! 🫧'];

// ══════════════════════════════════════════════════════════════════
// VISUAL EFFECTS
// ══════════════════════════════════════════════════════════════════
function confetti(count = 40, extra = []) {
  const all = ['⭐','✨','💫','🌟','🎉','🐠','🐚','🐙','🦀','🌊','🫧', ...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti'; el.textContent = pick(all);
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top  = '-30px';
    el.style.fontSize = (16 + Math.random()*14) + 'px';
    el.style.animationDelay    = (Math.random()*1.8) + 's';
    el.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6200);
  }
}

function starBurst(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'starburst';
    s.textContent = pick(['✨','💫','⭐','🌟','🫧','🐚']);
    s.style.left = (cx + (Math.random()-0.5)*140) + 'px';
    s.style.top  = (cy + (Math.random()-0.5)*140) + 'px';
    s.style.animationDelay = (Math.random()*0.15) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function showCharBubble(text, dur = 2200) {
  const b = $('charBubble');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), dur);
}

function jumpChar() {
  const el = $('charEmoji');
  el.style.animation = '';
  void el.offsetWidth;
  el.style.animation = 'charJump 0.65s ease-out';
  setTimeout(() => { el.style.animation = ''; }, 700);
}

// Sparkle/bubble trail effect during fly animation
function spawnTrail(x, y) {
  const t = document.createElement('div');
  t.className = 'sparkle-trail';
  t.textContent = pick(['✨','💫','🫧','🫧','💧']);
  t.style.left = (x + (Math.random()-0.5)*20) + 'px';
  t.style.top  = (y + (Math.random()-0.5)*20) + 'px';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 500);
}

// Splash effect when bottle hits octopus mouth
function octopusSplash() {
  const oct = $('octopus');
  const r = oct.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const splashEmojis = ['💧','🫧','💦','✨','💜'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'splash';
    s.style.position = 'fixed';
    s.textContent = pick(splashEmojis);
    s.style.left = (cx + (Math.random()-0.5)*80) + 'px';
    s.style.top  = (cy + (Math.random()-0.5)*40) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 600);
  }
}

// Octopus eruption for final celebration
function octopusErupt() {
  const oct = $('octopus');
  const r = oct.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const emojis = ['🫧','💜','🐙','✨','💫','⭐','🌟','🎉','🐠','🐚','🦀','🌊','💙','💖'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'eruption-particle';
    p.textContent = pick(emojis);
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    p.style.fontSize = (16 + Math.random()*20) + 'px';
    p.style.setProperty('--ex', ((Math.random()-0.5)*340) + 'px');
    p.style.setProperty('--ey', (-100 - Math.random()*340) + 'px');
    p.style.animationDelay = (Math.random()*0.6) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

// ══════════════════════════════════════════════════════════════════
// OCTOPUS MANAGEMENT
// ══════════════════════════════════════════════════════════════════
let ingredientsAdded = 0; // 0-5 per sequence
let potionsBrewed = 0;    // 0-4 total

function resetOctopus() {
  ingredientsAdded = 0;
  updateOctopusState();
  clearOctopusBubbles();
}

function updateOctopusState() {
  const oct = $('octopus');
  const glow = $('octopusGlow');

  // Remove old stage classes
  for (let i = 0; i <= 5; i++) oct.classList.remove('stage-' + i);
  oct.classList.add('stage-' + ingredientsAdded);

  // Happy states
  oct.classList.remove('very-happy');
  if (ingredientsAdded >= 4) oct.classList.add('very-happy');

  // Glow
  glow.classList.remove('active','g1','g2','g3','g4','g5');
  if (ingredientsAdded > 0) {
    glow.classList.add('active', 'g' + ingredientsAdded);
  }

  // More bubbles as feeding increases
  updateOctopusBubbles();
}

function clearOctopusBubbles() {
  const wrap = document.querySelector('.octopus-wrap');
  wrap.querySelectorAll('.octo-bubble').forEach(b => b.remove());
}

function updateOctopusBubbles() {
  clearOctopusBubbles();
  const wrap = document.querySelector('.octopus-wrap');
  const count = 2 + ingredientsAdded * 3;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'octo-bubble';
    const size = 6 + Math.random() * 10;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = (Math.random() * 100) + '%';
    b.style.bottom = (Math.random() * 40) + '%';
    b.style.setProperty('--drift', ((Math.random()-0.5)*20) + 'px');
    b.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    b.style.animationDelay = (Math.random() * 2.5) + 's';
    wrap.appendChild(b);
  }
}

function octopusChomp() {
  const oct = $('octopus');
  oct.classList.add('eating');
  setTimeout(() => oct.classList.remove('eating'), 400);
}

function markPotion(idx) {
  const pip = $('pip' + idx);
  if (pip) {
    pip.classList.add('filled');
    pip.textContent = '🐙';
  }
}

// ══════════════════════════════════════════════════════════════════
// SCENERY — floating bubbles, fish, seaweed
// ══════════════════════════════════════════════════════════════════
function buildScenery() {
  const emojis = ['🫧','🐠','🐟','✨','🌊','🐚','⭐','💙','🐡','🦑'];
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'bg-element';
    el.textContent = pick(emojis);
    el.style.left              = (Math.random()*100) + 'vw';
    el.style.animationDelay    = (-Math.random()*22) + 's';
    el.style.animationDuration = (11 + Math.random()*18) + 's';
    document.body.appendChild(el);
  }
}

// ══════════════════════════════════════════════════════════════════
// ROUND CONFIG
// ══════════════════════════════════════════════════════════════════
const ROUNDS = [
  { label:'Round 1 — Feed the Octopus! 🐙', sub:'Tap bottles 11 to 15 in order! Hints will help.', display:'full',    hintMode:'strong' },
  { label:'Round 2 — Feed Again! 🧜‍♀️',        sub:'No hints this time! Remember the sequence.',     display:'full',    hintMode:'none'   },
  { label:'Round 3 — Count the Sea! 🦀',     sub:'Count the patterns to find the right order!',    display:'dots',    hintMode:'none'   },
  { label:'Round 4 — Quick Feed! 🏆',        sub:'Hurry! The octopus is getting hungry!',           display:'full',    hintMode:'none',  timer:true, smaller:true },
];

// ══════════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let round = 0, score = 0;
let nextTapIdx = 0; // index into NUMBERS array (0-4)
let bottleEls = {}; // keyed by number
let hintTimer = null, hintVoiceTimer = null;

// ══════════════════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id) $(id).classList.add('active');
}

// ══════════════════════════════════════════════════════════════════
// PROGRESS BAR — 5 bottles per sequence
// ══════════════════════════════════════════════════════════════════
function buildProg() {
  const bar = $('progBar');
  bar.innerHTML = ''; bar.style.display = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot'; d.id = 'pdot' + i;
    d.textContent = NUMBERS[i];
    bar.appendChild(d);
  }
}
function markProg(idx) {
  const d = $('pdot' + idx);
  if (d) {
    d.textContent = OCEAN_EMOJI[NUMBERS[idx]];
    d.classList.add('done');
  }
}
function highlightProg(idx) {
  for (let i = 0; i < 5; i++) {
    const d = $('pdot' + i);
    if (d) d.classList.toggle('current', i === idx);
  }
}

// ══════════════════════════════════════════════════════════════════
// HINT SYSTEM
// ══════════════════════════════════════════════════════════════════
function clearHints() { clearTimeout(hintTimer); clearTimeout(hintVoiceTimer); }
function resetHints() {
  clearHints();
  if (!gameActive) return;
  const cfg = ROUNDS[round];
  if (cfg.hintMode === 'none') return;

  hintTimer = setTimeout(() => {
    const targetNum = NUMBERS[nextTapIdx];
    const bottle = bottleEls[targetNum];
    if (bottle && gameActive) {
      bottle.classList.add('wiggle');
      audio.tone('hint');
      setTimeout(() => bottle.classList.remove('wiggle'), 700);
    }
  }, 4000);
  hintVoiceTimer = setTimeout(() => {
    if (gameActive) {
      audio.play('thinking');
      setTimeout(() => { if (gameActive) audio.speakNumber(NUMBERS[nextTapIdx]); }, 1200);
    }
  }, 7000);
}

// ══════════════════════════════════════════════════════════════════
// POSITION GENERATION — random positions with minimum spacing
// ══════════════════════════════════════════════════════════════════
function generatePositions(count, smaller) {
  const area = $('playArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const bottleW = smaller ? Math.min(Math.max(60, areaW * 0.15), 85) : Math.min(Math.max(70, areaW * 0.18), 100);
  const bottleH = bottleW * 1.3;
  const margin = bottleW * 0.5;
  const minDist = bottleW * 1.4;

  const positions = [];
  for (let i = 0; i < count; i++) {
    let tries = 0;
    let x, y;
    do {
      x = margin + Math.random() * (areaW - margin * 2 - bottleW);
      y = margin + 10 + Math.random() * (areaH - margin * 2 - bottleH);
      tries++;
      if (tries > 300) break;
    } while (positions.some(p => {
      const dx = p.x - x, dy = p.y - y;
      return Math.sqrt(dx*dx + dy*dy) < minDist;
    }));
    positions.push({ x, y });
  }
  return positions;
}

// ══════════════════════════════════════════════════════════════════
// RENDER BOTTLES
// ══════════════════════════════════════════════════════════════════
function renderBottles() {
  const area = $('playArea');
  const cfg = ROUNDS[round];

  area.querySelectorAll('.potion-bottle').forEach(n => n.remove());
  bottleEls = {};

  const positions = generatePositions(5, cfg.smaller);
  const shuffledOrder = shuffle([...Array(5).keys()]); // random placement order

  shuffledOrder.forEach((seqIdx, posIdx) => {
    const num = NUMBERS[seqIdx];
    const bottle = document.createElement('div');
    bottle.className = 'potion-bottle';
    if (cfg.smaller) bottle.classList.add('r4-size');
    bottle.style.background = BOTTLE_COLORS[num];
    bottle.style.left = positions[posIdx].x + 'px';
    bottle.style.top  = positions[posIdx].y + 'px';
    bottle.dataset.num = num;

    let inner = '';
    if (cfg.display === 'full') {
      inner = `<div class="bottle-numeral">${num}</div>
               <div class="bottle-emoji">${OCEAN_EMOJI[num]}</div>
               <div class="bottle-word">${NUMBER_WORDS[num]}</div>`;
    } else if (cfg.display === 'dots') {
      // Dots + small numeral always visible
      inner = `<div class="bottle-numeral" style="font-size:clamp(12px,3vw,16px);opacity:0.7">${num}</div>
               <div class="bottle-dots">${makeDots(num)}</div>`;
    }
    bottle.innerHTML = inner;

    onTap(bottle, () => handleBottleTap(bottle, num));
    area.appendChild(bottle);
    bottleEls[num] = bottle;

    setTimeout(() => bottle.classList.add('show'), 100 + posIdx * 120);
  });

  area.classList.add('active');

  // Initial hint for round 1
  setTimeout(() => {
    if (cfg.hintMode === 'strong') {
      const firstBottle = bottleEls[NUMBERS[0]];
      if (firstBottle) firstBottle.classList.add('next-hint');
    }
  }, 700);
}

// ══════════════════════════════════════════════════════════════════
// FLY-TO-OCTOPUS ANIMATION
// ══════════════════════════════════════════════════════════════════
function flyToOctopus(bottle) {
  return new Promise(resolve => {
    const bottleRect = bottle.getBoundingClientRect();
    const oct = $('octopus');
    const octRect = oct.getBoundingClientRect();

    const startX = bottleRect.left;
    const startY = bottleRect.top;
    // Aim for the mouth (top-center of octopus, slightly below head top)
    const endX = octRect.left + octRect.width/2 - bottleRect.width/2;
    const endY = octRect.top + octRect.height * 0.35;

    bottle.classList.add('flying');
    bottle.style.position = 'fixed';
    bottle.style.left = startX + 'px';
    bottle.style.top  = startY + 'px';
    bottle.style.zIndex = '55';

    const duration = 350; // snappy
    const startTime = performance.now();
    let lastTrail = 0;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // Ease-in curve for acceleration feel
      const ease = progress * progress;

      const curX = startX + (endX - startX) * ease;
      // Arc upward first then down into the mouth
      const arcHeight = -70;
      const curY = startY + (endY - startY) * ease + arcHeight * Math.sin(progress * Math.PI);

      const scale = 1 - progress * 0.55;
      bottle.style.left = curX + 'px';
      bottle.style.top  = curY + 'px';
      bottle.style.transform = `scale(${scale}) rotate(${progress * 360}deg)`;

      // Bubble trail every ~45ms
      if (now - lastTrail > 45) {
        spawnTrail(curX + bottleRect.width/2, curY + bottleRect.height/2);
        lastTrail = now;
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        // Hit the mouth!
        bottle.style.display = 'none';
        audio.tone('splash');
        octopusChomp();
        octopusSplash();
        resolve();
      }
    }
    requestAnimationFrame(animate);
  });
}

// ══════════════════════════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════════════════════════
function updateHud() {
  const targetNum = NUMBERS[nextTapIdx];
  if (nextTapIdx < 5) {
    $('hudFind').textContent = `Tap ${targetNum}`;
  } else {
    $('hudFind').textContent = '🐙 Fed!';
  }
}

// ══════════════════════════════════════════════════════════════════
// HANDLE BOTTLE TAP
// ══════════════════════════════════════════════════════════════════
async function handleBottleTap(bottleEl, num) {
  if (!gameActive) return;
  clearHints();

  const targetNum = NUMBERS[nextTapIdx];

  if (num === targetNum) {
    // ✓ CORRECT
    gameActive = false;

    bottleEl.classList.remove('next-hint', 'wiggle');
    bottleEl.classList.add('activated');
    starBurst(bottleEl);

    // Ascending chime
    audio.toneSequence(nextTapIdx);

    score++;
    $('hudScore').textContent = score;

    // Character reacts
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT), 1800);

    // Voice: speak the number (fire-and-forget)
    audio.speakNumber(num);

    // Mark progress
    markProg(nextTapIdx);

    await delay(200);

    // Fly bottle to octopus mouth!
    await flyToOctopus(bottleEl);

    // Update octopus state
    ingredientsAdded++;
    updateOctopusState();
    audio.tone('bubble');

    await delay(150);

    nextTapIdx++;
    highlightProg(nextTapIdx);
    updateHud();

    if (nextTapIdx >= 5) {
      // Sequence complete! Octopus fully fed!
      await celebrateSequence();
    } else {
      // Highlight next bottle hint (round 1 only)
      const cfg = ROUNDS[round];
      if (cfg.hintMode === 'strong') {
        const nextBottle = bottleEls[NUMBERS[nextTapIdx]];
        if (nextBottle) nextBottle.classList.add('next-hint');
      }
      gameActive = true;
      resetHints();
    }

  } else {
    // ✗ WRONG
    bottleEl.classList.add('wrong-tap');
    audio.tone('wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1900);

    audio.play('wrong');
    // Speak the correct target number after a beat
    setTimeout(() => audio.speakNumber(targetNum), 600);
    setTimeout(() => {
      bottleEl.classList.remove('wrong-tap');
      resetHints();
    }, 480);
  }
}

// ══════════════════════════════════════════════════════════════════
// CELEBRATE SEQUENCE COMPLETION — OCTOPUS FED!
// ══════════════════════════════════════════════════════════════════
async function celebrateSequence() {
  $('playArea').classList.remove('timer-warning');

  // Octopus celebration — rainbow color, max bubbles
  ingredientsAdded = 5;
  updateOctopusState();

  audio.tone('yum');

  // Octopus fully fed! — confetti + bubble immediately, voice in background
  showCharBubble(pick(BUBBLE_FED), 2000);
  confetti(25, ['🐙','💜','✨','🌟','🫧','🐠']);
  audio.play('correct'); // don't await — transition proceeds while voice plays

  markPotion(potionsBrewed);
  potionsBrewed++;

  await delay(600);
  await finishRound();
}

// ══════════════════════════════════════════════════════════════════
// ROUND TRANSITIONS
// ══════════════════════════════════════════════════════════════════
async function finishRound() {
  gameActive = false;
  clearHints();

  $('playArea').querySelectorAll('.potion-bottle').forEach(n => n.remove());
  $('playArea').classList.remove('active', 'timer-warning');

  audio.tone('roundDone');
  confetti(30, ['🐙','🫧','✨','🌊','🐚']);
  round++;

  if (round >= ROUNDS.length) {
    await delay(700);
    celebrateFinish();
    return;
  }

  // ── Round complete banner (snappy) ──
  $('roundTitle').textContent = '🐙 Octopus Fed! 🐙';
  $('roundSub').textContent   = 'Marina is so happy!';
  $('roundBanner').classList.add('show');
  audio.play('round-complete'); // don't await — banner shows while voice plays
  await delay(1300);
  $('roundBanner').classList.remove('show');
  await delay(180);

  // ── Next round intro banner (snappy) ──
  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await delay(1200);
  $('roundBanner').classList.remove('show');
  await delay(120);

  startRound();
}

function startRound() {
  const cfg = ROUNDS[round];
  $('hudRound').textContent = `${round + 1}/4`;
  resetOctopus();
  buildProg();
  startAttempt();
}

// ══════════════════════════════════════════════════════════════════
// START ATTEMPT (each round = 1 sequence)
// ══════════════════════════════════════════════════════════════════
async function startAttempt() {
  nextTapIdx = 0;
  updateHud();
  highlightProg(0);
  renderBottles();
  gameActive = true;

  audio.tone('reveal');
  audio.speakNumber(11); // fire-and-forget, don't await

  resetHints();

  if (ROUNDS[round].timer) {
    $('playArea').classList.remove('timer-warning');
    void $('playArea').offsetWidth;
    $('playArea').classList.add('timer-warning');
  }
}

// ══════════════════════════════════════════════════════════════════
// FINAL CELEBRATION — BABY OCTOPUS ARRIVES!
// ══════════════════════════════════════════════════════════════════
async function celebrateFinish() {
  gameActive = false;
  audio.stopMusic();
  $('hud').style.display       = 'none';
  $('progBar').style.display   = 'none';
  $('roundBanner').classList.remove('show');
  $('playArea').classList.remove('active');

  // Octopus eruption!
  octopusErupt();
  audio.tone('celeb');
  await delay(800);

  // Hide octopus after eruption
  $('octopusArea').style.display = 'none';
  $('charArea').style.display   = 'none';

  confetti(60, ['🐙','🧜‍♀️','✨','🌟','💜','🌊','🎉','🐠','🐚']);

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 5)));
  $('celebStars').textContent = '⭐'.repeat(stars);

  showScreen('scrCeleb');
  audio.tone('celeb');
  await delay(200);

  // Two celebration voice clips
  await audio.play('game-complete');
  await delay(400);
  confetti(50, ['🐙','💜','🧜‍♀️','🌟','🌊']);
  await audio.play('game-complete');
}

// ══════════════════════════════════════════════════════════════════
// INIT & START
// ══════════════════════════════════════════════════════════════════
function resetGame() {
  round = 0; score = 0; potionsBrewed = 0;
  nextTapIdx = 0;
  ingredientsAdded = 0;
  $('hudScore').textContent = '0';

  // Reset feeding pips
  for (let i = 0; i < 4; i++) {
    const pip = $('pip' + i);
    if (pip) { pip.classList.remove('filled'); pip.textContent = ''; }
  }

  // Reset octopus
  $('octopusArea').style.display = '';
  resetOctopus();
}

async function startGame() {
  audio.startMusic();

  resetGame();
  showScreen(null);

  $('hud').style.display     = '';
  $('charArea').style.display = '';

  // First round intro (snappy)
  const cfg = ROUNDS[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  audio.play('greetings'); // don't await — show banner while voice plays
  await delay(1400);
  $('roundBanner').classList.remove('show');
  await delay(180);

  startRound();
}

// ── BOOT ─────────────────────────────────────────────────────────
buildScenery();
updateOctopusBubbles();

onTap($('btnStart'), () => { audio.unlock(); startGame(); });
onTap($('btnAgain'), () => {
  showScreen(null);
  startGame();
});
</script>
