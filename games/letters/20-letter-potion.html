<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Letter Potion</title>
<style>
:root {
  --font: 'Comic Sans MS','Chalkboard SE','Marker Felt',cursive;
  --tap: 80px;
  --z-bg: 0; --z-bubbles: 10; --z-cauldron: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --gold: #ffe066; --purple: #9b59b6; --dpurple: #4a1a6b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);overflow:hidden;height:100vh;height:100dvh;width:100vw;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;background:#1a0a2e}

/* ── Background ── */
.bg{position:fixed;inset:0;z-index:var(--z-bg);background:linear-gradient(180deg,#0d0520 0%,#1a0a2e 30%,#2d1654 60%,#1a0a2e 100%)}
.bg-star{position:fixed;z-index:1;pointer-events:none;color:#fff;opacity:0;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(0.8)}50%{opacity:0.5;transform:scale(1.2)}}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 0.5s;opacity:0;visibility:hidden;pointer-events:none;z-index:var(--z-screen);padding:20px}
.screen.active{opacity:1;visibility:visible;pointer-events:auto}
.screen-title{background:linear-gradient(180deg,#0d0520,#1a0a2e,#2d1654)}
.screen-title h1{font-size:clamp(28px,7vw,48px);color:#e0b0ff;text-shadow:2px 2px 0 rgba(0,0,0,0.4),0 0 20px rgba(180,100,255,0.5);margin:10px 0}
.screen-title p{font-size:clamp(14px,3.5vw,20px);color:rgba(224,176,255,0.8);max-width:440px;line-height:1.4}
.screen-title .icon-row{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:5px}
.screen-title .icon-row span{font-size:clamp(40px,10vw,70px)}

.btn{min-width:var(--tap);min-height:60px;padding:14px 40px;font-size:clamp(20px,5vw,28px);font-family:var(--font);color:#fff;border:none;border-radius:30px;cursor:pointer;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.4);transition:transform 0.1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.93)}
.btn-start{background:linear-gradient(135deg,#9b59b6,#6c3483);animation:glow 2s ease-in-out infinite;margin-top:20px}
.btn-again{background:linear-gradient(135deg,#9b59b6,#6c3483);margin-top:16px}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}

/* ── HUD ── */
.hud{position:fixed;top:0;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;background:rgba(13,5,32,0.8);backdrop-filter:blur(4px);border-bottom:2px solid rgba(180,100,255,0.15)}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:2px}
.hud-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0}
.hud-label{font-size:clamp(10px,2.2vw,14px);color:rgba(224,176,255,0.45);font-weight:bold}
.hud-val{font-size:clamp(16px,3.5vw,24px);font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,0.5)}
.hud-round .hud-val{color:#c084fc}
.hud-score .hud-val{color:var(--gold)}
.prompt-label{font-size:clamp(10px,2.2vw,14px);color:rgba(224,176,255,0.45);font-weight:bold}
.prompt-letter{font-size:clamp(26px,6vw,40px);font-weight:900;color:var(--gold);text-shadow:2px 2px 0 rgba(0,0,0,0.5),0 0 15px rgba(255,224,102,0.4);line-height:1.1;animation:letterPop 0.4s ease-out}
@keyframes letterPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* ── Letter bubbles ── */
.lbubble{position:fixed;z-index:var(--z-bubbles);cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.lbubble:active{transform:scale(0.9)!important}
.lbubble-inner{width:clamp(70px,16vw,95px);height:clamp(70px,16vw,95px);border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(200,160,255,0.5),rgba(150,80,220,0.25) 50%,rgba(100,40,180,0.15));border:2.5px solid rgba(200,160,255,0.4);box-shadow:inset 0 -8px 20px rgba(100,0,200,0.15),0 0 25px rgba(180,100,255,0.2);display:flex;align-items:center;justify-content:center;position:relative}
.lbubble-inner::before{content:'';position:absolute;top:15%;left:20%;width:30%;height:20%;background:rgba(255,255,255,0.3);border-radius:50%;transform:rotate(-30deg)}
.lbubble-letter{font-size:clamp(26px,6vw,38px);font-weight:900;color:#fff;text-shadow:1px 1px 4px rgba(60,0,120,0.6);font-family:var(--font)}
.lbubble.popped{pointer-events:none}
.lbubble.popped .lbubble-inner{animation:pop 0.5s ease-out forwards}
.lbubble.wrong .lbubble-inner{animation:bubbleShake 0.4s ease-in-out}
@keyframes pop{0%{transform:scale(1);opacity:1}40%{transform:scale(1.4);opacity:0.8}100%{transform:scale(0);opacity:0}}
@keyframes bubbleShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* ── Cauldron ── */
.cauldron-area{position:fixed;bottom:0;left:0;right:0;z-index:var(--z-cauldron);display:flex;flex-direction:column;align-items:center;pointer-events:none}
.cauldron{font-size:clamp(60px,14vw,100px);line-height:1;margin-bottom:-5px;filter:drop-shadow(0 -5px 15px rgba(100,255,100,0.2))}
.cauldron-base{width:100%;height:30px;background:linear-gradient(180deg,rgba(45,22,84,0.8),rgba(13,5,32,0.95));border-top:2px solid rgba(180,100,255,0.1)}
.cauldron-steam{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:11;pointer-events:none}
.steam{position:absolute;width:8px;height:8px;background:rgba(180,255,180,0.3);border-radius:50%;animation:steamRise 2s ease-out infinite}
@keyframes steamRise{0%{transform:translateY(0) scale(1);opacity:0.4}100%{transform:translateY(-80px) scale(2.5);opacity:0}}

/* ── Potion meter ── */
.potion-meter{position:fixed;right:10px;bottom:90px;z-index:var(--z-ui);width:clamp(36px,7vw,48px);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px}
.potion-vial{width:100%;aspect-ratio:1/2.5;border-radius:0 0 12px 12px;border:3px solid rgba(200,160,255,0.5);position:relative;overflow:hidden;background:rgba(20,10,40,0.6)}
.potion-vial-top{width:60%;height:12px;background:rgba(200,160,255,0.4);border-radius:4px 4px 0 0;margin:0 auto;border:2px solid rgba(200,160,255,0.5);border-bottom:none;position:relative;top:3px;z-index:2}
.potion-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#a855f7,#7c3aed,#6d28d9);transition:height 0.6s cubic-bezier(0.34,1.56,0.64,1);border-radius:0 0 9px 9px}
.potion-fill.brewing{animation:brewGlow 0.6s ease-in-out}
@keyframes brewGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.6)}}
.potion-label{font-size:clamp(9px,1.8vw,12px);color:rgba(224,176,255,0.6);font-weight:bold}

/* ── Creature reveal ── */
.creature-reveal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:var(--z-overlay);font-size:clamp(80px,20vw,140px);opacity:0;pointer-events:none;transition:none}
.creature-reveal.show{opacity:1;animation:creatureAppear 1.2s ease-out}
@keyframes creatureAppear{0%{transform:translate(-50%,-50%) scale(0) rotate(-20deg);opacity:0}50%{transform:translate(-50%,-50%) scale(1.3) rotate(10deg);opacity:1}70%{transform:translate(-50%,-50%) scale(0.9) rotate(-5deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}}

/* ── Progress dots ── */
.prog-bar{position:fixed;bottom:0;left:0;right:0;z-index:var(--z-ui);display:flex;justify-content:center;align-items:center;gap:clamp(2px,0.8vw,5px);padding:4px 6px 6px;background:rgba(13,5,32,0.85);backdrop-filter:blur(4px);pointer-events:none;flex-wrap:wrap}
.prog-dot{width:clamp(20px,3.5vw,28px);height:clamp(20px,3.5vw,28px);border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:clamp(8px,1.5vw,11px);font-weight:900;color:rgba(255,255,255,0.2);font-family:var(--font);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.prog-dot.done{background:linear-gradient(135deg,#9b59b6,#6c3483);border-color:#fff;color:#fff;transform:scale(1.1);box-shadow:0 0 8px rgba(180,100,255,0.5)}

/* ── Round Banner ── */
.round-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:var(--z-overlay);text-align:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
.round-banner.show{opacity:1}
.round-banner h2{font-size:clamp(24px,6vw,40px);color:#e0b0ff;text-shadow:2px 2px 0 rgba(0,0,0,0.4),0 0 15px rgba(180,100,255,0.5);font-weight:900}
.round-banner p{font-size:clamp(13px,2.8vw,18px);color:rgba(224,176,255,0.6);margin-top:4px}

/* ── Celebration ── */
.screen-celeb{background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:var(--z-celeb)}
.screen-celeb h2{font-size:clamp(26px,6.5vw,46px);color:var(--gold);text-shadow:3px 3px 0 rgba(0,0,0,0.5);animation:bounce 1.5s ease-in-out infinite}
.screen-celeb p{font-size:clamp(15px,3.5vw,22px);color:rgba(255,255,255,0.9);margin:6px 0}
.celeb-stars{font-size:clamp(28px,6vw,46px);margin:10px 0;letter-spacing:4px}
.celeb-icon-row{display:flex;gap:12px;justify-content:center;margin-bottom:8px}
.celeb-icon-row span{font-size:clamp(50px,12vw,80px);animation:dance 1s ease-in-out infinite}

.confetti{position:fixed;z-index:calc(var(--z-celeb)+5);pointer-events:none;font-size:22px;animation:cfall linear forwards}
.starburst{position:fixed;pointer-events:none;z-index:calc(var(--z-celeb)+2);font-size:26px;animation:starpop 0.7s ease-out forwards}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes dance{0%,100%{transform:translateY(0) rotate(0) scale(1)}15%{transform:translateY(-18px) rotate(-8deg) scale(1.08)}30%{transform:translateY(0) rotate(8deg)}45%{transform:translateY(-12px) rotate(-5deg) scale(1.05)}60%{transform:translateY(0) rotate(5deg)}75%{transform:translateY(-8px) rotate(-3deg) scale(1.08)}}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4}}
@keyframes starpop{0%{transform:scale(0) rotate(0);opacity:1}60%{transform:scale(1.4) rotate(200deg);opacity:1}100%{transform:scale(0) rotate(360deg);opacity:0}}
</style>
</head>
<body>

<!-- Background -->
<div class="bg"></div>

<!-- Cauldron -->
<div class="cauldron-area" id="cauldronArea" style="display:none">
  <div class="cauldron-steam" id="steamArea"></div>
  <div class="cauldron" id="cauldron">🧪</div>
  <div class="cauldron-base"></div>
</div>

<!-- Potion meter -->
<div class="potion-meter" id="potionMeter" style="display:none">
  <div class="potion-vial-top"></div>
  <div class="potion-vial">
    <div class="potion-fill" id="potionFill" style="height:0%"></div>
  </div>
  <div class="potion-label">POTION</div>
</div>

<!-- Creature reveal -->
<div class="creature-reveal" id="creatureReveal"></div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round"><span class="hud-label">ROUND</span><span class="hud-val" id="hudRound">1/4</span></div>
  <div class="hud-center">
    <div class="prompt-label">CATCH!</div>
    <div class="prompt-letter" id="promptLetter">A</div>
  </div>
  <div class="hud-right hud-score"><span class="hud-label">STARS</span><span class="hud-val" id="hudScore">0</span></div>
</div>

<!-- Round banner -->
<div class="round-banner" id="roundBanner"><h2 id="roundTitle"></h2><p id="roundSub"></p></div>

<!-- Progress -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- TITLE SCREEN -->
<div class="screen screen-title active" id="scrTitle">
  <div class="icon-row">
    <span>🔮</span>
    <span style="font-size:clamp(50px,13vw,80px)">🧪</span>
    <span>🔮</span>
  </div>
  <h1>Letter Potion</h1>
  <p>Letters are bubbling up from the magic cauldron! Catch the right letter to brew powerful potions and summon magical creatures! 🧪✨</p>
  <button class="btn btn-start" id="btnStart">Brew Potions! 🧪</button>
</div>

<!-- CELEBRATION SCREEN -->
<div class="screen screen-celeb" id="scrCeleb">
  <div class="celeb-icon-row">
    <span>🧪</span>
    <span>✨</span>
    <span>🔮</span>
  </div>
  <h2 id="celebTitle">✨ Magical! ✨</h2>
  <p id="celebMsg">You brewed all the potions!</p>
  <div class="celeb-stars" id="celebStars"></div>
  <button class="btn btn-again" id="btnAgain">Play Again! 🧪</button>
</div>

<script>
const AUDIO_BASE = '../../audio';

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.05; this.sfxVol = 0.3; this.musicDucked = 0.02;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.sfxVol; this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Mysterious bubbling ambient — minor key
    const notes = [196.00, 220.00, 246.94, 293.66, 329.63];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.7 ? 'triangle' : 'sine';
      o.frequency.value = f * (Math.random() > 0.5 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.06, this.ctx.currentTime + 0.12);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.5);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.7);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 1000 + Math.random() * 1500);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol, this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4) => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if (type === 'pop') {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(900, t); o.frequency.exponentialRampToValueAtTime(250, t+0.08);
      g.gain.setValueAtTime(0.25, t); g.gain.linearRampToValueAtTime(0, t+0.1);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.12);
      o.onended=()=>{o.disconnect();g.disconnect()};
      p(1100, t, 0.04, 0.15);
    }
    else if (type === 'brew') { p(220,t,0.15,0.2); p(330,t+0.1,0.15,0.25); p(440,t+0.2,0.2,0.3); }
    else if (type === 'correct') { p(523.25,t+0.05,0.15,0.35); p(659.25,t+0.15,0.18,0.4); p(783.99,t+0.25,0.22,0.45); }
    else if (type === 'wrong') { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type === 'celeb') { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type === 'creature') {
      p(440,t,0.12,0.3); p(554,t+0.1,0.12,0.3); p(659,t+0.2,0.15,0.35);
      p(880,t+0.35,0.25,0.4); p(1046,t+0.55,0.3,0.35);
    }
    else if (type === 'miss') { p(400,t,0.15,0.12); p(350,t+0.1,0.2,0.1); }
    else if (type === 'roundDone') { p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type === 'whoosh') {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(600,t+0.12);
      g.gain.setValueAtTime(0.12,t); g.gain.linearRampToValueAtTime(0,t+0.18);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.22);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({ file, resolve }); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true; const { file, resolve } = this.voiceQueue.shift(); this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) { return new Promise((resolve) => { const a = new window.Audio(path); a.onended = resolve; a.onerror = () => resolve(); a.play().catch(() => resolve()); }); }
  speakLetter(l) { return this.speak(`${AUDIO_BASE}/letters/${l.toLowerCase()}.mp3`); }
  speakLetterSound(l) { return this.speak(`${AUDIO_BASE}/letters/${l.toLowerCase()}_sound.mp3`); }
  speakPhrase(name) { return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue() { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click', e => { if(t)return; fn(e); });
}

const CHEERS = ['amazing','wonderful','brilliant','fantastic','you_got_it','super','awesome','great_job','incredible'];
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

// Creatures summoned after completing each round's potion
const CREATURES = ['🐱','🦉','🐸','🐉'];
const CREATURE_NAMES = ['a magic cat','a wise owl','a enchanted frog','a baby dragon'];

function confetti(count = 40, extra = []) {
  const all = ['✨','🔮','⭐','💫','🌟','🧪','💜','🎉',...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className='confetti'; el.textContent=pick(all);
    el.style.left=(Math.random()*100)+'vw'; el.style.top='-30px';
    el.style.fontSize=(16+Math.random()*14)+'px';
    el.style.animationDelay=(Math.random()*1.8)+'s';
    el.style.animationDuration=(2.5+Math.random()*2.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),6000);
  }
}
function starBurst(el) {
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<8;i++){
    const s=document.createElement('div');
    s.className='starburst'; s.textContent=pick(['✨','💫','⭐','🔮','🌟']);
    s.style.left=(cx+(Math.random()-0.5)*120)+'px';
    s.style.top=(cy+(Math.random()-0.5)*120)+'px';
    s.style.animationDelay=(Math.random()*0.15)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}

// ═══════════════════════════════════════
// SCENERY
// ═══════════════════════════════════════
function buildScenery() {
  // Twinkling stars
  for (let i = 0; i < 25; i++) {
    const star = document.createElement('div');
    star.className = 'bg-star';
    star.textContent = pick(['·','✦','✧','⋆']);
    star.style.left = (Math.random() * 100) + '%';
    star.style.top = (Math.random() * 70) + '%';
    star.style.fontSize = (8 + Math.random() * 12) + 'px';
    star.style.animationDelay = (Math.random() * 5) + 's';
    star.style.animationDuration = (2 + Math.random() * 4) + 's';
    document.body.appendChild(star);
  }
}

function buildSteam() {
  const area = $('steamArea');
  area.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'steam';
    s.style.left = (-15 + Math.random() * 30) + 'px';
    s.style.animationDelay = (Math.random() * 2) + 's';
    s.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    s.style.background = pick([
      'rgba(180,255,180,0.3)', 'rgba(200,160,255,0.3)', 'rgba(255,200,100,0.2)'
    ]);
    area.appendChild(s);
  }
}

// ═══════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let round = 0, score = 0;
let currentTarget = '', roundLetters = [], roundIdx = 0;
let activeBubbles = [], moveRAF = null;
let potionProgress = 0; // letters caught in this round for potion fill
let repeatTimer = null;

const ROUNDS = [
  { label: 'Round 1 — First Potion 🧪', sub: 'Letters A to F', letters: ['A','B','C','D','E','F'], bubbleCount: 3, speed: [0.8, 1.2] },
  { label: 'Round 2 — Bubbling Up! 🫧', sub: 'Letters G to L', letters: ['G','H','I','J','K','L'], bubbleCount: 4, speed: [0.9, 1.4] },
  { label: 'Round 3 — Getting Magical! 🔮', sub: 'Letters M to R', letters: ['M','N','O','P','Q','R'], bubbleCount: 4, speed: [1.0, 1.5] },
  { label: 'Round 4 — Master Brewer! ✨', sub: 'Letters S to Z', letters: ['S','T','U','V','W','X','Y','Z'], bubbleCount: 4, speed: [1.0, 1.6] },
];

function roundCfg() { return ROUNDS[round]; }

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); if(id) $(id).classList.add('active'); }

function buildProg() {
  const bar = $('progBar'); bar.innerHTML = ''; bar.style.display = '';
  roundLetters.forEach(l => {
    const d = document.createElement('div');
    d.className = 'prog-dot'; d.id = 'prog' + l; d.textContent = l;
    bar.appendChild(d);
  });
}
function markProg(l) { const d=$('prog'+l); if(d) d.classList.add('done'); }

function updatePrompt(letter) {
  const el = $('promptLetter');
  el.textContent = letter;
  el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
}

function updatePotionMeter() {
  const total = roundLetters.length;
  const pct = Math.min(100, (potionProgress / total) * 100);
  const fill = $('potionFill');
  fill.style.height = pct + '%';
  fill.classList.add('brewing');
  setTimeout(() => fill.classList.remove('brewing'), 600);
}

// ═══════════════════════════════════════
// BUBBLE SPAWNING
// ═══════════════════════════════════════
function clearBubbles() {
  activeBubbles.forEach(b => b.el.remove());
  activeBubbles = [];
}

function spawnBubbleSet() {
  clearBubbles();
  clearInterval(repeatTimer);
  const cfg = roundCfg();
  const target = roundLetters[roundIdx];
  currentTarget = target;
  updatePrompt(target);

  // Build options: target + distractors
  let options = [target];
  let pool = cfg.letters.filter(l => l !== target);
  shuffle(pool);
  while (options.length < cfg.bubbleCount && pool.length > 0) options.push(pool.pop());
  // Fill with nearby alphabet letters if needed
  const tIdx = ALPHABET.indexOf(target);
  while (options.length < cfg.bubbleCount) {
    const offset = pick([-3,-2,-1,1,2,3]);
    const extra = ALPHABET[clamp(tIdx + offset, 0, 25)];
    if (!options.includes(extra)) options.push(extra);
  }
  shuffle(options);

  const W = window.innerWidth;
  const H = window.innerHeight;
  const bubbleSize = 95;
  const padX = 20;
  const usableW = W - padX * 2 - bubbleSize;
  const laneW = usableW / options.length;

  options.forEach((letter, i) => {
    const bubble = document.createElement('div');
    bubble.className = 'lbubble';

    const inner = document.createElement('div');
    inner.className = 'lbubble-inner';
    const letterEl = document.createElement('div');
    letterEl.className = 'lbubble-letter';
    letterEl.textContent = letter;
    inner.appendChild(letterEl);
    bubble.appendChild(inner);

    // Horizontal: spread across lanes
    const x = padX + laneW * i + Math.random() * Math.max(0, laneW - bubbleSize * 0.5);
    // Start below cauldron, staggered
    const startY = H + 20 + i * 55 + Math.random() * 30;

    bubble.style.left = x + 'px';
    bubble.style.top = startY + 'px';

    onTap(bubble, () => handleBubbleTap(bubble, letter));
    document.body.appendChild(bubble);

    const baseSpeed = cfg.speed[0] + Math.random() * (cfg.speed[1] - cfg.speed[0]);
    const drift = (Math.random() - 0.5) * 0.25;

    activeBubbles.push({
      el: bubble, letter,
      x, y: startY,
      speed: baseSpeed,
      drift,
      isTarget: letter === target,
      alive: true,
      wobblePhase: Math.random() * Math.PI * 2,
      wobbleAmp: 8 + Math.random() * 12,
    });
  });

  // Voice: say the letter name + sound
  audio.speakLetter(target);
  audio.speakLetterSound(target);

  // Repeat timer
  repeatTimer = setInterval(() => {
    if (gameActive) {
      audio.speakLetter(currentTarget);
    }
  }, 3500);

  startMovement();
}

// ═══════════════════════════════════════
// MOVEMENT
// ═══════════════════════════════════════
let lastTime = 0;

function startMovement() {
  stopMovement();
  lastTime = performance.now();
  const tick = (now) => {
    if (!gameActive) return;
    const dt = Math.min(now - lastTime, 50);
    lastTime = now;

    activeBubbles.forEach(b => {
      if (!b.alive) return;

      b.y -= b.speed * (dt / 16);
      b.x += b.drift * (dt / 16);

      b.wobblePhase += 0.025;
      const wobbleX = Math.sin(b.wobblePhase) * b.wobbleAmp;

      b.el.style.top = b.y + 'px';
      b.el.style.left = (b.x + wobbleX) + 'px';

      // Floated off top?
      if (b.y < -100) {
        b.alive = false;
        b.el.remove();

        if (b.isTarget) {
          audio.tone('miss');
          setTimeout(() => {
            if (gameActive) {
              audio.speakLetter(currentTarget);
              audio.speakLetterSound(currentTarget);
              respawnBubbles();
            }
          }, 800);
        }
      }
    });

    moveRAF = requestAnimationFrame(tick);
  };
  moveRAF = requestAnimationFrame(tick);
}

function stopMovement() {
  if (moveRAF) cancelAnimationFrame(moveRAF);
  moveRAF = null;
}

function respawnBubbles() {
  clearBubbles();
  stopMovement();
  spawnBubbleSet();
}

// ═══════════════════════════════════════
// TAP HANDLING
// ═══════════════════════════════════════
async function handleBubbleTap(bubbleEl, letter) {
  const bData = activeBubbles.find(b => b.el === bubbleEl);
  if (!bData || !bData.alive || !gameActive) return;

  if (letter === currentTarget) {
    // CORRECT!
    bData.alive = false;
    bubbleEl.classList.add('popped');
    starBurst(bubbleEl);
    audio.tone('pop');
    audio.tone('correct');

    score++;
    $('hudScore').textContent = score;
    markProg(letter);
    potionProgress++;
    updatePotionMeter();

    // Remove other bubbles
    activeBubbles.forEach(b => {
      if (b !== bData && b.alive) {
        b.alive = false;
        b.el.style.transition = 'opacity 0.4s';
        b.el.style.opacity = '0';
        setTimeout(() => b.el.remove(), 400);
      }
    });

    clearInterval(repeatTimer);
    stopMovement();

    // Voice: cheer + letter + sound (heavy repetition)
    const cheer = pick(CHEERS);
    await audio.speakPhrase(cheer);
    await audio.speakLetter(letter);
    await delay(150);
    await audio.speakLetterSound(letter);

    await delay(300);
    bubbleEl.remove();

    // Next letter
    roundIdx++;
    if (roundIdx >= roundLetters.length) {
      await finishRound();
    } else {
      spawnBubbleSet();
    }
  } else {
    // WRONG
    bubbleEl.classList.add('wrong');
    audio.tone('wrong');
    audio.speakPhrase('try_again');
    // Re-say target
    setTimeout(() => {
      audio.speakLetter(currentTarget);
    }, 600);
    setTimeout(() => bubbleEl.classList.remove('wrong'), 400);
  }
}

// ═══════════════════════════════════════
// ROUND / GAME FLOW
// ═══════════════════════════════════════
async function finishRound() {
  gameActive = false;
  clearInterval(repeatTimer);
  stopMovement();
  clearBubbles();

  // Potion complete — summon creature!
  audio.tone('creature');
  audio.speakPhrase('potion_ready');
  confetti(30);

  await delay(600);

  // Show creature reveal
  const creature = CREATURES[round % CREATURES.length];
  const creatureEl = $('creatureReveal');
  creatureEl.textContent = creature;
  creatureEl.className = 'creature-reveal show';

  await delay(2500);
  creatureEl.className = 'creature-reveal';

  round++;
  if (round >= ROUNDS.length) {
    await delay(400);
    endGame();
    return;
  }

  // Reset potion meter
  potionProgress = 0;
  $('potionFill').style.height = '0%';

  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.speakPhrase('keep_going');

  await delay(2200);
  $('roundBanner').classList.remove('show');
  await delay(400);

  startRound();
}

async function startRound() {
  const cfg = roundCfg();
  $('hudRound').textContent = `${round + 1}/${ROUNDS.length}`;

  // Use all letters in order for this round
  roundLetters = cfg.letters.slice();
  roundIdx = 0;
  potionProgress = 0;
  $('potionFill').style.height = '0%';

  buildProg();
  gameActive = true;
  spawnBubbleSet();
}

function endGame() {
  gameActive = false;
  clearBubbles();
  stopMovement();
  clearInterval(repeatTimer);
  $('hud').style.display = 'none';
  $('progBar').style.display = 'none';
  $('potionMeter').style.display = 'none';
  $('cauldronArea').style.display = 'none';

  const stars = Math.min(5, Math.max(3, Math.floor(score / 5)));
  $('celebStars').textContent = '⭐'.repeat(stars);
  $('celebTitle').textContent = '✨ Master Brewer! ✨';
  $('celebMsg').textContent = `You caught ${score} letters and summoned ${ROUNDS.length} magical creatures!`;

  showScreen('scrCeleb');
  audio.tone('celeb');
  confetti(50, ['🧪','🔮','🐱','🦉','🐸','🐉']);
  setTimeout(() => confetti(35), 1500);
  setTimeout(() => confetti(35), 3000);
  audio.speakPhrase('you_did_it');
}

async function startGame() {
  showScreen(null);
  audio.unlock();
  audio.startMusic();
  round = 0; score = 0;
  potionProgress = 0;
  $('hudScore').textContent = '0';
  $('hud').style.display = '';
  $('cauldronArea').style.display = '';
  $('potionMeter').style.display = '';
  $('potionFill').style.height = '0%';
  buildSteam();

  const cfg = roundCfg();
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await audio.speakPhrase('lets_go');

  await delay(2200);
  $('roundBanner').classList.remove('show');
  await delay(400);

  startRound();
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
buildScenery();
onTap($('btnStart'), () => startGame());
onTap($('btnAgain'), () => startGame());
</script>
