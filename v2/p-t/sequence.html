<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Load the Cargo Ship P–T — Captain Jolly's Pirate Cove!</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --deep-sea: #08243e; --mid-sea: #0d3a5e; --sunset: #ff8c42; --gold: #ffd166;
  --wood: #8b5a2b; --wood-dark: #5c3820; --wood-light: #c68e52;
  --sail: #f5eccc; --rope: #d2a679;
  --crate-p: #e74c3c; --crate-q: #9b59b6; --crate-r: #3498db; --crate-s: #2ecc71; --crate-t: #f1c40f;
  --white85: rgba(255,255,255,0.85);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Background: pirate cove sunset sky over sea ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background:
    linear-gradient(180deg,
      #1a1040 0%,
      #3b1f5e 25%,
      #7a2d5b 45%,
      #ff6b35 62%,
      #ffa95e 70%,
      #0d3a5e 72%,
      #08243e 100%);
}
/* Sea wave overlay */
.bg::after {
  content: '';
  position: fixed; left: 0; right: 0; bottom: 0;
  height: 34%;
  background:
    repeating-linear-gradient(
      180deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 2px,
      transparent 2px,
      transparent 18px
    );
  pointer-events: none;
  animation: waveShift 6s linear infinite;
}
@keyframes waveShift {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-18px); }
}
.bg-element {
  position: fixed; pointer-events: none; z-index: 1;
  font-size: clamp(12px, 2.5vw, 20px);
  opacity: 0.42;
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.4; }
  92%  { opacity: 0.4; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1.1); opacity: 0; }
}
/* Moon */
.moon {
  position: fixed;
  top: 6%; right: 10%;
  font-size: clamp(30px, 7vw, 52px);
  z-index: 1;
  filter: drop-shadow(0 0 20px rgba(255,221,150,0.5));
  animation: moonBob 8s ease-in-out infinite;
}
@keyframes moonBob {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%     { transform: translateY(-6px) rotate(5deg); }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title .icon-row {
  display: flex; gap: 14px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(40px, 10vw, 68px); }
.screen-title h1 {
  font-size: clamp(24px, 6vw, 42px);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,209,102,0.7), 2px 2px 0 rgba(0,0,0,0.45);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(13px, 3.2vw, 19px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.35);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg,#ff8c42,#c0392b); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; }
.btn-again { background: linear-gradient(135deg,#ff8c42,#c0392b); margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(8,36,62,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(255,209,102,0.2);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.45); font-weight: bold; letter-spacing: 0.05em; }
.hud-val { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--sunset); }
.hud-score .hud-val { color: var(--gold); }
.hud-center .hud-val { color: var(--gold); font-size: clamp(13px,3vw,18px); text-transform: uppercase; }

/* ── Captain Jolly (bottom-left) ── */
.char-area {
  position: fixed; bottom: 130px; left: 8px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji { font-size: clamp(44px,10vw,66px); filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.97); color: var(--deep-sea);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(11px,2.4vw,15px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.3);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.97);
}

/* ── Play area (crates) ── */
.play-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 220px;
  z-index: var(--z-game);
  pointer-events: none;
}
.play-area.active { pointer-events: auto; }

/* Timer background shift (round 4) */
.play-area.timer-warning { animation: timerShift 30s ease-in-out forwards; }
@keyframes timerShift {
  0%   { background: transparent; }
  50%  { background: rgba(255,140,66,0.06); }
  100% { background: rgba(255,80,80,0.08); }
}

/* ── CARGO CRATES ── */
.crate {
  position: absolute;
  width: clamp(76px, 19vw, 108px);
  height: clamp(76px, 19vw, 108px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border: 4px solid var(--wood-dark);
  border-radius: 8px;
  box-shadow:
    0 4px 18px rgba(0,0,0,0.45),
    inset 0 0 0 2px rgba(0,0,0,0.18),
    inset 0 3px 8px rgba(255,255,255,0.25),
    inset 0 -6px 12px rgba(0,0,0,0.3);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s, opacity 0.3s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  z-index: 2;
  opacity: 0; transform: scale(0.5);
  padding: 6px;
  background-image:
    linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.2) 100%);
}
/* Wooden plank grain — top and bottom bands */
.crate::before {
  content: '';
  position: absolute;
  top: 20%; left: -4px; right: -4px;
  height: 4px;
  background: var(--wood-dark);
  opacity: 0.55;
  pointer-events: none;
}
.crate::after {
  content: '';
  position: absolute;
  bottom: 22%; left: -4px; right: -4px;
  height: 4px;
  background: var(--wood-dark);
  opacity: 0.55;
  pointer-events: none;
}
.crate.show { opacity: 1; transform: scale(1); }
.crate:active { transform: scale(0.93) !important; }
.crate.r4-size {
  width: clamp(64px, 16vw, 90px);
  height: clamp(64px, 16vw, 90px);
}
.crate.r4-size .crate-letter { font-size: clamp(20px, 5vw, 30px); }

.crate-letter {
  font-weight: 900;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.45), 0 0 6px rgba(0,0,0,0.25);
  font-size: clamp(26px, 6.5vw, 38px);
  line-height: 1;
  letter-spacing: 2px;
  color: #fff;
}
.crate-emoji {
  font-size: clamp(20px, 4.5vw, 28px);
  line-height: 1; margin-top: 3px;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
}
.crate-word {
  font-size: clamp(9px, 2vw, 12px);
  font-weight: bold; color: rgba(255,255,255,0.88);
  text-transform: lowercase; line-height: 1;
  margin-top: 2px;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}
.crate-picture-only {
  font-size: clamp(38px, 9vw, 60px);
  line-height: 1;
  filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
}
.crate-small-letter {
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 900;
  color: rgba(255,255,255,0.9);
  margin-top: 3px;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.45);
}

/* Crate colour variants (outer face gradient) */
.crate.c-p { background-color: var(--crate-p); background-image:
  linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.25) 100%),
  linear-gradient(135deg, #c0392b 0%, #e74c3c 50%, #a83026 100%); }
.crate.c-q { background-color: var(--crate-q); background-image:
  linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.25) 100%),
  linear-gradient(135deg, #6c3483 0%, #9b59b6 50%, #5b2d8e 100%); }
.crate.c-r { background-color: var(--crate-r); background-image:
  linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.25) 100%),
  linear-gradient(135deg, #1f6391 0%, #3498db 50%, #1a5276 100%); }
.crate.c-s { background-color: var(--crate-s); background-image:
  linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.25) 100%),
  linear-gradient(135deg, #1e8449 0%, #2ecc71 50%, #196f3d 100%); }
.crate.c-t { background-color: var(--crate-t); background-image:
  linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.25) 100%),
  linear-gradient(135deg, #b7950b 0%, #f1c40f 50%, #9a7d0a 100%); }

/* Crate states */
.crate.activated {
  border-color: var(--gold) !important;
  box-shadow: 0 0 30px rgba(255,209,102,0.75), 0 0 60px rgba(255,209,102,0.35), 0 4px 20px rgba(0,0,0,0.3) !important;
  transform: scale(1.08) !important;
}
.crate.next-hint { animation: pulseHint 1.4s ease-in-out infinite; }
@keyframes pulseHint {
  0%,100% { box-shadow: 0 0 12px rgba(255,209,102,0.3), 0 4px 18px rgba(0,0,0,0.45), inset 0 3px 8px rgba(255,255,255,0.25), inset 0 -6px 12px rgba(0,0,0,0.3); }
  50%     { box-shadow: 0 0 32px rgba(255,209,102,0.8), 0 0 55px rgba(255,209,102,0.35), 0 4px 18px rgba(0,0,0,0.45), inset 0 3px 8px rgba(255,255,255,0.25), inset 0 -6px 12px rgba(0,0,0,0.3); }
}
.crate.wrong-tap { animation: wrongShake 0.45s ease-in-out; }
.crate.wiggle { animation: wiggleHint 0.6s ease-in-out; }
@keyframes wiggleHint {
  0%,100% { transform: rotate(0deg); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(8deg); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(5deg); }
}

/* Fly-to-ship animation */
.crate.flying {
  transition: none !important;
  z-index: 50;
  pointer-events: none;
}

/* ══════════════════════════════════════════════════════════════════
   PIRATE SHIP — bottom-center
══════════════════════════════════════════════════════════════════ */
.ship-area {
  position: fixed;
  bottom: 30px; left: 50%; transform: translateX(-50%);
  z-index: var(--z-ui);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
  width: clamp(260px, 55vw, 420px);
  transition: transform 2.4s cubic-bezier(0.33, 0.05, 0.2, 1), opacity 2.4s;
}
.ship-area.sailing-away {
  transform: translateX(160vw) rotate(-2deg);
  opacity: 0;
}
.ship-area.bobbing {
  animation: shipBob 3.5s ease-in-out infinite;
}
@keyframes shipBob {
  0%,100% { transform: translateX(-50%) translateY(0) rotate(-0.6deg); }
  50%     { transform: translateX(-50%) translateY(-4px) rotate(0.6deg); }
}

.ship {
  position: relative;
  width: 100%;
  height: clamp(180px, 38vw, 260px);
}

/* Mast */
.mast {
  position: absolute;
  left: 50%;
  bottom: 35%;
  transform: translateX(-50%);
  width: 6px;
  height: 70%;
  background: linear-gradient(90deg, #6b3f1f 0%, #8b5a2b 50%, #6b3f1f 100%);
  border-radius: 3px;
  z-index: 2;
  box-shadow: 1px 0 2px rgba(0,0,0,0.3);
}
.mast::before {
  /* Crow's nest */
  content: '';
  position: absolute;
  top: 6px; left: 50%; transform: translateX(-50%);
  width: 22px; height: 10px;
  background: linear-gradient(180deg, #8b5a2b, #5c3820);
  border: 1.5px solid #3c2410;
  border-radius: 2px;
}
.mast-flag {
  position: absolute;
  top: -8px; left: 50%;
  transform: translateX(-50%);
  font-size: clamp(20px, 4.5vw, 28px);
  z-index: 3;
  animation: flagWave 1.6s ease-in-out infinite;
  transform-origin: 50% 80%;
}
@keyframes flagWave {
  0%,100% { transform: translateX(-50%) rotate(-3deg) skewX(4deg); }
  50%     { transform: translateX(-50%) rotate(3deg) skewX(-4deg); }
}

/* Sails — start furled (tiny), unfurl when ship sails */
.sail {
  position: absolute;
  left: 50%;
  background: linear-gradient(180deg, var(--sail) 0%, #e0d2a8 100%);
  border: 2px solid var(--wood-dark);
  border-radius: 4px 4px 8px 8px;
  transform-origin: top center;
  transform: translateX(-50%) scaleY(0.12);
  transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.9s ease;
  z-index: 1;
  box-shadow: inset 0 0 12px rgba(139,90,43,0.25), 0 2px 6px rgba(0,0,0,0.25);
}
.sail.unfurled {
  transform: translateX(-50%) scaleY(1);
}
/* Sail stripe detail */
.sail::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    repeating-linear-gradient(180deg,
      transparent 0px,
      transparent 14px,
      rgba(139,90,43,0.18) 14px,
      rgba(139,90,43,0.18) 16px);
  border-radius: 4px 4px 8px 8px;
  pointer-events: none;
}
.sail-top {
  top: 10%;
  width: clamp(75px, 18vw, 130px);
  height: clamp(50px, 12vw, 85px);
}
.sail-main {
  top: 30%;
  width: clamp(105px, 26vw, 180px);
  height: clamp(70px, 16vw, 110px);
}

/* Hull */
.hull {
  position: absolute;
  left: 50%; bottom: 0;
  transform: translateX(-50%);
  width: 96%;
  height: 40%;
  background:
    linear-gradient(180deg, #a57039 0%, var(--wood) 45%, var(--wood-dark) 100%);
  border: 3px solid var(--wood-dark);
  /* Ship hull shape: wider top, narrower bottom */
  border-radius: 12px 12px 50% 50% / 12px 12px 65% 65%;
  box-shadow:
    inset 0 3px 8px rgba(255,255,255,0.2),
    inset 0 -6px 12px rgba(0,0,0,0.4),
    0 6px 18px rgba(0,0,0,0.5);
  z-index: 4;
}
/* Deck line */
.hull::before {
  content: '';
  position: absolute;
  top: 18%; left: 0; right: 0;
  height: 3px;
  background: var(--wood-dark);
  opacity: 0.7;
}
/* Portholes */
.hull::after {
  content: '';
  position: absolute;
  top: 42%; left: 18%; right: 18%;
  height: 10px;
  background:
    radial-gradient(circle at 12% 50%, #ffd166 0 3px, transparent 4px),
    radial-gradient(circle at 38% 50%, #ffd166 0 3px, transparent 4px),
    radial-gradient(circle at 62% 50%, #ffd166 0 3px, transparent 4px),
    radial-gradient(circle at 88% 50%, #ffd166 0 3px, transparent 4px);
  filter: drop-shadow(0 0 4px rgba(255,209,102,0.6));
}

/* Cargo hold (visible area inside hull top) */
.cargo-hold {
  position: absolute;
  left: 50%;
  bottom: 38%;
  transform: translateX(-50%);
  width: 55%;
  height: 16%;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 3px;
  z-index: 3;
  padding: 0 2px;
}
/* Mini-crate stacked inside cargo hold */
.mini-crate {
  flex: 1;
  max-width: 18%;
  height: 70%;
  border-radius: 3px;
  border: 1.5px solid var(--wood-dark);
  opacity: 0;
  transform: translateY(20px) scale(0.3);
  transition: opacity 0.35s, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), inset 0 -2px 3px rgba(0,0,0,0.3);
  position: relative;
}
.mini-crate::before {
  /* Letter label */
  content: attr(data-letter);
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 900;
  color: #fff;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
}
.mini-crate.filled {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.mini-crate.c-p { background: linear-gradient(135deg, #c0392b, #e74c3c); }
.mini-crate.c-q { background: linear-gradient(135deg, #6c3483, #9b59b6); }
.mini-crate.c-r { background: linear-gradient(135deg, #1f6391, #3498db); }
.mini-crate.c-s { background: linear-gradient(135deg, #1e8449, #2ecc71); }
.mini-crate.c-t { background: linear-gradient(135deg, #b7950b, #f1c40f); }

/* Anchor — drops initially, raises when ship leaves */
.anchor {
  position: absolute;
  left: 8%;
  bottom: -22px;
  font-size: clamp(22px, 5vw, 32px);
  z-index: 5;
  transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
.anchor.raised { transform: translateY(-55px) rotate(30deg); }

/* Ship wake / water trail */
.wake {
  position: absolute;
  left: 0; right: 0;
  bottom: -6px;
  height: 10px;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.55) 0%, transparent 60%),
    radial-gradient(ellipse at 55% 50%, rgba(255,255,255,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.45) 0%, transparent 60%);
  filter: blur(1px);
  z-index: 3;
  opacity: 0.7;
  animation: wakeShift 2.4s ease-in-out infinite;
}
@keyframes wakeShift {
  0%,100% { transform: translateX(0); opacity: 0.6; }
  50%     { transform: translateX(-6px); opacity: 0.85; }
}

/* Voyages counter — 4 pips = 4 ships loaded */
.voyage-counter {
  display: flex; gap: 6px; justify-content: center;
  margin-top: 4px;
}
.voyage-pip {
  width: clamp(18px, 4vw, 24px);
  height: clamp(14px, 3vw, 18px);
  border-radius: 3px 3px 8px 8px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.2);
  position: relative;
  transition: background 0.3s, transform 0.3s, border-color 0.3s;
}
.voyage-pip::after {
  content: '';
  position: absolute;
  left: 50%; top: -5px;
  transform: translateX(-50%);
  width: 2px; height: 6px;
  background: rgba(255,255,255,0.15);
  transition: background 0.3s;
}
.voyage-pip.filled {
  background: linear-gradient(180deg, #c68e52, #5c3820);
  border-color: var(--gold);
  animation: pipFill 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.voyage-pip.filled::after { background: var(--gold); }
@keyframes pipFill { 0%{transform:scale(0.3);opacity:0.5} 70%{transform:scale(1.3)} 100%{transform:scale(1.1)} }

/* Splash effect — when crate lands in hold */
.splash-emoji {
  position: fixed;
  font-size: 22px;
  animation: splashPop 0.6s ease-out forwards;
  pointer-events: none; z-index: 60;
}
@keyframes splashPop {
  0%   { transform: translateY(0) scale(0.4); opacity: 1; }
  100% { transform: translateY(-40px) scale(1.6); opacity: 0; }
}

/* Sparkle trail */
.sparkle-trail {
  position: fixed;
  font-size: 14px;
  pointer-events: none;
  z-index: 55;
  animation: trailFade 0.45s ease-out forwards;
}
@keyframes trailFade {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.3) translateY(10px); opacity: 0; }
}

/* ── Progress bar ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: calc(var(--z-ui) + 5);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(6px,1.5vw,10px);
  padding: 4px 10px 6px;
  background: rgba(8,36,62,0.92); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(28px,5.5vw,38px);
  height: clamp(28px,5.5vw,38px);
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,3vw,20px); font-weight: 900;
  color: rgba(255,255,255,0.25);
  transition: all 0.3s;
  text-transform: uppercase;
}
.prog-dot.current {
  border-color: var(--gold);
  color: var(--gold);
}
.prog-dot.done {
  background: linear-gradient(135deg,var(--gold),#c47400);
  border-color: var(--gold); color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* ── Round banner ── */
.round-banner {
  position: fixed; top: 45%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(8,36,62,0.96); backdrop-filter: blur(12px);
  border: 2px solid rgba(255,209,102,0.35); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--gold); text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(255,255,255,0.85); margin-top: 5px;
}

/* ── Treasure island (appears after ship sails) ── */
.treasure-island {
  position: fixed;
  top: 40%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  z-index: calc(var(--z-celeb) + 2);
  pointer-events: none;
  transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-align: center;
}
.treasure-island.show { transform: translate(-50%, -50%) scale(1); }
.treasure-island .island-emoji {
  font-size: clamp(60px, 15vw, 110px);
  filter: drop-shadow(0 4px 14px rgba(0,0,0,0.5));
}
.treasure-island .x-marks {
  font-size: clamp(16px, 4vw, 24px);
  font-weight: 900;
  color: var(--gold);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
  margin-top: 6px;
  letter-spacing: 2px;
  animation: xPulse 1.2s ease-in-out infinite;
}
@keyframes xPulse {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.1); }
}

/* ── Celebration screen ── */
.screen-celeb {
  background: radial-gradient(ellipse at 50% 50%, rgba(20,55,95,0.85) 0%, rgba(8,36,62,0.96) 100%);
  backdrop-filter: blur(10px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(24px,6vw,44px); color: var(--gold);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.45);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(13px,3.2vw,20px); color: rgba(255,255,255,0.9); margin: 6px 0; }
.celeb-stars { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-captain { font-size: clamp(60px, 16vw, 100px); animation: captainBob 2s ease-in-out infinite; filter: drop-shadow(0 4px 10px rgba(255,209,102,0.5)); }
.celeb-captain-text {
  font-size: clamp(14px, 3.5vw, 22px);
  color: var(--gold); font-weight: bold;
  margin: 8px 0;
  animation: fadeInUp 1s ease-out 0.5s both;
}
@keyframes captainBob {
  0%,100% { transform: translateY(0) scale(1) rotate(-3deg); }
  50%     { transform: translateY(-12px) scale(1.05) rotate(3deg); }
}
@keyframes fadeInUp {
  0%   { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ── Particles & shared ── */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }

/* ── Keyframes ── */
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-22px) scale(1.08)} 70%{transform:translateY(-8px) scale(1.03)} }
@keyframes wrongShake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(9px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }

// ╔══════════════════════════════════════════════════════════════════╗
// ║  Aha! — Sequence P–T: Load the Cargo Ship!  🏴‍☠️                ║
// ║  Tap letter-crates P→T in order to sail to treasure islands.     ║
// ║  Voice B (en-GB-SoniaNeural) · Pirate Cove theme                 ║
// ╚══════════════════════════════════════════════════════════════════╝

const AUDIO_BASE = '../../audio';

// ── Voice B clip pools ─────────────────────────────────────────────
const VOICE_B = {

// ══════════════════════════════════════════════════════════════════
// AUDIO CLASS (AudioContext-first with iOS fallback)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.08; this.sfxVol = 0.3; this.musicDucked = 0.025;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Sea-shanty inspired pentatonic — D minor, nautical feel
    const notes = [146.83, 174.61, 196.00, 220.00, 261.63, 293.66]; // D F G A C D
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.4 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.65 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + 0.25);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.8);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 3);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 950 + Math.random() * 1400);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.15,0.2); p(554,t+0.1,0.18,0.25); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='thud') {
      // Crate hits wooden deck
      p(120, t, 0.08, 0.4, 'square');
      p(80, t+0.04, 0.12, 0.3, 'triangle');
      p(60, t+0.1, 0.15, 0.2, 'sine');
    }
    else if (type==='splash') {
      p(400, t, 0.06, 0.3);
      p(250, t+0.03, 0.08, 0.2);
      p(600, t+0.06, 0.1, 0.15);
      p(180, t+0.1, 0.15, 0.1);
    }
    else if (type==='foghorn') {
      // Ship horn — ship sails away!
      const o1 = this.ctx.createOscillator(), g1 = this.ctx.createGain();
      o1.type='sawtooth'; o1.frequency.value = 110;
      g1.gain.setValueAtTime(0,t);
      g1.gain.linearRampToValueAtTime(0.25, t+0.1);
      g1.gain.linearRampToValueAtTime(0.25, t+1.0);
      g1.gain.linearRampToValueAtTime(0, t+1.4);
      o1.connect(g1); g1.connect(this.sfxGain); o1.start(t); o1.stop(t+1.5);
      o1.onended = () => { o1.disconnect(); g1.disconnect(); };
      const o2 = this.ctx.createOscillator(), g2 = this.ctx.createGain();
      o2.type='triangle'; o2.frequency.value = 82.5;
      g2.gain.setValueAtTime(0,t);
      g2.gain.linearRampToValueAtTime(0.2, t+0.1);
      g2.gain.linearRampToValueAtTime(0.2, t+1.0);
      g2.gain.linearRampToValueAtTime(0, t+1.4);
      o2.connect(g2); g2.connect(this.sfxGain); o2.start(t); o2.stop(t+1.5);
      o2.onended = () => { o2.disconnect(); g2.disconnect(); };
    }
    else if (type==='anchor') {
      // Clanking chain — anchor raises
      p(800, t, 0.05, 0.25, 'square');
      p(950, t+0.08, 0.05, 0.22, 'square');
      p(780, t+0.16, 0.05, 0.2, 'square');
      p(900, t+0.24, 0.05, 0.18, 'square');
    }
  }
  // Ascending sequence chime — pitch rises with each crate (0=P low, 4=T high)
  toneSequence(idx) {
    this._init(); const t = this.ctx.currentTime;
    const freqs = [293.66, 329.63, 392.00, 440.00, 523.25]; // D E G A C ascending
    const f = freqs[Math.min(idx, freqs.length-1)];
    const p = (freq, s, d, v, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = freq;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    p(f, t, 0.25, 0.4);
    p(f * 1.5, t + 0.05, 0.2, 0.15);
    p(f * 2, t + 0.08, 0.15, 0.1, 'triangle');
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(l)   { return this.speak(`${AUDIO_BASE}/letters/${l}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});

}

// ══════════════════════════════════════════════════════════════════
// POSITION GENERATION — random positions with minimum spacing
// ══════════════════════════════════════════════════════════════════
function generatePositions(count, smaller) {
  const area = $('playArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const crateW = smaller ? Math.min(Math.max(64, areaW * 0.16), 90) : Math.min(Math.max(76, areaW * 0.19), 108);
  const crateH = crateW;
  const margin = crateW * 0.35;
  const minDist = crateW * 1.25;

  const positions = [];
  for (let i = 0; i < count; i++) {
    let tries = 0;
    let x, y;
    do {
      x = margin + Math.random() * (areaW - margin * 2 - crateW);
      y = margin + 10 + Math.random() * (areaH - margin * 2 - crateH);
      tries++;
      if (tries > 300) break;
    } while (positions.some(p => {
      const dx = p.x - x, dy = p.y - y;
      return Math.sqrt(dx*dx + dy*dy) < minDist;
    }));
    positions.push({ x, y });
  }
  return positions;
}

// RENDER CRATES
// ══════════════════════════════════════════════════════════════════
function renderCrates() {
  const area = $('playArea');
  const cfg = ROUNDS[round];

  area.querySelectorAll('.crate').forEach(n => n.remove());
  crateEls = {};

  const positions = generatePositions(5, cfg.smaller);
  const shuffledOrder = shuffle([...Array(5).keys()]); // random placement order

  shuffledOrder.forEach((seqIdx, posIdx) => {
    const letter = LETTERS[seqIdx];
    const crate = document.createElement('div');
    crate.className = 'crate ' + CRATE_CLASS[letter];
    if (cfg.smaller) crate.classList.add('r4-size');
    crate.style.left = positions[posIdx].x + 'px';
    crate.style.top  = positions[posIdx].y + 'px';
    crate.dataset.letter = letter;

    let inner = '';
    if (cfg.display === 'full') {
      inner = `<div class="crate-letter">${LETTER_UPPER[letter]}${letter}</div>
               <div class="crate-emoji">${LETTER_EMOJI[letter]}</div>
               <div class="crate-word">${LETTER_WORDS[letter]}</div>`;
    } else if (cfg.display === 'picture') {
      // Picture only + small letter
      inner = `<div class="crate-picture-only">${LETTER_EMOJI[letter]}</div>
               <div class="crate-small-letter">${LETTER_UPPER[letter]}${letter}</div>`;
    }
    crate.innerHTML = inner;

    onTap(crate, () => handleCrateTap(crate, letter));
    area.appendChild(crate);
    crateEls[letter] = crate;

    setTimeout(() => crate.classList.add('show'), 100 + posIdx * 120);
  });

  area.classList.add('active');

  // Initial hint for round 1
  setTimeout(() => {
    if (cfg.hintMode === 'strong') {
      const firstCrate = crateEls[LETTERS[0]];
      if (firstCrate) firstCrate.classList.add('next-hint');
    }
  }, 700);
}

// ══════════════════════════════════════════════════════════════════
// FLY-TO-SHIP ANIMATION
// ══════════════════════════════════════════════════════════════════
function flyToShip(crate) {
  return new Promise(resolve => {
    const crateRect = crate.getBoundingClientRect();
    const ship = $('ship');
    const shipRect = ship.getBoundingClientRect();

    const startX = crateRect.left;
    const startY = crateRect.top;
    // Target: cargo hold area (roughly middle-upper of ship)
    const endX = shipRect.left + shipRect.width/2 - crateRect.width/2;
    const endY = shipRect.top + shipRect.height * 0.45 - crateRect.height/2;

    crate.classList.add('flying');
    crate.style.position = 'fixed';
    crate.style.left = startX + 'px';
    crate.style.top  = startY + 'px';
    crate.style.zIndex = '55';

    const duration = 350;
    const startTime = performance.now();
    let lastTrail = 0;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // Ease-in curve for acceleration feel
      const ease = progress * progress;

      const curX = startX + (endX - startX) * ease;
      // Arc upward first then down
      const arcHeight = -70;
      const curY = startY + (endY - startY) * ease + arcHeight * Math.sin(progress * Math.PI);

      const scale = 1 - progress * 0.55;
      crate.style.left = curX + 'px';
      crate.style.top  = curY + 'px';
      crate.style.transform = `scale(${scale}) rotate(${progress * 360}deg)`;

      // Sparkle trail every ~50ms
      if (now - lastTrail > 50) {
        spawnTrail(curX + crateRect.width/2, curY + crateRect.height/2);
        lastTrail = now;
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        // Hit ship!
        crate.style.display = 'none';
        audio.tone('thud');
        shipSplash();
        resolve();
      }
    }
    requestAnimationFrame(animate);
  });
}

// ══════════════════════════════════════════════════════════════════
// HANDLE CRATE TAP
// ══════════════════════════════════════════════════════════════════
async function handleCrateTap(crateEl, letter) {
  if (!gameActive) return;
  clearHints();

  const targetLetter = LETTERS[nextTapIdx];

  if (letter === targetLetter) {
    // ✓ CORRECT
    gameActive = false;

    crateEl.classList.remove('next-hint', 'wiggle');
    crateEl.classList.add('activated');
    starBurst(crateEl);

    // Ascending chime
    audio.toneSequence(nextTapIdx);

    score++;
    $('hudScore').textContent = score;

    // Character reacts
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT), 1800);

    // Voice: speak the letter ONCE per correct tap
    audio.speakLetter(letter);

    // Mark progress
    markProg(nextTapIdx);

    await delay(200);

    // Fly crate to ship!
    await flyToShip(crateEl);

    // Update ship state — load mini-crate into cargo hold
    cratesLoaded++;
    loadMiniCrate(letter);

    await delay(150);

    nextTapIdx++;
    highlightProg(nextTapIdx);
    updateHud();

    if (nextTapIdx >= 5) {
      // Voyage complete! Ship is fully loaded!
      await celebrateSequence();
    } else {
      // Highlight next crate hint (round 1 only)
      const cfg = ROUNDS[round];
      if (cfg.hintMode === 'strong') {
        const nextCrate = crateEls[LETTERS[nextTapIdx]];
        if (nextCrate) nextCrate.classList.add('next-hint');
      }
      gameActive = true;
      resetHints();
    }

  } else {
    // ✗ WRONG
    crateEl.classList.add('wrong-tap');
    audio.tone('wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1900);

    audio.play('wrong');
    // Speak the correct target letter after a beat
    setTimeout(() => audio.speakLetter(targetLetter), 600);
    setTimeout(() => {
      crateEl.classList.remove('wrong-tap');
      resetHints();
    }, 480);
  }
}

// CELEBRATE VOYAGE COMPLETION — SHIP SAILS AWAY!
// ══════════════════════════════════════════════════════════════════
async function celebrateSequence() {
  $('playArea').classList.remove('timer-warning');

  audio.tone('celeb');

  showCharBubble(pick(BUBBLE_CARGO), 2000);
  confetti(22, ['🏴‍☠️','💰','⚓','🦜','⛵']);
  audio.play('correct'); // don't await

  markVoyage(shipsLaunched);
  shipsLaunched++;

  await delay(500);

  // ═══ SHIP LAUNCH SEQUENCE — SATISFYING ═══

  // 1. Anchor raises with clanking sound
  audio.tone('anchor');
  $('anchor').classList.add('raised');
  await delay(700);

  // 2. Sails unfurl dramatically
  $('sailTop').classList.add('unfurled');
  audio.tone('whoosh');
  await delay(250);
  $('sailMain').classList.add('unfurled');
  audio.tone('whoosh');
  await delay(500);

  // 3. Foghorn blast!
  audio.tone('foghorn');
  showCharBubble('Bon voyage! 🌊', 2600);
  await delay(600);

  // 4. Ship stops bobbing, begins sailing away
  $('shipArea').classList.remove('bobbing');
  void $('shipArea').offsetWidth;
  $('shipArea').classList.add('sailing-away');

  // 5. Confetti as it sails
  confetti(30, ['🌊','⛵','💰','🏴‍☠️','✨']);
  await delay(900);

  // 6. Mid-sail splash/cheer
  audio.tone('celeb');
  confetti(25, ['💰','⭐','✨','🏝️']);
  await delay(900);

  // 7. Treasure island appears with X marks the spot
  const treasure = VOYAGE_TREASURES[shipsLaunched - 1] || VOYAGE_TREASURES[0];
  const islandEl = $('treasureIsland');
  islandEl.querySelector('.island-emoji').textContent = treasure.emoji;
  islandEl.querySelector('.x-marks').textContent = treasure.text;
  islandEl.classList.add('show');
  audio.tone('celeb');
  confetti(30, ['💰','💎','🏝️','⭐']);
  await delay(1200);

  islandEl.classList.remove('show');
  await delay(400);

  await finishRound();
}

async function finishRound() {
  gameActive = false;
  clearHints();

  $('playArea').querySelectorAll('.crate').forEach(n => n.remove());
  $('playArea').classList.remove('active', 'timer-warning');

  audio.tone('roundDone');
  round++;

  if (round >= ROUNDS.length) {
    await delay(500);
    celebrateFinish();
    return;
  }

  // ── Voyage complete banner (snappy) ──
  $('roundTitle').textContent = '⛵ Ship Sailed! ⛵';
  $('roundSub').textContent   = 'Captain Jolly is delighted!';
  $('roundBanner').classList.add('show');
  audio.play('round-complete');
  await delay(1400);
  $('roundBanner').classList.remove('show');
  await delay(300);

  // Reset ship — a new one returns to the cove
  resetShip();

  // ── Next voyage intro banner (snappy) ──
  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await delay(1200);
  $('roundBanner').classList.remove('show');
  await delay(150);

  startRound();
}

}

// ══════════════════════════════════════════════════════════════════
// START ATTEMPT (each round = 1 voyage)
// ══════════════════════════════════════════════════════════════════
async function startAttempt() {
  nextTapIdx = 0;
  updateHud();
  highlightProg(0);
  renderCrates();
  gameActive = true;

  audio.tone('reveal');
  await audio.speakLetter('p');

  resetHints();

  if (ROUNDS[round].timer) {
    $('playArea').classList.remove('timer-warning');
    void $('playArea').offsetWidth;
    $('playArea').classList.add('timer-warning');
  }
}

// ══════════════════════════════════════════════════════════════════
// FINAL CELEBRATION — TREASURE HUNT COMPLETE!
// ══════════════════════════════════════════════════════════════════
async function celebrateFinish() {
  gameActive = false;
  audio.stopMusic();
  $('hud').style.display       = 'none';
  $('progBar').style.display   = 'none';
  $('roundBanner').classList.remove('show');
  $('playArea').classList.remove('active');
  $('shipArea').style.display  = 'none';
  $('charArea').style.display  = 'none';

  // Big finale fireworks
  finalFireworks();
  audio.tone('celeb');
  audio.tone('foghorn');
  await delay(700);

  confetti(70, ['🏴‍☠️','💰','⚓','🦜','⛵','🏝️','✨','🌟','💎']);

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 5)));
  $('celebStars').textContent = '⭐'.repeat(stars);

  showScreen('scrCeleb');
  audio.tone('celeb');
  await delay(200);

  // Two celebration voice clips
  await audio.play('game-complete');
  await delay(400);
  confetti(50, ['💰','🏴‍☠️','🌟','🏝️']);
  await audio.play('game-complete');
}

// ══════════════════════════════════════════════════════════════════
// INIT & START
// ══════════════════════════════════════════════════════════════════
function resetGame() {
  round = 0; score = 0; shipsLaunched = 0;
  nextTapIdx = 0;
  cratesLoaded = 0;
  $('hudScore').textContent = '0';

  // Reset voyage pips
  for (let i = 0; i < 4; i++) {
    const pip = $('vpip' + i);
    if (pip) pip.classList.remove('filled');
  }

  // Reset ship
  $('shipArea').style.display = '';
  $('charArea').style.display = '';
  resetShip();
  $('treasureIsland').classList.remove('show');
}

async function startGame() {
  audio.startMusic();

  resetGame();
  showScreen(null);

  $('hud').style.display     = '';
  $('charArea').style.display = '';

  // First voyage intro (snappy)
  const cfg = ROUNDS[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  audio.play('greetings'); // don't await
  await delay(1400);
  $('roundBanner').classList.remove('show');
  await delay(200);

  startRound();
}

// ── BOOT ─────────────────────────────────────────────────────────
buildScenery();

onTap($('btnStart'), () => { audio.unlock(); startGame(); });
onTap($('btnAgain'), () => {
  showScreen(null);
  startGame();
});
</script>
</body>
</html>
