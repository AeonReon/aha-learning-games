<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Feed the Elephant! — Zara's Jungle Safari 10-50 🐘</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --jungle-dark: #0a2a14; --jungle-mid: #1c5028; --jungle-leaf: #2f7a3b; --jungle-emerald: #0f6b3a;
  --earth-brown: #6b4423; --earth-light: #8d6e43;
  --sunshine: #ffcc33; --mango: #ff8c2a; --berry: #e94f6d;
  --sky-top: #7fc3e0; --sky-warm: #ffd98a;
  --white85: rgba(255,255,255,0.9);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Background — jungle canopy ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background:
    radial-gradient(ellipse at 80% 10%, rgba(255,217,138,0.35) 0%, transparent 50%),
    linear-gradient(180deg, #7fc3e0 0%, #a9dbb0 28%, #0f6b3a 58%, #1c5028 80%, #0a2a14 100%);
}
.bg-element {
  position: fixed; pointer-events: none; z-index: 1;
  font-size: clamp(14px, 2.8vw, 22px);
  opacity: 0.55;
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.55; }
  92%  { opacity: 0.55; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1.1); opacity: 0; }
}

/* Hanging vines from top */
.vine {
  position: fixed; top: 0;
  font-size: clamp(30px, 8vw, 54px);
  opacity: 0.5;
  pointer-events: none;
  z-index: 1;
  animation: vineSway 5s ease-in-out infinite;
  transform-origin: top center;
}
@keyframes vineSway {
  0%,100% { transform: rotate(-3deg); }
  50%     { transform: rotate(3deg); }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title {
  background: radial-gradient(ellipse at 50% 40%, rgba(15,107,58,0.65) 0%, rgba(10,42,20,0.88) 70%);
}
.screen-title .icon-row {
  display: flex; gap: 14px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(40px, 10vw, 68px); }
.screen-title h1 {
  font-size: clamp(24px, 6vw, 42px);
  color: var(--sunshine);
  text-shadow: 0 0 30px rgba(255,204,51,0.6), 2px 2px 0 rgba(0,0,0,0.4);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(13px, 3.2vw, 19px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.3);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg,#ff8c2a,#e94f6d); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; }
.btn-again { background: linear-gradient(135deg,#ff8c2a,#e94f6d); margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(10,42,20,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(255,204,51,0.2);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.55); font-weight: bold; letter-spacing: 0.05em; }
.hud-val { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--mango); }
.hud-score .hud-val { color: var(--sunshine); }
.hud-center .hud-val { color: var(--mango); font-size: clamp(13px,3vw,18px); }

/* ── Zara character (bottom-left) ── */
.char-area {
  position: fixed; bottom: 150px; left: 8px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji { font-size: clamp(44px,10vw,66px); filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96); color: var(--jungle-dark);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(11px,2.4vw,15px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.3);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.96);
}

/* ── Play area (treats) ── */
.play-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 210px;
  z-index: var(--z-game);
  pointer-events: none;
}
.play-area.active { pointer-events: auto; }

.play-area.timer-warning { animation: timerShift 30s ease-in-out forwards; }
@keyframes timerShift {
  0%   { background: transparent; }
  50%  { background: rgba(255,140,42,0.06); }
  100% { background: rgba(233,79,109,0.08); }
}

/* ── Treat Items (jungle-leaf bundles with tens labels) ── */
.treat {
  position: absolute;
  width: clamp(78px, 19vw, 112px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border: 3px solid rgba(255,255,255,0.4);
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s, opacity 0.3s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  z-index: 2;
  opacity: 0; transform: scale(0.5);
  padding: 12px 4px 14px;
  border-radius: 22px 22px 28px 28px;
}
/* Treat stem / leaf on top */
.treat::before {
  content: '';
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  width: 32%; height: 12px;
  background: var(--jungle-leaf);
  border: 2px solid rgba(0,0,0,0.25);
  border-bottom: none;
  border-radius: 6px 6px 0 0;
}
.treat::after {
  content: '🌿';
  position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  font-size: clamp(15px, 3.2vw, 22px);
  line-height: 1;
}
.treat.show { opacity: 1; transform: scale(1); }
.treat:active { transform: scale(0.93) !important; }
.treat.r4-size {
  width: clamp(64px, 16vw, 92px);
  padding: 9px 4px 11px;
}
.treat.r4-size .treat-numeral { font-size: clamp(22px, 5.5vw, 34px); }

.treat-numeral {
  font-weight: 900; color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.45);
  font-size: clamp(28px, 7vw, 44px);
  line-height: 1;
}
.treat-emoji {
  font-size: clamp(20px, 4.4vw, 30px);
  line-height: 1; margin-top: 3px;
}
.treat-word {
  font-size: clamp(10px, 2.1vw, 13px);
  font-weight: bold; color: rgba(255,255,255,0.88);
  text-transform: lowercase; line-height: 1;
  margin-top: 3px;
}
.treat-dots {
  font-size: clamp(11px, 2.6vw, 16px);
  line-height: 1.15; white-space: pre;
  text-align: center; letter-spacing: 1px;
  margin-top: 3px;
}

/* Treat states */
.treat.activated {
  border-color: var(--sunshine) !important;
  box-shadow: 0 0 30px rgba(255,204,51,0.8), 0 0 60px rgba(255,204,51,0.4), 0 4px 20px rgba(0,0,0,0.3) !important;
  transform: scale(1.08) !important;
}
.treat.next-hint { animation: pulseHint 1.5s ease-in-out infinite; }
@keyframes pulseHint {
  0%,100% { box-shadow: 0 0 12px rgba(255,204,51,0.35), 0 4px 20px rgba(0,0,0,0.3); }
  50%     { box-shadow: 0 0 30px rgba(255,204,51,0.8), 0 0 50px rgba(255,204,51,0.4), 0 4px 20px rgba(0,0,0,0.3); }
}
.treat.wrong-tap { animation: wrongShake 0.45s ease-in-out; }
.treat.wiggle { animation: wiggleHint 0.6s ease-in-out; }
@keyframes wiggleHint {
  0%,100% { transform: rotate(0deg); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(8deg); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(5deg); }
}

/* Fly-to-elephant animation */
.treat.flying {
  transition: none !important;
  z-index: 50;
  pointer-events: none;
}

/* ══════ ELEPHANT ══════ */
.elephant-area {
  position: fixed;
  bottom: 36px; left: 50%; transform: translateX(-50%);
  z-index: var(--z-ui);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
}
.elephant {
  position: relative;
  font-size: clamp(110px, 28vw, 170px);
  line-height: 1;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
  transition: transform 0.4s, filter 0.6s;
  transform-origin: bottom center;
}
.elephant.hungry    { animation: hungrySway 3s ease-in-out infinite; }
.elephant.chewing   { animation: chewBounce 0.5s ease-in-out 3; }
.elephant.happy     { animation: happySway 1.5s ease-in-out infinite; filter: drop-shadow(0 6px 14px rgba(255,204,51,0.4)); }
.elephant.veryHappy { animation: happySway 1s ease-in-out infinite;   filter: drop-shadow(0 6px 18px rgba(255,204,51,0.6)); }
.elephant.ecstatic  { animation: trumpet 0.6s ease-in-out infinite;   filter: drop-shadow(0 6px 22px rgba(255,204,51,0.9)); }

@keyframes hungrySway {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-3px) scale(1.01); }
}
@keyframes chewBounce {
  0%,100% { transform: translateY(0) scale(1); }
  30%     { transform: translateY(-8px) scale(1.08); }
  60%     { transform: translateY(-2px) scale(0.98); }
}
@keyframes happySway {
  0%,100% { transform: translateY(0) rotate(0); }
  25%     { transform: translateY(-6px) rotate(-3deg); }
  75%     { transform: translateY(-6px) rotate(3deg); }
}
@keyframes trumpet {
  0%,100% { transform: translateY(0) scale(1) rotate(0); }
  25%     { transform: translateY(-14px) scale(1.12) rotate(-4deg); }
  50%     { transform: translateY(-8px) scale(1.08); }
  75%     { transform: translateY(-14px) scale(1.12) rotate(4deg); }
}

/* Mouth-open overlay (appears when eating) */
.elephant-mouth {
  position: absolute;
  top: 58%; left: 50%; transform: translateX(-50%);
  width: 30%; height: 22%;
  background: radial-gradient(ellipse at 50% 40%, #3a1a1a 0%, #1a0a0a 100%);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
}
.elephant-mouth.open {
  opacity: 0.9;
  transform: translateX(-50%) scale(1.25);
}

/* Trunk swing emoji layered over elephant */
.trunk-swing {
  position: absolute;
  top: 40%; left: 30%;
  font-size: clamp(20px, 5vw, 32px);
  opacity: 0;
  pointer-events: none;
  animation: trunkWave 0.8s ease-out;
}
@keyframes trunkWave {
  0%   { opacity: 0; transform: translateY(0) rotate(0); }
  40%  { opacity: 1; transform: translateY(-8px) rotate(-30deg); }
  80%  { opacity: 1; transform: translateY(-4px) rotate(25deg); }
  100% { opacity: 0; transform: translateY(0) rotate(0); }
}

/* Heart particles when fed */
.heart-puff {
  position: absolute;
  font-size: clamp(16px, 3.5vw, 24px);
  pointer-events: none;
  animation: heartPuff 1.1s ease-out forwards;
  z-index: 60;
}
@keyframes heartPuff {
  0%   { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
}

/* Chew particles */
.chew-crumb {
  position: absolute;
  font-size: 14px;
  pointer-events: none;
  animation: crumbFall 0.6s ease-out forwards;
  z-index: 55;
}
@keyframes crumbFall {
  0%   { transform: translateY(0) rotate(0); opacity: 1; }
  100% { transform: translateY(25px) rotate(90deg); opacity: 0; }
}

/* Sparkle trail */
.sparkle-trail {
  position: fixed;
  font-size: 14px;
  pointer-events: none;
  z-index: 55;
  animation: trailFade 0.4s ease-out forwards;
}
@keyframes trailFade {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.3) translateY(10px); opacity: 0; }
}

/* Elephant glow aura */
.elephant-aura {
  position: absolute; inset: -10px;
  border-radius: 50%;
  pointer-events: none;
  transition: box-shadow 0.8s, opacity 0.8s;
  opacity: 0;
}
.elephant-aura.active { opacity: 1; }
.elephant-aura.a1 { box-shadow: 0 0 30px rgba(47,122,59,0.4), 0 0 60px rgba(47,122,59,0.2); }
.elephant-aura.a2 { box-shadow: 0 0 35px rgba(255,204,51,0.45), 0 0 70px rgba(255,204,51,0.25); }
.elephant-aura.a3 { box-shadow: 0 0 40px rgba(255,140,42,0.5), 0 0 80px rgba(255,140,42,0.3); }
.elephant-aura.a4 { box-shadow: 0 0 45px rgba(233,79,109,0.55), 0 0 90px rgba(233,79,109,0.35); }
.elephant-aura.a5 {
  box-shadow: 0 0 60px rgba(255,204,51,0.55), 0 0 100px rgba(255,140,42,0.35), 0 0 140px rgba(233,79,109,0.3);
  animation: glowPulse 1s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: 0.7; }
  50%     { opacity: 1; }
}

/* Feedings counter (4 pips = full elephants fed) */
.feedings-counter {
  display: flex; gap: 6px; justify-content: center;
  margin-top: 6px;
}
.feeding-pip {
  width: clamp(18px, 4vw, 26px);
  height: clamp(18px, 4vw, 26px);
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(12px,2.8vw,16px);
  transition: all 0.3s;
}
.feeding-pip.filled {
  border-color: var(--sunshine);
  background: linear-gradient(135deg, var(--sunshine), var(--mango));
  animation: pipFill 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pipFill { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.3)} 100%{transform:scale(1.1)} }

/* ── Progress bar ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: calc(var(--z-ui) + 5);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(6px,1.5vw,10px);
  padding: 4px 10px 6px;
  background: rgba(10,42,20,0.92); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  min-width: clamp(38px,8.5vw,56px);
  height: clamp(28px,5.5vw,38px);
  padding: 0 8px;
  border-radius: 20px;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,3vw,20px); font-weight: 900;
  color: rgba(255,255,255,0.3);
  transition: all 0.3s;
}
.prog-dot.current {
  border-color: var(--mango);
  color: var(--mango);
}
.prog-dot.done {
  background: linear-gradient(135deg,var(--sunshine),var(--mango));
  border-color: var(--sunshine); color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.2)} 100%{transform:scale(1.1)} }

/* ── Round banner ── */
.round-banner {
  position: fixed; top: 42%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(10,42,20,0.94); backdrop-filter: blur(12px);
  border: 2px solid rgba(255,204,51,0.3); border-radius: 26px;
  padding: 22px 36px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--sunshine); text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(255,255,255,0.7); margin-top: 5px;
}

/* ── Celebration screen ── */
.screen-celeb {
  background: radial-gradient(ellipse at 50% 40%, rgba(15,107,58,0.75) 0%, rgba(10,42,20,0.95) 80%);
  backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(24px,6vw,44px); color: var(--sunshine);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(13px,3.2vw,20px); color: rgba(255,255,255,0.95); margin: 6px 0; text-shadow: 1px 1px 0 rgba(0,0,0,0.4); }
.celeb-stars { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-icon-row { display:flex; gap:14px; justify-content:center; align-items:center; margin-bottom:10px; }
.celeb-icon-row span { font-size:clamp(50px,13vw,82px); }
.celeb-elephant { font-size: clamp(80px, 20vw, 130px); animation: elephantBob 2s ease-in-out infinite; }
.celeb-baby {
  font-size: clamp(50px, 13vw, 80px);
  animation: babyWave 1.5s ease-in-out infinite;
  margin-top: 6px;
}
.celeb-dragon-text {
  font-size: clamp(14px, 3.5vw, 22px);
  color: var(--mango); font-weight: bold;
  margin: 8px 0;
  animation: fadeInUp 1s ease-out 0.5s both;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}
@keyframes elephantBob {
  0%,100% { transform: translateY(0) scale(1); }
  50%     { transform: translateY(-14px) scale(1.06); }
}
@keyframes babyWave {
  0%,100% { transform: translateY(0) rotate(-8deg); }
  50%     { transform: translateY(-6px) rotate(8deg); }
}
@keyframes fadeInUp {
  0%   { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ── Trumpet eruption ── */
.eruption-particle {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  animation: erupt 1.5s ease-out forwards;
  z-index: calc(var(--z-celeb) + 3);
}
@keyframes erupt {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(var(--ey)) translateX(var(--ex)) scale(0.3); opacity: 0; }
}

/* ── Particles & shared ── */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }

/* ── Keyframes ── */
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-22px) scale(1.08)} 70%{transform:translateY(-8px) scale(1.03)} }
@keyframes wrongShake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(9px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }
</style>

<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║  Aha! — Sequence 10-50: Feed the Elephant!  🐘                   ║
// ║  Tap 10 → 20 → 30 → 40 → 50 in order. 4 feedings = 4 rounds.     ║
// ║  Voice A (en-US-AnaNeural) · Jungle Safari theme                 ║
// ╚══════════════════════════════════════════════════════════════════╝

const AUDIO_BASE = '../../audio';

// ── Voice A clip pools ─────────────────────────────────────────────
const VOICE_A = {
  greetings: ['voice-a/greetings/here-we-go.mp3','voice-a/greetings/lets-go.mp3','voice-a/greetings/come-on-lets-play.mp3','voice-a/greetings/are-you-ready.mp3','voice-a/greetings/this-is-going-to-be-fun.mp3'],
  correct: ['voice-a/correct/amazing.mp3','voice-a/correct/brilliant.mp3','voice-a/correct/fantastic.mp3','voice-a/correct/i-knew-you-could-do-it.mp3','voice-a/correct/incredible.mp3','voice-a/correct/perfect.mp3','voice-a/correct/superstar.mp3','voice-a/correct/thats-right.mp3','voice-a/correct/well-done.mp3','voice-a/correct/wow-look-at-you-go.mp3','voice-a/correct/yes-youre-so-clever.mp3','voice-a/correct/you-got-it.mp3','voice-a/correct/youre-on-fire.mp3'],
  wrong: ['voice-a/wrong/almost-have-another-go.mp3','voice-a/wrong/dont-worry-try-again.mp3','voice-a/wrong/keep-trying-youre-so-close.mp3','voice-a/wrong/nearly-give-it-another-go.mp3','voice-a/wrong/not-quite-you-can-do-it.mp3','voice-a/wrong/oops-not-that-one.mp3'],
  thinking: ['voice-a/thinking/have-a-good-look.mp3','voice-a/thinking/i-believe-in-you.mp3','voice-a/thinking/take-your-time.mp3','voice-a/thinking/which-one-could-it-be.mp3','voice-a/thinking/you-can-do-it-keep-looking.mp3'],
  'round-complete': ['voice-a/round-complete/brilliant-round-keep-going.mp3','voice-a/round-complete/round-complete-amazing.mp3','voice-a/round-complete/round-done-youre-doing-so-well.mp3','voice-a/round-complete/you-did-it-on-to-the-next.mp3'],
  'game-complete': ['voice-a/game-complete/what-a-fantastic-player.mp3','voice-a/game-complete/you-are-a-superstar.mp3','voice-a/game-complete/you-did-the-whole-thing.mp3','voice-a/game-complete/you-finished-so-proud.mp3','voice-a/game-complete/youre-incredible-we-did-it.mp3'],
};
const NUMBERS = [10,20,30,40,50];
const NUMBER_WORDS = {10:'ten',20:'twenty',30:'thirty',40:'forty',50:'fifty'};
const EMOJI = {10:'🐵',20:'🦁',30:'🐘',40:'🦜',50:'🦒'};

// ══════════════════════════════════════════════════════════════════
// AUDIO CLASS (AudioContext-first with iOS fallback)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.08; this.sfxVol = 0.3; this.musicDucked = 0.025;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Jungle pentatonic — warm major key, safari vibe
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C D E G A C
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.4 ? 'triangle' : 'sine';
      o.frequency.value = f * (Math.random() > 0.7 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + 0.2);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.3);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.5);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 850 + Math.random() * 1300);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.15,0.2); p(554,t+0.1,0.18,0.25); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='chomp') {
      p(180, t, 0.08, 0.25, 'sawtooth');
      p(120, t+0.06, 0.1, 0.2, 'sawtooth');
      p(90, t+0.13, 0.12, 0.15, 'triangle');
    }
    else if (type==='splash') {
      p(400, t, 0.06, 0.3);
      p(250, t+0.03, 0.08, 0.2);
      p(600, t+0.06, 0.1, 0.15);
      p(180, t+0.1, 0.15, 0.1);
    }
    else if (type==='trumpet') {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(220, t);
      o.frequency.linearRampToValueAtTime(440, t+0.15);
      o.frequency.linearRampToValueAtTime(330, t+0.5);
      o.frequency.linearRampToValueAtTime(550, t+0.8);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.35, t+0.1);
      g.gain.linearRampToValueAtTime(0.3, t+0.6);
      g.gain.linearRampToValueAtTime(0, t+1.0);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+1.05);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
  }
  // Ascending sequence chime — pitch rises with each treat (5 tiers)
  toneSequence(idx) {
    this._init(); const t = this.ctx.currentTime;
    const freqs = [293.66, 329.63, 392.00, 440.00, 523.25]; // D E G A C ascending
    const f = freqs[Math.min(idx, freqs.length-1)];
    const p = (freq, s, d, v, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = freq;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    p(f, t, 0.25, 0.4);
    p(f * 1.5, t + 0.05, 0.2, 0.15);
    p(f * 2, t + 0.08, 0.15, 0.1, 'triangle');
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_A[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakNumber(n)   { return this.speak(`${AUDIO_BASE}/numbers/${n}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click', e => { if(t)return; fn(e); });
}

// Leaf-count patterns — show tens as groups of leaves (rows of 5)
function makeDots(n) {
  const tens = n / 10; // 1..5
  const leaf = '🌿';
  if (tens <= 5) return leaf.repeat(tens);
  // (never hit in 10-50, but safe)
  return leaf.repeat(5) + '\n' + leaf.repeat(tens - 5);
}

// ══════════════════════════════════════════════════════════════════
// VISUAL EFFECTS
// ══════════════════════════════════════════════════════════════════
function confetti(count = 40, extra = []) {
  const all = ['⭐','✨','💫','🌟','🎉','🌿','🍌','🥭','🍃','🦜', ...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti'; el.textContent = pick(all);
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top  = '-30px';
    el.style.fontSize = (16 + Math.random()*14) + 'px';
    el.style.animationDelay    = (Math.random()*1.8) + 's';
    el.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6200);
  }
}

function starBurst(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'starburst';
    s.textContent = pick(['✨','💫','⭐','🌟','🌿','💛']);
    s.style.left = (cx + (Math.random()-0.5)*140) + 'px';
    s.style.top  = (cy + (Math.random()-0.5)*140) + 'px';
    s.style.animationDelay = (Math.random()*0.15) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

// ══════════════════════════════════════════════════════════════════
// ELEPHANT MANAGEMENT
// ══════════════════════════════════════════════════════════════════
let treatsFed = 0;     // 0-5 per sequence
let animalsFed = 0;    // 0-4 total (feedings)

function resetElephant() {
  treatsFed = 0;
  updateElephantState();
}

function updateElephantState() {
  const el = $('elephant');
  const aura = $('elephantAura');

  el.classList.remove('hungry','chewing','happy','veryHappy','ecstatic');
  aura.classList.remove('active','a1','a2','a3','a4','a5');

  if (treatsFed === 0) {
    el.classList.add('hungry');
  } else if (treatsFed === 1) {
    el.classList.add('happy');
    aura.classList.add('active','a1');
  } else if (treatsFed === 2) {
    el.classList.add('happy');
    aura.classList.add('active','a2');
  } else if (treatsFed === 3) {
    el.classList.add('veryHappy');
    aura.classList.add('active','a3');
  } else if (treatsFed === 4) {
    el.classList.add('veryHappy');
    aura.classList.add('active','a4');
  } else if (treatsFed >= 5) {
    el.classList.add('ecstatic');
    aura.classList.add('active','a5');
  }
}

function markFeeding(idx) {
  const pip = $('pip' + idx);
  if (pip) pip.classList.add('filled');
}

// ══════════════════════════════════════════════════════════════════
// SCENERY — floating jungle critters
// ══════════════════════════════════════════════════════════════════
function buildScenery() {
  const emojis = ['🦜','🦋','🐛','🌿','🍃','🌺','☀️','🦎','🐵','🌴','🦒','🦁'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'bg-element';
    el.textContent = pick(emojis);
    el.style.left              = (Math.random()*100) + 'vw';
    el.style.animationDelay    = (-Math.random()*20) + 's';
    el.style.animationDuration = (12 + Math.random()*16) + 's';
    document.body.appendChild(el);
  }
}

// ══════════════════════════════════════════════════════════════════
// ROUND CONFIG — ALL rounds use the same 10→20→30→40→50 sequence
// ══════════════════════════════════════════════════════════════════
const ROUNDS = [
  { label:'Round 1 — Feed the Elephant! 🐘',  sub:'Tap 10, 20, 30, 40, 50 in order! Hints will help.', display:'full',  hintMode:'strong' },
  { label:'Round 2 — Again! 🦜',              sub:'No hints this time! You know the way.',             display:'full',  hintMode:'none'   },
  { label:'Round 3 — Count the Leaves! 🌿',    sub:'Count the leaf patterns to find the order!',         display:'dots',  hintMode:'none'   },
  { label:'Round 4 — Speed Safari! 🏆',       sub:'Quick! The elephant is hungry again!',               display:'full',  hintMode:'none', timer:true, smaller:true },
];

// ══════════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let round = 0, score = 0;
let nextTapIdx = 0;     // index into NUMBERS (0-4)
let currentNumbers = NUMBERS.slice(); // always [10,20,30,40,50]
let treatEls = {};      // keyed by number
let hintTimer = null, hintVoiceTimer = null;

// ══════════════════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id) $(id).classList.add('active');
}

// ══════════════════════════════════════════════════════════════════
// PROGRESS BAR — 5 treats per sequence (10,20,30,40,50)
// ══════════════════════════════════════════════════════════════════
function buildProg() {
  const bar = $('progBar');
  bar.innerHTML = ''; bar.style.display = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot'; d.id = 'pdot' + i;
    d.textContent = currentNumbers[i];
    bar.appendChild(d);
  }
}
function markProg(idx) {
  const d = $('pdot' + idx);
  if (d) {
    d.textContent = EMOJI[currentNumbers[idx]];
    d.classList.add('done');
  }
}
function highlightProg(idx) {
  for (let i = 0; i < 5; i++) {
    const d = $('pdot' + i);
    if (d) d.classList.toggle('current', i === idx);
  }
}

// ══════════════════════════════════════════════════════════════════
// HINT SYSTEM
// ══════════════════════════════════════════════════════════════════
function clearHints() { clearTimeout(hintTimer); clearTimeout(hintVoiceTimer); }
function resetHints() {
  clearHints();
  if (!gameActive) return;
  const cfg = ROUNDS[round];
  if (cfg.hintMode === 'none') return;

  hintTimer = setTimeout(() => {
    const targetNum = currentNumbers[nextTapIdx];
    const treat = treatEls[targetNum];
    if (treat && gameActive) {
      treat.classList.add('wiggle');
      audio.tone('hint');
      setTimeout(() => treat.classList.remove('wiggle'), 700);
    }
  }, 4000);
  hintVoiceTimer = setTimeout(() => {
    if (gameActive) {
      audio.play('thinking');
      setTimeout(() => { if (gameActive) audio.speakNumber(currentNumbers[nextTapIdx]); }, 1200);
    }
  }, 7000);
}

// ══════════════════════════════════════════════════════════════════
// POSITION GENERATION — random positions with minimum spacing
// ══════════════════════════════════════════════════════════════════
function generatePositions(count, smaller) {
  const area = $('playArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const treatW = smaller ? Math.min(Math.max(64, areaW * 0.16), 92) : Math.min(Math.max(78, areaW * 0.19), 112);
  const treatH = treatW * 1.3;
  const margin = treatW * 0.5;
  const minDist = treatW * 1.4;

  const positions = [];
  for (let i = 0; i < count; i++) {
    let tries = 0;
    let x, y;
    do {
      x = margin + Math.random() * (areaW - margin * 2 - treatW);
      y = margin + 16 + Math.random() * (areaH - margin * 2 - treatH);
      tries++;
      if (tries > 300) break;
    } while (positions.some(p => {
      const dx = p.x - x, dy = p.y - y;
      return Math.sqrt(dx*dx + dy*dy) < minDist;
    }));
    positions.push({ x, y });
  }
  return positions;
}

// ══════════════════════════════════════════════════════════════════
// RENDER TREATS
// ══════════════════════════════════════════════════════════════════
function renderTreats() {
  const area = $('playArea');
  const cfg = ROUNDS[round];

  area.querySelectorAll('.treat').forEach(n => n.remove());
  treatEls = {};

  const positions = generatePositions(5, cfg.smaller);
  const shuffledOrder = shuffle([...Array(5).keys()]); // random placement order

  shuffledOrder.forEach((seqIdx, posIdx) => {
    const num = currentNumbers[seqIdx];
    const treat = document.createElement('div');
    treat.className = 'treat';
    if (cfg.smaller) treat.classList.add('r4-size');
    treat.style.background = TREAT_COLORS[num];
    treat.style.left = positions[posIdx].x + 'px';
    treat.style.top  = positions[posIdx].y + 'px';
    treat.dataset.num = num;

    let inner = '';
    if (cfg.display === 'full') {
      inner = `<div class="treat-numeral">${num}</div>
               <div class="treat-emoji">${EMOJI[num]}</div>
               <div class="treat-word">${NAME[num]}</div>`;
    } else if (cfg.display === 'dots') {
      // Leaf count pattern + small numeral
      inner = `<div class="treat-numeral" style="font-size:clamp(13px,3vw,18px);opacity:0.8">${num}</div>
               <div class="treat-dots">${makeDots(num)}</div>`;
    }
    treat.innerHTML = inner;

    onTap(treat, () => handleTreatTap(treat, num));
    area.appendChild(treat);
    treatEls[num] = treat;

    setTimeout(() => treat.classList.add('show'), 100 + posIdx * 120);
  });

  area.classList.add('active');

  // Initial hint for round 1
  setTimeout(() => {
    if (cfg.hintMode === 'strong') {
      const firstTreat = treatEls[currentNumbers[0]];
      if (firstTreat) firstTreat.classList.add('next-hint');
    }
  }, 700);
}

// ══════════════════════════════════════════════════════════════════
// FLY-TO-ELEPHANT ANIMATION (SATISFYING!)
// ══════════════════════════════════════════════════════════════════
function flyToElephant(treat) {
  return new Promise(resolve => {
    const treatRect = treat.getBoundingClientRect();
    const elephant = $('elephant');
    const elephantRect = elephant.getBoundingClientRect();

    const startX = treatRect.left;
    const startY = treatRect.top;
    const endX = elephantRect.left + elephantRect.width/2 - treatRect.width/2;
    const endY = elephantRect.top + elephantRect.height*0.5 - treatRect.height/2;

    treat.classList.add('flying');
    treat.style.position = 'fixed';
    treat.style.left = startX + 'px';
    treat.style.top  = startY + 'px';
    treat.style.zIndex = '55';

    const duration = 350; // snappy!
    const startTime = performance.now();
    let lastTrail = 0;

    // Pre-open mouth halfway
    setTimeout(() => $('elephantMouth').classList.add('open'), duration * 0.5);

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // Ease-in for gravity feel
      const ease = progress * progress;

      const curX = startX + (endX - startX) * ease;
      // Nice arc — up high then down into mouth
      const arcHeight = -90;
      const curY = startY + (endY - startY) * ease + arcHeight * Math.sin(progress * Math.PI);

      const scale = 1 - progress * 0.5;
      const rot = progress * 540; // tumble 1.5 turns
      treat.style.left = curX + 'px';
      treat.style.top  = curY + 'px';
      treat.style.transform = `scale(${scale}) rotate(${rot}deg)`;

      // Sparkle trail every ~45ms
      if (now - lastTrail > 45) {
        spawnTrail(curX + treatRect.width/2, curY + treatRect.height/2);
        lastTrail = now;
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        // CHOMP!
        treat.style.display = 'none';
        audio.tone('chomp');
        elephantChompEffect();

        // Trigger chew animation
        const eEl = $('elephant');
        eEl.classList.remove('chewing');
        void eEl.offsetWidth;
        eEl.classList.add('chewing');

        resolve();
      }
    }
    requestAnimationFrame(animate);
  });
}

// ══════════════════════════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════════════════════════
function updateHud() {
  const targetNum = currentNumbers[nextTapIdx];
  if (nextTapIdx < 5) {
    $('hudFind').textContent = `Feed ${targetNum}`;
  } else {
    $('hudFind').textContent = '🐘 Full!';
  }
}

// ══════════════════════════════════════════════════════════════════
// HANDLE TREAT TAP
// ══════════════════════════════════════════════════════════════════
async function handleTreatTap(treatEl, num) {
  if (!gameActive) return;
  clearHints();

  const targetNum = currentNumbers[nextTapIdx];

  if (num === targetNum) {
    // ✓ CORRECT
    gameActive = false;

    treatEl.classList.remove('next-hint', 'wiggle');
    treatEl.classList.add('activated');
    starBurst(treatEl);

    // Ascending chime
    audio.toneSequence(nextTapIdx);

    score++;
    $('hudScore').textContent = score;

    // Zara reacts
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT), 1800);

    // Voice: speak the number ONCE per correct tap (fire-and-forget)
    audio.speakNumber(num);

    // Mark progress
    markProg(nextTapIdx);

    await delay(240);

    // Fly treat to elephant!
    await flyToElephant(treatEl);

    // Update elephant mood
    treatsFed++;
    updateElephantState();

    await delay(160);

    nextTapIdx++;
    highlightProg(nextTapIdx);
    updateHud();

    if (nextTapIdx >= 5) {
      // Sequence complete! Elephant fed!
      await celebrateSequence();
    } else {
      // Highlight next treat hint (round 1 only)
      const cfg = ROUNDS[round];
      if (cfg.hintMode === 'strong') {
        const nextTreat = treatEls[currentNumbers[nextTapIdx]];
        if (nextTreat) nextTreat.classList.add('next-hint');
      }
      gameActive = true;
      resetHints();
    }

  } else {
    // ✗ WRONG
    treatEl.classList.add('wrong-tap');
    audio.tone('wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1900);

    audio.play('wrong');
    // Speak the correct target number after a beat
    setTimeout(() => audio.speakNumber(targetNum), 600);
    setTimeout(() => {
      treatEl.classList.remove('wrong-tap');
      resetHints();
    }, 480);
  }
}

// ══════════════════════════════════════════════════════════════════
// CELEBRATE SEQUENCE COMPLETION — ELEPHANT FED!
// ══════════════════════════════════════════════════════════════════
async function celebrateSequence() {
  $('playArea').classList.remove('timer-warning');

  // Max-happy elephant
  treatsFed = 5;
  updateElephantState();

  audio.tone('celeb');

  // Elephant fed! — confetti + bubble immediately, voice in background
  showCharBubble(pick(BUBBLE_FED), 2000);
  confetti(25, ['🐘','💛','✨','🌟','🌿','🍌']);
  audio.play('correct'); // don't await — transition proceeds while voice plays

  markFeeding(animalsFed);
  animalsFed++;

  await delay(650);
  await finishRound();
}

// ══════════════════════════════════════════════════════════════════
// ROUND TRANSITIONS
// ══════════════════════════════════════════════════════════════════
async function finishRound() {
  gameActive = false;
  clearHints();

  $('playArea').querySelectorAll('.treat').forEach(n => n.remove());
  $('playArea').classList.remove('active', 'timer-warning');

  audio.tone('roundDone');
  confetti(30, ['🐘','🌿','✨','💛']);
  round++;

  if (round >= ROUNDS.length) {
    await delay(600);
    celebrateFinish();
    return;
  }

  // ── Round complete banner (snappy) ──
  $('roundTitle').textContent = '🐘 Elephant Fed! 🐘';
  $('roundSub').textContent   = 'Zara is delighted!';
  $('roundBanner').classList.add('show');
  audio.play('round-complete'); // don't await — banner shows while voice plays
  await delay(1400);
  $('roundBanner').classList.remove('show');
  await delay(180);

  // ── Next round intro banner (snappy) ──
  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await delay(1200);
  $('roundBanner').classList.remove('show');
  await delay(150);

  startRound();
}

function startRound() {
  const cfg = ROUNDS[round];
  currentNumbers = NUMBERS.slice(); // always 10→20→30→40→50
  $('hudRound').textContent = `${round + 1}/4`;
  resetElephant();
  buildProg();
  startAttempt();
}

// ══════════════════════════════════════════════════════════════════
// START ATTEMPT (each round = 1 sequence)
// ══════════════════════════════════════════════════════════════════
async function startAttempt() {
  nextTapIdx = 0;
  updateHud();
  highlightProg(0);
  renderTreats();
  gameActive = true;

  audio.tone('reveal');
  // Speak the first target (fire-and-forget — keep pacing snappy)
  audio.speakNumber(currentNumbers[0]);

  resetHints();

  if (ROUNDS[round].timer) {
    $('playArea').classList.remove('timer-warning');
    void $('playArea').offsetWidth;
    $('playArea').classList.add('timer-warning');
  }
}

// ══════════════════════════════════════════════════════════════════
// FINAL CELEBRATION — TRUMPET + BABY ELEPHANT!
// ══════════════════════════════════════════════════════════════════
async function celebrateFinish() {
  gameActive = false;
  audio.stopMusic();
  $('hud').style.display       = 'none';
  $('progBar').style.display   = 'none';
  $('roundBanner').classList.remove('show');
  $('playArea').classList.remove('active');

  // Trumpet eruption!
  elephantErupt();
  audio.tone('trumpet');
  await delay(800);
  audio.tone('trumpet');
  await delay(400);

  // Hide elephant after eruption
  $('elephantArea').style.display = 'none';
  $('charArea').style.display   = 'none';

  confetti(60, ['🐘','💛','🌿','🌟','🌺','🦜','🎉']);

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 5)));
  $('celebStars').textContent = '⭐'.repeat(stars);

  showScreen('scrCeleb');
  audio.tone('celeb');
  await delay(200);

  // Two celebration voice clips
  await audio.play('game-complete');
  await delay(400);
  confetti(50, ['🐘','💛','🌿','🌟','🍌']);
  await audio.play('game-complete');
}

// ══════════════════════════════════════════════════════════════════
// INIT & START
// ══════════════════════════════════════════════════════════════════
function resetGame() {
  round = 0; score = 0; animalsFed = 0;
  nextTapIdx = 0;
  treatsFed = 0;
  $('hudScore').textContent = '0';

  // Reset feeding pips
  for (let i = 0; i < 4; i++) {
    const pip = $('pip' + i);
    if (pip) pip.classList.remove('filled');
  }

  // Reset elephant
  $('elephantArea').style.display = '';
  resetElephant();
}

async function startGame() {
  audio.startMusic();

  resetGame();
  showScreen(null);

  $('hud').style.display     = '';
  $('charArea').style.display = '';

  // First round intro (snappy)
  const cfg = ROUNDS[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  audio.play('greetings'); // don't await — show banner while voice plays
  await delay(1400);
  $('roundBanner').classList.remove('show');
  await delay(180);

  startRound();
}

// ── BOOT ─────────────────────────────────────────────────────────
buildScenery();

onTap($('btnStart'), () => { audio.unlock(); startGame(); });
onTap($('btnAgain'), () => {
  showScreen(null);
  startGame();
});
</script>
