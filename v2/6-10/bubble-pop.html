<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ghost Busters</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --purple: #1a0a2e; --deep-purple: #2d1654; --orange: #ff8c00; --teal: #1a5c5c;
  --gold: #ffe066; --white85: rgba(255,255,255,0.85); --glow-orange: rgba(255,140,0,0.6);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: linear-gradient(180deg, #0d0520 0%, #1a0a2e 40%, #2d1654 70%, #1a0a2e 100%);
}

/* Background stars & bats */
.bg-star {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  font-size: clamp(8px, 1.5vw, 14px);
  opacity: 0.3;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:0.6;transform:scale(1.1)} }

.bg-bat {
  position: fixed; pointer-events: none; z-index: var(--z-bg);
  font-size: clamp(16px, 3vw, 24px);
  opacity: 0.25;
  animation: batFly linear infinite;
}
@keyframes batFly {
  0%   { transform: translateX(-60px) translateY(0) scaleX(1); }
  25%  { transform: translateX(25vw) translateY(-20px) scaleX(-1); }
  50%  { transform: translateX(50vw) translateY(10px) scaleX(1); }
  75%  { transform: translateX(75vw) translateY(-15px) scaleX(-1); }
  100% { transform: translateX(110vw) translateY(0) scaleX(1); }
}

/* Screen system */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* Title screen */
.screen-title .icon-row {
  display: flex; gap: 10px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(36px, 9vw, 60px); }
.screen-title h1 {
  font-size: clamp(28px, 7vw, 50px);
  color: var(--orange);
  text-shadow: 0 0 30px var(--glow-orange), 2px 2px 0 rgba(0,0,0,0.5);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(14px, 3.5vw, 20px);
  color: var(--white85);
  max-width: 380px; line-height: 1.45;
}

/* Buttons */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.4);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg, #ff8c00, #ff5500); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; }
.btn-again { background: linear-gradient(135deg, #ff8c00, #ff5500); margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }

/* HUD */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(13,5,32,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(255,140,0,0.15);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.38); font-weight: bold; letter-spacing: 0.05em; }
.hud-val   { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--orange); }
.hud-score .hud-val { color: var(--gold); }
.hud-target {
  display: flex; flex-direction: column; align-items: center;
}
.hud-target-label { font-size: clamp(10px,2.2vw,12px); color: rgba(255,255,255,0.5); font-weight: bold; }
.hud-target-num {
  font-size: clamp(28px,6vw,42px); font-weight: 900;
  color: var(--orange);
  text-shadow: 0 0 20px var(--glow-orange), 0 0 40px var(--glow-orange);
  line-height: 1;
}
.hud-target-word {
  font-size: clamp(12px,2.5vw,16px); font-weight: bold;
  color: var(--gold); opacity: 0.8;
}

/* Lantern area */
.lantern-area {
  position: fixed; bottom: 60px; right: 10px;
  z-index: var(--z-char);
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
}
.lantern-emoji {
  font-size: clamp(40px, 10vw, 65px);
  filter: drop-shadow(0 0 8px rgba(255,140,0,0.3));
  transition: filter 0.5s;
}
.lantern-emoji.glow-1 { filter: drop-shadow(0 0 12px rgba(255,140,0,0.5)); }
.lantern-emoji.glow-2 { filter: drop-shadow(0 0 18px rgba(255,140,0,0.7)); }
.lantern-emoji.glow-3 { filter: drop-shadow(0 0 25px rgba(255,140,0,0.85)); }
.lantern-emoji.glow-4 { filter: drop-shadow(0 0 35px rgba(255,200,0,1)); }
.lantern-emoji.glow-full {
  filter: drop-shadow(0 0 40px rgba(255,200,0,1));
  animation: lanternPulse 0.8s ease-in-out infinite;
}
@keyframes lanternPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.lantern-count {
  font-size: clamp(14px,3vw,20px); font-weight: 900;
  color: var(--gold); margin-top: 2px;
}

/* Character (Luna) */
.char-area {
  position: fixed; bottom: 58px; left: 10px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji { font-size: clamp(40px,9vw,60px); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96); color: var(--purple);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(12px,2.6vw,16px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.3);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.96);
}

/* Ghost play area */
.play-area {
  position: fixed;
  top: 65px; left: 0; right: 0; bottom: 50px;
  z-index: var(--z-game);
  overflow: hidden;
}

/* Ghost */
.ghost {
  position: absolute;
  width: clamp(70px, 18vw, 100px);
  height: clamp(85px, 22vw, 120px);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  z-index: var(--z-game);
  transition: transform 0.1s;
}
.ghost:active { transform: scale(0.92); }
.ghost-body {
  position: relative;
  width: 100%; height: 100%;
  background: rgba(255,255,255,0.82);
  border-radius: 50% 50% 35% 35%;
  box-shadow: 0 0 15px rgba(255,255,255,0.3), inset 0 -5px 15px rgba(200,200,255,0.2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}
/* Wavey bottom edge */
.ghost-body::after {
  content: '';
  position: absolute; bottom: -6px; left: -5%; right: -5%;
  height: 18px;
  background:
    radial-gradient(ellipse at 15% 0%, rgba(255,255,255,0.82) 50%, transparent 52%),
    radial-gradient(ellipse at 45% 0%, rgba(255,255,255,0.82) 50%, transparent 52%),
    radial-gradient(ellipse at 75% 0%, rgba(255,255,255,0.82) 50%, transparent 52%);
  background-size: 38% 100%;
  background-repeat: no-repeat;
  background-position: 0% 0%, 33% 0%, 66% 0%;
}
/* Ghost face */
.ghost-face {
  display: flex; gap: clamp(8px,2vw,14px);
  margin-bottom: 2px;
  margin-top: clamp(4px,1vw,8px);
}
.ghost-eye {
  width: clamp(7px,2vw,10px); height: clamp(7px,2vw,10px);
  background: #333; border-radius: 50%;
}
.ghost-smile {
  width: clamp(16px,4vw,24px); height: clamp(8px,2vw,12px);
  border: none; border-bottom: 2.5px solid #555;
  border-radius: 0 0 50% 50%;
  margin-top: -2px;
}
/* Ghost number */
.ghost-number {
  font-size: clamp(22px, 5.5vw, 34px);
  font-weight: 900;
  color: var(--purple);
  line-height: 1;
  margin-top: 1px;
}
.ghost-word {
  font-size: clamp(9px, 2vw, 12px);
  font-weight: bold;
  color: #555;
  line-height: 1;
}
.ghost-dots {
  font-size: clamp(8px, 1.8vw, 11px);
  line-height: 1.1;
  text-align: center;
  max-width: 85%;
}

/* Ghost float animation */
.ghost-floating {
  animation: ghostFloat linear forwards;
}
@keyframes ghostFloat {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
  3%   { opacity: 1; }
  92%  { opacity: 1; }
  100% { transform: translateY(calc(-100vh - 140px)) rotate(8deg); opacity: 0; }
}

/* Ghost wiggle on wrong tap */
.ghost-wrong {
  animation: ghostWiggle 0.5s ease-in-out;
}
@keyframes ghostWiggle {
  0%,100% { transform: rotate(0) scale(1); }
  20% { transform: rotate(-12deg) scale(1.05); }
  40% { transform: rotate(10deg) scale(1.05); }
  60% { transform: rotate(-8deg) scale(1.02); }
  80% { transform: rotate(6deg) scale(1.02); }
}

/* Ghost captured - fly to lantern */
.ghost-captured {
  transition: all 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
  opacity: 0 !important;
  transform: scale(0.3) !important;
}

/* BOO text */
.boo-text {
  position: absolute;
  font-size: clamp(16px,4vw,24px);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,140,0,0.8);
  pointer-events: none;
  animation: booFloat 0.8s ease-out forwards;
  z-index: calc(var(--z-game) + 5);
}
@keyframes booFloat {
  0% { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
}

/* Progress bar */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(4px,1.2vw,8px); flex-wrap: wrap;
  padding: 5px 10px 8px;
  background: rgba(13,5,32,0.92); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(28px,5.5vw,38px);
  height: clamp(28px,5.5vw,38px);
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,2.8vw,18px);
  color: rgba(255,255,255,0.22);
}
.prog-dot.done {
  background: linear-gradient(135deg, var(--orange), #ff5500);
  border-color: var(--gold); color: #fff;
  animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* Round banner */
.round-banner {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(13,5,32,0.94); backdrop-filter: blur(12px);
  border: 2px solid rgba(255,140,0,0.2); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--orange); text-shadow: 0 0 15px var(--glow-orange);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(255,255,255,0.6); margin-top: 5px;
}

/* Celebration screen */
.screen-celeb {
  background: rgba(13,5,32,0.92); backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(26px,6.5vw,48px); color: var(--gold);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(14px,3.5vw,22px); color: rgba(255,255,255,0.9); margin: 6px 0; }
.celeb-stars   { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-icon-row { display:flex; gap:12px; justify-content:center; align-items:center; margin-bottom:10px; }
.celeb-icon-row span { font-size:clamp(50px,13vw,82px); }
.celeb-luna-dance { animation: dance 1s ease-in-out infinite; display: inline-block; }

/* Particles */
.confetti  { position:fixed; z-index:calc(var(--z-celeb)+5); pointer-events:none; font-size:22px; animation:cfall linear forwards; }
.starburst { position:fixed; pointer-events:none; z-index:calc(var(--z-celeb)+2); font-size:26px; animation:starpop 0.7s ease-out forwards; }

/* Keyframes */
@keyframes bounce      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes dance       { 0%,100%{transform:translateY(0) rotate(0) scale(1)} 15%{transform:translateY(-18px) rotate(-8deg) scale(1.08)} 30%{transform:translateY(0) rotate(8deg)} 45%{transform:translateY(-12px) rotate(-5deg) scale(1.05)} 60%{transform:translateY(0) rotate(5deg)} 75%{transform:translateY(-8px) rotate(-3deg) scale(1.08)} }
@keyframes charJump    { 0%,100%{transform:translateY(0) scale(1)} 35%{transform:translateY(-22px) scale(1.08)} 70%{transform:translateY(-8px) scale(1.03)} }
@keyframes wiggle      { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-6deg) scale(1.05)} 75%{transform:rotate(6deg) scale(1.05)} }
@keyframes cfall       { 0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0.4} }
@keyframes starpop     { 0%{transform:scale(0) rotate(0);opacity:1} 60%{transform:scale(1.4) rotate(200deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0} }
</style>
</head>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <span class="hud-label">ROUND</span>
    <span class="hud-val" id="hudRound">1/4</span>
  </div>
  <div class="hud-center hud-target">
    <span class="hud-target-label">CAPTURE THE</span>
    <span class="hud-target-num" id="hudTargetNum">8</span>
    <span class="hud-target-word" id="hudTargetWord">eight</span>
  </div>
  <div class="hud-right hud-score">
    <span class="hud-label">STARS</span>
    <span class="hud-val" id="hudScore">0</span>
  </div>
</div>

<!-- Ghost play area -->
<div class="play-area" id="playArea"></div>

<!-- Luna character -->
<div class="char-area" id="charArea" style="display:none">
  <div class="char-bubble" id="charBubble"></div>
  <div class="char-emoji">&#x1F9D9;&#x200D;&#x2640;&#xFE0F;</div>
</div>

<!-- Lantern -->
<div class="lantern-area" id="lanternArea" style="display:none">
  <div class="lantern-emoji" id="lanternEmoji">&#x1F383;</div>
  <div class="lantern-count" id="lanternCount">0/5</div>
</div>

<!-- Progress bar -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- Round banner -->
<div class="round-banner" id="roundBanner">
  <h2 id="roundTitle"></h2>
  <p id="roundSub"></p>
</div>

<!-- TITLE SCREEN -->
<div class="screen screen-title active" id="scrTitle">
  <div class="icon-row">
    <span>&#x1F47B;</span>
    <span>&#x1F9D9;&#x200D;&#x2640;&#xFE0F;</span>
    <span>&#x1F47B;</span>
  </div>
  <h1>Ghost Busters!</h1>
  <p>Friendly ghosts are floating away with Luna's spell numbers! Pop the right ghosts to capture them safely!</p>
  <button class="btn btn-start" id="btnStart">Let's Play!</button>
</div>

<!-- CELEBRATION SCREEN -->
<div class="screen screen-celeb" id="scrCeleb">
  <div class="celeb-icon-row">
    <span>&#x1F383;</span>
    <span class="celeb-luna-dance">&#x1F9D9;&#x200D;&#x2640;&#xFE0F;</span>
    <span>&#x1F383;</span>
  </div>
  <h2 id="celebTitle">All Ghosts Captured!</h2>
  <p id="celebMsg">Luna's lantern is full of spell numbers!</p>
  <div class="celeb-stars" id="celebStars"></div>
  <button class="btn btn-again" id="btnAgain">Play Again!</button>
</div>

<script>

const VOICE_B = {

// ====================================================================
// AUDIO CLASS (AudioContext-first for iOS)
// ====================================================================
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.06; this.sfxVol = 0.3; this.musicDucked = 0.018;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Spooky pentatonic: minor scale feel
    const notes = [196.00, 233.08, 261.63, 293.66, 349.23, 392.00];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.6 ? 'triangle' : 'sine';
      o.frequency.value = f * (Math.random() > 0.7 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + 0.2);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.5);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.8);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 600 + Math.random() * 1400);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')   { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')     { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')     { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone') { p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='pop')       { p(700,t,0.08,0.25); p(900,t+0.04,0.1,0.2); }
    else if (type==='hint')      { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')    {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='reveal')    { p(440,t,0.1,0.2); p(554.37,t+0.08,0.12,0.25); p(659.25,t+0.16,0.15,0.3); }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakNumber(n)   { return this.speak(`${AUDIO_BASE}/numbers/${n}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ====================================================================
// UTILITIES
// ====================================================================
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function pick(a)    { return a[Math.floor(Math.random()*a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if(t)return; t=true; fn(e); setTimeout(()=>t=false,300); }, {passive:false});
  el.addEventListener('click',      e => { if(t)return; fn(e); });
}

const NUMBER_WORDS = {6:'six',7:'seven',8:'eight',9:'nine',10:'ten'};
const ALL_NUMBERS = [6,7,8,9,10];

const BUBBLE_CORRECT = ['Got one!','Yes!','Captured!','Spooky good!','Magic!','Into the lantern!'];
const BUBBLE_WRONG   = ['BOO!','Not that one!','Try again!','Wrong ghost!','Keep looking!'];

// ====================================================================
// VISUAL EFFECTS
// ====================================================================
function confetti(count = 40, extra = []) {
  const all = ['⭐','✨','💫','🌟','🎃','👻','🦇','🔮','💜','🧡', ...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti'; el.textContent = pick(all);
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top  = '-30px';
    el.style.fontSize = (16 + Math.random()*14) + 'px';
    el.style.animationDelay    = (Math.random()*1.8) + 's';
    el.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6200);
  }
}

function starBurst(x, y) {
  for (let i = 0; i < 7; i++) {
    const s = document.createElement('div');
    s.className = 'starburst';
    s.textContent = pick(['✨','💫','⭐','🧡','🌟','🔮']);
    s.style.left = (x + (Math.random()-0.5)*100) + 'px';
    s.style.top  = (y + (Math.random()-0.5)*100) + 'px';
    s.style.animationDelay = (Math.random()*0.2) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

function showCharBubble(text, dur = 2200) {
  const b = $('charBubble');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), dur);
}

function jumpChar() {
  const el = $('charArea');
  el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'charJump 0.5s ease-out';
}

// Make dots pattern for a number
function makeDots(n) {
  return '👻'.repeat(n);
}

// ====================================================================
// BACKGROUND
// ====================================================================
function createBackground() {
  // Stars
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'bg-star';
    s.textContent = pick(['✨','⭐','💫']);
    s.style.left = (Math.random()*100)+'vw';
    s.style.top  = (Math.random()*100)+'vh';
    s.style.animationDelay = (Math.random()*4)+'s';
    s.style.animationDuration = (2+Math.random()*3)+'s';
    document.body.appendChild(s);
  }
  // Bats
  for (let i = 0; i < 4; i++) {
    const b = document.createElement('div');
    b.className = 'bg-bat';
    b.textContent = '🦇';
    b.style.top = (10+Math.random()*40)+'vh';
    b.style.animationDuration = (12+Math.random()*10)+'s';
    b.style.animationDelay = (Math.random()*8)+'s';
    document.body.appendChild(b);
  }
}

// ====================================================================
// PROGRESS BAR
// ====================================================================
function buildProgBar() {
  const bar = $('progBar');
  bar.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot';
    d.id = 'progDot'+i;
    d.textContent = (i+1);
    bar.appendChild(d);
  }
}

function markProgDone(round) {
  const d = $('progDot'+round);
  if (d) d.classList.add('done');
}

// ====================================================================
// LANTERN
// ====================================================================
function updateLantern(caught, needed) {
  $('lanternCount').textContent = caught + '/' + needed;
  const ratio = caught / needed;
  const emoji = $('lanternEmoji');
  emoji.className = 'lantern-emoji';
  if (ratio >= 1)        emoji.classList.add('glow-full');
  else if (ratio >= 0.8) emoji.classList.add('glow-4');
  else if (ratio >= 0.6) emoji.classList.add('glow-3');
  else if (ratio >= 0.4) emoji.classList.add('glow-2');
  else if (ratio >= 0.2) emoji.classList.add('glow-1');
}

// ====================================================================
// GHOST CREATION
// ====================================================================
function createGhost(number, displayMode, floatDuration) {
  const ghost = document.createElement('div');
  ghost.className = 'ghost';
  ghost.dataset.number = number;

  const body = document.createElement('div');
  body.className = 'ghost-body';

  // Face
  const face = document.createElement('div');
  face.className = 'ghost-face';
  const eye1 = document.createElement('div'); eye1.className = 'ghost-eye';
  const eye2 = document.createElement('div'); eye2.className = 'ghost-eye';
  face.appendChild(eye1);
  face.appendChild(eye2);
  body.appendChild(face);

  // Smile
  const smile = document.createElement('div');
  smile.className = 'ghost-smile';
  body.appendChild(smile);

  // Number display based on mode
  if (displayMode === 'numeral-word') {
    // Round 1: big numeral + small word
    const numEl = document.createElement('div');
    numEl.className = 'ghost-number';
    numEl.textContent = number;
    body.appendChild(numEl);
    const wordEl = document.createElement('div');
    wordEl.className = 'ghost-word';
    wordEl.textContent = NUMBER_WORDS[number];
    body.appendChild(wordEl);
  } else if (displayMode === 'numeral') {
    // Round 2: numeral only
    const numEl = document.createElement('div');
    numEl.className = 'ghost-number';
    numEl.textContent = number;
    body.appendChild(numEl);
  } else if (displayMode === 'dots') {
    // Round 3: dots + small numeral
    const dotsEl = document.createElement('div');
    dotsEl.className = 'ghost-dots';
    dotsEl.textContent = makeDots(number);
    body.appendChild(dotsEl);
    const numEl = document.createElement('div');
    numEl.className = 'ghost-number';
    numEl.style.fontSize = 'clamp(14px,3vw,20px)';
    numEl.textContent = number;
    body.appendChild(numEl);
  } else if (displayMode === 'mixed') {
    // Round 4: random mix, always show numeral somewhere
    const style = pick(['numeral', 'dots-num', 'word-num']);
    if (style === 'numeral') {
      const numEl = document.createElement('div');
      numEl.className = 'ghost-number';
      numEl.textContent = number;
      body.appendChild(numEl);
    } else if (style === 'dots-num') {
      const dotsEl = document.createElement('div');
      dotsEl.className = 'ghost-dots';
      dotsEl.textContent = makeDots(number);
      body.appendChild(dotsEl);
      const numEl = document.createElement('div');
      numEl.className = 'ghost-number';
      numEl.style.fontSize = 'clamp(14px,3vw,20px)';
      numEl.textContent = number;
      body.appendChild(numEl);
    } else {
      const wordEl = document.createElement('div');
      wordEl.className = 'ghost-word';
      wordEl.style.fontSize = 'clamp(11px,2.5vw,14px)';
      wordEl.textContent = NUMBER_WORDS[number];
      body.appendChild(wordEl);
      const numEl = document.createElement('div');
      numEl.className = 'ghost-number';
      numEl.textContent = number;
      body.appendChild(numEl);
    }
  }

  ghost.appendChild(body);

  // Position at bottom, random x
  const areaW = $('playArea').clientWidth;
  const ghostW = 90;
  const maxX = areaW - ghostW - 10;
  const x = 10 + Math.random() * maxX;
  const areaH = $('playArea').clientHeight;

  ghost.style.left = x + 'px';
  ghost.style.bottom = '-130px';
  ghost.style.animationDuration = floatDuration + 's';
  ghost.classList.add('ghost-floating');

  return ghost;
}

// ====================================================================
// GAME STATE
// ====================================================================
const audio = new GameAudio();
let currentRound = 0;
let totalScore = 0;
let roundCaught = 0;
const NEEDED_PER_ROUND = 5;
let targetNumber = 0;
let roundActive = false;
let spawnTimer = null;
let thinkTimer = null;
let ghostsOnScreen = [];
let spawnCount = 0;
const MAX_SPAWNS = 25; // safety max

// Round configs
const ROUNDS = [
  { display: 'numeral-word', speed: 15, targetDisplay: 'numeral-word' },
  { display: 'numeral',      speed: 12, targetDisplay: 'numeral' },
  { display: 'dots',         speed: 15, targetDisplay: 'numeral-word' },
  { display: 'mixed',        speed: 10, targetDisplay: 'numeral' },
];

// ====================================================================
// GAME FLOW
// ====================================================================
async function startGame() {
  $('scrTitle').classList.remove('active');
  $('hud').style.display = 'flex';
  $('charArea').style.display = 'block';
  $('lanternArea').style.display = 'flex';
  $('progBar').style.display = 'flex';
  buildProgBar();
  currentRound = 0;
  totalScore = 0;
  $('hudScore').textContent = '0';
  audio.startMusic();
  await audio.play('greetings');
  await delay(400);
  startRound();
}

async function startRound() {
  roundCaught = 0;
  spawnCount = 0;
  ghostsOnScreen = [];
  $('playArea').innerHTML = '';

  // Pick target - avoid repeating last round's target
  const available = ALL_NUMBERS.filter(n => n !== targetNumber || ALL_NUMBERS.length <= 1);
  targetNumber = pick(available);

  const cfg = ROUNDS[currentRound];

  // Update HUD
  $('hudRound').textContent = (currentRound+1)+'/4';
  $('hudTargetNum').textContent = targetNumber;
  if (cfg.targetDisplay === 'numeral-word') {
    $('hudTargetWord').textContent = NUMBER_WORDS[targetNumber];
    $('hudTargetWord').style.display = 'block';
  } else {
    $('hudTargetWord').style.display = 'none';
  }

  updateLantern(0, NEEDED_PER_ROUND);

  // Show round banner
  const banner = $('roundBanner');
  $('roundTitle').textContent = 'Round ' + (currentRound+1);
  $('roundSub').textContent = 'Capture the ' + targetNumber + 's!';
  banner.classList.add('show');
  audio.tone('reveal');
  await delay(600);

  // Speak the target number
  await audio.speakNumber(targetNumber);
  await delay(800);
  banner.classList.remove('show');
  await delay(300);

  showCharBubble('Capture the ' + targetNumber + 's!', 3000);

  roundActive = true;
  startSpawning();
  startThinkingPrompts();
}

function startSpawning() {
  const cfg = ROUNDS[currentRound];
  const spawnGhost = () => {
    if (!roundActive) return;
    if (spawnCount >= MAX_SPAWNS && roundCaught < NEEDED_PER_ROUND) {
      // Reset spawn count to keep going
      spawnCount = 0;
    }

    // Decide if this ghost is the target (~40%) or a distractor
    const isTarget = Math.random() < 0.4;
    let num;
    if (isTarget) {
      num = targetNumber;
    } else {
      const distractors = ALL_NUMBERS.filter(n => n !== targetNumber);
      num = pick(distractors);
    }

    const ghost = createGhost(num, cfg.display, cfg.speed);
    $('playArea').appendChild(ghost);
    ghostsOnScreen.push(ghost);
    spawnCount++;

    // Tap handler
    onTap(ghost, (e) => {
      e.stopPropagation();
      if (!roundActive) return;
      if (ghost.dataset.tapped) return;
      handleGhostTap(ghost, parseInt(ghost.dataset.number));
    });

    // Remove ghost when animation ends
    ghost.addEventListener('animationend', () => {
      if (!ghost.dataset.tapped) {
        ghost.remove();
        ghostsOnScreen = ghostsOnScreen.filter(g => g !== ghost);
      }
    });

    // Schedule next spawn
    if (roundActive) {
      const interval = 800 + Math.random() * 1200;
      spawnTimer = setTimeout(spawnGhost, interval);
    }
  };

  spawnGhost();
}

function startThinkingPrompts() {
  const prompt = () => {
    if (!roundActive) return;
    // Re-announce target
    audio.speakNumber(targetNumber);
    showCharBubble('Find the ' + targetNumber + '!', 2500);
    thinkTimer = setTimeout(prompt, 5500 + Math.random() * 1000);
  };
  thinkTimer = setTimeout(prompt, 5500);
}

function stopTimers() {
  roundActive = false;
  clearTimeout(spawnTimer);
  clearTimeout(thinkTimer);
}

async function handleGhostTap(ghost, number) {
  ghost.dataset.tapped = 'true';

  if (number === targetNumber) {
    // CORRECT
    roundCaught++;
    totalScore += 10;
    $('hudScore').textContent = totalScore;

    audio.tone('pop');
    const rect = ghost.getBoundingClientRect();
    starBurst(rect.left + rect.width/2, rect.top + rect.height/2);

    // Animate to lantern
    const lanternRect = $('lanternEmoji').getBoundingClientRect();
    ghost.style.position = 'fixed';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    ghost.style.bottom = 'auto';
    ghost.classList.remove('ghost-floating');
    ghost.style.animation = 'none';

    // Force reflow then animate to lantern
    ghost.offsetHeight;
    ghost.classList.add('ghost-captured');
    ghost.style.left = lanternRect.left + 'px';
    ghost.style.top = lanternRect.top + 'px';

    updateLantern(roundCaught, NEEDED_PER_ROUND);
    showCharBubble(pick(BUBBLE_CORRECT), 1800);
    jumpChar();

    // Speak number name
    audio.speakNumber(number);

    // Voice praise on every catch
    audio.play('correct');

    setTimeout(() => {
      ghost.remove();
      ghostsOnScreen = ghostsOnScreen.filter(g => g !== ghost);
    }, 700);

    // Check round complete
    if (roundCaught >= NEEDED_PER_ROUND) {
      await delay(500);
      endRound();
    }
  } else {
    // WRONG
    audio.tone('wrong');

    // BOO text
    const boo = document.createElement('div');
    boo.className = 'boo-text';
    boo.textContent = 'BOO!';
    const rect = ghost.getBoundingClientRect();
    boo.style.left = (rect.left + rect.width/2 - 20) + 'px';
    boo.style.top = (rect.top - 10) + 'px';
    document.body.appendChild(boo);
    setTimeout(() => boo.remove(), 900);

    // Wiggle ghost
    ghost.classList.remove('ghost-floating');
    ghost.style.animation = 'none';
    ghost.offsetHeight;
    ghost.classList.add('ghost-wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1500);

    // After wiggle, let it resume or just remove tapped flag
    setTimeout(() => {
      ghost.dataset.tapped = '';
      ghost.classList.remove('ghost-wrong');
      // Re-apply float if still visible
      if (ghost.parentNode) {
        ghost.classList.add('ghost-floating');
      }
    }, 550);

    audio.play('wrong');
  }
}

async function endRound() {
  stopTimers();

  // Clear remaining ghosts
  $('playArea').innerHTML = '';
  ghostsOnScreen = [];

  markProgDone(currentRound);
  audio.tone('roundDone');
  confetti(25, ['👻','🎃']);

  if (currentRound < 3) {
    // More rounds
    const banner = $('roundBanner');
    $('roundTitle').textContent = 'Round Complete!';
    $('roundSub').textContent = 'Great ghost catching!';
    banner.classList.add('show');
    await audio.play('round-complete');
    await delay(1200);
    banner.classList.remove('show');
    await delay(400);
    currentRound++;
    startRound();
  } else {
    // Game complete!
    await delay(600);
    showCelebration();
  }
}

async function showCelebration() {
  audio.tone('celeb');
  confetti(60, ['👻','🎃','🦇','🔮']);

  const stars = Math.min(5, Math.max(3, Math.floor(totalScore / 40)));
  $('celebStars').textContent = '⭐'.repeat(stars);
  $('celebTitle').textContent = 'All Ghosts Captured!';
  $('celebMsg').textContent = 'Luna\'s lantern is overflowing! Score: ' + totalScore;

  $('scrCeleb').classList.add('active');

  await audio.play('game-complete');
  await delay(800);
  await audio.play('game-complete');

  // Second confetti wave
  setTimeout(() => confetti(35, ['👻','🎃','✨','🌟']), 2000);
}

function resetGame() {
  $('scrCeleb').classList.remove('active');
  $('hud').style.display = 'none';
  $('charArea').style.display = 'none';
  $('lanternArea').style.display = 'none';
  $('progBar').style.display = 'none';
  $('playArea').innerHTML = '';
  audio.stopMusic();
  audio.clearQueue();
  $('scrTitle').classList.add('active');
}

// ====================================================================
// INIT
// ====================================================================
createBackground();

onTap($('btnStart'), () => {
  audio.unlock();
  startGame();
});

onTap($('btnAgain'), () => {
  audio.clearQueue();
  resetGame();
  setTimeout(() => {
    audio.unlock();
    startGame();
  }, 300);
});
