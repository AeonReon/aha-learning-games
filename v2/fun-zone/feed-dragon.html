<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Feed the Dragon</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-dragon: 15; --z-snack: 20; --z-fire: 25;
  --z-ui: 30; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --red: #dc2626; --orange: #f97316; --gold: #fbbf24; --green: #16a34a;
  --dragon-body: #16a34a; --dragon-belly: #a7f3d0;
  --sky1: #fde68a; --sky2: #fb923c; --sky3: #c2410c; --sky4: #4c1d95;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  color: #fff;
}

/* ── Sunset Sky Background ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(180deg, #4c1d95 0%, #7c2d12 25%, #c2410c 55%, #f97316 80%, #fbbf24 100%);
}
.bg-sun {
  position: fixed; z-index: 1;
  bottom: 25%; left: 50%; transform: translateX(-50%);
  width: clamp(120px, 28vw, 220px); height: clamp(120px, 28vw, 220px);
  border-radius: 50%;
  background: radial-gradient(circle at center, #fef3c7 0%, #fbbf24 40%, #f97316 80%, rgba(249,115,22,0) 100%);
  filter: blur(1px);
  animation: sunPulse 4s ease-in-out infinite;
}
@keyframes sunPulse {
  0%,100% { transform: translateX(-50%) scale(1); opacity: 0.85; }
  50% { transform: translateX(-50%) scale(1.05); opacity: 1; }
}
.bg-mountain {
  position: fixed; z-index: 2; bottom: 0;
  width: 100%; height: 28%;
  background:
    linear-gradient(180deg, transparent 0%, rgba(24,10,40,0.5) 60%, rgba(15,5,28,0.92) 100%),
    radial-gradient(ellipse at 20% 100%, #1e1b4b 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, #1e1b4b 0%, transparent 60%);
  clip-path: polygon(0 100%, 0 60%, 12% 30%, 22% 55%, 34% 15%, 48% 45%, 60% 25%, 74% 55%, 86% 20%, 100% 50%, 100% 100%);
}
.bg-cloud {
  position: fixed; z-index: 2;
  font-size: clamp(30px, 6vw, 50px);
  opacity: 0.55; pointer-events: none;
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift {
  0% { transform: translateX(-120px); }
  100% { transform: translateX(calc(100vw + 120px)); }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Back button ── */
.back-home-btn {
  position: fixed; top: 14px; left: 14px; z-index: 500;
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  color: var(--gold);
  padding: 10px 16px; border-radius: 24px;
  border: 2px solid var(--orange);
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 900; text-decoration: none;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  transition: transform 0.15s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.back-home-btn:hover, .back-home-btn:active {
  background: rgba(251,191,36,0.25); transform: scale(1.05);
}

/* ── Title screen ── */
.screen-title h1 {
  font-size: clamp(36px, 9vw, 72px);
  color: var(--gold);
  text-shadow:
    0 0 30px rgba(251,191,36,0.6),
    3px 3px 0 rgba(0,0,0,0.45),
    -2px -2px 0 var(--red);
  margin: 10px 0;
  animation: titleBounce 1.4s ease-in-out infinite;
}
@keyframes titleBounce {
  0%,100% { transform: scale(1) rotate(-1deg); }
  50%     { transform: scale(1.05) rotate(1deg); }
}
.screen-title .title-dragon {
  font-size: clamp(120px, 30vw, 220px);
  line-height: 1;
  filter: drop-shadow(0 10px 25px rgba(0,0,0,0.5));
  animation: dragonWave 2s ease-in-out infinite;
}
@keyframes dragonWave {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%     { transform: translateY(-14px) rotate(3deg); }
}
.screen-title p {
  font-size: clamp(16px, 4vw, 24px);
  color: #fff;
  max-width: 420px; line-height: 1.4;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  margin: 8px 0;
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 72px;
  padding: 18px 44px;
  font-size: clamp(22px, 5vw, 32px);
  font-family: var(--font); font-weight: 900;
  color: #fff; border: 4px solid var(--gold);
  border-radius: 40px;
  cursor: pointer;
  box-shadow: 0 6px 26px rgba(0,0,0,0.4), inset 0 -5px 0 rgba(0,0,0,0.2);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}
.btn:active { transform: scale(0.93); }
.btn-start, .btn-again {
  background: linear-gradient(135deg, var(--red), var(--orange));
  margin-top: 20px;
  animation: btnGlow 2s ease-in-out infinite;
}
@keyframes btnGlow {
  0%,100% { filter: brightness(1) drop-shadow(0 0 10px rgba(251,191,36,0.5)); }
  50%     { filter: brightness(1.15) drop-shadow(0 0 22px rgba(251,191,36,0.9)); }
}

/* ── HUD (thought bubble) ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: center; align-items: flex-start;
  padding: 10px 14px 0;
  pointer-events: none;
}
.thought-bubble {
  background: rgba(255,255,255,0.97);
  color: var(--red);
  padding: 14px 28px;
  border-radius: 30px;
  border: 5px solid var(--gold);
  box-shadow: 0 6px 22px rgba(0,0,0,0.4);
  font-weight: 900;
  font-size: clamp(16px, 4vw, 22px);
  display: flex; align-items: center; gap: 12px;
  max-width: 90vw;
  animation: bubblePop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes bubblePop {
  0%   { transform: scale(0.2); opacity: 0; }
  70%  { transform: scale(1.12); opacity: 1; }
  100% { transform: scale(1); }
}
.thought-bubble .big-letter {
  font-size: clamp(40px, 10vw, 64px);
  color: var(--orange);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
  line-height: 1;
  font-weight: 900;
}
.thought-bubble::after {
  content: '';
  position: absolute; bottom: -14px; left: 50%;
  transform: translateX(-50%);
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 16px solid var(--gold);
}

/* ── Feed counter (corner) ── */
.feed-counter {
  position: fixed; top: 14px; right: 14px;
  z-index: var(--z-ui);
  background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  color: var(--gold);
  padding: 8px 16px; border-radius: 24px;
  border: 2px solid var(--orange);
  font-size: clamp(14px, 3.2vw, 18px);
  font-weight: 900;
  display: flex; align-items: center; gap: 6px;
  pointer-events: none;
}

/* ── Snack area ── */
.snack-area {
  position: fixed;
  top: 22%; left: 0; right: 0; bottom: 40%;
  z-index: var(--z-snack);
  pointer-events: none;
}
.snack-area.active { pointer-events: auto; }

/* ── Letter snack ── */
.snack {
  position: absolute;
  width: clamp(72px, 16vw, 110px);
  height: clamp(72px, 16vw, 110px);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  will-change: transform;
  transition: opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.snack-body {
  position: absolute; inset: 0;
  border-radius: 45% 45% 55% 55% / 55% 55% 45% 45%;
  border: 4px solid rgba(0,0,0,0.18);
  box-shadow: 0 8px 22px rgba(0,0,0,0.4), inset 0 -8px 0 rgba(0,0,0,0.15), inset 0 6px 0 rgba(255,255,255,0.25);
}
.snack-shape-cupcake .snack-body {
  background: linear-gradient(180deg, #fda4af 0%, #ec4899 50%, #be185d 100%);
  border-radius: 45% 45% 20% 20% / 70% 70% 30% 30%;
}
.snack-shape-cupcake::before {
  content: ''; position: absolute;
  left: 12%; right: 12%; bottom: 0; top: 48%;
  background: repeating-linear-gradient(45deg, #a16207, #a16207 8px, #78350f 8px, #78350f 16px);
  border-radius: 0 0 28% 28% / 0 0 30% 30%;
  border: 3px solid rgba(0,0,0,0.25);
  border-top: none;
}
.snack-shape-donut .snack-body {
  background: radial-gradient(circle at 35% 35%, #fef3c7, #fcd34d 40%, #f59e0b 75%, #b45309 100%);
}
.snack-shape-donut::after {
  content: ''; position: absolute;
  left: 30%; right: 30%; top: 30%; bottom: 30%;
  background: rgba(76,29,149,0.65);
  border-radius: 50%;
  box-shadow: inset 0 0 0 3px rgba(0,0,0,0.3);
}
.snack-shape-cookie .snack-body {
  background: radial-gradient(circle at 35% 35%, #d97706, #b45309 50%, #78350f 100%);
  border-radius: 50%;
}
.snack-shape-cookie::before {
  content: ''; position: absolute;
  width: 10%; height: 10%; border-radius: 50%;
  background: #451a03; top: 22%; left: 22%;
  box-shadow:
    calc(22vw * 0.6) calc(22vw * 0.2) 0 -4px #451a03,
    calc(22vw * 0.1) calc(22vw * 0.5) 0 -5px #451a03,
    calc(22vw * 0.5) calc(22vw * 0.6) 0 -3px #451a03,
    calc(22vw * -0.05) calc(22vw * 0.3) 0 -6px #451a03;
}
.snack-shape-cake .snack-body {
  background: linear-gradient(180deg, #fef3c7 0%, #fbbf24 30%, #f97316 60%, #dc2626 100%);
  border-radius: 18% 18% 18% 18%;
}
.snack-shape-cake::before {
  content: '🍓'; position: absolute;
  top: -10px; left: 50%; transform: translateX(-50%);
  font-size: clamp(22px, 5vw, 34px);
}
.snack-shape-candy .snack-body {
  background: repeating-conic-gradient(from 0deg, #ef4444 0deg 30deg, #fff 30deg 60deg);
  border-radius: 50%;
}
.snack-shape-pie .snack-body {
  background: radial-gradient(circle at 50% 55%, #7c2d12, #dc2626 45%, #fbbf24 75%, #fcd34d 100%);
  border-radius: 50%;
}
.snack-shape-pie::before {
  content: ''; position: absolute;
  left: 18%; right: 18%; top: 18%; bottom: 18%;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 18%, #fbbf24 18%, #fbbf24 22%),
    repeating-linear-gradient(90deg, transparent 0, transparent 18%, #fbbf24 18%, #fbbf24 22%);
  border-radius: 50%;
}
.snack-letter {
  position: relative; z-index: 3;
  font-size: clamp(36px, 8vw, 56px);
  font-weight: 900;
  color: #fff;
  text-shadow:
    -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
    0 0 6px rgba(0,0,0,0.5);
  pointer-events: none;
  line-height: 1;
  letter-spacing: -0.02em;
}

/* Float animation */
.snack.floating { animation: snackFloat 3s ease-in-out infinite; }
@keyframes snackFloat {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%     { transform: translateY(-14px) rotate(5deg); }
}
.snack.wiggle { animation: snackWiggle 0.5s ease-in-out; }
@keyframes snackWiggle {
  0%,100% { transform: translate(0,0) rotate(0); }
  20% { transform: translate(-6px, -4px) rotate(-8deg); }
  40% { transform: translate(6px, -8px) rotate(8deg); }
  60% { transform: translate(-5px, -4px) rotate(-6deg); }
  80% { transform: translate(5px, -2px) rotate(4deg); }
}
.snack.flying {
  animation: snackFly 0.7s cubic-bezier(0.55, 0, 0.7, 1) forwards;
  pointer-events: none;
  z-index: calc(var(--z-snack) + 5);
}
.snack.spitting {
  animation: snackSpit 0.9s ease-out forwards;
  pointer-events: none;
  z-index: calc(var(--z-snack) + 5);
}
@keyframes snackSpit {
  0%   { transform: translate(0,0) rotate(0) scale(1); opacity: 1; }
  40%  { transform: translate(var(--spit-x,-40px), -120px) rotate(-240deg) scale(0.9); opacity: 1; }
  100% { transform: translate(var(--spit-x,-80px), 60vh) rotate(-720deg) scale(0.7); opacity: 0; }
}
.snack.poof {
  animation: snackPoof 0.3s ease-out forwards;
  pointer-events: none;
}
@keyframes snackPoof {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.2); opacity: 0; }
}

/* ── Dragon ── */
.dragon-stage {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 42%;
  z-index: var(--z-dragon);
  display: flex; align-items: flex-end; justify-content: center;
  pointer-events: none;
}
.dragon {
  position: relative;
  width: clamp(260px, 60vw, 420px);
  height: clamp(240px, 55vw, 380px);
  transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-origin: center bottom;
}
/* Dragon body */
.dragon-body {
  position: absolute;
  left: 10%; right: 10%; bottom: 0; top: 20%;
  background: radial-gradient(ellipse at 30% 30%, #4ade80 0%, #16a34a 45%, #166534 100%);
  border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
  box-shadow:
    inset -15px -20px 40px rgba(0,0,0,0.35),
    inset 10px 10px 25px rgba(255,255,255,0.2),
    0 15px 40px rgba(0,0,0,0.5);
  border: 4px solid #14532d;
}
.dragon-belly {
  position: absolute;
  left: 28%; right: 28%; bottom: 3%; top: 50%;
  background: linear-gradient(180deg, #bbf7d0, #86efac);
  border-radius: 50% 50% 45% 45% / 50% 50% 50% 50%;
  border: 3px solid #15803d;
  border-top: none;
}
.dragon-belly::before {
  content: '';
  position: absolute; inset: 8%;
  background: repeating-linear-gradient(90deg, transparent 0 14%, rgba(21,128,61,0.25) 14% 16%);
  border-radius: inherit;
}
/* Dragon head */
.dragon-head {
  position: absolute;
  left: 22%; right: 22%; top: 0; bottom: 50%;
  background: radial-gradient(ellipse at 35% 30%, #4ade80 0%, #16a34a 50%, #14532d 100%);
  border-radius: 50% 50% 40% 40% / 55% 55% 45% 45%;
  border: 4px solid #14532d;
  box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3);
  overflow: hidden;
}
/* Horns */
.dragon-horn {
  position: absolute; top: -22%;
  width: 18%; height: 36%;
  background: linear-gradient(180deg, #fcd34d, #d97706);
  border: 3px solid #78350f;
  border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;
}
.dragon-horn.left  { left: 18%; transform: rotate(-18deg); }
.dragon-horn.right { right: 18%; transform: rotate(18deg); }
/* Eyes */
.dragon-eye {
  position: absolute; top: 20%;
  width: 22%; height: 26%;
  background: #fff;
  border-radius: 50%;
  border: 3px solid #14532d;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  transition: height 0.2s;
}
.dragon-eye.left  { left: 18%; }
.dragon-eye.right { right: 18%; }
.dragon-pupil {
  width: 45%; height: 75%;
  background: #0f172a;
  border-radius: 50%;
  position: relative;
  transition: transform 0.3s;
}
.dragon-pupil::after {
  content: '';
  position: absolute;
  top: 15%; left: 20%;
  width: 40%; height: 40%;
  background: #fff;
  border-radius: 50%;
}
.dragon.eyes-shut .dragon-eye { height: 4%; }
.dragon.eyes-big .dragon-pupil { transform: scale(1.3); }
/* Eyebrows */
.dragon-brow {
  position: absolute; top: 10%;
  width: 26%; height: 6%;
  background: #14532d;
  border-radius: 6px;
  transition: transform 0.25s;
}
.dragon-brow.left  { left: 14%; transform: rotate(-8deg); transform-origin: right; }
.dragon-brow.right { right: 14%; transform: rotate(8deg); transform-origin: left; }
.dragon.angry .dragon-brow.left  { transform: rotate(22deg); }
.dragon.angry .dragon-brow.right { transform: rotate(-22deg); }
.dragon.happy .dragon-brow.left  { transform: rotate(-22deg) translateY(-3px); }
.dragon.happy .dragon-brow.right { transform: rotate(22deg) translateY(-3px); }

/* Nostrils */
.dragon-nose {
  position: absolute; top: 55%;
  width: 10%; height: 14%;
  background: #14532d;
  border-radius: 50%;
}
.dragon-nose.left  { left: 36%; }
.dragon-nose.right { right: 36%; }

/* Mouth */
.dragon-mouth {
  position: absolute;
  left: 18%; right: 18%; bottom: 3%;
  height: 30%;
  background: radial-gradient(ellipse at 50% 30%, #7f1d1d 0%, #450a0a 80%);
  border-radius: 50% 50% 45% 45% / 20% 20% 80% 80%;
  border: 4px solid #14532d;
  overflow: hidden;
  transition: height 0.15s, transform 0.15s;
}
.dragon.chomping .dragon-mouth { height: 12%; }
.dragon.yelling  .dragon-mouth { height: 38%; }
.dragon-tongue {
  position: absolute;
  left: 20%; right: 20%; bottom: 0;
  height: 50%;
  background: linear-gradient(180deg, #fb7185, #e11d48);
  border-radius: 50% 50% 40% 40%;
  border-top: 3px solid #9f1239;
}
.dragon-teeth-top, .dragon-teeth-bottom {
  position: absolute;
  left: 6%; right: 6%;
  height: 28%;
  display: flex; justify-content: space-around;
  pointer-events: none;
}
.dragon-teeth-top { top: 0; }
.dragon-teeth-bottom { bottom: 0; transform: scaleY(-1); }
.dragon-tooth {
  width: 10%; height: 100%;
  background: linear-gradient(180deg, #fff, #e5e7eb);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-left: 1px solid rgba(0,0,0,0.2);
}
/* Wings */
.dragon-wing {
  position: absolute;
  top: 25%;
  width: 30%; height: 40%;
  background: radial-gradient(ellipse at 30% 30%, #22c55e, #15803d);
  border: 3px solid #14532d;
  border-radius: 50% 10% 60% 40%;
  transition: transform 0.3s;
}
.dragon-wing.left  { left: -20%; transform: rotate(-20deg); }
.dragon-wing.right { right: -20%; transform: rotate(20deg) scaleX(-1); }
.dragon.flapping .dragon-wing.left  { animation: wingFlapL 0.5s ease-in-out; }
.dragon.flapping .dragon-wing.right { animation: wingFlapR 0.5s ease-in-out; }
@keyframes wingFlapL {
  0%,100% { transform: rotate(-20deg); }
  50%     { transform: rotate(-50deg) translateY(-8px); }
}
@keyframes wingFlapR {
  0%,100% { transform: rotate(20deg) scaleX(-1); }
  50%     { transform: rotate(50deg) scaleX(-1) translateY(-8px); }
}

/* Dragon idle breathing */
.dragon.idle {
  animation: dragonBreathe 3s ease-in-out infinite;
}
@keyframes dragonBreathe {
  0%,100% { transform: translateY(0) scale(var(--body-scale, 1)); }
  50%     { transform: translateY(-4px) scale(calc(var(--body-scale, 1) * 1.02)); }
}

/* Dragon chomp shake */
.dragon.shake { animation: dragonShake 0.4s; }
@keyframes dragonShake {
  0%,100% { transform: translate(0,0) scale(var(--body-scale, 1)); }
  15% { transform: translate(-6px, 4px) scale(calc(var(--body-scale, 1) * 0.98)); }
  30% { transform: translate(6px, 2px) scale(calc(var(--body-scale, 1) * 0.99)); }
  45% { transform: translate(-4px, 4px) scale(calc(var(--body-scale, 1) * 0.97)); }
  60% { transform: translate(4px, 0) scale(calc(var(--body-scale, 1) * 1.02)); }
  80% { transform: translate(-2px, 2px) scale(var(--body-scale, 1)); }
}
.dragon.disgust { animation: dragonDisgust 0.6s; }
@keyframes dragonDisgust {
  0%,100% { transform: rotate(0) scale(var(--body-scale, 1)); }
  25%     { transform: rotate(-6deg) translateX(-8px) scale(var(--body-scale, 1)); }
  75%     { transform: rotate(6deg) translateX(8px) scale(var(--body-scale, 1)); }
}

/* Drool */
.dragon-drool {
  position: absolute;
  top: 80%; left: 45%;
  width: 8px; height: 18px;
  background: linear-gradient(180deg, rgba(186,230,253,0.9), rgba(14,165,233,0.9));
  border-radius: 0 0 50% 50%;
  opacity: 0;
  pointer-events: none;
}
.dragon.drool .dragon-drool {
  opacity: 1; animation: droolDrop 1.2s ease-in;
}
@keyframes droolDrop {
  0%   { transform: translateY(0) scaleY(1); opacity: 1; }
  70%  { transform: translateY(40px) scaleY(1.5); opacity: 1; }
  100% { transform: translateY(70px) scaleY(0.5); opacity: 0; }
}

/* Fire breath */
.fire-cloud {
  position: fixed;
  z-index: var(--z-fire);
  pointer-events: none;
  font-size: clamp(60px, 14vw, 100px);
  opacity: 0;
}
.fire-cloud.show {
  animation: fireBlast 1.1s ease-out forwards;
}
@keyframes fireBlast {

/* Crumbs */

.screen-celeb .celeb-dragon {

/* Confetti */
.confetti {

  z-index: calc(var(--z-celeb) + 5);

@keyframes confettiFall {

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════
const AUDIO_BASE = '../../audio';
const TOTAL_FEEDS = 8;
const SNACKS_PER_ROUND = 6;

// Dragon character voice pack
const DRAGON_VOICE = {
  hello:   'fun-zone/dragon/hello.mp3',
  hungry:  'fun-zone/dragon/hungry.mp3',
  want:    'fun-zone/dragon/want_letter.mp3',
  yummy:   'fun-zone/dragon/yummy.mp3',
  more:    'fun-zone/dragon/more.mp3',
  tasty:   'fun-zone/dragon/tasty.mp3',
  nom:     'fun-zone/dragon/nom.mp3',
  thanks:  'fun-zone/dragon/thanks.mp3',
  wrong:   'fun-zone/dragon/wrong.mp3',
  full:    'fun-zone/dragon/full.mp3',
  burp:    'fun-zone/dragon/burp.mp3',
  fire:    'fun-zone/dragon/fire.mp3',
};

const HAPPY_POOL = ['yummy', 'more', 'tasty', 'nom', 'thanks'];
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const SNACK_SHAPES = ['cupcake', 'donut', 'cookie', 'cake', 'candy', 'pie'];

// ═══════════════════════════════════════════════════════════════════
// GAME AUDIO (Web Audio API with HTML fallback, iOS unlock)
// ═══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.1; this.sfxVol = 0.35; this.musicDucked = 0.03;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._loopTimer = null;
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }

  // Medieval feast drum+melody loop (G major pentatonic) ~120 BPM
  startMusic() {
    this._init();
    if (this.playing) return;
    this.playing = true;
    // G pentatonic: G A B D E (in Hz, two octaves)
    const melodyNotes = [196.00, 220.00, 246.94, 293.66, 329.63, 392.00, 440.00, 493.88];
    const bassNotes   = [98.00, 110.00, 123.47, 146.83];
    const bpm = 120;
    const beat = 60 / bpm; // 0.5s
    let step = 0;

    const playBassThump = (t) => {
      // Deep drum thump
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      const f = bassNotes[step % bassNotes.length];
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, t);
      o.frequency.exponentialRampToValueAtTime(f * 0.5, t + 0.15);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.45, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.connect(g); g.connect(this.musicGain);
      o.start(t); o.stop(t + 0.3);
      o.onended = () => { o.disconnect(); g.disconnect(); };

      // Snare-ish noise on off-beats
      if (step % 2 === 1) {
        const bufferSize = 0.1 * this.ctx.sampleRate;
        const noiseBuf = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i/bufferSize);
        const n = this.ctx.createBufferSource();
        const ng = this.ctx.createGain();
        n.buffer = noiseBuf;
        ng.gain.setValueAtTime(0.08, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        n.connect(ng); ng.connect(this.musicGain);
        n.start(t);
        n.onended = () => { n.disconnect(); ng.disconnect(); };
      }
    };

    const playMelody = (t) => {
      // Happy skipping melody note (avoid every beat for space)
      if (Math.random() > 0.35) {
        const f = melodyNotes[Math.floor(Math.random() * melodyNotes.length)];
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = Math.random() > 0.5 ? 'triangle' : 'square';
        o.frequency.value = f;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.12, t + 0.05);
        g.gain.linearRampToValueAtTime(0, t + 0.35);
        o.connect(g); g.connect(this.musicGain);
        o.start(t); o.stop(t + 0.4);
        o.onended = () => { o.disconnect(); g.disconnect(); };
      }
    };

    const tick = () => {
      if (!this.playing) return;
      const t = this.ctx.currentTime + 0.02;
      playBassThump(t);
      playMelody(t);
      // Extra melody on half-beat
      if (step % 2 === 0) playMelody(t + beat / 2);
      step++;
      this._loopTimer = setTimeout(tick, beat * 1000);
    };
    tick();
  }
  stopMusic() {
    this.playing = false;
    clearTimeout(this._loopTimer);
  }
  _duck() {
    if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1);
  }
  _unduck() {
    if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol, this.ctx.currentTime + 0.3);
  }

  tone(type) {
    this._init();
    const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s);
      g.gain.linearRampToValueAtTime(v, s + 0.02);
      g.gain.linearRampToValueAtTime(0, s + d);
      o.connect(g); g.connect(this.sfxGain);
      o.start(s); o.stop(s + d + 0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    const ps = (startF, endF, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.setValueAtTime(startF, s);
      o.frequency.exponentialRampToValueAtTime(endF, s + d);
      g.gain.setValueAtTime(v, s);
      g.gain.linearRampToValueAtTime(0, s + d);
      o.connect(g); g.connect(this.sfxGain);
      o.start(s); o.stop(s + d + 0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if (type === 'chomp') {
      // CHOMP! — short low thud
      ps(180, 60, t, 0.12, 0.6, 'square');
      ps(90, 40, t + 0.05, 0.1, 0.4, 'triangle');
    }
    else if (type === 'whoosh') {
      ps(200, 900, t, 0.25, 0.3, 'sine');
    }
    else if (type === 'yuck') {
      ps(500, 150, t, 0.3, 0.3, 'sawtooth');
    }
    else if (type === 'burp') {
      // comedic burp via FM-ish
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(80, t);
      o.frequency.linearRampToValueAtTime(140, t + 0.2);
      o.frequency.linearRampToValueAtTime(60, t + 0.5);
      o.frequency.linearRampToValueAtTime(120, t + 0.7);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.5, t + 0.05);
      g.gain.linearRampToValueAtTime(0.4, t + 0.5);
      g.gain.linearRampToValueAtTime(0, t + 0.9);
      o.connect(g); g.connect(this.sfxGain);
      o.start(t); o.stop(t + 1.0);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    }
    else if (type === 'sparkle') {
      p(1046.5, t,        0.08, 0.22);
      p(1318.5, t + 0.06, 0.08, 0.2);
      p(1568.0, t + 0.12, 0.1,  0.22);
    }
    else if (type === 'fire') {
      // Whooshing fire
      const bufSize = 0.8 * this.ctx.sampleRate;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
      const n = this.ctx.createBufferSource();
      const ng = this.ctx.createGain();
      const filt = this.ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.value = 900;
      n.buffer = buf;
      ng.gain.setValueAtTime(0.3, t);
      ng.gain.linearRampToValueAtTime(0, t + 0.8);
      n.connect(filt); filt.connect(ng); ng.connect(this.sfxGain);
      n.start(t);
      n.onended = () => { n.disconnect(); filt.disconnect(); ng.disconnect(); };
    }
    else if (type === 'celeb') {
      p(523.25, t,        0.15, 0.35);
      p(659.25, t + 0.15, 0.15, 0.4);
      p(783.99, t + 0.3,  0.18, 0.45);
      p(1046.5, t + 0.48, 0.35, 0.5);
    }
  }

  speak(file) { return new Promise(res => { this.voiceQueue.push({ file, resolve: res }); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const { file, resolve } = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch (e) {}
    this.speaking = false;
    this._unduck();
    resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(res => {
      const a = new window.Audio(path);
      a.onended = res; a.onerror = () => res();
      a.play().catch(() => res());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(res => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = res;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }

  dragonSay(key) {
    const file = DRAGON_VOICE[key];
    if (!file) return Promise.resolve();
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(letter) {
    return this.speak(`${AUDIO_BASE}/letters/${letter.toLowerCase()}.mp3`);
  }
  clearQueue() {
    this.voiceQueue.forEach(q => q.resolve());
    this.voiceQueue = [];
    this.speaking = false;
    this._unduck();
  }
}

// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function onTap(el, fn) {
  let t = false;
  el.addEventListener('touchstart', e => { e.preventDefault(); if (t) return; t = true; fn(e); setTimeout(() => t = false, 300); }, { passive: false });
  el.addEventListener('click', e => { if (t) return; fn(e); });
}

// ═══════════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
let state = {
  running: false,
  feedsDone: 0,
  targetLetter: null,
  dragonSize: 1.0,
  usedLetters: [],
  snacks: [],
};

// ═══════════════════════════════════════════════════════════════════
// DRAGON CONTROL
// ═══════════════════════════════════════════════════════════════════
const dragon = () => $('dragon');

function setDragonSize(scale) {
  state.dragonSize = scale;
  dragon().style.setProperty('--body-scale', scale);
}

function dragonExpression(expr, duration = 600) {
  const d = dragon();
  d.classList.remove('happy', 'angry', 'eyes-shut', 'eyes-big', 'chomping', 'yelling', 'shake', 'disgust', 'drool', 'flapping');
  if (expr) d.classList.add(expr);
  if (duration) setTimeout(() => d.classList.remove(expr), duration);
}

function dragonChomp() {
  const d = dragon();
  d.classList.add('chomping', 'eyes-shut', 'shake');
  audio.tone('chomp');
  setTimeout(() => d.classList.remove('chomping', 'eyes-shut'), 280);
  setTimeout(() => d.classList.remove('shake'), 420);
}
function dragonYell() {
  const d = dragon();
  d.classList.add('yelling', 'eyes-big', 'flapping');
  setTimeout(() => d.classList.remove('yelling', 'flapping'), 500);
  setTimeout(() => d.classList.remove('eyes-big'), 700);
}
function dragonHappy() {
  dragon().classList.add('happy', 'drool');
  setTimeout(() => dragon().classList.remove('happy', 'drool'), 800);
}
function dragonDisgusted() {
  const d = dragon();
  d.classList.add('angry', 'disgust');
  setTimeout(() => d.classList.remove('angry', 'disgust'), 600);
}

function spawnCrumbs(x, y, count = 8) {
  const emojis = ['🍞', '✨', '💥', '🍪'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'crumb';
    c.textContent = pick(emojis);
    c.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
    c.style.top  = (y + (Math.random() - 0.5) * 20) + 'px';
    c.style.setProperty('--cx', ((Math.random() - 0.5) * 160) + 'px');
    c.style.setProperty('--cy', (40 + Math.random() * 60) + 'px');
    c.style.setProperty('--cr', (Math.random() * 720 - 360) + 'deg');
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1000);
  }
}
function spawnSparkles(x, y, count = 5) {
  const emojis = ['✨', '⭐', '💫'];
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = pick(emojis);
    s.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
    s.style.top  = (y + (Math.random() - 0.5) * 60) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}
function spawnNostrilSmoke() {
  const d = dragon();
  const rect = d.getBoundingClientRect();
  ['left', 'right'].forEach(side => {
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'smoke';
        s.style.position = 'fixed';
        s.style.zIndex = 'var(--z-fire)';
        const x = side === 'left'
          ? rect.left + rect.width * 0.37
          : rect.left + rect.width * 0.63;
        s.style.left = x + 'px';
        s.style.top  = (rect.top + rect.height * 0.32) + 'px';
        s.style.setProperty('--sx', ((Math.random() - 0.5) * 30) + 'px');
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1300);
      }, i * 120);
    }
  });
}
function fireBreath() {
  audio.tone('fire');
  const d = dragon();
  const rect = d.getBoundingClientRect();
  const cloud = document.createElement('div');
  cloud.className = 'fire-cloud show';
  cloud.textContent = '🔥';
  cloud.style.left = (rect.left + rect.width / 2 - 60) + 'px';
  cloud.style.top  = (rect.top + rect.height * 0.55) + 'px';
  document.body.appendChild(cloud);
  setTimeout(() => cloud.remove(), 1200);

  // extra flame puffs
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const f = document.createElement('div');
      f.className = 'fire-cloud show';
      f.textContent = pick(['🔥', '💥']);
      f.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 200) + 'px';
      f.style.top  = (rect.top + rect.height * 0.4 + Math.random() * 100) + 'px';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 1100);
    }, 80 + i * 90);
  }
}

// ═══════════════════════════════════════════════════════════════════
// SNACKS
// ═══════════════════════════════════════════════════════════════════
function chooseLetters() {
  // Target: pick a letter we haven't used recently (or any if all used)
  const available = LETTERS.filter(l => !state.usedLetters.includes(l));
  const target = available.length ? pick(available) : pick(LETTERS);
  state.usedLetters.push(target);
  if (state.usedLetters.length > 12) state.usedLetters.shift();

  // 5 distractors (no duplicates, not target)
  const others = [];
  const pool = LETTERS.filter(l => l !== target);
  while (others.length < SNACKS_PER_ROUND - 1) {
    const p = pick(pool);
    if (!others.includes(p)) others.push(p);
  }
  const letters = shuffle([target, ...others]);
  return { target, letters };
}

function createSnack(letter, x, y) {
  const el = document.createElement('div');
  el.className = 'snack floating';
  const shape = pick(SNACK_SHAPES);
  el.classList.add('snack-shape-' + shape);
  el.dataset.letter = letter;
  el.innerHTML = `
    <div class="snack-body"></div>
    <div class="snack-letter">${letter}</div>
  `;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.animationDelay = (Math.random() * 2) + 's';
  el.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
  onTap(el, () => onSnackTap(el, letter));
  return el;
}

function layoutSnacks(letters) {
  const area = $('snackArea');
  area.innerHTML = '';
  const rect = area.getBoundingClientRect();
  const cols = 3;
  const rows = 2;
  const snackSize = Math.min(110, rect.width / cols * 0.75);
  const padX = 20;
  const padY = 10;
  const cellW = (rect.width - padX * 2) / cols;
  const cellH = (rect.height - padY * 2) / rows;

  state.snacks = [];
  letters.forEach((letter, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    // jitter within cell
    const x = padX + col * cellW + (cellW - snackSize) / 2 + (Math.random() - 0.5) * 18;
    const y = padY + row * cellH + (cellH - snackSize) / 2 + (Math.random() - 0.5) * 14;
    const el = createSnack(letter, x, y);
    area.appendChild(el);
    state.snacks.push(el);
  });
  area.classList.add('active');
}

function clearSnacks() {
  state.snacks.forEach(s => {
    s.classList.add('poof');
    setTimeout(() => s.remove(), 320);
  });
  state.snacks = [];
}

// Animate snack flying into dragon mouth
async function flySnackToMouth(snack) {
  audio.tone('whoosh');
  const sr = snack.getBoundingClientRect();
  const d = dragon();
  const dr = d.getBoundingClientRect();
  // Target: center of dragon mouth
  const mx = dr.left + dr.width / 2;
  const my = dr.top + dr.height * 0.85;
  const dx = mx - (sr.left + sr.width / 2);
  const dy = my - (sr.top + sr.height / 2);

  snack.classList.remove('floating');
  snack.style.transition = 'transform 0.6s cubic-bezier(0.55, 0, 0.7, 1), opacity 0.2s';
  // 2-stage arc: up first, then into mouth
  snack.style.transform = `translate(${dx * 0.5}px, ${dy * 0.5 - 80}px) rotate(180deg) scale(1.2)`;
  await delay(280);
  snack.style.transform = `translate(${dx}px, ${dy}px) rotate(360deg) scale(0.3)`;
  await delay(320);
  snack.style.opacity = '0';
  await delay(120);
}

// Spit out wrong snack
async function spitSnack(snack) {
  audio.tone('yuck');
  const sr = snack.getBoundingClientRect();
  // Spit in direction away from dragon center
  const dx = (sr.left + sr.width / 2) < window.innerWidth / 2 ? -120 : 120;
  snack.style.setProperty('--spit-x', dx + 'px');
  snack.classList.remove('floating');
  snack.classList.add('spitting');
  await delay(900);
  snack.remove();
  state.snacks = state.snacks.filter(s => s !== snack);
}

// ═══════════════════════════════════════════════════════════════════
// FLOW
// ═══════════════════════════════════════════════════════════════════
let acceptingTaps = false;

async function onSnackTap(snack, letter) {
  if (!acceptingTaps) return;
  if (letter === state.targetLetter) {
    acceptingTaps = false;
    await feedDragon(snack);
  } else {
    // Wrong letter — dragon spits it
    snack.classList.add('wiggle');
    setTimeout(() => snack.classList.remove('wiggle'), 500);
    await spitSnack(snack);
    dragonDisgusted();
    audio.dragonSay('wrong');
  }
}

async function feedDragon(snack) {
  dragonYell();
  await flySnackToMouth(snack);
  snack.remove();
  state.snacks = state.snacks.filter(s => s !== snack);

  // CHOMP
  dragonChomp();
  const dRect = dragon().getBoundingClientRect();
  spawnCrumbs(dRect.left + dRect.width / 2, dRect.top + dRect.height * 0.8, 10);
  audio.tone('sparkle');
  spawnSparkles(dRect.left + dRect.width / 2, dRect.top + dRect.height * 0.7, 6);

  await delay(350);
  dragonHappy();
  audio.dragonSay(pick(HAPPY_POOL));

  // Dragon grows
  state.feedsDone++;
  $('feedCount').textContent = state.feedsDone;
  const newScale = 1.0 + (state.feedsDone / TOTAL_FEEDS) * 0.45;
  setDragonSize(newScale);

  // Random fire puff
  if (Math.random() > 0.55) {
    await delay(200);
    spawnNostrilSmoke();
  }

  await delay(700);
  clearSnacks();

  if (state.feedsDone >= TOTAL_FEEDS) {
    await endGame();
  } else {
    await delay(200);
    nextRound();
  }
}

async function nextRound() {
  const { target, letters } = chooseLetters();
  state.targetLetter = target;
  $('targetLetter').textContent = target;

  // Re-trigger bubble pop animation
  const bubble = $('thoughtBubble');
  bubble.style.animation = 'none';
  void bubble.offsetHeight;
  bubble.style.animation = '';

  layoutSnacks(letters);

  // Dragon asks
  await delay(300);
  dragonYell();
  await audio.dragonSay('want');
  await audio.speakLetter(target);
  acceptingTaps = true;
}

async function endGame() {
  audio.clearQueue();
  acceptingTaps = false;
  $('hud').style.display = 'none';
  $('feedCounter').style.display = 'none';

  // Grow dragon to full
  setDragonSize(1.55);
  dragon().classList.add('full');
  await delay(600);

  // Happy yell + fire burp
  dragonYell();
  spawnNostrilSmoke();
  await audio.dragonSay('full');
  await delay(300);

  // HUGE fire burp
  fireBreath();
  audio.tone('burp');
  await audio.dragonSay('burp');
  dragonChomp();
  await delay(1200);

  // Celebration
  $('scrCeleb').classList.add('active');
  audio.tone('celeb');
  launchConfetti();
  state.running = false;
}

function launchConfetti() {
  const emojis = ['🎉', '✨', '🐉', '🍰', '🍪', '🔥', '⭐', '🍩'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = pick(emojis);
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.top  = '-40px';
      c.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
      c.style.fontSize = (20 + Math.random() * 22) + 'px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5500);
    }, i * 55);
  }
}

// ═══════════════════════════════════════════════════════════════════
// START / RESET
// ═══════════════════════════════════════════════════════════════════
async function startGame() {
  state.running = true;
  state.feedsDone = 0;
  state.usedLetters = [];
  setDragonSize(1.0);
  dragon().classList.remove('full');

  $('scrTitle').classList.remove('active');
  $('scrCeleb').classList.remove('active');
  $('dragonStage').style.display = 'flex';
  $('hud').style.display = 'flex';
  $('feedCounter').style.display = 'flex';
  $('feedCount').textContent = '0';

  audio.startMusic();

  // Intro: dragon hello + hungry
  await delay(500);
  dragonYell();
  await audio.dragonSay('hello');
  await delay(200);
  dragonYell();
  await audio.dragonSay('hungry');
  await delay(300);
  nextRound();
}

// ═══════════════════════════════════════════════════════════════════
// EVENT WIRING
// ═══════════════════════════════════════════════════════════════════
onTap($('btnStart'), async () => {
  audio.unlock();
  await delay(50);
  startGame();
});
onTap($('btnAgain'), async () => {
  audio.unlock();
  await delay(50);
  startGame();
});

// Relayout snacks on resize
window.addEventListener('resize', () => {
  if (state.snacks.length && state.running) {
    const letters = state.snacks.map(s => s.dataset.letter);
    layoutSnacks(letters);
  }
});

(function(){ function getKey(){ var parts=location.pathname.split('/').filter(Boolean); var last=parts[parts.length-1]||'index.html'; var game=last.replace('.html',''); var theme=parts[parts.length-2]||'root'; if(game==='') game='index'; return theme+'/'+game; } function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } } function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} } function markAttempt(){ var p=load(), k=getKey(); if(!p[k]) p[k]={ attempted:true, attemptedAt:Date.now() }; save(p); } function markComplete(){ var p=load(), k=getKey(); if(!p[k]) p[k]={}; p[k].completed=true; p[k].completedAt=Date.now(); p[k].plays=(p[k].plays||0)+1; save(p); } var celeb=document.getElementById('scrCeleb'); if(celeb){ var obs=new MutationObserver(function(){ if(celeb.classList.contains('active')) markComplete(); }); obs.observe(celeb, { attributes:true, attributeFilter:['class'] }); } setTimeout(markAttempt, 3000); })();
</script>
