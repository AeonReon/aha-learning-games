<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ec4899">
<title>Fun Zone · aha!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Arial Rounded MT Bold','Nunito','Quicksand',system-ui,-apple-system,Arial,sans-serif;
  background:linear-gradient(160deg,#ec4899 0%,#f59e0b 35%,#8b5cf6 70%,#3b82f6 100%);
  color:#fff;min-height:100vh;overflow-x:hidden;position:relative;
}

.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.fx-canvas{position:fixed;inset:0;z-index:100;pointer-events:none}
.main{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:30px 20px 60px}

.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#fff;text-decoration:none;padding:10px 18px;border-radius:24px;
  font-weight:800;font-size:14px;border:2px solid rgba(255,255,255,0.5);
  transition:transform 0.2s,background 0.2s;margin-bottom:30px;
  text-shadow:0 1px 3px rgba(0,0,0,0.25);
}
.back-btn:hover{background:rgba(255,255,255,0.5);transform:translateX(-3px)}

.music-btn{
  position:fixed;top:16px;right:16px;z-index:50;
  width:48px;height:48px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.25);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s,background 0.2s;
  border:2px solid rgba(255,255,255,0.4);
}
.music-btn:hover{background:rgba(255,255,255,0.4);transform:scale(1.08)}

.page-header{text-align:center;margin-bottom:30px;position:relative}
.fun-emoji{
  font-size:70px;display:inline-block;
  animation:funBounce 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,0.3))
}
@keyframes funBounce{
  0%,100%{transform:translateY(0) rotate(-8deg) scale(1)}
  50%{transform:translateY(-14px) rotate(8deg) scale(1.08)}
}
.page-title{
  font-size:clamp(40px,10vw,64px);font-weight:900;margin:6px 0 6px;
  color:#fff;
  text-shadow:0 0 30px rgba(255,255,255,0.5),
              3px 3px 0 #DB2777,
              6px 6px 0 rgba(0,0,0,0.25);
  letter-spacing:-1px;
  animation:titleWiggle 4s ease-in-out infinite;
}
@keyframes titleWiggle{
  0%,100%{transform:rotate(-1deg)}
  50%{transform:rotate(1deg)}
}
.page-sub{
  font-size:clamp(14px,3.8vw,18px);letter-spacing:0.25em;text-transform:uppercase;
  font-weight:800;color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,0.3);
  opacity:0.95;margin-top:4px;
}
.fun-tag{
  display:inline-block;margin-top:12px;
  font-size:clamp(12px,3vw,15px);font-weight:800;
  background:rgba(0,0,0,0.3);color:#FDE68A;
  padding:6px 16px;border-radius:20px;
  letter-spacing:0.1em;text-transform:uppercase;
  border:2px dashed rgba(253,230,138,0.6);
}

.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}

.game-card{
  border-radius:26px;padding:24px 16px 20px;text-decoration:none;color:#fff;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.25s ease;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 8px 22px rgba(0,0,0,0.3);
  border:3px solid rgba(255,255,255,0.3);
  min-height:180px;
}
.game-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 55%);
  pointer-events:none;
}
.game-card::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at top right,rgba(255,255,255,0.3),transparent 60%);
  pointer-events:none;opacity:0;transition:opacity 0.3s;
}
.game-card:hover::after,.game-card:focus::after{opacity:1}
.game-card:hover,.game-card:focus{transform:translateY(-8px) scale(1.04) rotate(-1deg);box-shadow:0 18px 40px rgba(0,0,0,0.35)}
.game-card:nth-child(even):hover{transform:translateY(-8px) scale(1.04) rotate(1deg)}
.game-card:active{transform:translateY(-3px) scale(0.98)}

/* Big bold colors per game */
.gc-trex{background:linear-gradient(145deg,#FBBF24,#D97706)}
.gc-dragon{background:linear-gradient(145deg,#DC2626,#7F1D1D)}
.gc-monster{background:linear-gradient(145deg,#A855F7,#5B21B6)}
.gc-icecream{background:linear-gradient(145deg,#FDA4AF,#DB2777)}
.gc-cat{background:linear-gradient(145deg,#F97316,#9A3412)}

.card-emoji{
  font-size:clamp(54px,13vw,72px);margin-bottom:10px;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,0.4));
  animation:cardBob 3s ease-in-out infinite;
}
.game-card:nth-child(1) .card-emoji{animation-delay:0s}
.game-card:nth-child(2) .card-emoji{animation-delay:0.3s}
.game-card:nth-child(3) .card-emoji{animation-delay:0.6s}
.game-card:nth-child(4) .card-emoji{animation-delay:0.9s}
.game-card:nth-child(5) .card-emoji{animation-delay:1.2s}
@keyframes cardBob{
  0%,100%{transform:translateY(0) rotate(-5deg) scale(1)}
  50%{transform:translateY(-8px) rotate(5deg) scale(1.06)}
}

.card-title{
  font-size:clamp(16px,4.2vw,20px);font-weight:900;
  margin-bottom:8px;text-shadow:0 2px 4px rgba(0,0,0,0.5);
  letter-spacing:-0.3px;line-height:1.15;
}
.card-pill{
  font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;
  background:rgba(0,0,0,0.35);color:rgba(255,255,255,0.95);
  letter-spacing:0.06em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,0.2);
}

.tap-ring{
  position:fixed;border-radius:50%;border:4px solid rgba(255,255,255,0.9);
  pointer-events:none;z-index:99;
  animation:tapRing 0.6s ease-out forwards;
  box-shadow:0 0 25px rgba(255,255,255,0.6);
}
@keyframes tapRing{
  0%{width:0;height:0;opacity:1}
  100%{width:140px;height:140px;opacity:0;border-width:1px}
}

.footer{text-align:center;padding:26px 20px 10px;color:rgba(255,255,255,0.85);font-size:12px;letter-spacing:0.05em;font-weight:700}

/* Progress badge (same pattern as other hubs) */
.progress-badge{
  position:absolute;top:10px;right:10px;z-index:2;
  display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
  padding:4px 10px;border-radius:18px;
  font-size:11px;font-weight:800;color:#fff;
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 2px 6px rgba(0,0,0,0.4);
}
.progress-badge.done{
  background:linear-gradient(135deg,#FDE68A,#F59E0B);
  color:#78350F;border-color:#FDE68A;
  box-shadow:0 0 14px rgba(253,230,138,0.8);
  animation:badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

@media(max-width:480px){
  .game-grid{grid-template-columns:1fr;gap:14px}
  .main{padding:24px 16px 50px}
  .game-card{flex-direction:row;gap:18px;text-align:left;padding:20px 18px;align-items:center;min-height:auto}
  .card-emoji{font-size:60px;margin-bottom:0;flex-shrink:0}
  .card-info{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
  .card-title{margin-bottom:0}
}
</style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>
<canvas class="fx-canvas" id="fxCanvas"></canvas>

<button class="music-btn" id="musicBtn" aria-label="Toggle music">🔇</button>

<div class="main">
  <a href="../../" class="back-btn">← Back to aha!</a>

  <div class="page-header">
    <div class="fun-emoji">🎉</div>
    <h1 class="page-title">FUN ZONE</h1>
    <div class="page-sub">Just Play · Just Silly</div>
    <div class="fun-tag">⚡ 5 Pure-Fun Games ⚡</div>
  </div>

  <div class="game-grid">
    <a href="tickle-trex.html" class="game-card gc-trex">
      <span class="card-emoji">🦖</span>
      <div class="card-info">
        <div class="card-title">Tickle the T-Rex</div>
        <span class="card-pill">Tap to Giggle</span>
      </div>
    </a>

    <a href="feed-dragon.html" class="game-card gc-dragon">
      <span class="card-emoji">🐉</span>
      <div class="card-info">
        <div class="card-title">Feed the Dragon</div>
        <span class="card-pill">Letters + Burps</span>
      </div>
    </a>

    <a href="monster-mixer.html" class="game-card gc-monster">
      <span class="card-emoji">👾</span>
      <div class="card-info">
        <div class="card-title">Monster Mixer</div>
        <span class="card-pill">Build &amp; Dance</span>
      </div>
    </a>

    <a href="ice-cream-tower.html" class="game-card gc-icecream">
      <span class="card-emoji">🍦</span>
      <div class="card-info">
        <div class="card-title">Ice Cream Tower</div>
        <span class="card-pill">Stack Fast!</span>
      </div>
    </a>

    <a href="cat-cafe.html" class="game-card gc-cat">
      <span class="card-emoji">🐱</span>
      <div class="card-info">
        <div class="card-title">Cat Café</div>
        <span class="card-pill">Serve &amp; Purr</span>
      </div>
    </a>
  </div>

  <div class="footer">aha! · Fun Zone · Just for the love of it</div>
</div>

<script>
/* Floating confetti bits in background */
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let bits = [];
  const COUNT = 80;
  function resize(){ canvas.width = window.innerWidth; canvas.height = document.documentElement.scrollHeight; }
  function init(){
    resize();
    bits = [];
    for(let i = 0; i < COUNT; i++){
      bits.push({
        x:Math.random()*canvas.width, y:Math.random()*canvas.height,
        r:Math.random()*3+1.2,
        vy:-(Math.random()*0.35+0.1), vx:(Math.random()-0.5)*0.5,
        alpha:Math.random()*0.7+0.25, pulse:Math.random()*Math.PI*2,
        hue:['#FDE68A','#FCA5A5','#86EFAC','#93C5FD','#F0ABFC','#FDBA74'][Math.floor(Math.random()*6)]
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const b of bits){
      b.x+=b.vx; b.y+=b.vy; b.pulse+=0.04;
      if(b.y<-10) b.y=canvas.height+10;
      if(b.x<-10) b.x=canvas.width+10;
      if(b.x>canvas.width+10) b.x=-10;
      const alpha=b.alpha*(0.6+0.4*Math.sin(b.pulse));
      ctx.beginPath();
      ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=b.hue;
      ctx.globalAlpha=alpha;
      ctx.shadowColor=b.hue;
      ctx.shadowBlur=11;
      ctx.fill();
    }
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', init);
  init(); draw();
})();

/* Confetti on tap */
(function(){
  const canvas = document.getElementById('fxCanvas');
  const ctx = canvas.getContext('2d');
  let parts = [];
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const COLORS = ['#FDE68A','#FCA5A5','#86EFAC','#93C5FD','#F0ABFC','#FDBA74','#FFF'];
  window.burstConfetti = function(x,y,count=40){
    for(let i=0;i<count;i++){
      const a=(Math.PI*2*i)/count+Math.random()*0.5;
      const s=Math.random()*7+3;
      parts.push({
        x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,
        color:COLORS[Math.floor(Math.random()*COLORS.length)],
        size:Math.random()*7+3,rot:Math.random()*Math.PI,
        vr:(Math.random()-0.5)*0.3,life:1,
        shape:Math.random()>0.5?'rect':'star'
      });
    }
  };
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.28; p.vx*=0.99;
      p.rot+=p.vr; p.life-=0.012;
      if(p.life<=0){parts.splice(i,1);continue;}
      ctx.save();
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color;
      if(p.shape==='rect'){
        ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      } else {
        ctx.beginPath();
        for(let k=0;k<5;k++){
          const ang=(k*2*Math.PI)/5-Math.PI/2;
          const r=k%2===0?p.size/2:p.size/4;
          ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
        }
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

/* Audio */
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playTapSound(){
  const c=ensureAudio(); const now=c.currentTime;
  // Happy upbeat ding-ding-ding
  [659.25,783.99,1046.5].forEach((f,i)=>{
    const osc=c.createOscillator(); const g=c.createGain();
    osc.type='triangle'; osc.frequency.value=f;
    g.gain.setValueAtTime(0.0001,now+i*0.05);
    g.gain.exponentialRampToValueAtTime(0.12,now+i*0.05+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,now+i*0.05+0.3);
    osc.connect(g).connect(c.destination);
    osc.start(now+i*0.05); osc.stop(now+i*0.05+0.35);
  });
}

/* Progress tracking — show badges on each game card */
(function(){
  function loadProgress(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } }
  function render(){
    const p = loadProgress();
    document.querySelectorAll('.game-card').forEach(card => {
      const href = card.getAttribute('href') || '';
      const game = href.replace('.html','');
      const key = 'fun-zone/' + game;
      const existing = card.querySelector('.progress-badge');
      if (existing) existing.remove();
      if (p[key] && p[key].completed) {
        const badge = document.createElement('div');
        badge.className = 'progress-badge done';
        badge.innerHTML = '<span>🏆</span><span>PLAYED!</span>';
        card.appendChild(badge);
      } else if (p[key] && p[key].attempted) {
        const badge = document.createElement('div');
        badge.className = 'progress-badge';
        badge.innerHTML = '<span>⭐</span><span>STARTED</span>';
        card.appendChild(badge);
      }
    });
  }
  render();
  window.addEventListener('pageshow', render);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) render(); });
})();

document.querySelectorAll('.game-card').forEach(card=>{
  card.addEventListener('click',function(e){
    e.preventDefault();
    const rect=card.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    const ring=document.createElement('div');
    ring.className='tap-ring';
    ring.style.left=cx+'px'; ring.style.top=cy+'px';
    ring.style.transform='translate(-50%,-50%)';
    document.body.appendChild(ring);
    setTimeout(()=>ring.remove(),600);
    window.burstConfetti(cx,cy,50);
    playTapSound();
    const href=card.getAttribute('href');
    setTimeout(()=>{window.location.href=href},400);
  });
});

/* Playful fun music — major pentatonic, bouncy */
(function(){
  const btn=document.getElementById('musicBtn');
  let playing=false, nextNote=0, scheduler=null, master=null;
  const SCALE=[523.25,587.33,659.25,783.99,880.00,1046.50];
  const CHORDS=[
    [130.81,196.00,261.63],[146.83,220.00,293.66],
    [174.61,261.63,349.23],[164.81,246.94,329.63]
  ];
  let ci=0, ni=0;
  function note(f,when,dur,gain=0.035,type='triangle'){
    const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,when);
    g.gain.exponentialRampToValueAtTime(gain,when+0.04);
    g.gain.exponentialRampToValueAtTime(0.0001,when+dur);
    o.connect(g).connect(master);
    o.start(when); o.stop(when+dur+0.05);
  }
  function sched(){
    while(nextNote<audioCtx.currentTime+0.25){
      note(SCALE[Math.floor(Math.random()*SCALE.length)],nextNote,0.45,0.03,'triangle');
      if(ni%4===0){
        CHORDS[ci%CHORDS.length].forEach(f=>note(f,nextNote,2.2,0.02,'sine'));
        ci++;
      }
      ni++;
      nextNote+=0.42;
    }
  }
  function start(){
    ensureAudio();
    master=audioCtx.createGain(); master.gain.value=0;
    master.gain.linearRampToValueAtTime(0.4,audioCtx.currentTime+1);
    master.connect(audioCtx.destination);
    nextNote=audioCtx.currentTime+0.1; ni=0; ci=0;
    scheduler=setInterval(sched,50);
    playing=true; btn.textContent='🎵';
    try{localStorage.setItem('aha_music','1')}catch(e){}
  }
  function stop(){
    if(master){
      const now=audioCtx.currentTime;
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(master.gain.value,now);
      master.gain.linearRampToValueAtTime(0,now+0.4);
      setTimeout(()=>{try{master.disconnect()}catch(e){} master=null},500);
    }
    clearInterval(scheduler);
    playing=false; btn.textContent='🔇';
    try{localStorage.setItem('aha_music','0')}catch(e){}
  }
  btn.addEventListener('click',()=>{if(playing)stop();else start()});
  let auto=false;
  function tryAuto(){
    if(auto) return; auto=true;
    let pref=null; try{pref=localStorage.getItem('aha_music')}catch(e){}
    if(pref!=='0') start();
  }
  ['pointerdown','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,tryAuto,{once:true}));
})();
</script>
</body>
</html>
