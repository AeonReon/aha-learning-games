<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Grow the Magic Flower F–J — Pip's Fairy Forest! 🧚</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --forest-deep: #0a2818; --forest-mid: #1a4a2c; --forest-light: #2d7a4a;
  --magic-pink: #ff6fb5; --magic-gold: #ffd700; --magic-green: #4ade80;
  --magic-blue: #60a5fa; --magic-purple: #c084fc;
  --fairy-cream: #fff8e6;
  --white85: rgba(255,255,255,0.9);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Background — enchanted forest ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(170deg, #0a2818 0%, #1a4a2c 35%, #2d7a4a 70%, #3d9b5e 100%);
}
.bg-element {
  position: fixed; pointer-events: none; z-index: 1;
  font-size: clamp(12px, 2.5vw, 20px);
  opacity: 0.4;
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.4; }
  92%  { opacity: 0.4; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1.1); opacity: 0; }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title .icon-row {
  display: flex; gap: 14px;
  justify-content: center; align-items: flex-end;
  margin-bottom: 10px;
}
.screen-title .icon-row span { font-size: clamp(40px, 10vw, 68px); }
.screen-title h1 {
  font-size: clamp(24px, 6vw, 42px);
  color: var(--magic-gold);
  text-shadow: 0 0 30px rgba(255,215,0,0.7), 2px 2px 0 rgba(0,0,0,0.4);
  margin: 6px 0 8px;
}
.screen-title p {
  font-size: clamp(13px, 3.2vw, 19px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.3);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start { background: linear-gradient(135deg, var(--magic-pink), #c7428f); margin-top: 18px; animation: glow 2.4s ease-in-out infinite; }
.btn-again { background: linear-gradient(135deg, var(--magic-pink), #c7428f); margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(10,40,24,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(255,215,0,0.2);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.5); font-weight: bold; letter-spacing: 0.05em; }
.hud-val { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--magic-pink); }
.hud-score .hud-val { color: var(--magic-gold); }
.hud-center .hud-val { color: var(--magic-gold); font-size: clamp(13px,3vw,18px); }

/* ── Pip character (bottom-left) ── */
.char-area {
  position: fixed; bottom: 150px; left: 10px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji {
  font-size: clamp(44px,10vw,66px);
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
  animation: fairyFloat 3s ease-in-out infinite;
}
@keyframes fairyFloat {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%     { transform: translateY(-6px) rotate(3deg); }
}
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,248,230,0.98); color: var(--forest-deep);
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(11px,2.4vw,15px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.3);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,248,230,0.98);
}

/* ── Play area (letter petals) ── */
.play-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 220px;
  z-index: var(--z-game);
  pointer-events: none;
}
.play-area.active { pointer-events: auto; }

/* Timer shift (round 4) */
.play-area.timer-warning { animation: timerShift 30s ease-in-out forwards; }
@keyframes timerShift {
  0%   { background: transparent; }
  50%  { background: rgba(255,215,0,0.05); }
  100% { background: rgba(255,140,200,0.08); }
}

/* ── Letter Petals ── */
.letter-petal {
  position: absolute;
  width: clamp(88px, 20vw, 120px);
  height: clamp(88px, 20vw, 120px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border: 3px solid rgba(255,255,255,0.5);
  box-shadow: 0 6px 22px rgba(0,0,0,0.35), inset 0 -6px 14px rgba(0,0,0,0.15);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s, opacity 0.3s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  z-index: 2;
  opacity: 0; transform: scale(0.5);
  /* Petal shape: rounded leaf */
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  padding: 4px;
}
.letter-petal.show { opacity: 1; transform: scale(1); }
.letter-petal:active { transform: scale(0.93) !important; }
.letter-petal.r4-size {
  width: clamp(72px, 16vw, 96px);
  height: clamp(72px, 16vw, 96px);
}
.letter-petal.r4-size .petal-letters { font-size: clamp(22px,5vw,30px); }

.petal-letters {
  font-weight: 900; color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.35), 0 0 10px rgba(255,255,255,0.3);
  font-size: clamp(28px, 6.5vw, 42px);
  line-height: 1;
  letter-spacing: 0.05em;
}
.petal-emoji {
  font-size: clamp(22px, 5vw, 34px);
  line-height: 1; margin-top: 4px;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
}
.petal-word {
  font-size: clamp(9px, 2vw, 13px);
  font-weight: bold; color: rgba(255,255,255,0.8);
  text-transform: lowercase; line-height: 1;
  margin-top: 3px;
}
.petal-small-letter {
  font-size: clamp(14px, 3.2vw, 20px);
  font-weight: 900;
  color: rgba(255,255,255,0.85);
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  margin-top: 4px;
  line-height: 1;
}

/* Petal states */
.letter-petal.activated {
  border-color: var(--magic-gold) !important;
  box-shadow: 0 0 35px rgba(255,215,0,0.8), 0 0 70px rgba(255,215,0,0.4), 0 6px 22px rgba(0,0,0,0.3) !important;
  transform: scale(1.08) !important;
}
.letter-petal.next-hint { animation: pulseHint 1.5s ease-in-out infinite; }
@keyframes pulseHint {
  0%,100% { box-shadow: 0 0 14px rgba(255,215,0,0.4), 0 6px 22px rgba(0,0,0,0.3); }
  50%     { box-shadow: 0 0 35px rgba(255,215,0,0.85), 0 0 60px rgba(255,215,0,0.4), 0 6px 22px rgba(0,0,0,0.3); }
}
.letter-petal.wrong-tap { animation: wrongShake 0.45s ease-in-out; }
.letter-petal.wiggle { animation: wiggleHint 0.6s ease-in-out; }
@keyframes wiggleHint {
  0%,100% { transform: rotate(0deg) scale(1); }
  20% { transform: rotate(-8deg) scale(1.03); }
  40% { transform: rotate(8deg) scale(1.03); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(5deg); }
}

/* Fly-to-flower animation */
.letter-petal.flying {
  transition: none !important;
  z-index: 50;
  pointer-events: none;
}

/* ── MAGIC FLOWER (bottom-center) ── */
.flower-area {
  position: fixed;
  bottom: 40px; left: 50%; transform: translateX(-50%);
  z-index: var(--z-ui);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
}
.flower {
  position: relative;
  width: clamp(160px, 40vw, 220px);
  height: clamp(160px, 40vw, 220px);
  display: flex; align-items: center; justify-content: center;
}
/* Stem */
.flower-stem {
  position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 6px;
  height: clamp(50px, 12vw, 70px);
  background: linear-gradient(180deg, #3d9b5e, #1a4a2c);
  border-radius: 3px;
  z-index: 1;
}
.flower-leaf {
  position: absolute;
  bottom: clamp(20px, 5vw, 32px);
  width: clamp(24px, 6vw, 34px);
  height: clamp(14px, 3.5vw, 20px);
  background: linear-gradient(135deg, #4ade80, #2d7a4a);
  border-radius: 0 100% 0 100%;
  z-index: 1;
  transition: transform 0.6s;
}
.flower-leaf.left {
  left: 50%; transform-origin: right center;
  transform: translateX(-100%) rotate(-30deg);
}
.flower-leaf.right {
  right: 50%; transform-origin: left center;
  transform: translateX(100%) rotate(210deg) scaleY(-1);
}
.flower.bloom-0 .flower-leaf.left { transform: translateX(-100%) rotate(-30deg) scale(0.6); }
.flower.bloom-0 .flower-leaf.right { transform: translateX(100%) rotate(210deg) scaleY(-1) scale(0.6); }

/* Flower bud/head container */
.flower-head {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: clamp(90px, 24vw, 140px);
  height: clamp(90px, 24vw, 140px);
  z-index: 3;
  transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.flower.bloom-0 .flower-head { transform: translateX(-50%) scale(0.25); }
.flower.bloom-1 .flower-head { transform: translateX(-50%) scale(0.55); }
.flower.bloom-2 .flower-head { transform: translateX(-50%) scale(0.72); }
.flower.bloom-3 .flower-head { transform: translateX(-50%) scale(0.86); }
.flower.bloom-4 .flower-head { transform: translateX(-50%) scale(0.95); }
.flower.bloom-5 .flower-head { transform: translateX(-50%) scale(1.1); animation: fullBloom 2s ease-in-out infinite; }
@keyframes fullBloom {
  0%,100% { transform: translateX(-50%) scale(1.1); }
  50%     { transform: translateX(-50%) scale(1.22); }
}

/* Bud (stage 0) */
.flower-bud {
  position: absolute;
  inset: 20%;
  background: linear-gradient(135deg, #4ade80, #2d7a4a);
  border-radius: 60% 60% 40% 40% / 70% 70% 30% 30%;
  box-shadow: inset 0 -6px 12px rgba(0,0,0,0.3);
  opacity: 1;
  transition: opacity 0.5s;
}
.flower.bloom-1 .flower-bud,
.flower.bloom-2 .flower-bud,
.flower.bloom-3 .flower-bud,
.flower.bloom-4 .flower-bud,
.flower.bloom-5 .flower-bud { opacity: 0; }

/* The 5 petals around center — each tied to a letter position */
.fpetal {
  position: absolute;
  top: 50%; left: 50%;
  width: 40%; height: 40%;
  border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
  transform-origin: 50% 100%;
  box-shadow: inset 0 -4px 10px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translate(-50%, -100%) rotate(var(--rot)) scale(0);
  transition: opacity 0.7s, transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.fpetal.fpetal-0 { --rot: 0deg;   background: radial-gradient(circle at 50% 40%, #ffb3d9, var(--magic-pink)); }
.fpetal.fpetal-1 { --rot: 72deg;  background: radial-gradient(circle at 50% 40%, #fff0a0, var(--magic-gold)); }
.fpetal.fpetal-2 { --rot: 144deg; background: radial-gradient(circle at 50% 40%, #a0f0c0, var(--magic-green)); }
.fpetal.fpetal-3 { --rot: 216deg; background: radial-gradient(circle at 50% 40%, #b0d5ff, var(--magic-blue)); }
.fpetal.fpetal-4 { --rot: 288deg; background: radial-gradient(circle at 50% 40%, #e0c0ff, var(--magic-purple)); }

.fpetal.bloomed {
  opacity: 1;
  transform: translate(-50%, -100%) rotate(var(--rot)) scale(1);
}

/* Center of flower */
.flower-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32%; height: 32%;
  border-radius: 50%;
  background: radial-gradient(circle, #fff4a0 0%, var(--magic-gold) 60%, #c47400 100%);
  box-shadow: 0 0 0 rgba(255,215,0,0);
  z-index: 4;
  transition: box-shadow 0.8s, background 0.5s;
}
.flower.bloom-0 .flower-center { opacity: 0; }
.flower.bloom-1 .flower-center { box-shadow: 0 0 15px rgba(255,215,0,0.4); }
.flower.bloom-2 .flower-center { box-shadow: 0 0 22px rgba(255,215,0,0.55); }
.flower.bloom-3 .flower-center { box-shadow: 0 0 30px rgba(255,215,0,0.7); }
.flower.bloom-4 .flower-center { box-shadow: 0 0 40px rgba(255,215,0,0.85); }
.flower.bloom-5 .flower-center {
  box-shadow: 0 0 55px rgba(255,215,0,1), 0 0 100px rgba(255,111,181,0.6);
  animation: centerPulse 1.2s ease-in-out infinite;
}
@keyframes centerPulse {
  0%,100% { filter: brightness(1); }
  50%     { filter: brightness(1.4); }
}

/* Flower glow halo */
.flower-glow {
  position: absolute;
  inset: -10%;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s, box-shadow 0.6s;
}
.flower.bloom-1 .flower-glow { opacity: 1; box-shadow: 0 0 40px rgba(255,111,181,0.3); }
.flower.bloom-2 .flower-glow { opacity: 1; box-shadow: 0 0 55px rgba(255,215,0,0.35); }
.flower.bloom-3 .flower-glow { opacity: 1; box-shadow: 0 0 70px rgba(74,222,128,0.35); }
.flower.bloom-4 .flower-glow { opacity: 1; box-shadow: 0 0 85px rgba(96,165,250,0.4); }
.flower.bloom-5 .flower-glow {
  opacity: 1;
  box-shadow: 0 0 100px rgba(192,132,252,0.5), 0 0 160px rgba(255,215,0,0.4);
  animation: rainbowGlow 3s ease-in-out infinite;
}
@keyframes rainbowGlow {
  0%,100% { filter: hue-rotate(0deg); }
  50%     { filter: hue-rotate(60deg); }
}

/* Floating sparkles around flower */
.flower-sparkle {
  position: absolute;
  font-size: 14px;
  pointer-events: none;
  animation: flowerSparkle 2.5s ease-in-out infinite;
}
@keyframes flowerSparkle {
  0%,100% { transform: translateY(0) scale(0.8); opacity: 0.3; }
  50%     { transform: translateY(-12px) scale(1.1); opacity: 1; }
}

/* Splash effect when petal lands */
.splash {
  position: absolute;
  font-size: 18px;
  animation: splashPop 0.6s ease-out forwards;
  pointer-events: none; z-index: 60;
}
@keyframes splashPop {
  0%   { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-40px) scale(1.6); opacity: 0; }
}

/* Sparkle trail */
.sparkle-trail {
  position: fixed;
  font-size: 14px;
  pointer-events: none;
  z-index: 55;
  animation: trailFade 0.4s ease-out forwards;
}
@keyframes trailFade {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.3) translateY(10px); opacity: 0; }
}

/* Bloom counter (4 pips for 4 completed flowers) */
.bloom-counter {
  display: flex; gap: 5px; justify-content: center;
  margin-top: 6px;
}
.bloom-pip {
  width: clamp(16px, 4vw, 22px);
  height: clamp(16px, 4vw, 22px);
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  transition: all 0.4s;
  font-size: clamp(11px, 2.5vw, 15px);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.3);
}
.bloom-pip.filled {
  border-color: var(--magic-gold);
  animation: pipFill 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  color: #fff;
}
.bloom-pip.filled:nth-child(1) { background: linear-gradient(180deg, #ffb3d9, var(--magic-pink)); }
.bloom-pip.filled:nth-child(2) { background: linear-gradient(180deg, #fff0a0, var(--magic-gold)); }
.bloom-pip.filled:nth-child(3) { background: linear-gradient(180deg, #a0f0c0, var(--magic-green)); }
.bloom-pip.filled:nth-child(4) { background: linear-gradient(180deg, #b0d5ff, var(--magic-blue)); }
@keyframes pipFill { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.35)} 100%{transform:scale(1.15)} }

/* ── Progress bar — 5 letter dots F-J ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: calc(var(--z-ui) + 5);
  display: flex; justify-content: center; align-items: center;
  gap: clamp(6px,1.5vw,10px);
  padding: 4px 10px 6px;
  background: rgba(10,40,24,0.92); backdrop-filter: blur(5px);
  pointer-events: none;
}
.prog-dot {
  width: clamp(28px,5.5vw,38px);
  height: clamp(28px,5.5vw,38px);
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,3vw,20px); font-weight: 900;
  color: rgba(255,255,255,0.3);
  transition: all 0.3s;
}
.prog-dot.current {
  border-color: var(--magic-gold);
  color: var(--magic-gold);
}
.prog-dot.done {
  background: linear-gradient(135deg, var(--magic-gold), #c47400);
  border-color: var(--magic-gold); color: #fff;
  animation: progBloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes progBloom { 0%{transform:scale(0.4);opacity:0.5} 70%{transform:scale(1.25)} 100%{transform:scale(1.15)} }

/* ── Round banner ── */
.round-banner {
  position: fixed; top: 40%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: var(--z-overlay); text-align: center;
  background: rgba(10,40,24,0.95); backdrop-filter: blur(12px);
  border: 2px solid rgba(255,215,0,0.25); border-radius: 26px;
  padding: 22px 40px; min-width: 280px;
  opacity: 0; pointer-events: none; transition: opacity 0.38s;
}
.round-banner.show { opacity: 1; }
.round-banner h2 {
  font-size: clamp(20px,5vw,34px); font-weight: 900;
  color: var(--magic-gold); text-shadow: 1px 1px 0 rgba(0,0,0,0.35);
}
.round-banner p {
  font-size: clamp(12px,2.8vw,17px);
  color: rgba(255,255,255,0.7); margin-top: 5px;
}

/* ── Celebration screen ── */
.screen-celeb {
  background: rgba(10,30,18,0.92); backdrop-filter: blur(12px);
  z-index: var(--z-celeb);
}
.screen-celeb h2 {
  font-size: clamp(24px,6vw,44px); color: var(--magic-gold);
  text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  animation: bounce 1.5s ease-in-out infinite;
}
.screen-celeb p { font-size: clamp(13px,3.2vw,20px); color: rgba(255,255,255,0.92); margin: 6px 0; }
.celeb-stars { font-size: clamp(28px,7vw,50px); margin: 10px 0; letter-spacing: 5px; }
.celeb-fairy { font-size: clamp(60px, 16vw, 100px); animation: fairyTwirl 2s ease-in-out infinite; }
.celeb-fairy-text {
  font-size: clamp(14px, 3.5vw, 22px);
  color: var(--magic-pink); font-weight: bold;
  margin: 8px 0;
  animation: fadeInUp 1s ease-out 0.5s both;
}
@keyframes fairyTwirl {
  0%,100% { transform: translateY(0) rotate(-8deg) scale(1); }
  25%     { transform: translateY(-12px) rotate(8deg) scale(1.08); }

}
@keyframes fadeInUp {

}

// ══════════════════════════════════════════════════════════════════
// AUDIO CLASS (AudioContext-first with iOS fallback)
// ══════════════════════════════════════════════════════════════════
class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.08; this.sfxVol = 0.3; this.musicDucked = 0.025;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Enchanted forest — bright major pentatonic, sparkly feel
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 659.25]; // C D E G A C E (C major pentatonic extended)
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.5 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.7 ? 2 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.11, this.ctx.currentTime + 0.15);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.0);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.2);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 750 + Math.random() * 1100);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')  { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')    { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')    { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone'){ p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')   { p(440,t,0.15,0.2); p(554,t+0.1,0.18,0.25); }
    else if (type==='hint')     { p(440,t,0.15,0.15); p(550,t+0.15,0.2,0.12); }
    else if (type==='whoosh')   {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(900,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='bloom') {
      // Sparkly bloom chime — magical twinkle
      p(659.25, t, 0.12, 0.3);
      p(880, t+0.06, 0.14, 0.25);
      p(1174.66, t+0.12, 0.18, 0.2, 'triangle');
    }
    else if (type==='splash') {
      // Gentle magical landing
      p(500, t, 0.08, 0.25);
      p(700, t+0.05, 0.1, 0.2);
      p(900, t+0.1, 0.12, 0.15, 'triangle');
    }
  }
  // Ascending sequence chime — pitch rises with each petal (F→J)
  toneSequence(idx) {
    this._init(); const t = this.ctx.currentTime;
    const freqs = [293.66, 349.23, 392.00, 440.00, 523.25]; // D F G A C ascending
    const f = freqs[Math.min(idx, freqs.length-1)];
    const p = (freq, s, d, v, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = freq;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    p(f, t, 0.28, 0.4);
    p(f * 1.5, t + 0.05, 0.22, 0.18);
    p(f * 2, t + 0.08, 0.18, 0.12, 'triangle');
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_B[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakLetter(l)   { return this.speak(`${AUDIO_BASE}/letters/${l}.mp3`); }
  speakPhrase(name){ return this.speak(`${AUDIO_BASE}/phrases/${name}.mp3`); }
  clearQueue()     { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ══════════════════════════════════════════════════════════════════
// VISUAL EFFECTS

function confetti(count = 40, extra = []) {
  const all = ['⭐','✨','💫','🌟','🎉','🌸','🌺','🌼','🦋','🧚', ...extra];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti'; el.textContent = pick(all);
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top  = '-30px';
    el.style.fontSize = (16 + Math.random()*14) + 'px';
    el.style.animationDelay    = (Math.random()*1.8) + 's';
    el.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6200);
  }
}

function starBurst(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'starburst';
    s.textContent = pick(['✨','💫','⭐','🌟','🌸','🦋']);
    s.style.left = (cx + (Math.random()-0.5)*140) + 'px';
    s.style.top  = (cy + (Math.random()-0.5)*140) + 'px';
    s.style.animationDelay = (Math.random()*0.15) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

// Final bloom burst
function bloomBurst() {
  const flower = $('flower');
  const r = flower.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const emojis = ['🌸','🌺','🌼','🌻','💐','🦋','✨','💫','⭐','🌟','🎉','🧚','💜','💛'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'burst-particle';
    p.textContent = pick(emojis);
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    p.style.fontSize = (18 + Math.random()*20) + 'px';
    p.style.setProperty('--bx', ((Math.random()-0.5)*400) + 'px');
    p.style.setProperty('--by', (-120 - Math.random()*350) + 'px');
    p.style.animationDelay = (Math.random()*0.6) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2800);
  }
}

// Butterflies fly out from flower
function releaseButterflies(count = 6) {
  const flower = $('flower');
  const r = flower.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'butterfly';
    b.textContent = '🦋';
    b.style.left = cx + 'px';
    b.style.top  = cy + 'px';
    b.style.setProperty('--bfx1', ((Math.random()-0.5)*300) + 'px');
    b.style.setProperty('--bfy1', (-100 - Math.random()*150) + 'px');
    b.style.setProperty('--bfx2', ((Math.random()-0.5)*600) + 'px');
    b.style.setProperty('--bfy2', (-200 - Math.random()*300) + 'px');
    b.style.animationDelay = (Math.random()*0.5) + 's';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 4600);
  }
}

// Add floating sparkles around the flower as it blooms
function updateFlowerSparkles() {
  const flower = $('flower');
  flower.querySelectorAll('.flower-sparkle').forEach(s => s.remove());
  const count = petalsBloomed * 2;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'flower-sparkle';
    s.textContent = pick(['✨','💫','⭐','🌟']);
    const angle = (i / count) * Math.PI * 2 + Math.random()*0.5;
    const radius = 45 + Math.random() * 15;
    s.style.left = `calc(50% + ${Math.cos(angle)*radius}%)`;
    s.style.top  = `calc(50% + ${Math.sin(angle)*radius}%)`;
    s.style.animationDelay = (Math.random() * 2) + 's';
    s.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    flower.appendChild(s);
  }
}

// ══════════════════════════════════════════════════════════════════
// FLOWER MANAGEMENT
// ══════════════════════════════════════════════════════════════════
let petalsBloomed = 0;     // 0-5 per sequence
let flowersGrown = 0;      // 0-4 total

function resetFlower() {
  petalsBloomed = 0;
  updateFlowerState();
  // Clear bloomed petals
  for (let i = 0; i < 5; i++) {
    $('fpetal' + i).classList.remove('bloomed');
  }
  updateFlowerSparkles();
}

function updateFlowerState() {
  const flower = $('flower');
  // Remove old bloom classes
  for (let i = 0; i <= 5; i++) flower.classList.remove('bloom-' + i);
  flower.classList.add('bloom-' + petalsBloomed);
}

function bloomNextPetal(idx) {
  // Bloom petal at visual position idx
  const fpetal = $('fpetal' + idx);
  if (fpetal) fpetal.classList.add('bloomed');
}

function markFlower(idx) {
  const pip = $('bpip' + idx);
  if (pip) pip.classList.add('filled');
}

// ══════════════════════════════════════════════════════════════════
// SCENERY — floating forest magic
// ══════════════════════════════════════════════════════════════════
function buildScenery() {
  const emojis = ['🦋','✨','🌿','🍃','💫','🌸','⭐','🌼','🌺','🧚'];
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'bg-element';
    el.textContent = pick(emojis);
    el.style.left              = (Math.random()*100) + 'vw';
    el.style.animationDelay    = (-Math.random()*20) + 's';
    el.style.animationDuration = (12 + Math.random()*16) + 's';
    document.body.appendChild(el);
  }
}

// ══════════════════════════════════════════════════════════════════
// ROUND CONFIG
// ══════════════════════════════════════════════════════════════════
const ROUNDS = [
  { label:'Round 1 — Grow the Flower! 🌸', sub:'Tap letters F to J in order! Hints will help.',  display:'full',   hintMode:'strong' },
  { label:'Round 2 — Grow Again! 🧚',      sub:'No hints this time! Remember the order.',         display:'full',   hintMode:'none'   },
  { label:'Round 3 — Picture Petals! 🦋',  sub:'Find the letters by their pictures!',             display:'picture', hintMode:'none'   },
  { label:'Round 4 — Speedy Bloom! 🏆',    sub:'Quick! Pip wants one more flower!',               display:'full',   hintMode:'none', timer:true, smaller:true },
];

// ══════════════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════════════
const audio = new GameAudio();
let gameActive = false;
let round = 0, score = 0;
let nextTapIdx = 0; // index into LETTERS array (0-4)
let petalEls = {}; // keyed by letter
let hintTimer = null, hintVoiceTimer = null;

// ══════════════════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id) $(id).classList.add('active');
}

// ══════════════════════════════════════════════════════════════════
// PROGRESS BAR — 5 letter dots F-J
// ══════════════════════════════════════════════════════════════════
function buildProg() {
  const bar = $('progBar');
  bar.innerHTML = ''; bar.style.display = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot'; d.id = 'pdot' + i;
    d.textContent = LETTERS[i].toUpperCase();
    bar.appendChild(d);
  }
}
function markProg(idx) {
  const d = $('pdot' + idx);
  if (d) {
    d.textContent = LETTER_EMOJI[LETTERS[idx]];
    d.classList.add('done');
  }
}
function highlightProg(idx) {
  for (let i = 0; i < 5; i++) {
    const d = $('pdot' + i);
    if (d) d.classList.toggle('current', i === idx);
  }
}

// ══════════════════════════════════════════════════════════════════
// HINT SYSTEM
// ══════════════════════════════════════════════════════════════════
function clearHints() { clearTimeout(hintTimer); clearTimeout(hintVoiceTimer); }
function resetHints() {
  clearHints();
  if (!gameActive) return;
  const cfg = ROUNDS[round];
  if (cfg.hintMode === 'none') return;

  hintTimer = setTimeout(() => {
    const targetLetter = LETTERS[nextTapIdx];
    const petal = petalEls[targetLetter];
    if (petal && gameActive) {
      petal.classList.add('wiggle');
      audio.tone('hint');
      setTimeout(() => petal.classList.remove('wiggle'), 700);
    }
  }, 4000);
  hintVoiceTimer = setTimeout(() => {
    if (gameActive) {
      audio.play('thinking');
      setTimeout(() => { if (gameActive) audio.speakLetter(LETTERS[nextTapIdx]); }, 1200);
    }
  }, 7000);
}

// ══════════════════════════════════════════════════════════════════
// POSITION GENERATION — random with minimum spacing
// ══════════════════════════════════════════════════════════════════
function generatePositions(count, smaller) {
  const area = $('playArea');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const petalW = smaller ? Math.min(Math.max(72, areaW * 0.16), 96) : Math.min(Math.max(88, areaW * 0.20), 120);
  const petalH = petalW;
  const margin = petalW * 0.5;
  const minDist = petalW * 1.3;

  const positions = [];
  for (let i = 0; i < count; i++) {
    let tries = 0;
    let x, y;
    do {
      x = margin + Math.random() * (areaW - margin * 2 - petalW);
      y = margin + 10 + Math.random() * (areaH - margin * 2 - petalH);
      tries++;
      if (tries > 300) break;
    } while (positions.some(p => {
      const dx = p.x - x, dy = p.y - y;
      return Math.sqrt(dx*dx + dy*dy) < minDist;
    }));
    positions.push({ x, y });
  }
  return positions;
}

// ══════════════════════════════════════════════════════════════════
// RENDER LETTER PETALS
// ══════════════════════════════════════════════════════════════════
function renderPetals() {
  const area = $('playArea');
  const cfg = ROUNDS[round];

  area.querySelectorAll('.letter-petal').forEach(n => n.remove());
  petalEls = {};

  const positions = generatePositions(5, cfg.smaller);
  const shuffledOrder = shuffle([...Array(5).keys()]); // random placement

  shuffledOrder.forEach((seqIdx, posIdx) => {
    const letter = LETTERS[seqIdx];
    const petal = document.createElement('div');
    petal.className = 'letter-petal';
    if (cfg.smaller) petal.classList.add('r4-size');
    petal.style.background = PETAL_COLORS[letter];
    petal.style.left = positions[posIdx].x + 'px';
    petal.style.top  = positions[posIdx].y + 'px';
    petal.dataset.letter = letter;

    const upper = letter.toUpperCase();
    const lower = letter;
    const emoji = LETTER_EMOJI[letter];
    const word  = LETTER_WORDS[letter];

    let inner = '';
    if (cfg.display === 'full') {
      inner = `<div class="petal-letters">${upper} ${lower}</div>
               <div class="petal-emoji">${emoji}</div>
               <div class="petal-word">${word}</div>`;
    } else if (cfg.display === 'picture') {
      // Picture only + small letter
      inner = `<div class="petal-emoji" style="font-size:clamp(36px,9vw,54px);margin-top:0">${emoji}</div>
               <div class="petal-small-letter">${upper}${lower}</div>`;
    }
    petal.innerHTML = inner;

    onTap(petal, () => handlePetalTap(petal, letter));
    area.appendChild(petal);
    petalEls[letter] = petal;

    setTimeout(() => petal.classList.add('show'), 100 + posIdx * 120);
  });

  area.classList.add('active');

  // Initial hint for round 1
  setTimeout(() => {
    if (cfg.hintMode === 'strong') {
      const firstPetal = petalEls[LETTERS[0]];
      if (firstPetal) firstPetal.classList.add('next-hint');
    }
  }, 700);
}

// ══════════════════════════════════════════════════════════════════
// FLY-TO-FLOWER ANIMATION (~350ms)
// ══════════════════════════════════════════════════════════════════
function flyToFlower(petal) {
  return new Promise(resolve => {
    const petalRect = petal.getBoundingClientRect();
    const flower = $('flower');
    const flowerRect = flower.getBoundingClientRect();

    const startX = petalRect.left;
    const startY = petalRect.top;
    const endX = flowerRect.left + flowerRect.width/2 - petalRect.width/2;
    const endY = flowerRect.top + flowerRect.height*0.25 - petalRect.height/2;

    petal.classList.add('flying');
    petal.style.position = 'fixed';
    petal.style.left = startX + 'px';
    petal.style.top  = startY + 'px';
    petal.style.zIndex = '55';

    const duration = 350;
    const startTime = performance.now();
    let lastTrail = 0;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // Ease-in acceleration
      const ease = progress * progress;

      const curX = startX + (endX - startX) * ease;
      // Arc upward then down
      const arcHeight = -70;
      const curY = startY + (endY - startY) * ease + arcHeight * Math.sin(progress * Math.PI);

      const scale = 1 - progress * 0.5;
      petal.style.left = curX + 'px';
      petal.style.top  = curY + 'px';
      petal.style.transform = `scale(${scale}) rotate(${progress * 360}deg)`;

      if (now - lastTrail > 40) {
        spawnTrail(curX + petalRect.width/2, curY + petalRect.height/2);
        lastTrail = now;
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        petal.style.display = 'none';
        audio.tone('splash');
        flowerSplash();
        resolve();
      }
    }
    requestAnimationFrame(animate);
  });
}

// ══════════════════════════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════════════════════════
function updateHud() {
  const targetLetter = LETTERS[nextTapIdx];
  if (nextTapIdx < 5) {
    $('hudFind').textContent = `Tap ${targetLetter.toUpperCase()}`;
  } else {
    $('hudFind').textContent = '🌸 Bloomed!';
  }
}

// ══════════════════════════════════════════════════════════════════
// HANDLE PETAL TAP
// ══════════════════════════════════════════════════════════════════
async function handlePetalTap(petalEl, letter) {
  if (!gameActive) return;
  clearHints();

  const targetLetter = LETTERS[nextTapIdx];

  if (letter === targetLetter) {
    // ✓ CORRECT
    gameActive = false;

    petalEl.classList.remove('next-hint', 'wiggle');
    petalEl.classList.add('activated');
    starBurst(petalEl);

    // Ascending chime
    audio.toneSequence(nextTapIdx);

    score++;
    $('hudScore').textContent = score;

    // Pip reacts
    jumpChar();
    showCharBubble(pick(BUBBLE_CORRECT), 1800);

    // Voice: speak the letter once (fire-and-forget)
    audio.speakLetter(letter);

    // Mark progress
    markProg(nextTapIdx);

    await delay(250);

    // Fly petal to flower!
    await flyToFlower(petalEl);

    // Bloom the petal on the flower
    petalsBloomed++;
    bloomNextPetal(petalsBloomed - 1);
    updateFlowerState();
    updateFlowerSparkles();
    audio.tone('bloom');

    await delay(200);

    nextTapIdx++;
    highlightProg(nextTapIdx);
    updateHud();

    if (nextTapIdx >= 5) {
      // Sequence complete — flower fully bloomed!
      await celebrateSequence();
    } else {
      // Highlight next petal hint (round 1 only)
      const cfg = ROUNDS[round];
      if (cfg.hintMode === 'strong') {
        const nextPetal = petalEls[LETTERS[nextTapIdx]];
        if (nextPetal) nextPetal.classList.add('next-hint');
      }
      gameActive = true;
      resetHints();
    }

  } else {
    // ✗ WRONG
    petalEl.classList.add('wrong-tap');
    audio.tone('wrong');
    showCharBubble(pick(BUBBLE_WRONG), 1900);

    audio.play('wrong');
    // Speak the correct target letter after a beat
    setTimeout(() => audio.speakLetter(targetLetter), 600);
    setTimeout(() => {
      petalEl.classList.remove('wrong-tap');
      resetHints();
    }, 480);
  }
}

// ══════════════════════════════════════════════════════════════════
// CELEBRATE SEQUENCE COMPLETION — FLOWER BLOOMED!
// ══════════════════════════════════════════════════════════════════
async function celebrateSequence() {
  $('playArea').classList.remove('timer-warning');

  // Extra sparkles around full flower
  updateFlowerSparkles();

  audio.tone('celeb');

  // Flower bloomed! — confetti + bubble immediately
  showCharBubble(pick(BUBBLE_BLOOM), 2000);
  confetti(30, ['🌸','🌺','🌼','🦋','💜','✨']);
  // Release a couple butterflies for this flower
  releaseButterflies(3);
  audio.play('correct');

  markFlower(flowersGrown);
  flowersGrown++;

  await delay(800);
  await finishRound();
}

// ══════════════════════════════════════════════════════════════════
// ROUND TRANSITIONS (~3s between rounds)
// ══════════════════════════════════════════════════════════════════
async function finishRound() {
  gameActive = false;
  clearHints();

  $('playArea').querySelectorAll('.letter-petal').forEach(n => n.remove());
  $('playArea').classList.remove('active', 'timer-warning');

  audio.tone('roundDone');
  confetti(32, ['🌸','🦋','✨','💫']);
  round++;

  if (round >= ROUNDS.length) {
    await delay(700);
    celebrateFinish();
    return;
  }

  // ── Round complete banner ──
  $('roundTitle').textContent = '🌸 Flower Bloomed! 🌸';
  $('roundSub').textContent   = 'Pip is twirling with joy!';
  $('roundBanner').classList.add('show');
  audio.play('round-complete');
  await delay(1500);
  $('roundBanner').classList.remove('show');
  await delay(250);

  // ── Next round intro ──
  const cfg = ROUNDS[round];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  await delay(1250);
  $('roundBanner').classList.remove('show');
  await delay(200);

  startRound();
}

function startRound() {
  const cfg = ROUNDS[round];
  $('hudRound').textContent = `${round + 1}/4`;
  resetFlower();
  buildProg();
  startAttempt();
}

// ══════════════════════════════════════════════════════════════════
// START ATTEMPT (each round = 1 sequence)
// ══════════════════════════════════════════════════════════════════
async function startAttempt() {
  nextTapIdx = 0;
  updateHud();
  highlightProg(0);
  renderPetals();
  gameActive = true;

  audio.tone('reveal');
  await audio.speakLetter('f');

  resetHints();

  if (ROUNDS[round].timer) {
    $('playArea').classList.remove('timer-warning');
    void $('playArea').offsetWidth;
    $('playArea').classList.add('timer-warning');
  }
}

// ══════════════════════════════════════════════════════════════════
// FINAL CELEBRATION — FULL GARDEN!
// ══════════════════════════════════════════════════════════════════
async function celebrateFinish() {
  gameActive = false;
  audio.stopMusic();
  $('hud').style.display       = 'none';
  $('progBar').style.display   = 'none';
  $('roundBanner').classList.remove('show');
  $('playArea').classList.remove('active');

  // Huge final bloom!
  bloomBurst();
  releaseButterflies(12);
  audio.tone('celeb');
  await delay(900);

  // Hide flower after final burst
  $('flowerArea').style.display = 'none';
  $('charArea').style.display   = 'none';

  confetti(70, ['🌸','🌺','🌼','🌻','🦋','🧚','✨','💜','💛','🎉']);

  const stars = Math.min(5, Math.max(3, 1 + Math.floor(score / 5)));
  $('celebStars').textContent = '⭐'.repeat(stars);

  showScreen('scrCeleb');
  audio.tone('celeb');
  await delay(200);

  // Two celebration voice clips
  await audio.play('game-complete');
  await delay(400);
  confetti(55, ['🦋','🌸','🧚','🌟']);
  await audio.play('game-complete');
}

// ══════════════════════════════════════════════════════════════════
// INIT & START
// ══════════════════════════════════════════════════════════════════
function resetGame() {
  round = 0; score = 0; flowersGrown = 0;
  nextTapIdx = 0;
  petalsBloomed = 0;
  $('hudScore').textContent = '0';

  // Reset flower pips
  for (let i = 0; i < 4; i++) {
    const pip = $('bpip' + i);
    if (pip) pip.classList.remove('filled');
  }

  // Reset flower
  $('flowerArea').style.display = '';
  resetFlower();
}

async function startGame() {
  audio.startMusic();

  resetGame();
  showScreen(null);

  $('hud').style.display     = '';
  $('charArea').style.display = '';

  // First round intro
  const cfg = ROUNDS[0];
  $('roundTitle').textContent = cfg.label;
  $('roundSub').textContent   = cfg.sub;
  $('roundBanner').classList.add('show');
  audio.tone('whoosh');
  audio.play('greetings');
  await delay(1500);
  $('roundBanner').classList.remove('show');
  await delay(250);

  startRound();
}

// ── BOOT ─────────────────────────────────────────────────────────
buildScenery();

onTap($('btnStart'), () => { audio.unlock(); startGame(); });
onTap($('btnAgain'), () => {
  showScreen(null);
  startGame();
});
</script>
