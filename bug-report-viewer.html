<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aha! — Bug Reports</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Arial Rounded MT Bold','Nunito','Quicksand',system-ui,-apple-system,Arial,sans-serif;
  background:radial-gradient(ellipse at top,#1a1f4e 0%,#0a0e2e 60%,#05071a 100%);
  color:#fff;
  min-height:100vh;
  padding:24px 16px 60px;
}
.wrap{max-width:820px;margin:0 auto}
header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
h1{font-size:22px;font-weight:700}
.count{
  background:rgba(74,91,214,0.25);color:#a8b4ff;padding:4px 12px;border-radius:20px;
  font-size:13px;font-weight:700;border:1px solid rgba(74,91,214,0.4);
}
.back{
  margin-left:auto;color:#a8b4ff;text-decoration:none;font-size:14px;
  padding:6px 14px;border-radius:8px;background:rgba(255,255,255,0.06);
}
.back:hover{background:rgba(255,255,255,0.12);color:#fff}
.controls{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;
  padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;
}
.controls select,.controls button{
  font-family:inherit;font-size:13px;padding:8px 12px;border-radius:7px;
  border:1px solid rgba(255,255,255,0.1);cursor:pointer;
}
.controls select{background:#0b0e24;color:#fff;min-width:140px}
.btn-copy{background:#4a5bd6;color:#fff;border:none;font-weight:700}
.btn-copy:hover{background:#3a4ab0}
.btn-clear{background:rgba(220,60,60,0.2);color:#ff9999;border:1px solid rgba(220,60,60,0.35);font-weight:700}
.btn-clear:hover{background:rgba(220,60,60,0.35);color:#fff}
.empty{
  text-align:center;padding:60px 20px;color:#8a8fb5;font-size:15px;
  background:rgba(255,255,255,0.03);border-radius:12px;
}
.card{
  background:rgba(20,24,51,0.85);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:16px;margin-bottom:12px;
}
.card-head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:8px}
.game{font-size:15px;font-weight:700;color:#a8b4ff}
.round{
  font-size:11px;background:rgba(74,91,214,0.3);padding:3px 9px;border-radius:12px;
  color:#c4ccff;font-weight:700;
}
.time{font-size:12px;color:#8a8fb5;margin-left:auto}
.desc{font-size:14px;line-height:1.5;color:#e0e4ff;margin-top:6px;word-break:break-word}
.desc.empty-desc{color:#6a6f90;font-style:italic}
.meta{
  font-size:11px;color:#6a6f90;margin-top:10px;padding-top:10px;
  border-top:1px solid rgba(255,255,255,0.05);word-break:break-all;
}
.meta a{color:#8a8fb5;text-decoration:none}
.meta a:hover{color:#a8b4ff}
.toast{
  position:fixed;left:50%;bottom:30px;transform:translateX(-50%);
  background:rgba(20,150,80,0.95);color:#fff;padding:10px 20px;border-radius:22px;
  font-size:14px;font-weight:700;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🐛 Bug Reports</h1>
    <span class="count" id="count">0</span>
    <a href="index.html" class="back">← Back to hub</a>
  </header>
  <div class="controls">
    <select id="gameFilter"><option value="">All games</option></select>
    <button class="btn-copy" id="copyBtn" type="button">Copy All as JSON</button>
    <button class="btn-clear" id="clearBtn" type="button">Clear All Reports</button>
  </div>
  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'aha_bug_reports';
var listEl = document.getElementById('list');
var countEl = document.getElementById('count');
var filterEl = document.getElementById('gameFilter');
var toastEl = document.getElementById('toast');

function load() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    var p = JSON.parse(raw);
    return Array.isArray(p) ? p : [];
  } catch (e) { return []; }
}

function save(arr) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch (e) {}
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmtTime(iso) {
  try {
    var d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
  } catch (e) { return iso; }
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(function () { toastEl.classList.remove('show'); }, 1500);
}

function render() {
  var all = load();
  countEl.textContent = all.length;

  var games = {};
  all.forEach(function (r) { if (r && r.game) games[r.game] = true; });
  var selected = filterEl.value;
  var gameNames = Object.keys(games).sort();
  filterEl.innerHTML = '<option value="">All games (' + all.length + ')</option>' +
    gameNames.map(function (g) {
      var count = all.filter(function (r) { return r.game === g; }).length;
      return '<option value="' + escapeHtml(g) + '"' + (g === selected ? ' selected' : '') + '>' +
        escapeHtml(g) + ' (' + count + ')</option>';
    }).join('');

  var filtered = selected ? all.filter(function (r) { return r.game === selected; }) : all.slice();
  filtered.sort(function (a, b) {
    return new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
  });

  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty">No bug reports ' +
      (selected ? 'for “' + escapeHtml(selected) + '”' : 'yet') + '. Tap the 🐛 in a game to log one.</div>';
    return;
  }

  listEl.innerHTML = filtered.map(function (r) {
    var descHtml = r.description
      ? '<div class="desc">' + escapeHtml(r.description) + '</div>'
      : '<div class="desc empty-desc">(no description)</div>';
    var roundHtml = (r.round !== null && r.round !== undefined && r.round !== '')
      ? '<span class="round">Round ' + escapeHtml(r.round) + '</span>' : '';
    return '<div class="card">' +
      '<div class="card-head">' +
      '<span class="game">' + escapeHtml(r.game || 'unknown') + '</span>' +
      roundHtml +
      '<span class="time">' + escapeHtml(fmtTime(r.timestamp)) + '</span>' +
      '</div>' +
      descHtml +
      '<div class="meta">' +
      (r.url ? '<a href="' + escapeHtml(r.url) + '" target="_blank" rel="noopener">' + escapeHtml(r.url) + '</a><br>' : '') +
      escapeHtml(r.userAgent || '') +
      '</div>' +
      '</div>';
  }).join('');
}

filterEl.addEventListener('change', render);

document.getElementById('copyBtn').addEventListener('click', function () {
  var all = load();
  var json = JSON.stringify(all, null, 2);
  var done = function () { showToast('✓ Copied ' + all.length + ' report(s)'); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(done, function () {
      fallbackCopy(json); done();
    });
  } else {
    fallbackCopy(json); done();
  }
});

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
}

document.getElementById('clearBtn').addEventListener('click', function () {
  var all = load();
  if (!all.length) { showToast('Nothing to clear'); return; }
  if (!confirm('Delete all ' + all.length + ' bug report(s)? This cannot be undone.')) return;
  save([]);
  render();
  showToast('✓ Cleared');
});

render();
</script>
</body>
</html>
