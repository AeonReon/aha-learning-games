<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Magic Number Tracing — Princess's Spell</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
  --tap: 80px;
  --z-bg: 0; --z-game: 10; --z-char: 12; --z-ui: 20; --z-overlay: 50; --z-celeb: 100; --z-screen: 200;
  --pink: #ff7ab8; --magenta: #e91e8c; --purple: #a29bfe; --deep-purple: #4a1580;
  --gold: #ffe066; --soft-gold: #ffd700;
  --white85: rgba(255,255,255,0.9);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  background: #1a0533;
}

/* ── Background ── */
.bg {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: linear-gradient(160deg, #1a0533 0%, #4a1580 35%, #8b1a6b 65%, #c0295e 100%);
}
.bg-sparkle {
  position: fixed; pointer-events: none; z-index: 1;
  width: 3px; height: 3px; border-radius: 50%;
  background: #fff;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 10px #fff; }
}
.bg-heart {
  position: fixed; pointer-events: none; z-index: 2;
  font-size: clamp(16px, 3vw, 24px);
  opacity: 0.5;
  animation: heartFloat linear infinite;
}
@keyframes heartFloat {
  0%   { transform: translateY(110vh) translateX(0) rotate(-10deg); opacity: 0; }
  10%  { opacity: 0.5; }
  90%  { opacity: 0.5; }
  100% { transform: translateY(-60px) translateX(40px) rotate(10deg); opacity: 0; }
}

/* ── Screen system ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity 0.45s;
  opacity: 0; visibility: hidden; pointer-events: none;
  z-index: var(--z-screen);
}
.screen.active { opacity: 1; visibility: visible; pointer-events: auto; }

/* ── Title screen ── */
.screen-title h1 {
  font-size: clamp(28px, 7vw, 50px);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,215,0,0.7), 2px 2px 0 rgba(0,0,0,0.35);
  margin: 6px 0 8px;
}
.screen-title .icon-row {
  display: flex; gap: 10px;
  justify-content: center; align-items: center;
  margin-bottom: 10px;
  font-size: clamp(36px, 9vw, 60px);
}
.screen-title p {
  font-size: clamp(14px, 3.5vw, 20px);
  color: var(--white85);
  max-width: 360px; line-height: 1.45;
}

/* ── Buttons ── */
.btn {
  min-width: var(--tap); min-height: 58px;
  padding: 14px 44px;
  font-size: clamp(18px, 4.5vw, 26px);
  font-family: var(--font); font-weight: bold;
  color: #fff; border: none; border-radius: 32px;
  cursor: pointer; box-shadow: 0 5px 22px rgba(0,0,0,0.3);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.93); }
.btn-start {
  background: linear-gradient(135deg, #ff7ab8, #e91e8c);
  margin-top: 18px;
  animation: glow 2.4s ease-in-out infinite;
}
.btn-again { background: linear-gradient(135deg, #ff7ab8, #e91e8c); margin-top: 16px; }
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2) drop-shadow(0 0 20px #ff7ab8)} }

/* ── HUD ── */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-ui);
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px;
  background: rgba(26,5,51,0.92); backdrop-filter: blur(6px);
  border-bottom: 2px solid rgba(255,122,184,0.3);
  pointer-events: none;
}
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 1px; }
.hud-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
}
.hud-label { font-size: clamp(10px,2.2vw,13px); color: rgba(255,255,255,0.5); font-weight: bold; letter-spacing: 0.05em; }
.hud-val   { font-size: clamp(16px,3.5vw,24px); font-weight: 900; }
.hud-round .hud-val { color: var(--pink); }
.hud-score .hud-val { color: var(--gold); }
.hud-center .hud-val { color: var(--gold); font-size: clamp(14px,3vw,20px); }

/* ── Character ── */
.char-area {
  position: fixed; bottom: 58px; left: 10px;
  z-index: var(--z-char); pointer-events: none;
}
.char-emoji { font-size: clamp(40px,9vw,60px); filter: drop-shadow(0 0 12px rgba(255,122,184,0.6)); }
.char-bubble {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96); color: #8b1a6b;
  padding: 6px 14px; border-radius: 20px;
  font-size: clamp(12px,2.6vw,16px); font-weight: bold;
  white-space: nowrap; box-shadow: 0 3px 14px rgba(0,0,0,0.2);
  opacity: 0; transition: opacity 0.28s; pointer-events: none;
  margin-bottom: 7px;
}
.char-bubble.show { opacity: 1; }
.char-bubble::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.96);
}
@keyframes charJump {
  0%   { transform: translateY(0); }
  40%  { transform: translateY(-15px) rotate(-4deg); }
  70%  { transform: translateY(-5px) rotate(2deg); }
  100% { transform: translateY(0) rotate(0); }
}

/* ── Canvas area ── */
.canvas-area {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 56px;
  z-index: var(--z-game);
  display: flex; align-items: center; justify-content: center;
  padding: 8px;
}
.canvas-area canvas {
  border-radius: 18px;
  box-shadow: 0 0 40px rgba(255,122,184,0.2), 0 6px 30px rgba(0,0,0,0.5);
  background: rgba(30,10,60,0.55);
}

/* ── Number display ── */
.number-display {
  position: fixed;
  top: 56px; right: 12px;
  z-index: var(--z-ui);
  pointer-events: none;
}
.number-display .big-num {
  font-size: clamp(40px,10vw,70px);
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
  line-height: 1;
}
.number-display .sub-label {
  font-size: clamp(10px,2vw,14px);
  color: rgba(255,255,255,0.55);
  text-align: center;
}

/* ── Progress bar ── */
.prog-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-ui); height: 56px;
  background: rgba(26,5,51,0.92); backdrop-filter: blur(6px);
  border-top: 2px solid rgba(255,122,184,0.3);
  display: flex; align-items: center; justify-content: center; gap: clamp(6px,2vw,14px);
  padding: 0 12px;
}
.prog-dot {
  width: clamp(32px,8vw,44px); height: clamp(32px,8vw,44px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px,3.2vw,20px); font-weight: 900;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.35);
  border: 2px solid rgba(255,255,255,0.1);
  transition: all 0.4s;
}
.prog-dot.active {
  background: rgba(255,122,184,0.25); color: #fff;
  border-color: var(--pink);
  box-shadow: 0 0 14px rgba(255,122,184,0.5);
}
.prog-dot.done {
  background: linear-gradient(135deg, #ff7ab8, #ffd700);
  color: #4a1580; border-color: var(--gold);
  box-shadow: 0 0 16px rgba(255,215,0,0.5);
}

/* ── Magic Wand ── */
.magic-wand {
  position: fixed; top: 60px; left: 8px;
  z-index: var(--z-char);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.wand-icon {
  font-size: clamp(28px,6vw,40px);
  filter: drop-shadow(0 0 8px rgba(255,122,184,0.6));
}
.wand-stars {
  display: flex; gap: 2px; flex-wrap: wrap; max-width: 60px; justify-content: center;
}
.wand-star {
  width: 8px; height: 10px; border-radius: 2px;
  background: rgba(255,255,255,0.1);
  transition: all 0.5s;
}
.wand-star.lit {
  background: linear-gradient(135deg, #ff7ab8, #ffd700);
  box-shadow: 0 0 8px rgba(255,215,0,0.7);
  animation: starPop2 0.5s ease-out;
}
@keyframes starPop2 {
  0% { transform: scale(0); } 50% { transform: scale(1.5); } 100% { transform: scale(1); }
}

/* ── Level banner ── */
.level-banner {
  position: fixed; inset: 0;
  z-index: var(--z-celeb);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(26,5,51,0.94);
  opacity: 0; visibility: hidden; pointer-events: none;
  transition: opacity 0.4s;
}
.level-banner.show { opacity: 1; visibility: visible; pointer-events: auto; }
.level-banner h2 {
  font-size: clamp(24px,6vw,42px);
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
  margin-bottom: 6px;
}
.level-banner p {
  font-size: clamp(14px,3.5vw,20px);
  color: var(--white85);
}

/* ── Confetti ── */
.confetti {
  position: fixed; pointer-events: none;
  z-index: var(--z-celeb);
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
}
.starburst {
  position: fixed; pointer-events: none; z-index: var(--z-celeb);
  animation: starPop 0.8s ease-out forwards;
}
@keyframes starPop {
  0%   { transform: scale(0) rotate(0); opacity: 1; }
  60%  { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
  100% { transform: scale(0.5) rotate(360deg) translateY(-40px); opacity: 0; }
}

/* ── Celebration screen ── */
.screen-celeb h1 {
  font-size: clamp(26px,6.5vw,46px);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(255,215,0,0.7), 2px 2px 0 rgba(0,0,0,0.35);
  margin-bottom: 12px;
}
.screen-celeb p {
  font-size: clamp(16px,4vw,22px);
  color: var(--white85); line-height: 1.5;
}
.screen-celeb .final-wand {
  font-size: clamp(60px,15vw,100px);
  margin: 16px 0;
  animation: wandPulse 1.5s ease-in-out infinite;
}
@keyframes wandPulse {
  0%,100% { transform: scale(1) rotate(0); }
  25% { transform: scale(1.05) rotate(-6deg); }
  50% { transform: scale(1.1) rotate(0); }
  75% { transform: scale(1.05) rotate(6deg); }
}
.final-score {
  font-size: clamp(18px,4.5vw,28px);
  color: var(--gold); font-weight: 900;
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg" id="bg"></div>

<!-- Title Screen -->
<div class="screen screen-title active" id="screenTitle">
  <div class="icon-row"><span>👸</span><span>✨</span><span>🪄</span></div>
  <h1>Magic Number Tracing</h1>
  <p>Help the Princess cast her spell! Trace each number with your magic wand to add a sparkle star!</p>
  <button class="btn btn-start" id="btnStart">Cast the Spell!</button>
</div>

<!-- HUD -->
<div class="hud" id="hud" style="display:none">
  <div class="hud-left hud-round">
    <div class="hud-label">LEVEL</div>
    <div class="hud-val" id="hudLevel">1</div>
  </div>
  <div class="hud-center">
    <div class="hud-val" id="hudNumber">0</div>
  </div>
  <div class="hud-right hud-score">
    <div class="hud-label">STARS</div>
    <div class="hud-val" id="hudScore">0</div>
  </div>
</div>

<!-- Number display -->
<div class="number-display" id="numDisplay" style="display:none">
  <div class="big-num" id="bigNum">0</div>
  <div class="sub-label" id="numSubLabel"></div>
</div>

<!-- Magic Wand -->
<div class="magic-wand" id="magicWand" style="display:none">
  <div class="wand-icon">🪄</div>
  <div class="wand-stars" id="wandStars"></div>
</div>

<!-- Canvas -->
<div class="canvas-area" id="canvasArea" style="display:none">
  <canvas id="traceCanvas"></canvas>
</div>

<!-- Progress bar -->
<div class="prog-bar" id="progBar" style="display:none"></div>

<!-- Character -->
<div class="char-area" id="charArea" style="display:none">
  <span class="char-emoji" id="charEmoji">👸</span>
  <div class="char-bubble" id="charBubble"></div>
</div>

<!-- Level Banner -->
<div class="level-banner" id="levelBanner">
  <h2 id="bannerTitle">Level 1</h2>
  <p id="bannerSub">Follow the magic guide!</p>
</div>

<!-- Celebration Screen -->
<div class="screen screen-celeb" id="screenCeleb">
  <h1>Spell Complete!</h1>
  <div class="final-wand">👸🪄✨</div>
  <p>The Princess's magic wand is full of stars!<br>You are a true fairy!</p>
  <div class="final-score" id="finalScore">24 Stars!</div>
  <button class="btn btn-again" id="btnAgain">Play Again!</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════════════════════
const AUDIO_BASE = '../../audio';

const VOICE_A = {
  greetings: [
    'voice-a/greetings/here-we-go.mp3',
    'voice-a/greetings/lets-go.mp3',
    'voice-a/greetings/come-on-lets-play.mp3',
    'voice-a/greetings/are-you-ready.mp3',
    'voice-a/greetings/this-is-going-to-be-fun.mp3',
  ],
  correct: [
    'voice-a/correct/amazing.mp3',
    'voice-a/correct/brilliant.mp3',
    'voice-a/correct/fantastic.mp3',
    'voice-a/correct/i-knew-you-could-do-it.mp3',
    'voice-a/correct/incredible.mp3',
    'voice-a/correct/perfect.mp3',
    'voice-a/correct/superstar.mp3',
    'voice-a/correct/thats-right.mp3',
    'voice-a/correct/well-done.mp3',
    'voice-a/correct/wow-look-at-you-go.mp3',
    'voice-a/correct/yes-youre-so-clever.mp3',
    'voice-a/correct/you-got-it.mp3',
    'voice-a/correct/youre-on-fire.mp3',
  ],
  wrong: [
    'voice-a/wrong/almost-have-another-go.mp3',
    'voice-a/wrong/dont-worry-try-again.mp3',
    'voice-a/wrong/keep-trying-youre-so-close.mp3',
    'voice-a/wrong/nearly-give-it-another-go.mp3',
    'voice-a/wrong/not-quite-you-can-do-it.mp3',
    'voice-a/wrong/oops-not-that-one.mp3',
  ],
  thinking: [
    'voice-a/thinking/have-a-good-look.mp3',
    'voice-a/thinking/i-believe-in-you.mp3',
    'voice-a/thinking/take-your-time.mp3',
    'voice-a/thinking/which-one-could-it-be.mp3',
    'voice-a/thinking/you-can-do-it-keep-looking.mp3',
  ],
  'round-complete': [
    'voice-a/round-complete/brilliant-round-keep-going.mp3',
    'voice-a/round-complete/round-complete-amazing.mp3',
    'voice-a/round-complete/round-done-youre-doing-so-well.mp3',
    'voice-a/round-complete/you-did-it-on-to-the-next.mp3',
  ],
  'game-complete': [
    'voice-a/game-complete/what-a-fantastic-player.mp3',
    'voice-a/game-complete/you-are-a-superstar.mp3',
    'voice-a/game-complete/you-did-the-whole-thing.mp3',
    'voice-a/game-complete/you-finished-so-proud.mp3',
    'voice-a/game-complete/youre-incredible-we-did-it.mp3',
  ],
};

class GameAudio {
  constructor() {
    this.ctx = null; this.musicGain = null; this.sfxGain = null;
    this.musicVol = 0.06; this.sfxVol = 0.3; this.musicDucked = 0.018;
    this.playing = false; this.voiceQueue = []; this.speaking = false;
    this._lastPlayed = {};
  }
  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = this.ctx.createGain(); master.gain.value = 1; master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = this.musicVol; this.musicGain.connect(master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = this.sfxVol;   this.sfxGain.connect(master);
  }
  unlock() { this._init(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
  startMusic() {
    this._init(); if (this.playing) return; this.playing = true;
    // Dreamy fairy notes — gentle pentatonic in a higher register
    const notes = [329.63, 392.00, 440.00, 493.88, 587.33, 659.25, 783.99];
    const go = () => {
      if (!this.playing) return;
      const f = notes[Math.floor(Math.random() * notes.length)];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = Math.random() > 0.6 ? 'sine' : 'triangle';
      o.frequency.value = f * (Math.random() > 0.7 ? 0.5 : 1);
      g.gain.setValueAtTime(0, this.ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.10, this.ctx.currentTime + 0.2);
      g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.4);
      o.connect(g); g.connect(this.musicGain); o.start(); o.stop(this.ctx.currentTime + 2.6);
      o.onended = () => { o.disconnect(); g.disconnect(); };
      this._mt = setTimeout(go, 1000 + Math.random() * 1500);
    }; go();
  }
  stopMusic() { this.playing = false; clearTimeout(this._mt); }
  _duck()   { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicDucked, this.ctx.currentTime + 0.1); }
  _unduck() { if (this.musicGain) this.musicGain.gain.linearRampToValueAtTime(this.musicVol,    this.ctx.currentTime + 0.3); }
  tone(type) {
    this._init(); const t = this.ctx.currentTime;
    const p = (f, s, d, v = 0.4, w = 'sine') => {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = w; o.frequency.value = f;
      g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(v, s+0.02); g.gain.linearRampToValueAtTime(0, s+d);
      o.connect(g); g.connect(this.sfxGain); o.start(s); o.stop(s+d+0.01);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    if      (type==='correct')   { p(523.25,t,0.15,0.35); p(659.25,t+0.12,0.18,0.4); p(783.99,t+0.24,0.22,0.45); }
    else if (type==='wrong')     { p(330,t,0.1,0.15); p(290,t+0.08,0.12,0.12); }
    else if (type==='celeb')     { p(523.25,t,0.15,0.35); p(659.25,t+0.15,0.15,0.4); p(783.99,t+0.3,0.18,0.45); p(1046.5,t+0.48,0.35,0.5); }
    else if (type==='roundDone') { p(392,t,0.12,0.3); p(523.25,t+0.12,0.12,0.35); p(659.25,t+0.24,0.15,0.4); p(783.99,t+0.38,0.2,0.45); }
    else if (type==='reveal')    { p(440,t,0.12,0.2); p(554.37,t+0.08,0.12,0.25); p(659.25,t+0.16,0.15,0.3); }
    else if (type==='hint')      { p(659,t,0.15,0.15); p(784,t+0.15,0.2,0.12); }
    else if (type==='whoosh')    {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.linearRampToValueAtTime(0,t+0.2);
      o.connect(g); g.connect(this.sfxGain); o.start(t); o.stop(t+0.25);
      o.onended=()=>{o.disconnect();g.disconnect()};
    }
    else if (type==='checkpoint') {
      p(700 + Math.random()*300, t, 0.08, 0.15, 'triangle');
    }
  }
  speak(file) { return new Promise(resolve => { this.voiceQueue.push({file, resolve}); this._next(); }); }
  async _next() {
    if (this.speaking || !this.voiceQueue.length) return;
    this.speaking = true;
    const {file, resolve} = this.voiceQueue.shift();
    this._duck();
    try { await this._playFile(file); } catch(e) {}
    this.speaking = false; this._unduck(); resolve();
    setTimeout(() => this._next(), 80);
  }
  _playFile(path) {
    const htmlFallback = () => new Promise(resolve => {
      const a = new window.Audio(path);
      a.onended = resolve; a.onerror = () => resolve();
      a.play().catch(() => resolve());
    });
    if (this.ctx && this.ctx.state !== 'closed') {
      return fetch(path)
        .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
        .then(buf => this.ctx.decodeAudioData(buf))
        .then(decoded => new Promise(resolve => {
          const src = this.ctx.createBufferSource();
          src.buffer = decoded;
          src.connect(this.ctx.destination);
          src.onended = resolve;
          src.start();
        }))
        .catch(() => htmlFallback());
    }
    return htmlFallback();
  }
  play(category) {
    const pool = VOICE_A[category];
    if (!pool || !pool.length) return Promise.resolve();
    const last = this._lastPlayed[category];
    const candidates = pool.length > 1 ? pool.filter(f => f !== last) : pool;
    const file = candidates[Math.floor(Math.random() * candidates.length)];
    this._lastPlayed[category] = file;
    return this.speak(`${AUDIO_BASE}/${file}`);
  }
  speakNumber(n) { return this.speak(`${AUDIO_BASE}/numbers/${n}.mp3`); }
  clearQueue() { this.voiceQueue.forEach(q => q.resolve()); this.voiceQueue = []; this.speaking = false; this._unduck(); }
}

// ══════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════════════════
function setupCanvas() {
  canvas = $('traceCanvas');
  const area = $('canvasArea');
  const rect = area.getBoundingClientRect();
  const pad = 16;
  const w = rect.width - pad * 2;
  const h = rect.height - pad * 2;
  const size = Math.min(w, h, 400);

  dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';

  ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  canvasW = size;
  canvasH = size;
  hitRadius = canvasW * 0.15;

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', onPointerUp);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false });
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function onTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  onPointerDown({ clientX: touch.clientX, clientY: touch.clientY });
}

function onTouchMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  onPointerMove({ clientX: touch.clientX, clientY: touch.clientY });
}

function onPointerDown(e) {
  if (!gameActive || guideAnimating) return;
  audio.unlock();
  isDrawing = true;
  drawPoints = [];
  const pos = getCanvasPos(e);
  drawPoints.push(pos);
  checkCheckpoint(pos);
}

function onPointerMove(e) {
  if (!isDrawing || !gameActive || guideAnimating) return;
  const pos = getCanvasPos(e);
  drawPoints.push(pos);
  drawTraceLine();
  checkCheckpoint(pos);
}

function onPointerUp() {
  isDrawing = false;
}

// ══════════════════════════════════════════════════════════════════
// DRAWING
// ══════════════════════════════════════════════════════════════════
function clearCanvas() {
  ctx.clearRect(0, 0, canvasW, canvasH);
}

function drawNumberOutline(key, opacity) {
  const cps = CHECKPOINTS[key];
  if (!cps || cps.length < 2) return;

  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.strokeStyle = '#f0c0ff';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(255,180,230,0.6)';
  ctx.shadowBlur = 15;

  ctx.beginPath();
  const pts = cps.map(p => ({ x: p.x * canvasW, y: p.y * canvasH }));

  ctx.moveTo(pts[0].x, pts[0].y);

  if (pts.length === 2) {
    ctx.lineTo(pts[1].x, pts[1].y);
  } else {
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i].x + pts[i+1].x) / 2;
      const my = (pts[i].y + pts[i+1].y) / 2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
    }
    ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  }

  ctx.stroke();
  ctx.restore();
}

function drawCheckpointDots() {
  const cps = traceCheckpoints;
  for (let i = 0; i < cps.length; i++) {
    const cp = cps[i];
    const x = cp.x * canvasW;
    const y = cp.y * canvasH;

    if (i < nextCheckpoint) {
      // Hit - glowing gold dot
      ctx.save();
      ctx.shadowColor = 'rgba(255,215,0,0.9)';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(x, y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

function drawTraceLine() {
  if (drawPoints.length < 2) return;

  // Redraw everything
  clearCanvas();
  const key = TRACE_SEQUENCE[currentTraceIndex];
  const level = LEVELS[currentLevel];
  drawNumberOutline(key, level.outlineOpacity);

  // Draw the trace line (magical pink/gold sparkle trail)
  ctx.save();
  ctx.strokeStyle = '#ff7ab8';
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(255,122,184,0.9)';
  ctx.shadowBlur = 14;

  ctx.beginPath();
  ctx.moveTo(drawPoints[0].x, drawPoints[0].y);
  for (let i = 1; i < drawPoints.length; i++) {
    ctx.lineTo(drawPoints[i].x, drawPoints[i].y);
  }
  ctx.stroke();

  // Inner glow line - gold sparkle
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 4;
  ctx.shadowColor = 'rgba(255,215,0,0.7)';
  ctx.shadowBlur = 9;
  ctx.beginPath();
  ctx.moveTo(drawPoints[0].x, drawPoints[0].y);
  for (let i = 1; i < drawPoints.length; i++) {
    ctx.lineTo(drawPoints[i].x, drawPoints[i].y);
  }
  ctx.stroke();

  // Brightest white core
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(drawPoints[0].x, drawPoints[0].y);
  for (let i = 1; i < drawPoints.length; i++) {
    ctx.lineTo(drawPoints[i].x, drawPoints[i].y);
  }
  ctx.stroke();
  ctx.restore();

  drawCheckpointDots();
}

// ══════════════════════════════════════════════════════════════════
// CHECKPOINT CHECKING
// ══════════════════════════════════════════════════════════════════
function checkCheckpoint(pos) {
  if (nextCheckpoint >= traceCheckpoints.length) return;

  const cp = traceCheckpoints[nextCheckpoint];
  const cpx = cp.x * canvasW;
  const cpy = cp.y * canvasH;
  const dx = pos.x - cpx;
  const dy = pos.y - cpy;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist <= hitRadius) {
    nextCheckpoint++;
    audio.tone('checkpoint');
    resetHints();

    // Redraw to show hit dot
    clearCanvas();
    const key = TRACE_SEQUENCE[currentTraceIndex];
    drawNumberOutline(key, LEVELS[currentLevel].outlineOpacity);
    drawTraceLine();
    drawCheckpointDots();

    if (nextCheckpoint >= traceCheckpoints.length) {
      onTraceComplete();
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// ANIMATED GUIDE (Level 1)
// ══════════════════════════════════════════════════════════════════
function animateGuide(key) {
  return new Promise(resolve => {
    const cps = CHECKPOINTS[key];
    if (!cps || cps.length < 2) { resolve(); return; }

    guideAnimating = true;
    const pts = cps.map(p => ({ x: p.x * canvasW, y: p.y * canvasH }));
    const totalDuration = 2000;
    const start = performance.now();

    const densePoints = [];
    const steps = 80;
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const totalLen = pts.length - 1;
      const segment = t * totalLen;
      const i = Math.min(Math.floor(segment), totalLen - 1);
      const localT = segment - i;

      if (pts.length === 2) {
        densePoints.push({
          x: pts[0].x + (pts[1].x - pts[0].x) * t,
          y: pts[0].y + (pts[1].y - pts[0].y) * t
        });
      } else {
        const p0 = pts[i];
        const p1 = pts[Math.min(i + 1, pts.length - 1)];
        densePoints.push({
          x: p0.x + (p1.x - p0.x) * localT,
          y: p0.y + (p1.y - p0.y) * localT
        });
      }
    }

    const animate = (now) => {
      const elapsed = now - start;
      const progress = Math.min(elapsed / totalDuration, 1);
      const idx = Math.floor(progress * (densePoints.length - 1));

      clearCanvas();
      drawNumberOutline(key, LEVELS[currentLevel].outlineOpacity);

      // Pink/gold sparkle trail
      ctx.save();
      const trailLen = 8;
      for (let j = Math.max(0, idx - trailLen); j <= idx; j++) {
        const p = densePoints[j];
        const alpha = 1 - (idx - j) / trailLen;
        ctx.fillStyle = `rgba(255,215,0,${alpha * 0.7})`;
        ctx.shadowColor = `rgba(255,122,184,${alpha})`;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5 + alpha * 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Sparkle head - bright white with pink halo
      if (idx < densePoints.length) {
        const p = densePoints[idx];
        ctx.fillStyle = '#fff';
        ctx.shadowColor = 'rgba(255,122,184,1)';
        ctx.shadowBlur = 22;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        guideAnimating = false;
        clearCanvas();
        drawNumberOutline(key, LEVELS[currentLevel].outlineOpacity);
        resolve();
      }
    };

    requestAnimationFrame(animate);
  });
}

// ══════════════════════════════════════════════════════════════════
// HINTS
// ══════════════════════════════════════════════════════════════════
function resetHints() {
  clearTimeout(hintTimer);
  if (!gameActive) return;
  hintTimer = setTimeout(() => {
    if (!gameActive || guideAnimating) return;
    if (nextCheckpoint < traceCheckpoints.length) {
      const cp = traceCheckpoints[nextCheckpoint];
      const x = cp.x * canvasW;
      const y = cp.y * canvasH;

      const key = TRACE_SEQUENCE[currentTraceIndex];
      clearCanvas();
      drawNumberOutline(key, LEVELS[currentLevel].outlineOpacity);
      drawCheckpointDots();

      ctx.save();
      ctx.fillStyle = 'rgba(255,122,184,0.35)';
      ctx.shadowColor = 'rgba(255,122,184,0.9)';
      ctx.shadowBlur = 25;
      ctx.beginPath();
      ctx.arc(x, y, hitRadius * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      audio.tone('hint');
      showCharBubble('Trace here! ✨', 2000);
    }
  }, 5000);
}

// ══════════════════════════════════════════════════════════════════
// TRACE COMPLETE
// ══════════════════════════════════════════════════════════════════
async function onTraceComplete() {
  gameActive = false;
  isDrawing = false;
  clearTimeout(hintTimer);

  score++;
  $('hudScore').textContent = score;

  // Sparkle burst on canvas center
  const rect = canvas.getBoundingClientRect();
  starBurstAt(rect.left + rect.width / 2, rect.top + rect.height / 2);

  // Light a wand star
  lightWandStar();

  audio.tone('correct');
  jumpChar();

  showCharBubble(pick(BUBBLE_CORRECT), 1800);

  // Single cheer — do NOT re-speak the number
  await audio.play('correct');
  await delay(400);

  // Advance
  currentTraceIndex++;
  markProgDone(currentTraceIndex - 1);

  if (currentTraceIndex >= TRACE_SEQUENCE.length) {
    // Level complete
    currentTraceIndex = 0;
    currentLevel++;

    if (currentLevel >= LEVELS.length) {
      await onGameComplete();
    } else {
      await onLevelComplete();
    }
  } else {
    await startTrace();
  }
}

// ══════════════════════════════════════════════════════════════════
// START TRACE
// ══════════════════════════════════════════════════════════════════
async function startTrace() {
  const key = TRACE_SEQUENCE[currentTraceIndex];
  const cps = CHECKPOINTS[key];
  traceCheckpoints = cps;
  nextCheckpoint = 0;
  isDrawing = false;
  drawPoints = [];
  gameActive = true;

  const level = LEVELS[currentLevel];
  $('hudLevel').textContent = currentLevel + 1;

  $('bigNum').textContent = key;
  $('numSubLabel').textContent = '';
  $('hudNumber').textContent = key;

  updateProg();

  clearCanvas();
  drawNumberOutline(key, level.outlineOpacity);

  // Speak the number ONCE at start
  audio.speakNumber(key);

  if (level.showGuide) {
    await delay(300);
    await animateGuide(key);
    showCharBubble('Your turn! ✨', 1800);
  } else {
    showCharBubble(pick(BUBBLE_TRACE), 1800);
  }

  resetHints();
}

// ══════════════════════════════════════════════════════════════════
// START LEVEL
// ══════════════════════════════════════════════════════════════════
async function startLevel() {
  currentTraceIndex = 0;
  buildProg();
  await startTrace();
}

// ══════════════════════════════════════════════════════════════════
// GAME START
// ══════════════════════════════════════════════════════════════════
async function startGame() {
  audio.unlock();
  showScreen(null);
  currentLevel = 0;
  currentTraceIndex = 0;
  score = 0;
  wandStarCount = 0;

  $('hudScore').textContent = '0';
  showGameUI(true);
  buildMagicWand();
  setupCanvas();

  audio.startMusic();

  await showLevelBanner();
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
buildScenery();

onTap($('btnStart'), () => startGame());
onTap($('btnAgain'), () => {
  showScreen(null);
  startGame();
});

document.addEventListener('touchstart', () => audio.unlock(), { once: true, passive: true });
document.addEventListener('click', () => audio.unlock(), { once: true });
</script>
</body>
</html>
