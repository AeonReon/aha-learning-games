<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tracing Test — 3 Variations</title>
<style>
:root {
  --font: 'Arial Rounded MT Bold', 'Nunito', 'Quicksand', system-ui, -apple-system, Arial, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: #1a0533;
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  display: flex; flex-direction: column;
}

/* ── Top controls ── */
.controls {
  flex-shrink: 0;
  background: rgba(30,10,70,0.95);
  padding: 8px 10px;
  display: flex; flex-direction: column; gap: 6px;
  border-bottom: 2px solid rgba(255,255,255,0.08);
  z-index: 10;
}
.controls .note {
  font-size: 11px; color: rgba(255,255,255,0.5); text-align: center;
}
.row { display: flex; gap: 6px; justify-content: center; align-items: center; flex-wrap: wrap; }
.row button {
  font-family: var(--font); font-size: 13px; font-weight: bold;
  padding: 7px 14px; border-radius: 18px; border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
  cursor: pointer; transition: all 0.15s;
}
.row button.on {
  background: linear-gradient(135deg,#f8a5c2,#e91e8c);
  color: #fff; border-color: #e91e8c;
}
.row button:active { transform: scale(0.94); }
.btn-try {
  font-family: var(--font); font-size: 13px; font-weight: bold;
  padding: 7px 16px; border-radius: 18px; border: none;
  background: linear-gradient(135deg,#a29bfe,#6c5ce7);
  color: #fff; cursor: pointer;
}
.btn-try:active { transform: scale(0.94); }

/* ── Canvas area ── */
.canvas-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 8px;
}
.canvas-area canvas {
  border-radius: 18px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div class="controls">
  <div class="note">Test on iPhone — use finger drag to draw.</div>
  <div class="row" id="varRow">
    <button id="btnA" class="on">A · Pure</button>
    <button id="btnB">B · Guided</button>
    <button id="btnC">C · Dotted</button>
  </div>
  <div class="row" id="numRow"></div>
  <div class="row">
    <button class="btn-try" id="btnTry">Try Again</button>
  </div>
</div>

<div class="canvas-area">
  <canvas id="c"></canvas>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════

// Digit stroke paths — fractional coords 0–1
function getStrokes(n) {
  switch(n) {
    case 0: return [[
      {x:.50,y:.06},{x:.65,y:.08},{x:.78,y:.15},{x:.86,y:.28},{x:.88,y:.45},
      {x:.86,y:.62},{x:.78,y:.78},{x:.65,y:.88},{x:.50,y:.92},
      {x:.35,y:.88},{x:.22,y:.78},{x:.14,y:.62},{x:.12,y:.45},
      {x:.14,y:.28},{x:.22,y:.15},{x:.35,y:.08},{x:.50,y:.06}
    ]];
    case 1: return [
      [{x:.38,y:.20},{x:.50,y:.08}],
      [{x:.50,y:.08},{x:.50,y:.90}],
      [{x:.34,y:.90},{x:.66,y:.90}]
    ];
    case 2: return [[
      {x:.20,y:.30},{x:.22,y:.20},{x:.30,y:.12},{x:.42,y:.07},{x:.58,y:.07},
      {x:.70,y:.12},{x:.78,y:.20},{x:.80,y:.30},{x:.78,y:.40},{x:.70,y:.50},
      {x:.58,y:.60},{x:.44,y:.70},{x:.30,y:.80},{x:.22,y:.88},{x:.20,y:.90},{x:.80,y:.90}
    ]];
    case 3: return [
      [{x:.24,y:.14},{x:.36,y:.07},{x:.52,y:.06},{x:.66,y:.10},{x:.74,y:.20},
       {x:.76,y:.30},{x:.72,y:.40},{x:.62,y:.47},{x:.50,y:.50}],
      [{x:.50,y:.50},{x:.62,y:.53},{x:.74,y:.60},{x:.78,y:.72},
       {x:.74,y:.82},{x:.64,y:.90},{x:.50,y:.93},{x:.36,y:.90},{x:.26,y:.84}]
    ];
    case 4: return [
      [{x:.66,y:.06},{x:.56,y:.22},{x:.44,y:.38},{x:.32,y:.54},{x:.20,y:.66}],
      [{x:.20,y:.66},{x:.82,y:.66}],
      [{x:.66,y:.06},{x:.66,y:.94}]
    ];
    case 5: return [
      [{x:.74,y:.06},{x:.26,y:.06}],
      [{x:.26,y:.06},{x:.26,y:.46}],
      [{x:.26,y:.46},{x:.38,y:.42},{x:.54,y:.42},{x:.68,y:.48},{x:.78,y:.58},
       {x:.80,y:.70},{x:.76,y:.80},{x:.66,y:.88},{x:.52,y:.93},{x:.38,y:.90},{x:.24,y:.82}]
    ];
  }
  return [];
}

// Checkpoints — invisible validation zones
const CPS = {
  0: [{x:.50,y:.08},{x:.85,y:.50},{x:.50,y:.92},{x:.15,y:.50}],
  1: [{x:.42,y:.18},{x:.50,y:.50},{x:.50,y:.88}],
  2: [{x:.32,y:.22},{x:.68,y:.18},{x:.72,y:.42},{x:.35,y:.62},{x:.22,y:.80},{x:.75,y:.82}],
  3: [{x:.30,y:.18},{x:.72,y:.22},{x:.55,y:.50},{x:.72,y:.78},{x:.30,y:.82}],
  4: [{x:.65,y:.12},{x:.22,y:.62},{x:.78,y:.62},{x:.65,y:.88}],
  5: [{x:.72,y:.12},{x:.28,y:.12},{x:.28,y:.50},{x:.65,y:.52},{x:.75,y:.72},{x:.45,y:.88},{x:.22,y:.80}],
};

// Guide path for variation B animation — dense points along the writing path
const GUIDE = {
  0: [{x:.50,y:.06},{x:.58,y:.07},{x:.65,y:.08},{x:.72,y:.12},{x:.78,y:.15},{x:.82,y:.22},{x:.86,y:.28},{x:.88,y:.36},{x:.88,y:.45},{x:.87,y:.54},{x:.86,y:.62},{x:.82,y:.70},{x:.78,y:.78},{x:.72,y:.84},{x:.65,y:.88},{x:.58,y:.91},{x:.50,y:.92},{x:.42,y:.91},{x:.35,y:.88},{x:.28,y:.84},{x:.22,y:.78},{x:.18,y:.70},{x:.14,y:.62},{x:.12,y:.54},{x:.12,y:.45},{x:.13,y:.36},{x:.14,y:.28},{x:.18,y:.22},{x:.22,y:.15},{x:.28,y:.12},{x:.35,y:.08},{x:.42,y:.07},{x:.50,y:.06}],
  1: [{x:.38,y:.20},{x:.44,y:.14},{x:.50,y:.08},{x:.50,y:.18},{x:.50,y:.28},{x:.50,y:.38},{x:.50,y:.48},{x:.50,y:.58},{x:.50,y:.68},{x:.50,y:.78},{x:.50,y:.90}],
  2: [{x:.20,y:.30},{x:.22,y:.20},{x:.30,y:.12},{x:.42,y:.07},{x:.58,y:.07},{x:.70,y:.12},{x:.78,y:.20},{x:.80,y:.30},{x:.78,y:.40},{x:.70,y:.50},{x:.58,y:.60},{x:.44,y:.70},{x:.30,y:.80},{x:.22,y:.88},{x:.20,y:.90},{x:.40,y:.90},{x:.60,y:.90},{x:.80,y:.90}],
  3: [{x:.24,y:.14},{x:.36,y:.07},{x:.52,y:.06},{x:.66,y:.10},{x:.74,y:.20},{x:.76,y:.30},{x:.72,y:.40},{x:.62,y:.47},{x:.50,y:.50},{x:.62,y:.53},{x:.74,y:.60},{x:.78,y:.72},{x:.74,y:.82},{x:.64,y:.90},{x:.50,y:.93},{x:.36,y:.90},{x:.26,y:.84}],
  4: [{x:.66,y:.06},{x:.60,y:.16},{x:.56,y:.22},{x:.48,y:.34},{x:.44,y:.38},{x:.36,y:.48},{x:.32,y:.54},{x:.26,y:.60},{x:.20,y:.66},{x:.35,y:.66},{x:.50,y:.66},{x:.66,y:.66},{x:.82,y:.66},{x:.66,y:.16},{x:.66,y:.30},{x:.66,y:.44},{x:.66,y:.58},{x:.66,y:.72},{x:.66,y:.86},{x:.66,y:.94}],
  5: [{x:.74,y:.06},{x:.60,y:.06},{x:.44,y:.06},{x:.26,y:.06},{x:.26,y:.16},{x:.26,y:.26},{x:.26,y:.36},{x:.26,y:.46},{x:.38,y:.42},{x:.54,y:.42},{x:.68,y:.48},{x:.78,y:.58},{x:.80,y:.70},{x:.76,y:.80},{x:.66,y:.88},{x:.52,y:.93},{x:.38,y:.90},{x:.24,y:.82}],
};

// Dot positions for Variation C — evenly spaced along the writing path
function getDots(n) {
  const g = GUIDE[n];
  if (!g) return [];
  // Sample every other point for a nice dot spacing
  const dots = [];
  const step = Math.max(1, Math.floor(g.length / 16));
  for (let i = 0; i < g.length; i += step) dots.push({...g[i]});
  // Make sure last point is included
  const last = g[g.length - 1];
  if (dots.length === 0 || (dots[dots.length-1].x !== last.x || dots[dots.length-1].y !== last.y)) {
    dots.push({...last});
  }
  return dots;
}

// ══════════════════════════════════════════════════════════════════
// AUDIO — minimal Web Audio for tones only (no voice files needed for test)
// ══════════════════════════════════════════════════════════════════
let actx = null;
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
}
function unlockAudio() {
  initAudio();
  if (actx.state === 'suspended') actx.resume();
}
function playTone(freq, dur, vol) {
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'triangle'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.02);
  g.gain.linearRampToValueAtTime(0, t + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t + dur + 0.01);
  o.onended = () => { o.disconnect(); g.disconnect(); };
}
function cpTone(i, total) {
  playTone(400 + (i / Math.max(1, total - 1)) * 400, 0.2, 0.18);
}
function successTone() {
  const t = actx.currentTime;
  [523.25, 659.25, 783.99].forEach((f, i) => {
    playTone(f, 0.18, 0.3);
  });
}

// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
const canvasEl = document.getElementById('c');
const ctx = canvasEl.getContext('2d');

let variation = 'A'; // A, B, C
let curNum = 0;
let dpr = 1, cSize = 0, pad = 0, dw = 0, dh = 0;

// Drawing state
let active = false;
let drawing = false;
let userPts = [];   // completed strokes
let curStroke = [];  // in-progress

// Checkpoint state
let curCP = 0;
let done = false;

// Sparkle particles (variations A & B)
let sparkles = []; // {x,y,dx,dy,born,emoji}

// Variation B — guide animation
let guideAnimating = false;
let guideStart = 0;
const GUIDE_DUR = 2000; // ms

// Variation C — dot activation state
let dotHit = []; // boolean per dot

// ══════════════════════════════════════════════════════════════════
// SIZING
// ══════════════════════════════════════════════════════════════════
function sizeCanvas() {
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  const ctrl = document.querySelector('.controls').getBoundingClientRect();
  const avW = window.innerWidth - 16;
  const avH = window.innerHeight - ctrl.height - 16;
  cSize = Math.min(avW, avH, 450);
  canvasEl.style.width = cSize + 'px';
  canvasEl.style.height = cSize + 'px';
  canvasEl.width = Math.round(cSize * dpr);
  canvasEl.height = Math.round(cSize * dpr);
  pad = cSize * 0.10;
  dw = cSize - pad * 2;
  dh = cSize - pad * 2;
}

function f2px(pt) { return { x: pad + pt.x * dw, y: pad + pt.y * dh }; }

// ══════════════════════════════════════════════════════════════════
// DRAWING HELPERS
// ══════════════════════════════════════════════════════════════════
function drawSmoothPath(pts, lineW, style) {
  if (pts.length < 2) return;
  ctx.strokeStyle = style;
  ctx.lineWidth = lineW;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  const p0 = f2px(pts[0]);
  ctx.moveTo(p0.x, p0.y);
  for (let i = 1; i < pts.length; i++) {
    if (i < pts.length - 1) {
      const c = f2px(pts[i]), n = f2px(pts[i+1]);
      ctx.quadraticCurveTo(c.x, c.y, (c.x+n.x)/2, (c.y+n.y)/2);
    } else {
      const p = f2px(pts[i]);
      ctx.lineTo(p.x, p.y);
    }
  }
  ctx.stroke();
}

function drawUserStrokes() {
  ctx.strokeStyle = '#ff69b4';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const all = [...userPts];
  if (curStroke.length > 0) all.push(curStroke);
  for (const stroke of all) {
    if (stroke.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
    ctx.stroke();
  }
}

function drawSparkles() {
  const now = performance.now();
  sparkles = sparkles.filter(s => now - s.born < 500);
  for (const s of sparkles) {
    const age = (now - s.born) / 500;
    ctx.globalAlpha = 1 - age;
    ctx.font = `${12 + age * 10}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(s.emoji, s.x + s.dx * age, s.y + s.dy * age - age * 18);
  }
  ctx.globalAlpha = 1;
}

function spawnSparkles(px, py) {
  const emojis = ['✨','💫','🌟'];
  for (let i = 0; i < 3; i++) {
    sparkles.push({
      x: px, y: py,
      dx: (Math.random()-0.5) * 36,
      dy: (Math.random()-0.5) * 28,
      born: performance.now(),
      emoji: emojis[i % 3]
    });
  }
}

// ══════════════════════════════════════════════════════════════════
// VARIATION A — Pure tracing, full outline
// ══════════════════════════════════════════════════════════════════
function renderA() {
  // Solid dark outline
  const strokes = getStrokes(curNum);
  for (const pts of strokes) {
    drawSmoothPath(pts, 16, 'rgba(26,26,46,1)');
  }
  drawUserStrokes();
  drawSparkles();

  if (done) drawDoneLabel();
}

// ══════════════════════════════════════════════════════════════════
// VARIATION B — Animated guide first, then trace
// ══════════════════════════════════════════════════════════════════
function renderB() {
  // Solid outline always visible
  const strokes = getStrokes(curNum);
  for (const pts of strokes) {
    drawSmoothPath(pts, 16, 'rgba(26,26,46,1)');
  }

  if (guideAnimating) {
    // Animate a sparkle along the guide path
    const elapsed = performance.now() - guideStart;
    const t = Math.min(elapsed / GUIDE_DUR, 1);
    const path = GUIDE[curNum];
    if (path && path.length > 1) {
      const idx = t * (path.length - 1);
      const i = Math.floor(idx);
      const frac = idx - i;
      const a = f2px(path[Math.min(i, path.length-1)]);
      const b = f2px(path[Math.min(i+1, path.length-1)]);
      const gx = a.x + (b.x - a.x) * frac;
      const gy = a.y + (b.y - a.y) * frac;

      // Glowing sparkle dot
      ctx.beginPath(); ctx.arc(gx, gy, 14, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,224,102,0.8)'; ctx.fill();
      ctx.beginPath(); ctx.arc(gx, gy, 22, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,224,102,0.15)'; ctx.fill();

      // Fading trail
      for (let tr = 1; tr <= 4; tr++) {
        const tt = Math.max(0, t - tr * 0.025);
        const ti = tt * (path.length - 1);
        const tii = Math.floor(ti);
        const tf = ti - tii;
        const ta = f2px(path[Math.min(tii, path.length-1)]);
        const tb = f2px(path[Math.min(tii+1, path.length-1)]);
        ctx.beginPath();
        ctx.arc(ta.x+(tb.x-ta.x)*tf, ta.y+(tb.y-ta.y)*tf, 7-tr, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,224,102,${0.3 - tr*0.06})`;
        ctx.fill();
      }

      // "Watch first!" label
      ctx.fillStyle = 'rgba(108,92,231,0.7)';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Watch the sparkle...', cSize/2, pad - 6);

      if (t >= 1) {
        guideAnimating = false;
        active = true;
      }
    }
  } else if (!active && !done) {
    // "Now your turn!" label
    ctx.fillStyle = 'rgba(108,92,231,0.7)';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Now trace it!', cSize/2, pad - 6);
    active = true;
  }

  drawUserStrokes();
  drawSparkles();
  if (done) drawDoneLabel();
}

// ══════════════════════════════════════════════════════════════════
// VARIATION C — Dotted outline
// ══════════════════════════════════════════════════════════════════
function renderC() {
  const dots = getDots(curNum);

  // Draw dots
  for (let i = 0; i < dots.length; i++) {
    const pos = f2px(dots[i]);
    const hit = dotHit[i];
    ctx.beginPath(); ctx.arc(pos.x, pos.y, hit ? 8 : 7, 0, Math.PI*2);
    if (hit) {
      ctx.fillStyle = '#ff69b4';
      ctx.fill();
      ctx.strokeStyle = '#e91e8c'; ctx.lineWidth = 2; ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(26,26,46,0.5)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(26,26,46,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();
    }
  }

  drawUserStrokes();
  // No floating sparkles in C — dot activation IS the feedback
  if (done) drawDoneLabel();
}

function drawDoneLabel() {
  ctx.fillStyle = 'rgba(46,204,113,0.85)';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('\u2713 Done!', cSize/2, pad - 4);
}

// ══════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════
function render() {
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,cSize,cSize);

  // Cream background rounded rect
  const r = 18;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(cSize-r,0); ctx.quadraticCurveTo(cSize,0,cSize,r);
  ctx.lineTo(cSize,cSize-r); ctx.quadraticCurveTo(cSize,cSize,cSize-r,cSize);
  ctx.lineTo(r,cSize); ctx.quadraticCurveTo(0,cSize,0,cSize-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.fillStyle = '#fffbf5';
  ctx.fill();

  if (variation === 'A') renderA();
  else if (variation === 'B') renderB();
  else renderC();

  requestAnimationFrame(render);
}

// ══════════════════════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════════════════════
function getPos(e) {
  const rect = canvasEl.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

function onDown(e) {
  if (!active || done) return;
  e.preventDefault();
  drawing = true;
  const p = getPos(e);
  curStroke = [p];
  checkHit(p);
}

function onMove(e) {
  if (!drawing || !active || done) return;
  e.preventDefault();
  const p = getPos(e);
  curStroke.push(p);
  checkHit(p);
}

function onUp(e) {
  if (!drawing) return;
  e.preventDefault();
  drawing = false;
  if (curStroke.length > 1) userPts.push([...curStroke]);
  curStroke = [];
}

function checkHit(pos) {
  if (variation === 'C') {
    checkHitC(pos);
    return;
  }
  // Variations A & B — invisible sequential checkpoints
  const cps = CPS[curNum];
  if (!cps || curCP >= cps.length) return;
  const next = f2px(cps[curCP]);
  const dx = pos.x - next.x, dy = pos.y - next.y;
  if (Math.sqrt(dx*dx + dy*dy) <= 40) {
    const hitIdx = curCP;
    curCP++;
    cpTone(hitIdx, cps.length);
    spawnSparkles(next.x, next.y);
    if (curCP >= cps.length) {
      onComplete();
    }
  }
}

function checkHitC(pos) {
  // Variation C — dots activate in order
  const dots = getDots(curNum);
  // Find next unhit dot
  let nextIdx = -1;
  for (let i = 0; i < dots.length; i++) {
    if (!dotHit[i]) { nextIdx = i; break; }
  }
  if (nextIdx < 0) return;

  const dp = f2px(dots[nextIdx]);
  const dx = pos.x - dp.x, dy = pos.y - dp.y;
  if (Math.sqrt(dx*dx + dy*dy) <= 35) {
    dotHit[nextIdx] = true;
    cpTone(nextIdx, dots.length);

    // Check if all dots hit
    if (dotHit.every(Boolean)) {
      onComplete();
    }
  }
}

function onComplete() {
  done = true;
  active = false;
  drawing = false;
  if (curStroke.length > 1) { userPts.push([...curStroke]); curStroke = []; }
  successTone();
}

canvasEl.addEventListener('touchstart', onDown, {passive:false});
canvasEl.addEventListener('touchmove', onMove, {passive:false});
canvasEl.addEventListener('touchend', onUp, {passive:false});
canvasEl.addEventListener('mousedown', onDown);
canvasEl.addEventListener('mousemove', onMove);
canvasEl.addEventListener('mouseup', onUp);
canvasEl.addEventListener('mouseleave', onUp);

// ══════════════════════════════════════════════════════════════════
// RESET / SWITCH
// ══════════════════════════════════════════════════════════════════
function reset() {
  curCP = 0;
  userPts = [];
  curStroke = [];
  sparkles = [];
  drawing = false;
  done = false;

  if (variation === 'B') {
    active = false;
    guideAnimating = true;
    guideStart = performance.now();
  } else {
    active = true;
    guideAnimating = false;
  }

  if (variation === 'C') {
    dotHit = getDots(curNum).map(() => false);
  }
}

function setVariation(v) {
  variation = v;
  document.querySelectorAll('#varRow button').forEach(b => b.classList.remove('on'));
  document.getElementById('btn' + v).classList.add('on');
  reset();
}

function setNumber(n) {
  curNum = n;
  document.querySelectorAll('#numRow button').forEach(b => b.classList.remove('on'));
  document.querySelector(`#numRow button[data-n="${n}"]`).classList.add('on');
  reset();
}

// ══════════════════════════════════════════════════════════════════
// INIT UI
// ══════════════════════════════════════════════════════════════════
const numRow = document.getElementById('numRow');
for (let n = 0; n <= 5; n++) {
  const b = document.createElement('button');
  b.textContent = n;
  b.dataset.n = n;
  if (n === 0) b.classList.add('on');
  b.addEventListener('click', () => { unlockAudio(); setNumber(n); });
  b.addEventListener('touchstart', (e) => { e.preventDefault(); unlockAudio(); setNumber(n); }, {passive:false});
  numRow.appendChild(b);
}

document.getElementById('btnA').addEventListener('click', () => { unlockAudio(); setVariation('A'); });
document.getElementById('btnB').addEventListener('click', () => { unlockAudio(); setVariation('B'); });
document.getElementById('btnC').addEventListener('click', () => { unlockAudio(); setVariation('C'); });
document.getElementById('btnTry').addEventListener('click', () => { unlockAudio(); reset(); });

// Touch versions for the variation buttons
['btnA','btnB','btnC','btnTry'].forEach(id => {
  document.getElementById(id).addEventListener('touchstart', (e) => {
    e.preventDefault(); unlockAudio();
    if (id === 'btnA') setVariation('A');
    else if (id === 'btnB') setVariation('B');
    else if (id === 'btnC') setVariation('C');
    else reset();
  }, {passive:false});
});

sizeCanvas();
reset();
requestAnimationFrame(render);
window.addEventListener('resize', sizeCanvas);

/* ═══ AHA! PROGRESS TRACKING ═══ */
(function(){
  function getKey(){
    var parts = location.pathname.split('/').filter(Boolean);
    var last = parts[parts.length-1] || 'index.html';
    var game = last.replace('.html','');
    var theme = parts[parts.length-2] || 'root';
    if (game === '') game = 'index';
    return theme + '/' + game;
  }
  function load(){ try { return JSON.parse(localStorage.getItem('aha_progress')||'{}'); } catch(e){ return {}; } }
  function save(p){ try { localStorage.setItem('aha_progress', JSON.stringify(p)); } catch(e){} }
  function markAttempt(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = { attempted: true, attemptedAt: Date.now() };
    save(p);
  }
  function markComplete(){
    var p = load(), k = getKey();
    if (!p[k]) p[k] = {};
    p[k].completed = true;
    p[k].completedAt = Date.now();
    p[k].plays = (p[k].plays||0) + 1;
    save(p);
  }
  var celeb = document.getElementById('scrCeleb');
  if (celeb){
    var obs = new MutationObserver(function(){ if (celeb.classList.contains('active')) markComplete(); });
    obs.observe(celeb, { attributes: true, attributeFilter: ['class'] });
  }
  setTimeout(markAttempt, 3000);
})();

</script>
